sk_positions,\n                        sim.task_active,\n                        sim.obstacles,\n                    )\n                else:\n                    state_tensor = torch.FloatTensor(state).unsqueeze(0).to(device)\n                    with torch.no_grad():\n                        congestion_pred = model(state_tensor).squeeze().cpu().numpy()\n                    assignment = congestion_aware_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                        congestion_pred,\n                        congestion_weight=0.5,\n                        obstacles=sim.obstacles,\n                    )\n                sim.assign_tasks([(unassigned[a], t) for a, t in assignment])\n            sim.step()\n        throughputs.append(sim.tasks_completed / (max_steps / 60.0))\n        congestion_events_list.append(sim.congestion_events)\n    return (\n        np.mean(throughputs),\n        np.std(throughputs),\n        np.mean(congestion_events_list),\n        np.std(congestion_events_list),\n    )\n\n\n# Generate training data from all datasets combined\nprint(\"Creating three distinct warehouse datasets...\")\ndatasets = [\n    create_sparse_warehouse(),\n    create_bottleneck_warehouse(),\n    create_dense_obstacle_warehouse(),\n]\n\nall_train_states, all_train_congestions = [], []\nfor obstacles, hotspots, name in datasets:\n    print(f\"  Generating data for: {name}\")\n    states, congestions = generate_training_data(\n        n_samples=300, obstacles=obstacles, hotspots=hotspots\n    )\n    all_train_states.append(states)\n    all_train_congestions.append(congestions)\n\ntrain_states = np.concatenate(all_train_states[:2] + [all_train_states[2][:200]])\ntrain_congestions = np.concatenate(\n    all_train_congestions[:2] + [all_train_congestions[2][:200]]\n)\nval_states = np.concatenate([all_train_states[2][200:]])\nval_congestions = np.concatenate([all_train_congestions[2][200:]])\nprint(f\"Training data: {train_states.shape}, Validation data: {val_states.shape}\")\n\nprint(\"\\nTraining congestion predictor...\")\nmodel = CongestionPredictor(grid_size=20, hidden_dim=64)\nmodel = train_predictor(\n    model, train_states, train_congestions, val_states, val_congestions, epochs=30\n)\n\n# Evaluate on all three datasets\nprint(\"\\n\" + \"=\" * 70)\nprint(\"EVALUATION ON THREE WAREHOUSE DATASETS\")\nprint(\"=\" * 70)\n\nagent_counts = [20, 30, 40, 50]\nmax_steps = 100\n\nfor obstacles, hotspots, dataset_name in datasets:\n    print(f\"\\n--- Dataset: {dataset_name} ---\")\n    experiment_data[\"datasets\"][dataset_name] = {\n        \"distance_based\": {\n            \"throughput\": [],\n            \"std\": [],\n            \"congestion\": [],\n            \"congestion_std\": [],\n        },\n        \"congestion_aware\": {\n            \"throughput\": [],\n            \"std\": [],\n            \"congestion\": [],\n            \"congestion_std\": [],\n        },\n        \"improvement\": [],\n        \"congestion_prevention_rate\": [],\n        \"n_agents\": agent_counts,\n    }\n\n    for n_agents in agent_counts:\n        sim_params = {\n            \"grid_size\": 20,\n            \"n_agents\": n_agents,\n            \"n_tasks\": 30,\n            \"obstacles\": obstacles,\n            \"hotspots\": hotspots,\n        }\n\n        dist_tp, dist_std, dist_cong, dist_cong_std = evaluate_method(\n            \"distance\", None, sim_params, n_episodes=5, max_steps=max_steps\n        )\n        cata_tp, cata_std, cata_cong, cata_cong_std = evaluate_method(\n            \"congestion_aware\", model, sim_params, n_episodes=5, max_steps=max_steps\n        )\n\n        improvement = (cata_tp - dist_tp) / dist_tp * 100 if dist_tp > 0 else 0\n        cpr = (dist_cong - cata_cong) / dist_cong * 100 if dist_cong > 0 else 0\n\n        experiment_data[\"datasets\"][dataset_name][\"distance_based\"][\n            \"throughput\"\n        ].append(dist_tp)\n        experiment_data[\"datasets\"][dataset_name][\"distance_based\"][\"std\"].append(\n            dist_std\n        )\n        experiment_data[\"datasets\"][dataset_name][\"distance_based\"][\n            \"congestion\"\n        ].append(dist_cong)\n        experiment_data[\"datasets\"][dataset_name][\"distance_based\"][\n            \"congestion_std\"\n        ].append(dist_cong_std)\n        experiment_data[\"datasets\"][dataset_name][\"congestion_aware\"][\n            \"throughput\"\n        ].append(cata_tp)\n        experiment_data[\"datasets\"][dataset_name][\"congestion_aware\"][\"std\"].append(\n            cata_std\n        )\n        experiment_data[\"datasets\"][dataset_name][\"congestion_aware\"][\n            \"congestion\"\n        ].append(cata_cong)\n        experiment_data[\"datasets\"][dataset_name][\"congestion_aware\"][\n            \"congestion_std\"\n        ].append(cata_cong_std)\n        experiment_data[\"datasets\"][dataset_name][\"improvement\"].append(improvement)\n        experiment_data[\"datasets\"][dataset_name][\"congestion_prevention_rate\"].append(\n            cpr\n        )\n\n        print(\n            f\"  Agents={n_agents}: Dist TP={dist_tp:.1f}\u00b1{dist_std:.1f}, CATA TP={cata_tp:.1f}\u00b1{cata_std:.1f}, Imp={improvement:.1f}%, CPR={cpr:.1f}%\"\n        )\n\n# Summary\nprint(\"\\n\" + \"=\" * 70)\nprint(\"SUMMARY BY DATASET\")\nprint(\"=\" * 70)\nall_improvements = []\nfor dataset_name in experiment_data[\"datasets\"]:\n    data = experiment_data[\"datasets\"][dataset_name]\n    avg_imp = np.mean(data[\"improvement\"])\n    avg_cpr = np.mean(data[\"congestion_prevention_rate\"])\n    all_improvements.extend(data[\"improvement\"])\n    print(\n        f\"{dataset_name}: Avg Improvement={avg_imp:.1f}%, Avg Congestion Prevention Rate={avg_cpr:.1f}%\"\n    )\n\noverall_throughput_improvement = np.mean(all_improvements)\nprint(\n    f\"\\n>>> OVERALL throughput_improvement_percentage = {overall_throughput_improvement:.2f}% <<<\"\n)\n\n# Plotting\nfig, axes = plt.subplots(2, 3, figsize=(15, 10))\ncolors = {\n    \"sparse_warehouse\": \"blue\",\n    \"bottleneck_warehouse\": \"orange\",\n    \"dense_obstacle_warehouse\": \"green\",\n}\n\n# Training loss\naxes[0, 0].plot(experiment_data[\"training\"][\"losses\"][\"train\"], label=\"Train\")\naxes[0, 0].plot(experiment_data[\"training\"][\"losses\"][\"val\"], label=\"Validation\")\naxes[0, 0].set_xlabel(\"Epoch\")\naxes[0, 0].set_ylabel(\"Loss\")\naxes[0, 0].set_title(\"Congestion Predictor Training\")\naxes[0, 0].legend()\n\n# Throughput comparison\nfor dataset_name in experiment_data[\"datasets\"]:\n    data = experiment_data[\"datasets\"][dataset_name]\n    axes[0, 1].plot(\n        data[\"n_agents\"],\n        data[\"congestion_aware\"][\"throughput\"],\n        \"o-\",\n        color=colors[dataset_name],\n        label=f\"CATA-{dataset_name[:8]}\",\n    )\n    axes[0, 1].plot(\n        data[\"n_agents\"],\n        data[\"distance_based\"][\"throughput\"],\n        \"x--\",\n        color=colors[dataset_name],\n        alpha=0.5,\n    )\naxes[0, 1].set_xlabel(\"Number of Agents\")\naxes[0, 1].set_ylabel(\"Throughput (tasks/min)\")\naxes[0, 1].set_title(\"Throughput: CATA (solid) vs Distance (dashed)\")\naxes[0, 1].legend(fontsize=8)\n\n# Improvement by dataset\nx = np.arange(len(agent_counts))\nwidth = 0.25\nfor i, dataset_name in enumerate(experiment_data[\"datasets\"]):\n    data = experiment_data[\"datasets\"][dataset_name]\n    axes[0, 2].bar(\n        x + i * width,\n        data[\"improvement\"],\n        width,\n        label=dataset_name[:10],\n        color=colors[dataset_name],\n    )\naxes[0, 2].set_xlabel(\"Agent Count Index\")\naxes[0, 2].set_ylabel(\"Improvement (%)\")\naxes[0, 2].set_title(\"CATA Improvement by Dataset\")\naxes[0, 2].set_xticks(x + width)\naxes[0, 2].set_xticklabels(agent_counts)\naxes[0, 2].legend(fontsize=8)\naxes[0, 2].axhline(y=0, color=\"r\", linestyle=\"--\")\n\n# Congestion Prevention Rate\nfor i, dataset_name in enumerate(experiment_data[\"datasets\"]):\n    data = experiment_data[\"datasets\"][dataset_name]\n    axes[1, 0].bar(\n        x + i * width,\n        data[\"congestion_prevention_rate\"],\n        width,\n        label=dataset_name[:10],\n        color=colors[dataset_name],\n    )\naxes[1, 0].set_xlabel(\"Agent Count Index\")\naxes[1, 0].set_ylabel(\"Congestion Prevention Rate (%)\")\naxes[1, 0].set_title(\"Congestion Prevention Rate by Dataset\")\naxes[1, 0].set_xticks(x + width)\naxes[1, 0].set_xticklabels(agent_counts)\naxes[1, 0].legend(fontsize=8)\naxes[1, 0].axhline(y=0, color=\"r\", linestyle=\"--\")\n\n# Congestion events comparison\nfor dataset_name in experiment_data[\"datasets\"]:\n    data = experiment_data[\"datasets\"][dataset_name]\n    axes[1, 1].plot(\n        data[\"n_agents\"],\n        data[\"distance_based\"][\"congestion\"],\n        \"x--\",\n        color=colors[dataset_name],\n        alpha=0.5,\n    )\n    axes[1, 1].plot(\n        data[\"n_agents\"],\n        data[\"congestion_aware\"][\"congestion\"],\n        \"o-\",\n        color=colors[dataset_name],\n        label=f\"{dataset_name[:8]}\",\n    )\naxes[1, 1].set_xlabel(\"Number of Agents\")\naxes[1, 1].set_ylabel(\"Congestion Events\")\naxes[1, 1].set_title(\"Congestion Events: CATA (solid) vs Distance (dashed)\")\naxes[1, 1].legend(fontsize=8)\n\n# Summary bar chart\nsummary_data = []\nfor dataset_name in experiment_data[\"datasets\"]:\n    data = experiment_data[\"datasets\"][dataset_name]\n    summary_data.append(\n        [np.mean(data[\"improvement\"]), np.mean(data[\"congestion_prevention_rate\"])]\n    )\nsummary_data = np.array(summary_data)\nx_sum = np.arange(3)\naxes[1, 2].bar(\n    x_sum - 0.15, summary_data[:, 0], 0.3, label=\"Throughput Imp.\", color=\"steelblue\"\n)\naxes[1, 2].bar(x_sum + 0.15, summary_data[:, 1], 0.3, label=\"CPR\", color=\"coral\")\naxes[1, 2].set_xticks(x_sum)\naxes[1, 2].set_xticklabels([\"Sparse\", \"Bottleneck\", \"Dense\"], fontsize=9)\naxes[1, 2].set_ylabel(\"Percentage (%)\")\naxes[1, 2].set_title(\"Avg Improvement & CPR by Dataset\")\naxes[1, 2].legend()\naxes[1, 2].axhline(y=0, color=\"r\", linestyle=\"--\")\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"three_dataset_evaluation.png\"), dpi=150)\nplt.close()\n\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(f\"\\nResults saved to {working_dir}\")\n", "# Set random seed\nimport random\nimport numpy as np\nimport torch\n\nseed = 2\nrandom.seed(seed)\nnp.random.seed(seed)\ntorch.manual_seed(seed)\nif torch.cuda.is_available():\n    torch.cuda.manual_seed(seed)\n\nimport os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.optim as optim\nimport matplotlib.pyplot as plt\nfrom collections import defaultdict\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\nexperiment_data = {\n    \"training\": {\"losses\": {\"train\": [], \"val\": []}, \"epochs\": []},\n    \"datasets\": {},\n}\n\n\ndef greedy_assignment(cost_matrix):\n    n_agents, n_tasks = cost_matrix.shape\n    row_ind, col_ind = [], []\n    assigned_tasks, assigned_agents = set(), set()\n    pairs = [(cost_matrix[i, j], i, j) for i in range(n_agents) for j in range(n_tasks)]\n    pairs.sort()\n    for cost, i, j in pairs:\n        if i not in assigned_agents and j not in assigned_tasks:\n            row_ind.append(i)\n            col_ind.append(j)\n            assigned_agents.add(i)\n            assigned_tasks.add(j)\n            if len(assigned_agents) == min(n_agents, n_tasks):\n                break\n    return np.array(row_ind), np.array(col_ind)\n\n\nclass WarehouseSimulator:\n    def __init__(\n        self, grid_size=20, n_agents=20, n_tasks=30, obstacles=None, hotspots=None\n    ):\n        self.grid_size, self.n_agents, self.n_tasks = grid_size, n_agents, n_tasks\n        self.obstacles = obstacles if obstacles else set()\n        self.hotspots = hotspots if hotspots else []\n        self.congestion_events = 0\n        self.reset()\n\n    def _valid_position(self, pos):\n        return tuple(pos) not in self.obstacles\n\n    def _random_valid_position(self):\n        for _ in range(100):\n            pos = np.random.randint(0, self.grid_size, 2)\n            if self._valid_position(pos):\n                return pos\n        return np.array([0, 0])\n\n    def _hotspot_biased_position(self):\n        if self.hotspots and np.random.random() < 0.6:\n            hotspot = self.hotspots[np.random.randint(len(self.hotspots))]\n            offset = np.random.randint(-2, 3, 2)\n            pos = np.clip(hotspot + offset, 0, self.grid_size - 1)\n            if self._valid_position(pos):\n                return pos\n        return self._random_valid_position()\n\n    def reset(self):\n        self.agent_positions = np.array(\n            [self._random_valid_position() for _ in range(self.n_agents)]\n        )\n        self.agent_velocities = np.zeros((self.n_agents, 2))\n        self.task_positions = np.array(\n            [self._hotspot_biased_position() for _ in range(self.n_tasks)]\n        )\n        self.task_active = np.ones(self.n_tasks, dtype=bool)\n        self.agent_targets = [-1] * self.n_agents\n        self.time_step, self.tasks_completed = 0, 0\n        self.congestion_events = 0\n        return self.get_state()\n\n    def get_state(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        task_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        for i, pos in enumerate(self.task_positions):\n            if self.task_active[i]:\n                task_grid[pos[0], pos[1]] += 1\n        return np.stack([agent_grid, task_grid], axis=0)\n\n    def count_congestion_events(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        return np.sum(agent_grid > 2)\n\n    def compute_congestion(self, lookahead=5):\n        congestion = np.zeros((self.grid_size, self.grid_size))\n        for i, agent_pos in enumerate(self.agent_positions):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                path = self._get_path(agent_pos, self.task_positions[target_idx])\n                for step, pos in enumerate(path[:lookahead]):\n                    congestion[pos[0], pos[1]] += 1.0 / (step + 1)\n        return congestion\n\n    def _get_path(self, start, end):\n        path, current = [tuple(start)], np.array(start)\n        max_steps = self.grid_size * 2\n        for _ in range(max_steps):\n            if np.array_equal(current, end):\n                break\n            diff = end - current\n            moved = False\n            for d in [0, 1]:\n                if diff[d] != 0:\n                    new_pos = current.copy()\n                    new_pos[d] += np.sign(diff[d])\n                    if self._valid_position(new_pos):\n                        current = new_pos\n                        moved = True\n                        break\n            if not moved:\n                break\n            path.append(tuple(current))\n        return path\n\n    def assign_tasks(self, assignment):\n        for agent_idx, task_idx in assignment:\n            if task_idx >= 0 and self.task_active[task_idx]:\n                self.agent_targets[agent_idx] = task_idx\n\n    def step(self):\n        self.time_step += 1\n        self.congestion_events += self.count_congestion_events()\n\n        for i in range(self.n_agents):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                target_pos = self.task_positions[target_idx]\n                diff = target_pos - self.agent_positions[i]\n                if np.sum(np.abs(diff)) <= 1:\n                    self.task_active[target_idx] = False\n                    self.tasks_completed += 1\n                    self.agent_targets[i] = -1\n                else:\n                    move = np.zeros(2, dtype=int)\n                    for d in [0, 1]:\n                        if diff[d] != 0:\n                            new_pos = self.agent_positions[i].copy()\n                            new_pos[d] += np.sign(diff[d])\n                            if self._valid_position(new_pos):\n                                move[d] = np.sign(diff[d])\n                                break\n                    self.agent_positions[i] = np.clip(\n                        self.agent_positions[i] + move, 0, self.grid_size - 1\n                    )\n                    self.agent_velocities[i] = move\n\n        for idx in np.where(~self.task_active)[0]:\n            if np.random.random() < 0.3:\n                self.task_positions[idx] = self._hotspot_biased_position()\n                self.task_active[idx] = True\n        return self.get_state()\n\n\ndef create_sparse_warehouse(grid_size=20):\n    obstacles = set()\n    for i in range(5, 15, 5):\n        for j in range(3, grid_size - 3, 4):\n            obstacles.add((i, j))\n    hotspots = [np.array([5, 5]), np.array([15, 15])]\n    return obstacles, hotspots, \"sparse_warehouse\"\n\n\ndef create_bottleneck_warehouse(grid_size=20):\n    obstacles = set()\n    for i in range(grid_size):\n        if i not in [9, 10]:\n            obstacles.add((i, 10))\n    for j in range(grid_size):\n        if j not in [9, 10]:\n            obstacles.add((10, j))\n    hotspots = [\n        np.array([5, 5]),\n        np.array([5, 15]),\n        np.array([15, 5]),\n        np.array([15, 15]),\n    ]\n    return obstacles, hotspots, \"bottleneck_warehouse\"\n\n\ndef create_dense_obstacle_warehouse(grid_size=20):\n    obstacles = set()\n    np.random.seed(42)\n    for _ in range(int(grid_size * grid_size * 0.15)):\n        pos = (np.random.randint(1, grid_size - 1), np.random.randint(1, grid_size - 1))\n        obstacles.add(pos)\n    hotspots = [\n        np.array([3, 3]),\n        np.array([16, 16]),\n        np.array([3, 16]),\n        np.array([16, 3]),\n    ]\n    return obstacles, hotspots, \"dense_obstacle_warehouse\"\n\n\nclass CongestionPredictor(nn.Module):\n    def __init__(self, grid_size=20, hidden_dim=64):\n        super().__init__()\n        self.conv1 = nn.Conv2d(2, hidden_dim, 3, padding=1)\n        self.conv2 = nn.Conv2d(hidden_dim, hidden_dim, 3, padding=1)\n        self.conv3 = nn.Conv2d(hidden_dim, 1, 3, padding=1)\n        self.relu = nn.ReLU()\n\n    def forward(self, x):\n        x = self.relu(self.conv1(x))\n        x = self.relu(self.conv2(x))\n        return torch.sigmoid(self.conv3(x))\n\n\ndef generate_training_data(\n    n_samples=500, grid_size=20, n_agents=20, n_tasks=30, obstacles=None, hotspots=None\n):\n    states, congestions = [], []\n    for _ in range(n_samples):\n        sim = WarehouseSimulator(grid_size, n_agents, n_tasks, obstacles, hotspots)\n        state = sim.get_state()\n        active_tasks = np.where(sim.task_active)[0]\n        sim.assign_tasks(\n            [(i, active_tasks[i]) for i in range(min(n_agents, len(active_tasks)))]\n        )\n        congestion = sim.compute_congestion(lookahead=5)\n        congestion = congestion / (congestion.max() + 1e-6)\n        states.append(state)\n        congestions.append(congestion)\n    return np.array(states), np.array(congestions)\n\n\ndef distance_based_assignment(\n    agent_positions, task_positions, task_active, obstacles=None\n):\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    cost_matrix = np.array(\n        [\n            [np.sum(np.abs(ap - task_positions[ti])) for ti in active_indices]\n            for ap in agent_positions\n        ]\n    )\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef congestion_aware_assignment(\n    agent_positions,\n    task_positions,\n    task_active,\n    congestion_map,\n    congestion_weight=0.5,\n    obstacles=None,\n):\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    grid_size = congestion_map.shape[0]\n    cost_matrix = np.zeros((len(agent_positions), len(active_indices)))\n    for i, agent_pos in enumerate(agent_positions):\n        for j, task_idx in enumerate(active_indices):\n            task_pos = task_positions[task_idx]\n            distance = np.sum(np.abs(agent_pos - task_pos))\n            path_congestion, current = 0, agent_pos.copy()\n            for _ in range(grid_size * 2):\n                if np.array_equal(current, task_pos):\n                    break\n                diff = task_pos - current\n                if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                    current[0] += np.sign(diff[0])\n                elif diff[1] != 0:\n                    current[1] += np.sign(diff[1])\n                current = np.clip(current, 0, grid_size - 1)\n                path_congestion += congestion_map[current[0], current[1]]\n            cost_matrix[i, j] = distance + congestion_weight * path_congestion\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef train_predictor(\n    model,\n    train_states,\n    train_congestions,\n    val_states,\n    val_congestions,\n    epochs=30,\n    batch_size=32,\n):\n    model = model.to(device)\n    optimizer = optim.Adam(model.parameters(), lr=0.001)\n    criterion = nn.MSELoss()\n    train_states_t = torch.FloatTensor(train_states).to(device)\n    train_congestions_t = torch.FloatTensor(train_congestions).unsqueeze(1).to(device)\n    val_states_t = torch.FloatTensor(val_states).to(device)\n    val_congestions_t = torch.FloatTensor(val_congestions).unsqueeze(1).to(device)\n    n_train = len(train_states)\n    best_val_loss = float(\"inf\")\n    for epoch in range(epochs):\n        model.train()\n        perm = torch.randperm(n_train)\n        train_loss, n_batches = 0, 0\n        for i in range(0, n_train, batch_size):\n            idx = perm[i : i + batch_size]\n            optimizer.zero_grad()\n            loss = criterion(model(train_states_t[idx]), train_congestions_t[idx])\n            loss.backward()\n            optimizer.step()\n            train_loss += loss.item()\n            n_batches += 1\n        train_loss /= n_batches\n        model.eval()\n        with torch.no_grad():\n            val_loss = criterion(model(val_states_t), val_congestions_t).item()\n        experiment_data[\"training\"][\"losses\"][\"train\"].append(train_loss)\n        experiment_data[\"training\"][\"losses\"][\"val\"].append(val_loss)\n        experiment_data[\"training\"][\"epochs\"].append(epoch)\n        best_val_loss = min(best_val_loss, val_loss)\n        print(\n            f\"Epoch {epoch}: train_loss = {train_loss:.4f}, validation_loss = {val_loss:.4f}\"\n        )\n    return model\n\n\ndef evaluate_method(method, model, sim_params, n_episodes=5, max_steps=100):\n    throughputs, congestion_events_list = [], []\n    for _ in range(n_episodes):\n        sim = WarehouseSimulator(**sim_params)\n        for step in range(max_steps):\n            state = sim.get_state()\n            unassigned = [\n                i\n                for i in range(sim.n_agents)\n                if sim.agent_targets[i] < 0 or not sim.task_active[sim.agent_targets[i]]\n            ]\n            if len(unassigned) > 0 and np.any(sim.task_active):\n                if method == \"distance\":\n                    assignment = distance_based_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                        sim.obstacles,\n                    )\n                else:\n                    state_tensor = torch.FloatTensor(state).unsqueeze(0).to(device)\n                    with torch.no_grad():\n                        congestion_pred = model(state_tensor).squeeze().cpu().numpy()\n                    assignment = congestion_aware_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                        congestion_pred,\n                        congestion_weight=0.5,\n                        obstacles=sim.obstacles,\n                    )\n                sim.assign_tasks([(unassigned[a], t) for a, t in assignment])\n            sim.step()\n        throughputs.append(sim.tasks_completed / (max_steps / 60.0))\n        congestion_events_list.append(sim.congestion_events)\n    return (\n        np.mean(throughputs),\n        np.std(throughputs),\n        np.mean(congestion_events_list),\n        np.std(congestion_events_list),\n    )\n\n\n# Generate training data from all datasets combined\nprint(\"Creating three distinct warehouse datasets...\")\ndatasets = [\n    create_sparse_warehouse(),\n    create_bottleneck_warehouse(),\n    create_dense_obstacle_warehouse(),\n]\n\nall_train_states, all_train_congestions = [], []\nfor obstacles, hotspots, name in datasets:\n    print(f\"  Generating data for: {name}\")\n    states, congestions = generate_training_data(\n        n_samples=300, obstacles=obstacles, hotspots=hotspots\n    )\n    all_train_states.append(states)\n    all_train_congestions.append(congestions)\n\ntrain_states = np.concatenate(all_train_states[:2] + [all_train_states[2][:200]])\ntrain_congestions = np.concatenate(\n    all_train_congestions[:2] + [all_train_congestions[2][:200]]\n)\nval_states = np.concatenate([all_train_states[2][200:]])\nval_congestions = np.concatenate([all_train_congestions[2][200:]])\nprint(f\"Training data: {train_states.shape}, Validation data: {val_states.shape}\")\n\nprint(\"\\nTraining congestion predictor...\")\nmodel = CongestionPredictor(grid_size=20, hidden_dim=64)\nmodel = train_predictor(\n    model, train_states, train_congestions, val_states, val_congestions, epochs=30\n)\n\n# Evaluate on all three datasets\nprint(\"\\n\" + \"=\" * 70)\nprint(\"EVALUATION ON THREE WAREHOUSE DATASETS\")\nprint(\"=\" * 70)\n\nagent_counts = [20, 30, 40, 50]\nmax_steps = 100\n\nfor obstacles, hotspots, dataset_name in datasets:\n    print(f\"\\n--- Dataset: {dataset_name} ---\")\n    experiment_data[\"datasets\"][dataset_name] = {\n        \"distance_based\": {\n            \"throughput\": [],\n            \"std\": [],\n            \"congestion\": [],\n            \"congestion_std\": [],\n        },\n        \"congestion_aware\": {\n            \"throughput\": [],\n            \"std\": [],\n            \"congestion\": [],\n            \"congestion_std\": [],\n        },\n        \"improvement\": [],\n        \"congestion_prevention_rate\": [],\n        \"n_agents\": agent_counts,\n    }\n\n    for n_agents in agent_counts:\n        sim_params = {\n            \"grid_size\": 20,\n            \"n_agents\": n_agents,\n            \"n_tasks\": 30,\n            \"obstacles\": obstacles,\n            \"hotspots\": hotspots,\n        }\n\n        dist_tp, dist_std, dist_cong, dist_cong_std = evaluate_method(\n            \"distance\", None, sim_params, n_episodes=5, max_steps=max_steps\n        )\n        cata_tp, cata_std, cata_cong, cata_cong_std = evaluate_method(\n            \"congestion_aware\", model, sim_params, n_episodes=5, max_steps=max_steps\n        )\n\n        improvement = (cata_tp - dist_tp) / dist_tp * 100 if dist_tp > 0 else 0\n        cpr = (dist_cong - cata_cong) / dist_cong * 100 if dist_cong > 0 else 0\n\n        experiment_data[\"datasets\"][dataset_name][\"distance_based\" e evaluation: congestion-aware costing ignores obstacles\nwhen estimating agent-to-task paths. In `congestion_aware_assignment`, the path\nis traced by moving directly along coordinate differences with only clipping to\ngrid bounds, so it can pass through blocked cells and through bottleneck walls.\nThis makes congestion penalties inconsistent with the simulator and especially\nharms the bottleneck/dense maps, which matches the unstable/negative CPR\nresults. Fix by using the same obstacle-aware path routine for cost estimation\nas in the simulator (or a proper shortest-path planner such as BFS/A* on free\ncells), and use that obstacle-aware path both for distance costs and congestion\naccumulation. After that, rerun the comparisons because the current quantitative\nconclusions are not reliable.", ""], "exc_type": [null, null, null, null, null, null, null, null], "exc_info": [null, null, null, null, null, null, null, null], "exc_stack": [null, null, null, null, null, null, null, null], "exp_name": "0-run", "metrics": [{"metric_names": [{"data": [{"best_value": 0.0067, "dataset_name": "training", "final_value": 0.0067}], "description": "Model loss on the training dataset at the end of training.", "lower_is_better": true, "metric_name": "training loss"}, {"data": [{"best_value": 0.0074, "dataset_name": "validation", "final_value": 0.0075}], "description": "Model loss on the validation dataset, including final and best observed values.", "lower_is_better": true, "metric_name": "validation loss"}, {"data": [{"best_value": 378.24, "dataset_name": "sparse_warehouse", "final_value": 378.24}, {"best_value": 356.52, "dataset_name": "bottleneck_warehouse", "final_value": 356.52}, {"best_value": 265.56, "dataset_name": "dense_obstacle_warehouse", "final_value": 265.56}], "description": "Best throughput achieved by the distance-based method on each dataset.", "lower_is_better": false, "metric_name": "distance-based throughput"}, {"data": [{"best_value": 46.2, "dataset_name": "s 4_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_41f8f1fc55cd4f71a6406bb538f9c343_proc_1675/congestion_events_comparison.png", "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_41f8f1fc55cd4f71a6406bb538f9c343_proc_1675/throughput_comparison_all_datasets.png"], ["experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_725eadfdcd5b4194a6fce1bcd4540dfc_proc_1674/congestion_prevention_rate_by_dataset.png", "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_725eadfdcd5b4194a6fce1bcd4540dfc_proc_1674/three_dataset_evaluation.png", "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_725eadfdcd5b4194a6fce1bcd4540dfc_proc_1674/improvement_percentage_by_dataset.png", "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_725eadfdcd5b4194a6fce1bcd4540dfc_proc_1674/training_validation_loss_curves.png", "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_725eadfdcd5b4194a6fce1bcd4540dfc_proc_1674/summary_improvement_by_dataset.png", "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_725eadfdcd5b4194a6fce1bcd4540dfc_proc_1674/throughput_comparison_all_datasets.png"], ["experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_5cc5f7fd332a45568cec484850fba223_proc_1675/congestion_prevention_rate_by_dataset.png", "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_5cc5f7fd332a45568cec484850fba223_proc_1675/three_dataset_evaluation.png", "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_5cc5f7fd332a45568cec484850fba223_proc_1675/improvement_percentage_by_dataset.png", "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_5cc5f7fd332a45568cec484850fba223_proc_1675/training_validation_loss_curves.png", "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_5cc5f7fd332a45568cec484850fba223_proc_1675/summary_improvement_by_dataset.png", "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_5cc5f7fd332a45568cec484850fba223_proc_1675/throughput_comparison_all_datasets.png"], [], ["experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/seed_aggregation_fa416ccba8bd46c0b79deb031abb21f4/aggregated_improvement_percentage.png", "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/seed_aggregation_fa416ccba8bd46c0b79deb031abb21f4/aggregated_summary_improvement.png", "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/seed_aggregation_fa416ccba8bd46c0b79deb031abb21f4/aggregated_throughput_comparison.png", "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/seed_aggregation_fa416ccba8bd46c0b79deb031abb21f4/aggregated_training_loss_curves.png"]], "plot_analyses": [[{"analysis": "The congestion prevention rate plot shows highly non-uniform behavior across environments and agent counts. Bottleneck Warehouse has the strongest positive congestion reduction at 20 and 40 agents, around the mid-30% range, which is the clearest evidence that congestion-aware assignment helps most when there are structured chokepoints. Dense Obstacle Warehouse is also positive at 20 and 30 agents, but turns negative at 40 and 50 agents, suggesting the predictor or cost model stops helping once traffic becomes too heavy or obstacle-induced routing complexity exceeds what the learned heatmap captures. Sparse Warehouse is negative at 20, positive at 30, then negative again at 40 and 50, implying unstable gains in easier layouts where congestion is less structured and small assignment changes may not translate into fewer conflicts. Overall, the main scientific takeaway is that CATA appears beneficial when congestion is concentrated and predictable, but not yet robust across all densities.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_2391b1cf7bb1421f9dc24924578cf6da_proc_1672/congestion_prevention_rate_by_dataset.png"}, {"analysis": "This multi-panel summary is internally informative and somewhat mixed. The training curve is healthy: both train and validation losses drop sharply after the early epochs and remain close, ending near 0.007\u20130.008, which suggests the congestion predictor learns a real signal without obvious overfitting. The throughput panel shows that CATA usually improves throughput in Sparse and Bottleneck settings, while Dense Obstacle improves strongly at low-to-medium agent counts but loses advantage at higher counts. The improvement bar chart reinforces that pattern: Dense Obstacle gives the largest gain at 20 agents, moderate gain at 30, then negative values at 40 and 50. Sparse stays mildly positive for throughput despite weak congestion-prevention performance, indicating throughput and the congestion-event metric are not perfectly aligned. The congestion-event panel shows CATA reduces congestion in Bottleneck but often increases it in Sparse and at higher loads in Dense. The final summary panel captures the aggregate story: near-zero average throughput gain but strong congestion prevention in Bottleneck, modest positive average throughput and congestion reduction in Dense, and positive throughput yet negative average congestion prevention in Sparse. For a paper, this means the method has promise, but the mechanism is not consistently validated by all metrics; the strongest evidence is environment-dependent rather than universal.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_2391b1cf7bb1421f9dc24924578cf6da_proc_1672/three_dataset_evaluation.png"}, {"analysis": "The throughput improvement plot makes the environment dependence especially clear. Dense Obstacle Warehouse has the largest gain at 20 agents, still solid gain at 30, then drops below zero at 40 and 50 agents. Sparse Warehouse is consistently modestly positive, roughly low single-digit gains across all counts, indicating the method can provide a small assignment advantage even when congestion is not severe. Bottleneck Warehouse is negative at 20, mildly positive at 30 and 40, and roughly neutral at 50, which is weaker than the congestion-prevention plot might suggest. This mismatch implies that reducing counted congestion events does not always convert directly into more completed tasks, perhaps because the task-generation dynamics or the greedy assignment procedure dominate throughput. The plot supports a nuanced claim: CATA can help throughput, but gains are concentrated in specific regimes and are smaller than the ambitious hypothesis in the abstract.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_2391b1cf7bb1421f9dc24924578cf6da_proc_1672/improvement_percentage_by_dataset.png"}, {"analysis": "The training curves indicate stable optimization and decent generalization. There is a very sharp drop from the initial training loss to a plateau around 0.032 in the first epoch, then a major improvement around epochs 7\u20139 where both training and validation losses fall to about 0.009. After that, both curves gradually decline toward approximately 0.0065\u20130.0075 with very small separation. That close tracking suggests little or no overfitting despite training on mixed datasets and validating on the dense-obstacle split. However, the abrupt step-like transition rather than smooth decay suggests the model may be learning a relatively simple thresholded structure in the supervision target, or that optimization discovers a much better basin suddenly. In any case, the predictor seems good enough to justify downstream testing; the main limitation in the full experiment is therefore more likely the assignment integration or the mismatch between the learned target and true planning congestion, not raw supervised learning failure.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_2391b1cf7bb1421f9dc24924578cf6da_proc_1672/training_validation_loss_curves.png"}, {"analysis": "The summary bar chart emphasizes that average performance is heterogeneous across datasets. Sparse Warehouse shows a positive average throughput improvement of a few percent but a negative average congestion prevention rate, meaning CATA completes slightly more tasks while actually increasing the measured congestion events on average. Bottleneck Warehouse has essentially zero average throughput gain but strongly positive average congestion prevention, around 10%, which means the method successfully reroutes traffic away from chokepoints but that this benefit is not fully reflected in throughput under the current simulator and evaluation setup. Dense Obstacle Warehouse is the most balanced result, with both positive average throughput gain and positive average congestion prevention. This is scientifically useful because it suggests the learned heatmap is most effective when the environment has enough structural complexity to make congestion prediction meaningful, but not so much regularity that a simple baseline already captures most of the benefit. For publication-quality evidence, this chart argues for rethinking which downstream metric best reflects value and for adding task completion time or replanning metrics.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_2391b1cf7bb1421f9dc24924578cf6da_proc_1672/summary_improvement_by_dataset.png"}, {"analysis": "The throughput comparison with error bars provides the clearest view of effect size and robustness. Throughput increases with agent count for all methods and datasets, which is expected because more agents complete more tasks per unit time in this simulator. CATA is consistently above the distance baseline in Sparse Warehouse, with relatively small but stable margins and overlapping-yet-separated means. In Bottleneck Warehouse, CATA is usually slightly better, though the gain is modest relative to the variability, especially at 20 and 50 agents. In Dense Obstacle Warehouse, CATA shows the largest absolute advantage at 20 and 30 agents, but the gap narrows or reverses around 40\u201350 agents, again indicating breakdown under heavier load. The standard deviations are substantial in Dense and at low-agent Bottleneck settings, which weakens confidence in some apparent improvements. The main conclusion is that CATA is promising but not yet conclusively superior across regimes; it looks strongest in moderate-density cases and in settings where congestion is structured enough to be predictable, but variance and some reversals mean stronger statistical validation and more episodes are needed.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_2391b1cf7bb1421f9dc24924578cf6da_proc_1672/throughput_comparison_all_datasets.png"}], [{"analysis": "The composite figure shows a coherent early-stage result. Training loss falls sharply from about 0.066 to about 0.007, and validation loss tracks training closely after the mid-training drop, suggesting the congestion predictor is learning a stable mapping without obvious overfitting. Throughput trends increase with agent count for both methods, but CATA only helps consistently in the sparse setting, gives mixed but small gains in the bottleneck setting, and is highly non-monotonic in the dense-obstacle setting. The dense setting has the largest upside at low agent counts, with roughly 20% improvement at 20 agents and about 10% at 30 agents, but performance flips negative at 40 and 50 agents. Congestion prevention is similarly inconsistent: bottleneck shows strong positive congestion reduction at 20 and 40 agents, but strongly negative at 30; sparse is negative at most counts except 30; dense is positive at 20 and 30 but negative at 40 and 50. The congestion-events line plot confirms that CATA sometimes increases congestion even when throughput improves, especially in sparse and dense cases at higher loads, implying the learned allocation may trade local crowding for faster task completion. The summary panel makes the main story clear: average throughput improvement is positive in sparse and dense, near zero in bottleneck, while average congestion prevention is strongly positive only in bottleneck and negative in sparse. Scientifically, this supports that learned congestion-aware allocation can help, but the current implementation is not yet robust enough to claim general congestion prevention. The mismatch between throughput and congestion metrics suggests either the congestion proxy is imperfect or the predictor/assignment integration is not well aligned with the evaluation dynamics.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_902e81d767bf4fb8acf3b2aed239a2bf_proc_1673/three_dataset_evaluation.png"}, {"analysis": "The standalone training-curve figure reinforces that the predictor training is well behaved. There is an initial plateau around 0.032 for both train and validation loss through roughly epochs 1\u20136, followed by a sharp optimization breakthrough around epochs 7\u20139 and then a gradual convergence toward about 0.0065\u20130.0075. Validation remains slightly above training after convergence, but the gap is very small, which argues against significant overfitting despite the validation set being drawn from the dense-obstacle dataset. The abrupt drop suggests the model may be learning a thresholded spatial pattern or escaping an initialization regime rather than improving smoothly. For an initial implementation, this is a positive result: the supervised signal is learnable and generalization to held-out dense-obstacle samples appears acceptable. Still, the plateau-then-drop shape may warrant checking learning-rate sensitivity, target normalization, or whether the model is mostly memorizing simple occupancy heuristics rather than richer spatiotemporal structure.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_902e81d767bf4fb8acf3b2aed239a2bf_proc_1673/training_validation_curves.png"}, {"analysis": "This throughput-improvement bar chart highlights strong dataset dependence. Sparse warehouse gains are modest but consistently positive, around 2\u20135% across all agent counts, which is encouraging because it suggests the congestion-aware penalty does not break performance in easier layouts. Bottleneck warehouse gains are negative at 20 agents, slightly positive at 30 and 40 agents, and essentially neutral at 50 agents, indicating the method does not yet reliably exploit the canonical high-congestion topology where it should ideally shine most. Dense-obstacle warehouse exhibits the most interesting behavior: very large gains at 20 agents and still strong gains at 30 agents, but negative results at 40 and 50 agents. That pattern suggests the predictor or cost integration helps when congestion structure is present but not saturated, yet fails under heavier crowding where path interactions become harder to anticipate. For a paper narrative, the main takeaway is not broad superiority but conditional effectiveness: CATA appears promising in moderately difficult regimes, especially structurally complex maps, but lacks robustness as density increases.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_902e81d767bf4fb8acf3b2aed239a2bf_proc_1673/improvement_percentage_all_datasets.png"}, {"analysis": "This congestion-prevention chart shows that the method\u2019s effect on congestion is even less stable than its effect on throughput. Sparse warehouse is negative at 20, 40, and 50 agents, with only a positive effect at 30 agents, meaning CATA often produces more measured congestion than distance-based assignment in easy layouts. Bottleneck warehouse alternates sharply between strongly positive and strongly negative values, with large congestion reductions at 20 and 40 agents but a large increase at 30 agents and near-neutral behavior at 50. Dense-obstacle warehouse follows a similar split: positive congestion reduction at 20 and 30 agents, negative at 40 and 50. This instability suggests the congestion-events metric and the learned penalty are not tightly coupled. One plausible explanation is that the predictor-trained target is based on simplified lookahead path overlap, whereas evaluation counts cells occupied by more than two agents over time; reducing one signal does not necessarily reduce the other. Another possibility is assignment decisions are being improved for throughput but not for occupancy dispersion. This plot weakens any claim that the current method truly prevents congestion in a robust way, and instead supports a narrower claim that learned congestion estimates can sometimes improve task allocation.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_902e81d767bf4fb8acf3b2aed239a2bf_proc_1673/congestion_prevention_rate_all_datasets.png"}, {"analysis": "The averaged summary makes the aggregate message easy to read. Sparse warehouse shows about 3% average throughput gain but clearly negative average congestion prevention, so the method improves efficiency slightly while worsening the chosen congestion metric on average. Bottleneck warehouse shows near-zero average throughput improvement but the largest positive average congestion prevention, implying the algorithm can reduce congestion in that topology without translating it into materially better throughput. Dense-obstacle warehouse has the strongest average throughput gain, around 6%, with a smaller positive congestion-prevention average around 2\u20133%, making it the most favorable overall setting in this experiment. As a top-level conclusion, the method seems most promising in complex obstacle-rich environments, less compelling in sparse layouts, and unexpectedly weak in the bottleneck scenario that should have been a natural showcase. This is useful scientifically because it points toward a mechanism story: CATA may currently be capturing distributed obstacle-induced interference better than narrow-passage bottleneck dynamics.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_902e81d767bf4fb8acf3b2aed239a2bf_proc_1673/summary_metrics_all_datasets.png"}, {"analysis": "The per-dataset throughput plots with error bars provide a better sense of statistical reliability. In sparse warehouse, CATA is above distance-based assignment at all agent counts, and the separation is reasonably consistent relative to the error bars, especially at 40 and 50 agents, making this the cleanest positive result. In bottleneck warehouse, error bars overlap substantially at every point, and CATA is actually lower at 20 agents while only marginally higher thereafter, so there is little evidence of a robust throughput benefit. In dense-obstacle warehouse, CATA is clearly better at 20 and 30 agents, but by 40 and 50 agents the distance-based baseline catches up or slightly surpasses it, and the large variance suggests instability across episodes. This figure strengthens the interpretation that gains in sparse are reliable but modest, gains in dense are regime-dependent and noisy, and gains in bottleneck are weak. For next steps, the most important follow-up is to improve robustness at higher density and to add more episodes or confidence intervals before making strong comparative claims.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_902e81d767bf4fb8acf3b2aed239a2bf_proc_1673/throughput_comparison_all_datasets.png"}], [], [{"analysis": "The averaged summary shows a mixed but interpretable picture of CATA at this preliminary stage. Throughput improves in sparse and dense layouts by roughly low-single-digit percentages, with the strongest average gain in the dense-obstacle setting, while the bottleneck layout shows almost no average throughput change. Congestion prevention is highly dataset-dependent: clearly positive in the bottleneck layout, modestly positive in the dense layout, and negative in the sparse layout. This pattern suggests the learned congestion signal is most useful when the environment contains structurally predictable chokepoints, but can be misaligned with actual efficiency in open environments where detours may add unnecessary cost. The combination of positive throughput with negative congestion prevention in the sparse case also implies the current congestion metric is not fully aligned with task efficiency, or that CATA may trade localized crowding for shorter completion cycles.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_41f8f1fc55cd4f71a6406bb538f9c343_proc_1675/summary_metrics_by_dataset.png"}, {"analysis": "This multi-panel figure provides the clearest end-to-end view of the experiment. The training curves are stable and show rapid loss reduction followed by smooth convergence, with train and validation closely matched, which indicates the predictor is learning a generalizable signal rather than overfitting strongly. Throughput trends increase with agent count for all datasets, and CATA usually matches or exceeds the distance baseline, but the benefit is inconsistent by environment and load. The sparse layout shows consistent but small throughput gains. The bottleneck layout shows a slight loss at low density, then modest gains at medium-to-high density, which is directionally consistent with the hypothesis that congestion-aware assignment matters more when density grows. The dense-obstacle layout shows the largest gain at 20-30 agents, then reverses at 40-50 agents, suggesting that predicted congestion penalties can become counterproductive under heavier clutter or when the simple path-cost approximation mismatches actual motion constraints. The congestion-prevention panel reinforces this inconsistency: CATA reduces congestion strongly in some settings but increases it in others. Most notably, throughput improvements do not always coincide with lower congestion, meaning the current congestion-event metric is only a partial proxy for system quality. For a paper, the strongest takeaway is not yet universal superiority, but environment-dependent effectiveness with promising gains in structured difficult regimes.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_41f8f1fc55cd4f71a6406bb538f9c343_proc_1675/three_dataset_evaluation.png"}, {"analysis": "The training-only view confirms the predictor optimization is healthy. Loss drops sharply in the early epochs, has a noticeable transition around epochs 7-9, then settles into a slow-improvement plateau near a low error floor. The train and validation curves are extremely close throughout most of training, which supports that the model generalizes across the held-out validation split rather than memorizing training samples. At the same time, the plateau suggests model capacity or target quality may now be the bottleneck: more epochs alone are unlikely to yield large gains. Since this is initial implementation, the result is encouraging as a proof of learnability of congestion heatmaps, but additional architectural or label improvements would likely be needed for larger downstream allocation gains.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_41f8f1fc55cd4f71a6406bb538f9c343_proc_1675/training_loss_curves.png"}, {"analysis": "The throughput-improvement bar chart highlights strong interaction effects between warehouse topology and agent density. Sparse warehouses benefit consistently but modestly across all tested agent counts, indicating CATA is fairly robust there even if the gains are not dramatic. Bottleneck warehouses are slightly worse than distance-based assignment at 20 agents, then mildly better at 30-40 agents, and roughly neutral at 50 agents. This suggests that the learned congestion-aware assignment is not yet fully exploiting bottlenecks, despite the intuition that such environments should benefit most. Dense-obstacle warehouses show the most striking non-monotonic trend: a very large improvement at 20 agents, still substantial at 30 agents, then negative at 40 and 50 agents. That reversal is important scientifically because it suggests either calibration failure of the congestion penalty, mismatch between predicted congestion and actual traversability, or instability from using a simplistic greedy assignment/path estimator instead of a stronger planner-coupled cost model. This plot strongly motivates ablations over congestion weight and evaluation under more episodes before claiming robust advantage.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_41f8f1fc55cd4f71a6406bb538f9c343_proc_1675/throughput_improvement_by_dataset.png"}, {"analysis": "The congestion-events comparison shows that CATA does not uniformly suppress congestion. In the sparse warehouse, congestion is slightly higher at all agent counts, and the gap widens mildly with load. In the bottleneck warehouse, CATA is better at 20, 40, and 50 agents but worse at 30 agents, indicating unstable behavior around intermediate density. In the dense-obstacle warehouse, CATA reduces congestion at 20 and 30 agents but increases it substantially at 40 and 50 agents. This is especially important because those heavier-load dense cases are exactly where a congestion-aware method should ideally help most. The likely explanation is that the heatmap predictor and assignment cost are learned from simplified rollout labels and a simplistic path estimator, so under harder crowding regimes the model may misidentify which regions are worth avoiding. For the paper narrative, this plot supports a more nuanced claim: learned anticipation can help, but the current implementation is not yet reliably congestion-minimizing under all densities.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_41f8f1fc55cd4f71a6406bb538f9c343_proc_1675/congestion_events_comparison.png"}, {"analysis": "The throughput comparison plot shows that total system productivity generally scales with agent count for both methods, and CATA often remains close to or slightly above the baseline. Sparse warehouses exhibit the cleanest win: CATA is consistently above distance-based assignment, with the gap increasing moderately at higher agent counts. Bottleneck warehouses show near parity, with CATA underperforming at low density but overtaking slightly from 30 agents onward. Dense-obstacle warehouses again display the most complex behavior: CATA is much better at low-to-medium density, but falls behind at 40 and 50 agents. This means the main hypothesis receives partial support: predictive congestion-aware allocation can improve throughput, but the benefit currently depends strongly on layout complexity and load. The strongest positive evidence is that gains appear without any sophisticated downstream planner integration, which is encouraging for an early prototype. The main weakness is lack of robustness in the hardest dense/high-load regime, which currently limits claims of broad superiority.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_41f8f1fc55cd4f71a6406bb538f9c343_proc_1675/throughput_comparison_all_datasets.png"}], [{"analysis": "This plot shows congestion prevention rate versus number of agents for three warehouse layouts. Sparse warehouse is mildly positive at 20 and 30 agents, strongly positive around 40 agents, and near zero or slightly negative at 50 agents. Bottleneck warehouse is negative at 20 and 30 agents, strongly positive at 40 agents, and modestly positive at 50 agents. Dense obstacle warehouse is negative at 20, 30, and 40 agents, then sharply positive at 50 agents. The main implication is that the congestion-aware policy is highly regime-dependent: it helps most in specific high-pressure settings, but can worsen congestion in others. This weakens any broad claim of uniformly better congestion control and suggests strong interaction between environment topology and traffic density.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_725eadfdcd5b4194a6fce1bcd4540dfc_proc_1674/congestion_prevention_rate_by_dataset.png"}, {"analysis": "This six-panel summary is internally coherent and gives the clearest overall picture. Training loss drops quickly and stabilizes with train/validation curves closely tracking, indicating successful fitting without obvious overfitting. Throughput plots show consistent gains for sparse warehouse, mixed but sometimes substantial gains for bottleneck warehouse, and highly non-monotonic behavior for dense obstacles, including underperformance at intermediate agent counts and a large gain at 50 agents. Improvement bars confirm this heterogeneity. Congestion event plots explain part of the story: throughput can improve even when congestion prevention is weak or negative, especially in the dense case, so the learned signal may be reallocating work in a way that boosts task completion without always reducing the chosen congestion metric. The summary bars highlight that average throughput improvement is positive across all datasets, but average congestion prevention is strong only for sparse, modest for bottleneck, and slightly negative for dense. This supports a cautious claim that the prototype improves throughput more reliably than it improves measured congestion.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_725eadfdcd5b4194a6fce1bcd4540dfc_proc_1674/three_dataset_evaluation.png"}, {"analysis": "This plot isolates throughput improvement over distance-based assignment. Sparse warehouse gains are small at 20-40 agents and slightly negative at 50, indicating limited added value in relatively easy layouts. Bottleneck warehouse is mostly neutral or slightly negative except for a large gain at 40 agents, which suggests the method helps when contention aligns with a central bottleneck but may be unstable across loads. Dense obstacle warehouse is the most volatile: small gain at 20, negative at 30 and 40, then a very large jump at 50. The implication is that the current implementation may only unlock benefits when congestion becomes severe enough for prediction-guided assignment to matter, while at moderate densities prediction noise or cost mismatch can hurt performance.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_725eadfdcd5b4194a6fce1bcd4540dfc_proc_1674/improvement_percentage_by_dataset.png"}, {"analysis": "This training curve is healthy for an initial implementation. There is a sharp loss reduction around epochs 5-7 followed by slower improvement and a small train-validation gap afterward. That pattern suggests the model is learning meaningful regularities quickly and then entering diminishing returns. Because validation tracks training closely, the main limitation is unlikely to be overfitting; rather, downstream instability is probably caused by target quality, assignment-cost integration, simulator simplifications, or distribution mismatch between supervised labels and online deployment.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_725eadfdcd5b4194a6fce1bcd4540dfc_proc_1674/training_validation_loss_curves.png"}, {"analysis": "This summary plot aggregates average throughput improvement and average congestion prevention rate by dataset. Sparse warehouse has low average throughput improvement but the highest positive congestion prevention rate, indicating the model reduces congestion where the baseline already performs reasonably well, leaving little room for throughput gains. Bottleneck warehouse shows moderate positive gains on both metrics, which is the strongest evidence for the intended hypothesis. Dense warehouse shows positive average throughput improvement but slightly negative average congestion prevention, revealing a disconnect between the optimization target and the reported congestion metric. That mismatch is important for a paper narrative: the method may be helping task allocation efficiency in difficult layouts without accurately preventing congestion as currently measured.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_725eadfdcd5b4194a6fce1bcd4540dfc_proc_1674/summary_improvement_by_dataset.png"}, {"analysis": "This throughput comparison with error bars adds important nuance. CATA is consistently above or near the baseline in sparse warehouse except at the highest load where the baseline slightly exceeds it, and variability appears moderate. In bottleneck warehouse, CATA is clearly better at 40 agents and roughly tied elsewhere, but large error bars suggest substantial episode-to-episode variance. In dense obstacle warehouse, the baseline is better at 30 and 40 agents, while CATA becomes much better at 50 agents; uncertainty is also large there. Overall, the error bars indicate that several apparent gains may not be statistically robust with only five episodes. The strongest promising region is the high-density dense-obstacle setting at 50 agents, but more seeds are needed before making strong claims.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_725eadfdcd5b4194a6fce1bcd4540dfc_proc_1674/throughput_comparison_all_datasets.png"}], [{"analysis": "The congestion prevention rate plot shows that CATA usually reduces congestion events relative to distance-based assignment, but the effect is highly dataset- and load-dependent. Sparse warehouse gains are consistently positive and modest, roughly in the 10\u201335% range, suggesting the learned congestion signal helps but does not radically change outcomes when the map is already easy to traverse. Dense obstacle warehouse gains are strongly positive at every agent count and peak near 40 agents at about two-thirds reduction, which is the clearest evidence that congestion-aware allocation is most valuable in structurally constrained environments where routing choices interact strongly. Bottleneck warehouse is unstable: strong gains at 20 and 40 agents, but a large negative value around 30 agents and only small gains at 50. That negative bar is important because it means the current implementation can actively worsen congestion in some narrow-passage regimes. For a paper, this is promising but not yet robust; the result supports the core hypothesis mainly in dense obstacle settings, while bottleneck behavior needs diagnosis.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_5cc5f7fd332a45568cec484850fba223_proc_1675/congestion_prevention_rate_by_dataset.png"}, {"analysis": "The 2x3 summary figure gives a coherent picture of a working preliminary system. Training and validation loss both drop quickly and then track closely, ending near 0.007, which suggests the predictor is learning a nontrivial mapping without obvious overfitting. Throughput curves show that CATA beats distance-based assignment consistently in sparse and dense obstacle settings, with especially large separation in dense obstacle cases at 30\u201340 agents. The improvement bar chart confirms this: dense obstacle warehouse has the strongest throughput gains, including a very large jump at 40 agents, while sparse gains are small and bottleneck gains are mixed, including negative values at 30 and 50 agents. The congestion prevention plot mirrors that pattern, implying throughput gains are aligned with actual congestion reduction rather than incidental noise. The congestion events line plot is particularly informative: CATA lowers congestion in sparse and dense obstacle settings across all shown loads, but in bottleneck layouts the gap is inconsistent. The final dataset-level summary compresses the message well: dense obstacle is the strongest win on both throughput and congestion prevention, sparse is moderate, and bottleneck is weak on throughput despite decent average congestion reduction. Scientifically, this indicates the predictor is exploiting rich spatial structure better than single narrow chokepoints, or that the assignment cost/path surrogate is mismatched to bottleneck dynamics.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_5cc5f7fd332a45568cec484850fba223_proc_1675/three_dataset_evaluation.png"}, {"analysis": "The throughput improvement plot isolates the main performance claim and shows a sharply nonuniform benefit profile. Sparse warehouse improvements remain positive but small, around low single digits, implying that in easy maps distance is already a strong heuristic and congestion-aware penalties offer only marginal benefit. Bottleneck warehouse again exhibits mixed performance: a small gain at 20 and 40 agents, but negative throughput at 30 and 50 agents, indicating CATA sometimes trades off assignment quality incorrectly under chokepoint pressure. Dense obstacle warehouse is the standout result, with positive gains everywhere and a very large spike near 40 agents, around 65%+. That spike is much larger than the improvements in the stated abstract, so either this simplified simulator makes congestion effects unusually strong or the estimate has high variance. This plot strongly supports the hypothesis in obstacle-rich maps but also warns that the current method is not universally better. For publication-quality evidence, the next step is to verify whether the 40-agent dense-obstacle spike is stable across more seeds and whether bottleneck failures are systematic.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_5cc5f7fd332a45568cec484850fba223_proc_1675/improvement_percentage_by_dataset.png"}, {"analysis": "The training-curve figure indicates stable optimization. There is a rapid drop from the initial train loss to the validation plateau around 0.032 in the first epoch, then a sharper transition around epochs 7\u20139 where both train and validation losses fall to below 0.01, followed by gradual convergence. The close overlap between train and validation losses throughout most of training suggests little to no overfitting, and the validation curve staying slightly above train after convergence is expected. This is a good sign for the predictive module: the learning problem appears easy enough for the small CNN to fit, likely because labels are derived from a simple simulator and normalized congestion maps. At the same time, the smooth low loss should not be overinterpreted as downstream success, since evaluation plots show strong environment dependence. In other words, the predictor learns its supervised target well, but the utility of those predictions inside assignment depends on whether the target and integration mechanism match the true control objective.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_5cc5f7fd332a45568cec484850fba223_proc_1675/training_validation_loss_curves.png"}, {"analysis": "The dataset-level summary bars make the aggregate ranking very clear. Dense obstacle warehouse has by far the largest average throughput improvement, roughly mid-20% range, and also the highest average congestion prevention rate, roughly upper-30% range. Sparse warehouse shows low average throughput gain, only a few percent, despite a more substantial average congestion reduction around low-20% range, suggesting that reducing counted congestion events in easy maps does not translate proportionally into more completed tasks. Bottleneck warehouse has near-zero average throughput gain but still positive average congestion prevention, around low teens. That mismatch is important: CATA can reduce the chosen congestion metric without delivering better task completion in bottleneck layouts, which implies either the congestion metric is incomplete, or detours/assignment distortions offset the benefit. This is a strong insight for paper framing: congestion reduction alone is not sufficient evidence; throughput must remain the primary metric, and the bottleneck dataset exposes a limitation of the current objective design.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_5cc5f7fd332a45568cec484850fba223_proc_1675/summary_improvement_by_dataset.png"}, {"analysis": "The throughput comparison with error bars is the most useful plot for judging effect size and reliability. In sparse warehouse, CATA is consistently above distance-based assignment at all agent counts, but the margin is modest and error bars overlap somewhat, so the effect looks real but not dramatic. In bottleneck warehouse, the means are close and sometimes reversed depending on load, with visible variance, reinforcing that the current method is not reliably superior there. In dense obstacle warehouse, CATA is consistently better, especially at 30 and 40 agents where the gap is large relative to uncertainty, though variance is still substantial. The dense-obstacle baseline also appears non-monotonic, dipping at 40 agents, while CATA maintains a smoother increase; that suggests congestion-aware assignment is stabilizing performance under high interaction density. However, the large error bars in dense obstacle and bottleneck cases indicate only five evaluation episodes may be too few for strong claims. For a top-conference paper, these results are best interpreted as encouraging preliminary evidence rather than definitive proof: the method seems particularly effective in cluttered maps, but robustness across seeds and layouts remains unresolved.", "plot_path": "experiments/2026-04-05_10-02-44_congestion_heatmap_allocation_attempt_0/logs/0-run/experiment_results/experiment_5cc5f7fd332a45568cec484850fba223_proc_1675/throughput_comparison_all_datasets.png"}], [], []], "vlm_feedback_summary": ["Valid plots were received. Across the uploaded figures, the congestion predictor\ntrains stably and generalizes reasonably well, but downstream benefits of CATA\nare highly environment- and load-dependent. The strongest positive evidence\nappears in structured bottleneck settings for congestion reduction and in dense-\nobstacle settings at low-to-medium agent counts for throughput gains. Sparse\nsettings show only small throughput gains and often worse congestion-event\ncounts. Several plots reveal a mismatch between reduced congestion events and\nhigher throughput, suggesting the evaluation metric, the congestion label, or\nthe assignment-cost integration may not yet faithfully capture the operational\nobjective. Overall, the implementation is promising for a preliminary stage but\ndoes not yet support a strong universal claim; the paper-worthy direction is to\nrefine the congestion target, improve assignment integration, and run more\nstatistically robust evaluations.", "Valid plots were received. The results show a well-trained congestion predictor\nwith closely aligned train/validation losses, but downstream allocation benefits\nare mixed. CATA gives small consistent throughput gains in sparse layouts, the\nstrongest average gains in dense-obstacle layouts at low-to-moderate agent\ncounts, and surprisingly weak throughput improvements in bottleneck layouts.\nCongestion prevention is highly inconsistent and often disagrees with throughput\ngains, suggesting a mismatch between the learned congestion target, the\nassignment cost integration, and the evaluation metric. Overall, the current\nimplementation is promising as a preliminary proof of concept, but not yet\nstrong enough for a robust claim that learned heatmap-guided allocation\nconsistently prevents congestion across warehouse regimes.", "[]", "The plots support that the congestion predictor learns a meaningful signal and\nthat CATA can improve throughput, especially in sparse and low-to-medium density\ndense-obstacle settings, with some positive congestion reduction in bottleneck\nenvironments. However, performance is inconsistent across layouts and agent\ncounts: dense high-load cases often regress, and lower congestion does not\nalways align with higher throughput. Overall, this is promising preliminary\nevidence for the idea, but not yet strong enough for a top-tier claim without\nfurther ablations, stronger assignment/planning integration, more robust\nevaluation, and better alignment between predicted congestion, congestion\nmetrics, and task efficiency.", "Valid plots were received. Overall, the predictor training looks stable and\ngeneralization in loss space appears good, but downstream policy benefits are\nhighly topology- and density-dependent. Throughput improves on average across\ndatasets, especially in bottleneck and very high-density dense-obstacle\nsettings, while congestion prevention is inconsistent and sometimes negative.\nThis suggests the initial implementation is promising for task-completion\nefficiency but does not yet robustly validate the full congestion-prevention\nhypothesis. The clearest next steps are stronger baselines, more seeds/error\nanalysis, better congestion labels and path-cost integration, and ablations on\ncongestion weight and prediction horizon.", "Valid plots were received. Overall, the plots show a functional preliminary CATA\nsystem: the congestion predictor trains cleanly with closely matched\ntrain/validation loss, and downstream performance is clearly strongest in the\ndense obstacle warehouse, where CATA substantially improves throughput and\nreduces congestion. Sparse warehouse shows small but consistent gains. The main\nweakness is the bottleneck warehouse, where both throughput and congestion\nprevention are inconsistent and sometimes negative, indicating the current\ncongestion-aware cost integration is not yet robust in narrow chokepoint\nenvironments. The figures support the core hypothesis in structurally complex\nsettings, but they also reveal a critical limitation: reducing predicted\ncongestion does not always translate to higher throughpu
