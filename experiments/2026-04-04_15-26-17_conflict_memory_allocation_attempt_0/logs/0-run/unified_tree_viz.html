, false, false, false, false, true, false], "plots": [["../../logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/scaling_factor_tuning_results.png", "../../logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/n_warmup_tuning_results.png", "../../logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/mapf_scaling_tuning_heatmap.png", "../../logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/mapf_tuning_summary.png", "../../logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/mapf_makespan_comparison.png", "../../logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/mapf_improvement_by_scaling_factor.png", "../../logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/mapf_conflict_counts.png", "../../logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/multi_dataset_results.png"], [], [], [], [], [], [], ["../../logs/0-run/experiment_results/experiment_956f0e83389e41cc8c798f40e7520e7d_proc_11819/mapf_all_datasets_makespan_comparison.png", "../../logs/0-run/experiment_results/experiment_956f0e83389e41cc8c798f40e7520e7d_proc_11819/mapf_all_datasets_crr_validation.png", "../../logs/0-run/experiment_results/experiment_956f0e83389e41cc8c798f40e7520e7d_proc_11819/mapf_all_datasets_boxplot_comparison.png", "../../logs/0-run/experiment_results/experiment_956f0e83389e41cc8c798f40e7520e7d_proc_11819/mapf_all_datasets_improvement_summary.png", "../../logs/0-run/experiment_results/experiment_956f0e83389e41cc8c798f40e7520e7d_proc_11819/cma_three_datasets_results.png", "../../logs/0-run/experiment_results/experiment_956f0e83389e41cc8c798f40e7520e7d_proc_11819/multi_layout_results.png", "../../logs/0-run/experiment_results/experiment_956f0e83389e41cc8c798f40e7520e7d_proc_11819/mapf_all_datasets_conflict_comparison.png"], []], "plot_paths": [["experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/scaling_factor_tuning_results.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/n_warmup_tuning_results.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/mapf_scaling_tuning_heatmap.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/mapf_tuning_summary.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/mapf_makespan_comparison.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/mapf_improvement_by_scaling_factor.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/mapf_conflict_counts.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/multi_dataset_results.png"], [], [], [], [], [], [], ["experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_956f0e83389e41cc8c798f40e7520e7d_proc_11819/mapf_all_datasets_makespan_comparison.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_956f0e83389e41cc8c798f40e7520e7d_proc_11819/mapf_all_datasets_crr_validation.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_956f0e83389e41cc8c798f40e7520e7d_proc_11819/mapf_all_datasets_boxplot_comparison.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_956f0e83389e41cc8c798f40e7520e7d_proc_11819/mapf_all_datasets_improvement_summary.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_956f0e83389e41cc8c798f40e7520e7d_proc_11819/cma_three_datasets_results.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_956f0e83389e41cc8c798f40e7520e7d_proc_11819/multi_layout_results.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_956f0e83389e41cc8c798f40e7520e7d_proc_11819/mapf_all_datasets_conflict_comparison.png"], []], "plot_analyses": [[{"analysis": "The tuning sweep over penalty weight and scaling factor shows a real but moderate gain region rather than a sharp optimum. The best cell is around scaling factor 0.5 with penalty weight 3 or 5, reaching about 8.7% improvement, while low penalty with low scaling is clearly weaker at about 5.9%. This indicates CMA is sensitive to under-regularization but becomes fairly stable once the congestion penalty is strong enough. The line plot confirms that small scaling factors benefit most from increasing penalty weight, whereas larger scaling factors flatten around ~8.0\u20138.1%, suggesting saturation. The conflict memory map itself is highly structured, with several bright hotspots concentrated around a few rows/columns and intersections rather than diffuse noise; that supports the hypothesis that conflicts are topology-driven and learnable. In the final makespan trace, CMA lowers the mean from about 16.2 to 15.3, so the aggregate gain is consistent with the tuning heatmap, but the per-episode series shows some episodes with negligible gain or slight regressions. Overall, the method appears beneficial on average, but the payoff is concentrated in congestion-heavy cases rather than uniformly across all trials.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/scaling_factor_tuning_results.png"}, {"analysis": "The warmup study is negative across all tested settings: the makespan improvement ratio remains below zero for 50, 75, 100, and 150 warmup episodes, with the least harmful setting at 150. The grouped bars show CMA slightly worse than baseline at every warmup value, and the distribution panel indicates the degradation shrinks as warmup grows longer, from roughly -2.1% at 50/75 to around -0.3% at 150. This suggests the warmup procedure, as currently implemented, is likely populating conflict memory with low-quality or poorly calibrated signals early on, causing allocation costs to become biased before the memory is reliable. A practical takeaway is that warmup should not be a priority hyperparameter for this baseline_tuning stage unless paired with normalization, decay, or confidence weighting. If any warmup is kept, longer warmup is less damaging, but the evidence here argues that online updating or delayed activation may be preferable to explicit warmup.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/n_warmup_tuning_results.png"}, {"analysis": "This annotated heatmap makes the parameter landscape especially clear. Improvements are consistently positive across the full grid, roughly 5.9% to 8.7%, which is encouraging because it means CMA is not extremely brittle. The strongest region lies at penalty weight 3\u20135 with scaling factor 0.5, and there is another strong point at penalty weight 1 with scaling factor 3.0. Most of the grid collapses to a narrow 8.0\u20138.1% band, implying that many settings are near-equivalent and that the exact optimum may not be statistically distinguishable without multiple random seeds. For baseline tuning, this means a good default should prioritize robustness over the single best cell. Penalty weight 3 looks attractive because it matches the top result while avoiding unnecessarily large penalties, and the surrounding cells are also strong.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/mapf_scaling_tuning_heatmap.png"}, {"analysis": "The summary statistics report best penalty weight 3.0, best scaling factor 0.5, final improvement 5.54%, and assignment change rate 61.25%. The chosen best hyperparameters are consistent with the tuning heatmaps and line plots. The assignment change rate is substantial: CMA is materially altering more than half of assignments, so the improvement is not coming from a tiny correction on a few outliers but from a broad policy shift. At the same time, the final improvement of 5.54% is lower than the ~8.7% best heatmap cell, suggesting either distribution shift between the tuning set and final run, or that the summary metric is computed differently than the sweep metric. That gap is important for the paper: it indicates gains are real but may be optimistic when measured only on a single tuning grid. You should report both tuned peak and held-out/final performance explicitly.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/mapf_tuning_summary.png"}, {"analysis": "The per-episode makespan comparison again shows a mean reduction from 16.25 to 15.35, or about 5.5%, consistent with the summary figure. CMA tracks baseline closely on easy episodes but tends to clip some of the higher peaks, which is exactly what a congestion-aware allocation mechanism should do. The gain therefore seems to come more from reducing severe congestion events than from uniformly improving all instances. There are still episodes where CMA is worse, and a few late-run segments remain highly variable, so the method is not yet fully stable. For a strong paper narrative, this plot supports the claim that conflict memory mainly mitigates pathological bottlenecks rather than changing nominal cases.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/mapf_makespan_comparison.png"}, {"analysis": "The improvement-vs-penalty curves reinforce that the main hyperparameter interaction is between penalty strength and scaling factor. Scaling factor 0.5 responds the most dramatically, rising from about 5.9% to 8.7% as penalty increases, then plateauing. Scaling factor 1.0 shows a similar but slightly weaker pattern. Larger scaling factors, especially 5.0, are comparatively insensitive to penalty weight and hover near 8.0\u20138.1%, which may indicate over-smoothing or excessive diffusion of conflict costs so that the assignment matrix no longer reacts strongly to tuning. This plot argues for moderate conflict propagation with sufficiently strong penalties, rather than aggressive spreading. In baseline tuning, learning rate or update-rate adjustments should aim to preserve this sharp but stable sensitivity rather than flatten it further.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/mapf_improvement_by_scaling_factor.png"}, {"analysis": "The conflict-count histogram by episode suggests CMA changes the temporal distribution of conflicts rather than uniformly lowering them. Baseline has several large isolated spikes, including a very large spike around the low 70s, while CMA exhibits more medium-sized spikes in the later episodes. This pattern is consistent with CMA suppressing catastrophic congestion events but not necessarily minimizing raw conflict count episode-by-episode. Since the objective is makespan, that can still be acceptable: a few severe chokepoint conflicts may be more damaging than many smaller ones. However, it also implies conflict count alone is not an adequate proxy metric for success. For the paper, you should analyze conflict severity, conflict clustering, or delay induced per conflict, not just counts.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/mapf_conflict_counts.png"}, {"analysis": "The cross-layout generalization result is weak and currently challenges the stronger claims in the abstract. On warehouse, CMA underperforms baseline by about 3.83%; on dense_grid, it is also slightly worse at about -0.45%; only random_obstacles is marginally positive at about 0.29%, which is effectively neutral without uncertainty bars. The trajectory plots show close overlap between methods in all three environments, with no clear systematic advantage. This suggests the current histogram-style conflict memory may be overfitting to the tuning environment or failing to capture transferable topology-dependent structure. For publication-quality evidence, you need either environment-specific tuning, stronger normalization across layouts, or a representation that reasons over topology more explicitly. This is also where adding external datasets could help: evaluate on at least two additional grid/route-planning benchmarks from HuggingFace or other public sources with distinct bottleneck structures to test whether the learned congestion priors transfer or whether CMA must be retrained per map.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/multi_dataset_results.png"}], [], [], [], [], [], [], [], []], "vlm_feedback_summary": ["The plots show that CMA provides modest, credible gains on the main tuning\nsetup, with the strongest region around penalty weight 3 and scaling factor 0.5,\ngiving about 8.7% improvement in the sweep and about 5.5% mean reduction in the\nfinal run. Conflict memory maps display structured hotspots, supporting the\nhypothesis that conflicts are learnable and topology-driven. However, warmup\nhurts performance across all tested values, and cross-layout generalization is\ncurrently poor to negative, which weakens broad claims of transfer. The gains\nappear to come mainly from suppressing severe congestion spikes rather than\nuniformly reducing all conflicts or all episodes. Recommended next steps are:\nkeep the architecture fixed, center tuning on robust hyperparameters near\npenalty=3 and scaling=0.5, remove or redesign warmup, report held-out results\nseparately from tuning peaks, and add broader benchmark evaluation. For two new\ndatasets to test transfer while staying close to the planning/congestion theme,\nstrong candidates are benjamin-paine/maze-dataset and AIRI-\nInstitute/aij_multiagent_rl_scenarios (or another public multi-agent gridworld\nbenchmark on HuggingFace if that exact subset is unavailable), because they\nprovide diverse maze/grid topologies and multi-agent interaction structures\nrelevant to congestion generalization.", "[]", "[]", "[]", "[]", "[]", "[]", "[]", "[]"], "exec_time": [25.04641103744507, 14.342029333114624, 312.22860956192017, 1.7389695644378662, 328.08757877349854, 192.2766809463501, 31.319698333740234, 57.10245895385742, 1266.621108531952], "exec_time_feedback": ["", "", "", "", "", "", "", "", ""], "datasets_successfully_tested": [["[warehouse", "dense_grid", "random_obstacles]"], [], [], [], [], [], [], [], []], "plot_code": ["import matplotlib.pyplot as plt\nimport numpy as np\nimport os\n\nworking_dir = os.path.join(os.getcwd(), \"wo
