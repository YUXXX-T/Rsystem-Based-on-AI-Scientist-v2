inalg.norm(env.agent_positions[agent_idx] - np.array(t))\n                            for t in env.pending_tasks\n                        ]\n                        if distances:\n                            task_idx = np.argmin(distances)\n                            env.agent_targets[agent_idx] = env.pending_tasks.pop(\n                                task_idx\n                            )\n\n            # Get current state and future congestion\n            graph_data = state_to_graph(state, grid_size)\n\n            # Simulate a few steps to get actual congestion\n            env.step()\n            congestion = env.get_congestion_heatmap()\n\n            data_list.append(graph_data)\n            labels.append(torch.tensor(congestion, dtype=torch.float32))\n\n    print(f\"Generated {len(data_list)} samples\")\n    return data_list, labels\n\n\ndef train_congestion_model(model, data_list, labels, epochs=30, batch_size=32):\n    \"\"\"Train the congestion prediction model\"\"\"\n    model.to(device)\n    optimizer = torch.optim.Adam(model.parameters(), lr=0.001)\n    criterion = nn.MSELoss()\n\n    # Split into train/val\n    n = len(data_list)\n    indices = np.random.permutation(n)\n    train_idx = indices[: int(0.8 * n)]\n    val_idx = indices[int(0.8 * n) :]\n\n    print(\"Training congestion prediction model...\")\n\n    for epoch in range(epochs):\n        model.train()\n        train_losses = []\n\n        # Shuffle training data\n        np.random.shuffle(train_idx)\n\n        for i in range(0, len(train_idx), batch_size):\n            batch_idx = train_idx[i : i + batch_size]\n            batch_data = [data_list[j].to(device) for j in batch_idx]\n            batch_labels = torch.stack([labels[j] for j in batch_idx]).to(device)\n\n            batch = Batch.from_data_list(batch_data)\n\n            optimizer.zero_grad()\n            pred = model(batch)\n            loss = criterion(pred, batch_labels)\n            loss.backward()\n            optimizer.step()\n\n            train_losses.append(loss.item())\n\n        # Validation\n        model.eval()\n        val_losses = []\n        with torch.no_grad():\n            for i in range(0, len(val_idx), batch_size):\n                batch_idx = val_idx[i : i + batch_size]\n                batch_data = [data_list[j].to(device) for j in batch_idx]\n                batch_labels = torch.stack([labels[j] for j in batch_idx]).to(device)\n\n                batch = Batch.from_data_list(batch_data)\n                pred = model(batch)\n                loss = criterion(pred, batch_labels)\n                val_losses.append(loss.item())\n\n        train_loss = np.mean(train_losses)\n        val_loss = np.mean(val_losses)\n\n        experiment_data[\"training\"][\"losses\"][\"train\"].append(train_loss)\n        experiment_data[\"training\"][\"losses\"][\"val\"].append(val_loss)\n        experiment_data[\"training\"][\"epochs\"].append(epoch)\n\n        print(\n            f\"Epoch {epoch}: validation_loss = {val_loss:.4f}, train_loss = {train_loss:.4f}\"\n        )\n\n    return model\n\n\ndef distance_based_allocation(env):\n    \"\"\"Simple distance-based task allocation using Hungarian algorithm\"\"\"\n    free_agents = [i for i in range(env.n_agents) if env.agent_targets[i] is None]\n\n    if not free_agents or not env.pending_tasks:\n        return\n\n    n_assign = min(len(free_agents), len(env.pending_tasks))\n    cost_matrix = np.zeros((len(free_agents), len(env.pending_tasks)))\n\n    for i, agent_idx in enumerate(free_agents):\n        for j, task in enumerate(env.pending_tasks):\n            cost_matrix[i, j] = np.linalg.norm(\n                env.agent_positions[agent_idx] - np.array(task)\n            )\n\n    row_ind, col_ind = linear_sum_assignment(cost_matrix)\n\n    tasks_to_remove = []\n    for r, c in zip(row_ind, col_ind):\n        if c < len(env.pending_tasks):\n            env.agent_targets[free_agents[r]] = env.pending_tasks[c]\n            tasks_to_remove.append(c)\n\n    for idx in sorted(tasks_to_remove, reverse=True):\n        env.pending_tasks.pop(idx)\n\n\ndef congestion_aware_allocation(env, model, grid_size=20):\n    \"\"\"Congestion-aware task allocation using predicted heatmaps\"\"\"\n    free_agents = [i for i in range(env.n_agents) if env.agent_targets[i] is None]\n\n    if not free_agents or not env.pending_tasks:\n        return\n\n    # Get congestion prediction\n    state = env._get_state()\n    graph_data = state_to_graph(state, grid_size).to(device)\n\n    model.eval()\n    with torch.no_grad():\n        congestion_pred = model(graph_data).cpu().numpy()[0]\n\n    n_assign = min(len(free_agents), len(env.pending_tasks))\n    cost_matrix = np.zeros((len(free_agents), len(env.pending_tasks)))\n\n    for i, agent_idx in enumerate(free_agents):\n        for j, task in enumerate(env.pending_tasks):\n            # Base cost: distance\n            distance = np.linalg.norm(env.agent_positions[agent_idx] - np.array(task))\n\n            # Congestion penalty: sample along path\n            start = env.agent_positions[agent_idx]\n            end = np.array(task)\n            congestion_cost = 0\n            for t in np.linspace(0, 1, 5):\n                pos = start + t * (end - start)\n                x, y = int(np.clip(pos[0], 0, grid_size - 1)), int(\n                    np.clip(pos[1], 0, grid_size - 1)\n                )\n                congestion_cost += congestion_pred[x, y]\n\n            # Combined cost with congestion penalty\n            cost_matrix[i, j] = distance + 5.0 * congestion_cost\n\n    row_ind, col_ind = linear_sum_assignment(cost_matrix)\n\n    tasks_to_remove = []\n    for r, c in zip(row_ind, col_ind):\n        if c < len(env.pending_tasks):\n            env.agent_targets[free_agents[r]] = env.pending_tasks[c]\n            tasks_to_remove.append(c)\n\n    for idx in sorted(tasks_to_remove, reverse=True):\n        env.pending_tasks.pop(idx)\n\n\ndef evaluate_method(\n    method_fn, model=None, n_episodes=10, sim_time=500, grid_size=20, n_agents=20\n):\n    \"\"\"Evaluate a task allocation method\"\"\"\n    throughputs = []\n    completion_times = []\n\n    for ep in range(n_episodes):\n        env = WarehouseEnv(grid_size=grid_size, n_agents=n_agents)\n        total_completed = 0\n\n        for step in range(sim_time):\n            if step % 5 == 0:  # Allocate every 5 steps\n                if model is not None:\n                    method_fn(env, model, grid_size)\n                else:\n                    method_fn(env)\n\n            completed = env.step()\n            total_completed += completed\n\n        # Throughput: tasks per minute (assuming 10 steps = 1 minute)\n        throughput = total_completed / (sim_time / 10)\n        throughputs.append(throughput)\n        completion_times.append(total_completed)\n\n    return np.mean(throughputs), np.std(throughputs), throughputs\n\n\n# Main execution\nprint(\"=\" * 50)\nprint(\"CATA: Congestion-Aware Task Allocation\")\nprint(\"=\" * 50)\n\n# Parameters\nGRID_SIZE = 20\nN_AGENTS = 20\nN_TASKS = 30\n\n# Generate training data\ndata_list, labels = generate_training_data(\n    n_episodes=30, steps_per_episode=50, grid_size=GRID_SIZE, n_agents=N_AGENTS\n)\n\n# Create and train model\nmodel = CongestionGNN(grid_size=GRID_SIZE, hidden_dim=64)\nmodel = train_congestion_model(model, data_list, labels, epochs=20, batch_size=16)\n\n# Evaluation\nprint(\"\\n\" + \"=\" * 50)\nprint(\"Evaluating methods...\")\nprint(\"=\" * 50)\n\n# Evaluate distance-based allocation\nprint(\"\\nEvaluating distance-based allocation...\")\ndist_throughput, dist_std, dist_throughputs = evaluate_method(\n    distance_based_allocation,\n    model=None,\n    n_episodes=5,\n    sim_time=300,\n    grid_size=GRID_SIZE,\n    n_agents=N_AGENTS,\n)\nexperiment_data[\"evaluation\"][\"distance_based\"][\"throughput\"] = dist_throughputs\n\n# Evaluate congestion-aware allocation\nprint(\"Evaluating congestion-aware allocation...\")\ncata_throughput, cata_std, cata_throughputs = evaluate_method(\n    congestion_aware_allocation,\n    model=model,\n    n_episodes=5,\n    sim_time=300,\n    grid_size=GRID_SIZE,\n    n_agents=N_AGENTS,\n)\nexperiment_data[\"evaluation\"][\"congestion_aware\"][\"throughput\"] = cata_throughputs\n\n# Results\nprint(\"\\n\" + \"=\" * 50)\nprint(\"RESULTS\")\nprint(\"=\" * 50)\nprint(f\"Distance-based throughput: {dist_throughput:.2f} \u00b1 {dist_std:.2f} tasks/min\")\nprint(f\"Congestion-aware throughput: {cata_throughput:.2f} \u00b1 {cata_std:.2f} tasks/min\")\nimprovement = (cata_throughput - dist_throughput) / dist_throughput * 100\nprint(f\"Improvement: {improvement:.1f}%\")\nprint(f\"\\nthroughput_tasks_per_minute = {cata_throughput:.2f}\")\n\n# Save experiment data\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\n\n# Visualization\nfig, axes = plt.subplots(1, 3, figsize=(15, 4))\n\n# Training loss\naxes[0].plot(experiment_data[\"training\"][\"losses\"][\"train\"], label=\"Train\")\naxes[0].plot(experiment_data[\"training\"][\"losses\"][\"val\"], label=\"Validation\")\naxes[0].set_xlabel(\"Epoch\")\naxes[0].set_ylabel(\"Loss\")\naxes[0].set_title(\"Congestion Prediction Training\")\naxes[0].legend()\n\n# Throughput comparison\nmethods = [\"Distance-based\", \"CATA\"]\nthroughputs = [dist_throughput, cata_throughput]\nstds = [dist_std, cata_std]\naxes[1].bar(methods, throughputs, yerr=stds, capsize=5, color=[\"blue\", \"green\"])\naxes[1].set_ylabel(\"Throughput (tasks/min)\")\naxes[1].set_title(\"Throughput Comparison\")\n\n# Sample congestion heatmap\nenv = WarehouseEnv(grid_size=GRID_SIZE, n_agents=N_AGENTS)\nstate = env._get_state()\ngraph_data = state_to_graph(state, GRID_SIZE).to(device)\nmodel.eval()\nwith torch.no_grad():\n    pred_heatmap = model(graph_data).cpu().numpy()[0]\nim = axes[2].imshow(pred_heatmap, cmap=\"hot\", interpolation=\"nearest\")\naxes[2].scatter(\n    env.agent_positions[:, 1],\n    env.agent_positions[:, 0],\n    c=\"cyan\",\n    s=50,\n    marker=\"o\",\n    label=\"Agents\",\n)\nplt.colorbar(im, ax=axes[2])\naxes[2].set_title(\"Predicted Congestion Heatmap\")\naxes[2].legend()\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"cata_results.png\"), dpi=150)\nplt.close()\n\nprint(f\"\\nResults saved to {working_dir}\")\n", "import os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch_geometric.nn import GCNConv, global_mean_pool\nfrom torch_geometric.data import Data, DataLoader\nfrom scipy.optimize import linear_sum_assignment\nimport matplotlib.pyplot as plt\nfrom collections import defaultdict\nimport time\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n# Experiment data tracking\nexperiment_data = {\n    \"cata\": {\n        \"metrics\": {\"train\": [], \"val\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"throughput\": [],\n    },\n    \"baseline\": {\n        \"throughput\": [],\n    },\n}\n\n\n# Warehouse environment\nclass WarehouseEnv:\n    def __init__(self, grid_size=20, n_agents=25, seed=42):\n        np.random.seed(seed)\n        self.grid_size = grid_size\n        self.n_agents = n_agents\n        self.agent_positions = np.random.randint(0, grid_size, (n_agents, 2)).astype(\n            float\n        )\n        self.agent_velocities = np.zeros((n_agents, 2))\n        self.tasks = []\n        self.agent_tasks = [None] * n_agents\n        self.completed_tasks = 0\n        self.timestep = 0\n\n    def generate_tasks(self, n_tasks=30):\n        self.tasks = [np.random.randint(0, self.grid_size, 2) for _ in range(n_tasks)]\n\n    def get_congestion_heatmap(self, future_steps=5):\n        \"\"\"Compute ground truth congestion based on agent density\"\"\"\n        heatmap = np.zeros((self.grid_size, self.grid_size))\n        for i, pos in enumerate(self.agent_positions):\n            x, y = int(np.clip(pos[0], 0, self.grid_size - 1)), int(\n                np.clip(pos[1], 0, self.grid_size - 1)\n            )\n            # Add density around agent position\n            for dx in range(-2, 3):\n                for dy in range(-2, 3):\n                    nx, ny = x + dx, y + dy\n                    if 0 <= nx < self.grid_size and 0 <= ny < self.grid_size:\n                        weight = 1.0 / (1 + abs(dx) + abs(dy))\n                        heatmap[nx, ny] += weight\n        return heatmap / (heatmap.max() + 1e-6)\n\n    def step(self, speed=1.0):\n        \"\"\"Move agents toward their assigned tasks\"\"\"\n        self.timestep += 1\n        completed = 0\n        for i in range(self.n_agents):\n            if self.agent_tasks[i] is not None:\n                task_pos = self.tasks[self.agent_tasks[i]]\n                direction = task_pos - self.agent_positions[i]\n                dist = np.linalg.norm(direction)\n                if dist < 1.0:\n                    # Task completed\n                    completed += 1\n                    self.completed_tasks += 1\n                    self.agent_tasks[i] = None\n                else:\n                    # Move toward task\n                    self.agent_velocities[i] = direction / dist * speed\n                    self.agent_positions[i] += self.agent_velocities[i]\n        return completed\n\n\ndef manhattan_distance(pos1, pos2):\n    return abs(pos1[0] - pos2[0]) + abs(pos1[1] - pos2[1])\n\n\ndef compute_cost_matrix(env, congestion_heatmap=None, congestion_weight=2.0):\n    \"\"\"Compute cost matrix for task assignment\"\"\"\n    n_agents = env.n_agents\n    n_tasks = len(env.tasks)\n    cost_matrix = np.full((n_agents, n_tasks), 1e9)\n\n    for i in range(n_agents):\n        if env.agent_tasks[i] is not None:\n            continue\n        for j in range(n_tasks):\n            task_pos = env.tasks[j]\n            dist = manhattan_distance(env.agent_positions[i], task_pos)\n\n            if congestion_heatmap is not None:\n                # Add congestion penalty along path\n                path_congestion = 0\n                steps = max(1, int(dist))\n                for s in range(steps):\n                    t = s / steps\n                    px = int(\n                        np.clip(\n                            env.agent_positions[i][0] * (1 - t) + task_pos[0] * t,\n                            0,\n                            env.grid_size - 1,\n                        )\n                    )\n                    py = int(\n                        np.clip(\n                            env.agent_positions[i][1] * (1 - t) + task_pos[1] * t,\n                            0,\n                            env.grid_size - 1,\n                        )\n                    )\n                    path_congestion += congestion_heatmap[px, py]\n                dist += congestion_weight * path_congestion\n\n            cost_matrix[i, j] = dist\n    return cost_matrix\n\n\ndef hungarian_assignment(cost_matrix):\n    \"\"\"Use Hungarian algorithm for optimal assignment\"\"\"\n    row_ind, col_ind = linear_sum_assignment(cost_matrix)\n    assignments = {}\n    for i, j in zip(row_ind, col_ind):\n        if cost_matrix[i, j] < 1e8:\n            assignments[i] = j\n    return assignments\n\n\n# GNN for congestion prediction\nclass CongestionGNN(nn.Module):\n    def __init__(self, input_dim=4, hidden_dim=64, grid_size=20):\n        super().__init__()\n        self.grid_size = grid_size\n        self.node_encoder = nn.Linear(input_dim, hidden_dim)\n        self.conv1 = GCNConv(hidden_dim, hidden_dim)\n        self.conv2 = GCNConv(hidden_dim, hidden_dim)\n        self.decoder = nn.Sequential(\n            nn.Linear(hidden_dim, 128), nn.ReLU(), nn.Linear(128, grid_size * grid_size)\n        )\n\n    def forward(self, data):\n        x, edge_index, batch = data.x, data.edge_index, data.batch\n        x = F.relu(self.node_encoder(x))\n        x = F.relu(self.conv1(x, edge_index))\n        x = F.relu(self.conv2(x, edge_index))\n        x = global_mean_pool(x, batch)\n        heatmap = torch.sigmoid(self.decoder(x))\n        return heatmap.view(-1, self.grid_size, self.grid_size)\n\n\ndef create_graph_data(env):\n    \"\"\"Create PyG Data object from environment state\"\"\"\n    n_agents = env.n_agents\n    n_tasks = len(env.tasks)\n\n    # Node features: [x, y, vx, vy] for agents, [x, y, 0, 0] for tasks\n    node_features = []\n    for i in range(n_agents):\n        pos = env.agent_positions[i] / env.grid_size\n        vel = env.agent_velocities[i]\n        node_features.append([pos[0], pos[1], vel[0], vel[1]])\n    for task in env.tasks:\n        node_features.append([task[0] / env.grid_size, task[1] / env.grid_size, 0, 0])\n\n    x = torch.tensor(node_features, dtype=torch.float)\n\n    # Create edges: fully connected between agents, agents to nearby tasks\n    edges = []\n    for i in range(n_agents):\n        for j in range(n_agents):\n            if i != j:\n                edges.append([i, j])\n        for j in range(n_tasks):\n            dist = manhattan_distance(env.agent_positions[i], env.tasks[j])\n            if dist < env.grid_size / 2:\n                edges.append([i, n_agents + j])\n                edges.append([n_agents + j, i])\n\n    if len(edges) == 0:\n        edges = [[0, 1], [1, 0]]\n\n    edge_index = torch.tensor(edges, dtype=torch.long).t().contiguous()\n\n    return Data(x=x, edge_index=edge_index)\n\n\ndef generate_training_data(\n    n_episodes=100, steps_per_episode=50, grid_size=20, n_agents=25\n):\n    \"\"\"Generate training data by running baseline allocation\"\"\"\n    data_list = []\n    labels_list = []\n\n    for ep in range(n_episodes):\n        env = WarehouseEnv(grid_size=grid_size, n_agents=n_agents, seed=ep)\n        env.generate_tasks(n_tasks=35)\n\n        for step in range(steps_per_episode):\n            # Create graph data\n            graph_data = create_graph_data(env)\n\n            # Get congestion heatmap as label\n            heatmap = env.get_congestion_heatmap()\n\n            data_list.append(graph_data)\n            labels_list.append(torch.tensor(heatmap, dtype=torch.float))\n\n            # Run baseline assignment\n            cost_matrix = compute_cost_matrix(env)\n            assignments = hungarian_assignment(cost_matrix)\n            for agent_id, task_id in assignments.items():\n                if env.agent_tasks[agent_id] is None:\n                    env.agent_tasks[agent_id] = task_id\n\n            # Step environment\n            env.step()\n\n            # Regenerate tasks periodically\n            if step % 10 == 0:\n                env.generate_tasks(n_tasks=35)\n\n    return data_list, labels_list\n\n\ndef train_gnn(\n    model, train_data, train_labels, val_data, val_labels, epochs=30, batch_size=32\n):\n    \"\"\"Train the congestion prediction GNN\"\"\"\n    model = model.to(device)\n    optimizer = torch.optim.Adam(model.parameters(), lr=0.001)\n    criterion = nn.MSELoss()\n\n    # Create batches manually\n    n_train = len(train_data)\n    n_val = len(val_data)\n\n    for epoch in range(epochs):\n        model.train()\n        train_loss = 0\n        indices = np.random.permutation(n_train)\n\n        for i in range(0, n_train, batch_size):\n            batch_indices = indices[i : i + batch_size]\n            batch_data = [train_data[j].to(device) for j in batch_indices]\n            batch_labels = torch.stack([train_labels[j] for j in batch_indices]).to(\n                device\n            )\n\n            # Process each graph individually and average\n            preds = []\n            for data in batch_data:\n                data.batch = torch.zeros(\n                    data.x.size(0), dtype=torch.long, device=device\n                )\n                pred = model(data)\n                preds.append(pred)\n            preds = torch.cat(preds, dim=0)\n\n            loss = criterion(preds, batch_labels)\n            optimizer.zero_grad()\n            loss.backward()\n            optimizer.step()\n            train_loss += loss.item()\n\n        train_loss /= n_train // batch_size + 1\n\n        # Validation\n        model.eval()\n        val_loss = 0\n        with torch.no_grad():\n            for i in range(0, n_val, batch_size):\n                batch_data = [\n                    val_data[j].to(device) for j in range(i, min(i + batch_size, n_val))\n                ]\n                batch_labels = torch.stack(\n                    [val_labels[j] for j in range(i, min(i + batch_size, n_val))]\n                ).to(device)\n\n                preds = []\n                for data in batch_data:\n                    data.batch = torch.zeros(\n                        data.x.size(0), dtype=torch.long, device=device\n                    )\n                    pred = model(data)\n                    preds.append(pred)\n                preds = torch.cat(preds, dim=0)\n\n                val_loss += criterion(preds, batch_labels).item()\n\n        val_loss /= n_val // batch_size + 1\n\n        experiment_data[\"cata\"][\"losses\"][\"train\"].append(train_loss)\n        experiment_data[\"cata\"][\"losses\"][\"val\"].append(val_loss)\n\n        print(\n            f\"Epoch {epoch}: train_loss = {train_loss:.4f}, validation_loss = {val_loss:.4f}\"\n        )\n\n    return model\n\n\ndef run_simulation(env, model, use_congestion=True, max_steps=200):\n    \"\"\"Run simulation with either baseline or CATA allocation\"\"\"\n    model.eval()\n    total_completed = 0\n\n    for step in range(max_steps):\n        # Generate new tasks if needed\n        if len(env.tasks) < 20 or step % 20 == 0:\n            env.generate_tasks(n_tasks=35)\n\n        # Get congestion prediction\n        if use_congestion and model is not None:\n            with torch.no_grad():\n                graph_data = create_graph_data(env).to(device)\n                graph_data.batch = torch.zeros(\n                    graph_data.x.size(0), dtype=torch.long, device=device\n                )\n                predicted_heatmap = model(graph_data).cpu().numpy()[0]\n        else:\n            predicted_heatmap = None\n\n        # Compute cost matrix and assign tasks\n        cost_matrix = compute_cost_matrix(\n            env, predicted_heatmap if use_congestion else None\n        )\n        assignments = hungarian_assignment(cost_matrix)\n\n        for agent_id, task_id in assignments.items():\n            if env.agent_tasks[agent_id] is None:\n                env.agent_tasks[agent_id] = task_id\n\n        # Step environment\n        completed = env.step()\n        total_completed += completed\n\n    return total_completed, env.timestep\n\n\n# Main execution\nprint(\"Generating training data...\")\ndata_list, labels_list = generate_training_data(n_episodes=50, steps_per_episode=30)\n\n# Split into train/val\nn_total = len(data_list)\nn_train = int(0.8 * n_total)\ntrain_data, train_labels = data_list[:n_train], labels_list[:n_train]\nval_data, val_labels = data_list[n_train:], labels_list[n_train:]\n\nprint(f\"Training samples: {len(train_data)}, Validation samples: {len(val_data)}\")\n\n# Train model\nprint(\"\\nTraining GNN...\")\nmodel = CongestionGNN(input_dim=4, hidden_dim=64, grid_size=20)\nmodel = train_gnn(model, train_data, train_labels, val_data, val_labels, epochs=30)\n\n# Evaluation\nprint(\"\\n\" + \"=\" * 50)\nprint(\"Running evaluation simulations...\")\n\nn_eval_runs = 10\nbaseline_throughputs = []\ncata_throughputs = []\n\nfor run in range(n_eval_runs):\n    # Baseline (distance-only)\n    env_baseline = WarehouseEnv(grid_size=20, n_agents=25, seed=1000 + run)\n    env_baseline.generate_tasks(n_tasks=35)\n    completed_base, steps_base = run_simulation(\n        env_baseline, model, use_congestion=False\n    )\n    throughput_base = completed_base / (\n        steps_base / 60.0\n    )  # tasks per minute (assuming 1 step = 1 second)\n    baseline_throughputs.append(throughput_base)\n\n    # CATA (congestion-aware)\n    env_cata = WarehouseEnv(grid_size=20, n_agents=25, seed=1000 + run)\n    env_cata.generate_tasks(n_tasks=35)\n    completed_cata, steps_cata = run_simulation(env_cata, model, use_congestion=True)\n    throughput_cata = completed_cata / (steps_cata / 60.0)\n    cata_throughputs.append(throughput_cata)\n\n    print(\n        f\"Run {run+1}: Baseline={throughput_base:.2f} tasks/min, CATA={throughput_cata:.2f} tasks/min\"\n    )\n\nexperiment_data[\"baseline\"][\"throughput\"] = baseline_throughputs\nexperiment_data[\"cata\"][\"throughput\"] = cata_throughputs\n\navg_baseline = np.mean(baseline_throughputs)\navg_cata = np.mean(cata_throughputs)\nimprovement = (avg_cata - avg_baseline) / avg_baseline * 100\n\nprint(\"\\n\" + \"=\" * 50)\nprint(\"FINAL RESULTS:\")\nprint(\n    f\"Baseline throughput: {avg_baseline:.2f} \u00b1 {np.std(baseline_throughputs):.2f} tasks/min\"\n)\nprint(f\"CATA throughput: {avg_cata:.2f} \u00b1 {np.std(cata_throughputs):.2f} tasks/min\")\nprint(f\"Improvement: {improvement:.1f}%\")\nprint(f\"\\nthroughput_tasks_per_minute (CATA): {avg_cata:.4f}\")\n\n# Save experiment data\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\n\n# Visualization\nfig, axes = plt.subplots(1, 3, figsize=(15, 5))\n\n# Training loss\nax1 = axes[0]\nax1.plot(experiment_data[\"cata\"][\"losses\"][\"train\"], label=\"Train Loss\")\nax1.plot(experiment_data[\"cata\"][\"losses\"][\"val\"], label=\"Val Loss\")\nax1.set_xlabel(\"Epoch\")\nax1.set_ylabel(\"MSE Loss\")\nax1.set_title(\"GNN Training Loss\")\nax1.legend()\n\n# Throughput comparison\nax2 = axes[1]\nmethods = [\"Baseline\", \"CATA\"]\nmeans = [avg_baseline, avg_cata]\nstds = [np.std(baseline_throughputs), np.std(cata_throughputs)]\nax2.bar(methods, means, yerr=stds, capsize=5, color=[\"blue\", \"green\"])\nax2.set_ylabel(\"Tasks per Minute\")\nax2.set_title(\"Throughput Comparison\")\n\n# Sample congestion heatmap\nax3 = axes[2]\nenv_viz = WarehouseEnv(grid_size=20, n_agents=25, seed=42)\nenv_viz.generate_tasks(n_tasks=35)\nwith torch.no_grad():\n    graph_data = create_graph_data(env_viz).to(device)\n    graph_data.batch = torch.zeros(\n        graph_data.x.size(0), dtype=torch.long, device=device\n    )\n    pred_heatmap = model(graph_data).cpu().numpy()[0]\nim = ax3.imshow(pred_heatmap, cmap=\"hot\", origin=\"lower\")\nax3.scatter(\n    env_viz.agent_positions[:, 1],\n    env_viz.agent_positions[:, 0],\n    c=\"cyan\",\n    marker=\"o\",\n    s=50,\n    label=\"Agents\",\n)\nax3.set_title(\"Predicted Congestion Heatmap\")\nax3.legend()\nplt.colorbar(im, ax=ax3)\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"cata_results.png\"), dpi=150)\nplt.close()\n\nprint(f\"\\nPlots saved to {working_dir}/cata_results.png\")\nprint(f\"Experiment data saved to {working_dir}/experiment_data.npy\")\n", "import os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.optim as optim\nfrom scipy.optimize import linear_sum_assignment\nimport matplotlib.pyplot as plt\nfrom collections import defaultdict\nimport time\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n# Experiment data storage\nexperiment_data = {\n    \"training\": {\"losses\": {\"train\": [], \"val\": []}, \"epochs\": []},\n    \"evaluation\": {\n        \"distance_based\": {\"throughput\": []},\n        \"congestion_aware\": {\"throughput\": []},\n    },\n}\n\n\n# Simple Warehouse Simulator\nclass WarehouseSimulator:\n    def __init__(self, grid_size=20, n_agents=20, n_tasks=30):\n        self.grid_size = grid_size\n        self.n_agents = n_agents\n        self.n_tasks = n_tasks\n        self.reset()\n\n    def reset(self):\n        self.agent_positions = np.random.randint(0, self.grid_size, (self.n_agents, 2))\n        self.agent_velocities = np.zeros((self.n_agents, 2))\n        self.task_positions = np.random.randint(0, self.grid_size, (self.n_tasks, 2))\n        self.task_active = np.ones(self.n_tasks, dtype=bool)\n        self.agent_targets = [-1] * self.n_agents\n        self.time_step = 0\n        self.tasks_completed = 0\n        return self.get_state()\n\n    def get_state(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        task_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        for i, pos in enumerate(self.task_positions):\n            if self.task_active[i]:\n                task_grid[pos[0], pos[1]] += 1\n        return np.stack([agent_grid, task_grid], axis=0)\n\n    def compute_congestion(self, lookahead=5):\n        congestion = np.zeros((self.grid_size, self.grid_size))\n        for i, agent_pos in enumerate(self.agent_positions):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                target_pos = self.task_positions[target_idx]\n                path = self._get_path(agent_pos, target_pos)\n                for step, pos in enumerate(path[:lookahead]):\n                    congestion[pos[0], pos[1]] += 1.0 / (step + 1)\n        return congestion\n\n    def _get_path(self, start, end):\n        path = [tuple(start)]\n        current = np.array(start)\n        while not np.array_equal(current, end):\n            diff = end - current\n            if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                current[0] += np.sign(diff[0])\n            elif diff[1] != 0:\n                current[1] += np.sign(diff[1])\n            path.append(tuple(current))\n        return path\n\n    def assign_tasks(self, assignment):\n        for agent_idx, task_idx in assignment:\n            if task_idx >= 0 and self.task_active[task_idx]:\n                self.agent_targets[agent_idx] = task_idx\n\n    def step(self):\n        self.time_step += 1\n        for i in range(self.n_agents):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                target_pos = self.task_positions[target_idx]\n                diff = target_pos - self.agent_positions[i]\n                if np.sum(np.abs(diff)) <= 1:\n                    self.task_active[target_idx] = False\n                    self.tasks_completed += 1\n                    self.agent_targets[i] = -1\n                else:\n                    move = np.zeros(2, dtype=int)\n                    if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                        move[0] = np.sign(diff[0])\n                    elif diff[1] != 0:\n                        move[1] = np.sign(diff[1])\n                    self.agent_positions[i] = np.clip(\n                        self.agent_positions[i] + move, 0, self.grid_size - 1\n                    )\n                    self.agent_velocities[i] = move\n\n        # Spawn new tasks to replace completed ones\n        inactive_tasks = np.where(~self.task_active)[0]\n        for idx in inactive_tasks:\n            if np.random.random() < 0.3:\n                self.task_positions[idx] = np.random.randint(0, self.grid_size, 2)\n                self.task_active[idx] = True\n\n        return self.get_state()\n\n\n# Congestion Prediction Model (Simple CNN)\nclass CongestionPredictor(nn.Module):\n    def __init__(self, grid_size=20, hidden_dim=64):\n        super().__init__()\n        self.conv1 = nn.Conv2d(2, hidden_dim, 3, padding=1)\n        self.conv2 = nn.Conv2d(hidden_dim, hidden_dim, 3, padding=1)\n        self.conv3 = nn.Conv2d(hidden_dim, 1, 3, padding=1)\n        self.relu = nn.ReLU()\n\n    def forward(self, x):\n        x = self.relu(self.conv1(x))\n        x = self.relu(self.conv2(x))\n        x = torch.sigmoid(self.conv3(x))\n        return x\n\n\n# Data generation for training\ndef generate_training_data(n_samples=1000, grid_size=20, n_agents=20, n_tasks=30):\n    states = []\n    congestions = []\n\n    for _ in range(n_samples):\n        sim = WarehouseSimulator(grid_size, n_agents, n_tasks)\n        state = sim.get_state()\n\n        # Random assignment for generating congestion patterns\n        active_tasks = np.where(sim.task_active)[0]\n        assignment = []\n        for i in range(min(n_agents, len(active_tasks))):\n            assignment.append((i, active_tasks[i]))\n        sim.assign_tasks(assignment)\n\n        congestion = sim.compute_congestion(lookahead=5)\n        congestion = congestion / (congestion.max() + 1e-6)\n\n        states.append(state)\n        congestions.append(congestion)\n\n    return np.array(states), np.array(congestions)\n\n\n# Task assignment functions\ndef distance_based_assignment(agent_positions, task_positions, task_active):\n    n_agents = len(agent_positions)\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n\n    cost_matrix = np.zeros((n_agents, len(active_indices)))\n    for i, agent_pos in enumerate(agent_positions):\n        for j, task_idx in enumerate(active_indices):\n            cost_matrix[i, j] = np.sum(np.abs(agent_pos - task_positions[task_idx]))\n\n    row_ind, col_ind = linear_sum_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef congestion_aware_assignment(\n    agent_positions, task_positions, task_active, congestion_map, congestion_weight=2.0\n):\n    n_agents = len(agent_positions)\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n\n    cost_matrix = np.zeros((n_agents, len(active_indices)))\n    grid_size = congestion_map.shape[0]\n\n    for i, agent_pos in enumerate(agent_positions):\n        for j, task_idx in enumerate(active_indices):\n            task_pos = task_positions[task_idx]\n            distance = np.sum(np.abs(agent_pos - task_pos))\n\n            # Estimate path congestion cost\n            path_congestion = 0\n            current = agent_pos.copy()\n            while not np.array_equal(current, task_pos):\n                diff = task_pos - current\n                if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                    current[0] += np.sign(diff[0])\n                elif diff[1] != 0:\n                    current[1] += np.sign(diff[1])\n                current = np.clip(current, 0, grid_size - 1)\n                path_congestion += congestion_map[current[0], current[1]]\n\n            cost_matrix[i, j] = distance + congestion_weight * path_congestion\n\n    row_ind, col_ind = linear_sum_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\n# Training the congestion predictor\ndef train_predictor(\n    model,\n    train_states,\n    train_congestions,\n    val_states,\n    val_congestions,\n    epochs=50,\n    batch_size=32,\n):\n    model = model.to(device)\n    optimizer = optim.Adam(model.parameters(), lr=0.001)\n    criterion = nn.MSELoss()\n\n    train_states = torch.FloatTensor(train_states).to(device)\n    train_congestions = torch.FloatTensor(train_congestions).unsqueeze(1).to(device)\n    val_states = torch.FloatTensor(val_states).to(device)\n    val_congestions = torch.FloatTensor(val_congestions).unsqueeze(1).to(device)\n\n    n_train = len(train_states)\n\n    for epoch in range(epochs):\n        model.train()\n        perm = torch.randperm(n_train)\n        train_loss = 0\n        n_batches = 0\n\n        for i in range(0, n_train, batch_size):\n            idx = perm[i : i + batch_size]\n            batch_states = train_states[idx]\n            batch_targets = train_congestions[idx]\n\n            optimizer.zero_grad()\n            predictions = model(batch_states)\n            loss = criterion(predictions, batch_targets)\n ased\",\n    alpha=0.8,\n)\naxes[1].bar(\n    x + width / 2,\n    [r[1] for r in results[\"congestion_aware\"]],\n    width,\n    yerr=[r[2] for r in results[\"congestion_aware\"]],\n    label=\"CATA\",\n    alpha=0.8,\n)\naxes[1].set_xlabel(\"Number of Agents\")\naxes[1].set_ylabel(\"Throughput (tasks/min)\")\naxes[1].set_title(\"Throughput Comparison\")\naxes[1].set_xticks(x)\naxes[1].set_xticklabels(agent_counts)\naxes[1].legend()\n\n# Sample congestion prediction\nmodel.eval()\nsample_state = torch.FloatTensor(val_states[0:1]).to(device)\nwith torch.no_grad():\n    pred_congestion = model(sample_state).squeeze().cpu().numpy()\naxes[2].imshow(pred_congestion, cmap=\"hot\")\naxes[2].set_title(\"Sample Predicted Congestion Heatmap\")\naxes[2].colorbar = plt.colorbar(axes[2].images[0], ax=axes[2])\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"cata_baseline_results.png\"), dpi=150)\nplt.close()\n\n# Save experiment data\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(f\"\\nResults saved to {working_dir}\")\n", "import os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.optim as optim\nfrom scipy.optimize import linear_sum_assignment\nimport matplotlib.pyplot as plt\nfrom collections import defaultdict\nimport time\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n# Experiment data storage\nexperiment_data = {\n    \"distance_baseline\": {\"throughput\": [], \"completion_times\": []},\n    \"congestion_aware\": {\"throughput\": [], \"completion_times\": []},\n    \"training\": {\"losses\": {\"train\": [], \"val\": []}, \"epochs\": []},\n}\n\n\n# Simple Warehouse Simulator\nclass WarehouseSimulator:\n    def __init__(self, grid_size=20, num_agents=25, num_tasks=30):\n        self.grid_size = grid_size\n        self.num_agents = num_agents\n        self.num_tasks = num_tasks\n        self.reset()\n\n    def reset(self):\n        # Random agent positions\n        self.agent_positions = np.random.randint(\n            0, self.grid_size, (self.num_agents, 2)\n        )\n        # Random task positions (pickup locations)\n        self.task_positions = np.random.randint(0, self.grid_size, (self.num_tasks, 2))\n        self.task_active = np.ones(self.num_tasks, dtype=bool)\n        self.agent_targets = np.full(self.num_agents, -1)  # -1 means no task\n        self.agent_busy = np.zeros(self.num_agents, dtype=bool)\n        self.time_step = 0\n        self.tasks_completed = 0\n        self.completion_times = []\n        self.task_start_times = {}\n\n    def get_congestion_map(self):\n        \"\"\"Compute current congestion heatmap\"\"\"\n        congestion = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            x, y = pos\n            for dx in range(-2, 3):\n                for dy in range(-2, 3):\n                    nx, ny = x + dx, y + dy\n                    if 0 <= nx < self.grid_size and 0 <= ny < self.grid_size:\n                        dist = abs(dx) + abs(dy)\n                        congestion[nx, ny] += max(0, 3 - dist) / 3.0\n        return congestion\n\n    def manhattan_distance(self, pos1, pos2):\n        return abs(pos1[0] - pos2[0]) + abs(pos1[1] - pos2[1])\n\n    def step(self):\n        \"\"\"Simulate one time step\"\"\"\n        self.time_step += 1\n\n        for i in range(self.num_agents):\n            if self.agent_targets[i] >= 0:\n                target_pos = self.task_positions[self.agent_targets[i]]\n                # Move one step toward target\n                dx = np.sign(target_pos[0] - self.agent_positions[i, 0])\n                dy = np.sign(target_pos[1] - self.agent_positions[i, 1])\n\n                # Simple collision avoidance - check if next cell is occupied\n                new_x = self.agent_positions[i, 0] + dx\n                new_y = self.agent_positions[i, 1] + dy\n\n                occupied = False\n                for j in range(self.num_agents):\n                    if (\n                        i != j\n                        and self.agent_positions[j, 0] == new_x\n                        and self.agent_positions[j, 1] == new_y\n                    ):\n                        occupied = True\n                        break\n\n                if not occupied:\n                    self.agent_positions[i, 0] = new_x\n                    self.agent_positions[i, 1] = new_y\n\n                # Check if reached target\n                if self.manhattan_distance(self.agent_positions[i], target_pos) == 0:\n                    task_id = self.agent_targets[i]\n                    self.task_active[task_id] = False\n                    self.agent_targets[i] = -1\n                    self.agent_busy[i] = False\n                    self.tasks_completed += 1\n                    if task_id in self.task_start_times:\n                        self.completion_times.append(\n                            self.time_step - self.task_start_times[task_id]\n                        )\n\n    def assign_tasks(self, assignments):\n        \"\"\"Assign tasks to agents based on assignment list\"\"\"\n        for agent_id, task_id in assignments:\n            if (\n                task_id >= 0\n                and self.task_active[task_id]\n                and not self.agent_busy[agent_id]\n            ):\n                self.agent_targets[agent_id] = task_id\n                self.agent_busy[agent_id] = True\n                self.task_start_times[task_id] = self.time_step\n\n    def get_free_agents(self):\n        return np.where(~self.agent_busy)[0]\n\n    def get_active_tasks(self):\n        return np.where(self.task_active)[0]\n\n    def get_state_features(self):\n        \"\"\"Get flattened state for ML model\"\"\"\n        # Normalize positions\n        agent_pos_norm = self.agent_positions / self.grid_size\n        task_pos_norm = self.task_positions / self.grid_size\n        congestion = self.get_congestion_map() / self.num_agents\n\n        features = np.concatenate(\n            [\n                agent_pos_norm.flatten(),\n                self.agent_busy.astype(float),\n                task_pos_norm.flatten(),\n                self.task_active.astype(float),\n                congestion.flatten(),\n            ]\n        )\n        return features\n\n\n# Distance-based assignment (baseline)\ndef distance_based_assignment(sim):\n    free_agents = sim.get_free_agents()\n    active_tasks = sim.get_active_tasks()\n\n    if len(free_agents) == 0 or len(active_tasks) == 0:\n        return []\n\n    # Build cost matrix\n    cost_matrix = np.zeros((len(free_agents), len(active_tasks)))\n    for i, agent_id in enumerate(free_agents):\n        for j, task_id in enumerate(active_tasks):\n            cost_matrix[i, j] = sim.manhattan_distance(\n                sim.agent_positions[agent_id], sim.task_positions[task_id]\n            )\n\n    # Hungarian algorithm\n    row_ind, col_ind = linear_sum_assignment(cost_matrix)\n\n    assignments = []\n    for i, j in zip(row_ind, col_ind):\n        assignments.append((free_agents[i], active_tasks[j]))\n\n    return assignments\n\n\n# Congestion-aware assignment\ndef congestion_aware_assignment(sim, congestion_predictor=None, penalty_weight=2.0):\n    free_agents = sim.get_free_agents()\n    active_tasks = sim.get_active_tasks()\n\n    if len(free_agents) == 0 or len(active_tasks) == 0:\n        return []\n\n    congestion_map = sim.get_congestion_map()\n\n    # Build cost matrix with congestion penalty\n    cost_matrix = np.zeros((len(free_agents), len(active_tasks)))\n    for i, agent_id in enumerate(free_agents):\n        for j, task_id in enumerate(active_tasks):\n            dist = sim.manhattan_distance(\n                sim.agent_positions[agent_id], sim.task_positions[task_id]\n            )\n\n            # Estimate path congestion (simple: check intermediate points)\n            agent_pos = sim.agent_positions[agent_id]\n            task_pos = sim.task_positions[task_id]\n\n            path_congestion = 0\n            steps = max(\n                abs(task_pos[0] - agent_pos[0]), abs(task_pos[1] - agent_pos[1]), 1\n            )\n            for t in range(steps + 1):\n                alpha = t / steps\n                x = int(agent_pos[0] + alpha * (task_pos[0] - agent_pos[0]))\n                y = int(agent_pos[1] + alpha * (task_pos[1] - agent_pos[1]))\n                x = np.clip(x, 0, sim.grid_size - 1)\n                y = np.clip(y, 0, sim.grid_size - 1)\n                path_congestion += congestion_map[x, y]\n\n            path_congestion /= steps + 1\n            cost_matrix[i, j] = dist + penalty_weight * path_congestion\n\n    row_ind, col_ind = linear_sum_assignment(cost_matrix)\n\n    assignments = []\n    for i, j in zip(row_ind, col_ind):\n        assignments.append((free_agents[i], active_tasks[j]))\n\n    return assignments\n\n\n# Simple MLP for congestion prediction\nclass CongestionPredictor(nn.Module):\n    def __init__(self, input_size, grid_size, hidden_size=128):\n        super().__init__()\n        self.grid_size = grid_size\n        self.net = nn.Sequential(\n            nn.Linear(input_size, hidden_size),\n            nn.ReLU(),\n            nn.Linear(hidden_size, hidden_size),\n            nn.ReLU(),\n            nn.Linear(hidden_size, grid_size * grid_size),\n            nn.Sigmoid(),\n        )\n\n    def forward(self, x):\n        out = self.net(x)\n        return out.view(-1, self.grid_size, self.grid_size)\n\n\n# Generate training data\ndef generate_training_data(num_samples=500, grid_size=20, num_agents=25, num_tasks=30):\n    X_data = []\n    y_data = []\n\n    for _ in range(num_samples):\n        sim = WarehouseSimulator(grid_size, num_agents, num_tasks)\n\n        # Run for a few steps to get varied states\n        for _ in range(np.random.randint(1, 20)):\n            assignments = distance_based_assignment(sim)\n            sim.assign_tasks(assignments)\n            sim.step()\n\n        features = sim.get_state_features()\n        congestion = sim.get_congestion_map()\n\n        # Normalize congestion for training\n        congestion_norm = congestion / (congestion.max() + 1e-6)\n\n        X_data.append(features)\n        y_data.append(congestion_norm)\n\n    return np.array(X_data), np.array(y_data)\n\n\n# Train congestion predictor\ndef train_predictor(X_train, y_train, X_val, y_val, epochs=50):\n    input_size = X_train.shape[1]\n    grid_size = int(np.sqrt(y_train.shape[1] * y_train.shape[2]))\n\n    model = CongestionPredictor(input_size, grid_size).to(device)\n    optimizer = optim.Adam(model.parameters(), lr=0.001)\n    criterion = nn.MSELoss()\n\n    X_train_t = torch.FloatTensor(X_train).to(device)\n    y_train_t = torch.FloatTensor(y_train).to(device)\n    X_val_t = torch.FloatTensor(X_val).to(device)\n    y_val_t = torch.FloatTensor(y_val).to(device)\n\n    for epoch in range(epochs):\n        model.train()\n        optimizer.zero_grad()\n        pred = model(X_train_t)\n        loss = criterion(pred, y_train_t)\n        loss.backward()\n        optimizer.step()\n\n        model.eval()\n        with torch.no_grad():\n            val_pred = model(X_val_t)\n            val_loss = criterion(val_pred, y_val_t).item()\n\n        experiment_data[\"training\"][\"losses\"][\"train\"].append(loss.item())\n        experiment_data[\"training\"][\"losses\"][\"val\"].append(val_loss)\n        experiment_data[\"training\"][\"epochs\"].append(epoch)\n\n        if epoch % 10 == 0:\n            print(f\"Epoch {epoch}: validation_loss = {val_loss:.4f}\")\n\n    return model\n\n\n# Run simulation experiment\ndef run_experiment(assignment_func, sim, max_steps=500):\n    sim.reset()\n\n    for step in range(max_steps):\n        assignments = assignment_func(sim)\n        sim.assign_tasks(assignments)\n        sim.step()\n\n        # Respawn tasks if many completed\n        if np.sum(sim.task_active) < 5:\n            new_tasks = np.random.randint(0, sim.grid_size, (10, 2))\n            sim.task_positions = np.vstack([sim.task_positions, new_tasks])\n            sim.task_active = np.concatenate([sim.task_active, np.ones(10, dtype=bool)])\n            sim.num_tasks += 10\n\n    # Calculate throughput (tasks per minute, assuming 1 step = 1 second)\n    simulation_minutes = max_steps / 60.0\n    throughput = sim.tasks_completed / simulation_minutes\n\n    return throughput, sim.completion_times\n\n\n# Main experiment\nprint(\"Generating training data...\")\nX, y = generate_training_data(num_samples=500)\nsplit = int(0.8 * len(X))\nX_train, X_val = X[:split], X[split:]\ny_train, y_val = y[:split], y[split:]\n\nprint(f\"Training data shape: {X_train.shape}\")\nprint(f\"Target shape: {y_train.shape}\")\n\nprint(\"\\nTraining congestion predictor...\")\nmodel = train_predictor(X_train, y_train, X_val, y_val, epochs=50)\n\n# Run comparison experiments\nprint(\"\\n\" + \"=\" * 50)\nprint(\"Running experiments with different agent densities...\")\nprint(\"=\" * 50)\n\nagent_counts = [20, 30, 40, 50]\nresults = {\"distance\": [], \"congestion_aware\": []}\n\nfor num_agents in agent_counts:\n    print(f\"\\nTesting with {num_agents} agents...\")\n\n    sim = WarehouseSimulator(grid_size=20, num_agents=num_agents, num_tasks=40)\n\n    # Distance baseline\n    throughput_dist, times_dist = run_experiment(\n        distance_based_assignment, sim, max_steps=300\n    )\n    results[\"distance\"].append(throughput_dist)\n    experiment_data[\"distance_baseline\"][\"throughput\"].append(throughput_dist)\n    experiment_data[\"distance_baseline\"][\"completion_times\"].extend(times_dist)\n\n    # Congestion-aware\n    sim2 = WarehouseSimulator(grid_size=20, num_agents=num_agents, num_tasks=40)\n    throughput_cong, times_cong = run_experiment(\n        lambda s: congestion_aware_assignment(s, penalty_weight=3.0),\n        sim2,\n        max_steps=300,\n    )\n    results[\"congestion_aware\"].append(throughput_cong)\n    experiment_data[\"congestion_aware\"][\"throughput\"].append(throughput_cong)\n    experiment_data[\"congestion_aware\"][\"completion_times\"].extend(times_cong)\n\n    print(f\"  Distance-based throughput: {throughput_dist:.2f} tasks/min\")\n    print(f\"  Congestion-aware throughput: {throughput_cong:.2f} tasks/min\")\n    improvement = (throughput_cong - throughput_dist) / throughput_dist * 100\n    print(f\"  Improvement: {improvement:.1f}%\")\n\n# Final summary\nprint(\"\\n\" + \"=\" * 50)\nprint(\"FINAL RESULTS SUMMARY\")\nprint(\"=\" * 50)\nprint(f\"\\nAgent Counts: {agent_counts}\")\nprint(f\"Distance-based throughput (tasks/min): {results['distance']}\")\nprint(f\"Congestion-aware throughput (tasks/min): {results['congestion_aware']}\")\n\navg_dist = np.mean(results[\"distance\"])\navg_cong = np.mean(results[\"congestion_aware\"])\nprint(f\"\\nAverage throughput_tasks_per_minute (Distance): {avg_dist:.2f}\")\nprint(f\"Average throughput_tasks_per_minute (Congestion-aware): {avg_cong:.2f}\")\nprint(f\"Overall improvement: {(avg_cong - avg_dist) / avg_dist * 100:.1f}%\")\n\n# Save results\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\n\n# Visualization\nfig, axes = plt.subplots(1, 3, figsize=(15, 4))\n\n# Plot 1: Throughput comparison\naxes[0].bar(\n    np.arange(len(agent_counts)) - 0.15,\n    results[\"distance\"],\n    0.3,\n    label=\"Distance-based\",\n)\naxes[0].bar(\n    np.arange(len(agent_counts)) + 0.15,\n    results[\"congestion_aware\"],\n    0.3,\n    label=\"Congestion-aware\",\n)\naxes[0].set_xticks(np.arange(len(agent_counts)))\naxes[0].set_xticklabels(agent_counts)\naxes[0].set_xlabel(\"Number of Agents\")\naxes[0].set_ylabel(\"Throughput (tasks/min)\")\naxes[0].set_title(\"Throughput Comparison\")\naxes[0].legend()\n\n# Plot 2: Training loss\naxes[1].plot(\n    experiment_data[\"training\"][\"epochs\"],\n    experiment_data[\"training\"][\"losses\"][\"train\"],\n    label=\"Train\",\n)\naxes[1].plot(\n    experiment_data[\"training\"][\"epochs\"],\n    experiment_data[\"training\"][\"losses\"][\"val\"],\n    label=\"Validation\",\n)\naxes[1].set_xlabel(\"Epoch\")\naxes[1].set_ylabel(\"MSE Loss\")\naxes[1].set_title(\"Congestion Predictor Training\")\naxes[1].legend()\n\n# Plot 3: Sample congestion map\nsim_viz = WarehouseSimulator(grid_size=20, num_agents=30, num_tasks=30)\ncongestion_map = sim_viz.get_congestion_map()\nim = axes[2].imshow(congestion_map, cmap=\"hot\", interpolation=\"nearest\")\naxes[2].scatter(\n    sim_viz.agent_positions[:, 1],\n    sim_viz.agent_positions[:, 0],\n    c=\"blue\",\n    marker=\"o\",\n    s=30,\n    label=\"Agents\",\n)\naxes[2].scatter(\n    sim_viz.task_positions[:, 1],\n    sim_viz.task_positions[:, 0],\n    c=\"green\",\n    marker=\"x\",\n    s=30,\n    label=\"Tasks\",\n)\naxes[2].set_title(\"Sample Congestion Heatmap\")\naxes[2].legend(loc=\"upper right\")\nplt.colorbar(im, ax=axes[2])\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"cata_results.png\"), dpi=150)\nplt.close()\n\nprint(f\"\\nResults saved to {working_dir}\")\nprint(f\"Visualization saved to {os.path.join(working_dir, 'cata_results.png')}\")\n", "import os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom scipy.optimize import linear_sum_assignment\nimport matplotlib.pyplot as plt\nimport time\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\nexperiment_data = {\n    \"cata\": {\n        \"metrics\": {\"train\": [], \"val\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"throughput\": [],\n    },\n    \"baseline\": {\"throughput\": []},\n}\n\n\nclass WarehouseEnv:\n    def __init__(self, grid_size=20, n_agents=25, seed=42):\n        np.random.seed(seed)\n        self.grid_size = grid_size\n        self.n_agents = n_agents\n        self.agent_positions = np.random.randint(0, grid_size, (n_agents, 2)).astype(\n            float\n        )\n        self.agent_velocities = np.zeros((n_agents, 2))\n        self.tasks = []\n        self.agent_tasks = [None] * n_agents\n        self.completed_tasks = 0\n        self.timestep = 0\n\n    def generate_tasks(self, n_tasks=30):\n        self.tasks = [np.random.randint(0, self.grid_size, 2) for _ in range(n_tasks)]\n\n    def get_congestion_heatmap(self, future_steps=5):\n        heatmap = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            x, y = int(np.clip(pos[0], 0, self.grid_size - 1)), int(\n                np.clip(pos[1], 0, self.grid_size - 1)\n            )\n            for dx in range(-2, 3):\n                for dy in range(-2, 3):\n                    nx, ny = x + dx, y + dy\n                    if 0 <= nx < self.grid_size and 0 <= ny < self.grid_size:\n                        heatmap[nx, ny] += 1.0 / (1 + abs(dx) + abs(dy))\n        return heatmap / (heatmap.max() + 1e-6)\n\n    def step(self, speed=1.0):\n        self.timestep += 1\n        completed = 0\n        for i in range(self.n_agents):\n            if self.agent_tasks[i] is not None:\n                task_pos = self.tasks[self.agent_tasks[i]]\n                direction = task_pos - self.agent_positions[i]\n                dist = np.linalg.norm(direction)\n                if dist < 1.0:\n                    completed += 1\n                    self.completed_tasks += 1\n                    self.agent_tasks[i] = None\n                else:\n                    self.agent_velocities[i] = direction / dist * speed\n                    self.agent_positions[i] += self.agent_velocities[i]\n        return completed\n\n\ndef manhattan_distance(pos1, pos2):\n    return abs(pos1[0] - pos2[0]) + abs(pos1[1] - pos2[1])\n\n\ndef compute_cost_matrix(env, congestion_heatmap=None, congestion_weight=2.0):\n    n_agents, n_tasks = env.n_agents, len(env.tasks)\n    cost_matrix = np.full((n_agents, n_tasks), 1e9)\n    for i in range(n_agents):\n        if env.agent_tasks[i] is not None:\n            continue\n        for j in range(n_tasks):\n            task_pos = env.tasks[j]\n            dist = manhattan_distance(env.agent_positions[i], task_pos)\n            if congestion_heatmap is not None:\n                path_congestion = 0\n                steps = max(1, int(dist))\n                for s in range(steps):\n                    t = s / steps\n                    px = int(\n                        np.clip(\n                            env.agent_positions[i][0] * (1 - t) + task_pos[0] * t,\n                            0,\n                            env.grid_size - 1,\n                        )\n                    )\n                    py = int(\n                        np.clip(\n                            env.agent_positions[i][1] * (1 - t) + task_pos[1] * t,\n                            0,\n                            env.grid_size - 1,\n                        )\n                    )\n                    path_congestion += congestion_heatmap[px, py]\n                dist += congestion_weight * path_congestion\n            cost_matrix[i, j] = dist\n    return cost_matrix\n\n\ndef hungarian_assignment(cost_matrix):\n    row_ind, col_ind = linear_sum_assignment(cost_matrix)\n    return {i: j for i, j in zip(row_ind, col_ind) if cost_matrix[i, j] < 1e8}\n\n\nclass SimpleGCNLayer(nn.Module):\n    def __init__(self, in_dim, out_dim):\n        super().__init__()\n        self.linear = nn.Linear(in_dim, out_dim)\n\n    def forward(self, x, adj):\n        # Simple graph conv: A @ X @ W\n        return self.linear(torch.matmul(adj, x))\n\n\nclass CongestionGNN(nn.Module):\n    def __init__(self, input_dim=4, hidden_dim=64, grid_size=20):\n        super().__init__()\n        self.grid_size = grid_size\n        self.node_encoder = nn.Linear(input_dim, hidden_dim)\n        self.conv1 = SimpleGCNLayer(hidden_dim, hidden_dim)\n        self.conv2 = SimpleGCNLayer(hidden_dim, hidden_dim)\n        self.decoder = nn.Sequential(\n            nn.Linear(hidden_dim, 128), nn.ReLU(), nn.Linear(128, grid_size * grid_size)\n        )\n\n    def forward(self, x, adj):\n        x = F.relu(self.node_encoder(x))\n        x = F.relu(self.conv1(x, adj))\n        x = F.relu(self.conv2(x, adj))\n        x = x.mean(dim=0)  # Global mean pooling\n        heatmap = torch.sigmoid(self.decoder(x))\n        return heatmap.view(self.grid_size, self.grid_size)\n\n\ndef create_graph_data(env):\n    n_agents, n_tasks = env.n_agents, len(env.tasks)\n    n_nodes = n_agents + n_tasks\n    node_features = []\n    for i in range(n_agents):\n        pos = env.agent_positions[i] / env.grid_size\n        vel = env.agent_velocities[i]\n        node_features.append([pos[0], pos[1], vel[0], vel[1]])\n    for task in env.tasks:\n        node_features.append([task[0] / env.grid_size, task[1] / env.grid_size, 0, 0])\n    x = torch.tensor(node_features, dtype=torch.float)\n\n    adj = torch.zeros((n_nodes, n_nodes))\n    for i in range(n_agents):\n        for j in range(n_agents):\n            if i != j:\n                adj[i, j] = 1\n        for j in range(n_tasks):\n            dist = manhattan_distance(env.agent_positions[i], env.tasks[j])\n            if dist < env.grid_size / 2:\n                adj[i, n_agents + j] = 1\n                adj[n_agents + j, i] = 1\n    adj = adj + torch.eye(n_nodes)\n    deg = adj.sum(dim=1, keepdim=True).clamp(min=1)\n    adj = adj / deg\n    return x, adj\n\n\ndef generate_training_data(\n    n_episodes=50, steps_per_episode=30, grid_size=20, n_agents=25\n):\n    data_list, labels_list = [], []\n    for ep in range(n_episodes):\n        env = WarehouseEnv(grid_size=grid_size, n_agents=n_agents, seed=ep)\n        env.generate_tasks(n_tasks=35)\n        for step in range(steps_per_episode):\n            x, adj = create_graph_data(env)\n            heatmap = env.get_congestion_heatmap()\n            data_list.append((x, adj))\n            labels_list.append(torch.tensor(heatmap, dtype=torch.float))\n            cost_matrix = compute_cost_matrix(env)\n            assignments = hungarian_assignment(cost_matrix)\n            for agent_id, task_id in assignments.items():\n                if env.agent_tasks[agent_id] is None:\n                    env.agent_tasks[agent_id] = task_id\n            env.step()\n            if step % 10 == 0:\n                env.generate_tasks(n_tasks=35)\n    return data_list, labels_list\n\n\ndef train_gnn(model, train_data, train_labels, val_data, val_labels, epochs=30):\n    model = model.to(device)\n    optimizer = torch.optim.Adam(model.parameters(), lr=0.001)\n    criterion = nn.MSELoss()\n    n_train, n_val = len(train_data), len(val_data)\n\n    for epoch in range(epochs):\n        model.train()\n        train_loss = 0\n        indices = np.random.permutation(n_train)\n        for idx in indices:\n            x, adj = train_data[idx]\n            x, adj = x.to(device), adj.to(device)\n            label = train_labels[idx].to(device)\n            pred = model(x, adj)\n            loss = criterion(pred, label)\n            optimizer.zero_grad()\n            loss.backward()\n            optimizer.step()\n            train_loss += loss.item()\n        train_loss /= n_train\n\n        model.eval()\n        val_loss = 0\n        with torch.no_grad():\n            for idx in range(n_val):\n                x, adj = val_data[idx]\n                x, adj = x.to(device), adj.to(device)\n                label = val_labels[idx].to(device)\n                pred = model(x, adj)\n                val_loss += criterion(pred, label).item()\n        val_loss /= n_val\n\n        experiment_data[\"cata\"][\"losses\"][\"train\"].append(train_loss)\n        experiment_data[\"cata\"][\"losses\"][\"val\"].append(val_loss)\n        print(\n            f\"Epoch {epoch}: train_loss = {train_loss:.4f}, validation_loss = {val_loss:.4f}\"\n        )\n    return model\n\n\ndef run_simulation(env, model, use_congestion=True, max_steps=200):\n    model.eval()\n    total_completed = 0\n    for step in range(max_steps):\n        if len(env.tasks) < 20 or step % 20 == 0:\n            env.generate_tasks(n_tasks=35)\n        if use_congestion and model is not None:\n            with torch.no_grad():\n                x, adj = create_graph_data(env)\n                x, adj = x.to(device), adj.to(device)\n                predicted_heatmap = model(x, adj).cpu().numpy()\n        else:\n            predicted_heatmap = None\n        cost_matrix = compute_cost_matrix(\n            env, predicted_heatmap if use_congestion else None\n        )\n        assignments = hungarian_assignment(cost_matrix)\n        for agent_id, task_id in assignments.items():\n            if env.agent_tasks[agent_id] is None:\n                env.agent_tasks[agent_id] = task_id\n        total_completed += env.step()\n    return total_completed, env.timestep\n\n\nprint(\"Generating training data...\")\ndata_list, labels_list = generate_training_data(n_episodes=50, steps_per_episode=30)\nn_train = int(0.8 * len(data_list))\ntrain_data, train_labels = data_list[:n_train], labels_list[:n_train]\nval_data, val_labels = data_list[n_train:], labels_list[n_train:]\nprint(f\"Training samples: {len(train_data)}, Validation samples: {len(val_data)}\")\n\nprint(\"\\nTraining GNN...\")\nmodel = CongestionGNN(input_dim=4, hidden_dim=64, grid_size=20)\nmodel = train_gnn(model, train_data, train_labels, val_data, val_labels, epochs=30)\n\nprint(\"\\n\" + \"=\" * 50 + \"\\nRunning evaluation simulations...\")\nbaseline_throughputs, cata_throughputs = [], []\nfor run in range(10):\n    env_base = WarehouseEnv(grid_size=20, n_agents=25, seed=1000 + run)\n    env_base.generate_tasks(n_tasks=35)\n    completed_base, steps_base = run_simulation(env_base, model, use_congestion=False)\n    throughput_base = completed_base / (steps_base / 60.0)\n    baseline_throughputs.append(throughput_base)\n\n    env_cata = WarehouseEnv(grid_size=20, n_agents=25, seed=1000 + run)\n    env_cata.generate_tasks(n_tasks=35)\n    completed_cata, steps_cata = run_simulation(env_cata, model, use_congestion=True)\n    throughput_cata = completed_cata / (steps_cata / 60.0)\n    cata_throughputs.append(throughput_cata)\n    print(\n        f\"Run {run+1}: Baseline={throughput_base:.2f}, CATA={throughput_cata:.2f} tasks/min\"\n    )\n\nexperiment_data[\"baseline\"][\"throughput\"] = baseline_throughputs\nexperiment_data[\"cata\"][\"throughput\"] = cata_throughputs\navg_baseline, avg_cata = np.mean(baseline_throughputs), np.mean(cata_throughputs)\nimprovement = (avg_cata - avg_baseline) / avg_baseline * 100\n\nprint(\"\\n\" + \"=\" * 50 + \"\\nFINAL RESULTS:\")\nprint(\n    f\"Baseline throughput: {avg_baseline:.2f} \u00b1 {np.std(baseline_throughputs):.2f} tasks/min\"\n)\nprint(f\"CATA throughput: {avg_cata:.2f} \u00b1 {np.std(cata_throughputs):.2f} tasks/min\")\nprint(f\"Improvement: {improvement:.1f}%\")\nprint(f\"\\nthroughput_tasks_per_minute (CATA): {avg_cata:.4f}\")\n\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\n\nfig, axes = plt.subplots(1, 3, figsize=(15, 5))\naxes[0].plot(experiment_data[\"cata\"][\"losses\"][\"train\"], label=\"Train\")\naxes[0].plot(experiment_data[\"cata\"][\"losses\"][\"val\"], label=\"Val\")\naxes[0].set_xlabel(\"Epoch\")\naxes[0].set_ylabel(\"MSE Loss\")\naxes[0].set_title(\"GNN Training Loss\")\naxes[0].legend()\n\naxes[1].bar(\n    [\"Baseline\", \"CATA\"],\n    [avg_baseline, avg_cata],\n    yerr=[np.std(baseline_throughputs), np.std(cata_throughputs)],\n    capsize=5,\n    color=[\"blue\", \"green\"],\n)\naxes[1].set_ylabel(\"Tasks per Minute\")\naxes[1].set_title(\"Throughput Comparison\")\n\nenv_viz = WarehouseEnv(grid_size=20, n_agents=25, seed=42)\nenv_viz.generate_tasks(n_tasks=35)\nwith torch.no_grad():\n    x, adj = create_graph_data(env_viz)\n    pred_heatmap = model(x.to(device), adj.to(device)).cpu().numpy()\nim = axes[2].imshow(pred_heatmap, cmap=\"hot\", origin=\"lower\")\naxes[2].scatter(\n    env_viz.agent_positions[:, 1],\n    env_viz.agent_positions[:, 0],\n    c=\"cyan\",\n    marker=\"o\",\n    s=50,\n    label=\"Agents\",\n)\naxes[2].set_title(\"Predicted Congestion Heatmap\")\naxes[2].legend()\nplt.colorbar(im, ax=axes[2])\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"cata_results.png\"), dpi=150)\nplt.close()\nprint(f\"\\nPlots saved to {working_dir}/cata_results.png\")\n", "import os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.optim as optim\nfrom scipy.optimize import linear_sum_assignment\nimport matplotlib.pyplot as plt\nfrom collections import defaultdict\nimport time\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n# Experiment data storage\nexperiment_data = {\n    \"congestion_predictor\": {\"losses\": {\"train\": [], \"val\": []}, \"epochs\": []},\n    \"simulation_results\": {\n        \"distance_based\": {\"throughput\": [], \"agent_counts\": []},\n        \"congestion_aware\": {\"throughput\": [], \"agent_counts\": []},\n    },\n}\n\n\n# Simple Warehouse Simulator\nclass WarehouseSimulator:\n    def __init__(self, grid_size=20, num_agents=20, num_tasks=30):\n        self.grid_size = grid_size\n        self.num_agents = num_agents\n        self.num_tasks = num_tasks\n        self.reset()\n\n    def reset(self):\n        # Random agent positions\n        self.agent_positions = []\n        for _ in range(self.num_agents):\n            pos = (\n                np.random.randint(0, self.grid_size),\n                np.random.randint(0, self.grid_size),\n            )\n            self.agent_positions.append(list(pos))\n\n        # Random task locations\n        self.tasks = []\n        for _ in range(self.num_tasks):\n            pos = (\n                np.random.randint(0, self.grid_size),\n                np.random.randint(0, self.grid_size),\n            )\n            self.tasks.append(pos)\n\n        self.agent_targets = [None] * self.num_agents\n        self.completed_tasks = 0\n        self.timestep = 0\n        self.congestion_history = []\n\n    def get_state_grid(self):\n        \"\"\"Return grid encoding: channel 0 = agents, channel 1 = tasks\"\"\"\n        grid = np.zeros((2, self.grid_size, self.grid_size), dtype=np.float32)\n        for pos in self.agent_positions:\n            grid[0, int(pos[0]), int(pos[1])] += 1\n        for task in self.tasks:\n            grid[1, task[0], task[1]] += 1\n        return grid\n\n    def get_congestion_map(self):\n        \"\"\"Compute current congestion (agent density)\"\"\"\n        congestion = np.zeros((self.grid_size, self.grid_size), dtype=np.float32)\n        for pos in self.agent_positions:\n            x, y = int(pos[0]), int(pos[1])\n            for dx in range(-2, 3):\n                for dy in range(-2, 3):\n                    nx, ny = x + dx, y + dy\n                    if 0 <= nx < self.grid_size and 0 <= ny < self.grid_size:\n                        dist = abs(dx) + abs(dy)\n                        congestion[nx, ny] += 1.0 / (1 + dist)\n        return congestion / max(1, self.num_agents)\n\n    def manhattan_distance(self, pos1, pos2):\n        return abs(pos1[0] - pos2[0]) + abs(pos1[1] - pos2[1])\n\n    def assign_tasks_distance(self):\n        \"\"\"Hungarian assignment based on distance only\"\"\"\n        if not self.tasks:\n            return\n\n        free_agents = [\n            i for i in range(self.num_agents) if self.agent_targets[i] is None\n        ]\n        if not free_agents:\n            return\n\n        n_assign = min(len(free_agents), len(self.tasks))\n        cost_matrix = np.zeros((len(free_agents), len(self.tasks)))\n\n        for i, agent_idx in enumerate(free_agents):\n            for j, task in enumerate(self.tasks):\n                cost_matrix[i, j] = self.manhattan_distance(\n                    self.agent_positions[agent_idx], task\n                )\n\n        row_ind, col_ind = linear_sum_assignment(cost_matrix)\n\n        for i, j in zip(row_ind[:n_assign], col_ind[:n_assign]):\n            self.agent_targets[free_agents[i]] = self.tasks[j]\n\n    def assign_tasks_congestion_aware(self, congestion_map):\n        \"\"\"Hungarian assignment with congestion penalty\"\"\"\n        if not self.tasks:\n            return\n\n        free_agents = [\n            i for i in range(self.num_agents) if self.agent_targets[i] is None\n        ]\n        if not free_agents:\n            return\n\n        n_assign = min(len(free_agents), len(self.tasks))\n        cost_matrix = np.zeros((len(free_agents), len(self.tasks)))\n\n        for i, agent_idx in enumerate(free_agents):\n            for j, task in enumerate(self.tasks):\n                dist = self.manhattan_distance(self.agent_positions[agent_idx], task)\n                # Estimate path congestion\n                path_congestion = self._estimate_path_congestion(\n                    self.agent_positions[agent_idx], task, congestion_map\n                )\n                cost_matrix[i, j] = dist + 5.0 * path_congestion\n\n        row_ind, col_ind = linear_sum_assignment(cost_matrix)\n\n        for i, j in zip(row_ind[:n_assign], col_ind[:n_assign]):\n            self.agent_targets[free_agents[i]] = self.tasks[j]\n\n    def _estimate_path_congestion(self, start, end, congestion_map):\n        \"\"\"Simple path congestion estimate using line sampling\"\"\"\n        steps = max(abs(end[0] - start[0]), abs(end[1] - start[1]), 1)\n        total_congestion = 0\n        for t in range(steps + 1):\n            x = int(start[0] + (end[0] - start[0]) * t / steps)\n            y = int(start[1] + (end[1] - start[1]) * t / steps)\n            x = max(0, min(self.grid_size - 1, x))\n            y = max(0, min(self.grid_size - 1, y))\n            total_congestion += congestion_map[x, y]\n        return total_congestion / (steps + 1)\n\n    def step(self):\n        \"\"\"Move agents toward targets, handle task completion\"\"\"\n        self.timestep += 1\n\n        for i in range(self.num_agents):\n            if self.agent_targets[i] is None:\n                continue\n\n            target = self.agent_targets[i]\n            pos = self.agent_positions[i]\n\n            # Move one step toward target\n            dx = np.sign(target[0] - pos[0])\n            dy = np.sign(target[1] - pos[1])\n\n            if dx != 0:\n                pos[0] += dx\n            elif dy != 0:\n                pos[1] += dy\n\n            # Check task completion\n            if pos[0] == target[0] and pos[1] == target[1]:\n                if target in self.tasks:\n                    self.tasks.remove(target)\n                    self.completed_tasks += 1\n                self.agent_targets[i] = None\n\n        # Add new tasks to maintain task count\n        while len(self.tasks) < self.num_tasks // 2:\n            pos = (\n                np.random.randint(0, self.grid_size),\n                np.random.randint(0, self.grid_size),\n            )\n            self.tasks.append(pos)\n\n        self.congestion_history.append(self.get_congestion_map())\n\n        return self.completed_tasks\n\n\n# CNN-based Congestion Predictor\nclass CongestionPredictor(nn.Module):\n    def __init__(self, grid_size=20, prediction_horizon=5):\n        super().__init__()\n        self.grid_size = grid_size\n        self.prediction_horizon = prediction_horizon\n\n        self.encoder = nn.Sequential(\n            nn.Conv2d(2, 32, 3, padding=1),\n            nn.ReLU(),\n            nn.Conv2d(32, 64, 3, padding=1),\n            nn.ReLU(),\n            nn.Conv2d(64, 64, 3, padding=1),\n            nn.ReLU(),\n        )\n\n        self.decoder = nn.Sequential(\n            nn.Conv2d(64, 32, 3, padding=1),\n            nn.ReLU(),\n            nn.Conv2d(32, 1, 3, padding=1),\n            nn.Sigmoid(),\n        )\n\n    def forward(self, x):\n        # x: (batch, 2, grid_size, grid_size)\n        features = self.encoder(x)\n        congestion = self.decoder(features)\n        return congestion.squeeze(1)  # (batch, grid_size, grid_size)\n\n\ndef generate_training_data(\n    num_episodes=50, episode_length=100, grid_size=20, num_agents=20\n):\n    \"\"\"Generate training data from simulation rollouts\"\"\"\n    inputs = []\n    targets = []\n\n    sim = WarehouseSimulator(grid_size=grid_size, num_agents=num_agents)\n\n    for ep in range(num_episodes):\n        sim.reset()\n\n        for t in range(episode_length):\n            state = sim.get_state_grid()\n            sim.assign_tasks_distance()\n\n            # Run for prediction_horizon steps to get future congestion\n            future_congestion = np.zeros((grid_size, grid_size), dtype=np.float32)\n            for _ in range(5):\n                sim.step()\n                future_congestion += sim.get_congestion_map()\n            future_congestion /= 5\n\n            inputs.append(state)\n            targets.append(future_congestion)\n\n            # Re-assign if needed\n            sim.assign_tasks_distance()\n\n    return np.array(inputs), np.array(targets)\n\n\ndef train_predictor(\n    model, train_inputs, train_targets, val_inputs, val_targets, epochs=30\n):\n    \"\"\"Train the congestion predictor\"\"\"\n    model = model.to(device)\n    optimizer = optim.Adam(model.parameters(), lr=0.001)\n    criterion = nn.MSELoss()\n\n    # Normalize inputs\n    train_inputs = torch.FloatTensor(train_inputs).to(device)\n    train_targets = torch.FloatTensor(train_targets).to(device)\n    val_inputs = torch.FloatTensor(val_inputs).to(device)\n    val_targets = torch.FloatTensor(val_targets).to(device)\n\n    # Normalize\n    input_mean = train_inputs.mean()\n    input_std = train_inputs.std() + 1e-6\n    train_inputs = (train_inputs - input_mean) / input_std\n    val_inputs = (val_inputs - input_mean) / input_std\n\n    batch_size = 64\n\n    for epoch in range(epochs):\n        model.train()\n        total_loss = 0\n        num_batches = 0\n\n        indices = torch.randperm(len(train_inputs))\n        for i in range(0, len(train_inputs), batch_size):\n            batch_idx = indices[i : i + batch_size]\n            batch_x = train_inputs[batch_idx]\n            batch_y = train_targets[batch_idx]\n\n            optimizer.zero_grad()\n            pred = model(batch_x)\n            loss = criterion(pred, batch_y)\n            loss.backward()\n            optimizer.step()\n\n            total_loss += loss.item()\n            num_batches += 1\n\n        train_loss = total_loss / num_batches\n\n        # Validation\n        model.eval()\n        with torch.no_grad():\n            val_pred = model(val_inputs)\n            val_loss = criterion(val_pred, val_targets).item()\n\n        experiment_data[\"congestion_predictor\"][\"losses\"][\"train\"].append(train_loss)\n        experiment_data[\"congestion_predictor\"][\"losses\"][\"val\"].append(val_loss)\n        experiment_data[\"congestion_predictor\"][\"epochs\"].append(epoch)\n\n        print(\n            f\"Epoch {epoch}: validation_loss = {val_loss:.4f}, train_loss = {train_loss:.4f}\"\n        )\n\n    return model, input_mean.cpu().numpy(), input_std.cpu().numpy()\n\n\ndef run_simulation(\n    num_agents,\n    mode=\"distance\",\n    predictor=None,\n    input_mean=0,\n    input_std=1,\n    grid_size=20,\n    sim_time=200,\n):\n    \"\"\"Run simulation and measure throughput\"\"\"\n    sim = WarehouseSimulator(grid_size=grid_size, num_agents=num_agents)\n\n    for t in range(sim_time):\n        if mode == \"distance\":\n            sim.assign_tasks_distance()\n        elif mode == \"congestion_aware\" and predictor is not None:\n            # Get state and predict congestion\n            state = sim.get_state_grid()\n            state_tensor = torch.FloatTensor(state).unsqueeze(0).to(device)\n            state_tensor = (state_tensor - input_mean) / input_std\n\n            with torch.no_grad():\n                predicted_congestion = predictor(state_tensor).cpu().numpy()[0]\n\n            sim.assign_tasks_congestion_aware(predicted_congestion)\n        else:\n            sim.assign_tasks_distance()\n\n        sim.step()\n\n    # Throughput: tasks per minute (assuming 1 timestep = 1 second)\n    minutes = sim_time / 60.0\n    throughput = sim.completed_tasks / minutes\n    return throughput, sim.completed_tasks\n\n\n# Main execution\nprint(\"Generating training data...\")\ntrain_inputs, train_targets = generate_training_data(num_episodes=40, episode_length=80)\nval_inputs, val_targets = generate_training_data(num_episodes=10, episode_length=80)\n\nprint(f\"Training data shape: {train_inputs.shape}, {train_targets.shape}\")\nprint(f\"Validation data shape: {val_inputs.shape}, {val_targets.shape}\")\n\n# Train predictor\nprint(\"\\nTraining congestion predictor...\")\npredictor = CongestionPredictor(grid_size=20)\npredictor, input_mean, input_std = train_predictor(\n    predictor, train_inputs, train_targets, val_inputs, val_targets, epochs=30\n)\n\n# Evaluate on different agent densities\nprint(\"\\nEvaluating throughput across agent densities...\")\nagent_counts = [20, 30, 40, 50, 60, 70, 80]\nnum_trials = 3\n\nfor num_agents in agent_counts:\n    dist_throughputs = []\n    cata_throughputs = []\n\n    for trial in range(num_trials):\n        np.random.seed(trial * 100 + num_agents)\n\n        # Distance-based\n        tp_dist, _ = run_simulation(num_agents, mode=\"distance\")\n        dist_throughputs.append(tp_dist)\n\n        # Congestion-aware\n        tp_cata, _ = run_simulation(\n            num_agents,\n            mode=\"congestion_aware\",\n            predictor=pred
