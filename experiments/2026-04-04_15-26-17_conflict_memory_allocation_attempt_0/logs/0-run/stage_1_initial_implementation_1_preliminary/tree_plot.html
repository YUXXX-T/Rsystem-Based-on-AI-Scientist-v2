      if (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost') {
          let lastModified = '';

          // Check for file changes every second
          setInterval(async () => {
              try {
                  const response = await fetch(window.location.href, { method: 'HEAD' });
                  // get a timestamp that shows when the file was last changed
                  const currentModified = response.headers.get('last-modified');

                  if (lastModified && lastModified !== currentModified) {
                      window.location.reload();
                  }

                  lastModified = currentModified;
              } catch (e) {
                  console.error('Error checking for updates:', e);
              }
          }, 1000);
      }

      const bgCol = "#FFFFFF";
const accentCol = "#1a439e";

hljs.initHighlightingOnLoad();

// Function to update background color globally
function updateBackgroundColor(color) {
  // Update the JS variable
  window.bgColCurrent = color;

  // Update body background
  document.body.style.backgroundColor = color;

  // Update canvas container background
  const canvasContainer = document.getElementById('canvas-container');
  if (canvasContainer) {
    canvasContainer.style.backgroundColor = color;
  }
}

// Store tree data for each stage
const stageData = {
  Stage_1: null,
  Stage_2: null,
  Stage_3: null,
  Stage_4: null
};

// Keep track of current selected stage
let currentStage = null;
let currentSketch = null;
let availableStages = [];

// Class definitions for nodes and edges
class Node {
  constructor(x, y, id, isRoot = false) {
    this.x = x;
    this.y = y;
    this.id = id;
    this.visible = isRoot; // Only root nodes are visible initially
    this.appearProgress = 0;
    this.popEffect = 0;
    this.selected = false;
    this.isRootNode = isRoot;
  }

  update() {
    if (this.visible) {
      // Handle the main appearance animation
      if (this.appearProgress < 1) {
        this.appearProgress += 0.06;

        // When we reach full size, trigger the pop effect
        if (this.appearProgress >= 1) {
          this.appearProgress = 1; // Cap at 1
          this.popEffect = 1; // Start the pop effect
        }
      }

      // Handle the pop effect animation
      if (this.popEffect > 0) {
        this.popEffect -= 0.15; // Control how quickly it shrinks back
        if (this.popEffect < 0) this.popEffect = 0; // Don't go negative
      }
    }
  }

  startAnimation() {
    this.visible = true;
  }

  color() {
    if (this.selected) {
      return accentCol; // Use the global accent color variable for selected node
    }
    return '#4263eb'; // Default blue color
  }

  render(p5) {
    if (this.visible) {
      const popBonus = this.popEffect * 0.1;
      const nodeScale = p5.map(this.appearProgress, 0, 1, 0, 1) + popBonus;
      const alpha = p5.map(this.appearProgress, 0, 1, 0, 255);

      p5.push();
      p5.translate(this.x, this.y);

      // Shadow effect
      p5.noStroke();
      p5.rectMode(p5.CENTER);

      for (let i = 1; i <= 4; i++) {
        p5.fill(0, 0, 0, alpha * 0.06);
        p5.rect(i, i, 30 * nodeScale, 30 * nodeScale, 10);
      }

      // Main square - use node's color with alpha
      let nodeColor = p5.color(this.color());
      nodeColor.setAlpha(alpha);
      p5.fill(nodeColor);
      p5.rect(0, 0, 30 * nodeScale, 30 * nodeScale, 10);

      // Draw checkmark icon if the node is selected
      if (this.selected && this.appearProgress >= 1) {
        p5.stroke(255);
        p5.strokeWeight(2 * nodeScale);
        p5.noFill();
        // Draw checkmark
        p5.beginShape();
        p5.vertex(-8, 0);
        p5.vertex(-3, 5);
        p5.vertex(8, -6);
        p5.endShape();
      }

      p5.pop();
    }
  }

  isMouseOver(p5) {
    return this.visible &&
           p5.mouseX > this.x - 15 &&
           p5.mouseX < this.x + 15 &&
           p5.mouseY > this.y - 15 &&
           p5.mouseY < this.y + 15;
  }

  // Connect this node to a child node
  child(childNode) {
    // Create an edge from this node to the child
    let isLeft = childNode.x < this.x;
    let isRight = childNode.x > this.x;
    let edge = new Edge(this, childNode, isLeft, isRight);
    return edge;
  }
}

class Edge {
  constructor(parent, child, isLeft, isRight) {
    this.parent = parent;
    this.child = child;
    this.isLeft = isLeft;
    this.isRight = isRight;
    this.progress = 0;

    // Calculate the midpoint where branching occurs
    this.midY = parent.y + (child.y - parent.y) * 0.6;

    // Use the actual child x-coordinate
    // This ensures the edge will connect directly to the child node
    this.branchX = child.x;
  }

  update() {
    if (this.parent.visible && this.progress < 1) {
      this.progress += 0.01; // Adjust animation speed
    }
    if (this.progress >= 1) {
      this.child.visible = true;
    }
  }

  color() {
    return this.child.color();
  }

  render(p5) {
    if (!this.parent.visible) return;

    // Calculate path lengths
    const verticalDist1 = this.midY - this.parent.y;
    const horizontalDist = Math.abs(this.branchX - this.parent.x);
    const verticalDist2 = this.child.y - this.midY;
    const totalLength = verticalDist1 + horizontalDist + verticalDist2;

    // Calculate how much of each segment to draw
    const currentLength = totalLength * this.progress;

    p5.stroke(180, 190, 205);
    p5.strokeWeight(1.5);
    p5.noFill();

    // Always draw the first vertical segment from parent
    if (currentLength > 0) {
      const firstSegmentLength = Math.min(currentLength, verticalDist1);
      const currentMidY = p5.lerp(this.parent.y, this.midY, firstSegmentLength / verticalDist1);
      p5.line(this.parent.x, this.parent.y, this.parent.x, currentMidY);
    }

    if (currentLength > verticalDist1) {
      // Draw second segment (horizontal)
      const secondSegmentLength = Math.min(currentLength - verticalDist1, horizontalDist);
      const currentBranchX = p5.lerp(this.parent.x, this.branchX, secondSegmentLength / horizontalDist);
      p5.line(this.parent.x, this.midY, currentBranchX, this.midY);

      if (currentLength > verticalDist1 + horizontalDist) {
        // Draw third segment (vertical to child)
        const thirdSegmentLength = currentLength - verticalDist1 - horizontalDist;
        const currentChildY = p5.lerp(this.midY, this.child.y, thirdSegmentLength / verticalDist2);
        p5.line(this.branchX, this.midY, this.branchX, currentChildY);
      }
    }
  }
}

// Create a modified sketch for each stage
function createTreeSketch(stageId) {
  return function(p5) {
    let nodes = [];
    let edges = [];
    let treeData = stageData[stageId];

    p5.setup = function() {
      const canvas = p5.createCanvas(p5.windowWidth * 0.4, p5.windowHeight);
      canvas.parent('canvas-container');
      p5.smooth();
      p5.frameRate(60);

      if (treeData) {
        createTreeFromData(treeData);
      }
    };

    p5.windowResized = function() {
      p5.resizeCanvas(p5.windowWidth * 0.4, p5.windowHeight);
    };

    function createTreeFromData(data) {
      // Clear existing nodes and edges
      nodes = [];
      edges = [];

      // Add defensive checks to prevent errors
      if (!data || !data.layout || !Array.isArray(data.layout) || !data.edges || !Array.isArray(data.edges)) {
        console.error("Invalid tree data format:", data);
        return; // Exit if data structure is invalid
      }

      // Find all parent nodes in edges
      const parentNodes = new Set();
      for (const [parentId, childId] of data.edges) {
        parentNodes.add(parentId);
      }

      // Create nodes
      for (let i = 0; i < data.layout.length; i++) {
        const [nx, ny] = data.layout[i];
        // A node is a root if it's a parent and not a child in any edge
        const isRoot = parentNodes.has(i) && data.edges.every(edge => edge[1] !== i);

        const node = new Node(
          nx * p5.width * 0.8 + p5.width * 0.1,
          ny * p5.height * 0.8 + p5.height * 0.1,
          i,
          isRoot
        );
        nodes.push(node);
      }

      // If no root was found, make the first parent node visible
      if (!nodes.some(node => node.visible) && parentNodes.size > 0) {
        // Get the first parent node
        const firstParentId = [...parentNodes][0];
        if (nodes[firstParentId]) {
          nodes[firstParentId].visible = true;
        }
      }

      // Create edges
      for (const [parentId, childId] of data.edges) {
        const parent = nodes[parentId];
        const child = nodes[childId];
        if (parent && child) { // Verify both nodes exist
          const isLeft = child.x < parent.x;
          const isRight = child.x > parent.x;
          edges.push(new Edge(parent, child, isLeft, isRight));
        }
      }

      // Select the first node by default
      if (nodes.length > 0) {
        nodes[0].selected = true;
        updateNodeInfo(0);
      }
    }

    p5.draw = function() {
      // Use the global background color if available, otherwise use the default bgCol
      const currentBgColor = window.bgColCurrent || bgCol;
      p5.background(currentBgColor);

      // Update and render edges
      for (const edge of edges) {
        edge.update();
        edge.render(p5);
      }

      // Update and render nodes
      for (const node of nodes) {
        node.update();
        node.render(p5);
      }

      // Handle mouse hover
      p5.cursor(p5.ARROW);
      for (const node of nodes) {
        if (node.isMouseOver(p5)) {
          p5.cursor(p5.HAND);
        }
      }
    };

    p5.mousePressed = function() {
      // Check if any node was clicked
      for (let i = 0; i < nodes.length; i++) {
        if (nodes[i].visible && nodes[i].isMouseOver(p5)) {
          // Deselect all nodes
          nodes.forEach(n => n.selected = false);
          // Select the clicked node
          nodes[i].selected = true;
          // Update the right panel with node info
          updateNodeInfo(i);
          break;
        }
      }
    };

    function updateNodeInfo(nodeIndex) {
      if (treeData) {
        setNodeInfo(
          treeData.code[nodeIndex],
          treeData.plan[nodeIndex],
          treeData.plot_code?.[nodeIndex],
          treeData.plot_plan?.[nodeIndex],
          treeData.metrics?.[nodeIndex],
          treeData.exc_type?.[nodeIndex] || '',
          treeData.exc_info?.[nodeIndex]?.args?.[0] || '',
          treeData.exc_stack?.[nodeIndex] || [],
          treeData.plots?.[nodeIndex] || [],
          treeData.plot_analyses?.[nodeIndex] || [],
          treeData.vlm_feedback_summary?.[nodeIndex] || '',
          treeData.datasets_successfully_tested?.[nodeIndex] || [],
          treeData.exec_time_feedback?.[nodeIndex] || '',
          treeData.exec_time?.[nodeIndex] || ''
        );
      }
    }
  };
}

// Start a new p5 sketch for the given stage
function startSketch(stageId) {
  if (currentSketch) {
    currentSketch.remove();
  }

  if (stageData[stageId]) {
    currentSketch = new p5(createTreeSketch(stageId));

    // Update stage info
    const stageNumber = stageId.split('_')[1];
    let stageDesc = '';
    switch(stageId) {
      case 'Stage_1': stageDesc = 'Preliminary Investigation'; break;
      case 'Stage_2': stageDesc = 'Baseline Tuning'; break;
      case 'Stage_3': stageDesc = 'Research Agenda Execution'; break;
      case 'Stage_4': stageDesc = 'Ablation Studies'; break;
    }

    document.getElementById('stage-info').innerHTML =
      `<strong>Current Stage: ${stageNumber} - ${stageDesc}</strong>`;
  }
}

// Handle tab selection
function selectStage(stageId) {
  if (!stageData[stageId] || !availableStages.includes(stageId)) {
    return; // Don't allow selection of unavailable stages
  }

  // Update active tab styles
  document.querySelectorAll('.tab').forEach(tab => {
    tab.classList.remove('active');
  });
  document.querySelector(`.tab[data-stage="${stageId}"]`).classList.add('active');

  // Start the new sketch
  currentStage = stageId;
  startSketch(stageId);
}

// Function to load the tree data for all stages
async function loadAllStageData(baseTreeData) {
  console.log("Loading stage data with base data:", baseTreeData);

  // The base tree data is for the current stage
  const currentStageId = baseTreeData.current_stage || 'Stage_1';

  // Ensure base tree data is valid and has required properties
  if (baseTreeData && baseTreeData.layout && baseTreeData.edges) {
    stageData[currentStageId] = baseTreeData;
    availableStages.push(currentStageId);
    console.log(`Added current stage ${currentStageId} to available stages`);
  } else {
    console.warn(`Current stage ${currentStageId} data is invalid:`, baseTreeData);
  }

  // Use relative path to load other stage trees
  const logDirPath = baseTreeData.log_dir_path || '.';
  console.log("Log directory path:", logDirPath);

  // Load data for each stage if available
  const stageNames = ['Stage_1', 'Stage_2', 'Stage_3', 'Stage_4'];
  const stageNames2actualNames = {
    'Stage_1': 'stage_1_initial_implementation_1_preliminary',
    'Stage_2': 'stage_2_baseline_tuning_1_first_attempt',
    'Stage_3': 'stage_3_creative_research_1_first_attempt',
    'Stage_4': 'stage_4_ablation_studies_1_first_attempt'
    }

  for (const stage of stageNames) {

    if (baseTreeData.completed_stages && baseTreeData.completed_stages.includes(stage)) {
      try {
        console.log(`Attempting to load data for ${stage} from ${logDirPath}/${stageNames2actualNames[stage]}/tree_data.json`);
        const response = await fetch(`${logDirPath}/${stageNames2actualNames[stage]}/tree_data.json`);

        if (response.ok) {
          const data = await response.json();

          // Validate the loaded data
          if (data && data.layout && data.edges) {
            stageData[stage] = data;
            availableStages.push(stage);
            console.log(`Successfully loaded and validated data for ${stage}`);
          } else {
            console.warn(`Loaded data for ${stage} is invalid:`, data);
          }
        } else {
          console.warn(`Failed to load data for ${stage} - HTTP status ${response.status}`);
        }
      } catch (error) {
        console.error(`Error loading data for ${stage}:`, error);
      }
    } else {
      console.log(`Skipping stage ${stage} - not in completed stages list:`, baseTreeData.completed_stages);
    }
  }

  // Update tab visibility based on available stages
  updateTabVisibility();

  // Start with the first available stage
  if (availableStages.length > 0) {
    selectStage(availableStages[0]);
  } else {
    console.warn("No stages available to display");
    // Display a message in the canvas area
    document.getElementById('canvas-container').innerHTML =
      '<div style="padding: 20px; color: #333; text-align: center;"><h3>No valid tree data available to display</h3></div>';
  }
}

// Update tab visibility based on available stages
function updateTabVisibility() {
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(tab => {
    const stageId = tab.getAttribute('data-stage');
    if (availableStages.includes(stageId)) {
      tab.classList.remove('disabled');
    } else {
      tab.classList.add('disabled');
    }
  });
}

// Utility function to set the node info in the right panel
const setNodeInfo = (code, plan, plot_code, plot_plan, metrics = null, exc_type = '', exc_info = '',
    exc_stack = [], plots = [], plot_analyses = [], vlm_feedback_summary = '',
    datasets_successfully_tested = [], exec_time_feedback = '', exec_time = '') => {
  const codeElm = document.getElementById("code");
  if (codeElm) {
    if (code) {
      codeElm.innerHTML = hljs.highlight(code, { language: "python" }).value;
    } else {
      codeElm.innerHTML = '<p>No code available</p>';
    }
  }

  const planElm = document.getElementById("plan");
  if (planElm) {
    if (plan) {
      planElm.innerHTML = hljs.highlight(plan, { language: "plaintext" }).value;
    } else {
      planElm.innerHTML = '<p>No plan available</p>';
    }
  }

  const plot_codeElm = document.getElementById("plot_code");
  if (plot_codeElm) {
    if (plot_code) {
      plot_codeElm.innerHTML = hljs.highlight(plot_code, { language: "python" }).value;
    } else {
      plot_codeElm.innerHTML = '<p>No plot code available</p>';
    }
  }

  const plot_planElm = document.getElementById("plot_plan");
  if (plot_planElm) {
    if (plot_plan) {
      plot_planElm.innerHTML = hljs.highlight(plot_plan, { language: "plaintext" }).value;
    } else {
      plot_planElm.innerHTML = '<p>No plot plan available</p>';
    }
  }

  const metricsElm = document.getElementById("metrics");
  if (metricsElm) {
      let metricsContent = `<h3>Metrics:</h3>`;
      if (metrics && metrics.metric_names) {
          for (const metric of metrics.metric_names) {
              metricsContent += `<div class="metric-group">`;
              metricsContent += `<h4>${metric.metric_name}</h4>`;
              metricsContent += `<p><strong>Description:</strong> ${metric.description || 'N/A'}</p>`;
              metricsContent += `<p><strong>Optimization:</strong> ${metric.lower_is_better ? 'Minimize' : 'Maximize'}</p>`;

              // Create table for dataset values
              metricsContent += `<table class="metric-table">
                  <tr>
                      <th>Dataset</th>
                      <th>Final Value</th>
                      <th>Best Value</th>
                  </tr>`;

              for (const dataPoint of metric.data) {
                  metricsContent += `<tr>
                      <td>${dataPoint.dataset_name}</td>
                      <td>${dataPoint.final_value?.toFixed(4) || 'N/A'}</td>
                      <td>${dataPoint.best_value?.toFixed(4) || 'N/A'}</td>
                  </tr>`;
              }

              metricsContent += `</table></div>`;
          }
      } else if (metrics === null) {
          metricsContent += `<p>No metrics available</p>`;
      }
      metricsElm.innerHTML = metricsContent;
  }

  // Add plots display
  const plotsElm = document.getElementById("plots");
  if (plotsElm) {
      if (plots && plots.length > 0) {
          let plotsContent = '';
          plots.forEach(plotPath => {
              plotsContent += `
                  <div class="plot-item">
                      <img src="${plotPath}" alt="Experiment Plot" onerror="console.error('Failed to load plot:', this.src)"/>
                  </div>`;
          });
          plotsElm.innerHTML = plotsContent;
      } else {
          plotsElm.innerHTML = '';
      }
  }

  // Add error info display
  const errorElm = document.getElementById("exc_info");
  if (errorElm) {
    if (exc_type) {
      let errorContent = `<h3 style="color: #ff5555">Exception Information:</h3>
                          <p><strong>Type:</strong> ${exc_type}</p>`;

      if (exc_info) {
        errorContent += `<p><strong>Details:</strong> <pre>${JSON.stringify(exc_info, null, 2)}</pre></p>`;
      }

      if (exc_stack) {
        errorContent += `<p><strong>Stack Trace:</strong> <pre>${exc_stack.join('\n')}</pre></p>`;
      }

      errorElm.innerHTML = errorContent;
    } else {
      errorElm.innerHTML = "No exception info available";
    }
  }

  const exec_timeElm = document.getElementById("exec_time");
  if (exec_timeElm) {
    let exec_timeContent = '<div id="exec_time"><h3>Execution Time (in seconds):</h3><p>' + exec_time + '</p></div>';
    exec_timeElm.innerHTML = exec_timeContent;
  }

  const exec_time_feedbackElm = document.getElementById("exec_time_feedback");
  if (exec_time_feedbackElm) {
    let exec_time_feedbackContent = '<div id="exec_time_feedback_content">'
    exec_time_feedbackContent += '<h3>Execution Time Feedback:</h3>'
    exec_time_feedbackContent += '<p>' + exec_time_feedback + '</p>'
    exec_time_feedbackContent += '</div>';
    exec_time_feedbackElm.innerHTML = exec_time_feedbackContent;
  }

  const vlm_feedbackElm = document.getElementById("vlm_feedback");
  if (vlm_feedbackElm) {
      let vlm_feedbackContent = '';

      if (plot_analyses && plot_analyses.length > 0) {
          vlm_feedbackContent += `<h3>Plot Analysis:</h3>`;
          plot_analyses.forEach(analysis => {
              if (analysis && analysis.plot_path) {  // Add null check
                  vlm_feedbackContent += `
                      <div class="plot-analysis">
                          <h4>Analysis for ${analysis.plot_path.split('/').pop()}</h4>
                          <p>${analysis.analysis || 'No analysis available'}</p>
                          <ul class="key-findings">
                              ${(analysis.key_findings || []).map(finding => `<li>${finding}</li>`).join('')}
                          </ul>
                      </div>`;
              } else {
                  console.warn('Received invalid plot analysis:', analysis);
                  vlm_feedbackContent += `
                      <div class="plot-analysis">
                          <p>Invalid plot analysis data received</p>
                      </div>`;
              }
          });
      }

      // Add actionable insights if available
      if (vlm_feedback_summary && typeof vlm_feedback_summary === 'string') {
          vlm_feedbackContent += `
              <div class="vlm_feedback">
                  <h3>VLM Feedback Summary:</h3>
                  <p>${vlm_feedback_summary}</p>
              </div>`;
      }

      console.log("Datasets successfully tested:", datasets_successfully_tested);
      if (datasets_successfully_tested && datasets_successfully_tested.length > 0) {
          vlm_feedbackContent += `
              <div id="datasets_successfully_tested">
                  <h3>Datasets Successfully Tested:</h3>
                  <p>${datasets_successfully_tested.join(', ')}</p>
              </div>`;
      }

      if (!vlm_feedbackContent) {
          vlm_feedbackContent = '<p>No insights available for this experiment.</p>';
      }

      vlm_feedbackElm.innerHTML = vlm_feedbackContent;
  }

  const datasets_successfully_testedElm = document.getElementById("datasets_successfully_tested");
  if (datasets_successfully_testedElm) {
      let datasets_successfully_testedContent = '';
      if (datasets_successfully_tested && datasets_successfully_tested.length > 0) {
          datasets_successfully_testedContent = `<h3>Datasets Successfully Tested:</h3><ul>`;
          datasets_successfully_tested.forEach(dataset => {
              datasets_successfully_testedContent += `<li>${dataset}</li>`;
          });
          datasets_successfully_testedContent += `</ul>`;
      } else {
          datasets_successfully_testedContent = '<p>No datasets tested yet</p>';
      }
      datasets_successfully_testedElm.innerHTML = datasets_successfully_testedContent;
  }
};

// Initialize with the provided tree data
const treeStructData = {"edges": [[0, 7], [9, 15], [9, 14], [9, 13], [9, 12]], "layout": [[0.0, 0.0], [0.1, 0.0], [0.2, 0.0], [0.3, 0.0], [0.4, 0.0], [0.5, 0.0], [0.6, 0.0], [0.0, 1.0], [0.7, 0.0], [0.8, 0.0], [0.9, 0.0], [1.0, 0.0], [0.65, 1.0], [0.75, 1.0], [0.85, 1.0], [0.95, 1.0]], "plan": ["I'll implement a baseline for the Conflict Memory Allocation (CMA) framework.\nThe approach will: 1) Create a simple grid-based warehouse environment with\nobstacles, 2) Implement a basic decoupled multi-agent scheduling system with\ntask allocation (Hungarian algorithm) followed by path planning (A*), 3) Build a\nsimple spatial histogram-based conflict memory map that tracks where conflicts\noccur, 4) Use the conflict memory to modify the task assignment cost matrix, 5)\nCompare makespan between baseline (no memory) and CMA approaches across multiple\nscenarios. I'll use synthetic warehouse scenarios with randomly generated tasks\nand measure the makespan improvement ratio.", "I'll implement a baseline for Conflict Memory Allocation (CMA) for multi-agent\npathfinding. The approach will: (1) Create a simple grid-based warehouse\nenvironment, (2) Implement basic MAPF with conflict detection using prioritized\nplanning, (3) Build a spatial histogram-based conflict memory map that tracks\nwhere conflicts occur, (4) Use conflict memory as soft penalties in task\nallocation cost matrix, (5) Compare baseline decoupled scheduling vs CMA-\nenhanced scheduling across multiple scenarios. I'll use A* for pathfinding and\nthe Hungarian algorithm for task assignment. The conflict memory will be a 2D\ngrid accumulating conflict counts, normalized and used as cost modifiers during\nallocation. I'll run experiments with random task distributions and measure\nmakespan improvement.", "I'll implement a baseline for Conflict Memory Allocation (CMA) for multi-agent\npath planning. The approach will: (1) Create a simple grid-based warehouse\nenvironment, (2) Implement a basic MAPF solver using prioritized planning, (3)\nTrack conflicts to build a spatial conflict memory map, (4) Use the conflict\nmemory as penalties in task allocation, and (5) Compare makespan between\nbaseline (no conflict memory) and CMA approaches. I'll use a simple histogram-\nbased conflict memory (counting conflicts per grid cell) as the lightweight\nfeedback mechanism. The task allocation will use a greedy assignment modified by\nconflict penalties. I'll run multiple episodes to accumulate conflict statistics\nand demonstrate the improvement.", "I'll implement a baseline for the Conflict Memory Allocation (CMA) framework.\nThe approach will: 1) Create a simple grid-based warehouse environment, 2)\nImplement a basic MAPF solver using A* with conflict detection, 3) Build a\nspatial histogram-based conflict memory map, 4) Compare baseline decoupled\nallocation (Hungarian algorithm) with CMA-enhanced allocation that uses conflict\npenalties. The conflict memory will be updated iteratively as conflicts are\ndetected. I'll use a simple grid world with obstacles representing warehouse\nshelves, generate random task distributions, and measure makespan improvement.", "Based on the memory and research idea, I'll implement a simple but working CMA\nbaseline that avoids the previous scipy dependency issues. The solution uses a\ngreedy assignment method as fallback, implements a grid-based warehouse\nenvironment, A* path planning, conflict detection, and a spatial conflict memory\nhistogram. The conflict memory accumulates from observed conflicts and applies\nsoft penalties to the assignment cost matrix for future allocations. I'll run\nmultiple episodes comparing baseline (no memory) vs CMA approaches, measuring\nmakespan improvement. The implementation uses pure Python/NumPy for assignment\nto avoid dependency issues, and includes proper conflict tracking and\nvisualization of congestion patterns.", "I'll implement a baseline CMA system for multi-agent path planning. The approach\nuses a simple grid warehouse environment with A* path planning, conflict\ndetection, and a spatial conflict memory histogram. I'll avoid scipy by\nimplementing a greedy task assignment with optional conflict-memory penalties.\nThe system runs multiple episodes: first collecting baseline metrics (no\nmemory), then training/updating the conflict memory, and finally evaluating CMA\nperformance. The conflict memory is a 2D grid storing conflict counts at each\nlocation, which gets added as soft penalties to assignment costs. For\nsimplicity, I'll use prioritized planning where agents plan sequentially with\nhigher-priority agents' paths as obstacles. The evaluation compares makespan\n(maximum path completion time) between baseline and CMA approaches across\nmultiple random scenarios.", "I'll implement a baseline Conflict Memory Allocation (CMA) system for multi-\nagent path planning. The approach uses a simple grid-based warehouse environment\nwith A* path planning, greedy task assignment (avoiding scipy dependency), and a\nspatial conflict histogram that accumulates conflict locations over episodes.\nThe baseline allocator assigns tasks without conflict memory, while CMA uses\naccumulated conflict penalties to modify assignment costs. I'll run multiple\nepisodes, let the conflict memory build up, and compare makespans between\nbaseline and CMA approaches. The implementation uses pure Python/NumPy to avoid\nthe scipy dependency issue from previous attempts. Path planning uses\nprioritized A* with conflict detection at shared timestep-locations. The\nconflict memory map is a simple 2D grid that counts conflicts per cell,\nnormalized and used as soft penalties during assignment.", "The error occurs because `scipy` is not installed in the environment. The\nsolution is to replace the `linear_sum_assignment` function from scipy with a\npure Python/NumPy implementation of the Hungarian algorithm, or use a simpler\ngreedy assignment approach that doesn't require scipy. I'll implement a greedy\ntask allocation method that assigns each agent to the nearest unassigned task,\nwhich is a reasonable baseline for this preliminary implementation stage.", "Based on the memory and requirements, I'll implement a simplified but working\nCMA system that addresses the key failure points identified. The approach uses:\n(1) a grid-based warehouse with explicit chokepoints to generate meaningful\ncongestion, (2) a conflict memory map that tracks both vertex and edge conflicts\nduring planning, (3) a proper linear assignment using\nscipy.optimize.linear_sum_assignment with a fallback, (4) path-based cost\ncomputation that estimates actual route overlap with congested cells, and (5)\nseparated warmup and evaluation phases. I'll increase conflict pressure by using\nmore agents relative to map size and ensure penalties are strong enough to\naffect assignments. The experiment will run multiple episodes, compare baseline\nvs CMA on identical scenarios, and track whether assignments actually change.", "Based on the memory summary, I'll implement a clean CMA baseline that addresses\nthe key failure points: (1) using proper dependency checking with fallback\nassignment, (2) collecting richer conflict signals including edge conflicts and\nreservation pressure, (3) using stronger penalties tied to actual paths, and (4)\ntesting on a congested warehouse with chokepoints. The implementation will use a\ngrid warehouse with narrow corridors, A* pathfinding with reservation tables,\nprioritized planning that records all conflict attempts (not just final\ncollisions), and a conflict memory histogram updated from these signals. I'll\ncompare baseline greedy assignment against CMA-modified assignment on identical\nscenarios, with frozen memory after warmup. The penalty will be path-based:\nsumming conflict memory values along the expected shortest path between agent\nand task. I'll run multiple episodes to gather statistics and compute the\nmakespan improvement ratio.", "Based on the memory summary, I'll implement a clean CMA baseline that addresses\nthe key failure modes: (1) use proper assignment with SciPy's\nlinear_sum_assignment with fallback, (2) collect richer conflict signals\nincluding edge conflicts and reservation pressure, (3) use stronger penalties\ntied to actual paths, (4) create harder scenarios with chokepoints, (5) separate\nwarmup from evaluation, and (6) add diagnostics to verify signal flow. The\nimplementation will use a grid warehouse with narrow corridors, A* pathfinding,\nprioritized planning with reservation tables, and a conflict memory map that\naccumulates both vertex and edge conflicts. During warmup episodes, we build the\nmemory; then we freeze it and compare baseline vs CMA allocations on identical\ntest scenarios. The key improvement is recording \"near-conflicts\" (cells/edges\nthat required waiting or replanning) not just actual collisions, ensuring the\nmemory receives signal even when prioritized planning succeeds.", "Based on the memory analysis, the key issues were: (1) SciPy dependency\nfailures, (2) conflict memory receiving no signal due to prioritized planning\nresolving conflicts, (3) weak penalties, and (4) greedy assignment masking CMA\neffects. My solution will: use a pure-Python Hungarian implementation to avoid\nSciPy, create a congested warehouse with narrow corridors to generate conflicts,\ncollect richer conflict signals including reservation rejections during planning\n(not just post-execution conflicts), use stronger penalties scaled relative to\npath costs, and ensure clean separation between warmup and evaluation phases.\nThe environment will be a 15x15 grid with obstacles creating chokepoints, 6\nagents, and 6 tasks per episode. I'll track reservation conflicts during A*\nplanning to populate the conflict memory, then use path-based cost computation\nwith memory penalties for CMA allocation.", "Seed node", "Seed node", "Seed node", "Aggregate results from multiple seeds"], "code": ["import os\nimport numpy as np\nimport torch\nfrom scipy.optimize import linear_sum_assignment\nfrom collections import defaultdict\nimport heapq\nimport matplotlib.pyplot as plt\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n\n# Environment setup\nclass WarehouseEnv:\n    def __init__(self, width=20, height=20, obstacle_ratio=0.15, seed=42):\n        np.random.seed(seed)\n        self.width = width\n        self.height = height\n        self.grid = np.zeros((height, width), dtype=np.int32)\n\n        # Add obstacles (shelves in warehouse)\n        num_obstacles = int(width * height * obstacle_ratio)\n        obstacle_positions = np.random.choice(\n            width * height, num_obstacles, replace=False\n        )\n        for pos in obstacle_positions:\n            y, x = pos // width, pos % width\n            self.grid[y, x] = 1  # 1 = obstacle\n\n        # Ensure borders are clear for agent movement\n        self.grid[0, :] = 0\n        self.grid[-1, :] = 0\n        self.grid[:, 0] = 0\n        self.grid[:, -1] = 0\n\n    def is_valid(self, x, y):\n        return 0 <= x < self.width and 0 <= y < self.height and self.grid[y, x] == 0\n\n    def get_neighbors(self, x, y):\n        neighbors = []\n        for dx, dy in [(0, 1), (0, -1), (1, 0), (-1, 0), (0, 0)]:  # Include wait action\n            nx, ny = x + dx, y + dy\n            if self.is_valid(nx, ny):\n                neighbors.append((nx, ny))\n        return neighbors\n\n\n# A* pathfinding\ndef astar(env, start, goal):\n    if start == goal:\n        return [start]\n\n    open_set = [(0, start)]\n    came_from = {}\n    g_score = {start: 0}\n\n    while open_set:\n        _, current = heapq.heappop(open_set)\n\n        if current == goal:\n            path = [current]\n            while current in came_from:\n                current = came_from[current]\n                path.append(current)\n            return path[::-1]\n\n        for neighbor in env.get_neighbors(*current):\n            tentative_g = g_score[current] + 1\n            if neighbor not in g_score or tentative_g < g_score[neighbor]:\n                came_from[neighbor] = current\n                g_score[neighbor] = tentative_g\n                f_score = (\n                    tentative_g\n                    + abs(neighbor[0] - goal[0])\n                    + abs(neighbor[1] - goal[1])\n                )\n                heapq.heappush(open_set, (f_score, neighbor))\n\n    return None  # No path found\n\n\n# Simple conflict detection with priority-based resolution\ndef plan_paths_with_conflicts(env, agents_starts, agents_goals):\n    paths = []\n    conflicts = []\n    reserved = defaultdict(set)  # (x, y, t) -> agent_id\n\n    for agent_id, (start, goal) in enumerate(zip(agents_starts, agents_goals)):\n        path = astar_with_reservations(env, start, goal, reserved, agent_id)\n        if path is None:\n            # Fallback: use basic A* and accept conflicts\n            path = astar(env, start, goal)\n            if path is None:\n                path = [start]  # Agent stays in place\n\n        paths.append(path)\n\n        # Reserve positions\n        for t, pos in enumerate(path):\n            if pos in reserved[(pos[0], pos[1], t)]:\n                conflicts.append((pos[0], pos[1], t))\n            reserved[(pos[0], pos[1], t)].add(agent_id)\n\n        # Extend reservation if agent reaches goal early\n        if len(path) > 0:\n            final_pos = path[-1]\n            for t in range(len(path), max(len(p) for p in paths) + 10 if paths else 10):\n                reserved[(final_pos[0], final_pos[1], t)].add(agent_id)\n\n    # Detect all conflicts\n    for t in range(max(len(p) for p in paths) if paths else 0):\n        positions_at_t = defaultdict(list)\n        for agent_id, path in enumerate(paths):\n            if t < len(path):\n                pos = path[t]\n            else:\n                pos = path[-1] if path else agents_starts[agent_id]\n            positions_at_t[pos].append(agent_id)\n\n        for pos, agents in positions_at_t.items():\n            if len(agents) > 1:\n                conflicts.append((pos[0], pos[1], t))\n\n    return paths, conflicts\n\n\ndef astar_with_reservations(env, start, goal, reserved, agent_id, max_time=100):\n    if start == goal:\n        return [start]\n\n    open_set = [(0, 0, start)]  # (f_score, time, position)\n    came_from = {}\n    g_score = {(start, 0): 0}\n\n    while open_set:\n        _, t, current = heapq.heappop(open_set)\n\n        if current == goal:\n            path = [(current, t)]\n            state = (current, t)\n            while state in came_from:\n                state = came_from[state]\n                path.append(state)\n            return [p[0] for p in path[::-1]]\n\n        if t >= max_time:\n            continue\n\n        for neighbor in env.get_neighbors(*current):\n            next_t = t + 1\n            # Check if position is reserved by another agent\n            if any(\n                aid != agent_id\n                for aid in reserved.get((neighbor[0], neighbor[1], next_t), set())\n            ):\n                continue\n\n            tentative_g = g_score[(current, t)] + 1\n            if (neighbor, next_t) not in g_score or tentative_g < g_score[\n                (neighbor, next_t)\n            ]:\n                came_from[(neighbor, next_t)] = (current, t)\n                g_score[(neighbor, next_t)] = tentative_g\n                f_score = (\n                    tentative_g\n                    + abs(neighbor[0] - goal[0])\n                    + abs(neighbor[1] - goal[1])\n                )\n                heapq.heappush(open_set, (f_score, next_t, neighbor))\n\n    return None\n\n\n# Task allocation using Hungarian algorithm\ndef compute_cost_matrix(\n    env, agent_positions, task_positions, conflict_memory=None, memory_weight=0.5\n):\n    n_agents = len(agent_positions)\n    n_tasks = len(task_positions)\n    cost_matrix = np.zeros((n_agents, n_tasks))\n\n    for i, agent_pos in enumerate(agent_positions):\n        for j, task_pos in enumerate(task_positions):\n            # Base cost: Manhattan distance\n            base_cost = abs(agent_pos[0] - task_pos[0]) + abs(\n                agent_pos[1] - task_pos[1]\n            )\n\n            # Add conflict memory penalty if available\n            if conflict_memory is not None:\n                # Sample points along the approximate path\n                path_penalty = 0\n                steps = max(\n                    abs(agent_pos[0] - task_pos[0]), abs(agent_pos[1] - task_pos[1]), 1\n                )\n                for s in range(steps + 1):\n                    alpha = s / steps\n                    x = int(agent_pos[0] * (1 - alpha) + task_pos[0] * alpha)\n                    y = int(agent_pos[1] * (1 - alpha) + task_pos[1] * alpha)\n                    x = np.clip(x, 0, conflict_memory.shape[1] - 1)\n                    y = np.clip(y, 0, conflict_memory.shape[0] - 1)\n                    path_penalty += conflict_memory[y, x]\n\n                cost_matrix[i, j] = base_cost + memory_weight * path_penalty\n            else:\n                cost_matrix[i, j] = base_cost\n\n    return cost_matrix\n\n\ndef allocate_tasks(\n    agent_positions, task_positions, env, conflict_memory=None, memory_weight=0.5\n):\n    cost_matrix = compute_cost_matrix(\n        env, agent_positions, task_positions, conflict_memory, memory_weight\n    )\n    row_ind, col_ind = linear_sum_assignment(cost_matrix)\n    return list(zip(row_ind, col_ind))\n\n\n# Conflict Memory Map\nclass ConflictMemoryMap:\n    def __init__(self, width, height, decay=0.95):\n        self.width = width\n        self.height = height\n        self.memory = np.zeros((height, width), dtype=np.float32)\n        self.decay = decay\n\n    def update(self, conflicts):\n        # Apply decay\n        self.memory *= self.decay\n\n        # Add new conflicts\n        for x, y, t in conflicts:\n            if 0 <= x < self.width and 0 <= y < self.height:\n                self.memory[y, x] += 1.0\n\n    def get_memory(self):\n        return self.memory.copy()\n\n    def reset(self):\n        self.memory = np.zeros((self.height, self.width), dtype=np.float32)\n\n\n# Main experiment\ndef run_experiment(\n    n_scenarios=50, n_agents=8, n_tasks=8, warmup_episodes=10, memory_weight=2.0\n):\n    env = WarehouseEnv(width=20, height=20, obstacle_ratio=0.12, seed=42)\n    conflict_memory = ConflictMemoryMap(env.width, env.height, decay=0.9)\n\n    baseline_makespans = []\n    cma_makespans = []\n    improvement_ratios = []\n\n    experiment_data = {\n        \"warehouse\": {\n            \"metrics\": {\n                \"baseline_makespan\": [],\n                \"cma_makespan\": [],\n                \"improvement_ratio\": [],\n            },\n            \"losses\": {\"train\": [], \"val\": []},\n            \"conflict_counts\": [],\n            \"conflict_memory_snapshots\": [],\n        }\n    }\n\n    # Get valid positions (not obstacles)\n    valid_positions = [\n        (x, y)\n        for y in range(env.height)\n        for x in range(env.width)\n        if env.grid[y, x] == 0\n    ]\n\n    for episode in range(n_scenarios):\n        np.random.seed(episode + 100)\n\n        # Sample random agent starts and task goals\n        sampled_positions = np.random.choice(\n            len(valid_positions), n_agents + n_tasks, replace=False\n        )\n        agent_starts = [valid_positions[i] for i in sampled_positions[:n_agents]]\n        task_goals = [\n            valid_positions[i] for i in sampled_positions[n_agents : n_agents + n_tasks]\n        ]\n\n        # Baseline: allocation without conflict memory\n        baseline_assignments = allocate_tasks(\n            agent_starts, task_goals, env, conflict_memory=None\n        )\n        baseline_agent_goals = [task_goals[j] for i, j in sorted(baseline_assignments)]\n        baseline_paths, baseline_conflicts = plan_paths_with_conflicts(\n            env, agent_starts, baseline_agent_goals\n        )\n        baseline_makespan = max(len(p) for p in baseline_paths) if baseline_paths else 0\n\n        # CMA: allocation with conflict memory (after warmup)\n        if episode < warmup_episodes:\n            # During warmup, use baseline and collect conflict data\n            cma_makespan = baseline_makespan\n            cma_conflicts = baseline_conflicts\n        else:\n            cma_assignments = allocate_tasks(\n                agent_starts,\n                task_goals,\n                env,\n                conflict_memory=conflict_memory.get_memory(),\n                memory_weight=memory_weight,\n            )\n            cma_agent_goals = [task_goals[j] for i, j in sorted(cma_assignments)]\n            cma_paths, cma_conflicts = plan_paths_with_conflicts(\n                env, agent_starts, cma_agent_goals\n            )\n            cma_makespan = max(len(p) for p in cma_paths) if cma_paths else 0\n\n        # Update conflict memory with observed conflicts\n        all_conflicts = (\n            baseline_conflicts if episode < warmup_episodes else cma_conflicts\n        )\n        conflict_memory.update(all_conflicts)\n\n        baseline_makespans.append(baseline_makespan)\n        cma_makespans.append(cma_makespan)\n\n        if baseline_makespan > 0:\n            improvement = (baseline_makespan - cma_makespan) / baseline_makespan\n        else:\n            improvement = 0.0\n        improvement_ratios.append(improvement)\n\n        experiment_data[\"warehouse\"][\"metrics\"][\"baseline_makespan\"].append(\n            baseline_makespan\n        )\n        experiment_data[\"warehouse\"][\"metrics\"][\"cma_makespan\"].append(cma_makespan)\n        experiment_data[\"warehouse\"][\"metrics\"][\"improvement_ratio\"].append(improvement)\n        experiment_data[\"warehouse\"][\"conflict_counts\"].append(len(all_conflicts))\n\n        if episode % 10 == 0:\n            print(\n                f\"Episode {episode}: baseline_makespan={baseline_makespan}, cma_makespan={cma_makespan}, \"\n                f\"improvement_ratio={improvement:.4f}, conflicts={len(all_conflicts)}\"\n            )\n\n    # Save conflict memory snapshot\n    experiment_data[\"warehouse\"][\"conflict_memory_snapshots\"].append(\n        conflict_memory.get_memory()\n    )\n\n    return (\n        baseline_makespans,\n        cma_makespans,\n        improvement_ratios,\n        conflict_memory,\n        env,\n        experiment_data,\n    )\n\n\n# Run experiment\nprint(\"Running CMA experiment...\")\n(\n    baseline_makespans,\n    cma_makespans,\n    improvement_ratios,\n    conflict_memory,\n    env,\n    experiment_data,\n) = run_experiment(\n    n_scenarios=60, n_agents=6, n_tasks=6, warmup_episodes=15, memory_weight=3.0\n)\n\n# Calculate final metrics (excluding warmup)\nwarmup_episodes = 15\npost_warmup_improvements = improvement_ratios[warmup_episodes:]\navg_improvement = np.mean(post_warmup_improvements)\nstd_improvement = np.std(post_warmup_improvements)\n\nprint(\"\\n\" + \"=\" * 60)\nprint(\"FINAL RESULTS\")\nprint(\"=\" * 60)\nprint(f\"Average baseline makespan: {np.mean(baseline_makespans[warmup_episodes:]):.2f}\")\nprint(f\"Average CMA makespan: {np.mean(cma_makespans[warmup_episodes:]):.2f}\")\nprint(f\"makespan_improvement_ratio = {avg_improvement:.4f} (+/- {std_improvement:.4f})\")\nprint(\n    f\"Positive improvement in {100*np.mean(np.array(post_warmup_improvements) > 0):.1f}% of scenarios\"\n)\n\n# Visualizations\nfig, axes = plt.subplots(2, 2, figsize=(12, 10))\n\n# Plot 1: Makespan over episodes\nax1 = axes[0, 0]\nepisodes = np.arange(len(baseline_makespans))\nax1.plot(episodes, baseline_makespans, label=\"Baseline\", alpha=0.7)\nax1.plot(episodes, cma_makespans, label=\"CMA\", alpha=0.7)\nax1.axvline(x=warmup_episodes, color=\"red\", linestyle=\"--\", label=\"End of warmup\")\nax1.set_xlabel(\"Episode\")\nax1.set_ylabel(\"Makespan\")\nax1.set_title(\"Makespan Comparison Over Episodes\")\nax1.legend()\nax1.grid(True, alpha=0.3)\n\n# Plot 2: Improvement ratio over episodes\nax2 = axes[0, 1]\nax2.plot(episodes, improvement_ratios, color=\"green\", alpha=0.7)\nax2.axhline(y=0, color=\"black\", linestyle=\"-\", linewidth=0.5)\nax2.axvline(x=warmup_episodes, color=\"red\", linestyle=\"--\", label=\"End of warmup\")\nax2.fill_between(episodes, improvement_ratios, 0, alpha=0.3, color=\"green\")\nax2.set_xlabel(\"Episode\")\nax2.set_ylabel(\"Improvement Ratio\")\nax2.set_title(\"Makespan Improvement Ratio Over Episodes\")\nax2.legend()\nax2.grid(True, alpha=0.3)\n\n# Plot 3: Conflict memory heatmap\nax3 = axes[1, 0]\nmemory_map = conflict_memory.get_memory()\nim = ax3.imshow(memory_map, cmap=\"hot\", interpolation=\"nearest\")\nax3.set_title(\"Conflict Memory Map (Heatmap)\")\nax3.set_xlabel(\"X\")\nax3.set_ylabel(\"Y\")\nplt.colorbar(im, ax=ax3, label=\"Conflict Intensity\")\n\n# Plot 4: Environment with obstacles\nax4 = axes[1, 1]\nax4.imshow(env.grid, cmap=\"binary\", interpolation=\"nearest\")\nax4.set_title(\"Warehouse Environment (Black = Obstacles)\")\nax4.set_xlabel(\"X\")\nax4.set_ylabel(\"Y\")\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"cma_experiment_results.png\"), dpi=150)\nplt.close()\n\n# Save experiment data\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nnp.save(\n    os.path.join(working_dir, \"conflict_memory_final.npy\"), conflict_memory.get_memory()\n)\nnp.save(\n    os.path.join(working_dir, \"improvement_ratios.npy\"), np.array(improvement_ratios)\n)\n\nprint(f\"\\nResults saved to {working_dir}\")\nprint(f\"Final makespan_improvement_ratio: {avg_improvement:.4f}\")\n", "import os\nimport numpy as np\nimport heapq\nfrom scipy.optimize import linear_sum_assignment\nimport matplotlib.pyplot as plt\nfrom collections import defaultdict\nimport time\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\n# Set random seed for reproducibility\nnp.random.seed(42)\n\n# Experiment data storage\nexperiment_data = {\n    \"warehouse_small\": {\n        \"baseline_makespans\": [],\n        \"cma_makespans\": [],\n        \"improvement_ratios\": [],\n        \"conflict_counts\": {\"baseline\": [], \"cma\": []},\n    }\n}\n\n\nclass GridEnvironment:\n    \"\"\"Simple grid-based warehouse environment\"\"\"\n\n    def __init__(self, width=20, height=20, obstacle_ratio=0.2):\n        self.width = width\n        self.height = height\n        self.grid = np.zeros((height, width), dtype=int)\n\n        # Add obstacles (leaving corridors)\n        np.random.seed(42)\n        for i in range(height):\n            for j in range(width):\n                # Create structured obstacles (shelves) with corridors\n                if (i % 4 in [1, 2]) and (j % 4 in [1, 2]):\n                    if np.random.random() < 0.7:\n                        self.grid[i, j] = 1  # obstacle\n\n        # Ensure borders are free for movement\n        self.grid[0, :] = 0\n        self.grid[-1, :] = 0\n        self.grid[:, 0] = 0\n        self.grid[:, -1] = 0\n\n    def is_valid(self, pos):\n        y, x = pos\n        return 0 <= x < self.width and 0 <= y < self.height and self.grid[y, x] == 0\n\n    def get_neighbors(self, pos):\n        y, x = pos\n        neighbors = []\n        for dy, dx in [(0, 1), (0, -1), (1, 0), (-1, 0), (0, 0)]:  # include wait\n            new_pos = (y + dy, x + dx)\n            if self.is_valid(new_pos):\n                neighbors.append(new_pos)\n        return neighbors\n\n    def get_free_positions(self):\n        positions = []\n        for y in range(self.height):\n            for x in range(self.width):\n                if self.grid[y, x] == 0:\n                    positions.append((y, x))\n        return positions\n\n\ndef astar(env, start, goal, constraints=None):\n    \"\"\"A* pathfinding with time-based constraints\"\"\"\n    if constraints is None:\n        constraints = set()\n\n    def heuristic(pos):\n        return abs(pos[0] - goal[0]) + abs(pos[1] - goal[1])\n\n    open_set = [(heuristic(start), 0, start, [start])]\n    closed_set = set()\n    max_time = env.width * env.height * 2  # prevent infinite loops\n\n    while open_set:\n        f, t, pos, path = heapq.heappop(open_set)\n\n        if pos == goal:\n            return path\n\n        if (pos, t) in closed_set or t > max_time:\n            continue\n        closed_set.add((pos, t))\n\n        for next_pos in env.get_neighbors(pos):\n            next_t = t + 1\n            # Check vertex constraint\n            if (next_pos, next_t) in constraints:\n                continue\n            # Check edge constraint (swap)\n            if (pos, next_t) in constraints:\n                continue\n\n            if (next_pos, next_t) not in closed_set:\n                new_path = path + [next_pos]\n                heapq.heappush(\n                    open_set, (next_t + heuristic(next_pos), next_t, next_pos, new_path)\n                )\n\n    # Return path to closest point if goal unreachable\n    return [start] * 10\n\n\ndef detect_conflicts(paths):\n    \"\"\"Detect conflicts between agent paths\"\"\"\n    conflicts = []\n    max_len = max(len(p) for p in paths) if paths else 0\n\n    # Pad paths to same length\n    padded = []\n    for p in paths:\n        if len(p) < max_len:\n            padded.append(p + [p[-1]] * (max_len - len(p)))\n        else:\n            padded.append(p)\n\n    for t in range(max_len):\n        positions_at_t = {}\n        for i, path in enumerate(padded):\n            pos = path[t]\n            if pos in positions_at_t:\n                # Vertex conflict\n                conflicts.append((pos, t, i, positions_at_t[pos]))\n            positions_at_t[pos] = i\n\n        # Edge conflicts (swap)\n        if t > 0:\n            for i in range(len(padded)):\n                for j in range(i + 1, len(padded)):\n                    if (\n                        padded[i][t] == padded[j][t - 1]\n                        and padded[i][t - 1] == padded[j][t]\n                    ):\n                        conflicts.append((padded[i][t], t, i, j))\n\n    return conflicts\n\n\ndef prioritized_planning(env, starts, goals):\n    \"\"\"Prioritized planning for MAPF\"\"\"\n    paths = []\n    constraints = set()\n\n    for i in range(len(starts)):\n        path = astar(env, starts[i], goals[i], constraints)\n        paths.append(path)\n\n        # Add constraints for future agents\n        for t, pos in enumerate(path):\n            constraints.add((pos, t))\n        # Pad constraints for goal position\n        for t in range(len(path), len(path) + 20):\n            constraints.add((path[-1], t))\n\n    return paths\n\n\ndef compute_makespan(paths):\n    \"\"\"Compute makespan (max path length)\"\"\"\n    return max(len(p) for p in paths) if paths else 0\n\n\nclass ConflictMemoryMap:\n    \"\"\"Spatial histogram for conflict memory\"\"\"\n\n    def __init__(self, height, width, decay=0.9):\n        self.memory = np.zeros((height, width))\n        self.visit_count = np.zeros((height, width))\n        self.decay = decay\n\n    def update(self, conflicts):\n        \"\"\"Update memory with new conflicts\"\"\"\n        # Decay existing memory\n        self.memory *= self.decay\n        self.visit_count *= self.decay\n\n        for conflict in conflicts:\n            pos, t, *agents = conflict\n            y, x = pos\n            self.memory[y, x] += 1\n            self.visit_count[y, x] += 1\n\n    def get_conflict_penalty(self, pos):\n        \"\"\"Get conflict penalty for a position\"\"\"\n        y, x = pos\n        if self.visit_count[y, x] > 0:\n            return self.memory[y, x] / (self.visit_count[y, x] + 1)\n        return 0\n\n    def get_path_penalty(self, path):\n        \"\"\"Get total conflict penalty for a path\"\"\"\n        penalty = 0\n        for pos in path:\n            penalty += self.get_conflict_penalty(pos)\n        return penalty\n\n\ndef compute_cost_matrix(env, agents, tasks, conflict_memory=None, penalty_weight=2.0):\n    \"\"\"Compute assignment cost matrix with optional conflict penalties\"\"\"\n    n_agents = len(agents)\n    n_tasks = len(tasks)\n\n    # Pad to square matrix\n    size = max(n_agents, n_tasks)\n    cost_matrix = np.full((size, size), 1000.0)\n\n    for i, agent_pos in enumerate(agents):\n        for j, task_pos in enumerate(tasks):\n            # Base cost: Manhattan distance\n            base_cost = abs(agent_pos[0] - task_pos[0]) + abs(\n                agent_pos[1] - task_pos[1]\n            )\n\n            if conflict_memory is not None:\n                # Estimate path and add conflict penalty\n                # Simple estimate: straight line positions\n                path_estimate = []\n                y, x = agent_pos\n                ty, tx = task_pos\n                while (y, x) != (ty, tx):\n                    if y < ty:\n                        y += 1\n                    elif y > ty:\n                        y -= 1\n                    if x < tx:\n                        x += 1\n                    elif x > tx:\n                        x -= 1\n                    path_estimate.append((y, x))\n\n                penalty = conflict_memory.get_path_penalty(path_estimate)\n                cost_matrix[i, j] = base_cost + penalty_weight * penalty\n            else:\n                cost_matrix[i, j] = base_cost\n\n    return cost_matrix\n\n\ndef task_allocation(agents, tasks, cost_matrix):\n    \"\"\"Hungarian algorithm for task assignment\"\"\"\n    row_ind, col_ind = linear_sum_assignment(cost_matrix)\n\n    assignment = {}\n    for i, j in zip(row_ind, col_ind):\n        if i < len(agents) and j < len(tasks):\n            assignment[i] = j\n\n    return assignment\n\n\ndef run_scenario(env, n_agents, conflict_memory=None, use_memory=False):\n    \"\"\"Run a single scheduling scenario\"\"\"\n    free_positions = env.get_free_positions()\n\n    # Sample random start and goal positions\n    if len(free_positions) < 2 * n_agents:\n        n_agents = len(free_positions) // 2\n\n    indices = np.random.choice(len(free_positions), 2 * n_agents, replace=False)\n    starts = [free_positions[i] for i in indices[:n_agents]]\n    goals = [free_positions[i] for i in indices[n_agents:]]\n\n    # Task allocation\n    if use_memory and conflict_memory is not None:\n        cost_matrix = compute_cost_matrix(env, starts, goals, conflict_memory)\n    else:\n        cost_matrix = compute_cost_matrix(env, starts, goals, None)\n\n    assignment = task_allocation(starts, goals, cost_matrix)\n\n    # Reorder goals based on assignment\n    assigned_starts = []\n    assigned_goals = []\n    for agent_idx in sorted(assignment.keys()):\n        task_idx = assignment[agent_idx]\n        assigned_starts.append(starts[agent_idx])\n        assigned_goals.append(goals[task_idx])\n\n    # Path planning\n    paths = prioritized_planning(env, assigned_starts, assigned_goals)\n\n    # Detect conflicts\n    conflicts = detect_conflicts(paths)\n\n    # Compute makespan\n    makespan = compute_makespan(paths)\n\n    return makespan, conflicts, paths\n\n\ndef main():\n    print(\"=\" * 60)\n    print(\"Conflict Memory Allocation (CMA) Experiment\")\n    print(\"=\" * 60)\n\n    # Create environment\n    env = GridEnvironment(width=20, height=20)\n    print(f\"Environment: {env.width}x{env.height} grid\")\n    print(f\"Free cells: {len(env.get_free_positions())}\")\n\n    # Initialize conflict memory\n    conflict_memory = ConflictMemoryMap(env.height, env.width)\n\n    # Experiment parameters\n    n_episodes = 50\n    n_agents = 8\n    warmup_episodes = 10  # Episodes to build conflict memory\n\n    baseline_makespans = []\n    cma_makespans = []\n    improvement_ratios = []\n\n    print(f\"\\nRunning {n_episodes} episodes with {n_agents} agents each...\")\n    print(f\"Warmup episodes (building conflict memory): {warmup_episodes}\")\n    print(\"-\" * 60)\n\n    # Warmup phase: build conflict memory\n    print(\"\\n[Warmup Phase]\")\n    for ep in range(warmup_episodes):\n        np.random.seed(ep * 100)\n        _, conflicts, _ = run_scenario(env, n_agents, None, use_memory=False)\n        conflict_memory.update(conflicts)\n        if (ep + 1) % 5 == 0:\n            print(\n                f\"Warmup Episode {ep+1}/{warmup_episodes}: conflicts detected = {len(conflicts)}\"\n            )\n\n    # Evaluation phase\n    print(\"\\n[Evaluation Phase]\")\n    for ep in range(n_episodes):\n        np.random.seed(ep * 1000 + 500)\n\n        # Baseline: no conflict memory\n        baseline_makespan, baseline_conflicts, _ = run_scenario(\n            env, n_agents, None, use_memory=False\n        )\n\n        np.random.seed(ep * 1000 + 500)  # Same seed for fair comparison\n\n        # CMA: with conflict memory\n        cma_makespan, cma_conflicts, _ = run_scenario(\n            env, n_agents, conflict_memory, use_memory=True\n        )\n\n        # Update conflict memory with CMA conflicts for continuous learning\n        conflict_memory.update(cma_conflicts)\n\n        baseline_makespans.append(baseline_makespan)\n        cma_makespans.append(cma_makespan)\n\n        # Compute improvement ratio\n        if baseline_makespan > 0:\n            improvement = (baseline_makespan - cma_makespan) / baseline_makespan\n        else:\n            improvement = 0\n        improvement_ratios.append(improvement)\n\n        experiment_data[\"warehouse_small\"][\"baseline_makespans\"].append(\n            baseline_makespan\n        )\n        experiment_data[\"warehouse_small\"][\"cma_makespans\"].append(cma_makespan)\n        experiment_data[\"warehouse_small\"][\"improvement_ratios\"].append(improvement)\n        experiment_data[\"warehouse_small\"][\"conflict_counts\"][\"baseline\"].append(\n            len(baseline_conflicts)\n        )\n        experiment_data[\"warehouse_small\"][\"conflict_counts\"][\"cma\"].append(\n            len(cma_conflicts)\n        )\n\n        if (ep + 1) % 10 == 0:\n            avg_improvement = np.mean(improvement_ratios[-10:])\n            print(\n                f\"Episode {ep+1}/{n_episodes}: \"\n                f\"Baseline={baseline_makespan}, CMA={cma_makespan}, \"\n                f\"Improvement={improvement:.3f}, Avg(last 10)={avg_improvement:.3f}\"\n            )\n\n    # Final statistics\n    print(\"\\n\" + \"=\" * 60)\n    print(\"FINAL RESULTS\")\n    print(\"=\" * 60)\n\n    avg_baseline = np.mean(baseline_makespans)\n    avg_cma = np.mean(cma_makespans)\n    avg_improvement = np.mean(improvement_ratios)\n    std_improvement = np.std(improvement_ratios)\n\n    print(f\"Average Baseline Makespan: {avg_baseline:.2f}\")\n    print(f\"Average CMA Makespan: {avg_cma:.2f}\")\n    print(\n        f\"Average Makespan Improvement Ratio: {avg_improvement:.4f} (+/- {std_improvement:.4f})\"\n    )\n    print(\n        f\"Improvement Range: [{min(improvement_ratios):.4f}, {max(improvement_ratios):.4f}]\"\n    )\n\n    # Main metric\n    print(f\"\\n>>> makespan_improvement_ratio = {avg_improvement:.4f}\")\n\n    # Visualization\n    fig, axes = plt.subplots(2, 2, figsize=(12, 10))\n\n    # Plot 1: Makespan comparison\n    ax1 = axes[0, 0]\n    episodes = range(1, n_episodes + 1)\n    ax1.plot(episodes, baseline_makespans, \"b-\", alpha=0.7, label=\"Baseline\")\n    ax1.plot(episodes, cma_makespans, \"r-\", alpha=0.7, label=\"CMA\")\n    ax1.set_xlabel(\"Episode\")\n    ax1.set_ylabel(\"Makespan\")\n    ax1.set_title(\"Makespan Comparison: Baseline vs CMA\")\n    ax1.legend()\n    ax1.grid(True, alpha=0.3)\n\n    # Plot 2: Improvement ratio over episodes\n    ax2 = axes[0, 1]\n    ax2.plot(episodes, improvement_ratios, \"g-\", alpha=0.7)\n    ax2.axhline(\n        y=avg_improvement,\n        color=\"r\",\n        linestyle=\"--\",\n        label=f\"Mean={avg_improvement:.3f}\",\n    )\n    ax2.axhline(y=0, color=\"k\", linestyle=\"-\", alpha=0.3)\n    ax2.set_xlabel(\"Episode\")\n    ax2.set_ylabel(\"Improvement Ratio\")\n    ax2.set_title(\"Makespan Improvement Ratio Over Time\")\n    ax2.legend()\n    ax2.grid(True, alpha=0.3)\n\n    # Plot 3: Conflict memory heatmap\n    ax3 = axes[1, 0]\n    im = ax3.imshow(conflict_memory.memory, cmap=\"hot\", interpolation=\"nearest\")\n    ax3.set_title(\"Conflict Memory Map (Heatmap)\")\n    ax3.set_xlabel(\"X\")\n    ax3.set_ylabel(\"Y\")\n    plt.colorbar(im, ax=ax3, label=\"Conflict Count\")\n\n    # Plot 4: Distribution of improvement ratios\n    ax4 = axes[1, 1]\n    ax4.hist(improvement_ratios, bins=20, edgecolor=\"black\", alpha=0.7)\n    ax4.axvline(\n        x=avg_improvement,\n        color=\"r\",\n        linestyle=\"--\",\n        label=f\"Mean={avg_improvement:.3f}\",\n    )\n    ax4.set_xlabel(\"Improvement Ratio\")\n    ax4.set_ylabel(\"Frequency\")\n    ax4.set_title(\"Distribution of Makespan Improvement Ratios\")\n    ax4.legend()\n\n    plt.tight_layout()\n    plt.savefig(os.path.join(working_dir, \"cma_results.png\"), dpi=150)\n    plt.close()\n\n    # Save environment visualization\n    fig2, ax = plt.subplots(figsize=(8, 8))\n    ax.imshow(env.grid, cmap=\"binary\", interpolation=\"nearest\")\n    ax.set_title(\"Warehouse Environment (white=free, black=obstacle)\")\n    ax.set_xlabel(\"X\")\n    ax.set_ylabel(\"Y\")\n    plt.savefig(os.path.join(working_dir, \"environment.png\"), dpi=150)\n    plt.close()\n\n    # Save experiment data\n    np.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\n    np.save(os.path.join(working_dir, \"conflict_memory.npy\"), conflict_memory.memory)\n\n    print(f\"\\nResults saved to {working_dir}\")\n    print(\"- cma_results.png\")\n    print(\"- environment.png\")\n    print(\"- experiment_data.npy\")\n    print(\"- conflict_memory.npy\ goal, constraints=None):\n    \"\"\"A* pathfinding with time-based constraints\"\"\"\n    if constraints is None:\n        constraints = set()\n\n    def heuristic(pos):\n        return abs(pos[0] - goal[0]) + abs(pos[1] - goal[1])\n\n    open_list = [(heuristic(start), 0, start, [start])]\n    closed = set()\n    max_time = env.width * env.height * 2\n\n    while open_list:\n        f, g, pos, path = heapq.heappop(open_list)\n        t = len(path) - 1\n\n        if pos == goal:\n            return path\n\n        if (pos, t) in closed or t > max_time:\n            continue\n        closed.add((pos, t))\n\n        for next_pos in env.get_neighbors(pos):\n            next_t = t + 1\n            if (next_pos, next_t) not in constraints and (\n                pos,\n                next_pos,\n                next_t,\n            ) not in constraints:\n                new_path = path + [next_pos]\n                heapq.heappush(\n                    open_list, (g + 1 + heuristic(next_pos), g + 1, next_pos, new_path)\n                )\n\n    return None\n\n\ndef prioritized_planning(env, starts, goals):\n    \"\"\"Prioritized planning MAPF solver\"\"\"\n    n_agents = len(starts)\n    paths = []\n    constraints = set()\n    conflicts = []\n\n    for i in range(n_agents):\n        path = a_star(env, starts[i], goals[i], constraints)\n        if path is None:\n            # If no path found, use a dummy path\n            path = [starts[i]] * 50\n        paths.append(path)\n\n        # Add constraints for this path\n        for t, pos in enumerate(path):\n            constraints.add((pos, t))\n            if t > 0:\n                # Edge constraint\n                constraints.add((path[t - 1], pos, t))\n\n    # Detect conflicts (for learning)\n    max_len = max(len(p) for p in paths)\n    for t in range(max_len):\n        positions = {}\n        for i, path in enumerate(paths):\n            pos = path[min(t, len(path) - 1)]\n            if pos in positions:\n lude wait\n            new_pos = (x + dx, y + dy)\n            if self.is_valid(new_pos):\n                neighbors.append(new_pos)\n        return neighbors\n\n\n# A* pathfinding\ndef astar(env, start, goal):\n    if start == goal:\n        return [start]\n\n    open_set = [(0, start)]\n    came_from = {}\n    g_score = {start: 0}\n\n    while open_set:\n        _, current = heapq.heappop(open_set)\n\n        if current == goal:\n            path = [current]\n            while current in came_from:\n                current = came_from[current]\n                path.append(current)\n            return path[::-1]\n\n        for neighbor in env.get_neighbors(current):\n            tentative_g = g_score[current] + 1\n            if neighbor not in g_score or tentative_g < g_score[neighbor]:\n                came_from[neighbor] = current\n                g_score[neighbor] = tentative_g\n                f_score = (\n                    tentative_g\n                    + abs(neighbor[0] - goal[0])\n                    + abs(neighbor[1] - goal[1])\n                )\n                heapq.heappush(open_set, (f_score, neighbor))\n\n    return None  # No path found\n\n\n# Simple prioritized planning MAPF solver\ndef prioritized_planning(env, starts, goals, max_timesteps=100):\n    paths = []\n    reservations = defaultdict(set)  # (x, y, t) -> agent_id\n    conflicts = []\n\n    for agent_id, (start, goal) in enumerate(zip(starts, goals)):\n        path = astar_with_reservations(env, start, goal, reservations, max_timesteps)\n        if path is None:\n            # Fallback: use basic path and record conflicts\n            path = astar(env, start, goal)\n            if path is None:\n                path = [start] * 10  # Agent stuck\n\n        # Check and record conflicts\n        for t, pos in enumerate(path):\n            if (pos, t) in reservations:\n                conflicts.append((pos, t, agent_id, reservations[(pos, t)]))\n            reservations[(pos, t)].add(agen
