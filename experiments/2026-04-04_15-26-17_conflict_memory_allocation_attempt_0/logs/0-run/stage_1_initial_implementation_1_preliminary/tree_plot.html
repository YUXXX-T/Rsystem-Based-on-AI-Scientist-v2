periment data tracking\nexperiment_data = {\n    \"cma_experiment\": {\n        \"baseline_makespans\": [],\n        \"cma_makespans\": [],\n        \"improvements\": [],\n        \"conflict_counts_baseline\": [],\n        \"conflict_counts_cma\": [],\n        \"assignment_changes\": [],\n    }\n}\n\n\ndef create_warehouse_map(width=20, height=20):\n    \"\"\"Create warehouse with corridors and chokepoints.\"\"\"\n    grid = np.zeros((height, width), dtype=int)\n    # Add shelf obstacles creating narrow corridors\n    for row in [3, 7, 11, 15]:\n        for col in range(2, width - 2):\n            if col not in [5, 10, 15]:  # Leave gaps for corridors\n                grid[row, col] = 1\n    return grid\n\n\ndef get_neighbors(pos, grid):\n    \"\"\"Get valid neighboring positions.\"\"\"\n    h, w = grid.shape\n    neighbors = []\n    for dy, dx in [(0, 1), (0, -1), (1, 0), (-1, 0)]:\n        ny, nx = pos[0] + dy, pos[1] + dx\n        if 0 <= ny < h and 0 <= nx < w and grid[ny, nx] == 0:\n            neighbors.append((ny, nx))\n    return neighbors\n\n\ndef heuristic(a, b):\n    return abs(a[0] - b[0]) + abs(a[1] - b[1])\n\n\ndef astar_with_reservations(start, goal, grid, reservations, max_time=100):\n    \"\"\"A* with space-time reservations. Returns path, conflicts encountered.\"\"\"\n    conflicts_encountered = []\n\n    if start == goal:\n        return [start], conflicts_encountered\n\n    open_set = [(heuristic(start, goal), 0, start, [start])]\n    closed = set()\n\n    while open_set:\n        f, t, pos, path = heapq.heappop(open_set)\n\n        if t > max_time:\n            continue\n\n        if (pos, t) in closed:\n            continue\n        closed.add((pos, t))\n\n        if pos == goal:\n            return path, conflicts_encountered\n\n        for npos in get_neighbors(pos, grid) + [pos]:  # Include wait action\n            nt = t + 1\n\n            # Check vertex conflict\n            if (npos, nt) in reservations:\n                conflicts_encountered.append((\"vertex\", npos, nt))\n                continue\n\n            # Check edge conflict (swap)\n            if npos != pos:\n                if (pos, nt) in reservations:\n                    # Check if agent at npos is moving to pos\n                    edge_key = (npos, pos, nt)\n                    if edge_key in reservations.get(\"edges\", set()):\n                        conflicts_encountered.append((\"edge\", pos, npos, nt))\n                        continue\n\n            if (npos, nt) not in closed:\n                new_path = path + [npos]\n                heapq.heappush(\n                    open_set, (nt + heuristic(npos, goal), nt, npos, new_path)\n                )\n\n    # Return partial path if no full path found\n    return [start], conflicts_encountered\n\n\ndef prioritized_planning(agents_starts, agents_goals, grid, conflict_memory=None):\n    \"\"\"Plan paths for all agents with priority ordering. Returns paths and conflict info.\"\"\"\n    n_agents = len(agents_starts)\n    reservations = {}\n    reservations[\"edges\"] = set()\n    all_paths = []\n    total_conflicts = []\n    reservation_pressure = np.zeros_like(grid, dtype=float)\n\n    for i in range(n_agents):\n        path, conflicts = astar_with_reservations(\n            agents_starts[i], agents_goals[i], grid, reservations\n        )\n        all_paths.append(path)\n        total_conflicts.extend(conflicts)\n\n        # Add reservations for this agent's path\n        for t, pos in enumerate(path):\n            reservations[(pos, t)] = i\n            reservation_pressure[pos[0], pos[1]] += 1\n\n            # Add edge reservation\n            if t > 0:\n                prev_pos = path[t - 1]\n                if prev_pos != pos:\n                    reservations[\"edges\"].add((prev_pos, pos, t))\n\n        # Extend final position reservation\n        final_pos = path[-1]\n        for t in range(len(path), len(path) + 10):\n            reservations[(final_pos, t)] = i\n\n    return all_paths, total_conflicts, reservation_pressure\n\n\ndef compute_makespan(paths):\n    \"\"\"Compute makespan (time for all agents to reach goals).\"\"\"\n    return max(len(p) for p in paths) if paths else 0\n\n\ndef get_shortest_path_cells(start, goal, grid):\n    \"\"\"Get cells along shortest path for cost estimation.\"\"\"\n    path, _ = astar_with_reservations(start, goal, grid, {}, max_time=200)\n    return path\n\n\ndef greedy_assignment(agents, tasks, cost_matrix):\n    \"\"\"Greedy assignment: each agent picks cheapest unassigned task.\"\"\"\n    n = len(agents)\n    m = len(tasks)\n    assignment = [-1] * n\n    assigned_tasks = set()\n\n    # Sort agents by their minimum cost\n    agent_order = list(range(n))\n\n    for agent in agent_order:\n        best_task = -1\n        best_cost = float(\"inf\")\n        for task in range(m):\n            if task not in assigned_tasks:\n                if cost_matrix[agent, task] < best_cost:\n                    best_cost = cost_matrix[agent, task]\n                    best_task = task\n        if best_task >= 0:\n            assignment[agent] = best_task\n            assigned_tasks.add(best_task)\n\n    return assignment\n\n\ndef hungarian_assignment(cost_matrix):\n    \"\"\"Simple Hungarian-like assignment using auction algorithm.\"\"\"\n    n, m = cost_matrix.shape\n    if n == 0 or m == 0:\n        return []\n\n    assignment = [-1] * n\n    prices = np.zeros(m)\n    epsilon = 1.0 / (n + 1)\n\n    for _ in range(n * 10):  # Iterate until convergence\n        unassigned = [i for i in range(n) if assignment[i] == -1]\n        if not unassigned:\n            break\n\n        for agent in unassigned:\n            # Find best and second-best tasks\n            values = cost_matrix[agent] + prices\n            sorted_idx = np.argsort(values)\n            best_task = sorted_idx[0]\n            best_value = values[best_task]\n\n            if len(sorted_idx) > 1:\n                second_value = values[sorted_idx[1]]\n            else:\n                second_value = best_value + epsilon\n\n            # Check if task is taken\n            current_owner = -1\n            for i in range(n):\n                if assignment[i] == best_task:\n                    current_owner = i\n                    break\n\n            if current_owner >= 0:\n                assignment[current_owner] = -1\n\n            assignment[agent] = best_task\n            prices[best_task] += second_value - best_value + epsilon\n\n    # Fill any remaining unassigned\n    assigned_tasks = set(a for a in assignment if a >= 0)\n    for i in range(n):\n        if assignment[i] == -1:\n            for t in range(m):\n                if t not in assigned_tasks:\n                    assignment[i] = t\n                    assigned_tasks.add(t)\n                    break\n\n    return assignment\n\n\nclass ConflictMemory:\n    \"\"\"Spatial conflict memory map.\"\"\"\n\n    def __init__(self, grid_shape, decay=0.9):\n        self.memory = np.zeros(grid_shape, dtype=float)\n        self.edge_memory = defaultdict(float)\n        self.decay = decay\n        self.update_count = 0\n\n    def update(self, conflicts, reservation_pressure):\n        \"\"\"Update memory from conflicts and reservation pressure.\"\"\"\n        self.memory *= self.decay\n\n        # Add vertex conflicts\n        for conflict in conflicts:\n            if conflict[0] == \"vertex\":\n                pos = conflict[1]\n                self.memory[pos[0], pos[1]] += 1.0\n            elif conflict[0] == \"edge\":\n                pos1, pos2 = conflict[1], conflict[2]\n                self.edge_memory[(pos1, pos2)] += 1.0\n                self.memory[pos1[0], pos1[1]] += 0.5\n                self.memory[pos2[0], pos2[1]] += 0.5\n\n        # Add reservation pressure (normalized)\n        if reservation_pressure.max() > 0:\n            normalized_pressure = reservation_pressure / reservation_pressure.max()\n            self.memory += normalized_pressure * 0.3\n\n        self.update_count += 1\n\n    def get_path_penalty(self, path_cells, penalty_weight=1.0):\n        \"\"\"Compute penalty for a path based on conflict memory.\"\"\"\n        if not path_cells:\n            return 0.0\n        penalty = 0.0\n        for cell in path_cells:\n            penalty += self.memory[cell[0], cell[1]]\n        return penalty * penalty_weight\n\n    def freeze(self):\n        \"\"\"Return a frozen copy for evaluation.\"\"\"\n        frozen = ConflictMemory(self.memory.shape, self.decay)\n        frozen.memory = self.memory.copy()\n        frozen.edge_memory = self.edge_memory.copy()\n        frozen.update_count = self.update_count\n        return frozen\n\n\ndef compute_cost_matrix(agents, tasks, grid, conflict_memory=None, penalty_weight=2.0):\n    \"\"\"Compute assignment cost matrix with optional CMA penalties.\"\"\"\n    n_agents = len(agents)\n    n_tasks = len(tasks)\n    cost_matrix = np.zeros((n_agents, n_tasks))\n\n    for i, agent_pos in enumerate(agents):\n        for j, task_pos in enumerate(tasks):\n            # Base cost: path length\n            path_cells = get_shortest_path_cells(agent_pos, task_pos, grid)\n            base_cost = len(path_cells)\n\n            # Add conflict memory penalty\n            if conflict_memory is not None:\n                penalty = conflict_memory.get_path_penalty(path_cells, penalty_weight)\n                cost_matrix[i, j] = base_cost + penalty\n            else:\n                cost_matrix[i, j] = base_cost\n\n    return cost_matrix\n\n\ndef run_episode(\n    grid, n_agents, conflict_memory=None, use_cma=False, penalty_weight=2.0\n):\n    \"\"\"Run a single episode with task allocation and path planning.\"\"\"\n    h, w = grid.shape\n\n    # Generate random start positions (on free cells)\n    free_cells = [(i, j) for i in range(h) for j in range(w) if grid[i, j] == 0]\n\n    if len(free_cells) < n_agents * 2:\n        raise ValueError(\"Not enough free cells for agents and tasks\")\n\n    np.random.shuffle(free_cells)\n    agent_starts = free_cells[:n_agents]\n    task_positions = free_cells[n_agents : n_agents * 2]\n\n    # Compute cost matrix\n    if use_cma and conflict_memory is not None:\n        cost_matrix = compute_cost_matrix(\n            agent_starts, task_positions, grid, conflict_memory, penalty_weight\n        )\n    else:\n        cost_matrix = compute_cost_matrix(agent_starts, task_positions, grid)\n\n    # Assignment\n    assignment = hungarian_assignment(cost_matrix)\n\n    # Get agent goals based on assignment\n    agent_goals = []\n    for i, task_idx in enumerate(assignment):\n        if task_idx >= 0 and task_idx < len(task_positions):\n            agent_goals.append(task_positions[task_idx])\n        else:\n            agent_goals.append(agent_starts[i])  # Stay in place if no task\n\n    # Path planning\n    paths, conflicts, reservation_pressure = prioritized_planning(\n        agent_starts, agent_goals, grid\n    )\n\n    makespan = compute_makespan(paths)\n\n    return {\n        \"makespan\": makespan,\n        \"conflicts\": conflicts,\n        \"reservation_pressure\": reservation_pressure,\n        \"paths\": paths,\n        \"assignment\": assignment,\n        \"agent_starts\": agent_starts,\n        \"task_positions\": task_positions,\n    }\n\n\ndef run_experiment(n_warmup=30, n_eval=50, n_agents=6, penalty_weight=2.5):\n    \"\"\"Run full CMA experiment.\"\"\"\n    print(f\"\\n{'='*60}\")\n    print(f\"Running CMA Experiment\")\n    print(f\"Warmup episodes: {n_warmup}, Eval episodes: {n_eval}\")\n    print(f\"Agents: {n_agents}, Penalty weight: {penalty_weight}\")\n    print(f\"{'='*60}\\n\")\n\n    # Create warehouse map\n    grid = create_warehouse_map(20, 20)\n    print(f\"Grid size: {grid.shape}, Free cells: {np.sum(grid == 0)}\")\n\n    # Initialize conflict memory\n    conflict_memory = ConflictMemory(grid.shape, decay=0.95)\n\n    # Warmup phase: build conflict memory\n    print(\"\\n--- Warmup Phase ---\")\n    warmup_conflicts_total = 0\n    for ep in range(n_warmup):\n        np.random.seed(ep)\n        result = run_episode(grid, n_agents, conflict_memory=None, use_cma=False)\n\n        # Update conflict memory\n        conflict_memory.update(result[\"conflicts\"], result[\"reservation_pressure\"])\n        warmup_conflicts_total += len(result[\"conflicts\"])\n\n        if (ep + 1) % 10 == 0:\n            print(\n                f\"Warmup episode {ep+1}: makespan={result['makespan']}, \"\n                f\"conflicts={len(result['conflicts'])}, \"\n                f\"memory_max={conflict_memory.memory.max():.2f}\"\n            )\n\n    print(f\"\\nWarmup complete. Total conflicts recorded: {warmup_conflicts_total}\")\n    print(\n        f\"Memory statistics: max={conflict_memory.memory.max():.3f}, \"\n        f\"mean={conflict_memory.memory.mean():.3f}, \"\n        f\"nonzero cells={np.sum(conflict_memory.memory > 0.01)}\"\n    )\n\n    # Freeze memory for evaluation\n    frozen_memory = conflict_memory.freeze()\n\n    # Evaluation phase\n    print(\"\\n--- Evaluation Phase ---\")\n    baseline_makespans = []\n    cma_makespans = []\n    baseline_conflicts = []\n    cma_conflicts = []\n    assignment_changes = []\n\n    for ep in range(n_eval):\n        seed = n_warmup + ep\n\n        # Baseline run\n        np.random.seed(seed)\n        baseline_result = run_episode(\n            grid, n_agents, conflict_memory=None, use_cma=False\n        )\n\n        # CMA run (same seed for identical initial conditions)\n        np.random.seed(seed)\n        cma_result = run_episode(\n            grid,\n            n_agents,\n            conflict_memory=frozen_memory,\n            use_cma=True,\n            penalty_weight=penalty_weight,\n        )\n\n        baseline_makespans.append(baseline_result[\"makespan\"])\n        cma_makespans.append(cma_result[\"makespan\"])\n        baseline_conflicts.append(len(baseline_result[\"conflicts\"]))\n        cma_conflicts.append(len(cma_result[\"conflicts\"]))\n\n        # Check if assignments differ\n        assignments_differ = baseline_result[\"assignment\"] != cma_result[\"assignment\"]\n        if isinstance(assignments_differ, np.ndarray):\n            assignments_differ = assignments_differ.any()\n        assignment_changes.append(int(assignments_differ))\n\n        if (ep + 1) % 10 == 0:\n            print(\n                f\"Eval episode {ep+1}: baseline_makespan={baseline_result['makespan']}, \"\n                f\"cma_makespan={cma_result['makespan']}, \"\n                f\"assignment_changed={assignments_differ}\"\n            )\n\n    # Store results\n    experiment_data[\"cma_experiment\"][\"baseline_makespans\"] = baseline_makespans\n    experiment_data[\"cma_experiment\"][\"cma_makespans\"] = cma_makespans\n    experiment_data[\"cma_experiment\"][\"conflict_counts_baseline\"] = baseline_conflicts\n    experiment_data[\"cma_experiment\"][\"conflict_counts_cma\"] = cma_conflicts\n    experiment_data[\"cma_experiment\"][\"assignment_changes\"] = assignment_changes\n\n    # Compute metrics\n    baseline_mean = np.mean(baseline_makespans)\n    cma_mean = np.mean(cma_makespans)\n\n    improvements = [\n        (b - c) / b if b > 0 else 0 for b, c in zip(baseline_makespans, cma_makespans)\n    ]\n    experiment_data[\"cma_experiment\"][\"improvements\"] = improvements\n\n    makespan_improvement_ratio = (\n        (baseline_mean - cma_mean) / baseline_mean if baseline_mean > 0 else 0\n    )\n\n    # Print results\n    print(f\"\\n{'='*60}\")\n    print(\"RESULTS SUMMARY\")\n    print(f\"{'='*60}\")\n    print(\n        f\"Baseline average makespan: {baseline_mean:.2f} (std: {np.std(baseline_makespans):.2f})\"\n    )\n    print(\n        f\"CMA average makespan:      {cma_mean:.2f} (std: {np.std(cma_makespans):.2f})\"\n    )\n    print(\n        f\"Makespan improvement ratio: {makespan_improvement_ratio:.4f} ({makespan_improvement_ratio*100:.2f}%)\"\n    )\n    print(f\"Assignment change rate: {np.mean(assignment_changes)*100:.1f}%\")\n    print(f\"Baseline avg conflicts: {np.mean(baseline_conflicts):.2f}\")\n    print(f\"CMA avg conflicts: {np.mean(cma_conflicts):.2f}\")\n\n    return makespan_improvement_ratio, frozen_memory, grid\n\n\ndef visualize_results(conflict_memory, grid):\n    \"\"\"Visualize conflict memory and results.\"\"\"\n    fig, axes = plt.subplots(1, 3, figsize=(15, 5))\n\n    # Plot 1: Grid layout\n    ax1 = axes[0]\n    ax1.imshow(grid, cmap=\"binary\", origin=\"upper\")\n    ax1.set_title(\"Warehouse Layout (black=obstacle)\")\n    ax1.set_xlabel(\"X\")\n    ax1.set_ylabel(\"Y\")\n\n    # Plot 2: Conflict memory heatmap\n    ax2 = axes[1]\n    im = ax2.imshow(conflict_memory.memory, cmap=\"hot\", origin=\"upper\")\n    ax2.set_title(\"Conflict Memory Map\")\n    ax2.set_xlabel(\"X\")\n    ax2.set_ylabel(\"Y\")\n    plt.colorbar(im, ax=ax2)\n\n    # Plot 3: Makespan comparison\n    ax3 = axes[2]\n    baseline_makespans = experiment_data[\"cma_experiment\"][\"baseline_makespans\"]\n    cma_makespans = experiment_data[\"cma_experiment\"][\"cma_makespans\"]\n\n    x = np.arange(len(baseline_makespans))\n    ax3.plot(x, baseline_makespans, \"b-\", alpha=0.7, label=\"Baseline\")\n    ax3.plot(x, cma_makespans, \"r-\", alpha=0.7, label=\"CMA\")\n    ax3.axhline(\n        np.mean(baseline_makespans),\n        color=\"b\",\n        linestyle=\"--\",\n        label=f\"Baseline mean: {np.mean(baseline_makespans):.1f}\",\n    )\n    ax3.axhline(\n        np.mean(cma_makespans),\n        color=\"r\",\n        linestyle=\"--\",\n        label=f\"CMA mean: {np.mean(cma_makespans):.1f}\",\n    )\n    ax3.set_xlabel(\"Episode\")\n    ax3.set_ylabel(\"Makespan\")\n    ax3.set_title(\"Makespan Comparison\")\n    ax3.legend()\n\n    plt.tight_layout()\n    plt.savefig(os.path.join(working_dir, \"cma_results.png\"), dpi=150)\n    plt.close()\n    print(f\"\\nVisualization saved to {os.path.join(working_dir, 'cma_results.png')}\")\n\n\ndef run_parameter_sweep():\n    \"\"\"Sweep penalty weights to find best configuration.\"\"\"\n    print(\"\\n\" + \"=\" * 60)\n    print(\"PARAMETER SWEEP\")\n    print(\"=\" * 60)\n\n    penalty_weights = [0.5, 1.0, 2.0, 3.0, 5.0]\n    results = []\n\n    for pw in penalty_weights:\n        print(f\"\\nTesting penalty_weight = {pw}\")\n        improvement, _, _ = run_experiment(\n            n_warmup=20, n_eval=30, n_agents=6, penalty_weight=pw\n        )\n        results.append((pw, improvement))\n        print(f\"  -> Improvement ratio: {improvement:.4f}\")\n\n    best_pw, best_improvement = max(results, key=lambda x: x[1])\n    print(f\"\\nBest penalty weight: {best_pw} with improvement: {best_improvement:.4f}\")\n\n    return best_pw, results\n\n\n# Main execution\nprint(\"=\" * 60)\nprint(\"Conflict Memory Allocation (CMA) Experiment\")\nprint(\"=\" * 60)\n\n# Run main experiment with default parameters\nmain_improvement, conflict_memory, grid = run_experiment(\n    n_warmup=40, n_eval=60, n_agents=6, penalty_weight=2.5\n)\n\n# Visualize results\nvisualize_results(conflict_memory, grid)\n\n# Run parameter sweep to find best configuration\nbest_pw, sweep_results = run_parameter_sweep()\n\n# Final run with best parameters\nprint(\"\\n\" + \"=\" * 60)\nprint(\"FINAL RUN WITH BEST PARAMETERS\")\nprint(\"=\" * 60)\nfinal_improvement, final_memory, final_grid = run_experiment(\n    n_warmup=50, n_eval=80, n_agents=7, penalty_weight=best_pw\n)\n\n# Save experiment data\nexperiment_data[\"sweep_results\"] = sweep_results\nexperiment_data[\"best_penalty_weight\"] = best_pw\nexperiment_data[\"final_improvement\"] = final_improvement\n\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(f\"\\nExperiment data saved to {os.path.join(working_dir, 'experiment_data.npy')}\")\n\n# Final summary\nprint(\"\\n\" + \"=\" * 60)\nprint(\"FINAL SUMMARY\")\nprint(\"=\" * 60)\nprint(f\"Main experiment makespan_improvement_ratio: {main_improvement:.4f}\")\nprint(f\"Final experiment makespan_improvement_ratio: {final_improvement:.4f}\")\nprint(f\"Best penalty weight from sweep: {best_pw}\")\nprint(f\"Target improvement range: 0.15-0.25 (15-25%)\")\n\nif final_improvement > 0:\n    print(f\"\\nCMA shows POSITIVE improvement of {final_improvement*100:.2f}%\")\nelse:\n    print(\n        f\"\\nCMA shows no improvement or negative result: {final_improvement*100:.2f}%\"\n    )\n", "import os\nimport numpy as np\nimport heapq\nfrom collections import defaultdict\nimport torch\nimport matplotlib.pyplot as plt\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n# Try to import scipy, fallback to greedy if not available\ntry:\n    from scipy.optimize import linear_sum_assignment\n\n    USE_HUNGARIAN = True\n    print(\"Using Hungarian algorithm (scipy)\")\nexcept ImportError:\n    USE_HUNGARIAN = False\n    print(\"Using greedy assignment (scipy not available)\")\n\nexperiment_data = {\n    \"cma_experiment\": {\n        \"warmup_conflicts\": [],\n        \"baseline_makespans\": [],\n        \"cma_makespans\": [],\n        \"improvement_ratios\": [],\n        \"memory_stats\": [],\n        \"assignment_changes\": [],\n    }\n}\n\n\nclass WarehouseEnv:\n    \"\"\"Grid warehouse with narrow corridors creating chokepoints\"\"\"\n\n    def __init__(self, width=20, height=20, seed=42):\n        np.random.seed(seed)\n        self.width = width\n        self.height = height\n        self.grid = np.zeros((height, width), dtype=int)\n\n        # Create obstacles with chokepoints (narrow passages)\n        # Horizontal walls with gaps\n        for y in [5, 10, 15]:\n            for x in range(width):\n                if x not in [3, 10, 16]:  # Leave narrow gaps\n                    self.grid[y, x] = 1\n        # Vertical walls with gaps\n        for x in [5, 15]:\n            for y in range(height):\n                if y not in [2, 7, 12, 17]:\n                    self.grid[y, x] = 1\n\n        # Find all free cells\n        self.free_cells = [\n            (y, x) for y in range(height) for x in range(width) if self.grid[y, x] == 0\n        ]\n\n    def is_valid(self, y, x):\n        return 0 <= y < self.height and 0 <= x < self.width and self.grid[y, x] == 0\n\n    def get_neighbors(self, y, x):\n        neighbors = []\n        for dy, dx in [(0, 1), (0, -1), (1, 0), (-1, 0)]:\n            ny, nx = y + dy, x + dx\n            if self.is_valid(ny, nx):\n                neighbors.append((ny, nx))\n        return neighbors\n\n\nclass ConflictMemory:\n    \"\"\"Maintains spatial-temporal conflict statistics\"\"\"\n\n    def __init__(self, height, width, max_time=100, decay=0.95):\n        self.height = height\n        self.width = width\n        self.max_time = max_time\n        self.decay = decay\n\n        # Vertex conflict memory: counts at (y, x, t % max_time)\n        self.vertex_memory = np.zeros((height, width, max_time), dtype=np.float32)\n        # Edge conflict memory: counts for edges\n        self.edge_memory = defaultdict(float)\n        # Spatial summary (time-aggregated)\n        self.spatial_memory = np.zeros((height, width), dtype=np.float32)\n\n    def record_conflict(self, y, x, t, weight=1.0):\n        \"\"\"Record a conflict or near-conflict at location\"\"\"\n        t_mod = t % self.max_time\n        self.vertex_memory[y, x, t_mod] += weight\n        self.spatial_memory[y, x] += weight\n\n    def record_edge_conflict(self, y1, x1, y2, x2, t, weight=1.0):\n        \"\"\"Record edge conflict (swap conflict)\"\"\"\n        edge = (min((y1, x1), (y2, x2)), max((y1, x1), (y2, x2)), t % self.max_time)\n        self.edge_memory[edge] += weight\n\n    def record_wait(self, y, x, t, weight=0.5):\n        \"\"\"Record waiting (congestion indicator)\"\"\"\n        self.record_conflict(y, x, t, weight)\n\n    def get_path_penalty(self, path):\n        \"\"\"Compute penalty for a given path based on memory\"\"\"\n        if not path:\n            return 0.0\n        penalty = 0.0\n        for t, (y, x) in enumerate(path):\n            t_mod = t % self.max_time\n            penalty += self.vertex_memory[y, x, t_mod]\n            penalty += self.spatial_memory[y, x] * 0.1  # Spatial component\n        return penalty\n\n    def get_cell_penalty(self, y, x):\n        \"\"\"Get aggregated penalty for a cell\"\"\"\n        return self.spatial_memory[y, x]\n\n    def decay_memory(self):\n        \"\"\"Apply decay to memory\"\"\"\n        self.vertex_memory *= self.decay\n        self.spatial_memory *= self.decay\n        for k in self.edge_memory:\n            self.edge_memory[k] *= self.decay\n\n    def get_stats(self):\n        return {\n            \"max\": float(self.spatial_memory.max()),\n            \"mean\": float(self.spatial_memory.mean()),\n            \"nonzero\": int(np.sum(self.spatial_memory > 0.01)),\n        }\n\n\ndef astar(env, start, goal, reservation_table=None, max_time=200):\n    \"\"\"A* with optional reservation table, returns path and conflict info\"\"\"\n    if start == goal:\n        return [start], 0\n\n    conflicts_encountered = []\n    waits_encountered = []\n\n    # State: (y, x, t)\n    open_set = [(0, 0, start[0], start[1], 0)]  # (f, g, y, x, t)\n    came_from = {}\n    g_score = {(start[0], start[1], 0): 0}\n\n    while open_set:\n        f, g, y, x, t = heapq.heappop(open_set)\n\n        if (y, x) == goal:\n            # Reconstruct path\n            path = [(y, x)]\n            state = (y, x, t)\n            while state in came_from:\n                state = came_from[state]\n                path.append((state[0], state[1]))\n            path.reverse()\n            return path, len(conflicts_encountered) + len(waits_encountered)\n\n        if t >= max_time - 1:\n            continue\n\n        # Try moving to neighbors or waiting\n        moves = env.get_neighbors(y, x) + [(y, x)]  # Include wait\n\n        for ny, nx in moves:\n            nt = t + 1\n            new_state = (ny, nx, nt)\n            new_g = g + 1\n\n            # Check reservation table\n            blocked = False\n            if reservation_table is not None:\n                # Vertex conflict\n                if (ny, nx, nt) in reservation_table:\n                    blocked = True\n                    conflicts_encountered.append((ny, nx, nt))\n                # Edge conflict (swap)\n                if (y, x, nt) in reservation_table and (ny, nx, t) in reservation_table:\n                    blocked = True\n                    conflicts_encountered.append((ny, nx, nt))\n\n            if blocked:\n                continue\n\n            if new_state not in g_score or new_g < g_score[new_state]:\n                g_score[new_state] = new_g\n                h = abs(ny - goal[0]) + abs(nx - goal[1])\n                f = new_g + h\n                heapq.heappush(open_set, (f, new_g, ny, nx, nt))\n                came_from[new_state] = (y, x, t)\n\n                if (ny, nx) == (y, x):  # Wait action\n                    waits_encountered.append((y, x, t))\n\n    return None, 0  # No path found\n\n\ndef compute_shortest_path(env, start, goal):\n    \"\"\"Compute shortest path length without reservations\"\"\"\n    path, _ = astar(env, start, goal, None)\n    return len(path) - 1 if path else 1000\n\n\ndef prioritized_planning(\n    env, agents_starts, agents_goals, memory=None, record_to_memory=False\n):\n    \"\"\"\n    Prioritized planning: plan agents one by one, reserving paths.\n    Returns paths, makespan, and conflict statistics.\n    \"\"\"\n    n_agents = len(agents_starts)\n    reservation_table = set()\n    paths = []\n    total_conflicts = 0\n    total_waits = 0\n\n    for i in range(n_agents):\n        start = agents_starts[i]\n        goal = agents_goals[i]\n\n        path, conflicts = astar(env, start, goal, reservation_table)\n\n        if path is None:\n            # If no path, wait at start\n            path = [start] * 50\n\n        paths.append(path)\n\n        # Record to memory: cells used and any conflicts/waits\n        if record_to_memory and memory is not None:\n            for t, (y, x) in enumerate(path):\n                # Record usage as potential congestion\n                memory.record_conflict(y, x, t, weight=0.1)\n\n                # Check if we had to wait\n                if t > 0 and path[t] == path[t - 1]:\n                    memory.record_wait(y, x, t, weight=1.0)\n                    total_waits += 1\n\n                # Check proximity to reservations (near-conflicts)\n                if (y, x, t) in reservation_table:\n                    memory.record_conflict(y, x, t, weight=2.0)\n                    total_conflicts += 1\n\n        # Add path to reservation table\n        for t, (y, x) in enumerate(path):\n            reservation_table.add((y, x, t))\n            # Also reserve for edge conflicts\n            if t > 0:\n                py, px = path[t - 1]\n                reservation_table.add((py, px, t))\n\n    # Compute makespan\n    makespan = max(len(p) for p in paths)\n\n    return paths, makespan, total_conflicts, total_waits\n\n\ndef greedy_assignment(cost_matrix):\n    \"\"\"Greedy assignment fallback\"\"\"\n    n, m = cost_matrix.shape\n    assignment = []\n    used_tasks = set()\n\n    for agent in range(n):\n        best_task = None\n        best_cost = float(\"inf\")\n        for task in range(m):\n            if task not in used_tasks and cost_matrix[agent, task] < best_cost:\n                best_cost = cost_matrix[agent, task]\n                best_task = task\n        if best_task is not None:\n            assignment.append(best_task)\n            used_tasks.add(best_task)\n        else:\n            # Assign to first available\n            for task in range(m):\n                if task not in used_tasks:\n                    assignment.append(task)\n                    used_tasks.add(task)\n                    break\n    return assignment\n\n\ndef compute_assignment(cost_matrix, use_hungarian=USE_HUNGARIAN):\n    \"\"\"Compute optimal or greedy assignment\"\"\"\n    if use_hungarian:\n        row_ind, col_ind = linear_sum_assignment(cost_matrix)\n        return col_ind.tolist()\n    else:\n        return greedy_assignment(cost_matrix)\n\n\ndef run_allocation(env, agent_starts, task_locations, memory=None, penalty_weight=0.0):\n    \"\"\"\n    Compute task allocation with optional conflict memory penalties.\n    Returns assignment and cost matrix.\n    \"\"\"\n    n_agents = len(agent_starts)\n    n_tasks = len(task_locations)\n\n    cost_matrix = np.zeros((n_agents, n_tasks), dtype=np.float32)\n\n    for i, start in enumerate(agent_starts):\n        for j, goal in enumerate(task_locations):\n            # Base cost: shortest path length\n            base_cost = compute_shortest_path(env, start, goal)\n\n            # Memory penalty: sum of memory along approximate path\n            mem_penalty = 0.0\n            if memory is not None and penalty_weight > 0:\n                # Use cells along Manhattan path as approximation\n                y1, x1 = start\n                y2, x2 = goal\n                # Sample cells along path\n                steps = max(abs(y2 - y1), abs(x2 - x1), 1)\n                for s in range(steps + 1):\n                    t = s / steps\n                    cy = int(y1 + t * (y2 - y1))\n                    cx = int(x1 + t * (x2 - x1))\n                    cy = min(max(cy, 0), env.height - 1)\n                    cx = min(max(cx, 0), env.width - 1)\n                    mem_penalty += memory.get_cell_penalty(cy, cx)\n\n            cost_matrix[i, j] = base_cost + penalty_weight * mem_penalty\n\n    assignment = compute_assignment(cost_matrix)\n    return assignment, cost_matrix\n\n\ndef generate_scenario(env, n_agents, seed):\n    \"\"\"Generate random agent starts and task locations\"\"\"\n    np.random.seed(seed)\n    cells = env.free_cells.copy()\n    np.random.shuffle(cells)\n\n    agent_starts = [cells[i] for i in range(n_agents)]\n    task_locations = [cells[n_agents + i] for i in range(n_agents)]\n\n    return agent_starts, task_locations\n\n\ndef run_episode(\n    env,\n    n_agents,\n    seed,\n    memory=None,\n    use_cma=False,\n    penalty_weight=5.0,\n    record_to_memory=False,\n):\n    \"\"\"Run a single episode and return results\"\"\"\n    agent_starts, task_locations = generate_scenario(env, n_agents, seed)\n\n    # Compute assignment\n    pw = penalty_weight if use_cma else 0.0\n    assignment, cost_matrix = run_allocation(\n        env, agent_starts, task_locations, memory, pw\n    )\n\n    # Reorder goals according to assignment\n    assigned_goals = [task_locations[assignment[i]] for i in range(n_agents)]\n\n    # Run prioritized planning\n    paths, makespan, conflicts, waits = prioritized_planning(\n        env,\n        agent_starts,\n        assigned_goals,\n        memory=memory if record_to_memory else None,\n        record_to_memory=record_to_memory,\n    )\n\n    return {\n        \"makespan\": makespan,\n        \"conflicts\": conflicts,\n        \"waits\": waits,\n        \"assignment\": assignment,\n        \"paths\": paths,\n    }\n\n\n# Main experiment\nprint(\"\\n=== CMA Experiment ===\\n\")\n\n# Environment setup\nenv = WarehouseEnv(width=20, height=20, seed=42)\nprint(\n    f\"Environment: {env.width}x{env.height} grid with {len(env.free_cells)} free cells\"\n)\n\n# Initialize conflict memory\nmemory = ConflictMemory(env.height, env.width, max_time=100, decay=0.98)\n\n# Parameters\nn_agents = 8\nn_warmup_episodes = 30\nn_eval_episodes = 20\npenalty_weight = 5.0\n\n# Phase 1: Warmup - build conflict memory\nprint(f\"\\n--- Phase 1: Warmup ({n_warmup_episodes} episodes) ---\")\nwarmup_conflicts = []\n\nfor ep in range(n_warmup_episodes):\n    result = run_episode(\n        env, n_agents, seed=ep * 7, memory=memory, use_cma=False, record_to_memory=True\n    )\n    warmup_conflicts.append(result[\"conflicts\"] + result[\"waits\"])\n\n    if (ep + 1) % 10 == 0:\n        stats = memory.get_stats()\n        print(\n            f\"Episode {ep+1}: makespan={result['makespan']}, conflicts={result['conflicts']}, \"\n            f\"waits={result['waits']}, memory_max={stats['max']:.2f}, memory_nonzero={stats['nonzero']}\"\n        )\n\nexperiment_data[\"cma_experiment\"][\"warmup_conflicts\"] = warmup_conflicts\nprint(f\"\\nWarmup complete. Memory stats: {memory.get_stats()}\")\n\n# Phase 2: Evaluation - compare baseline vs CMA on same scenarios\nprint(f\"\\n--- Phase 2: Evaluation ({n_eval_episodes} episodes) ---\")\n\nbaseline_makespans = []\ncma_makespans = []\nimprovement_ratios = []\nassignment_changes = []\n\nfor ep in range(n_eval_episodes):\n    eval_seed = 1000 + ep * 13  # Different seeds from warmup\n\n    # Baseline: no memory penalty\n    baseline_result = run_episode(\n        env,\n        n_agents,\n        seed=eval_seed,\n        memory=None,\n        use_cma=False,\n        record_to_memory=False,\n    )\n\n    # CMA: with memory penalty\n    cma_result = run_episode(\n        env,\n        n_agents,\n        seed=eval_seed,\n        memory=memory,\n        use_cma=True,\n        penalty_weight=penalty_weight,\n        record_to_memory=False,\n    )\n\n    baseline_makespans.append(baseline_result[\"makespan\"])\n    cma_makespans.append(cma_result[\"makespan\"])\n\n    # Compute improvement ratio\n    if baseline_result[\"makespan\"] > 0:\n        improvement = (\n            baseline_result[\"makespan\"] - cma_result[\"makespan\"]\n        ) / baseline_result[\"makespan\"]\n    else:\n        improvement = 0.0\n    improvement_ratios.append(improvement)\n\n    # Check if assignment changed\n    assign_changed = baseline_result[\"assignment\"] != cma_result[\"assignment\"]\n    n_changes = sum(\n        1\n        for a, b in zip(baseline_result[\"assignment\"], cma_result[\"assignment\"])\n        if a != b\n    )\n    assignment_changes.append(n_changes)\n\n    print(\n        f\"Ep {ep+1}: baseline_makespan={baseline_result['makespan']}, \"\n        f\"cma_makespan={cma_result['makespan']}, improvement={improvement:.3f}, \"\n        f\"assign_changes={n_changes}/{n_agents}\"\n    )\n\n# Store results\nexperiment_data[\"cma_experiment\"][\"baseline_makespans\"] = baseline_makespans\nexperiment_data[\"cma_experiment\"][\"cma_makespans\"] = cma_makespans\nexperiment_data[\"cma_experiment\"][\"improvement_ratios\"] = improvement_ratios\nexperiment_data[\"cma_experiment\"][\"assignment_changes\"] = assignment_changes\nexperiment_data[\"cma_experiment\"][\"memory_stats\"] = [memory.get_stats()]\n\n# Final statistics\nprint(\"\\n=== Final Results ===\")\navg_baseline = np.mean(baseline_makespans)\navg_cma = np.mean(cma_makespans)\navg_improvement = np.mean(improvement_ratios)\nstd_improvement = np.std(improvement_ratios)\n\nprint(f\"Average Baseline Makespan: {avg_baseline:.2f}\")\nprint(f\"Average CMA Makespan: {avg_cma:.2f}\")\nprint(f\"Average Improvement Ratio: {avg_improvement:.4f} (std: {std_improvement:.4f})\")\nprint(\n    f\"Episodes with assignment changes: {sum(1 for c in assignment_changes if c > 0)}/{n_eval_episodes}\"\n)\nprint(f\"Average assignments changed per episode: {np.mean(assignment_changes):.2f}\")\n\n# Key metric\nprint(f\"\\n>>> makespan_improvement_ratio = {avg_improvement:.4f} <<<\")\n\n# Visualizations\nfig, axes = plt.subplots(2, 2, figsize=(12, 10))\n\n# 1. Makespan comparison\nax1 = axes[0, 0]\nepisodes = range(1, n_eval_episodes + 1)\nax1.plot(episodes, baseline_makespans, \"b-o\", label=\"Baseline\", alpha=0.7)\nax1.plot(episodes, cma_makespans, \"r-s\", label=\"CMA\", alpha=0.7)\nax1.set_xlabel(\"Evaluation Episode\")\nax1.set_ylabel(\"Makespan\")\nax1.set_title(\"Makespan Comparison: Baseline vs CMA\")\nax1.legend()\nax1.grid(True, alpha=0.3)\n\n# 2. Improvement ratio per episode\nax2 = axes[0, 1]\ncolors = [\"green\" if r > 0 else \"red\" for r in improvement_ratios]\nax2.bar(episodes, improvement_ratios, color=colors, alpha=0.7)\nax2.axhline(y=0, color=\"black\", linestyle=\"-\", linewidth=0.5)\nax2.axhline(\n    y=avg_improvement,\n    color=\"blue\",\n    linestyle=\"--\",\n    label=f\"Mean: {avg_improvement:.3f}\",\n)\nax2.set_xlabel(\"Evaluation Episode\")\nax2.set_ylabel(\"Improvement Ratio\")\nax2.set_title(\"Makespan Improvement Ratio per Episode\")\nax2.legend()\nax2.grid(True, alpha=0.3)\n\n# 3. Conflict memory heatmap\nax3 = axes[1, 0]\nim = ax3.imshow(memory.spatial_memory, cmap=\"hot\", interpolation=\"nearest\")\nax3.set_title(\"Conflict Memory Map (Spatial)\")\nax3.set_xlabel(\"X\")\nax3.set_ylabel(\"Y\")\nplt.colorbar(im, ax=ax3, label=\"Conflict Intensity\")\n\n# 4. Assignment changes histogram\nax4 = axes[1, 1]\nax4.bar(episodes, assignment_changes, color=\"purple\", alpha=0.7)\nax4.set_xlabel(\"Evaluation Episode\")\nax4.set_ylabel(\"Number of Changed Assignments\")\nax4.set_title(f\"Assignment Changes (CMA vs Baseline)\")\nax4.grid(True, alpha=0.3)\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"cma_experiment_results.png\"), dpi=150)\nplt.close()\n\n# Save environment visualization\nfig2, ax = plt.subplots(figsize=(8, 8))\nax.imshow(env.grid, cmap=\"binary\", interpolation=\"nearest\")\nax.set_title(\"Warehouse Environment (black=obstacles)\")\nax.set_xlabel(\"X\")\nax.set_ylabel(\"Y\")\nplt.savefig(os.path.join(working_dir, \"warehouse_environment.png\"), dpi=150)\nplt.close()\n\n# Save experiment data\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(f\"\\nResults saved to {working_dir}\")\n\n# Summary statistics\nprint(\"\\n=== Summary Statistics ===\")\nprint(\n    f\"Baseline makespan: mean={avg_baseline:.2f}, std={np.std(baseline_makespans):.2f}\"\n)\nprint(f\"CMA makespan: mean={avg_cma:.2f}, std={np.std(cma_makespans):.2f}\")\nprint(f\"Improvement ratio: mean={avg_improvement:.4f}, std={std_improvement:.4f}\")\nprint(f\"Memory nonzero cells: {memory.get_stats()['nonzero']}\")\nprint(f\"Memory max value: {memory.get_stats()['max']:.2f}\")\n", "import os\nimport numpy as np\nimport heapq\nfrom collections import defaultdict\nimport torch\nimport matplotlib.pyplot as plt\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n# Experiment data storage\nexperiment_data = {\n    \"cma_experiment\": {\n        \"baseline_makespans\": [],\n        \"cma_makespans\": [],\n        \"improvement_ratios\": [],\n        \"conflict_counts_baseline\": [],\n        \"conflict_counts_cma\": [],\n        \"memory_stats\": [],\n        \"assignment_changes\": [],\n    }\n}\n\n\n# Pure Python Hungarian Algorithm\ndef hungarian_assignment(cost_matrix):\n    \"\"\"Simple Hungarian algorithm implementation for small matrices.\"\"\"\n    n, m = cost_matrix.shape\n    if n > m:\n        cost_matrix = np.pad(cost_matrix, ((0, 0), (0, n - m)), constant_values=1e9)\n    elif m > n:\n        cost_matrix = np.pad(cost_matrix, ((0, m - n), (0, 0)), constant_values=1e9)\n\n    n = cost_matrix.shape[0]\n    u = np.zeros(n + 1)\n    v = np.zeros(n + 1)\n    p = np.zeros(n + 1, dtype=int)\n    way = np.zeros(n + 1, dtype=int)\n\n    for i in range(1, n + 1):\n        p[0] = i\n        j0 = 0\n        minv = np.full(n + 1, np.inf)\n        used = np.zeros(n + 1, dtype=bool)\n\n        while p[j0] != 0:\n            used[j0] = True\n            i0 = p[j0]\n            delta = np.inf\n            j1 = 0\n\n            for j in range(1, n + 1):\n                if not used[j]:\n                    cur = cost_matrix[i0 - 1, j - 1] - u[i0] - v[j]\n                    if cur < minv[j]:\n                        minv[j] = cur\n                        way[j] = j0\n                    if minv[j] < delta:\n                        delta = minv[j]\n                        j1 = j\n\n            for j in range(n + 1):\n                if used[j]:\n                    u[p[j]] += delta\n                    v[j] -= delta\n                else:\n                    minv[j] -= delta\n\n            j0 = j1\n\n        while j0:\n            j1 = way[j0]\n            p[j0] = p[j1]\n            j0 = j1\n\n    row_ind = []\n    col_ind = []\n    for j in range(1, n + 1):\n        if p[j] > 0 and p[j] <= cost_matrix.shape[0] and j <= cost_matrix.shape[1]:\n            row_ind.append(p[j] - 1)\n            col_ind.append(j - 1)\n\n    return np.array(row_ind), np.array(col_ind)\n\n\nclass WarehouseEnvironment:\n    def __init__(self, width=15, height=15):\n        self.width = width\n        self.height = height\n        self.grid = np.zeros((height, width), dtype=int)\n        self._create_congested_layout()\n\n    def _create_congested_layout(self):\n        # Create chokepoints with shelf-like obstacles\n        # Vertical shelves creating narrow aisles\n        for x in [3, 6, 9, 12]:\n            for y in range(2, 13):\n                if y not in [5, 7, 10]:  # Leave some gaps\n                    self.grid[y, x] = 1\n\n        # Horizontal barriers\n        for x in range(1, 14):\n            if x not in [2, 5, 8, 11]:\n                self.grid[7, x] = 1\n\n    def is_free(self, x, y):\n        if 0 <= x < self.width and 0 <= y < self.height:\n            return self.grid[y, x] == 0\n        return False\n\n    def get_neighbors(self, x, y):\n        neighbors = []\n        for dx, dy in [(0, 1), (0, -1), (1, 0), (-1, 0)]:\n            nx, ny = x + dx, y + dy\n            if self.is_free(nx, ny):\n                neighbors.append((nx, ny))\n        return neighbors\n\n    def get_free_positions(self):\n        positions = []\n        for y in range(self.height):\n            for x in range(self.width):\n                if self.grid[y, x] == 0:\n                    positions.append((x, y))\n        return positions\n\n\nclass ConflictMemoryMap:\n    def __init__(self, width, height, time_horizon=50, decay=0.9):\n        self.width = width\n        self.height = height\n        self.time_horizon = time_horizon\n        self.decay = decay\n        # Spatial-temporal conflict counts\n        self.memory = np.zeros((height, width))\n        # Edge conflict memory (simplified to spatial)\n        self.edge_memory = np.zeros((height, width))\n        # Reservation rejection counts\n        self.rejection_counts = np.zeros((height, width))\n\n    def update(self, conflicts, rejections=None):\n        # Decay existing memory\n        self.memory *= self.decay\n        self.edge_memory *= self.decay\n        self.rejection_counts *= self.decay\n\n        # Add new conflicts\n        for x, y, t in conflicts:\n            if 0 <= x < self.width and 0 <= y < self.height:\n                self.memory[y, x] += 1.0\n\n        # Add rejection information (richer signal)\n        if rejections:\n            for x, y in rejections:\n                if 0 <= x < self.width and 0 <= y < self.height:\n                    self.rejection_counts[y, x] += 0.5\n\n    def get_penalty(self, x, y):\n        if 0 <= x < self.width and 0 <= y < self.height:\n            return self.memory[y, x] + self.rejection_counts[y, x]\n        return 0.0\n\n    def get_path_penalty(self, path, penalty_weight=2.0):\n        total = 0.0\n        for x, y, t in path:\n            total += self.get_penalty(x, y) * penalty_weight\n        return total\n\n    def get_stats(self):\n        return {\n            \"max\": float(np.max(self.memory + self.rejection_counts)),\n            \"mean\": float(np.mean(self.memory + self.rejection_counts)),\n            \"nonzero\": int(np.sum((self.memory + self.rejection_counts) > 0.01)),\n        }\n\n\nclass MAPFSolver:\n    def __init__(self, env):\n        self.env = env\n\n    def heuristic(self, pos, goal):\n        return abs(pos[0] - goal[0]) + abs(pos[1] - goal[1])\n\n    def find_path_with_reservations(self, start, goal, reservations, max_time=100):\n        \"\"\"A* with reservation table, returns path and rejection locations.\"\"\"\n        open_set = [(self.heuristic(start, goal), 0, start, [])]\n        closed = set()\n        rejections = []\n\n        while open_set:\n            f, g, pos, path = heapq.heappop(open_set)\n            t = g\n\n            if pos == goal:\n                return path + [(pos[0], pos[1], t)], rejections\n\n            state = (pos[0], pos[1], t)\n            if state in closed:\n                continue\n            closed.add(state)\n\n            if t >= max_time:\n                continue\n\n            current_path = path + [(pos[0], pos[1], t)]\n\n            # Try neighbors and wait action\n            moves = self.env.get_neighbors(pos[0], pos[1]) + [pos]\n\n            for next_pos in moves:\n                next_t = t + 1\n                next_state = (next_pos[0], next_pos[1], next_t)\n\n                if next_state in closed:\n                    continue\n\n                # Check reservation\n                reserved = False\n                if (next_pos[0], next_pos[1], next_t) in reservations:\n                    reserved = True\n                    rejections.append((next_pos[0], next_pos[1]))\n\n                # Check edge conflict (swap)\n                if not reserved and pos != next_pos:\n                    if (pos[0], pos[1], next_t) in reservations:\n                        # Check if it's a swap\n                        prev_agent_pos = reservations.get((pos[0], pos[1], next_t))\n                        if prev_agent_pos == next_pos:\n                            reserved = True\n                            rejections.append((next_pos[0], next_pos[1]))\n\n                if reserved:\n                    continue\n\n                new_g = g + 1\n                new_f = new_g + self.heuristic(next_pos, goal)\n                heapq.heappush(open_set, (new_f, new_g, next_pos, current_path))\n\n        # No path found, return direct path estimate\n        return [(start[0], start[1], 0), (goal[0], goal[1], max_time)], rejections\n\n    def solve_prioritized(self, agents, goals):\n        \"\"\"Prioritized planning returning paths and conflict info.\"\"\"\n        reservations = {}\n        all_paths = []\n        all_conflicts = []\n        all_rejections = []\n\n        for i, (agent, goal) in enumerate(zip(agents, goals)):\n            path, rejections = self.find_path_with_reservations(\n                agent, goal, reservations\n            )\n            all_paths.append(path)\n            all_rejections.extend(rejections)\n\n            # Add to reservations\n            for x, y, t in path:\n                reservations[(x, y, t)] = agent\n\n        # Detect remaining conflicts (shouldn't be many with prioritized planning)\n        for i, path_i in enumerate(all_paths):\n            for j, path_j in enumerate(all_paths):\n                if i >= j:\n                    continue\n                for x1, y1, t1 in path_i:\n                    for x2, y2, t2 in path_j:\n                        if x1 == x2 and y1 == y2 and t1 == t2:\n                            all_conflicts.append((x1, y1, t1))\n\n        return all_paths, all_conflicts, all_rejections\n\n\nclass TaskAllocator:\n    def __init__(self, env, conflict_memory=None, penalty_weight=3.0):\n        self.env = env\n        self.conflict_memory = conflict_memory\n        self.penalty_weight = penalty_weight\n        self.path_cache = {}\n\n    def compute_shortest_path(self, start, goal):\n        \"\"\"Compute shortest path without reservations for cost estimation.\"\"\"\n        key = (start, goal)\n        if key in self.path_cache:\n            return self.path_cache[key]\n\n        open_set = [(abs(start[0] - goal[0]) + abs(start[1] - goal[1]), 0, start, [])]\n        closed = set()\n\n        while open_set:\n            f, g, pos, path = heapq.heappop(open_set)\n\n            if pos == goal:\n                result = path + [pos]\n                self.path_cache[key] = result\n                return result\n\n            if pos in closed:\n                continue\n            closed.add(pos)\n\n            for next_pos in self.env.get_neighbors(pos[0], pos[1]):\n                if next_pos not in closed:\n                    new_g = g + 1\n                    new_f = (\n                        new_g + abs(next_pos[0] - goal[0]) + abs(next_pos[1] - goal[1])\n                    )\n                    heapq.heappush(open_set, (new_f, new_g, next_pos, path + [pos]))\n\n        return [start, goal]  # Fallback\n\n    def compute_cost_matrix(self, agents, tasks, use_memory=False):\n        \"\"\"Compute assignment cost matrix.\"\"\"\n        n_agents = len(agents)\n        n_tasks = len(tasks)\n        cost_matrix = np.zeros((n_agents, n_tasks))\n\n        for i, agent in enumerate(agents):\n            for j, task in enumerate(tasks):\n                path = self.compute_shortest_path(agent, task)\n                base_cost = len(path) - 1\n\n                memory_penalty = 0.0\n                if use_memory and self.conflict_memory is not None:\n                    for pos in path:\n                        memory_penalty += self.conflict_memory.get_penalty(\n                            pos[0], pos[1]\n                        )\n                    memory_penalty *= self.penalty_weight\n\n                cost_matrix[i, j] = base_cost + memory_penalty\n\n        return cost_matrix\n\n    def allocate(self, agents, tasks, use_memory=False):\n        \"\"\"Allocate tasks to agents using Hungarian algorithm.\"\"\"\n        cost_matrix = self.compute_cost_matrix(agents, tasks, use_memory)\n        row_ind, col_ind = hungarian_assignment(cost_matrix)\n\n        assignment = {}\n        for r, c in zip(row_ind, col_ind):\n            if r < len(agents) and c < len(tasks):\n                assignment[r] = c\n\n        # Fill any missing assignments greedily\n        assigned_tasks = set(assignment.values())\n        unassigned_agents = [i for i in range(len(agents)) if i not in assignment]\n        unassigned_tasks = [j for j in range(len(tasks)) if j not in assigned_tasks]\n\n        for agent_idx, task_idx in zip(unassigned_agents, unassigned_tasks):\n            assignment[agent_idx] = task_idx\n\n        return assignment\n\n\ndef generate_scenario(env, n_agents=6):\n    \"\"\"Generate random agent and task positions.\"\"\"\n    free_positions = env.get_free_positions()\n    np.random.shuffle(free_positions)\n\n    agents = [free_positions[i] for i in range(n_agents)]\n    tasks = [free_positions[n_agents + i] for i in range(n_agents)]\n\n    return agents, tasks\n\n\ndef compute_makespan(paths):\n    \"\"\"Compute makespan (max path length).\"\"\"\n    if not paths:\n        return 0\n    return max(len(p) for p in paths)\n\n\ndef count_conflicts(paths):\n    \"\"\"Count vertex conflicts between paths.\"\"\"\n    conflicts = 0\n    for i, path_i in enumerate(paths):\n        for j, path_j in enumerate(paths):\n            if i >= j:\n                continue\n            for x1, y1, t1 in path_i:\n                for x2, y2, t2 in path_j:\n                    if x1 == x2 and y1 == y2 and t1 == t2:\n                        conflicts += 1\n    return conflicts\n\n\ndef run_episode(\n    env,\n    solver,\n    allocator,\n    agents,\n    tasks,\n    conflict_memory,\n    use_memory=False,\n    update_memory=True,\n):\n    \"\"\"Run single episode and return metrics.\"\"\"\n    # Allocate tasks\n    assignment = allocator.allocate(agents, tasks, use_memory=use_memory)\n\n    # Create ordered goals based on assignment\n    goals = [tasks[assignment[i]] for i in range(len(agents))]\n\n    # Plan paths\n    paths, conflicts, rejections = solver.solve_prioritized(agents, goals)\n\n    # Update conflict memory if requested\n    if update_memory and conflict_memory is not None:\n        conflict_memory.update(conflicts, rejections)\n\n    makespan = compute_makespan(paths)\n    n_conflicts = len(conflicts)\n\n    return makespan, n_conflicts, assignment, paths\n\n\ndef main():\n    np.random.seed(42)\n\n    # Setup\n    env = WarehouseEnvironment(width=15, height=15)\n    solver = MAPFSolver(env)\n    conflict_memory = ConflictMemoryMap(env.width, env.height)\n\n    # Allocators\n    baseline_allocator = TaskAllocator(env, conflict_memory=None)\n    cma_allocator = TaskAllocator(\n        env, conflict_memory=conflict_memory, penalty_weight=3.0\n    )\n\n    n_agents = 6\n    n_warmup = 30\n    n_eval = 50\n\n    print(\"=\" * 60)\n    print(\"CMA Experiment: Conflict Memory Allocation\")\n    print(\"=\" * 60)\n    print(f\"Environment: {env.width}x{env.height} warehouse with chokepoints\")\n    print(f\"Agents: {n_agents}\")\n    print(f\"Warmup episodes: {n_warmup}\")\n    print(f\"Evaluation episodes: {n_eval}\")\n    print()\n\n    # Phase 1: Warmup - build conflict memory\n    print(\"Phase 1: Warmup (building conflict memory)\")\n    print(\"-\" * 40)\n\n    warmup_conflicts = 0\n    warmup_rejections = 0\n\n    for ep in range(n_warmup):\n        agents, tasks = generate_scenario(env, n_agents)\n        makespan, n_conflicts, _, paths = run_episode(\n            env,\n            solver,\n            baseline_allocator,\n            agents,\n            tasks,\n            conflict_memory,\n            use_memory=False,\n            update_memory=True,\n        )\n        warmup_conflicts += n_conflicts\n\n        if (ep + 1) % 10 == 0:\n            stats = conflict_memory.get_stats()\n            print(\n                f\"  Episode {ep+1}: makespan={makespan}, conflicts={n_conflicts}, \"\n                f\"memory_max={stats['max']:.2f}, memory_nonzero={stats['nonzero']}\"\n            )\n\n    print(f\"\\nWarmup complete. Total conflicts observed: {warmup_conflicts}\")\n    stats = conflict_memory.get_stats()\n    print(\n        f\"Final memory stats: max={stats['max']:.2f}, mean={stats['mean']:.4f}, nonzero_cells={stats['nonzero']}\"\n    )\n    experiment_data[\"cma_experiment\"][\"memory_stats\"].append(stats)\n\n    # Phase 2: Evaluation - compare baseline vs CMA on same scenarios\n    print(\"\\nPhase 2: Evaluation (comparing baseline vs CMA)\")\n    print(\"-\" * 40)\n\n    # Generate all evaluation scenarios first\n    eval_scenarios = []\n    for _ in range(n_eval):\n        agents, tasks = generate_scenario(env, n_agents)\n        eval_scenarios.append((agents, tasks))\n\n    baseline_makespans = []\n    cma_makespans = []\n    baseline_conflicts_list = []\n    cma_conflicts_list = []\n    assignment_change_count = 0\n\n    for ep, (agents, tasks) in enumerate(eval_scenarios):\n        # Baseline run\n        baseline_makespan, baseline_conflicts, baseline_assignment, _ = run_episode(\n            env,\n            solver,\n            baseline_allocator,\n            agents,\n            tasks,\n            conflict_memory=None,\n            use_memory=False,\n            update_memory=False,\n        )\n\n        # CMA run (frozen memory, no update)\n        cma_makespan, cma_conflicts, cma_assignment, _ = run_episode(\n            env,\n            solver,\n            cma_allocator,\n            agents,\n            tasks,\n            conflict_memory,\n            use_memory=True,\n            update_memory=False,\n        )\n\n        baseline_makespans.append(baseline_makespan)\n        cma_makespans.append(cma_makespan)\n        baseline_conflicts_list.append(baseline_conflicts)\n        cma_conflicts_list.append(cma_conflicts)\n\n        # Check if assignments differ\n        if baseline_assignment != cma_assignment:\n            assignment_change_count += 1\n\n        if (ep + 1) % 10 == 0:\n            print(\n                f\"  Episode {ep+1}: baseline_makespan={baseline_makespan}, \"\n                f\"cma_makespan={cma_makespan}, diff={baseline_makespan - cma_makespan}\"\n            )\n\n    # Store results\n    experiment_data[\"cma_experiment\"][\"baseline_makespans\"] = baseline_makespans\n    experiment_data[\"cma_experiment\"][\"cma_makespans\"] = cma_makespans\n    experiment_data[\"cma_experiment\"][\n        \"conflict_counts_baseline\"\n    ] = baseline_conflicts_list\n    experiment_data[\"cma_experiment\"][\"conflict_counts_cma\"] = cma_conflicts_list\n    experiment_data[\"cma_experiment\"][\"assignment_changes\"].append(\n        assignment_change_count\n    )\n\n    # Compute metrics\n    baseline_makespans = np.array(baseline_makespans)\n    cma_makespans = np.array(cma_makespans)\n\n    improvement_ratios = (baseline_makespans - cma_makespans) / np.maximum(\n        baseline_makespans, 1\n    )\n    mean_improvement = np.mean(improvement_ratios)\n\n    experiment_data[\"cma_experiment\"][\n        \"improvement_ratios\"\n    ] = improvement_ratios.tolist()\n\n    print(\"\\n\" + \"=\" * 60)\n    print(\"RESULTS\")\n    print(\"=\" * 60)\n    print(\n        f\"Baseline mean makespan: {np.mean(baseline_makespans):.2f} \u00b1 {np.std(baseline_makespans):.2f}\"\n    )\n    print(\n        f\"CMA mean makespan: {np.mean(cma_makespans):.2f} \u00b1 {np.std(cma_makespans):.2f}\"\n    )\n    print(\n        f\"Mean improvement ratio: {mean_improvement:.4f} ({mean_improvement*100:.2f}%)\"\n    )\n    print(\n        f\"Episodes with assignment changes: {assignment_change_count}/{n_eval} ({100*assignment_change_count/n_eval:.1f}%)\"\n    )\n    print(f\"Baseline mean conflicts: {np.mean(baseline_conflicts_list):.2f}\")\n    print(f\"CMA mean conflicts: {np.mean(cma_conflicts_list):.2f}\")\n\n    # Key metric\n    print(\"\\n\" + \"=\" * 60)\n    print(f\"MAKESPAN_IMPROVEMENT_RATIO = {mean_improvement:.4f}\")\n    print(\"=\" * 60)\n\n    # Visualization\n    fig, axes = plt.subplots(2, 2, figsize=(12, 10))\n\n    # Plot 1: Makespan comparison\n    ax1 = axes[0, 0]\n    episodes = np.arange(1, n_eval + 1)\n    ax1.plot(episodes, baseline_makespans, \"b-\", label=\"Baseline\", alpha=0.7)\n    ax1.plot(episodes, cma_makespans, \"r-\", label=\"CMA\", alpha=0.7)\n    ax1.set_xlabel(\"Evaluation Episode\")\n    ax1.set_ylabel(\"Makespan\")\n    ax1.set_title(\"Makespan Comparison\")\n    ax1.legend()\n    ax1.grid(True, alpha=0.3)\n\n    # Plot 2: Improvement ratio histogram\n    ax2 = axes[0, 1]\n    ax2.hist(improvement_ratios, bins=20, edgecolor=\"black\", alpha=0.7)\n    ax2.axvline(\n        mean_improvement,\n        color=\"r\",\n        linestyle=\"--\",\n        label=f\"Mean: {mean_improvement:.3f}\",\n    )\n    ax2.set_xlabel(\"Improvement Ratio\")\n    ax2.set_ylabel(\"Frequency\")\n    ax2.set_title(\"Distribution of Makespan Improvement\")\n    ax2.legend()\n    ax2.grid(True, alpha=0.3)\n\n    # Plot 3: Conflict memory heatmap\n    ax3 = axes[1, 0]\n    memory_combined = conflict_memory.memory + conflict_memory.rejection_counts\n    im = ax3.imshow(memory_combined, cmap=\"hot\", interpolation=\"nearest\")\n    ax3.set_title(\"Conflict Memory Map\")\n    ax3.set_xlabel(\"X\")\n    ax3.set_ylabel(\"Y\")\n    plt.colorbar(im, ax=ax3)\n\n    # Overlay obstacles\n    for y in range(env.height):\n        for x in range(env.width):\n            if env.grid[y, x] == 1:\n                ax3.plot(x, y, \"s\", color=\"gray\", markersize=8)\n\n    # Plot 4: Cumulative improvement\n    ax4 = axes[1, 1]\n    cumulative_baseline = np.cumsum(baseline_makespans)\n    cumulative_cma = np.cumsum(cma_makespans)\n    ax4.plot(episodes, cumulative_baseline, \"b-\", label=\"Baseline\")\n    ax4.plot(episodes, cumulative_cma, \"r-\", label=\"CMA\")\n    ax4.set_xlabel(\"Evaluation Episode\")\n    ax4.set_ylabel(\"Cumulative Makespan\")\n    ax4.set_title(\"Cumulative Makespan Over Episodes\")\n    ax4.legend()\n    ax4.grid(True, alpha=0.3)\n\n    plt.tight_layout()\n    plt.savefig(os.path.join(working_dir, \"cma_experiment_results.png\"), dpi=150)\n    plt.close()\n\n    # Save environment visualization\n    fig2, ax = plt.subplots(figsize=(8, 8))\n    ax.imshow(env.grid, cmap=\"binary\", interpolation=\"nearest\")\n    ax.set_title(\"Warehouse Layout (black=obstacles)\")\n    ax.set_xlabel(\"X\")\n    ax.set_ylabel(\"Y\")\n    plt.savefig(os.path.join(working_dir, \"warehouse_layout.png\"), dpi=150)\n    plt.close()\n\n    # Save data\n    np.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\n\n    print(f\"\\nResults saved to {working_dir}\")\n    print(f\"  - cma_experiment_results.png\")\n    print(f\"  - warehouse_layout.png\")\n    print(f\"  - experiment_data.npy\")\n\n\nif __name__ == \"__main__\":\n    main()\n", "# Set random seed\nimport random\nimport numpy as np\nimport torch\n\nseed = 1\nrandom.seed(seed)\nnp.random.seed(seed)\ntorch.manual_seed(seed)\nif torch.cuda.is_available():\n    torch.cuda.manual_seed(seed)\n\nimport os\nimport numpy as np\nimport heapq\nfrom collections import defaultdict\nimport torch\nimport matplotlib.pyplot as plt\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n# Experiment data tracking\nexperiment_data = {\n    \"cma_experiment\": {\n        \"baseline_makespans\": [],\n        \"cma_makespans\": [],\n        \"improvements\": [],\n        \"conflict_counts_baseline\": [],\n        \"conflict_counts_cma\": [],\n        \"assignment_changes\": [],\n    }\n}\n\n\ndef create_warehouse_map(width=20, height=20):\n    \"\"\"Create warehouse with corridors and chokepoints.\"\"\"\n    grid = np.zeros((height, width), dtype=int)\n    # Add shelf obstacles creating narrow corridors\n    for row in [3, 7, 11, 15]:\n        for col in range(2, width - 2):\n            if col not in [5, 10, 15]:  # Leave gaps for corridors\n                grid[row, col] = 1\n    return grid\n\n\ndef get_neighbors(pos, grid):\n    \"\"\"Get valid neighboring positions.\"\"\"\n    h, w = grid.shape\n    neighbors = []\n    for dy, dx in [(0, 1), (0, -1), (1, 0), (-1, 0)]:\n        ny, nx = pos[0] + dy, pos[1] + dx\n        if 0 <= ny < h and 0 <= nx < w and grid[ny, nx] == 0:\n            neighbors.append((ny, nx))\n    return neighbors\n\n\ndef heuristic(a, b):\n    return abs(a[0] - b[0]) + abs(a[1] - b[1])\n\n\ndef astar_with_reservations(start, goal, grid, reservations, max_time=100):\n    \"\"\"A* with space-time reservations. Returns path, conflicts encountered.\"\"\"\n    conflicts_encountered = []\n\n    if start == goal:\n        return [start], conflicts_encountered\n\n    open_set = [(heuristic(start, goal), 0, start, [start])]\n    closed = set()\n\n    while open_set:\n        f, t, pos, path = heapq.heappop(open_set)\n\n        if t > max_time:\n            continue\n\n        if (pos, t) in closed:\n            continue\n        closed.add((pos, t))\n\n        if pos == goal:\n            return path, conflicts_encountered\n\n        for npos in get_neighbors(pos, grid) + [pos]:  # Include wait action\n            nt = t + 1\n\n            # Check vertex conflict\n            if (npos, nt) in reservations:\n                conflicts_encountered.append((\"vertex\", npos, nt))\n                continue\n\n            # Check edge conflict (swap)\n            if npos != pos:\n                if (pos, nt) in reservations:\n                    # Check if agent at npos is moving to pos\n                    edge_key = (npos, pos, nt)\n                    if edge_key in reservations.get(\"edges\", set()):\n                        conflicts_encountered.append((\"edge\", pos, npos, nt))\n                        continue\n\n            if (npos, nt) not in closed:\n                new_path = path + [npos]\n                heapq.heappush(\n                    open_set, (nt + heuristic(npos, goal), nt, npos, new_path)\n                )\n\n    # Return partial path if no full path found\n    return [start], conflicts_encountered\n\n\ndef prioritized_planning(agents_starts, agents_goals, grid, conflict_memory=None):\n    \"\"\"Plan paths for all agents with priority ordering. Returns paths and conflict info.\"\"\"\n    n_agents = len(agents_starts)\n    reservations = {}\n    reservations[\"edges\"] = set()\n    all_paths = []\n    total_conflicts = []\n    reservation_pressure = np.zeros_like(grid, dtype=float)\n\n    for i in range(n_agents):\n        path, conflicts = astar_with_reservations(\n            agents_starts[i], agents_goals[i], grid, reservations\n        )\n        all_paths.append(path)\n        total_conflicts.extend(conflicts)\n\n        # Add reservations for this agent's path\n        for t, pos in enumerate(path):\n            reservations[(pos, t)] = i\n            reservation_pressure[pos[0], pos[1]] += 1\n\n            # Add edge reservation\n            if t > 0:\n                prev_pos = path[t - 1]\n                if prev_pos != pos:\n                    reservations[\"edges\"].add((prev_pos, pos, t))\n\n        # Extend final position reservation\n        final_pos = path[-1]\n        for t in range(len(path), len(path) + 10):\n            reservations[(final_pos, t)] = i\n\n    return all_paths, total_conflicts, reservation_pressure\n\n\ndef compute_makespan(paths):\n    \"\"\"Compute makespan (time for all agents to reach goals).\"\"\"\n    return max(len(p) for p in paths) if paths else 0\n\n\ndef get_shortest_path_cells(start, goal, grid):\n    \"\"\"Get cells along shortest path for cost estimation.\"\"\"\n    path, _ = astar_with_reservations(start, goal, grid, {}, max_time=200)\n    return path\n\n\ndef greedy_assignment(agents, tasks, cost_matrix):\n    \"\"\"Greedy assignment: each agent picks cheapest unassigned task.\"\"\"\n    n = len(agents)\n    m = len(tasks)\n    assignment = [-1] * n\n    assigned_tasks = set()\n\n    # Sort agents by their minimum cost\n    agent_order = list(range(n))\n\n    for agent in agent_order:\n        best_task = -1\n        best_cost = float(\"inf\")\n        for task in range(m):\n            if task not in assigned_tasks:\n                if cost_matrix[agent, task] < best_cost:\n                    best_cost = cost_matrix[agent, task]\n                    best_task = task\n        if best_task >= 0:\n            assignment[agent] = best_task\n            assigned_tasks.add(best_task)\n\n    return assignment\n\n\ndef hungarian_assignment(cost_matrix):\n    \"\"\"Simple Hungarian-like assignment using auction algorithm.\"\"\"\n    n, m = cost_matrix.shape\n    if n == 0 or m == 0:\n        return []\n\n    assignment = [-1] * n\n    prices = np.zeros(m)\n    epsilon = 1.0 / (n + 1)\n\n    for _ in range(n * 10):  # Iterate until convergence\n        unassigned = [i for i in range(n) if assignment[i] == -1]\n        if not unassigned:\n            break\n\n        for agent in unassigned:\n            # Find best and second-best tasks\n            values = cost_matrix[agent] + prices\n            sorted_idx = np.argsort(values)\n            best_task = sorted_idx[0]\n            best_value = values[best_task]\n\n            if len(sorted_idx) > 1:\n                second_value = values[sorted_idx[1]]\n            else:\n                second_value = best_value + epsilon\n\n            # Check if task is taken\n            current_owner = -1\n            for i in range(n):\n                if assignment[i] == best_task:\n                    current_owner = i\n                    break\n\n            if current_owner >= 0:\n                assignment[current_owner] = -1\n\n            assignment[agent] = best_task\n            prices[best_task] += second_value - best_value + epsilon\n\n    # Fill any remaining unassigned\n    assigned_tasks = set(a for a in assignment if a >= 0)\n    for i in range(n):\n        if assignment[i] == -1:\n            for t in range(m):\n                if t not in assigned_tasks:\n                    assignment[i] = t\n                    assigned_tasks.add(t)\n                    break\n\n    return assignment\n\n\nclass ConflictMemory:\n    \"\"\"Spatial conflict memory map.\"\"\"\n\n    def __init__(self, grid_shape, decay=0.9):\n        self.memory = np.zeros(grid_shape, dtype=float)\n        self.edge_memory = defaultdict(float)\n        self.decay = decay\n        self.update_count = 0\n\n    def update(self, conflicts, reservation_pressure):\n        \"\"\"Update memory from conflicts and reservation pressure.\"\"\"\n        self.memory *= self.decay\n\n        # Add vertex conflicts\n        for conflict in conflicts:\n            if conflict[0] == \"vertex\":\n                pos = conflict[1]\n                self.memory[pos[0], pos[1]] += 1.0\n            elif conflict[0] == \"edge\":\n                pos1, pos2 = conflict[1], conflict[2]\n                self.edge_memory[(pos1, pos2)] += 1.0\n                self.memory[pos1[0], pos1[1]] += 0.5\n                self.memory[pos2[0], pos2[1]] += 0.5\n\n        # Add reservation pressure (normalized)\n        if reservation_pressure.max() > 0:\n            normalized_pressure = reservation_pressure / reservation_pressure.max()\n            self.memory += normalized_pressure * 0.3\n\n        self.update_count += 1\n\n    def get_path_penalty(self, path_cells, penalty_weight=1.0):\n        \"\"\"Compute penalty for a path based on conflict memory.\"\"\"\n        if not path_cells:\n            return 0.0\n        penalty = 0.0\n        for cell in path_cells:\n            penalty += self.memory[cell[0], cell[1]]\n        return penalty * penalty_weight\n\n    def freeze(self):\n        \"\"\"Return a frozen copy for evaluation.\"\"\"\n        frozen = ConflictMemory(self.memory.shape, self.decay)\n        frozen.memory = self.memory.copy()\n        frozen.edge_memory = self.edge_memory.copy()\n        frozen.update_count = self.update_count\n        return frozen\n\n\ndef compute_cost_matrix(agents, tasks, grid, conflict_memory=None, penalty_weight=2.0):\n    \"\"\"Compute assignment cost matrix with optional CMA penalties.\"\"\"\n    n_agents = len(agents)\n    n_tasks = len(tasks)\n    cost_matrix = np.zeros((n_agents, n_tasks))\n\n    for i, agent_pos in enumerate(agents):\n        for j, task_pos in enumerate(tasks):\n            # Base cost: path length\n            path_cells = get_shortest_path_cells(agent_pos, task_pos, grid)\n            base_cost = len(path_cells)\n\n            # Add conflict memory penalty\n            if conflict_memory is not None:\n                penalty = conflict_memory.get_path_penalty(path_cells, penalty_weight)\n                cost_matrix[i, j] = base_cost + penalty\n            else:\n                cost_matrix[i, j] = base_cost\n\n    return cost_matrix\n\n\ndef run_episode(\n    grid, n_agents, conflict_memory=None, use_cma=False, penalty_weight=2.0\n):\n    \"\"\"Run a single episode with task allocation and path planning.\"\"\"\n    h, w = grid.shape\n\n    # Generate random start positions (on free cells)\n    free_cells = [(i, j) for i in range(h) for j in range(w) if grid[i, j] == 0]\n\n    if len(free_cells) < n_agents * 2:\n        raise ValueError(\"Not enough free cells for agents and tasks\")\n\n    np.random.shuffle(free_cells)\n    agent_starts = free_cells[:n_agents]\n    task_positions = free_cells[n_agents : n_agents * 2]\n\n    # Compute cost matrix\n    if use_cma and conflict_memory is not None:\n        cost_matrix = compute_cost_matrix(\n            agent_starts, task_positions, grid, conflict_memory, penalty_weight\n        )\n    else:\n        cost_matrix = compute_cost_matrix(agent_starts, task_positions, grid)\n\n    # Assignment\n    assignment = hungarian_assignment(cost_matrix)\n\n    # Get agent goals based on assignment\n    agent_goals = []\n    for i, task_idx in enumerate(assignment):\n        if task_idx >= 0 and task_idx < len(task_positions):\n            agent_goals.append(task_positions[task_idx])\n        else:\n            agent_goals.append(agent_starts[i])  # Stay in place if no task\n\n    # Path planning\n    paths, conflicts, reservation_pressure = prioritized_planning(\n        agent_starts, agent_goals, grid\n    )\n\n    makespan = compute_makespan(paths)\n\n    return {\n        \"makespan\": makespan,\n        \"conflicts\": conflicts,\n        \"reservation_pressure\": reservation_pressure,\n        \"paths\": paths,\n        \"assignment\": assignment,\n        \"agent_starts\": agent_starts,\n        \"task_positions\": task_positions,\n    }\n\n\ndef run_experiment(n_warmup=30, n_eval=50, n_agents=6, penalty_weight=2.5):\n    \"\"\"Run full CMA experiment.\"\"\"\n    print(f\"\\n{'='*60}\")\n    print(f\"Running CMA Experiment\")\n    print(f\"Warmup episodes: {n_warmup}, Eval episodes: {n_eval}\")\n    print(f\"Agents: {n_agents}, Penalty weight: {penalty_weight}\")\n    print(f\"{'='*60}\\n\")\n\n    # Create warehouse map\n    grid = create_warehouse_map(20, 20)\n    print(f\"Grid size: {grid.shape}, Free cells: {np.sum(grid == 0)}\")\n\n    # Initialize conflict memory\n    conflict_memory = ConflictMemory(grid.shape, decay=0.95)\n\n    # Warmup phase: build conflict memory\n    print(\"\\n--- Warmup Phase ---\")\n    warmup_conflicts_total = 0\n    for ep in range(n_warmup):\n        np.random.seed(ep)\n        result = run_episode(grid, n_agents, conflict_memory=None, use_cma=False)\n\n        # Update conflict memory\n        conflict_memory.update(result[\"conflicts\"], result[\"reservation_pressure\"])\n        warmup_conflicts_total += len(result[\"conflicts\"])\n\n        if (ep + 1) % 10 == 0:\n            print(\n                f\"Warmup episode {ep+1}: makespan={result['makespan']}, \"\n                f\"conflicts={len(result['conflicts'])}, \"\n                f\"memory_max={conflict_memory.memory.max():.2f}\"\n            )\n\n    print(f\"\\nWarmup complete. Total conflicts recorded: {warmup_conflicts_total}\")\n    print(\n        f\"Memory statistics: max={conflict_memory.memory.max():.3f}, \"\n        f\"mean={conflict_memory.memory.mean():.3f}, \"\n        f\"nonzero cells={np.sum(conflict_memory.memory > 0.01)}\"\n    )\n\n    # Freeze memory for evaluation\n    frozen_memory = conflict_memory.freeze()\n\n    # Evaluation phase\n    print(\"\\n--- Evaluation Phase ---\")\n    baseline_makespans = []\n    cma_makespans = []\n    baseline_conflicts = []\n    cma_conflicts = []\n    assignment_changes = []\n\n    for ep in range(n_eval):\n        seed = n_warmup + ep\n\n        # Baseline run\n        np.random.seed(seed)\n        baseline_result = run_episode(\n            grid, n_agents, conflict_memory=None, use_cma=False\n        )\n\n        # CMA run (same seed for identical initial conditions)\n        np.random.seed(seed)\n        cma_result = run_episode(\n            grid,\n            n_agents,\n            conflict_memory=frozen_memory,\n            use_cma=True,\n            penalty_weight=penalty_weight,\n        )\n\n        baseline_makespans.append(baseline_result[\"makespan\"])\n        cma_makespans.append(cma_result[\"makespan\"])\n        baseline_conflicts.append(len(baseline_result[\"conflicts\"]))\n        cma_conflicts.append(len(cma_result[\"conflicts\"]))\n\n        # Check if assignments differ\n        assignments_differ = baseline_result[\"assignment\"] != cma_result[\"assignment\"]\n        if isinstance(assignments_differ, np.ndarray):\n            assignments_differ = assignments_differ.any()\n        assignment_changes.append(int(assignments_differ))\n\n        if (ep + 1) % 10 == 0:\n            print(\n                f\"Eval episode {ep+1}: baseline_makespan={baseline_result['makespan']}, \"\n                f\"cma_makespan={cma_result['makespan']}, \"\n                f\"assignment_changed={assignments_differ}\"\n            )\n\n    # Store results\n    experiment_data[\"cma_experiment\"][\"baseline_makespans\"] = baseline_makespans\n    experiment_data[\"cma_experiment\"][\"cma_makespans\"] = cma_makespans\n    experiment_data[\"cma_experiment\"][\"conflict_counts_baseline\"] = baseline_conflicts\n    experiment_data[\"cma_experiment\"][\"conflict_counts_cma\"] = cma_conflicts\n    experiment_data[\"cma_experiment\"][\"assignment_changes\"] = assignment_changes\n\n    # Compute metrics\n    baseline_mean = np.mean(baseline_makespans)\n    cma_mean = np.mean(cma_makespans)\n\n    improvements = [\n        (b - c) / b if b > 0 else 0 for b, c in zip(baseline_makespans, cma_makespans)\n    ]\n    experiment_data[\"cma_experiment\"][\"improvements\"] = improvements\n\n    makespan_improvement_ratio = (\n        (baseline_mean - cma_mean) / baseline_mean if baseline_mean > 0 else 0\n    )\n\n    # Print results\n    print(f\"\\n{'='*60}\")\n    print(\"RESULTS SUMMARY\")\n    print(f\"{'='*60}\")\n    print(\n        f\"Baseline average makespan: {baseline_mean:.2f} (std: {np.std(baseline_makespans):.2f})\"\n    )\n    print(\n        f\"CMA average makespan:      {cma_mean:.2f} (std: {np.std(cma_makespans):.2f})\"\n    )\n    print(\n        f\"Makespan improvement ratio: {makespan_improvement_ratio:.4f} ({makespan_improvement_ratio*100:.2f}%)\"\n    )\n    print(f\"Assignment change rate: {np.mean(assignment_changes)*100:.1f}%\")\n    print(f\"Baseline avg conflicts: {np.mean(baseline_conflicts):.2f}\")\n    print(f\"CMA avg conflicts: {np.mean(cma_conflicts):.2f}\")\n\n    return makespan_improvement_ratio, frozen_memory, grid\n\n\ndef visualize_results(conflict_memory, grid):\n    \"\"\"Visualize conflict memory and results.\"\"\"\n    fig, axes = plt.subplots(1, 3, figsize=(15, 5))\n\n    # Plot 1: Grid layout\n    ax1 = axes[0]\n    ax1.imshow(grid, cmap=\"binary\", origin=\"upper\")\n    ax1.set_title(\"Warehouse Layout (black=obstacle)\")\n    ax1.set_xlabel(\"X\")\n    ax1.set_ylabel(\"Y\")\n\n    # Plot 2: Conflict memory heatmap\n    ax2 = axes[1]\n    im = ax2.imshow(conflict_memory.memory, cmap=\"hot\", ori
