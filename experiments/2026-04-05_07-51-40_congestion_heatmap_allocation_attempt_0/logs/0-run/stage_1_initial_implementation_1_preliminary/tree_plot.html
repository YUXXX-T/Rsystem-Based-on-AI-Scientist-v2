ne_results.png\"), dpi=150)\nplt.close()\n\n# Save experiment data\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\n\n# Save results summary\nresults_summary = {\n    \"agent_counts\": agent_counts,\n    \"distance_throughputs\": results[\"distance\"][\"throughputs\"],\n    \"heuristic_throughputs\": results[\"congestion_heuristic\"][\"throughputs\"],\n    \"learned_throughputs\": results[\"congestion_learned\"][\"throughputs\"],\n    \"primary_metric_throughput\": best_cata_throughput,\n    \"improvement_percent\": improvement,\n}\nnp.save(os.path.join(working_dir, \"results_summary.npy\"), results_summary)\n\nprint(f\"\\nResults saved to {working_dir}\")\nprint(\"Experiment completed successfully!\")\n", "import os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom scipy.optimize import linear_sum_assignment\nimport matplotlib.pyplot as plt\nimport time\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\nexperiment_data = {\n    \"training\": {\"losses\": {\"train\": [], \"val\": []}, \"epochs\": []},\n    \"evaluation\": {\n        \"distance_based\": {\"throughput\": [], \"completion_times\": []},\n        \"congestion_aware\": {\"throughput\": [], \"completion_times\": []},\n    },\n}\n\n\nclass WarehouseSimulator:\n    def __init__(self, grid_size=20, num_agents=20, seed=None):\n        if seed is not None:\n            np.random.seed(seed)\n        self.grid_size = grid_size\n        self.num_agents = num_agents\n        self.agent_positions = np.random.randint(0, grid_size, (num_agents, 2))\n        self.agent_targets = np.zeros((num_agents, 2), dtype=int) - 1\n        self.tasks_completed = 0\n        self.timestep = 0\n        self.congestion_history = []\n\n    def generate_tasks(self, num_tasks):\n        return np.random.randint(0, self.grid_size, (num_tasks, 2))\n\n    def compute_congestion_heatmap(self):\n        heatmap = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            x, y = pos\n            for dx in range(-2, 3):\n                for dy in range(-2, 3):\n                    nx, ny = x + dx, y + dy\n                    if 0 <= nx < self.grid_size and 0 <= ny < self.grid_size:\n                        heatmap[nx, ny] += 1.0 / (1 + abs(dx) + abs(dy))\n        return heatmap / (heatmap.max() + 1e-6)\n\n    def step(self):\n        self.timestep += 1\n        completed = 0\n        for i in range(self.num_agents):\n            if self.agent_targets[i, 0] >= 0:\n                diff = self.agent_targets[i] - self.agent_positions[i]\n                move = np.sign(diff)\n                if np.any(move != 0):\n                    new_pos = self.agent_positions[i] + move\n                    collision = False\n                    for j in range(self.num_agents):\n                        if i != j and np.array_equal(new_pos, self.agent_positions[j]):\n                            collision = True\n                            break\n                    if not collision:\n                        self.agent_positions[i] = new_pos\n                if np.array_equal(self.agent_positions[i], self.agent_targets[i]):\n                    self.tasks_completed += 1\n                    completed += 1\n                    self.agent_targets[i] = [-1, -1]\n        self.congestion_history.append(self.compute_congestion_heatmap())\n        return completed\n\n    def assign_tasks_distance(self, tasks):\n        if len(tasks) == 0:\n            return []\n        available = [i for i in range(self.num_agents) if self.agent_targets[i, 0] < 0]\n        if len(available) == 0:\n            return tasks\n        n_assign = min(len(available), len(tasks))\n        cost_matrix = np.zeros((n_assign, n_assign))\n        for i, agent_idx in enumerate(available[:n_assign]):\n            for j in range(n_assign):\n                cost_matrix[i, j] = np.abs(\n                    self.agent_positions[agent_idx] - tasks[j]\n                ).sum()\n        row_ind, col_ind = linear_sum_assignment(cost_matrix)\n        for r, c in zip(row_ind, col_ind):\n            self.agent_targets[available[r]] = tasks[c]\n        return tasks[n_assign:] if n_assign < len(tasks) else []\n\n    def assign_tasks_congestion_aware(\n        self, tasks, congestion_predictor=None, congestion_weight=0.5\n    ):\n        if len(tasks) == 0:\n            return []\n        available = [i for i in range(self.num_agents) if self.agent_targets[i, 0] < 0]\n        if len(available) == 0:\n            return tasks\n        n_assign = min(len(available), len(tasks))\n        cost_matrix = np.zeros((n_assign, n_assign))\n        if congestion_predictor is not None:\n            pred_congestion = congestion_predictor.predict(\n                self.agent_positions, self.agent_targets, tasks, self.grid_size\n            )\n        else:\n            pred_congestion = self.compute_congestion_heatmap()\n        for i, agent_idx in enumerate(available[:n_assign]):\n            for j in range(n_assign):\n                dist = np.abs(self.agent_positions[agent_idx] - tasks[j]).sum()\n                path_congestion = self._estimate_path_congestion(\n                    self.agent_positions[agent_idx], tasks[j], pred_congestion\n                )\n                cost_matrix[i, j] = (\n                    dist + congestion_weight * path_congestion * self.grid_size\n                )\n        row_ind, col_ind = linear_sum_assignment(cost_matrix)\n        for r, c in zip(row_ind, col_ind):\n            self.agent_targets[available[r]] = tasks[c]\n        return tasks[n_assign:] if n_assign < len(tasks) else []\n\n    def _estimate_path_congestion(self, start, end, congestion_map):\n        steps = max(abs(end[0] - start[0]), abs(end[1] - start[1])) + 1\n        if steps <= 1:\n            return 0\n        congestion_sum = 0\n        for t in np.linspace(0, 1, steps):\n            x = int(np.clip(start[0] + t * (end[0] - start[0]), 0, self.grid_size - 1))\n            y = int(np.clip(start[1] + t * (end[1] - start[1]), 0, self.grid_size - 1))\n            congestion_sum += congestion_map[x, y]\n        return congestion_sum / steps\n\n\nclass CongestionMLP(nn.Module):\n    def __init__(self, max_agents=100, hidden_dim=128, grid_size=20):\n        super().__init__()\n        self.max_agents = max_agents\n        self.grid_size = grid_size\n        input_dim = max_agents * 4\n        self.fc1 = nn.Linear(input_dim, hidden_dim)\n        self.fc2 = nn.Linear(hidden_dim, hidden_dim)\n        self.fc3 = nn.Linear(hidden_dim, grid_size * grid_size)\n\n    def forward(self, x):\n        x = F.relu(self.fc1(x))\n        x = F.relu(self.fc2(x))\n        x = torch.sigmoid(self.fc3(x))\n        return x.view(-1, self.grid_size, self.grid_size)\n\n    def predict(self, agent_positions, agent_targets, tasks, grid_size):\n        features = np.zeros(self.max_agents * 4)\n        for i, pos in enumerate(agent_positions):\n            if i >= self.max_agents:\n                break\n            target = agent_targets[i] if agent_targets[i, 0] >= 0 else pos\n            features[i * 4 : (i + 1) * 4] = [\n                pos[0] / grid_size,\n                pos[1] / grid_size,\n                target[0] / grid_size,\n                target[1] / grid_size,\n            ]\n        x = torch.tensor(features, dtype=torch.float32).unsqueeze(0).to(device)\n        with torch.no_grad():\n            pred = self(x)\n        return pred[0].cpu().numpy()\n\n\ndef generate_training_data(\n    num_samples=500, grid_size=20, num_agents=20, max_agents=100, steps=10\n):\n    X, Y = [], []\n    for _ in range(num_samples):\n        sim = WarehouseSimulator(grid_size, num_agents)\n        tasks = sim.generate_tasks(num_agents)\n        sim.assign_tasks_distance(tasks)\n        features = np.zeros(max_agents * 4)\n        for i, pos in enumerate(sim.agent_positions):\n            if i >= max_agents:\n                break\n            target = sim.agent_targets[i] if sim.agent_targets[i, 0] >= 0 else pos\n            features[i * 4 : (i + 1) * 4] = [\n                pos[0] / grid_size,\n                pos[1] / grid_size,\n                target[0] / grid_size,\n                target[1] / grid_size,\n            ]\n        for _ in range(steps):\n            sim.step()\n        if len(sim.congestion_history) > 0:\n            future_congestion = np.mean(\n                sim.congestion_history[-min(5, len(sim.congestion_history)) :], axis=0\n            )\n        else:\n            future_congestion = np.zeros((grid_size, grid_size))\n        X.append(features)\n        Y.append(future_congestion)\n    return np.array(X), np.array(Y)\n\n\ndef train_model(\n    model, X_train, Y_train, X_val, Y_val, epochs=50, lr=1e-3, batch_size=16\n):\n    optimizer = torch.optim.Adam(model.parameters(), lr=lr)\n    criterion = nn.MSELoss()\n    X_train_t = torch.tensor(X_train, dtype=torch.float32).to(device)\n    Y_train_t = torch.tensor(Y_train, dtype=torch.float32).to(device)\n    X_val_t = torch.tensor(X_val, dtype=torch.float32).to(device)\n    Y_val_t = torch.tensor(Y_val, dtype=torch.float32).to(device)\n\n    for epoch in range(epochs):\n        model.train()\n        perm = torch.randperm(len(X_train_t))\n        train_loss = 0\n        n_batches = 0\n        for i in range(0, len(X_train_t), batch_size):\n            idx = perm[i : i + batch_size]\n            optimizer.zero_grad()\n            pred = model(X_train_t[idx])\n            loss = criterion(pred, Y_train_t[idx])\n            loss.backward()\n            optimizer.step()\n            train_loss += loss.item()\n            n_batches += 1\n        train_loss /= n_batches\n\n        model.eval()\n        with torch.no_grad():\n            pred_val = model(X_val_t)\n            val_loss = criterion(pred_val, Y_val_t).item()\n\n        experiment_data[\"training\"][\"losses\"][\"train\"].append(train_loss)\n        experiment_data[\"training\"][\"losses\"][\"val\"].append(val_loss)\n        experiment_data[\"training\"][\"epochs\"].append(epoch)\n        if epoch % 10 == 0:\n            print(\n                f\"Epoch {epoch}: train_loss = {train_loss:.4f}, validation_loss = {val_loss:.4f}\"\n            )\n    return model\n\n\ndef evaluate_method(\n    method=\"distance\",\n    num_agents=20,\n    grid_size=20,\n    simulation_time=200,\n    congestion_predictor=None,\n):\n    sim = WarehouseSimulator(grid_size, num_agents, seed=42)\n    tasks_queue = []\n    for t in range(simulation_time):\n        if t % 5 == 0:\n            new_tasks = sim.generate_tasks(max(1, num_agents // 4))\n            for task in new_tasks:\n                tasks_queue.append(task)\n        if len(tasks_queue) > 0:\n            tasks_arr = np.array(tasks_queue[:num_agents])\n            if method == \"distance\":\n                remaining = sim.assign_tasks_distance(tasks_arr)\n            else:\n                remaining = sim.assign_tasks_congestion_aware(\n                    tasks_arr, congestion_predictor, congestion_weight=1.0\n                )\n            n_assigned = len(tasks_arr) - len(remaining)\n            tasks_queue = tasks_queue[n_assigned:]\n        sim.step()\n    throughput = sim.tasks_completed / (simulation_time / 60.0)\n    return throughput, sim.tasks_completed\n\n\nprint(\"Generating training data...\")\nX, Y = generate_training_data(\n    num_samples=300, grid_size=20, num_agents=20, max_agents=100\n)\nX_train, Y_train = X[:240], Y[:240]\nX_val, Y_val = X[240:], Y[240:]\n\nprint(\"Training MLP...\")\nmodel = CongestionMLP(max_agents=100, hidden_dim=128, grid_size=20).to(device)\nmodel = train_model(model, X_train, Y_train, X_val, Y_val, epochs=50, lr=1e-3)\n\nprint(\"\\nEvaluating methods...\")\nagent_counts = [20, 40, 60, 80]\nresults = {\"distance\": [], \"congestion_aware\": []}\n\nfor num_agents in agent_counts:\n    print(f\"\\nTesting with {num_agents} agents...\")\n    throughput_dist, _ = evaluate_method(\n        \"distance\", num_agents=num_agents, simulation_time=200\n    )\n    results[\"distance\"].append(throughput_dist)\n    experiment_data[\"evaluation\"][\"distance_based\"][\"throughput\"].append(\n        throughput_dist\n    )\n    print(f\"  Distance-based throughput: {throughput_dist:.2f} tasks/min\")\n\n    throughput_cata, _ = evaluate_method(\n        \"congestion_aware\",\n        num_agents=num_agents,\n        simulation_time=200,\n        congestion_predictor=model,\n    )\n    results[\"congestion_aware\"].append(throughput_cata)\n    experiment_data[\"evaluation\"][\"congestion_aware\"][\"throughput\"].append(\n        throughput_cata\n    )\n    print(f\"  Congestion-aware throughput: {throughput_cata:.2f} tasks/min\")\n\n    improvement = (throughput_cata - throughput_dist) / (throughput_dist + 1e-6) * 100\n    print(f\"  Improvement: {improvement:.1f}%\")\n\nprint(\"\\n\" + \"=\" * 50)\nprint(\"SUMMARY - Throughput (tasks/minute)\")\nprint(\"=\" * 50)\nprint(f\"{'Agents':<10} {'Distance':<15} {'CATA':<15} {'Improvement':<15}\")\nfor i, num_agents in enumerate(agent_counts):\n    dist, cata = results[\"distance\"][i], results[\"congestion_aware\"][i]\n    imp = (cata - dist) / (dist + 1e-6) * 100\n    print(f\"{num_agents:<10} {dist:<15.2f} {cata:<15.2f} {imp:<15.1f}%\")\n\navg_throughput_cata = np.mean(results[\"congestion_aware\"])\nprint(\n    f\"\\nPrimary Metric - Average CATA throughput_tasks_per_minute: {avg_throughput_cata:.2f}\"\n)\n\nfig, axes = plt.subplots(1, 2, figsize=(12, 5))\naxes[0].plot(experiment_data[\"training\"][\"losses\"][\"train\"], label=\"Train Loss\")\naxes[0].plot(experiment_data[\"training\"][\"losses\"][\"val\"], label=\"Val Loss\")\naxes[0].set_xlabel(\"Epoch\")\naxes[0].set_ylabel(\"Loss\")\naxes[0].set_title(\"MLP Training Loss\")\naxes[0].legend()\n\nx = np.arange(len(agent_counts))\nwidth = 0.35\naxes[1].bar(x - width / 2, results[\"distance\"], width, label=\"Distance-based\")\naxes[1].bar(x + width / 2, results[\"congestion_aware\"], width, label=\"CATA\")\naxes[1].set_xlabel(\"Number of Agents\")\naxes[1].set_ylabel(\"Throughput (tasks/min)\")\naxes[1].set_title(\"Throughput Comparison\")\naxes[1].set_xticks(x)\naxes[1].set_xticklabels(agent_counts)\naxes[1].legend()\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"cata_results.png\"), dpi=150)\nplt.close()\n\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(f\"\\nResults saved to {working_dir}\")\n", "# Set random seed\nimport random\nimport numpy as np\nimport torch\n\nseed = 0\nrandom.seed(seed)\nnp.random.seed(seed)\ntorch.manual_seed(seed)\nif torch.cuda.is_available():\n    torch.cuda.manual_seed(seed)\n\nimport os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.optim as optim\nimport matplotlib.pyplot as plt\nfrom collections import defaultdict\nimport time\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n# Experiment data storage\nexperiment_data = {\n    \"training\": {\"losses\": {\"train\": [], \"val\": []}, \"epochs\": []},\n    \"evaluation\": {\n        \"distance_based\": {\"throughput\": []},\n        \"congestion_aware\": {\"throughput\": []},\n    },\n}\n\n\ndef greedy_assignment(cost_matrix):\n    \"\"\"Greedy assignment as a replacement for Hungarian algorithm.\"\"\"\n    n_agents, n_tasks = cost_matrix.shape\n    row_ind = []\n    col_ind = []\n    assigned_tasks = set()\n\n    # Sort all agent-task pairs by cost\n    pairs = []\n    for i in range(n_agents):\n        for j in range(n_tasks):\n            pairs.append((cost_matrix[i, j], i, j))\n    pairs.sort()\n\n    assigned_agents = set()\n    for cost, i, j in pairs:\n        if i not in assigned_agents and j not in assigned_tasks:\n            row_ind.append(i)\n            col_ind.append(j)\n            assigned_agents.add(i)\n            assigned_tasks.add(j)\n            if len(assigned_agents) == min(n_agents, n_tasks):\n                break\n\n    return np.array(row_ind), np.array(col_ind)\n\n\nclass WarehouseSimulator:\n    def __init__(self, grid_size=20, n_agents=20, n_tasks=30):\n        self.grid_size = grid_size\n        self.n_agents = n_agents\n        self.n_tasks = n_tasks\n        self.reset()\n\n    def reset(self):\n        self.agent_positions = np.random.randint(0, self.grid_size, (self.n_agents, 2))\n        self.agent_velocities = np.zeros((self.n_agents, 2))\n        self.task_positions = np.random.randint(0, self.grid_size, (self.n_tasks, 2))\n        self.task_active = np.ones(self.n_tasks, dtype=bool)\n        self.agent_targets = [-1] * self.n_agents\n        self.time_step = 0\n        self.tasks_completed = 0\n        return self.get_state()\n\n    def get_state(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        task_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        for i, pos in enumerate(self.task_positions):\n            if self.task_active[i]:\n                task_grid[pos[0], pos[1]] += 1\n        return np.stack([agent_grid, task_grid], axis=0)\n\n    def compute_congestion(self, lookahead=5):\n        congestion = np.zeros((self.grid_size, self.grid_size))\n        for i, agent_pos in enumerate(self.agent_positions):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                target_pos = self.task_positions[target_idx]\n                path = self._get_path(agent_pos, target_pos)\n                for step, pos in enumerate(path[:lookahead]):\n                    congestion[pos[0], pos[1]] += 1.0 / (step + 1)\n        return congestion\n\n    def _get_path(self, start, end):\n        path = [tuple(start)]\n        current = np.array(start)\n        while not np.array_equal(current, end):\n            diff = end - current\n            if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                current[0] += np.sign(diff[0])\n            elif diff[1] != 0:\n                current[1] += np.sign(diff[1])\n            path.append(tuple(current))\n        return path\n\n    def assign_tasks(self, assignment):\n        for agent_idx, task_idx in assignment:\n            if task_idx >= 0 and self.task_active[task_idx]:\n                self.agent_targets[agent_idx] = task_idx\n\n    def step(self):\n        self.time_step += 1\n        for i in range(self.n_agents):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                target_pos = self.task_positions[target_idx]\n                diff = target_pos - self.agent_positions[i]\n                if np.sum(np.abs(diff)) <= 1:\n                    self.task_active[target_idx] = False\n                    self.tasks_completed += 1\n                    self.agent_targets[i] = -1\n                else:\n                    move = np.zeros(2, dtype=int)\n                    if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                        move[0] = np.sign(diff[0])\n                    elif diff[1] != 0:\n                        move[1] = np.sign(diff[1])\n                    self.agent_positions[i] = np.clip(\n                        self.agent_positions[i] + move, 0, self.grid_size - 1\n                    )\n                    self.agent_velocities[i] = move\n\n        inactive_tasks = np.where(~self.task_active)[0]\n        for idx in inactive_tasks:\n            if np.random.random() < 0.3:\n                self.task_positions[idx] = np.random.randint(0, self.grid_size, 2)\n                self.task_active[idx] = True\n        return self.get_state()\n\n\nclass CongestionPredictor(nn.Module):\n    def __init__(self, grid_size=20, hidden_dim=64):\n        super().__init__()\n        self.conv1 = nn.Conv2d(2, hidden_dim, 3, padding=1)\n        self.conv2 = nn.Conv2d(hidden_dim, hidden_dim, 3, padding=1)\n        self.conv3 = nn.Conv2d(hidden_dim, 1, 3, padding=1)\n        self.relu = nn.ReLU()\n\n    def forward(self, x):\n        x = self.relu(self.conv1(x))\n        x = self.relu(self.conv2(x))\n        x = torch.sigmoid(self.conv3(x))\n        return x\n\n\ndef generate_training_data(n_samples=1000, grid_size=20, n_agents=20, n_tasks=30):\n    states, congestions = [], []\n    for _ in range(n_samples):\n        sim = WarehouseSimulator(grid_size, n_agents, n_tasks)\n        state = sim.get_state()\n        active_tasks = np.where(sim.task_active)[0]\n        assignment = [\n            (i, active_tasks[i]) for i in range(min(n_agents, len(active_tasks)))\n        ]\n        sim.assign_tasks(assignment)\n        congestion = sim.compute_congestion(lookahead=5)\n        congestion = congestion / (congestion.max() + 1e-6)\n        states.append(state)\n        congestions.append(congestion)\n    return np.array(states), np.array(congestions)\n\n\ndef distance_based_assignment(agent_positions, task_positions, task_active):\n    n_agents = len(agent_positions)\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    cost_matrix = np.zeros((n_agents, len(active_indices)))\n    for i, agent_pos in enumerate(agent_positions):\n        for j, task_idx in enumerate(active_indices):\n            cost_matrix[i, j] = np.sum(np.abs(agent_pos - task_positions[task_idx]))\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef congestion_aware_assignment(\n    agent_positions, task_positions, task_active, congestion_map, congestion_weight=2.0\n):\n    n_agents = len(agent_positions)\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    cost_matrix = np.zeros((n_agents, len(active_indices)))\n    grid_size = congestion_map.shape[0]\n    for i, agent_pos in enumerate(agent_positions):\n        for j, task_idx in enumerate(active_indices):\n            task_pos = task_positions[task_idx]\n            distance = np.sum(np.abs(agent_pos - task_pos))\n            path_congestion = 0\n            current = agent_pos.copy()\n            while not np.array_equal(current, task_pos):\n                diff = task_pos - current\n                if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                    current[0] += np.sign(diff[0])\n                elif diff[1] != 0:\n                    current[1] += np.sign(diff[1])\n                current = np.clip(current, 0, grid_size - 1)\n                path_congestion += congestion_map[current[0], current[1]]\n            cost_matrix[i, j] = distance + congestion_weight * path_congestion\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef train_predictor(\n    model,\n    train_states,\n    train_congestions,\n    val_states,\n    val_congestions,\n    epochs=50,\n    batch_size=32,\n):\n    model = model.to(device)\n    optimizer = optim.Adam(model.parameters(), lr=0.001)\n    criterion = nn.MSELoss()\n    train_states = torch.FloatTensor(train_states).to(device)\n    train_congestions = torch.FloatTensor(train_congestions).unsqueeze(1).to(device)\n    val_states = torch.FloatTensor(val_states).to(device)\n    val_congestions = torch.FloatTensor(val_congestions).unsqueeze(1).to(device)\n    n_train = len(train_states)\n\n    for epoch in range(epochs):\n        model.train()\n        perm = torch.randperm(n_train)\n        train_loss, n_batches = 0, 0\n        for i in range(0, n_train, batch_size):\n            idx = perm[i : i + batch_size]\n            batch_states, batch_targets = train_states[idx], train_congestions[idx]\n            optimizer.zero_grad()\n            predictions = model(batch_states)\n            loss = criterion(predictions, batch_targets)\n            loss.backward()\n            optimizer.step()\n            train_loss += loss.item()\n            n_batches += 1\n        train_loss /= n_batches\n        model.eval()\n        with torch.no_grad():\n            val_loss = criterion(model(val_states), val_congestions).item()\n        experiment_data[\"training\"][\"losses\"][\"train\"].append(train_loss)\n        experiment_data[\"training\"][\"losses\"][\"val\"].append(val_loss)\n        experiment_data[\"training\"][\"epochs\"].append(epoch)\n        if epoch % 10 == 0:\n            print(\n                f\"Epoch {epoch}: train_loss = {train_loss:.4f}, validation_loss = {val_loss:.4f}\"\n            )\n    return model\n\n\ndef evaluate_throughput(\n    method,\n    model=None,\n    n_episodes=10,\n    max_steps=200,\n    grid_size=20,\n    n_agents=20,\n    n_tasks=30,\n):\n    throughputs = []\n    for _ in range(n_episodes):\n        sim = WarehouseSimulator(grid_size, n_agents, n_tasks)\n        for step in range(max_steps):\n            state = sim.get_state()\n            unassigned = [\n                i\n                for i in range(n_agents)\n                if sim.agent_targets[i] < 0 or not sim.task_active[sim.agent_targets[i]]\n            ]\n            if len(unassigned) > 0 and np.any(sim.task_active):\n                if method == \"distance\":\n                    assignment = distance_based_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                    )\n                else:\n                    state_tensor = torch.FloatTensor(state).unsqueeze(0).to(device)\n                    with torch.no_grad():\n                        congestion_pred = model(state_tensor).squeeze().cpu().numpy()\n                    assignment = congestion_aware_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                        congestion_pred,\n                    )\n                assignment = [(unassigned[a], t) for a, t in assignment]\n                sim.assign_tasks(assignment)\n            sim.step()\n        throughputs.append(sim.tasks_completed / (max_steps / 60.0))\n    return np.mean(throughputs), np.std(throughputs)\n\n\nprint(\"Generating training data...\")\ntrain_states, train_congestions = generate_training_data(n_samples=800)\nval_states, val_congestions = generate_training_data(n_samples=200)\nprint(\n    f\"Training data shape: {train_states.shape}, Validation data shape: {val_states.shape}\"\n)\n\nprint(\"\\nTraining congestion predictor...\")\nmodel = CongestionPredictor(grid_size=20, hidden_dim=64)\nmodel = train_predictor(\n    model, train_states, train_congestions, val_states, val_congestions, epochs=50\n)\n\nprint(\"\\nEvaluating methods...\")\nagent_counts = [20, 30, 40, 50]\nresults = {\"distance\": [], \"congestion_aware\": []}\n\nfor n_agents in agent_counts:\n    print(f\"\\nTesting with {n_agents} agents...\")\n    dist_throughput, dist_std = evaluate_throughput(\n        \"distance\", n_episodes=5, n_agents=n_agents\n    )\n    results[\"distance\"].append((n_agents, dist_throughput, dist_std))\n    experiment_data[\"evaluation\"][\"distance_based\"][\"throughput\"].append(\n        {\"n_agents\": n_agents, \"mean\": dist_throughput, \"std\": dist_std}\n    )\n    print(\n        f\"  Distance-based: throughput_tasks_per_minute = {dist_throughput:.2f} \u00b1 {dist_std:.2f}\"\n    )\n\n    cata_throughput, cata_std = evaluate_throughput(\n        \"congestion_aware\", model=model, n_episodes=5, n_agents=n_agents\n    )\n    results[\"congestion_aware\"].append((n_agents, cata_throughput, cata_std))\n    experiment_data[\"evaluation\"][\"congestion_aware\"][\"throughput\"].append(\n        {\"n_agents\": n_agents, \"mean\": cata_throughput, \"std\": cata_std}\n    )\n    print(\n        f\"  Congestion-aware: throughput_tasks_per_minute = {cata_throughput:.2f} \u00b1 {cata_std:.2f}\"\n    )\n\nprint(\"\\n\" + \"=\" * 50)\nprint(\"SUMMARY: Throughput (tasks per minute)\")\nprint(\"=\" * 50)\nfor i, n_agents in enumerate(agent_counts):\n    dist_t, cata_t = results[\"distance\"][i][1], results[\"congestion_aware\"][i][1]\n    improvement = (cata_t - dist_t) / dist_t * 100\n    print(\n        f\"Agents={n_agents}: Distance={dist_t:.2f}, CATA={cata_t:.2f}, Improvement={improvement:.1f}%\"\n    )\n\nfinal_dist = np.mean([r[1] for r in results[\"distance\"]])\nfinal_cata = np.mean([r[1] for r in results[\"congestion_aware\"]])\nprint(f\"\\nOverall Average:\")\nprint(f\"  Distance-based throughput_tasks_per_minute: {final_dist:.2f}\")\nprint(f\"  Congestion-aware throughput_tasks_per_minute: {final_cata:.2f}\")\n\nfig, axes = plt.subplots(1, 3, figsize=(15, 4))\naxes[0].plot(experiment_data[\"training\"][\"losses\"][\"train\"], label=\"Train\")\naxes[0].plot(experiment_data[\"training\"][\"losses\"][\"val\"], label=\"Validation\")\naxes[0].set_xlabel(\"Epoch\")\naxes[0].set_ylabel(\"Loss\")\naxes[0].set_title(\"Congestion Predictor Training\")\naxes[0].legend()\n\nx = np.arange(len(agent_counts))\nwidth = 0.35\naxes[1].bar(\n    x - width / 2,\n    [r[1] for r in results[\"distance\"]],\n    width,\n    yerr=[r[2] for r in results[\"distance\"]],\n    label=\"Distance-based\",\n    alpha=0.8,\n)\naxes[1].bar(\n    x + width / 2,\n    [r[1] for r in results[\"congestion_aware\"]],\n    width,\n    yerr=[r[2] for r in results[\"congestion_aware\"]],\n    label=\"CATA\",\n    alpha=0.8,\n)\naxes[1].set_xlabel(\"Number of Agents\")\naxes[1].set_ylabel(\"Throughput (tasks/min)\")\naxes[1].set_title(\"Throughput Comparison\")\naxes[1].set_xticks(x)\naxes[1].set_xticklabels(agent_counts)\naxes[1].legend()\n\nmodel.eval()\nsample_state = torch.FloatTensor(val_states[0:1]).to(device)\nwith torch.no_grad():\n    pred_congestion = model(sample_state).squeeze().cpu().numpy()\nim = axes[2].imshow(pred_congestion, cmap=\"hot\")\naxes[2].set_title(\"Sample Predicted Congestion Heatmap\")\nplt.colorbar(im, ax=axes[2])\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"cata_baseline_results.png\"), dpi=150)\nplt.close()\n\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(f\"\\nResults saved to {working_dir}\")\n", "# Set random seed\nimport random\nimport numpy as np\nimport torch\n\nseed = 1\nrandom.seed(seed)\nnp.random.seed(seed)\ntorch.manual_seed(seed)\nif torch.cuda.is_available():\n    torch.cuda.manual_seed(seed)\n\nimport os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.optim as optim\nimport matplotlib.pyplot as plt\nfrom collections import defaultdict\nimport time\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n# Experiment data storage\nexperiment_data = {\n    \"training\": {\"losses\": {\"train\": [], \"val\": []}, \"epochs\": []},\n    \"evaluation\": {\n        \"distance_based\": {\"throughput\": []},\n        \"congestion_aware\": {\"throughput\": []},\n    },\n}\n\n\ndef greedy_assignment(cost_matrix):\n    \"\"\"Greedy assignment as a replacement for Hungarian algorithm.\"\"\"\n    n_agents, n_tasks = cost_matrix.shape\n    row_ind = []\n    col_ind = []\n    assigned_tasks = set()\n\n    # Sort all agent-task pairs by cost\n    pairs = []\n    for i in range(n_agents):\n        for j in range(n_tasks):\n            pairs.append((cost_matrix[i, j], i, j))\n    pairs.sort()\n\n    assigned_agents = set()\n    for cost, i, j in pairs:\n        if i not in assigned_agents and j not in assigned_tasks:\n            row_ind.append(i)\n            col_ind.append(j)\n            assigned_agents.add(i)\n            assigned_tasks.add(j)\n            if len(assigned_agents) == min(n_agents, n_tasks):\n                break\n\n    return np.array(row_ind), np.array(col_ind)\n\n\nclass WarehouseSimulator:\n    def __init__(self, grid_size=20, n_agents=20, n_tasks=30):\n        self.grid_size = grid_size\n        self.n_agents = n_agents\n        self.n_tasks = n_tasks\n        self.reset()\n\n    def reset(self):\n        self.agent_positions = np.random.randint(0, self.grid_size, (self.n_agents, 2))\n        self.agent_velocities = np.zeros((self.n_agents, 2))\n        self.task_positions = np.random.randint(0, self.grid_size, (self.n_tasks, 2))\n        self.task_active = np.ones(self.n_tasks, dtype=bool)\n        self.agent_targets = [-1] * self.n_agents\n        self.time_step = 0\n        self.tasks_completed = 0\n        return self.get_state()\n\n    def get_state(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        task_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        for i, pos in enumerate(self.task_positions):\n            if self.task_active[i]:\n                task_grid[pos[0], pos[1]] += 1\n        return np.stack([agent_grid, task_grid], axis=0)\n\n    def compute_congestion(self, lookahead=5):\n        congestion = np.zeros((self.grid_size, self.grid_size))\n        for i, agent_pos in enumerate(self.agent_positions):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                target_pos = self.task_positions[target_idx]\n                path = self._get_path(agent_pos, target_pos)\n                for step, pos in enumerate(path[:lookahead]):\n                    congestion[pos[0], pos[1]] += 1.0 / (step + 1)\n        return congestion\n\n    def _get_path(self, start, end):\n        path = [tuple(start)]\n        current = np.array(start)\n        while not np.array_equal(current, end):\n            diff = end - current\n            if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                current[0] += np.sign(diff[0])\n            elif diff[1] != 0:\n                current[1] += np.sign(diff[1])\n            path.append(tuple(current))\n        return path\n\n    def assign_tasks(self, assignment):\n        for agent_idx, task_idx in assignment:\n            if task_idx >= 0 and self.task_active[task_idx]:\n                self.agent_targets[agent_idx] = task_idx\n\n    def step(self):\n        self.time_step += 1\n        for i in range(self.n_agents):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                target_pos = self.task_positions[target_idx]\n                diff = target_pos - self.agent_positions[i]\n                if np.sum(np.abs(diff)) <= 1:\n                    self.task_active[target_idx] = False\n                    self.tasks_completed += 1\n                    self.agent_targets[i] = -1\n                else:\n                    move = np.zeros(2, dtype=int)\n                    if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                        move[0] = np.sign(diff[0])\n                    elif diff[1] != 0:\n                        move[1] = np.sign(diff[1])\n                    self.agent_positions[i] = np.clip(\n                        self.agent_positions[i] + move, 0, self.grid_size - 1\n                    )\n                    self.agent_velocities[i] = move\n\n        inactive_tasks = np.where(~self.task_active)[0]\n        for idx in inactive_tasks:\n            if np.random.random() < 0.3:\n                self.task_positions[idx] = np.random.randint(0, self.grid_size, 2)\n                self.task_active[idx] = True\n        return self.get_state()\n\n\nclass CongestionPredictor(nn.Module):\n    def __init__(self, grid_size=20, hidden_dim=64):\n        super().__init__()\n        self.conv1 = nn.Conv2d(2, hidden_dim, 3, padding=1)\n        self.conv2 = nn.Conv2d(hidden_dim, hidden_dim, 3, padding=1)\n        self.conv3 = nn.Conv2d(hidden_dim, 1, 3, padding=1)\n        self.relu = nn.ReLU()\n\n    def forward(self, x):\n        x = self.relu(self.conv1(x))\n        x = self.relu(self.conv2(x))\n        x = torch.sigmoid(self.conv3(x))\n        return x\n\n\ndef generate_training_data(n_samples=1000, grid_size=20, n_agents=20, n_tasks=30):\n    states, congestions = [], []\n    for _ in range(n_samples):\n        sim = WarehouseSimulator(grid_size, n_agents, n_tasks)\n        state = sim.get_state()\n        active_tasks = np.where(sim.task_active)[0]\n        assignment = [\n            (i, active_tasks[i]) for i in range(min(n_agents, len(active_tasks)))\n        ]\n        sim.assign_tasks(assignment)\n        congestion = sim.compute_congestion(lookahead=5)\n        congestion = congestion / (congestion.max() + 1e-6)\n        states.append(state)\n        congestions.append(congestion)\n    return np.array(states), np.array(congestions)\n\n\ndef distance_based_assignment(agent_positions, task_positions, task_active):\n    n_agents = len(agent_positions)\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    cost_matrix = np.zeros((n_agents, len(active_indices)))\n    for i, agent_pos in enumerate(agent_positions):\n        for j, task_idx in enumerate(active_indices):\n            cost_matrix[i, j] = np.sum(np.abs(agent_pos - task_positions[task_idx]))\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef congestion_aware_assignment(\n    agent_positions, task_positions, task_active, congestion_map, congestion_weight=2.0\n):\n    n_agents = len(agent_positions)\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    cost_matrix = np.zeros((n_agents, len(active_indices)))\n    grid_size = congestion_map.shape[0]\n    for i, agent_pos in enumerate(agent_positions):\n        for j, task_idx in enumerate(active_indices):\n            task_pos = task_positions[task_idx]\n            distance = np.sum(np.abs(agent_pos - task_pos))\n            path_congestion = 0\n            current = agent_pos.copy()\n            while not np.array_equal(current, task_pos):\n                diff = task_pos - current\n                if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                    current[0] += np.sign(diff[0])\n                elif diff[1] != 0:\n                    current[1] += np.sign(diff[1])\n                current = np.clip(current, 0, grid_size - 1)\n                path_congestion += congestion_map[current[0], current[1]]\n            cost_matrix[i, j] = distance + congestion_weight * path_congestion\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef train_predictor(\n    model,\n    train_states,\n    train_congestions,\n    val_states,\n    val_congestions,\n    epochs=50,\n    batch_size=32,\n):\n    model = model.to(device)\n    optimizer = optim.Adam(model.parameters(), lr=0.001)\n    criterion = nn.MSELoss()\n    train_states = torch.FloatTensor(train_states).to(device)\n    train_congestions = torch.FloatTensor(train_congestions).unsqueeze(1).to(device)\n    val_states = torch.FloatTensor(val_states).to(device)\n    val_congestions = torch.FloatTensor(val_congestions).unsqueeze(1).to(device)\n    n_train = len(train_states)\n\n    for epoch in range(epochs):\n        model.train()\n        perm = torch.randperm(n_train)\n        train_loss, n_batches = 0, 0\n        for i in range(0, n_train, batch_size):\n            idx = perm[i : i + batch_size]\n            batch_states, batch_targets = train_states[idx], train_congestions[idx]\n            optimizer.zero_grad()\n            predictions = model(batch_states)\n            loss = criterion(predictions, batch_targets)\n            loss.backward()\n            optimizer.step()\n            train_loss += loss.item()\n            n_batches += 1\n        train_loss /= n_batches\n        model.eval()\n        with torch.no_grad():\n            val_loss = criterion(model(val_states), val_congestions).item()\n        experiment_data[\"training\"][\"losses\"][\"train\"].append(train_loss)\n        experiment_data[\"training\"][\"losses\"][\"val\"].append(val_loss)\n        experiment_data[\"training\"][\"epochs\"].append(epoch)\n        if epoch % 10 == 0:\n            print(\n                f\"Epoch {epoch}: train_loss = {train_loss:.4f}, validation_loss = {val_loss:.4f}\"\n            )\n    return model\n\n\ndef evaluate_throughput(\n    method,\n    model=None,\n    n_episodes=10,\n    max_steps=200,\n    grid_size=20,\n    n_agents=20,\n    n_tasks=30,\n):\n    throughputs = []\n    for _ in range(n_episodes):\n        sim = WarehouseSimulator(grid_size, n_agents, n_tasks)\n        for step in range(max_steps):\n            state = sim.get_state()\n            unassigned = [\n                i\n                for i in range(n_agents)\n                if sim.agent_targets[i] < 0 or not sim.task_active[sim.agent_targets[i]]\n            ]\n            if len(unassigned) > 0 and np.any(sim.task_active):\n                if method == \"distance\":\n                    assignment = distance_based_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                    )\n                else:\n                    state_tensor = torch.FloatTensor(state).unsqueeze(0).to(device)\n                    with torch.no_grad():\n                        congestion_pred = model(state_tensor).squeeze().cpu().numpy()\n                    assignment = congestion_aware_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                        congestion_pred,\n                    )\n                assignment = [(unassigned[a], t) for a, t in assignment]\n                sim.assign_tasks(assignment)\n            sim.step()\n        throughputs.append(sim.tasks_completed / (max_steps / 60.0))\n    return np.mean(throughputs), np.std(throughputs)\n\n\nprint(\"Generating training data...\")\ntrain_states, train_congestions = generate_training_data(n_samples=800)\nval_states, val_congestions = generate_training_data(n_samples=200)\nprint(\n    f\"Training data shape: {train_states.shape}, Validation data shape: {val_states.shape}\"\n)\n\nprint(\"\\nTraining congestion predictor...\")\nmodel = CongestionPredictor(grid_size=20, hidden_dim=64)\nmodel = train_predictor(\n    model, train_states, train_congestions, val_states, val_congestions, epochs=50\n)\n\nprint(\"\\nEvaluating methods...\")\nagent_counts = [20, 30, 40, 50]\nresults = {\"distance\": [], \"congestion_aware\": []}\n\nfor n_agents in agent_counts:\n    print(f\"\\nTesting with {n_agents} agents...\")\n    dist_throughput, dist_std = evaluate_throughput(\n        \"distance\", n_episodes=5, n_agents=n_agents\n    )\n    results[\"distance\"].append((n_agents, dist_throughput, dist_std))\n    experiment_data[\"evaluation\"][\"distance_based\"][\"throughput\"].append(\n        {\"n_agents\": n_agents, \"mean\": dist_throughput, \"std\": dist_std}\n    )\n    print(\n        f\"  Distance-based: throughput_tasks_per_minute = {dist_throughput:.2f} \u00b1 {dist_std:.2f}\"\n    )\n\n    cata_throughput, cata_std = evaluate_throughput(\n        \"congestion_aware\", model=model, n_episodes=5, n_agents=n_agents\n    )\n    results[\"congestion_aware\"].append((n_agents ks(x)\naxes[1].set_xticklabels(agent_counts)\naxes[1].legend()\n\nmodel.eval()\nsample_state = torch.FloatTensor(val_states[0:1]).to(device)\nwith torch.no_grad():\n    pred_congestion = model(sample_state).squeeze().cpu().numpy()\nim = axes[2].imshow(pred_congestion, cmap=\"hot\")\naxes[2].set_title(\"Sample Predicted Congestion Heatmap\")\nplt.colorbar(im, ax=axes[2])\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"cata_baseline_results.png\"), dpi=150)\nplt.close()\n\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(f\"\\nResults saved to {working_dir}\")\n", "# Set random seed\nimport random\nimport numpy as np\nimport torch\n\nseed = 2\nrandom.seed(seed)\nnp.random.seed(seed)\ntorch.manual_seed(seed)\nif torch.cuda.is_available():\n    torch.cuda.manual_seed(seed)\n\nimport os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.optim as optim\nimport matplotlib.pyplot as plt\nfrom collections import defaultdict\nimport time\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n# Experiment data storage\nexperiment_data = {\n    \"training\": {\"losses\": {\"train\": [], \"val\": []}, \"epochs\": []},\n    \"evaluation\": {\n        \"distance_based\": {\"throughput\": []},\n        \"congestion_aware\": {\"throughput\": []},\n    },\n}\n\n\ndef greedy_assignment(cost_matrix):\n    \"\"\"Greedy assignment as a replacement for Hungarian algorithm.\"\"\"\n    n_agents, n_tasks = cost_matrix.shape\n    row_ind = []\n    col_ind = []\n    assigned_tasks = set()\n\n    # Sort all agent-task pairs by cost\n    pairs = []\n    for i in range(n_agents):\n        for j in range(n_tasks):\n            pairs.append((cost_matrix[i, j], i, j))\n    pairs.sort()\n\n    assigned_agents = set()\n    for cost, i, j in pairs:\n        if i not in assigned_agents and j not in assigned_tasks:\n            row_ind.append(i)\n            col_ind.append(j)\n            assigned_agents.add(i)\n            assigned_tasks.add(j)\n            if len(assigned_agents) == min(n_agents, n_tasks):\n                break\n\n    return np.array(row_ind), np.array(col_ind)\n\n\nclass WarehouseSimulator:\n    def __init__(self, grid_size=20, n_agents=20, n_tasks=30):\n        self.grid_size = grid_size\n        self.n_agents = n_agents\n        self.n_tasks = n_tasks\n        self.reset()\n\n    def reset(self):\n        self.agent_positions = np.random.randint(0, self.grid_size, (self.n_agents, 2))\n        self.agent_velocities = np.zeros((self.n_agents, 2))\n        self.task_positions = np.random.randint(0, self.grid_size, (self.n_tasks, 2))\n        self.task_active = np.ones(self.n_tasks, dtype=bool)\n        self.agent_targets = [-1] * self.n_agents\n        self.time_step = 0\n        self.tasks_completed = 0\n        return self.get_state()\n\n    def get_state(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        task_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        for i, pos in enumerate(self.task_positions):\n            if self.task_active[i]:\n                task_grid[pos[0], pos[1]] += 1\n        return np.stack([agent_grid, task_grid], axis=0)\n\n    def compute_congestion(self, lookahead=5):\n        congestion = np.zeros((self.grid_size, self.grid_size))\n        for i, agent_pos in enumerate(self.agent_positions):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                target_pos = self.task_positions[target_idx]\n                path = self._get_path(agent_pos, target_pos)\n                for step, pos in enumerate(path[:lookahead]):\n                    congestion[pos[0], pos[1]] += 1.0 / (step + 1)\n        return congestion\n\n    def _get_path(self, start, end):\n        path = [tuple(start)]\n        current = np.array(start)\n        while not np.array_equal(current, end):\n            diff = end - current\n            if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                current[0] += np.sign(diff[0])\n            elif diff[1] != 0:\n                current[1] += np.sign(diff[1])\n            path.append(tuple(current))\n        return path\n\n    def assign_tasks(self, assignment):\n        for agent_idx, task_idx in assignment:\n            if task_idx >= 0 and self.task_active[task_idx]:\n                self.agent_targets[agent_idx] = task_idx\n\n    def step(self):\n        self.time_step += 1\n        for i in range(self.n_agents):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                target_pos = self.task_positions[target_idx]\n                diff = target_pos - self.agent_positions[i]\n                if np.sum(np.abs(diff)) <= 1:\n                    self.task_active[target_idx] = False\n                    self.tasks_completed += 1\n                    self.agent_targets[i] = -1\n                else:\n                    move = np.zeros(2, dtype=int)\n                    if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                        move[0] = np.sign(diff[0])\n                    elif diff[1] != 0:\n                        move[1] = np.sign(diff[1])\n                    self.agent_positions[i] = np.clip(\n                        self.agent_positions[i] + move, 0, self.grid_size - 1\n                    )\n                    self.agent_velocities[i] = move\n\n        inactive_tasks = np.where(~self.task_active)[0]\n        for idx in inactive_tasks:\n            if np.random.random() < 0.3:\n                self.task_positions[idx] = np.random.randint(0, self.grid_size, 2)\n                self.task_active[idx] = True\n        return self.get_state()\n\n\nclass CongestionPredictor(nn.Module):\n    def __init__(self, grid_size=20, hidden_dim=64):\n        super().__init__()\n        self.conv1 = nn.Conv2d(2, hidden_dim, 3, padding=1)\n        self.conv2 = nn.Conv2d(hidden_dim, hidden_dim, 3, padding=1)\n        self.conv3 = nn.Conv2d(hidden_dim, 1, 3, padding=1)\n        self.relu = nn.ReLU()\n\n    def forward(self, x):\n        x = self.relu(self.conv1(x))\n        x = self.relu(self.conv2(x))\n        x = torch.sigmoid(self.conv3(x))\n        return x\n\n\ndef generate_training_data(n_samples=1000, grid_size=20, n_agents=20, n_tasks=30):\n    states, congestions = [], []\n    for _ in range(n_samples):\n        sim = WarehouseSimulator(grid_size, n_agents, n_tasks)\n        state = sim.get_state()\n        active_tasks = np.where(sim.task_active)[0]\n        assignment = [\n            (i, active_tasks[i]) for i in range(min(n_agents, len(active_tasks)))\n        ]\n        sim.assign_tasks(assignment)\n        congestion = sim.compute_congestion(lookahead=5)\n        congestion = congestion / (congestion.max() + 1e-6)\n        states.append(state)\n        congestions.append(congestion)\n    return np.array(states), np.array(congestions)\n\n\ndef distance_based_assignment(agent_positions, task_positions, task_active):\n    n_agents = len(agent_positions)\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    cost_matrix = np.zeros((n_agents, len(active_indices)))\n    for i, agent_pos in enumerate(agent_positions):\n        for j, task_idx in enumerate(active_indices):\n            cost_matrix[i, j] = np.sum(np.abs(agent_pos - task_positions[task_idx]))\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef congestion_aware_assignment(\n    agent_positions, task_positions, task_active, congestion_map, congestion_weight=2.0\n):\n    n_agents = len(agent_positions)\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    cost_matrix = np.zeros((n_agents, len(active_indices)))\n    grid_size = congestion_map.shape[0]\n    for i, agent_pos in enumerate(agent_positions):\n        for j, task_idx in enumerate(active_indices):\n            task_pos = task_positions[task_idx]\n            distance = np.sum(np.abs(agent_pos - task_pos))\n            path_congestion = 0\n            current = agent_pos.copy()\n            while not np.array_equal(current, task_pos):\n                diff = task_pos - current\n                if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                    current[0] += np.sign(diff[0])\n                elif diff[1] != 0:\n                    current[1] += np.sign(diff[1])\n                current = np.clip(current, 0, grid_size - 1)\n                path_congestion += congestion_map[current[0], current[1]]\n            cost_matrix[i, j] = distance + congestion_weight * path_congestion\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef train_predictor(\n    model,\n    train_states,\n    train_congestions,\n    val_states,\n    val_congestions,\n    epochs=50,\n    batch_size=32,\n):\n    model = model.to(device)\n    optimizer = optim.Adam(model.parameters(), lr=0.001)\n    criterion = nn.MSELoss()\n    train_states = torch.FloatTensor(train_states).to(device)\n    train_congestions = torch.FloatTensor(train_congestions).unsqueeze(1).to(device)\n    val_states = torch.FloatTensor(val_states).to(device)\n    val_congestions = torch.FloatTensor(val_congestions).unsqueeze(1).to(device)\n    n_train = len(train_states)\n\n    for epoch in range(epochs):\n        model.train()\n        perm = torch.randperm(n_train)\n        train_loss, n_batches = 0, 0\n        for i in range(0, n_train, batch_size):\n            idx = perm[i : i + batch_size]\n            batch_states, batch_targets = train_states[idx], train_congestions[idx]\n            optimizer.zero_grad()\n            predictions = model(batch_states)\n            loss = criterion(predictions, batch_targets)\n            loss.backward()\n            optimizer.step()\n            train_loss += loss.item()\n            n_batches += 1\n        train_loss /= n_batches\n        model.eval()\n        with torch.no_grad():\n            val_loss = criterion(model(val_states), val_congestions).item()\n        experiment_data[\"training\"][\"losses\"][\"train\"].append(train_loss)\n        experiment_data[\"training\"][\"losses\"][\"val\"].append(val_loss)\n        experiment_data[\"training\"][\"epochs\"].append(epoch)\n        if epoch % 10 == 0:\n            print(\n                f\"Epoch {epoch}: train_loss = {train_loss:.4f}, validation_loss = {val_loss:.4f}\"\n            )\n    return model\n\n\ndef evaluate_throughput(\n    method,\n    model=None,\n    n_episodes=10,\n    max_steps=200,\n    grid_size=20,\n    n_agents=20,\n    n_tasks=30,\n):\n    throughputs = []\n    for _ in range(n_episodes):\n        sim = WarehouseSimulator(grid_size, n_agents, n_tasks)\n        for step in range(max_steps):\n            state = sim.get_state()\n            unassigned = [\n                i\n                for i in range(n_agents)\n                if sim.agent_targets[i] < 0 or not sim.task_active[sim.agent_targets[i]]\n            ]\n            if len(unassigned) > 0 and np.any(sim.task_active):\n                if method == \"distance\":\n                    assignment = distance_based_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                    )\n                else:\n                    state_tensor = torch.FloatTensor(state).unsqueeze(0).to(device)\n                    with torch.no_grad():\n                        congestion_pred = model(state_tensor).squeeze().cpu().numpy()\n                    assignment = congestion_aware_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                        congestion_pred,\n                    )\n                assignment = [(unassigned[a], t) for a, t in assignment]\n                sim.assign_tasks(assignment)\n            sim.step()\n        throughputs.append(sim.tasks_completed / (max_steps / 60.0))\n    return np.mean(throughputs), np.std(throughputs)\n\n\nprint(\"Generating training data...\")\ntrain_states, train_congestions = generate_training_data(n_samples=800)\nval_states, val_congestions = generate_training_data(n_samples=200)\nprint(\n    f\"Training data shape: {train_states.shape}, Validation data shape: {val_states.shape}\"\n)\n\nprint(\"\\nTraining congestion predictor...\")\nmodel = CongestionPredictor(grid_size=20, hidden_dim=64)\nmodel = train_predictor(\n    model, train_states, train_congestions, val_states, val_congestions, epochs=50\n)\n\nprint(\"\\nEvaluating methods...\")\nagent_counts = [20, 30, 40, 50]\nresults = {\"distance\": [], \"congestion_aware\": []}\n\nfor n_agents in agent_counts:\n    print(f\"\\nTesting with {n_agents} agents...\")\n    dist_throughput, dist_std = evaluate_throughput(\n        \"distance\", n_episodes=5, n_agents=n_agents\n    )\n    results[\"distance\"].append((n_agents, dist_throughput, dist_std))\n    experiment_data[\"evaluation\"][\"distance_based\"][\"throughput\"].append(\n        {\"n_agents\": n_agents, \"mean\": dist_throughput, \"std\": dist_std}\n    )\n    print(\n        f\"  Distance-based: throughput_tasks_per_minute = {dist_throughput:.2f} \u00b1 {dist_std:.2f}\"\n    )\n\n    cata_throughput, cata_std = evaluate_throughput(\n        \"congestion_aware\", model=model, n_episodes=5, n_agents=n_agents\n    )\n    results[\"congestion_aware\"].append((n_agents, cata_throughput, cata_std))\n    experi
