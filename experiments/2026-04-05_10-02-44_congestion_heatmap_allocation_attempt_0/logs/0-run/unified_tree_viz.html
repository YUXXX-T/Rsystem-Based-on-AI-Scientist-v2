      self.congestion_events = 0\n        self.reset()\n\n    def _valid_position(self, pos):\n        return tuple(pos) not in self.obstacles\n\n    def _random_valid_position(self):\n        for _ in range(100):\n            pos = np.random.randint(0, self.grid_size, 2)\n            if self._valid_position(pos):\n                return pos\n        return np.array([0, 0])\n\n    def _hotspot_biased_position(self):\n        if self.hotspots and np.random.random() < 0.6:\n            hotspot = self.hotspots[np.random.randint(len(self.hotspots))]\n            offset = np.random.randint(-2, 3, 2)\n            pos = np.clip(hotspot + offset, 0, self.grid_size - 1)\n            if self._valid_position(pos):\n                return pos\n        return self._random_valid_position()\n\n    def reset(self):\n        self.agent_positions = np.array(\n            [self._random_valid_position() for _ in range(self.n_agents)]\n        )\n        self.agent_velocities = np.zeros((self.n_agents, 2))\n        self.task_positions = np.array(\n            [self._hotspot_biased_position() for _ in range(self.n_tasks)]\n        )\n        self.task_active = np.ones(self.n_tasks, dtype=bool)\n        self.agent_targets = [-1] * self.n_agents\n        self.time_step, self.tasks_completed = 0, 0\n        self.congestion_events = 0\n        return self.get_state()\n\n    def get_state(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        task_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        for i, pos in enumerate(self.task_positions):\n            if self.task_active[i]:\n                task_grid[pos[0], pos[1]] += 1\n        return np.stack([agent_grid, task_grid], axis=0)\n\n    def count_congestion_events(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        return np.sum(agent_grid > 2)\n\n    def compute_congestion(self, lookahead=5):\n        congestion = np.zeros((self.grid_size, self.grid_size))\n        for i, agent_pos in enumerate(self.agent_positions):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                path = self._get_path(agent_pos, self.task_positions[target_idx])\n                for step, pos in enumerate(path[:lookahead]):\n                    congestion[pos[0], pos[1]] += 1.0 / (step + 1)\n        return congestion\n\n    def _get_path(self, start, end):\n        path, current = [tuple(start)], np.array(start)\n        max_steps = self.grid_size * 2\n        for _ in range(max_steps):\n            if np.array_equal(current, end):\n                break\n            diff = end - current\n            moved = False\n            for d in [0, 1]:\n                if diff[d] != 0:\n                    new_pos = current.copy()\n                    new_pos[d] += np.sign(diff[d])\n                    if self._valid_position(new_pos):\n                        current = new_pos\n                        moved = True\n                        break\n            if not moved:\n                break\n            path.append(tuple(current))\n        return path\n\n    def assign_tasks(self, assignment):\n        for agent_idx, task_idx in assignment:\n            if task_idx >= 0 and self.task_active[task_idx]:\n                self.agent_targets[agent_idx] = task_idx\n\n    def step(self):\n        self.time_step += 1\n        self.congestion_events += self.count_congestion_events()\n        for i in range(self.n_agents):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                target_pos = self.task_positions[target_idx]\n                diff = target_pos - self.agent_positions[i]\n                if np.sum(np.abs(diff)) <= 1:\n                    self.task_active[target_idx] = False\n                    self.tasks_completed += 1\n                    self.agent_targets[i] = -1\n                else:\n                    move = np.zeros(2, dtype=int)\n                    for d in [0, 1]:\n                        if diff[d] != 0:\n                            new_pos = self.agent_positions[i].copy()\n                            new_pos[d] += np.sign(diff[d])\n                            if self._valid_position(new_pos):\n                                move[d] = np.sign(diff[d])\n                                break\n                    self.agent_positions[i] = np.clip(\n                        self.agent_positions[i] + move, 0, self.grid_size - 1\n                    )\n                    self.agent_velocities[i] = move\n        for idx in np.where(~self.task_active)[0]:\n            if np.random.random() < 0.3:\n                self.task_positions[idx] = self._hotspot_biased_position()\n                self.task_active[idx] = True\n        return self.get_state()\n\n\ndef create_sparse_warehouse(grid_size=20):\n    obstacles = set()\n    for i in range(5, 15, 5):\n        for j in range(3, grid_size - 3, 4):\n            obstacles.add((i, j))\n    hotspots = [np.array([5, 5]), np.array([15, 15])]\n    return obstacles, hotspots, \"sparse_warehouse\"\n\n\ndef create_bottleneck_warehouse(grid_size=20):\n    obstacles = set()\n    for i in range(grid_size):\n        if i not in [9, 10]:\n            obstacles.add((i, 10))\n    for j in range(grid_size):\n        if j not in [9, 10]:\n            obstacles.add((10, j))\n    hotspots = [\n        np.array([5, 5]),\n        np.array([5, 15]),\n        np.array([15, 5]),\n        np.array([15, 15]),\n    ]\n    return obstacles, hotspots, \"bottleneck_warehouse\"\n\n\ndef create_dense_obstacle_warehouse(grid_size=20):\n    obstacles = set()\n    np.random.seed(42)\n    for _ in range(int(grid_size * grid_size * 0.15)):\n        pos = (np.random.randint(1, grid_size - 1), np.random.randint(1, grid_size - 1))\n        obstacles.add(pos)\n    hotspots = [\n        np.array([3, 3]),\n        np.array([16, 16]),\n        np.array([3, 16]),\n        np.array([16, 3]),\n    ]\n    return obstacles, hotspots, \"dense_obstacle_warehouse\"\n\n\nclass CongestionPredictor(nn.Module):\n    def __init__(self, grid_size=20, hidden_dim=64):\n        super().__init__()\n        self.conv1 = nn.Conv2d(2, hidden_dim, 3, padding=1)\n        self.conv2 = nn.Conv2d(hidden_dim, hidden_dim, 3, padding=1)\n        self.conv3 = nn.Conv2d(hidden_dim, 1, 3, padding=1)\n        self.relu = nn.ReLU()\n\n    def forward(self, x):\n        x = self.relu(self.conv1(x))\n        x = self.relu(self.conv2(x))\n        return torch.sigmoid(self.conv3(x))\n\n\ndef generate_training_data(\n    n_samples=500, grid_size=20, n_agents=20, n_tasks=30, obstacles=None, hotspots=None\n):\n    states, congestions = [], []\n    for _ in range(n_samples):\n        sim = WarehouseSimulator(grid_size, n_agents, n_tasks, obstacles, hotspots)\n        state = sim.get_state()\n        active_tasks = np.where(sim.task_active)[0]\n        sim.assign_tasks(\n            [(i, active_tasks[i]) for i in range(min(n_agents, len(active_tasks)))]\n        )\n        congestion = sim.compute_congestion(lookahead=5)\n        congestion = congestion / (congestion.max() + 1e-6)\n        states.append(state)\n        congestions.append(congestion)\n    return np.array(states), np.array(congestions)\n\n\ndef distance_based_assignment(\n    agent_positions, task_positions, task_active, obstacles=None\n):\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    cost_matrix = np.array(\n        [\n            [np.sum(np.abs(ap - task_positions[ti])) for ti in active_indices]\n            for ap in agent_positions\n        ]\n    )\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef congestion_aware_assignment(\n    agent_positions,\n    task_positions,\n    task_active,\n    congestion_map,\n    congestion_weight=0.5,\n    obstacles=None,\n):\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    grid_size = congestion_map.shape[0]\n    cost_matrix = np.zeros((len(agent_positions), len(active_indices)))\n    for i, agent_pos in enumerate(agent_positions):\n        for j, task_idx in enumerate(active_indices):\n            task_pos = task_positions[task_idx]\n            distance = np.sum(np.abs(agent_pos - task_pos))\n            path_congestion, current = 0, agent_pos.copy()\n            for _ in range(grid_size * 2):\n                if np.array_equal(current, task_pos):\n                    break\n                diff = task_pos - current\n                if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                    current[0] += np.sign(diff[0])\n                elif diff[1] != 0:\n                    current[1] += np.sign(diff[1])\n                current = np.clip(current, 0, grid_size - 1)\n                path_congestion += congestion_map[current[0], current[1]]\n            cost_matrix[i, j] = distance + congestion_weight * path_congestion\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef train_predictor(\n    model,\n    train_states,\n    train_congestions,\n    val_states,\n    val_congestions,\n    epochs=30,\n    batch_size=32,\n    lr=0.001,\n):\n    model = model.to(device)\n    optimizer = optim.Adam(model.parameters(), lr=lr)\n    criterion = nn.MSELoss()\n    train_states_t = torch.FloatTensor(train_states).to(device)\n    train_congestions_t = torch.FloatTensor(train_congestions).unsqueeze(1).to(device)\n    val_states_t = torch.FloatTensor(val_states).to(device)\n    val_congestions_t = torch.FloatTensor(val_congestions).unsqueeze(1).to(device)\n    n_train = len(train_states)\n    train_losses, val_losses = [], []\n    best_val_loss = float(\"inf\")\n    for epoch in range(epochs):\n        model.train()\n        perm = torch.randperm(n_train)\n        train_loss, n_batches = 0, 0\n        for i in range(0, n_train, batch_size):\n            idx = perm[i : i + batch_size]\n            optimizer.zero_grad()\n            loss = criterion(model(train_states_t[idx]), train_congestions_t[idx])\n            loss.backward()\n            optimizer.step()\n            train_loss += loss.item()\n            n_batches += 1\n        train_loss /= n_batches\n        model.eval()\n        with torch.no_grad():\n            val_loss = criterion(model(val_states_t), val_congestions_t).item()\n        train_losses.append(train_loss)\n        val_losses.append(val_loss)\n        best_val_loss = min(best_val_loss, val_loss)\n        print(\n            f\"  Epoch {epoch}: train_loss = {train_loss:.4f}, val_loss = {val_loss:.4f}\"\n        )\n    return model, train_losses, val_losses, best_val_loss\n\n\ndef evaluate_method(method, model, sim_params, n_episodes=5, max_steps=100):\n    throughputs, congestion_events_list = [], []\n    for _ in range(n_episodes):\n        sim = WarehouseSimulator(**sim_params)\n        for step in range(max_steps):\n            state = sim.get_state()\n            unassigned = [\n                i\n                for i in range(sim.n_agents)\n                if sim.agent_targets[i] < 0 or not sim.task_active[sim.agent_targets[i]]\n            ]\n            if len(unassigned) > 0 and np.any(sim.task_active):\n                if method == \"distance\":\n                    assignment = distance_based_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                        sim.obstacles,\n                    )\n                else:\n                    state_tensor = torch.FloatTensor(state).unsqueeze(0).to(device)\n                    with torch.no_grad():\n                        congestion_pred = model(state_tensor).squeeze().cpu().numpy()\n                    assignment = congestion_aware_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                        congestion_pred,\n                        congestion_weight=0.5,\n                        obstacles=sim.obstacles,\n                    )\n                sim.assign_tasks([(unassigned[a], t) for a, t in assignment])\n            sim.step()\n        throughputs.append(sim.tasks_completed / (max_steps / 60.0))\n        congestion_events_list.append(sim.congestion_events)\n    return (\n        np.mean(throughputs),\n        np.std(throughputs),\n        np.mean(congestion_events_list),\n        np.std(congestion_events_list),\n    )\n\n\n# Generate training data\nprint(\"Creating three distinct warehouse datasets...\")\ndatasets = [\n    create_sparse_warehouse(),\n    create_bottleneck_warehouse(),\n    create_dense_obstacle_warehouse(),\n]\n\nall_train_states, all_train_congestions = [], []\nfor obstacles, hotspots, name in datasets:\n    print(f\"  Generating data for: {name}\")\n    states, congestions = generate_training_data(\n        n_samples=300, obstacles=obstacles, hotspots=hotspots\n    )\n    all_train_states.append(states)\n    all_train_congestions.append(congestions)\n\ntrain_states = np.concatenate(all_train_states[:2] + [all_train_states[2][:200]])\ntrain_congestions = np.concatenate(\n    all_train_congestions[:2] + [all_train_congestions[2][:200]]\n)\nval_states = np.concatenate([all_train_states[2][200:]])\nval_congestions = np.concatenate([all_train_congestions[2][200:]])\nprint(f\"Training data: {train_states.shape}, Validation data: {val_states.shape}\")\n\n# Hyperparameter tuning: Learning rates\nlearning_rates = [0.0001, 0.0005, 0.001, 0.005, 0.01]\nprint(\"\\n\" + \"=\" * 70)\nprint(\"HYPERPARAMETER TUNING: LEARNING RATE\")\nprint(\"=\" * 70)\n\nbest_lr = None\nbest_val_loss_overall = float(\"inf\")\nbest_model = None\nmodels = {}\n\nfor lr in learning_rates:\n    lr_key = f\"lr_{lr}\"\n    experiment_data[lr_key] = {\n        \"training\": {\n            \"losses\": {\"train\": [], \"val\": []},\n            \"epochs\": list(range(30)),\n            \"best_val_loss\": None,\n        },\n        \"datasets\": {},\n    }\n\n    print(f\"\\nTraining with learning rate = {lr}\")\n    model = CongestionPredictor(grid_size=20, hidden_dim=64)\n    model, train_losses, val_losses, best_val = train_predictor(\n        model,\n        train_states,\n        train_congestions,\n        val_states,\n        val_congestions,\n        epochs=30,\n        lr=lr,\n    )\n\n    experiment_data[lr_key][\"training\"][\"losses\"][\"train\"] = train_losses\n    experiment_data[lr_key][\"training\"][\"losses\"][\"val\"] = val_losses\n    experiment_data[lr_key][\"training\"][\"best_val_loss\"] = best_val\n    models[lr] = model\n\n    print(f\"  Best validation loss: {best_val:.4f}\")\n    if best_val < best_val_loss_overall:\n        best_val_loss_overall = best_val\n        best_lr = lr\n        best_model = model\n\nprint(\n    f\"\\nBest learning rate: {best_lr} with validation loss: {best_val_loss_overall:.4f}\"\n)\n\n# Evaluate all models on datasets\nprint(\"\\n\" + \"=\" * 70)\nprint(\"EVALUATION ON THREE WAREHOUSE DATASETS\")\nprint(\"=\" * 70)\n\nagent_counts = [20, 30, 40, 50]\nmax_steps = 100\n\nfor lr in learning_rates:\n    lr_key = f\"lr_{lr}\"\n    model = models[lr]\n\n    for obstacles, hotspots, dataset_name in datasets:\n        experiment_data[lr_key][\"datasets\"][dataset_name] = {\n            \"distance_based\": {\n                \"throughput\": [],\n                \"std\": [],\n                \"congestion\": [],\n                \"congestion_std\": [],\n            },\n            \"congestion_aware\": {\n                \"throughput\": [],\n                \"std\": [],\n                \"congestion\": [],\n                \"congestion_std\": [],\n            },\n            \"improvement\": [],\n            \"congestion_prevention_rate\": [],\n            \"n_agents\": agent_counts,\n        }\n\nfor obstacles, hotspots, dataset_name in datasets:\n    print(f\"\\n--- Dataset: {dataset_name} ---\")\n\n    for n_agents in agent_counts:\n        sim_params = {\n            \"grid_size\": 20,\n            \"n_agents\": n_agents,\n            \"n_tasks\": 30,\n            \"obstacles\": obstacles,\n            \"hotspots\": hotspots,\n        }\n        dist_tp, dist_std, dist_cong, dist_cong_std = evaluate_method(\n            \"distance\", None, sim_params, n_episodes=5, max_steps=max_steps\n        )\n\n        print(f\"  Agents={n_agents}: Distance TP={dist_tp:.1f}\u00b1{dist_std:.1f}\")\n\n        for lr in learning_rates:\n            lr_key = f\"lr_{lr}\"\n            model = models[lr]\n            cata_tp, cata_std, cata_cong, cata_cong_std = evaluate_method(\n                \"congestion_aware\", model, sim_params, n_episodes=5, max_steps=max_steps\n            )\n            improvement = (cata_tp - dist_tp) / dist_tp * 100 if dist_tp > 0 else 0\n            cpr = (dist_cong - cata_cong) / dist_cong * 100 if dist_cong > 0 else 0\n\n            experiment_data[lr_key][\"datasets\"][dataset_name][\"distance_based\"][\n                \"throughput\"\n            ].append(dist_tp)\n            experiment_data[lr_key][\"datasets\"][dataset_name][\"distance_based\"][\n                \"std\"\n            ].append(dist_std)\n            experiment_data[lr_key][\"datasets\"][dataset_name][\"distance_based\"][\n                \"congestion\"\n            ].append(dist_cong)\n            experiment_data[lr_key][\"datasets\"][dataset_name][\"distance_based\"][\n                \"congestion_std\"\n            ].append(dist_cong_std)\n            experiment_data[lr_key][\"datasets\"][dataset_name][\"congestion_aware\"][\n                \"throughput\"\n            ].append(cata_tp)\n            experiment_data[lr_key][\"datasets\"][dataset_name][\"congestion_aware\"][\n                \"std\"\n            ].append(cata_std)\n            experiment_data[lr_key][\"datasets\"][dataset_name][\"congestion_aware\"][\n                \"congestion\"\n            ].append(cata_cong)\n            experiment_data[lr_key][\"datasets\"][dataset_name][\"congestion_aware\"][\n                \"congestion_std\"\n            ].append(cata_cong_std)\n            experiment_data[lr_key][\"datasets\"][dataset_name][\"improvement\"].append(\n                improvement\n            )\n            experiment_data[lr_key][\"datasets\"][dataset_name][\n                \"congestion_prevention_rate\"\n            ].append(cpr)\n\n            if lr == best_lr:\n                print(\n                    f\"    LR={lr} (BEST): CATA TP={cata_tp:.1f}\u00b1{cata_std:.1f}, Imp={improvement:.1f}%\"\n                )\n\n# Summary\nprint(\"\\n\" + \"=\" * 70)\nprint(\"SUMMARY BY LEARNING RATE\")\nprint(\"=\" * 70)\n\nfor lr in learning_rates:\n    lr_key = f\"lr_{lr}\"\n    all_improvements = []\n    for dataset_name in experiment_data[lr_key][\"datasets\"]:\n        all_improvements.extend(\n            experiment_data[lr_key][\"datasets\"][dataset_name][\"improvement\"]\n        )\n    avg_improvement = np.mean(all_improvements)\n    best_val = experiment_data[lr_key][\"training\"][\"best_val_loss\"]\n    marker = \" <-- BEST\" if lr == best_lr else \"\"\n    print(\n        f\"LR={lr}: Val Loss={best_val:.4f}, Avg Improvement={avg_improvement:.1f}%{marker}\"\n    )\n\n# Plotting\nfig, axes = plt.subplots(2, 3, figsize=(15, 10))\n\n# Training loss for all learning rates\nfor lr in learning_rates:\n    lr_key = f\"lr_{lr}\"\n    axes[0, 0].plot(\n        experiment_data[lr_key][\"training\"][\"losses\"][\"val\"], label=f\"LR={lr}\"\n    )\naxes[0, 0].set_xlabel(\"Epoch\")\naxes[0, 0].set_ylabel(\"Validation Loss\")\naxes[0, 0].set_title(\"Validation Loss by Learning Rate\")\naxes[0, 0].legend(fontsize=8)\n\n# Best validation loss comparison\nval_losses = [\n    experiment_data[f\"lr_{lr}\"][\"training\"][\"best_val_loss\"] for lr in learning_rates\n]\naxes[0, 1].bar(\n    range(len(learning_rates)),\n    val_losses,\n    color=[\"green\" if lr == best_lr else \"steelblue\" for lr in learning_rates],\n)\naxes[0, 1].set_xticks(range(len(learning_rates)))\naxes[0, 1].set_xticklabels([str(lr) for lr in learning_rates], fontsize=8)\naxes[0, 1].set_xlabel(\"Learning Rate\")\naxes[0, 1].set_ylabel(\"Best Validation Loss\")\naxes[0, 1].set_title(\"Best Validation Loss by Learning Rate\")\n\n# Average improvement by learning rate\navg_improvements = []\nfor lr in learning_rates:\n    lr_key = f\"lr_{lr}\"\n    all_imp = []\n    for ds in experiment_data[lr_key][\"datasets\"]:\n        all_imp.extend(experiment_data[lr_key][\"datasets\"][ds][\"improvement\"])\n    avg_improvements.append(np.mean(all_imp))\naxes[0, 2].bar(\n    range(len(learning_rates)),\n    avg_improvements,\n    color=[\"green\" if lr == best_lr else \"coral\" for lr in learning_rates],\n)\naxes[0, 2].set_xticks(range(len(learning_rates)))\naxes[0, 2].set_xticklabels([str(lr) for lr in learning_rates], fontsize=8)\naxes[0, 2].set_xlabel(\"Learning Rate\")\naxes[0, 2].set_ylabel(\"Avg Throughput Improvement (%)\")\naxes[0, 2].set_title(\"Avg Improvement by Learning Rate\")\naxes[0, 2].axhline(y=0, color=\"r\", linestyle=\"--\")\n\n# Training curves for best LR\nbest_key = f\"lr_{best_lr}\"\naxes[1, 0].plot(experiment_data[best_key][\"training\"][\"losses\"][\"train\"], label=\"Train\")\naxes[1, 0].plot(\n    experiment_data[best_key][\"training\"][\"losses\"][\"val\"], label=\"Validation\"\n)\naxes[1, 0].set_xlabel(\"Epoch\")\naxes[1, 0].set_ylabel(\"Loss\")\naxes[1, 0].set_title(f\"Best LR={best_lr} Training Curves\")\naxes[1, 0].legend()\n\n# Throughput comparison for best LR\ncolors = {\n    \"sparse_warehouse\": \"blue\",\n    \"bottleneck_warehouse\": \"orange\",\n    \"dense_obstacle_warehouse\": \"green\",\n}\nfor dataset_name in experiment_data[best_key][\"datasets\"]:\n    data = experiment_data[best_key][\"datasets\"][dataset_name]\n    axes[1, 1].plot(\n        data[\"n_agents\"],\n        data[\"congestion_aware\"][\"throughput\"],\n        \"o-\",\n        color=colors[dataset_name],\n        label=f\"CATA-{dataset_name[:8]}\",\n    )\n    axes[1, 1].plot(\n        data[\"n_agents\"],\n        data[\"distance_based\"][\"throughput\"],\n        \"x--\",\n        color=colors[dataset_name],\n        alpha=0.5,\n    )\naxes[1, 1].set_xlabel(\"Number of Agents\")\naxes[1, 1].set_ylabel(\"Throughput (tasks/min)\")\naxes[1, 1].set_title(f\"Best LR={best_lr}: CATA vs Distance\")\naxes[1, 1].legend(fontsize=8)\n\n# Improvement by dataset for best LR\nx = np.arange(len(agent_counts))\nwidth = 0.25\nfor i, dataset_name in enumerate(experiment_data[best_key][\"datasets\"]):\n    data = experiment_data[best_key][\"datasets\"][dataset_name]\n    axes[1, 2].bar(\n        x + i * width,\n        data[\"improvement\"],\n        width,\n        label=dataset_name[:10],\n        color=colors[dataset_name],\n    )\naxes[1, 2].set_xlabel(\"Agent Count Index\")\naxes[1, 2].set_ylabel(\"Improvement (%)\")\naxes[1, 2].set_title(f\"Best LR={best_lr}: Improvement by Dataset\")\naxes[1, 2].set_xticks(x + width)\naxes[1, 2].set_xticklabels(agent_counts)\naxes[1, 2].legend(fontsize=8)\naxes[1, 2].axhline(y=0, color=\"r\", linestyle=\"--\")\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"learning_rate_tuning.png\"), dpi=150)\nplt.close()\n\n# Add summary to experiment data\nexperiment_data[\"best_lr\"] = best_lr\nexperiment_data[\"learning_rates_tested\"] = learning_rates\nexperiment_data[\"summary\"] = {\n    \"learning_rates\": learning_rates,\n    \"val_losses\": val_losses,\n    \"avg_improvements\": avg_improvements,\n}\n\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(f\"\\nResults saved to {working_dir}\")\nprint(f\"\\nBest learning rate: {best_lr}\")\nprint(\n    f\"throughput_improvement_percentage = {avg_improvements[learning_rates.index(best_lr)]:.2f}%\"\n)\n", "import os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.optim as optim\nimport matplotlib.pyplot as plt\nfrom collections import defaultdict\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\nexperiment_data = {\n    \"batch_size_tuning\": {},\n    \"best_config\": {},\n    \"datasets\": {},\n}\n\n\ndef greedy_assignment(cost_matrix):\n    n_agents, n_tasks = cost_matrix.shape\n    row_ind, col_ind = [], []\n    assigned_tasks, assigned_agents = set(), set()\n    pairs = [(cost_matrix[i, j], i, j) for i in range(n_agents) for j in range(n_tasks)]\n    pairs.sort()\n    for cost, i, j in pairs:\n        if i not in assigned_agents and j not in assigned_tasks:\n            row_ind.append(i)\n            col_ind.append(j)\n            assigned_agents.add(i)\n            assigned_tasks.add(j)\n            if len(assigned_agents) == min(n_agents, n_tasks):\n                break\n    return np.array(row_ind), np.array(col_ind)\n\n\nclass WarehouseSimulator:\n    def __init__(\n        self, grid_size=20, n_agents=20, n_tasks=30, obstacles=None, hotspots=None\n    ):\n        self.grid_size, self.n_agents, self.n_tasks = grid_size, n_agents, n_tasks\n        self.obstacles = obstacles if obstacles else set()\n        self.hotspots = hotspots if hotspots else []\n        self.congestion_events = 0\n        self.reset()\n\n    def _valid_position(self, pos):\n        return tuple(pos) not in self.obstacles\n\n    def _random_valid_position(self):\n        for _ in range(100):\n            pos = np.random.randint(0, self.grid_size, 2)\n            if self._valid_position(pos):\n                return pos\n        return np.array([0, 0])\n\n    def _hotspot_biased_position(self):\n        if self.hotspots and np.random.random() < 0.6:\n            hotspot = self.hotspots[np.random.randint(len(self.hotspots))]\n            offset = np.random.randint(-2, 3, 2)\n            pos = np.clip(hotspot + offset, 0, self.grid_size - 1)\n            if self._valid_position(pos):\n                return pos\n        return self._random_valid_position()\n\n    def reset(self):\n        self.agent_positions = np.array(\n            [self._random_valid_position() for _ in range(self.n_agents)]\n        )\n        self.agent_velocities = np.zeros((self.n_agents, 2))\n        self.task_positions = np.array(\n            [self._hotspot_biased_position() for _ in range(self.n_tasks)]\n        )\n        self.task_active = np.ones(self.n_tasks, dtype=bool)\n        self.agent_targets = [-1] * self.n_agents\n        self.time_step, self.tasks_completed = 0, 0\n        self.congestion_events = 0\n        return self.get_state()\n\n    def get_state(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        task_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        for i, pos in enumerate(self.task_positions):\n            if self.task_active[i]:\n                task_grid[pos[0], pos[1]] += 1\n        return np.stack([agent_grid, task_grid], axis=0)\n\n    def count_congestion_events(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        return np.sum(agent_grid > 2)\n\n    def compute_congestion(self, lookahead=5):\n        congestion = np.zeros((self.grid_size, self.grid_size))\n        for i, agent_pos in enumerate(self.agent_positions):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                path = self._get_path(agent_pos, self.task_positions[target_idx])\n                for step, pos in enumerate(path[:lookahead]):\n                    congestion[pos[0], pos[1]] += 1.0 / (step + 1)\n        return congestion\n\n    def _get_path(self, start, end):\n        path, current = [tuple(start)], np.array(start)\n        max_steps = self.grid_size * 2\n        for _ in range(max_steps):\n            if np.array_equal(current, end):\n                break\n            diff = end - current\n            moved = False\n            for d in [0, 1]:\n                if diff[d] != 0:\n                    new_pos = current.copy()\n                    new_pos[d] += np.sign(diff[d])\n                    if self._valid_position(new_pos):\n                        current = new_pos\n                        moved = True\n                        break\n            if not moved:\n                break\n            path.append(tuple(current))\n        return path\n\n    def assign_tasks(self, assignment):\n        for agent_idx, task_idx in assignment:\n            if task_idx >= 0 and self.task_active[task_idx]:\n                self.agent_targets[agent_idx] = task_idx\n\n    def step(self):\n        self.time_step += 1\n        self.congestion_events += self.count_congestion_events()\n        for i in range(self.n_agents):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                target_pos = self.task_positions[target_idx]\n                diff = target_pos - self.agent_positions[i]\n                if np.sum(np.abs(diff)) <= 1:\n                    self.task_active[target_idx] = False\n                    self.tasks_completed += 1\n                    self.agent_targets[i] = -1\n                else:\n                    move = np.zeros(2, dtype=int)\n                    for d in [0, 1]:\n                        if diff[d] != 0:\n                            new_pos = self.agent_positions[i].copy()\n                            new_pos[d] += np.sign(diff[d])\n                            if self._valid_position(new_pos):\n                                move[d] = np.sign(diff[d])\n                                break\n                    self.agent_positions[i] = np.clip(\n                        self.agent_positions[i] + move, 0, self.grid_size - 1\n                    )\n                    self.agent_velocities[i] = move\n        for idx in np.where(~self.task_active)[0]:\n            if np.random.random() < 0.3:\n                self.task_positions[idx] = self._hotspot_biased_position()\n                self.task_active[idx] = True\n        return self.get_state()\n\n\ndef create_sparse_warehouse(grid_size=20):\n    obstacles = set()\n    for i in range(5, 15, 5):\n        for j in range(3, grid_size - 3, 4):\n            obstacles.add((i, j))\n    hotspots = [np.array([5, 5]), np.array([15, 15])]\n    return obstacles, hotspots, \"sparse_warehouse\"\n\n\ndef create_bottleneck_warehouse(grid_size=20):\n    obstacles = set()\n    for i in range(grid_size):\n        if i not in [9, 10]:\n            obstacles.add((i, 10))\n    for j in range(grid_size):\n        if j not in [9, 10]:\n            obstacles.add((10, j))\n    hotspots = [\n        np.array([5, 5]),\n        np.array([5, 15]),\n        np.array([15, 5]),\n        np.array([15, 15]),\n    ]\n    return obstacles, hotspots, \"bottleneck_warehouse\"\n\n\ndef create_dense_obstacle_warehouse(grid_size=20):\n    obstacles = set()\n    np.random.seed(42)\n    for _ in range(int(grid_size * grid_size * 0.15)):\n        pos = (np.random.randint(1, grid_size - 1), np.random.randint(1, grid_size - 1))\n        obstacles.add(pos)\n    hotspots = [\n        np.array([3, 3]),\n        np.array([16, 16]),\n        np.array([3, 16]),\n        np.array([16, 3]),\n    ]\n    return obstacles, hotspots, \"dense_obstacle_warehouse\"\n\n\nclass CongestionPredictor(nn.Module):\n    def __init__(self, grid_size=20, hidden_dim=64):\n        super().__init__()\n        self.conv1 = nn.Conv2d(2, hidden_dim, 3, padding=1)\n        self.conv2 = nn.Conv2d(hidden_dim, hidden_dim, 3, padding=1)\n        self.conv3 = nn.Conv2d(hidden_dim, 1, 3, padding=1)\n        self.relu = nn.ReLU()\n\n    def forward(self, x):\n        x = self.relu(self.conv1(x))\n        x = self.relu(self.conv2(x))\n        return torch.sigmoid(self.conv3(x))\n\n\ndef generate_training_data(\n    n_samples=500, grid_size=20, n_agents=20, n_tasks=30, obstacles=None, hotspots=None\n):\n    states, congestions = [], []\n    for _ in range(n_samples):\n        sim = WarehouseSimulator(grid_size, n_agents, n_tasks, obstacles, hotspots)\n        state = sim.get_state()\n        active_tasks = np.where(sim.task_active)[0]\n        sim.assign_tasks(\n            [(i, active_tasks[i]) for i in range(min(n_agents, len(active_tasks)))]\n        )\n        congestion = sim.compute_congestion(lookahead=5)\n        congestion = congestion / (congestion.max() + 1e-6)\n        states.append(state)\n        congestions.append(congestion)\n    return np.array(states), np.array(congestions)\n\n\ndef distance_based_assignment(\n    agent_positions, task_positions, task_active, obstacles=None\n):\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    cost_matrix = np.array(\n        [\n            [np.sum(np.abs(ap - task_positions[ti])) for ti in active_indices]\n            for ap in agent_positions\n        ]\n    )\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef congestion_aware_assignment(\n    agent_positions,\n    task_positions,\n    task_active,\n    congestion_map,\n    congestion_weight=0.5,\n    obstacles=None,\n):\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    grid_size = congestion_map.shape[0]\n    cost_matrix = np.zeros((len(agent_positions), len(active_indices)))\n    for i, agent_pos in enumerate(agent_positions):\n        for j, task_idx in enumerate(active_indices):\n            task_pos = task_positions[task_idx]\n            distance = np.sum(np.abs(agent_pos - task_pos))\n            path_congestion, current = 0, agent_pos.copy()\n            for _ in range(grid_size * 2):\n                if np.array_equal(current, task_pos):\n                    break\n                diff = task_pos - current\n                if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                    current[0] += np.sign(diff[0])\n                elif diff[1] != 0:\n                    current[1] += np.sign(diff[1])\n                current = np.clip(current, 0, grid_size - 1)\n                path_congestion += congestion_map[current[0], current[1]]\n            cost_matrix[i, j] = distance + congestion_weight * path_congestion\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef train_predictor(\n    model,\n    train_states,\n    train_congestions,\n    val_states,\n    val_congestions,\n    epochs=30,\n    batch_size=32,\n):\n    model = model.to(device)\n    optimizer = optim.Adam(model.parameters(), lr=0.001)\n    criterion = nn.MSELoss()\n    train_states_t = torch.FloatTensor(train_states).to(device)\n    train_congestions_t = torch.FloatTensor(train_congestions).unsqueeze(1).to(device)\n    val_states_t = torch.FloatTensor(val_states).to(device)\n    val_congestions_t = torch.FloatTensor(val_congestions).unsqueeze(1).to(device)\n    n_train = len(train_states)\n    train_losses, val_losses = [], []\n    best_val_loss = float(\"inf\")\n    for epoch in range(epochs):\n        model.train()\n        perm = torch.randperm(n_train)\n        train_loss, n_batches = 0, 0\n        for i in range(0, n_train, batch_size):\n            idx = perm[i : i + batch_size]\n            optimizer.zero_grad()\n            loss = criterion(model(train_states_t[idx]), train_congestions_t[idx])\n            loss.backward()\n            optimizer.step()\n            train_loss += loss.item()\n            n_batches += 1\n        train_loss /= n_batches\n        model.eval()\n        with torch.no_grad():\n            val_loss = criterion(model(val_states_t), val_congestions_t).item()\n        train_losses.append(train_loss)\n        val_losses.append(val_loss)\n        best_val_loss = min(best_val_loss, val_loss)\n        print(\n            f\"  Epoch {epoch}: train_loss = {train_loss:.4f}, validation_loss = {val_loss:.4f}\"\n        )\n    return model, train_losses, val_losses, best_val_loss\n\n\ndef evaluate_method(method, model, sim_params, n_episodes=5, max_steps=100):\n    throughputs, congestion_events_list = [], []\n    for _ in range(n_episodes):\n        sim = WarehouseSimulator(**sim_params)\n        for step in range(max_steps):\n            state = sim.get_state()\n            unassigned = [\n                i\n                for i in range(sim.n_agents)\n                if sim.agent_targets[i] < 0 or not sim.task_active[sim.agent_targets[i]]\n            ]\n            if len(unassigned) > 0 and np.any(sim.task_active):\n                if method == \"distance\":\n                    assignment = distance_based_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                        sim.obstacles,\n                    )\n                else:\n                    state_tensor = torch.FloatTensor(state).unsqueeze(0).to(device)\n                    with torch.no_grad():\n                        congestion_pred = model(state_tensor).squeeze().cpu().numpy()\n                    assignment = congestion_aware_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                        congestion_pred,\n                        congestion_weight=0.5,\n                        obstacles=sim.obstacles,\n                    )\n                sim.assign_tasks([(unassigned[a], t) for a, t in assignment])\n            sim.step()\n        throughputs.append(sim.tasks_completed / (max_steps / 60.0))\n        congestion_events_list.append(sim.congestion_events)\n    return (\n        np.mean(throughputs),\n        np.std(throughputs),\n        np.mean(congestion_events_list),\n        np.std(congestion_events_list),\n    )\n\n\n# Generate training data from all datasets combined\nprint(\"Creating three distinct warehouse datasets...\")\ndatasets = [\n    create_sparse_warehouse(),\n    create_bottleneck_warehouse(),\n    create_dense_obstacle_warehouse(),\n]\n\nall_train_states, all_train_congestions = [], []\nfor obstacles, hotspots, name in datasets:\n    print(f\"  Generating data for: {name}\")\n    states, congestions = generate_training_data(\n        n_samples=300, obstacles=obstacles, hotspots=hotspots\n    )\n    all_train_states.append(states)\n    all_train_congestions.append(congestions)\n\ntrain_states = np.concatenate(all_train_states[:2] + [all_train_states[2][:200]])\ntrain_congestions = np.concatenate(\n    all_train_congestions[:2] + [all_train_congestions[2][:200]]\n)\nval_states = np.concatenate([all_train_states[2][200:]])\nval_congestions = np.concatenate([all_train_congestions[2][200:]])\nprint(f\"Training data: {train_states.shape}, Validation data: {val_states.shape}\")\n\n# Hyperparameter tuning for batch_size\nbatch_sizes = [16, 32, 64]\nbest_batch_size = None\nbest_val_loss_overall = float(\"inf\")\nbest_model = None\n\nprint(\"\\n\" + \"=\" * 70)\nprint(\"BATCH SIZE HYPERPARAMETER TUNING\")\nprint(\"=\" * 70)\n\nfor batch_size in batch_sizes:\n    print(f\"\\nTraining with batch_size={batch_size}...\")\n    torch.manual_seed(42)\n    np.random.seed(42)\n    model = CongestionPredictor(grid_size=20, hidden_dim=64)\n    model, train_losses, val_losses, final_val_loss = train_predictor(\n        model,\n        train_states,\n        train_congestions,\n        val_states,\n        val_congestions,\n        epochs=30,\n        batch_size=batch_size,\n    )\n\n    experiment_data[\"batch_size_tuning\"][f\"batch_size_{batch_size}\"] = {\n        \"losses\": {\"train\": train_losses, \"val\": val_losses},\n        \"final_val_loss\": final_val_loss,\n        \"batch_size\": batch_size,\n    }\n\n    print(f\"  batch_size={batch_size}: final_val_loss={final_val_loss:.4f}\")\n\n    if final_val_loss < best_val_loss_overall:\n        best_val_loss_overall = final_val_loss\n        best_batch_size = batch_size\n        best_model = model\n\nprint(\n    f\"\\nBest batch_size: {best_batch_size} with validation loss: {best_val_loss_overall:.4f}\"\n)\nexperiment_data[\"best_config\"] = {\n    \"batch_size\": best_batch_size,\n    \"val_loss\": best_val_loss_overall,\n}\n\n# Evaluate on all three datasets using the best model\nprint(\"\\n\" + \"=\" * 70)\nprint(\n    f\"EVALUATION ON THREE WAREHOUSE DATASETS (using best batch_size={best_batch_size})\"\n)\nprint(\"=\" * 70)\n\nagent_counts = [20, 30, 40, 50]\nmax_steps = 100\n\nfor obstacles, hotspots, dataset_name in datasets:\n    print(f\"\\n--- Dataset: {dataset_name} ---\")\n    experiment_data[\"datasets\"][dataset_name] = {\n        \"distance_based\": {\n            \"throughput\": [],\n            \"std\": [],\n            \"congestion\": [],\n            \"congestion_std\": [],\n        },\n        \"congestion_aware\": {\n            \"throughput\": [],\n            \"std\": [],\n            \"congestion\": [],\n            \"congestion_std\": [],\n        },\n        \"improvement\": [],\n        \"congestion_prevention_rate\": [],\n        \"n_agents\": agent_counts,\n    }\n\n    for n_agents in agent_counts:\n        sim_params = {\n            \"grid_size\": 20,\n            \"n_agents\": n_agents,\n            \"n_tasks\": 30,\n            \"obstacles\": obstacles,\n            \"hotspots\": hotspots,\n        }\n        dist_tp, dist_std, dist_cong, dist_cong_std = evaluate_method(\n            \"distance\", None, sim_params, n_episodes=5, max_steps=max_steps\n        )\n        cata_tp, cata_std, cata_cong, cata_cong_std = evaluate_method(\n            \"congestion_aware\",\n            best_model,\n            sim_params,\n            n_episodes=5,\n            max_steps=max_steps,\n        )\n        improvement = (cata_tp - dist_tp) / dist_tp * 100 if dist_tp > 0 else 0\n        cpr = (dist_cong - cata_cong) / dist_cong * 100 if dist_cong > 0 else 0\n\n        experiment_data[\"datasets\"][dataset_name][\"distance_based\"][\n            \"throughput\"\n        ].append(dist_tp)\n        experiment_data[\"datasets\"][dataset_name][\"distance_based\"][\"std\"].append(\n            dist_std\n        )\n        experiment_data[\"datasets\"][dataset_name][\"distance_based\"][\n            \"congestion\"\n        ].append(dist_cong)\n        experiment_data[\"datasets\"][dataset_name][\"distance_based\"][\n            \"congestion_std\"\n        ].append(dist_cong_std)\n        experiment_data[\"datasets\"][dataset_name][\"congestion_aware\"][\n            \"throughput\"\n        ].append(cata_tp)\n        experiment_data[\"datasets\"][dataset_name][\"congestion_aware\"][\"std\"].append(\n            cata_std\n        )\n        experiment_data[\"datasets\"][dataset_name][\"congestion_aware\"][\n            \"congestion\"\n        ].append(cata_cong)\n        experiment_data[\"datasets\"][dataset_name][\"congestion_aware\"][\n            \"congestion_std\"\n        ].append(cata_cong_std)\n        experiment_data[\"datasets\"][dataset_name][\"improvement\"].append(improvement)\n        experiment_data[\"datasets\"][dataset_name][\"congestion_prevention_rate\"].append(\n            cpr\n        )\n        print(\n            f\"  Agents={n_agents}: Dist TP={dist_tp:.1f}\u00b1{dist_std:.1f}, CATA TP={cata_tp:.1f}\u00b1{cata_std:.1f}, Imp={improvement:.1f}%, CPR={cpr:.1f}%\"\n        )\n\n# Summary\nprint(\"\\n\" + \"=\" * 70)\nprint(\"SUMMARY BY DATASET\")\nprint(\"=\" * 70)\nall_improvements = []\nfor dataset_name in experiment_data[\"datasets\"]:\n    data = experiment_data[\"datasets\"][dataset_name]\n    avg_imp = np.mean(data[\"improvement\"])\n    avg_cpr = np.mean(data[\"congestion_prevention_rate\"])\n    all_improvements.extend(data[\"improvement\"])\n    print(\n        f\"{dataset_name}: Avg Improvement={avg_imp:.1f}%, Avg Congestion Prevention Rate={avg_cpr:.1f}%\"\n    )\n\noverall_improvement = np.mean(all_improvements)\nprint(f\"\\nthroughput_improvement_percentage = {overall_improvement:.2f}%\")\n\n# Plotting\nfig, axes = plt.subplots(2, 4, figsize=(20, 10))\ncolors = {\n    \"sparse_warehouse\": \"blue\",\n    \"bottleneck_warehouse\": \"orange\",\n    \"dense_obstacle_warehouse\": \"green\",\n}\nbatch_colors = {16: \"red\", 32: \"blue\", 64: \"green\"}\n\n# Batch size comparison - training loss\nfor bs in batch_sizes:\n    data = experiment_data[\"batch_size_tuning\"][f\"batch_size_{bs}\"]\n    axes[0, 0].plot(data[\"losses\"][\"train\"], label=f\"BS={bs}\", color=batch_colors[bs])\naxes[0, 0].set_xlabel(\"Epoch\")\naxes[0, 0].set_ylabel(\"Training Loss\")\naxes[0, 0].set_title(\"Training Loss by Batch Size\")\naxes[0, 0].legend()\n\n# Batch size comparison - validation loss\nfor bs in batch_sizes:\n    data = experiment_data[\"batch_size_tuning\"][f\"batch_size_{bs}\"]\n    axes[0, 1].plot(data[\"losses\"][\"val\"], label=f\"BS={bs}\", color=batch_colors[bs])\naxes[0, 1].set_xlabel(\"Epoch\")\naxes[0, 1].set_ylabel(\"Validation Loss\")\naxes[0, 1].set_title(\"Validation Loss by Batch Size\")\naxes[0, 1].legend()\n\n# Final validation loss comparison\nfinal_val_losses = [\n    experiment_data[\"batch_size_tuning\"][f\"batch_size_{bs}\"][\"final_val_loss\"]\n    for bs in batch_sizes\n]\nbars = axes[0, 2].bar(\n    [str(bs) for bs in batch_sizes],\n    final_val_losses,\n    color=[batch_colors[bs] for bs in batch_sizes],\n)\nbest_idx = batch_sizes.index(best_batch_size)\nbars[best_idx].set_edgecolor(\"gold\")\nbars[best_idx].set_linewidth(3)\naxes[0, 2].set_xlabel(\"Batch Size\")\naxes[0, 2].set_ylabel(\"Final Validation Loss\")\naxes[0, 2].set_title(f\"Final Val Loss (Best: {best_batch_size})\")\n\n# Throughput comparison\nfor dataset_name in experiment_data[\"datasets\"]:\n    data = experiment_data[\"datasets\"][dataset_name]\n    axes[0, 3].plot(\n        data[\"n_agents\"],\n        data[\"congestion_aware\"][\"throughput\"],\n        \"o-\",\n        color=colors[dataset_name],\n        label=f\"CATA-{dataset_name[:8]}\",\n    )\n    axes[0, 3].plot(\n        data[\"n_agents\"],\n        data[\"distance_based\"][\"throughput\"],\n        \"x--\",\n        color=colors[dataset_name],\n        alpha=0.5,\n    )\naxes[0, 3].set_xlabel(\"Number of Agents\")\naxes[0, 3].set_ylabel(\"Throughput (tasks/min)\")\naxes[0, 3].set_title(\"Throughput: CATA (solid) vs Distance (dashed)\")\naxes[0, 3].legend(fontsize=8)\n\n# Improvement by dataset\nx = np.arange(len(agent_counts))\nwidth = 0.25\nfor i, dataset_name in enumerate(experiment_data[\"datasets\"]):\n    data = experiment_data[\"datasets\"][dataset_name]\n    axes[1, 0].bar(\n        x + i * width,\n        data[\"improvement\"],\n        width,\n        label=dataset_name[:10],\n        color=colors[dataset_name],\n    )\naxes[1, 0].set_xlabel(\"Agent Count Index\")\naxes[1, 0].set_ylabel(\"Improvement (%)\")\naxes[1, 0].set_title(\"CATA Improvement by Dataset\")\naxes[1, 0].set_xticks(x + width)\naxes[1, 0].set_xticklabels(agent_counts)\naxes[1, 0].legend(fontsize=8)\naxes[1, 0].axhline(y=0, color=\"r\", linestyle=\"--\")\n\n# Congestion Prevention Rate\nfor i, dataset_name in enumerate(experiment_data[\"datasets\"]):\n    data = experiment_data[\"datasets\"][dataset_name]\n    axes[1, 1].bar(\n        x + i * width,\n        data[\"congestion_prevention_rate\"],\n        width,\n        label=dataset_name[:10],\n        color=colors[dataset_name],\n    )\naxes[1, 1].set_xlabel(\"Agent Count Index\")\naxes[1, 1].set_ylabel(\"Congestion Prevention Rate (%)\")\naxes[1, 1].set_title(\"Congestion Prevention Rate by Dataset\")\naxes[1, 1].set_xticks(x + width)\naxes[1, 1].set_xticklabels(agent_counts)\naxes[1, 1].legend(fontsize=8)\naxes[1, 1].axhline(y=0, color=\"r\", linestyle=\"--\")\n\n# Congestion events comparison\nfor dataset_name in experiment_data[\"datasets\"]:\n    data = experiment_data[\"datasets\"][dataset_name]\n    axes[1, 2].plot(\n        data[\"n_agents\"],\n        data[\"distance_based\"][\"congestion\"],\n        \"x--\",\n        color=colors[dataset_name],\n        alpha=0.5,\n    )\n    axes[1, 2].plot(\n        data[\"n_agents\"],\n        data[\"congestion_aware\"][\"congestion\"],\n        \"o-\",\n        color=colors[dataset_name],\n        label=f\"{dataset_name[:8]}\",\n    )\naxes[1, 2].set_xlabel(\"Number of Agents\")\naxes[1, 2].set_ylabel(\"Congestion Events\")\naxes[1, 2].set_title(\"Congestion Events: CATA (solid) vs Distance (dashed)\")\naxes[1, 2].legend(fontsize=8)\n\n# Summary bar chart\nsummary_data = []\nfor dataset_name in experiment_data[\"datasets\"]:\n    data = experiment_data[\"datasets\"][dataset_name]\n    summary_data.append(\n        [np.mean(data[\"improvement\"]), np.mean(data[\"congestion_prevention_rate\"])]\n    )\nsummary_data = np.array(summary_data)\nx_sum = np.arange(3)\naxes[1, 3].bar(\n    x_sum - 0.15, summary_data[:, 0], 0.3, label=\"Throughput Imp.\", color=\"steelblue\"\n)\naxes[1, 3].bar(x_sum + 0.15, summary_data[:, 1], 0.3, label=\"CPR\", color=\"coral\")\naxes[1, 3].set_xticks(x_sum)\naxes[1, 3].set_xticklabels([\"Sparse\", \"Bottleneck\", \"Dense\"], fontsize=9)\naxes[1, 3].set_ylabel(\"Percentage (%)\")\naxes[1, 3].set_title(\"Avg Improvement & CPR by Dataset\")\naxes[1, 3].legend()\naxes[1, 3].axhline(y=0, color=\"r\", linestyle=\"--\")\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"batch_size_tuning_evaluation.png\"), dpi=150)\nplt.close()\n\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(f\"\\nResults saved to {working_dir}\")\nprint(f\"Best batch_size: {best_batch_size}\")\n", "import os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.optim as optim\nimport matplotlib.pyplot as plt\nfrom collections import defaultdict\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\nexperiment_data = {\n    \"hidden_dim_tuning\": {},\n    \"best_model_evaluation\": {\"datasets\": {}},\n    \"tuning_summary\": {},\n}\n\n\ndef greedy_assignment(cost_matrix):\n    n_agents, n_tasks = cost_matrix.shape\n    row_ind, col_ind = [], []\n    assigned_tasks, assigned_agents = set(), set()\n    pairs = [(cost_matrix[i, j], i, j) for i in range(n_agents) for j in range(n_tasks)]\n    pairs.sort()\n    for cost, i, j in pairs:\n        if i not in assigned_agents and j not in assigned_tasks:\n            row_ind.append(i)\n            col_ind.append(j)\n            assigned_agents.add(i)\n            assigned_tasks.add(j)\n            if len(assigned_agents) == min(n_agents, n_tasks):\n                break\n    return np.array(row_ind), np.array(col_ind)\n\n\nclass WarehouseSimulator:\n    def __init__(\n        self, grid_size=20, n_agents=20, n_tasks=30, obstacles=None, hotspots=None\n    ):\n        self.grid_size, self.n_agents, self.n_tasks = grid_size, n_agents, n_tasks\n        self.obstacles = obstacles if obstacles else set()\n        self.hotspots = hotspots if hotspots else []\n        self.congestion_events = 0\n        self.reset()\n\n    def _valid_position(self, pos):\n        return tuple(pos) not in self.obstacles\n\n    def _random_valid_position(self):\n        for _ in range(100):\n            pos = np.random.randint(0, self.grid_size, 2)\n            if self._valid_position(pos):\n                return pos\n        return np.array([0, 0])\n\n    def _hotspot_biased_position(self):\n        if self.hotspots and np.random.random() < 0.6:\n            hotspot = self.hotspots[np.random.randint(len(self.hotspots))]\n            offset = np.random.randint(-2, 3, 2)\n            pos = np.clip(hotspot + offset, 0, self.grid_size - 1)\n            if self._valid_position(pos):\n                return pos\n        return self._random_valid_position()\n\n    def reset(self):\n        self.agent_positions = np.array(\n            [self._random_valid_position() for _ in range(self.n_agents)]\n        )\n        self.agent_velocities = np.zeros((self.n_agents, 2))\n        self.task_positions = np.array(\n            [self._hotspot_biased_position() for _ in range(self.n_tasks)]\n        )\n        self.task_active = np.ones(self.n_tasks, dtype=bool)\n        self.agent_targets = [-1] * self.n_agents\n        self.time_step, self.tasks_completed = 0, 0\n        self.congestion_events = 0\n        return self.get_state()\n\n    def get_state(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        task_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        for i, pos in enumerate(self.task_positions):\n            if self.task_active[i]:\n                task_grid[pos[0], pos[1]] += 1\n        return np.stack([agent_grid, task_grid], axis=0)\n\n    def count_congestion_events(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        return np.sum(agent_grid > 2)\n\n    def compute_congestion(self, lookahead=5):\n        congestion = np.zeros((self.grid_size, self.grid_size))\n        for i, agent_pos in enumerate(self.agent_positions):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                path = self._get_path(agent_pos, self.task_positions[target_idx])\n                for step, pos in enumerate(path[:lookahead]):\n                    congestion[pos[0], pos[1]] += 1.0 / (step + 1)\n        return congestion\n\n    def _get_path(self, start, end):\n        path, current = [tuple(start)], np.array(start)\n        max_steps = self.grid_size * 2\n        for _ in range(max_steps):\n            if np.array_equal(current, end):\n                break\n            diff = end - current\n            moved = False\n            for d in [0, 1]:\n                if diff[d] != 0:\n                    new_pos = current.copy()\n                    new_pos[d] += np.sign(diff[d])\n                    if self._valid_position(new_pos):\n                        current = new_pos\n                        moved = True\n                        break\n            if not moved:\n                break\n            path.append(tuple(current))\n        return path\n\n    def assign_tasks(self, assignment):\n        for agent_idx, task_idx in assignment:\n            if task_idx >= 0 and self.task_active[task_idx]:\n                self.agent_targets[agent_idx] = task_idx\n\n    def step(self):\n        self.time_step += 1\n        self.congestion_events += self.count_congestion_events()\n        for i in range(self.n_agents):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                target_pos = self.task_positions[target_idx]\n                diff = target_pos - self.agent_positions[i]\n                if np.sum(np.abs(diff)) <= 1:\n                    self.task_active[target_idx] = False\n                    self.tasks_completed += 1\n                    self.agent_targets[i] = -1\n                else:\n                    move = np.zeros(2, dtype=int)\n                    for d in [0, 1]:\n                        if diff[d] != 0:\n                            new_pos = self.agent_positions[i].copy()\n                            new_pos[d] += np.sign(diff[d])\n                            if self._valid_position(new_pos):\n                                move[d] = np.sign(diff[d])\n                                break\n                    self.agent_positions[i] = np.clip(\n                        self.agent_positions[i] + move, 0, self.grid_size - 1\n                    )\n                    self.agent_velocities[i] = move\n        for idx in np.where(~self.task_active)[0]:\n            if np.random.random() < 0.3:\n                self.task_positions[idx] = self._hotspot_biased_position()\n                self.task_active[idx] = True\n        return self.get_state()\n\n\ndef create_sparse_warehouse(grid_size=20):\n    obstacles = set()\n    for i in range(5, 15, 5):\n        for j in range(3, grid_size - 3, 4):\n            obstacles.add((i, j))\n    hotspots = [np.array([5, 5]), np.array([15, 15])]\n    return obstacles, hotspots, \"sparse_warehouse\"\n\n\ndef create_bottleneck_warehouse(grid_size=20):\n    obstacles = set()\n    for i in range(grid_size):\n        if i not in [9, 10]:\n            obstacles.add((i, 10))\n    for j in range(grid_size):\n        if j not in [9, 10]:\n            obstacles.add((10, j))\n    hotspots = [\n        np.array([5, 5]),\n        np.array([5, 15]),\n        np.array([15, 5]),\n        np.array([15, 15]),\n    ]\n    return obstacles, hotspots, \"bottleneck_warehouse\"\n\n\ndef create_dense_obstacle_warehouse(grid_size=20):\n    obstacles = set()\n    np.random.seed(42)\n    for _ in range(int(grid_size * grid_size * 0.15)):\n        pos = (np.random.randint(1, grid_size - 1), np.random.randint(1, grid_size - 1))\n        obstacles.add(pos)\n    hotspots = [\n        np.array([3, 3]),\n        np.array([16, 16]),\n        np.array([3, 16]),\n        np.array([16, 3]),\n    ]\n    return obstacles, hotspots, \"dense_obstacle_warehouse\"\n\n\nclass CongestionPredictor(nn.Module):\n    def __init__(self, grid_size=20, hidden_dim=64):\n        super().__init__()\n        self.conv1 = nn.Conv2d(2, hidden_dim, 3, padding=1)\n        self.conv2 = nn.Conv2d(hidden_dim, hidden_dim, 3, padding=1)\n        self.conv3 = nn.Conv2d(hidden_dim, 1, 3, padding=1)\n        self.relu = nn.ReLU()\n\n    def forward(self, x):\n        x = self.relu(self.conv1(x))\n        x = self.relu(self.conv2(x))\n        return torch.sigmoid(self.conv3(x))\n\n\ndef generate_training_data(\n    n_samples=500, grid_size=20, n_agents=20, n_tasks=30, obstacles=None, hotspots=None\n):\n    states, congestions = [], []\n    for _ in range(n_samples):\n        sim = WarehouseSimulator(grid_size, n_agents, n_tasks, obstacles, hotspots)\n        state = sim.get_state()\n        active_tasks = np.where(sim.task_active)[0]\n        sim.assign_tasks(\n            [(i, active_tasks[i]) for i in range(min(n_agents, len(active_tasks)))]\n        )\n        congestion = sim.compute_congestion(lookahead=5)\n        congestion = congestion / (congestion.max() + 1e-6)\n        states.append(state)\n        congestions.append(congestion)\n    return np.array(states), np.array(congestions)\n\n\ndef distance_based_assignment(\n    agent_positions, task_positions, task_active, obstacles=None\n):\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    cost_matrix = np.array(\n        [\n            [np.sum(np.abs(ap - task_positions[ti])) for ti in active_indices]\n            for ap in agent_positions\n        ]\n    )\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef congestion_aware_assignment(\n    agent_positions,\n    task_positions,\n    task_active,\n    congestion_map,\n    congestion_weight=0.5,\n    obstacles=None,\n):\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    grid_size = congestion_map.shape[0]\n    cost_matrix = np.zeros((len(agent_positions), len(active_indices)))\n    for i, agent_pos in enumerate(agent_positions):\n        for j, task_idx in enumerate(active_indices):\n            task_pos = task_positions[task_idx]\n            distance = np.sum(np.abs(agent_pos - task_pos))\n            path_congestion, current = 0, agent_pos.copy()\n            for _ in range(grid_size * 2):\n                if np.array_equal(current, task_pos):\n                    break\n                diff = task_pos - current\n                if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                    current[0] += np.sign(diff[0])\n                elif diff[1] != 0:\n                    current[1] += np.sign(diff[1])\n                current = np.clip(current, 0, grid_size - 1)\n                path_congestion += congestion_map[current[0], current[1]]\n            cost_matrix[i, j] = distance + congestion_weight * path_congestion\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef train_predictor(\n    model,\n    train_states,\n    train_congestions,\n    val_states,\n    val_congestions,\n    epochs=30,\n    batch_size=32,\n):\n    model = model.to(device)\n    optimizer = optim.Adam(model.parameters(), lr=0.001)\n    criterion = nn.MSELoss()\n    train_states_t = torch.FloatTensor(train_states).to(device)\n    train_congestions_t = torch.FloatTensor(train_congestions).unsqueeze(1).to(device)\n    val_states_t = torch.FloatTensor(val_states).to(device)\n    val_congestions_t = torch.FloatTensor(val_congestions).unsqueeze(1).to(device)\n    n_train = len(train_states)\n    train_losses, val_losses = [], []\n    best_val_loss = float(\"inf\")\n    for epoch in range(epochs):\n        model.train()\n        perm = torch.randperm(n_train)\n        train_loss, n_batches = 0, 0\n        for i in range(0, n_train, batch_size):\n            idx = perm[i : i + batch_size]\n            optimizer.zero_grad()\n            loss = criterion(model(train_states_t[idx]), train_congestions_t[idx])\n            loss.backward()\n            optimizer.step()\n            train_loss += loss.item()\n            n_batches += 1\n        train_loss /= n_batches\n        model.eval()\n        with torch.no_grad():\n            val_loss = criterion(model(val_states_t), val_congestions_t).item()\n        train_losses.append(train_loss)\n        val_losses.append(val_loss)\n        best_val_loss = min(best_val_loss, val_loss)\n    return model, train_losses, val_losses, best_val_loss\n\n\ndef evaluate_method(method, model, sim_params, n_episodes=5, max_steps=100):\n    throughputs, congestion_events_list = [], []\n    for _ in range(n_episodes):\n        sim = WarehouseSimulator(**sim_params)\n        for step in range(max_steps):\n            state = sim.get_state()\n            unassigned = [\n                i\n                for i in range(sim.n_agents)\n                if sim.agent_targets[i] < 0 or not sim.task_active[sim.agent_targets[i]]\n            ]\n            if len(unassigned) > 0 and np.any(sim.task_active):\n                if method == \"distance\":\n                    assignment = distance_based_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                        sim.obstacles,\n                    )\n                else:\n                    state_tensor = torch.FloatTensor(state).unsqueeze(0).to(device)\n                    with torch.no_grad():\n                        congestion_pred = model(state_tensor).squeeze().cpu().numpy()\n                    assignment = congestion_aware_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                        congestion_pred,\n                        congestion_weight=0.5,\n                        obstacles=sim.obstacles,\n                    )\n                sim.assign_tasks([(unassigned[a], t) for a, t in assignment])\n            sim.step()\n        throughputs.append(sim.tasks_completed / (max_steps / 60.0))\n        congestion_events_list.append(sim.congestion_events)\n    return (\n        np.mean(throughputs),\n        np.std(throughputs),\n        np.mean(congestion_events_list),\n        np.std(congestion_events_list),\n    )\n\n\n# Generate training data\nprint(\"Creating three distinct warehouse datasets...\")\ndatasets = [\n    create_sparse_warehouse(),\n    create_bottleneck_warehouse(),\n    create_dense_obstacle_warehouse(),\n]\n\nall_train_states, all_train_congestions = [], []\nfor obstacles, hotspots, name in datasets:\n    print(f\"  Generating data for: {name}\")\n    states, congestions = generate_training_data(\n        n_samples=300, obstacles=obstacles, hotspots=hotspots\n    )\n    all_train_states.append(states)\n    all_train_congestions.append(congestions)\n\ntrain_states = np.concatenate(all_train_states[:2] + [all_train_states[2][:200]])\ntrain_congestions = np.concatenate(\n    all_train_congestions[:2] + [all_train_congestions[2][:200]]\n)\nval_states = np.concatenate([all_train_states[2][200:]])\nval_congestions = np.concatenate([all_train_congestions[2][200:]])\nprint(f\"Training data: {train_states.shape}, Validation data: {val_states.shape}\")\n\n# Hyperparameter tuning for hidden_dim\nhidden_dims = [32, 64, 128, 256]\nprint(\"\\n\" + \"=\" * 70)\nprint(\"HYPERPARAMETER TUNING: hidden_dim\")\nprint(\"=\" * 70)\n\nbest_hidden_dim = None\nbest_val_loss = float(\"inf\")\nbest_model = None\n\nfor hidden_dim in hidden_dims:\n    print(f\"\\nTraining with hidden_dim={hidden_dim}...\")\n    model = CongestionPredictor(grid_size=20, hidden_dim=hidden_dim)\n    model, train_losses, val_losses, final_val_loss = train_predictor(\n        model, train_states, train_congestions, val_states, val_congestions, epochs=30\n    )\n\n    experiment_data[\"hidden_dim_tuning\"][f\"hidden_dim_{hidden_dim}\"] = {\n        \"hidden_dim\": hidden_dim,\n        \"losses\": {\"train\": train_losses, \"val\": val_losses},\n        \"final_val_loss\": final_val_loss,\n        \"min_val_loss\": min(val_losses),\n    }\n\n    print(\n        f\"  hidden_dim={hidden_dim}: final_val_loss={final_val_loss:.6f}, min_val_loss={min(val_losses):.6f}\"\n    )\n\n    if final_val_loss < best_val_loss:\n        best_val_loss = final_val_loss\n        best_hidden_dim = hidden_dim\n        best_model = model\n\nprint(f\"\\nBest hidden_dim: {best_hidden_dim} with val_loss={best_val_loss:.6f}\")\nexperiment_data[\"tuning_summary\"][\"best_hidden_dim\"] = best_hidden_dim\nexperiment_data[\"tuning_summary\"][\"best_val_loss\"] = best_val_loss\nexperiment_data[\"tuning_summary\"][\"hidden_dims_tested\"] = hidden_dims\n\n# Evaluate best model on all datasets\nprint(\"\\n\" + \"=\" * 70)\nprint(f\"EVALUATION WITH BEST hidden_dim={best_hidden_dim}\")\nprint(\"=\" * 70)\n\nagent_counts = [20, 30, 40, 50]\nmax_steps = 100\n\nfor obstacles, hotspots, dataset_name in datasets:\n    print(f\"\\n--- Dataset: {dataset_name} ---\")\n    experiment_data[\"best_model_evaluation\"][\"datasets\"][dataset_name] = {\n        \"distance_based\": {\n            \"throughput\": [],\n            \"std\": [],\n            \"congestion\": [],\n            \"congestion_std\": [],\n        },\n        \"congestion_aware\": {\n            \"throughput\": [],\n            \"std\": [],\n            \"congestion\": [],\n            \"congestion_std\": [],\n        },\n        \"improvement\": [],\n        \"congestion_prevention_rate\": [],\n        \"n_agents\": agent_counts,\n    }\n\n    for n_agents in agent_counts:\n        sim_params = {\n            \"grid_size\": 20,\n            \"n_agents\": n_agents,\n            \"n_tasks\": 30,\n            \"obstacles\": obstacles,\n            \"hotspots\": hotspots,\n        }\n        dist_tp, dist_std, dist_cong, dist_cong_std = evaluate_method(\n            \"distance\", None, sim_params, n_episodes=5, max_steps=max_steps\n        )\n        cata_tp, cata_std, cata_cong, cata_cong_std = evaluate_method(\n            \"congestion_aware\",\n            best_model,\n            sim_params,\n            n_episodes=5,\n            max_steps=max_steps,\n        )\n        improvement = (cata_tp - dist_tp) / dist_tp * 100 if dist_tp > 0 else 0\n        cpr = (dist_cong - cata_cong) / dist_cong * 100 if dist_cong > 0 else 0\n\n        experiment_data[\"best_model_evaluation\"][\"datasets\"][dataset_name][\n            \"distance_based\"\n        ][\"throughput\"].append(dist_tp)\n        experiment_data[\"best_model_evaluation\"][\"datasets\"][dataset_name][\n            \"distance_based\"\n        ][\"std\"].append(dist_std)\n        experiment_data[\"best_model_evaluation\"][\"datasets\"][dataset_name][\n            \"distance_based\"\n        ][\"congestion\"].append(dist_cong)\n        experiment_data[\"best_model_evaluation\"][\"datasets\"][dataset_name][\n            \"distance_based\"\n        ][\"congestion_std\"].append(dist_cong_std)\n        experiment_data[\"best_model_evaluation\"][\"datasets\"][dataset_name][\n            \"congestion_aware\"\n        ][\"throughput\"].append(cata_tp)\n        experiment_data[\"best_model_evaluation\"][\"datasets\"][dataset_name][\n            \"congestion_aware\"\n        ][\"std\"].append(cata_std)\n        experiment_data[\"best_model_evaluation\"][\"datasets\"][dataset_name][\n            \"congestion_aware\"\n        ][\"congestion\"].append(cata_cong)\n        experiment_data[\"best_model_evaluation\"][\"datasets\"][dataset_name][\n            \"congestion_aware\"\n        ][\"congestion_std\"].append(cata_cong_std)\n        experiment_data[\"best_model_evaluation\"][\"datasets\"][dataset_name][\n            \"improvement\"\n        ].append(improvement)\n        experiment_data[\"best_model_evaluation\"][\"datasets\"][dataset_name][\n            \"congestion_prevention_rate\"\n        ].append(cpr)\n\n        print(\n            f\"  Agents={n_agents}: Dist TP={dist_tp:.1f}\u00b1{dist_std:.1f}, CATA TP={cata_tp:.1f}\u00b1{cata_std:.1f}, Imp={improvement:.1f}%, CPR={cpr:.1f}%\"\n        )\n\n# Summary\nprint(\"\\n\" + \"=\" * 70)\nprint(\"SUMMARY\")\nprint(\"=\" * 70)\nall_improvements = []\nfor dataset_name in experiment_data[\"best_model_evaluation\"][\"datasets\"]:\n    data = experiment_data[\"best_model_evaluation\"][\"datasets\"][dataset_name]\n    avg_imp = np.mean(data[\"improvement\"])\n    avg_cpr = np.mean(data[\"congestion_prevention_rate\"])\n    all_improvements.extend(data[\"improvement\"])\n    print(f\"{dataset_name}: Avg Improvement={avg_imp:.1f}%, Avg CPR={avg_cpr:.1f}%\")\n\noverall_improvement = np.mean(all_improvements)\nprint(f\"\\nBest hidden_dim: {best_hidden_dim}\")\nprint(f\"throughput_improvement_percentage = {overall_improvement:.2f}%\")\n\n# Plotting\nfig, axes = plt.subplots(2, 3, figsize=(15, 10))\ncolors_hd = {32: \"red\", 64: \"blue\", 128: \"green\", 256: \"purple\"}\ncolors_ds = {\n    \"sparse_warehouse\": \"blue\",\n    \"bottleneck_warehouse\": \"orange\",\n    \"dense_obstacle_warehouse\": \"green\",\n}\n\n# Training curves for different hidden_dims\nfor hd in hidden_dims:\n    key = f\"hidden_dim_{hd}\"\n    axes[0, 0].plot(\n        experiment_data[\"hidden_dim_tuning\"][key][\"losses\"][\"train\"],\n        label=f\"Train hd={hd}\",\n        color=colors_hd[hd],\n        linestyle=\"-\",\n    )\n    axes[0, 0].plot(\n        experiment_data[\"hidden_dim_tuning\"][key][\"losses\"][\"val\"],\n        label=f\"Val hd={hd}\",\n        color=colors_hd[hd],\n        linestyle=\"--\",\n    )\naxes[0, 0].set_xlabel(\"Epoch\")\naxes[0, 0].set_ylabel(\"Loss\")\naxes[0, 0].set_title(\"Training Curves for Different hidden_dim\")\naxes[0, 0].legend(fontsize=7)\n\n# Final validation loss comparison\nfinal_losses = [\n    experiment_data[\"hidden_dim_tuning\"][f\"hidden_dim_{hd}\"][\"final_val_loss\"]\n    for hd in hidden_dims\n]\naxes[0, 1].bar(\n    [str(hd) for hd in hidden_dims],\n    final_losses,\n    color=[colors_hd[hd] for hd in hidden_dims],\n)\naxes[0, 1].set_xlabel(\"hidden_dim\")\naxes[0, 1].set_ylabel(\"Final Validation Loss\")\naxes[0, 1].set_title(\"Validation Loss vs hidden_dim\")\naxes[0, 1].axhline(\n    y=best_val_loss, color=\"r\", linestyle=\"--\", label=f\"Best={best_hidden_dim}\"\n)\naxes[0, 1].legend()\n\n# Throughput comparison\nfor dataset_name in experiment_data[\"best_model_evaluation\"][\"datasets\"]:\n    data = experiment_data[\"best_model_evaluation\"][\"datasets\"][dataset_name]\n    axes[0, 2].plot(\n        data[\"n_agents\"],\n        data[\"congestion_aware\"][\"throughput\"],\n        \"o-\",\n        color=colors_ds[dataset_name],\n        label=f\"CATA-{dataset_name[:8]}\",\n    )\n    axes[0, 2].plot(\n        data[\"n_agents\"],\n        data[\"distance_based\"][\"throughput\"],\n        \"x--\",\n        color=colors_ds[dataset_name],\n        alpha=0.5,\n    )\naxes[0, 2].set_xlabel(\"Number of Agents\")\naxes[0, 2].set_ylabel(\"Throughput (tasks/min)\")\naxes[0, 2].set_title(f\"Throughput (hidden_dim={best_hidden_dim})\")\naxes[0, 2].legend(fontsize=8)\n\n# Improvement by dataset\nx = np.arange(len(agent_counts))\nwidth = 0.25\nfor i, dataset_name in enumerate(experiment_data[\"best_model_evaluation\"][\"datasets\"]):\n    data = experiment_data[\"best_model_evaluation\"][\"datasets\"][dataset_name]\n    axes[1, 0].bar(\n        x + i * width,\n        data[\"improvement\"],\n        width,\n        label=dataset_name[:10],\n        color=colors_ds[dataset_name],\n    )\naxes[1, 0].set_xlabel(\"Agent Count\")\naxes[1, 0].set_ylabel(\"Improvement (%)\")\naxes[1, 0].set_title(f\"CATA Improvement (hidden_dim={best_hidden_dim})\")\naxes[1, 0].set_xticks(x + width)\naxes[1, 0].set_xticklabels(agent_counts)\naxes[1, 0].legend(fontsize=8)\naxes[1, 0].axhline(y=0, color=\"r\", linestyle=\"--\")\n\n# CPR by dataset\nfor i, dataset_name in enumerate(experiment_data[\"best_model_evaluation\"][\"datasets\"]):\n    data = experiment_data[\"best_model_evaluation\"][\"datasets\"][dataset_name]\n    axes[1, 1].bar(\n        x + i * width,\n        data[\"congestion_prevention_rate\"],\n        width,\n        label=dataset_name[:10],\n        color=colors_ds[dataset_name],\n    )\naxes[1, 1].set_xlabel(\"Agent Count\")\naxes[1, 1].set_ylabel(\"CPR (%)\")\naxes[1, 1].set_title(f\"Congestion Prevention Rate (hidden_dim={best_hidden_dim})\")\naxes[1, 1].set_xticks(x + width)\naxes[1, 1].set_xticklabels(agent_counts)\naxes[1, 1].legend(fontsize=8)\naxes[1, 1].axhline(y=0, color=\"r\", linestyle=\"--\")\n\n# Summary\nsummary_data = []\nfor dataset_name in experiment_data[\"best_model_evaluation\"][\"datasets\"]:\n    data = experiment_data[\"best_model_evaluation\"][\"datasets\"][dataset_name]\n    summary_data.append(\n        [np.mean(data[\"improvement\"]), np.mean(data[\"congestion_prevention_rate\"])]\n    )\nsummary_data = np.array(summary_data)\nx_sum = np.arange(3)\naxes[1, 2].bar(\n    x_sum - 0.15, summary_data[:, 0], 0.3, label=\"Throughput Imp.\", color=\"steelblue\"\n)\naxes[1, 2].bar(x_sum + 0.15, summary_data[:, 1], 0.3, label=\"CPR\", color=\"coral\")\naxes[1, 2].set_xticks(x_sum)\naxes[1, 2].set_xticklabels([\"Sparse\", \"Bottleneck\", \"Dense\"], fontsize=9)\naxes[1, 2].set_ylabel(\"Percentage (%)\")\naxes[1, 2].set_title(f\"Summary (best hidden_dim={best_hidden_dim})\")\naxes[1, 2].legend()\naxes[1, 2].axhline(y=0, color=\"r\", linestyle=\"--\")\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"hidden_dim_tuning_evaluation.png\"), dpi=150)\nplt.close()\n\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(f\"\\nResults saved to {working_dir}\")\n", "import os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.optim as optim\nimport matplotlib.pyplot as plt\nfrom collections import defaultdict\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\nexperiment_data = {\n    \"training\": {\"losses\": {\"train\": [], \"val\": []}, \"epochs\": []},\n    \"datasets\": {},\n    \"hyperparameter_tuning\": {\"congestion_weight\": {}},\n}\n\n\ndef greedy_assignment(cost_matrix):\n    n_agents, n_tasks = cost_matrix.shape\n    row_ind, col_ind = [], []\n    assigned_tasks, assigned_agents = set(), set()\n    pairs = [(cost_matrix[i, j], i, j) for i in range(n_agents) for j in range(n_tasks)]\n    pairs.sort()\n    for cost, i, j in pairs:\n        if i not in assigned_agents and j not in assigned_tasks:\n            row_ind.append(i)\n            col_ind.append(j)\n            assigned_agents.add(i)\n            assigned_tasks.add(j)\n            if len(assigned_agents) == min(n_agents, n_tasks):\n                break\n    return np.array(row_ind), np.array(col_ind)\n\n\nclass WarehouseSimulator:\n    def __init__(\n        self, grid_size=20, n_agents=20, n_tasks=30, obstacles=None, hotspots=None\n    ):\n        self.grid_size, self.n_agents, self.n_tasks = grid_size, n_agents, n_tasks\n        self.obstacles = obstacles if obstacles else set()\n        self.hotspots = hotspots if hotspots else []\n        self.congestion_events = 0\n        self.reset()\n\n    def _valid_position(self, pos):\n        return tuple(pos) not in self.obstacles\n\n    def _random_valid_position(self):\n        for _ in range(100):\n            pos = np.random.randint(0, self.grid_size, 2)\n            if self._valid_position(pos):\n                return pos\n        return np.array([0, 0])\n\n    def _hotspot_biased_position(self):\n        if self.hotspots and np.random.random() < 0.6:\n            hotspot = self.hotspots[np.random.randint(len(self.hotspots))]\n            offset = np.random.randint(-2, 3, 2)\n            pos = np.clip(hotspot + offset, 0, self.grid_size - 1)\n            if self._valid_position(pos):\n                return pos\n        return self._random_valid_position()\n\n    def reset(self):\n        self.agent_positions = np.array(\n            [self._random_valid_position() for _ in range(self.n_agents)]\n        )\n        self.agent_velocities = np.zeros((self.n_agents, 2))\n        self.task_positions = np.array(\n            [self._hotspot_biased_position() for _ in range(self.n_tasks)]\n        )\n        self.task_active = np.ones(self.n_tasks, dtype=bool)\n        self.agent_targets = [-1] * self.n_agents\n        self.time_step, self.tasks_completed = 0, 0\n        self.congestion_events = 0\n        return self.get_state()\n\n    def get_state(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        task_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        for i, pos in enumerate(self.task_positions):\n            if self.task_active[i]:\n                task_grid[pos[0], pos[1]] += 1\n        return np.stack([agent_grid, task_grid], axis=0)\n\n    def count_congestion_events(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        return np.sum(agent_grid > 2)\n\n    def compute_congestion(self, lookahead=5):\n        congestion = np.zeros((self.grid_size, self.grid_size))\n        for i, agent_pos in enumerate(self.agent_positions):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n
