on the original code\nstructure, the data contains tuning results for different max_time values\n(improvements, makespans, conflicts, computation times) and final CMA experiment\nresults comparing baseline vs CMA makespans. I'll print the best max_time value,\nthe improvement ratios for each max_time setting, and the final experiment\nmetrics.", "Looking at the original code, I can see that `experiment_data` is a nested\ndictionary with dataset names as keys, and each dataset has a \"final_run\" sub-\ndictionary containing metrics like \"baseline_makespans\", \"cma_makespans\",\n\"baseline_conflicts\", \"cma_conflicts\", \"improvement\", and \"best_penalty_weight\".\nI need to load this data and extract the final/best values for each metric per\ndataset, printing them clearly with proper labels.", "Looking at the original code, I can see that `experiment_data` is a dictionary\nwith a key \"scaling_factor_tuning\" containing various metrics including tuning\nresults, best configuration, makespans, improvements, conflict counts, and\nassignment changes. I'll load the numpy file, extract the relevant metrics from\nthe nested dictionary structure, and print the best/final values for each\nmetric.", "I'll load the experiment data and extract the key metrics from the grid size\ntuning experiments. Based on the original code structure, the data contains grid\nsize tuning results with baseline and CMA makespans, conflicts, improvement\nratios, and a final run with the best grid size. I'll print the improvement\nratios for each grid size tested, the best grid size found, and the final run\nresults.", "Looking at the original code, I can see that `experiment_data` is a dictionary\nwith a key \"scaling_factor_tuning\" containing various metrics including tuning\nresults, best configuration, makespans, improvements, conflict counts, and\nassignment changes. I'll load the numpy file, extract the relevant metrics from\nthe nested dictionary structure, and print the best/final values for each\nmetric.", "Looking at the original code, I can see that `experiment_data` is a dictionary\nwith a key \"scaling_factor_tuning\" containing various metrics including tuning\nresults, best configuration, makespans, improvements, conflict counts, and\nassignment changes. I'll load the numpy file, extract the relevant metrics from\nthe nested dictionary structure, and print the best/final values for each\nmetric.", "Looking at the original code, I can see that `experiment_data` is a dictionary\nwith a key \"scaling_factor_tuning\" containing various metrics including tuning\nresults, best configuration, makespans, improvements, conflict counts, and\nassignment changes. I'll load the numpy file, extract the relevant metrics from\nthe nested dictionary structure, and print the best/final values for each\nmetric.", ""], "parse_metrics_code": ["import os\nimport numpy as np\n\n# Get working directory\nworking_dir = os.path.join(os.getcwd(), \"working\")\n\n# Load the experiment data\nexperiment_data = np.load(\n    os.path.join(working_dir, \"experiment_data.npy\"), allow_pickle=True\n).item()\n\n# Print CMA Experiment metrics\nprint(\"=\" * 60)\nprint(\"Dataset: CMA Experiment\")\nprint(\"=\" * 60)\n\ncma_exp = experiment_data[\"cma_experiment\"]\n\n# Baseline metrics\nbaseline_makespans = cma_exp[\"baseline_makespans\"]\nprint(f\"Baseline Average Makespan: {np.mean(baseline_makespans):.4f}\")\nprint(f\"Baseline Makespan Std Dev: {np.std(baseline_makespans):.4f}\")\n\n# CMA metrics\ncma_makespans = cma_exp[\"cma_makespans\"]\nprint(f\"CMA Average Makespan: {np.mean(cma_makespans):.4f}\")\nprint(f\"CMA Makespan Std Dev: {np.std(cma_makespans):.4f}\")\n\n# Conflict counts\nbaseline_conflicts = cma_exp[\"conflict_counts_baseline\"]\ncma_conflicts = cma_exp[\"conflict_counts_cma\"]\nprint(f\"Baseline Average Conflict Count: {np.mean(baseline_conflicts):.4f}\")\nprint(f\"CMA Average Conflict Count: {np.mean(cma_conflicts):.4f}\")\n\n# Improvements\nimprovements = cma_exp[\"improvements\"]\nprint(f\"Average Improvement Ratio: {np.mean(improvements):.4f}\")\n\n# Assignment changes\nassignment_changes = cma_exp[\"assignment_changes\"]\nprint(f\"Assignment Change Rate: {np.mean(assignment_changes) * 100:.2f}%\")\n\n# Print Parameter Sweep Results\nprint(\"\\n\" + \"=\" * 60)\nprint(\"Dataset: Parameter Sweep Results\")\nprint(\"=\" * 60)\n\nsweep_results = experiment_data[\"sweep_results\"]\nfor pw, improvement in sweep_results:\n    print(f\"Penalty Weight {pw}: Improvement Ratio = {improvement:.4f}\")\n\n# Find and print best from sweep\nbest_pw = experiment_data[\"best_penalty_weight\"]\nbest_sweep_improvement = max(sweep_results, key=lambda x: x[1])[1]\nprint(f\"Best Penalty Weight: {best_pw}\")\nprint(f\"Best Sweep Improvement Ratio: {best_sweep_improvement:.4f}\")\n\n# Print Final Experiment Results\nprint(\"\\n\" + \"=\" * 60)\nprint(\"Dataset: Final Experiment Results\")\nprint(\"=\" * 60)\n\nfinal_improvement = experiment_data[\"final_improvement\"]\nprint(f\"Final Makespan Improvement Ratio: {final_improvement:.4f}\")\nprint(f\"Final Makespan Improvement Percentage: {final_improvement * 100:.2f}%\")\n\n# Calculate overall makespan improvement from the stored data\nbaseline_mean = np.mean(baseline_makespans)\ncma_mean = np.mean(cma_makespans)\nmakespan_improvement_ratio = (\n    (baseline_mean - cma_mean) / baseline_mean if baseline_mean > 0 else 0\n)\nprint(f\"CMA Experiment Makespan Improvement Ratio: {makespan_improvement_ratio:.4f}\")\n", "import os\nimport numpy as np\n\n# Get working directory\nworking_dir = os.path.join(os.getcwd(), \"working\")\n\n# Load experiment data\nexperiment_data = np.load(\n    os.path.join(working_dir, \"experiment_data.npy\"), allow_pickle=True\n).item()\n\n# Extract n_warmup tuning data\ntuning_data = experiment_data[\"n_warmup_tuning\"]\n\nprint(\"=\" * 60)\nprint(\"Dataset: n_warmup_tuning (Warmup Hyperparameter Tuning)\")\nprint(\"=\" * 60)\n\n# Print warmup values tested\nwarmup_values = tuning_data[\"warmup_values\"]\nprint(f\"\\nWarmup values tested: {warmup_values}\")\n\n# Print improvement ratios for each warmup value\nimprovement_ratios = tuning_data[\"improvement_ratios\"]\nstd_improvements = tuning_data[\"std_improvements\"]\n\nprint(\"\\nMean improvement ratios by n_warmup:\")\nfor i, wv in enumerate(warmup_values):\n    print(\n        f\"  n_warmup={wv}: improvement ratio = {improvement_ratios[i]:.4f} \u00b1 {std_improvements[i]:.4f}\"\n    )\n\n# Print baseline and CMA makespan means for each warmup value\nprint(\"\\nBaseline vs CMA mean makespans by n_warmup:\")\nfor wv in warmup_values:\n    baseline_ms = tuning_data[\"baseline_makespans\"][str(wv)]\n    cma_ms = tuning_data[\"cma_makespans\"][str(wv)]\n    print(\n        f\"  n_warmup={wv}: baseline mean makespan = {np.mean(baseline_ms):.2f}, CMA mean makespan = {np.mean(cma_ms):.2f}\"\n    )\n\n# Print best warmup value and improvement\nbest_warmup = tuning_data[\"best_warmup\"]\nbest_improvement = tuning_data[\"best_improvement\"]\nprint(f\"\\nBest n_warmup value: {best_warmup}\")\nprint(f\"Best improvement ratio: {best_improvement:.4f} ({best_improvement*100:.2f}%)\")\n\n# Print final validation results\nprint(\"\\n\" + \"=\" * 60)\nprint(\"Dataset: Final Validation (with best n_warmup)\")\nprint(\"=\" * 60)\n\nfinal_validation = tuning_data[\"final_validation\"]\nprint(f\"\\nFinal validation n_warmup: {final_validation['n_warmup']}\")\nprint(\n    f\"Final validation improvement ratio: {final_validation['improvement']:.4f} ({final_validation['improvement']*100:.2f}%)\"\n)\nprint(\n    f\"Final validation baseline mean makespan: {np.mean(final_validation['baseline_makespans']):.2f}\"\n)\nprint(\n    f\"Final validation CMA mean makespan: {np.mean(final_validation['cma_makespans']):.2f}\"\n)\n\n# Print trial results for each warmup value\nprint(\"\\n\" + \"=\" * 60)\nprint(\"Trial Results by n_warmup\")\nprint(\"=\" * 60)\ntrial_results = tuning_data[\"trial_results\"]\nfor wv in warmup_values:\n    trials = trial_results[str(wv)]\n    print(f\"\\nn_warmup={wv} trial improvement ratios: {[f'{t:.4f}' for t in trials]}\")\n", "import os\nimport numpy as np\n\n# Get working directory and load experiment data\nworking_dir = os.path.join(os.getcwd(), \"working\")\nexperiment_data = np.load(\n    os.path.join(working_dir, \"experiment_data.npy\"), allow_pickle=True\n).item()\n\n# Print CMA Experiment metrics\nprint(\"=\" * 60)\nprint(\"Dataset: cma_experiment\")\nprint(\"=\" * 60)\ncma_exp = experiment_data[\"cma_experiment\"]\n\nbaseline_makespans = cma_exp[\"baseline_makespans\"]\ncma_makespans = cma_exp[\"cma_makespans\"]\nimprovements = cma_exp[\"improvements\"]\n\nprint(f\"Baseline Makespan Mean: {np.mean(baseline_makespans):.4f}\")\nprint(f\"CMA Makespan Mean: {np.mean(cma_makespans):.4f}\")\nprint(f\"Average Improvement Ratio: {np.mean(improvements):.4f}\")\n\nif cma_exp.get(\"conflict_counts_baseline\"):\n    print(\n        f\"Baseline Conflict Count Mean: {np.mean(cma_exp['conflict_counts_baseline']):.4f}\"\n    )\nif cma_exp.get(\"conflict_counts_cma\"):\n    print(f\"CMA Conflict Count Mean: {np.mean(cma_exp['conflict_counts_cma']):.4f}\")\nif cma_exp.get(\"assignment_changes\"):\n    print(f\"Assignment Changes Total: {sum(cma_exp['assignment_changes'])}\")\n\n# Print Penalty Weight Tuning metrics\nprint(\"\\n\" + \"=\" * 60)\nprint(\"Dataset: penalty_weight_tuning\")\nprint(\"=\" * 60)\npw_tuning = experiment_data[\"penalty_weight_tuning\"]\n\npenalty_weights = pw_tuning[\"penalty_weights\"]\nimprovements_pw = pw_tuning[\"improvements\"]\nbaseline_means = pw_tuning[\"baseline_means\"]\ncma_means = pw_tuning[\"cma_means\"]\n\n# Find best penalty weight from tuning\nbest_idx = np.argmax(improvements_pw)\nprint(f\"Penalty Weights Tested: {penalty_weights}\")\nprint(f\"Best Penalty Weight from Tuning: {penalty_weights[best_idx]}\")\nprint(f\"Best Improvement Ratio from Tuning: {improvements_pw[best_idx]:.4f}\")\nprint(f\"Baseline Mean at Best Penalty Weight: {baseline_means[best_idx]:.4f}\")\nprint(f\"CMA Mean at Best Penalty Weight: {cma_means[best_idx]:.4f}\")\n\n# Print Sweep Results\nprint(\"\\n\" + \"=\" * 60)\nprint(\"Dataset: sweep_results\")\nprint(\"=\" * 60)\nsweep_results = experiment_data[\"sweep_results\"]\nfor pw, imp in sweep_results:\n    print(f\"Penalty Weight {pw:.2f}: Improvement Ratio = {imp:.4f}\")\n\n# Print Final Summary Metrics\nprint(\"\\n\" + \"=\" * 60)\nprint(\"Dataset: Final Summary Metrics\")\nprint(\"=\" * 60)\nprint(f\"Best Penalty Weight (Overall): {experiment_data['best_penalty_weight']}\")\nprint(\n    f\"Main Experiment Improvement Ratio (6 agents): {experiment_data['main_improvement']:.4f}\"\n)\nprint(\n    f\"Final Experiment Improvement Ratio (7 agents): {experiment_data['final_improvement']:.4f}\"\n)\n", "import os\nimport numpy as np\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\n\n# Load the experiment data\nexperiment_data = np.load(\n    os.path.join(working_dir, \"experiment_data.npy\"), allow_pickle=True\n).item()\n\n# Print Decay Tuning Results\nprint(\"=\" * 60)\nprint(\"DATASET: Decay Tuning Experiment\")\nprint(\"=\" * 60)\n\ndecay_values = experiment_data[\"decay_tuning\"][\"decay_values\"]\nimprovements = experiment_data[\"decay_tuning\"][\"improvements\"]\nbaseline_makespans_list = experiment_data[\"decay_tuning\"][\"baseline_makespans\"]\ncma_makespans_list = experiment_data[\"decay_tuning\"][\"cma_makespans\"]\nconflict_counts_baseline = experiment_data[\"decay_tuning\"][\"conflict_counts_baseline\"]\nconflict_counts_cma = experiment_data[\"decay_tuning\"][\"conflict_counts_cma\"]\n\nprint(\"\\nDecay Parameter Tuning Results:\")\nfor i, decay in enumerate(decay_values):\n    print(f\"\\n  Decay Value: {decay}\")\n    print(f\"    Improvement Ratio: {improvements[i]:.4f} ({improvements[i]*100:.2f}%)\")\n    print(f\"    Baseline Mean Makespan: {np.mean(baseline_makespans_list[i]):.2f}\")\n    print(f\"    CMA Mean Makespan: {np.mean(cma_makespans_list[i]):.2f}\")\n    print(f\"    Baseline Mean Conflicts: {np.mean(conflict_counts_baseline[i]):.2f}\")\n    print(f\"    CMA Mean Conflicts: {np.mean(conflict_counts_cma[i]):.2f}\")\n\n# Find and print best decay from tuning\nbest_idx = np.argmax(improvements)\nprint(f\"\\nBest Decay Value from Tuning: {decay_values[best_idx]}\")\nprint(\n    f\"Best Improvement Ratio from Tuning: {improvements[best_idx]:.4f} ({improvements[best_idx]*100:.2f}%)\"\n)\n\n# Print the stored best decay\nprint(f\"\\nStored Best Decay Parameter: {experiment_data['best_decay']}\")\n\n# Print Final Run Results\nprint(\"\\n\" + \"=\" * 60)\nprint(\"DATASET: Final Run with Best Decay\")\nprint(\"=\" * 60)\n\nfinal_improvement = experiment_data[\"final_improvement\"]\nfinal_run = experiment_data[\"final_run\"]\n\nfinal_baseline_makespans = final_run[\"baseline_makespans\"]\nfinal_cma_makespans = final_run[\"cma_makespans\"]\nfinal_baseline_conflicts = final_run[\"baseline_conflicts\"]\nfinal_cma_conflicts = final_run[\"cma_conflicts\"]\n\nprint(f\"\\nFinal Experiment Decay Value: {experiment_data['best_decay']}\")\nprint(\n    f\"Final Improvement Ratio: {final_improvement:.4f} ({final_improvement*100:.2f}%)\"\n)\nprint(f\"\\nFinal Baseline Mean Makespan: {np.mean(final_baseline_makespans):.2f}\")\nprint(f\"Final CMA Mean Makespan: {np.mean(final_cma_makespans):.2f}\")\nprint(f\"Final Baseline Std Makespan: {np.std(final_baseline_makespans):.2f}\")\nprint(f\"Final CMA Std Makespan: {np.std(final_cma_makespans):.2f}\")\nprint(f\"\\nFinal Baseline Mean Conflicts: {np.mean(final_baseline_conflicts):.2f}\")\nprint(f\"Final CMA Mean Conflicts: {np.mean(final_cma_conflicts):.2f}\")\n\n# Summary\nprint(\"\\n\" + \"=\" * 60)\nprint(\"SUMMARY\")\nprint(\"=\" * 60)\nprint(f\"Best Decay Parameter: {experiment_data['best_decay']}\")\nprint(f\"Final Improvement: {final_improvement*100:.2f}%\")\nif final_improvement > 0:\n    print(\"Conclusion: CMA with tuned decay shows POSITIVE impr
