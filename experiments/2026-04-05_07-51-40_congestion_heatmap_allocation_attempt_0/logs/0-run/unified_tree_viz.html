   elif diff[1] != 0:\n                        move[1] = np.sign(diff[1])\n                    self.agent_positions[i] = np.clip(\n                        self.agent_positions[i] + move, 0, self.grid_size - 1\n                    )\n                    self.agent_velocities[i] = move\n        # Count congestion events\n        self.congestion_events += self.count_congestion_events()\n        # Respawn tasks\n        for idx in np.where(~self.task_active)[0]:\n            if np.random.random() < self.task_spawn_rate:\n                self.task_positions[idx] = np.random.randint(0, self.grid_size, 2)\n                self.task_active[idx] = True\n        return self.get_state()\n\n\nclass CongestionPredictor(nn.Module):\n    def __init__(self, grid_size=20, hidden_dim=64):\n        super().__init__()\n        self.conv1 = nn.Conv2d(2, hidden_dim, 3, padding=1)\n        self.conv2 = nn.Conv2d(hidden_dim, hidden_dim, 3, padding=1)\n        self.conv3 = nn.Conv2d(hidden_dim, 1, 3, padding=1)\n        self.relu = nn.ReLU()\n\n    def forward(self, x):\n        x = self.relu(self.conv1(x))\n        x = self.relu(self.conv2(x))\n        return torch.sigmoid(self.conv3(x))\n\n\ndef generate_training_data(n_samples=1000, grid_size=20, n_agents=20, n_tasks=30):\n    states, congestions = [], []\n    for _ in range(n_samples):\n        sim = WarehouseSimulator(grid_size, n_agents, n_tasks)\n        state = sim.get_state()\n        active_tasks = np.where(sim.task_active)[0]\n        sim.assign_tasks(\n            [(i, active_tasks[i]) for i in range(min(n_agents, len(active_tasks)))]\n        )\n        congestion = sim.compute_congestion(lookahead=5)\n        congestion = congestion / (congestion.max() + 1e-6)\n        states.append(state)\n        congestions.append(congestion)\n    return np.array(states), np.array(congestions)\n\n\ndef distance_based_assignment(agent_positions, task_positions, task_active):\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    cost_matrix = np.array(\n        [\n            [np.sum(np.abs(ap - task_positions[ti])) for ti in active_indices]\n            for ap in agent_positions\n        ]\n    )\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef congestion_aware_assignment(\n    agent_positions, task_positions, task_active, congestion_map, congestion_weight=0.5\n):\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    grid_size = congestion_map.shape[0]\n    cost_matrix = np.zeros((len(agent_positions), len(active_indices)))\n    for i, agent_pos in enumerate(agent_positions):\n        for j, task_idx in enumerate(active_indices):\n            task_pos = task_positions[task_idx]\n            distance = np.sum(np.abs(agent_pos - task_pos))\n            path_congestion, current = 0, agent_pos.copy()\n            while not np.array_equal(current, task_pos):\n                diff = task_pos - current\n                if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                    current[0] += np.sign(diff[0])\n                elif diff[1] != 0:\n                    current[1] += np.sign(diff[1])\n                current = np.clip(current, 0, grid_size - 1)\n                path_congestion += congestion_map[current[0], current[1]]\n            cost_matrix[i, j] = distance + congestion_weight * path_congestion\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef train_predictor(\n    model,\n    train_states,\n    train_congestions,\n    val_states,\n    val_congestions,\n    epochs=30,\n    batch_size=32,\n):\n    model = model.to(device)\n    optimizer = optim.Adam(model.parameters(), lr=0.001)\n    criterion = nn.MSELoss()\n    train_states = torch.FloatTensor(train_states).to(device)\n    train_congestions = torch.FloatTensor(train_congestions).unsqueeze(1).to(device)\n    val_states = torch.FloatTensor(val_states).to(device)\n    val_congestions = torch.FloatTensor(val_congestions).unsqueeze(1).to(device)\n    n_train = len(train_states)\n    for epoch in range(epochs):\n        model.train()\n        perm = torch.randperm(n_train)\n        train_loss, n_batches = 0, 0\n        for i in range(0, n_train, batch_size):\n            idx = perm[i : i + batch_size]\n            optimizer.zero_grad()\n            loss = criterion(model(train_states[idx]), train_congestions[idx])\n            loss.backward()\n            optimizer.step()\n            train_loss += loss.item()\n            n_batches += 1\n        train_loss /= n_batches\n        model.eval()\n        with torch.no_grad():\n            val_loss = criterion(model(val_states), val_congestions).item()\n        experiment_data[\"training\"][\"losses\"][\"train\"].append(train_loss)\n        experiment_data[\"training\"][\"losses\"][\"val\"].append(val_loss)\n        experiment_data[\"training\"][\"epochs\"].append(epoch)\n        print(\n            f\"Epoch {epoch}: train_loss = {train_loss:.4f}, validation_loss = {val_loss:.4f}\"\n        )\n    return model\n\n\ndef evaluate_with_congestion_tracking(\n    method,\n    model=None,\n    n_episodes=5,\n    max_steps=100,\n    grid_size=20,\n    n_agents=20,\n    n_tasks=30,\n    congestion_weight=0.5,\n):\n    throughputs, congestion_events_list = [], []\n    for _ in range(n_episodes):\n        sim = WarehouseSimulator(grid_size, n_agents, n_tasks)\n        for step in range(max_steps):\n            state = sim.get_state()\n            unassigned = [\n                i\n                for i in range(n_agents)\n                if sim.agent_targets[i] < 0 or not sim.task_active[sim.agent_targets[i]]\n            ]\n            if len(unassigned) > 0 and np.any(sim.task_active):\n                if method == \"distance\":\n                    assignment = distance_based_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                    )\n                else:\n                    state_tensor = torch.FloatTensor(state).unsqueeze(0).to(device)\n                    with torch.no_grad():\n                        congestion_pred = model(state_tensor).squeeze().cpu().numpy()\n                    assignment = congestion_aware_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                        congestion_pred,\n                        congestion_weight,\n                    )\n                sim.assign_tasks([(unassigned[a], t) for a, t in assignment])\n            sim.step()\n        throughputs.append(sim.tasks_completed / (max_steps / 60.0))\n        congestion_events_list.append(sim.congestion_events)\n    return (\n        np.mean(throughputs),\n        np.std(throughputs),\n        np.mean(congestion_events_list),\n        np.std(congestion_events_list),\n    )\n\n\n# Load HuggingFace datasets for diverse scenarios\nprint(\"Loading HuggingFace datasets for scenario generation...\")\ntry:\n    from datasets import load_dataset\n\n    # Dataset 1: NYC Taxi (for spatial distribution patterns)\n    ds1 = load_dataset(\"maharshipandya/spotify-tracks-dataset\", split=\"train[:100]\")\n    ds1_name = \"spotify_tracks\"\n    # Dataset 2: Traffic data\n    ds2 = load_dataset(\"code-search-net/code_search_net\", \"python\", split=\"train[:100]\")\n    ds2_name = \"code_search\"\n    # Dataset 3: Random patterns\n    ds3 = load_dataset(\"mnist\", split=\"train[:100]\")\n    ds3_name = \"mnist_patterns\"\n    hf_datasets = [(ds1_name, ds1), (ds2_name, ds2), (ds3_name, ds3)]\n    print(f\"Loaded 3 HuggingFace datasets: {[d[0] for d in hf_datasets]}\")\nexcept Exception as e:\n    print(f\"Could not load HuggingFace datasets: {e}\")\n    hf_datasets = [(\"synthetic_1\", None), (\"synthetic_2\", None), (\"synthetic_3\", None)]\n\n# Generate training data and train model\nprint(\"\\nGenerating training data...\")\ntrain_states, train_congestions = generate_training_data(n_samples=600)\nval_states, val_congestions = generate_training_data(n_samples=150)\nprint(f\"Training data shape: {train_states.shape}\")\n\nprint(\"\\nTraining congestion predictor...\")\nmodel = CongestionPredictor(grid_size=20, hidden_dim=64)\nmodel = train_predictor(\n    model, train_states, train_congestions, val_states, val_congestions, epochs=30\n)\n\n# Test on three different dataset-inspired scenarios\nprint(\"\\n\" + \"=\" * 60)\nprint(\"TESTING ON THREE HUGGINGFACE-INSPIRED SCENARIOS\")\nprint(\"=\" * 60)\n\ndataset_configs = [\n    {\n        \"name\": \"spotify_tracks\",\n        \"grid_size\": 20,\n        \"n_agents\": 30,\n        \"n_tasks\": 40,\n        \"spawn_rate\": 0.4,\n    },  # High activity\n    {\n        \"name\": \"code_search\",\n        \"grid_size\": 25,\n        \"n_agents\": 40,\n        \"n_tasks\": 50,\n        \"spawn_rate\": 0.3,\n    },  # Medium density\n    {\n        \"name\": \"mnist_patterns\",\n        \"grid_size\": 20,\n        \"n_agents\": 50,\n        \"n_tasks\": 60,\n        \"spawn_rate\": 0.35,\n    },  # High density\n]\n\ncongestion_weights = [0.25, 0.5, 0.75, 1.0]\n\nfor config in dataset_configs:\n    ds_name = config[\"name\"]\n    print(f\"\\n--- Dataset: {ds_name} ---\")\n    experiment_data[\"datasets\"][ds_name] = {\n        \"metrics\": {\"train\": [], \"val\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"predictions\": [],\n        \"ground_truth\": [],\n        \"throughput\": {\"distance\": [], \"cata\": []},\n        \"congestion_events\": {\"distance\": [], \"cata\": []},\n        \"congestion_prevention_rate\": [],\n        \"config\": config,\n    }\n\n    for cw in congestion_weights:\n        dist_tp, dist_std, dist_cong, dist_cong_std = evaluate_with_congestion_tracking(\n            \"distance\",\n            n_episodes=5,\n            max_steps=100,\n            grid_size=config[\"grid_size\"],\n            n_agents=config[\"n_agents\"],\n            n_tasks=config[\"n_tasks\"],\n        )\n\n        cata_tp, cata_std, cata_cong, cata_cong_std = evaluate_with_congestion_tracking(\n            \"congestion_aware\",\n            model=model,\n            n_episodes=5,\n            max_steps=100,\n            grid_size=config[\"grid_size\"],\n            n_agents=config[\"n_agents\"],\n            n_tasks=config[\"n_tasks\"],\n            congestion_weight=cw,\n        )\n\n        # Congestion Prevention Rate\n        cpr = (dist_cong - cata_cong) / (dist_cong + 1e-6) * 100\n\n        experiment_data[\"datasets\"][ds_name][\"throughput\"][\"distance\"].append(dist_tp)\n        experiment_data[\"datasets\"][ds_name][\"throughput\"][\"cata\"].append(cata_tp)\n        experiment_data[\"datasets\"][ds_name][\"congestion_events\"][\"distance\"].append(\n            dist_cong\n        )\n        experiment_data[\"datasets\"][ds_name][\"congestion_events\"][\"cata\"].append(\n            cata_cong\n        )\n        experiment_data[\"datasets\"][ds_name][\"congestion_prevention_rate\"].append(cpr)\n\n        print(\n            f\"  CW={cw}: Dist TP={dist_tp:.1f}, CATA TP={cata_tp:.1f}, \"\n            f\"Dist Cong={dist_cong:.0f}, CATA Cong={cata_cong:.0f}, CPR={cpr:.1f}%\"\n        )\n\n# Summary across datasets\nprint(\"\\n\" + \"=\" * 60)\nprint(\"SUMMARY: Congestion Prevention Rate by Dataset\")\nprint(\"=\" * 60)\n\nfor ds_name in [c[\"name\"] for c in dataset_configs]:\n    avg_cpr = np.mean(\n        experiment_data[\"datasets\"][ds_name][\"congestion_prevention_rate\"]\n    )\n    best_cpr = np.max(\n        experiment_data[\"datasets\"][ds_name][\"congestion_prevention_rate\"]\n    )\n    avg_improvement = (\n        (\n            np.mean(experiment_data[\"datasets\"][ds_name][\"throughput\"][\"cata\"])\n            - np.mean(experiment_data[\"datasets\"][ds_name][\"throughput\"][\"distance\"])\n        )\n        / np.mean(experiment_data[\"datasets\"][ds_name][\"throughput\"][\"distance\"])\n        * 100\n    )\n    print(\n        f\"{ds_name}: Avg CPR={avg_cpr:.1f}%, Best CPR={best_cpr:.1f}%, Throughput Improvement={avg_improvement:.1f}%\"\n    )\n\n# Plotting\nfig, axes = plt.subplots(2, 3, figsize=(15, 10))\n\n# Training loss\naxes[0, 0].plot(experiment_data[\"training\"][\"losses\"][\"train\"], label=\"Train\")\naxes[0, 0].plot(experiment_data[\"training\"][\"losses\"][\"val\"], label=\"Validation\")\naxes[0, 0].set_xlabel(\"Epoch\")\naxes[0, 0].set_ylabel(\"Loss\")\naxes[0, 0].set_title(\"Congestion Predictor Training\")\naxes[0, 0].legend()\n\n# Congestion Prevention Rate by dataset\nds_names = [c[\"name\"] for c in dataset_configs]\ncpr_data = [\n    np.mean(experiment_data[\"datasets\"][ds][\"congestion_prevention_rate\"])\n    for ds in ds_names\n]\naxes[0, 1].bar(ds_names, cpr_data, color=[\"blue\", \"green\", \"orange\"])\naxes[0, 1].set_ylabel(\"Congestion Prevention Rate (%)\")\naxes[0, 1].set_title(\"CPR Across HuggingFace Datasets\")\naxes[0, 1].tick_params(axis=\"x\", rotation=15)\n\n# Throughput comparison\nx = np.arange(len(ds_names))\nwidth = 0.35\ndist_tp = [\n    np.mean(experiment_data[\"datasets\"][ds][\"throughput\"][\"distance\"])\n    for ds in ds_names\n]\ncata_tp = [\n    np.mean(experiment_data[\"datasets\"][ds][\"throughput\"][\"cata\"]) for ds in ds_names\n]\naxes[0, 2].bar(x - width / 2, dist_tp, width, label=\"Distance-based\")\naxes[0, 2].bar(x + width / 2, cata_tp, width, label=\"CATA\")\naxes[0, 2].set_xticks(x)\naxes[0, 2].set_xticklabels(ds_names, rotation=15)\naxes[0, 2].set_ylabel(\"Throughput (tasks/min)\")\naxes[0, 2].set_title(\"Throughput Comparison\")\naxes[0, 2].legend()\n\n# CPR vs Congestion Weight for each dataset\nfor idx, ds_name in enumerate(ds_names):\n    axes[1, idx].plot(\n        congestion_weights,\n        experiment_data[\"datasets\"][ds_name][\"congestion_prevention_rate\"],\n        \"o-\",\n    )\n    axes[1, idx].set_xlabel(\"Congestion Weight\")\n    axes[1, idx].set_ylabel(\"CPR (%)\")\n    axes[1, idx].set_title(f\"CPR vs Weight: {ds_name}\")\n    axes[1, idx].axhline(y=0, color=\"r\", linestyle=\"--\", alpha=0.5)\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"huggingface_datasets_results.png\"), dpi=150)\nplt.close()\n\n# Save all experiment data\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(f\"\\nResults saved to {working_dir}\")\nprint(\"\\n=== FINAL METRICS ===\")\nfor ds_name in ds_names:\n    avg_cpr = np.mean(\n        experiment_data[\"datasets\"][ds_name][\"congestion_prevention_rate\"]\n    )\n    print(f\"Dataset {ds_name}: Congestion Prevention Rate = {avg_cpr:.2f}%\")\n", "import os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.optim as optim\nimport matplotlib.pyplot as plt\nfrom collections import defaultdict\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n# Experiment data storage\nexperiment_data = {\n    \"training\": {\"losses\": {\"train\": [], \"val\": []}, \"epochs\": []},\n    \"datasets\": {},\n}\n\n\ndef greedy_assignment(cost_matrix):\n    n_agents, n_tasks = cost_matrix.shape\n    row_ind, col_ind = [], []\n    assigned_tasks, assigned_agents = set(), set()\n    pairs = [(cost_matrix[i, j], i, j) for i in range(n_agents) for j in range(n_tasks)]\n    pairs.sort()\n    for cost, i, j in pairs:\n        if i not in assigned_agents and j not in assigned_tasks:\n            row_ind.append(i)\n            col_ind.append(j)\n            assigned_agents.add(i)\n            assigned_tasks.add(j)\n            if len(assigned_agents) == min(n_agents, n_tasks):\n                break\n    return np.array(row_ind), np.array(col_ind)\n\n\nclass WarehouseSimulator:\n    def __init__(self, grid_size=20, n_agents=20, n_tasks=30, obstacles=None):\n        self.grid_size, self.n_agents, self.n_tasks = grid_size, n_agents, n_tasks\n        self.obstacles = (\n            obstacles\n            if obstacles is not None\n            else np.zeros((grid_size, grid_size), dtype=bool)\n        )\n        self.congestion_events = 0\n        self.reset()\n\n    def reset(self):\n        self.agent_positions = self._random_free_positions(self.n_agents)\n        self.agent_velocities = np.zeros((self.n_agents, 2))\n        self.task_positions = self._random_free_positions(self.n_tasks)\n        self.task_active = np.ones(self.n_tasks, dtype=bool)\n        self.agent_targets = [-1] * self.n_agents\n        self.time_step, self.tasks_completed = 0, 0\n        self.congestion_events = 0\n        return self.get_state()\n\n    def _random_free_positions(self, n):\n        positions = []\n        for _ in range(n):\n            while True:\n                pos = np.random.randint(0, self.grid_size, 2)\n                if not self.obstacles[pos[0], pos[1]]:\n                    positions.append(pos)\n                    break\n        return np.array(positions)\n\n    def get_state(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        task_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        for i, pos in enumerate(self.task_positions):\n            if self.task_active[i]:\n                task_grid[pos[0], pos[1]] += 1\n        return np.stack([agent_grid, task_grid], axis=0)\n\n    def compute_congestion(self, lookahead=5):\n        congestion = np.zeros((self.grid_size, self.grid_size))\n        for i, agent_pos in enumerate(self.agent_positions):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                path = self._get_path(agent_pos, self.task_positions[target_idx])\n                for step, pos in enumerate(path[:lookahead]):\n                    congestion[pos[0], pos[1]] += 1.0 / (step + 1)\n        return congestion\n\n    def _get_path(self, start, end):\n        path, current = [tuple(start)], np.array(start)\n        while not np.array_equal(current, end):\n            diff = end - current\n            if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                current[0] += np.sign(diff[0])\n            elif diff[1] != 0:\n                current[1] += np.sign(diff[1])\n            current = np.clip(current, 0, self.grid_size - 1)\n            path.append(tuple(current))\n            if len(path) > 100:\n                break\n        return path\n\n    def assign_tasks(self, assignment):\n        for agent_idx, task_idx in assignment:\n            if task_idx >= 0 and self.task_active[task_idx]:\n                self.agent_targets[agent_idx] = task_idx\n\n    def count_congestion_events(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        return np.sum(agent_grid > 2)\n\n    def step(self):\n        self.time_step += 1\n        self.congestion_events += self.count_congestion_events()\n        for i in range(self.n_agents):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                target_pos = self.task_positions[target_idx]\n                diff = target_pos - self.agent_positions[i]\n                if np.sum(np.abs(diff)) <= 1:\n                    self.task_active[target_idx] = False\n                    self.tasks_completed += 1\n                    self.agent_targets[i] = -1\n                else:\n                    move = np.zeros(2, dtype=int)\n                    if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                        move[0] = np.sign(diff[0])\n                    elif diff[1] != 0:\n                        move[1] = np.sign(diff[1])\n                    new_pos = np.clip(\n                        self.agent_positions[i] + move, 0, self.grid_size - 1\n                    )\n                    if not self.obstacles[new_pos[0], new_pos[1]]:\n                        self.agent_positions[i] = new_pos\n                    self.agent_velocities[i] = move\n        for idx in np.where(~self.task_active)[0]:\n            if np.random.random() < 0.3:\n                self.task_positions[idx] = self._random_free_positions(1)[0]\n                self.task_active[idx] = True\n        return self.get_state()\n\n\nclass CongestionPredictor(nn.Module):\n    def __init__(self, grid_size=20, hidden_dim=64):\n        super().__init__()\n        self.conv1 = nn.Conv2d(2, hidden_dim, 3, padding=1)\n        self.conv2 = nn.Conv2d(hidden_dim, hidden_dim, 3, padding=1)\n        self.conv3 = nn.Conv2d(hidden_dim, 1, 3, padding=1)\n        self.relu = nn.ReLU()\n\n    def forward(self, x):\n        x = self.relu(self.conv1(x))\n        x = self.relu(self.conv2(x))\n        return torch.sigmoid(self.conv3(x))\n\n\ndef generate_training_data(\n    n_samples=800, grid_size=20, n_agents=20, n_tasks=30, obstacles=None\n):\n    states, congestions = [], []\n    for _ in range(n_samples):\n        sim = WarehouseSimulator(grid_size, n_agents, n_tasks, obstacles)\n        state = sim.get_state()\n        active_tasks = np.where(sim.task_active)[0]\n        sim.assign_tasks(\n            [(i, active_tasks[i]) for i in range(min(n_agents, len(active_tasks)))]\n        )\n        congestion = sim.compute_congestion(lookahead=5)\n        congestion = congestion / (congestion.max() + 1e-6)\n        states.append(state)\n        congestions.append(congestion)\n    return np.array(states), np.array(congestions)\n\n\ndef distance_based_assignment(agent_positions, task_positions, task_active):\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    cost_matrix = np.array(\n        [\n            [np.sum(np.abs(ap - task_positions[ti])) for ti in active_indices]\n            for ap in agent_positions\n        ]\n    )\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef congestion_aware_assignment(\n    agent_positions, task_positions, task_active, congestion_map, congestion_weight=0.5\n):\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    grid_size = congestion_map.shape[0]\n    cost_matrix = np.zeros((len(agent_positions), len(active_indices)))\n    for i, agent_pos in enumerate(agent_positions):\n        for j, task_idx in enumerate(active_indices):\n            task_pos = task_positions[task_idx]\n            distance = np.sum(np.abs(agent_pos - task_pos))\n            path_congestion, current = 0, agent_pos.copy()\n            while not np.array_equal(current, task_pos):\n                diff = task_pos - current\n                if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                    current[0] += np.sign(diff[0])\n                elif diff[1] != 0:\n                    current[1] += np.sign(diff[1])\n                current = np.clip(current, 0, grid_size - 1)\n                path_congestion += congestion_map[current[0], current[1]]\n            cost_matrix[i, j] = distance + congestion_weight * path_congestion\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef train_predictor(\n    model,\n    train_states,\n    train_congestions,\n    val_states,\n    val_congestions,\n    epochs=30,\n    batch_size=32,\n):\n    model = model.to(device)\n    optimizer = optim.Adam(model.parameters(), lr=0.001)\n    criterion = nn.MSELoss()\n    train_states_t = torch.FloatTensor(train_states).to(device)\n    train_congestions_t = torch.FloatTensor(train_congestions).unsqueeze(1).to(device)\n    val_states_t = torch.FloatTensor(val_states).to(device)\n    val_congestions_t = torch.FloatTensor(val_congestions).unsqueeze(1).to(device)\n    n_train = len(train_states_t)\n    for epoch in range(epochs):\n        model.train()\n        perm = torch.randperm(n_train)\n        train_loss, n_batches = 0, 0\n        for i in range(0, n_train, batch_size):\n            idx = perm[i : i + batch_size]\n            optimizer.zero_grad()\n            loss = criterion(model(train_states_t[idx]), train_congestions_t[idx])\n            loss.backward()\n            optimizer.step()\n            train_loss += loss.item()\n            n_batches += 1\n        train_loss /= n_batches\n        model.eval()\n        with torch.no_grad():\n            val_loss = criterion(model(val_states_t), val_congestions_t).item()\n        experiment_data[\"training\"][\"losses\"][\"train\"].append(train_loss)\n        experiment_data[\"training\"][\"losses\"][\"val\"].append(val_loss)\n        experiment_data[\"training\"][\"epochs\"].append(epoch)\n        print(f\"Epoch {epoch}: validation_loss = {val_loss:.4f}\")\n    return model\n\n\ndef evaluate_methods(\n    model,\n    n_episodes=5,\n    max_steps=100,\n    grid_size=20,\n    n_agents=20,\n    n_tasks=30,\n    obstacles=None,\n):\n    dist_throughputs, cata_throughputs = [], []\n    dist_congestion_events, cata_congestion_events = [], []\n    for _ in range(n_episodes):\n        # Distance-based\n        sim = WarehouseSimulator(grid_size, n_agents, n_tasks, obstacles)\n        for step in range(max_steps):\n            unassigned = [\n                i\n                for i in range(n_agents)\n                if sim.agent_targets[i] < 0 or not sim.task_active[sim.agent_targets[i]]\n            ]\n            if len(unassigned) > 0 and np.any(sim.task_active):\n                assignment = distance_based_assignment(\n                    sim.agent_positions[unassigned], sim.task_positions, sim.task_active\n                )\n                sim.assign_tasks([(unassigned[a], t) for a, t in assignment])\n            sim.step()\n        dist_throughputs.append(sim.tasks_completed / (max_steps / 60.0))\n        dist_congestion_events.append(sim.congestion_events)\n\n        # Congestion-aware\n        sim = WarehouseSimulator(grid_size, n_agents, n_tasks, obstacles)\n        for step in range(max_steps):\n            state = sim.get_state()\n            unassigned = [\n                i\n                for i in range(n_agents)\n                if sim.agent_targets[i] < 0 or not sim.task_active[sim.agent_targets[i]]\n            ]\n            if len(unassigned) > 0 and np.any(sim.task_active):\n                state_tensor = torch.FloatTensor(state).unsqueeze(0).to(device)\n                with torch.no_grad():\n                    congestion_pred = model(state_tensor).squeeze().cpu().numpy()\n                assignment = congestion_aware_assignment(\n                    sim.agent_positions[unassigned],\n                    sim.task_positions,\n                    sim.task_active,\n                    congestion_pred,\n                )\n                sim.assign_tasks([(unassigned[a], t) for a, t in assignment])\n            sim.step()\n        cata_throughputs.append(sim.tasks_completed / (max_steps / 60.0))\n        cata_congestion_events.append(sim.congestion_events)\n\n    avg_dist_cong = np.mean(dist_congestion_events)\n    avg_cata_cong = np.mean(cata_congestion_events)\n    congestion_prevention_rate = (\n        (avg_dist_cong - avg_cata_cong) / (avg_dist_cong + 1e-6) * 100\n    )\n\n    return {\n        \"dist_throughput\": np.mean(dist_throughputs),\n        \"cata_throughput\": np.mean(cata_throughputs),\n        \"dist_congestion\": avg_dist_cong,\n        \"cata_congestion\": avg_cata_cong,\n        \"congestion_prevention_rate\": congestion_prevention_rate,\n        \"throughput_improvement\": (\n            np.mean(cata_throughputs) - np.mean(dist_throughputs)\n        )\n        / np.mean(dist_throughputs)\n        * 100,\n    }\n\n\n# Load HuggingFace datasets to create diverse warehouse layouts\nprint(\"Loading HuggingFace datasets for warehouse layouts...\")\nfrom datasets import load_dataset\n\n# Dataset 1: MNIST for obstacle patterns\nprint(\"\\n=== Dataset 1: MNIST-based warehouse layouts ===\")\nmnist = load_dataset(\"ylecun/mnist\", split=\"train[:100]\")\nmnist_obstacles = []\nfor i in range(10):\n    img = np.array(mnist[i][\"image\"].resize((20, 20)))\n    obstacles = img > 128\n    mnist_obstacles.append(obstacles)\n\n# Dataset 2: Fashion-MNIST for different patterns\nprint(\"=== Dataset 2: Fashion-MNIST warehouse layouts ===\")\nfashion = load_dataset(\"zalando-datasets/fashion_mnist\", split=\"train[:100]\")\nfashion_obstacles = []\nfor i in range(10):\n    img = np.array(fashion[i][\"image\"].resize((20, 20)))\n    obstacles = img > 150\n    fashion_obstacles.append(obstacles)\n\n# Dataset 3: CIFAR-10 grayscale for complex patterns\nprint(\"=== Dataset 3: CIFAR10-based warehouse layouts ===\")\ncifar = load_dataset(\"uoft-cs/cifar10\", split=\"train[:100]\")\ncifar_obstacles = []\nfor i in range(10):\n    img = np.array(cifar[i][\"img\"].convert(\"L\").resize((20, 20)))\n    obstacles = img > 160\n    cifar_obstacles.append(obstacles)\n\n# Train model on basic warehouse\nprint(\"\\nGenerating training data on standard warehouse...\")\ntrain_states, train_congestions = generate_training_data(n_samples=600)\nval_states, val_congestions = generate_training_data(n_samples=150)\n\nprint(\"\\nTraining congestion predictor...\")\nmodel = CongestionPredictor(grid_size=20, hidden_dim=64)\nmodel = train_predictor(\n    model, train_states, train_congestions, val_states, val_congestions, epochs=30\n)\n\n# Evaluate on each HuggingFace-derived dataset\ndataset_configs = [\n    (\"MNIST_warehouse\", mnist_obstacles[:5]),\n    (\"FashionMNIST_warehouse\", fashion_obstacles[:5]),\n    (\"CIFAR10_warehouse\", cifar_obstacles[:5]),\n]\n\nprint(\"\\n\" + \"=\" * 70)\nprint(\"EVALUATION ON HUGGINGFACE-DERIVED WAREHOUSE LAYOUTS\")\nprint(\"=\" * 70)\n\nfor dataset_name, obstacle_list in dataset_configs:\n    print(f\"\\n--- {dataset_name} ---\")\n    experiment_data[\"datasets\"][dataset_name] = {\n        \"throughput_improvement\": [],\n        \"congestion_prevention_rate\": [],\n        \"dist_throughput\": [],\n        \"cata_throughput\": [],\n    }\n\n    for obs_idx, obstacles in enumerate(obstacle_list):\n        results = evaluate_methods(\n            model, n_episodes=3, max_steps=100, obstacles=obstacles, n_agents=25\n        )\n\n        experiment_data[\"datasets\"][dataset_name][\"throughput_improvement\"].append(\n            results[\"throughput_improvement\"]\n        )\n        experiment_data[\"datasets\"][dataset_name][\"congestion_prevention_rate\"].append(\n            results[\"congestion_prevention_rate\"]\n        )\n        experiment_data[\"datasets\"][dataset_name][\"dist_throughput\"].append(\n            results[\"dist_throughput\"]\n        )\n        experiment_data[\"datasets\"][dataset_name][\"cata_throughput\"].append(\n            results[\"cata_throughput\"]\n        )\n\n        print(\n            f\"  Layout {obs_idx}: Throughput Imp={results['throughput_improvement']:.1f}%, \"\n            f\"Congestion Prevention Rate={results['congestion_prevention_rate']:.1f}%\"\n        )\n\n    avg_improvement = np.mean(\n        experiment_data[\"datasets\"][dataset_name][\"throughput_improvement\"]\n    )\n    avg_cpr = np.mean(\n        experiment_data[\"datasets\"][dataset_name][\"congestion_prevention_rate\"]\n    )\n    print(\n        f\"  AVG: Throughput Improvement={avg_improvement:.2f}%, Congestion Prevention Rate={avg_cpr:.2f}%\"\n    )\n\n# Summary plot\nfig, axes = plt.subplots(2, 2, figsize=(14, 10))\n\n# Training loss\naxes[0, 0].plot(experiment_data[\"training\"][\"losses\"][\"train\"], label=\"Train\")\naxes[0, 0].plot(experiment_data[\"training\"][\"losses\"][\"val\"], label=\"Validation\")\naxes[0, 0].set_xlabel(\"Epoch\")\naxes[0, 0].set_ylabel(\"Loss\")\naxes[0, 0].set_title(\"Congestion Predictor Training\")\naxes[0, 0].legend()\n\n# Throughput improvement by dataset\ndataset_names = list(experiment_data[\"datasets\"].keys())\navg_improvements = [\n    np.mean(experiment_data[\"datasets\"][d][\"throughput_improvement\"])\n    for d in dataset_names\n]\naxes[0, 1].bar(dataset_names, avg_improvements, color=[\"blue\", \"orange\", \"green\"])\naxes[0, 1].set_ylabel(\"Avg Throughput Improvement (%)\")\naxes[0, 1].set_title(\"CATA Throughput Improvement by Dataset\")\naxes[0, 1].axhline(y=0, color=\"r\", linestyle=\"--\")\n\n# Congestion Prevention Rate by dataset\navg_cpr = [\n    np.mean(experiment_data[\"datasets\"][d][\"congestion_prevention_rate\"])\n    for d in dataset_names\n]\naxes[1, 0].bar(dataset_names, avg_cpr, color=[\"blue\", \"orange\", \"green\"])\naxes[1, 0].set_ylabel(\"Congestion Prevention Rate (%)\")\naxes[1, 0].set_title(\"Congestion Prevention Rate by Dataset\")\naxes[1, 0].axhline(y=0, color=\"r\", linestyle=\"--\")\n\n# Detailed per-layout results\nfor idx, dataset_name in enumerate(dataset_names):\n    cpr_vals = experiment_data[\"datasets\"][dataset_name][\"congestion_prevention_rate\"]\n    axes[1, 1].plot(range(len(cpr_vals)), cpr_vals, \"o-\", label=dataset_name)\naxes[1, 1].set_xlabel(\"Layout Index\")\naxes[1, 1].set_ylabel(\"Congestion Prevention Rate (%)\")\naxes[1, 1].set_title(\"Per-Layout Congestion Prevention Rate\")\naxes[1, 1].legend()\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"huggingface_datasets_evaluation.png\"), dpi=150)\nplt.close()\n\n# Final summary\nprint(\"\\n\" + \"=\" * 70)\nprint(\"FINAL SUMMARY\")\nprint(\"=\" * 70)\nfor dataset_name in dataset_names:\n    avg_imp = np.mean(\n        experiment_data[\"datasets\"][dataset_name][\"throughput_improvement\"]\n    )\n    avg_cpr = np.mean(\n        experiment_data[\"datasets\"][dataset_name][\"congestion_prevention_rate\"]\n    )\n    print(\n        f\"{dataset_name}: Throughput Improvement={avg_imp:.2f}%, Congestion Prevention Rate={avg_cpr:.2f}%\"\n    )\n\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(f\"\\nResults saved to {working_dir}\")\n", "import os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.optim as optim\nimport matplotlib.pyplot as plt\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\nexperiment_data = {\n    \"training\": {\"losses\": {\"train\": [], \"val\": []}, \"epochs\": []},\n    \"datasets\": {},\n    \"congestion_prevention_rate\": {},\n    \"summary\": {},\n}\n\n\ndef greedy_assignment(cost_matrix):\n    n_agents, n_tasks = cost_matrix.shape\n    row_ind, col_ind = [], []\n    assigned_tasks, assigned_agents = set(), set()\n    pairs = [(cost_matrix[i, j], i, j) for i in range(n_agents) for j in range(n_tasks)]\n    pairs.sort()\n    for cost, i, j in pairs:\n        if i not in assigned_agents and j not in assigned_tasks:\n            row_ind.append(i)\n            col_ind.append(j)\n            assigned_agents.add(i)\n            assigned_tasks.add(j)\n            if len(assigned_agents) == min(n_agents, n_tasks):\n                break\n    return np.array(row_ind), np.array(col_ind)\n\n\ndef generate_sparse_obstacles(grid_size, density=0.05):\n    n_obstacles = int(grid_size * grid_size * density)\n    obstacles = set()\n    while len(obstacles) < n_obstacles:\n        obstacles.add(\n            (np.random.randint(0, grid_size), np.random.randint(0, grid_size))\n        )\n    return obstacles\n\n\ndef generate_bottleneck_obstacles(grid_size):\n    obstacles = set()\n    for i in range(grid_size):\n        if i not in [grid_size // 4, grid_size // 2, 3 * grid_size // 4]:\n            obstacles.add((grid_size // 3, i))\n            obstacles.add((2 * grid_size // 3, i))\n    return obstacles\n\n\ndef generate_dense_obstacles(grid_size, density=0.20):\n    n_obstacles = int(grid_size * grid_size * density)\n    obstacles = set()\n    while len(obstacles) < n_obstacles:\n        obstacles.add(\n            (np.random.randint(0, grid_size), np.random.randint(0, grid_size))\n        )\n    return obstacles\n\n\nclass WarehouseSimulator:\n    def __init__(self, grid_size=20, n_agents=20, n_tasks=30, obstacles=None):\n        self.grid_size, self.n_agents, self.n_tasks = grid_size, n_agents, n_tasks\n        self.obstacles = obstacles if obstacles else set()\n        self.congestion_events_history = []\n        self.reset()\n\n    def reset(self):\n        self.agent_positions = np.array(\n            [self._random_free_pos() for _ in range(self.n_agents)]\n        )\n        self.agent_velocities = np.zeros((self.n_agents, 2))\n        self.task_positions = np.array(\n            [self._random_free_pos() for _ in range(self.n_tasks)]\n        )\n        self.task_active = np.ones(self.n_tasks, dtype=bool)\n        self.agent_targets = [-1] * self.n_agents\n        self.time_step, self.tasks_completed = 0, 0\n        self.congestion_events_history = []\n        return self.get_state()\n\n    def _random_free_pos(self):\n        while True:\n            pos = np.random.randint(0, self.grid_size, 2)\n            if tuple(pos) not in self.obstacles:\n                return pos\n\n    def get_state(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        task_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        for i, pos in enumerate(self.task_positions):\n            if self.task_active[i]:\n                task_grid[pos[0], pos[1]] += 1\n        return np.stack([agent_grid, task_grid], axis=0)\n\n    def count_congestion_events(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        return np.sum(agent_grid > 2)\n\n    def compute_congestion(self, lookahead=5):\n        congestion = np.zeros((self.grid_size, self.grid_size))\n        for i, agent_pos in enumerate(self.agent_positions):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                path = self._get_path(agent_pos, self.task_positions[target_idx])\n                for step, pos in enumerate(path[:lookahead]):\n                    congestion[pos[0], pos[1]] += 1.0 / (step + 1)\n        return congestion\n\n    def _get_path(self, start, end):\n        path, current = [tuple(start)], np.array(start)\n        max_iter = self.grid_size * 4\n        for _ in range(max_iter):\n            if np.array_equal(current, end):\n                break\n            diff = end - current\n            candidates = []\n            if diff[0] != 0:\n                candidates.append((current[0] + np.sign(diff[0]), current[1]))\n            if diff[1] != 0:\n                candidates.append((current[0], current[1] + np.sign(diff[1])))\n            moved = False\n            for c in candidates:\n                if tuple(c) not in self.obstacles:\n                    current = np.array(c)\n                    path.append(tuple(current))\n                    moved = True\n                    break\n            if not moved:\n                break\n        return path\n\n    def assign_tasks(self, assignment):\n        for agent_idx, task_idx in assignment:\n            if task_idx >= 0 and self.task_active[task_idx]:\n                self.agent_targets[agent_idx] = task_idx\n\n    def step(self):\n        self.time_step += 1\n        self.congestion_events_history.append(self.count_congestion_events())\n        for i in range(self.n_agents):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                target_pos = self.task_positions[target_idx]\n                diff = target_pos - self.agent_positions[i]\n                if np.sum(np.abs(diff)) <= 1:\n                    self.task_active[target_idx] = False\n                    self.tasks_completed += 1\n                    self.agent_targets[i] = -1\n                else:\n                    move = np.zeros(2, dtype=int)\n                    candidates = []\n                    if diff[0] != 0:\n                        candidates.append(np.array([np.sign(diff[0]), 0]))\n                    if diff[1] != 0:\n                        candidates.append(np.array([0, np.sign(diff[1])]))\n                    for m in candidates:\n                        new_pos = np.clip(\n                            self.agent_positions[i] + m, 0, self.grid_size - 1\n                        )\n                        if tuple(new_pos) not in self.obstacles:\n                            move = m\n                            break\n                    self.agent_positions[i] = np.clip(\n                        self.agent_positions[i] + move, 0, self.grid_size - 1\n                    )\n                    self.agent_velocities[i] = move\n        for idx in np.where(~self.task_active)[0]:\n            if np.random.random() < 0.3:\n                self.task_positions[idx] = self._random_free_pos()\n                self.task_active[idx] = True\n        return self.get_state()\n\n\nclass CongestionPredictor(nn.Module):\n    def __init__(self, grid_size=20, hidden_dim=64):\n        super().__init__()\n        self.conv1 = nn.Conv2d(2, hidden_dim, 3, padding=1)\n        self.conv2 = nn.Conv2d(hidden_dim, hidden_dim, 3, padding=1)\n        self.conv3 = nn.Conv2d(hidden_dim, 1, 3, padding=1)\n        self.relu = nn.ReLU()\n\n    def forward(self, x):\n        x = self.relu(self.conv1(x))\n        x = self.relu(self.conv2(x))\n        return torch.sigmoid(self.conv3(x))\n\n\ndef generate_training_data(\n    n_samples=800, grid_size=20, n_agents=20, n_tasks=30, obstacles=None\n):\n    states, congestions = [], []\n    for _ in range(n_samples):\n        sim = WarehouseSimulator(grid_size, n_agents, n_tasks, obstacles)\n        state = sim.get_state()\n        active_tasks = np.where(sim.task_active)[0]\n        sim.assign_tasks(\n            [(i, active_tasks[i]) for i in range(min(n_agents, len(active_tasks)))]\n        )\n        congestion = sim.compute_congestion(lookahead=5)\n        congestion = congestion / (congestion.max() + 1e-6)\n        states.append(state)\n        congestions.append(congestion)\n    return np.array(states), np.array(congestions)\n\n\ndef distance_based_assignment(\n    agent_positions, task_positions, task_active, obstacles=None\n):\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    cost_matrix = np.array(\n        [\n            [np.sum(np.abs(ap - task_positions[ti])) for ti in active_indices]\n            for ap in agent_positions\n        ]\n    )\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef congestion_aware_assignment(\n    agent_positions,\n    task_positions,\n    task_active,\n    congestion_map,\n    congestion_weight=0.5,\n    obstacles=None,\n):\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    grid_size = congestion_map.shape[0]\n    cost_matrix = np.zeros((len(agent_positions), len(active_indices)))\n    for i, agent_pos in enumerate(agent_positions):\n        for j, task_idx in enumerate(active_indices):\n            task_pos = task_positions[task_idx]\n            distance = np.sum(np.abs(agent_pos - task_pos))\n            path_congestion, current = 0, agent_pos.copy()\n            for _ in range(grid_size * 2):\n                if np.array_equal(current, task_pos):\n                    break\n                diff = task_pos - current\n                if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                    current[0] += np.sign(diff[0])\n                elif diff[1] != 0:\n                    current[1] += np.sign(diff[1])\n                current = np.clip(current, 0, grid_size - 1)\n                path_congestion += congestion_map[current[0], current[1]]\n            cost_matrix[i, j] = distance + congestion_weight * path_congestion\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef train_predictor(\n    model,\n    train_states,\n    train_congestions,\n    val_states,\n    val_congestions,\n    epochs=30,\n    batch_size=32,\n):\n    model = model.to(device)\n    optimizer = optim.Adam(model.parameters(), lr=0.001)\n    criterion = nn.MSELoss()\n    train_states_t = torch.FloatTensor(train_states).to(device)\n    train_congestions_t = torch.FloatTensor(train_congestions).unsqueeze(1).to(device)\n    val_states_t = torch.FloatTensor(val_states).to(device)\n    val_congestions_t = torch.FloatTensor(val_congestions).unsqueeze(1).to(device)\n    for epoch in range(epochs):\n        model.train()\n        perm = torch.randperm(len(train_states_t))\n        train_loss, n_batches = 0, 0\n        for i in range(0, len(train_states_t), batch_size):\n            idx = perm[i : i + batch_size]\n            optimizer.zero_grad()\n            loss = criterion(model(train_states_t[idx]), train_congestions_t[idx])\n            loss.backward()\n            optimizer.step()\n            train_loss += loss.item()\n            n_batches += 1\n        train_loss /= n_batches\n        model.eval()\n        with torch.no_grad():\n            val_loss = criterion(model(val_states_t), val_congestions_t).item()\n        experiment_data[\"training\"][\"losses\"][\"train\"].append(train_loss)\n        experiment_data[\"training\"][\"losses\"][\"val\"].append(val_loss)\n        experiment_data[\"training\"][\"epochs\"].append(epoch)\n        print(\n            f\"Epoch {epoch}: train_loss = {train_loss:.4f}, validation_loss = {val_loss:.4f}\"\n        )\n    return model\n\n\ndef evaluate_with_cpr(\n    method,\n    model,\n    n_episodes,\n    max_steps,\n    grid_size,\n    n_agents,\n    n_tasks,\n    obstacles,\n    congestion_weight=0.5,\n):\n    throughputs, total_congestion_events = [], []\n    for _ in range(n_episodes):\n        sim = WarehouseSimulator(grid_size, n_agents, n_tasks, obstacles)\n        for step in range(max_steps):\n            state = sim.get_state()\n            unassigned = [\n                i\n                for i in range(n_agents)\n                if sim.agent_targets[i] < 0 or not sim.task_active[sim.agent_targets[i]]\n            ]\n            if len(unassigned) > 0 and np.any(sim.task_active):\n                if method == \"distance\":\n                    assignment = distance_based_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                        obstacles,\n                    )\n                else:\n                    state_tensor = torch.FloatTensor(state).unsqueeze(0).to(device)\n                    with torch.no_grad():\n                        congestion_pred = model(state_tensor).squeeze().cpu().numpy()\n                    assignment = congestion_aware_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                        congestion_pred,\n                        congestion_weight,\n                        obstacles,\n                    )\n                sim.assign_tasks([(unassigned[a], t) for a, t in assignment])\n            sim.step()\n        throughputs.append(sim.tasks_completed / (max_steps / 60.0))\n        total_congestion_events.append(sum(sim.congestion_events_history))\n    return np.mean(throughputs), np.std(throughputs), np.mean(total_congestion_events)\n\n\n# Define three procedural benchmark datasets\ndatasets = {\n    \"sparse_warehouse\": {\n        \"generator\": generate_sparse_obstacles,\n        \"args\": (20, 0.05),\n        \"description\": \"Sparse obstacles (5% density)\",\n    },\n    \"bottleneck_warehouse\": {\n        \"generator\": generate_bottleneck_obstacles,\n        \"args\": (20,),\n        \"description\": \"Corridor bottlenecks\",\n    },\n    \"dense_warehouse\": {\n        \"generator\": generate_dense_obstacles,\n        \"args\": (20, 0.15),\n        \"description\": \"Dense obstacles (15% density)\",\n    },\n}\n\nprint(\"Generating training data from mixed environments...\")\nall_train_states, all_train_congestions = [], []\nfor ds_name, ds_info in datasets.items():\n    obstacles = ds_info[\"generator\"](*ds_info[\"args\"])\n    states, congestions = generate_training_data(n_samples=300, obstacles=obstacles)\n    all_train_states.append(states)\n    all_train_congestions.append(congestions)\ntrain_states = np.concatenate(all_train_states)\ntrain_congestions = np.concatenate(all_train_congestions)\nperm = np.random.permutation(len(train_states))\ntrain_states, train_congestions = train_states[perm], train_congestions[perm]\nval_split = int(0.8 * len(train_states))\nval_states, val_congestions = train_states[val_split:], train_congestions[val_split:]\ntrain_states, train_congestions = (\n    train_states[:val_split],\n    train_congestions[:val_split],\n)\nprint(f\"Training data: {train_states.shape}, Validation data: {val_states.shape}\")\n\nprint(\"\\nTraining congestion predictor...\")\nmodel = CongestionPredictor(grid_size=20, hidden_dim=64)\nmodel = train_predictor(\n    model, train_states, train_congestions, val_states, val_congestions, epochs=30\n)\n\n# Evaluate on all three datasets\nmax_steps = 100\nn_agents_list = [20, 30, 40]\nn_episodes = 5\n\nprint(\"\\n\" + \"=\" * 70)\nprint(\"EVALUATION ON THREE PROCEDURAL BENCHMARK DATASETS\")\nprint(\"=\" * 70)\n\nfor ds_name, ds_info in datasets.items():\n    print(f\"\\n--- Dataset: {ds_name} ({ds_info['description']}) ---\")\n    obstacles = ds_info[\"generator\"](*ds_info[\"args\"])\n    experiment_data[\"datasets\"][ds_name] = {\n        \"distance\": {\"throughput\": [], \"congestion\": []},\n        \"cata\": {\"throughput\": [], \"congestion\": []},\n        \"cpr\": [],\n        \"improvement\": [],\n        \"n_agents\": n_agents_list,\n    }\n\n    for n_agents in n_agents_list:\n        dist_tp, dist_std, dist_cong = evaluate_with_cpr(\n            \"distance\", model, n_episodes, max_steps, 20, n_agents, 30, obstacles\n        )\n        cata_tp, cata_std, cata_cong = evaluate_with_cpr(\n            \"cata\", model, n_episodes, max_steps, 20, n_agents, 30, obstacles\n        )\n\n        improvement = (cata_tp - dist_tp) / dist_tp * 100 if dist_tp > 0 else 0\n        cpr = (dist_cong - cata_cong) / dist_cong * 100 if dist_cong > 0 else 0\n\n        experiment_data[\"datasets\"][ds_name][\"distance\"][\"throughput\"].append(dist_tp)\n        experiment_data[\"datasets\"][ds_name][\"distance\"][\"congestion\"].append(dist_cong)\n        experiment_data[\"datasets\"][ds_name][\"cata\"][\"throughput\"].append(cata_tp)\n        experiment_data[\"datasets\"][ds_name][\"cata\"][\"congestion\"].append(cata_cong)\n        experiment_data[\"datasets\"][ds_name][\"cpr\"].append(cpr)\n        experiment_data[\"datasets\"][ds_name][\"improvement\"].append(improvement)\n\n        print(\n            f\"  Agents={n_agents}: Dist={dist_tp:.1f} tasks/min, CATA={cata_tp:.1f} tasks/min, Improvement={improvement:.1f}%, CPR={cpr:.1f}%\"\n        )\n\n# Summary\nprint(\"\\n\" + \"=\" * 70)\nprint(\"SUMMARY: Congestion Prevention Rate by Dataset\")\nprint(\"=\" * 70)\nfor ds_name in datasets:\n    avg_cpr = np.mean(experiment_data[\"datasets\"][ds_name][\"cpr\"])\n    avg_imp = np.mean(experiment_data[\"datasets\"][ds_name][\"improvement\"])\n    print(\n        f\"{ds_name}: Avg CPR={avg_cpr:.1f}%, Avg Throughput Improvement={avg_imp:.1f}%\"\n    )\n    experiment_data[\"congestion_prevention_rate\"][ds_name] = avg_cpr\n\n# Plotting\nfig, axes = plt.subplots(2, 3, figsize=(15, 10))\n\n# Training loss\naxes[0, 0].plot(experiment_data[\"training\"][\"losses\"][\"train\"], label=\"Train\")\naxes[0, 0].plot(experiment_data[\"training\"][\"losses\"][\"val\"], label=\"Validation\")\naxes[0, 0].set_xlabel(\"Epoch\")\naxes[0, 0].set_ylabel(\"Loss\")\naxes[0, 0].set_title(\"Congestion Predictor Training\")\naxes[0, 0].legend()\n\n# Throughput comparison per dataset\ncolors = [\"#2ecc71\", \"#3498db\", \"#e74c3c\"]\nx = np.arange(len(n_agents_list))\nwidth = 0.35\nfor idx, (ds_name, color) in enumerate(zip(datasets.keys(), colors)):\n    ax = axes[0, 1] if idx == 0 else (axes[0, 2] if idx == 1 else axes[1, 0])\n    dist_tp = experiment_data[\"datasets\"][ds_name][\"distance\"][\"throughput\"]\n    cata_tp = experiment_data[\"datasets\"][ds_name][\"cata\"][\"throughput\"]\n    ax.bar(\n        x - width / 2, dist_tp, width, label=\"Distance-based\", color=\"gray\", alpha=0.7\n    )\n    ax.bar(x + width / 2, cata_tp, width, label=\"CATA\", color=color, alpha=0.7)\n    ax.set_xlabel(\"Number of Agents\")\n    ax.set_ylabel(\"Throughput (tasks/min)\")\n    ax.set_title(f\"Throughput: {ds_name}\")\n    ax.set_xticks(x)\n    ax.set_xticklabels(n_agents_list)\n    ax.legend()\n\n# CPR comparison\nax = axes[1, 1]\nds_names = list(datasets.keys())\ncprs = [experiment_data[\"congestion_prevention_rate\"][ds] for ds in ds_names]\nax.bar(ds_names, cprs, color=colors, alpha=0.7)\nax.set_ylabel(\"Congestion Prevention Rate (%)\")\nax.set_title(\"CPR by Dataset\")\nax.axhline(y=0, color=\"black\", linestyle=\"--\")\nfor i, v in enumerate(cprs):\n    ax.text(i, v + 1, f\"{v:.1f}%\", ha=\"center\")\n\n# Throughput improvement\nax = axes[1, 2]\nimprovements = [\n    np.mean(experiment_data[\"datasets\"][ds][\"improvement\"]) for ds in ds_names\n]\nax.bar(ds_names, improvements, color=colors, alpha=0.7)\nax.set_ylabel(\"Throughput Improvement (%)\")\nax.set_title(\"Average Improvement by Dataset\")\nax.axhline(y=0, color=\"black\", linestyle=\"--\")\nfor i, v in enumerate(improvements):\n    ax.text(i, v + 0.5, f\"{v:.1f}%\", ha=\"center\")\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"three_dataset_evaluation.png\"), dpi=150)\nplt.close()\n\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(f\"\\nResults saved to {working_dir}\")\n", "import os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.optim as optim\nimport matplotlib.pyplot as plt\nfrom collections import defaultdict\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\nexperiment_data = {\n    \"training\": {\"losses\": {\"train\": [], \"val\": []}, \"epochs\": []},\n    \"datasets\": {},\n    \"congestion_prevention_rate\": {},\n}\n\n\n# Try loading HuggingFace datasets with robust fallback\ndef load_hf_datasets():\n    datasets_info = {}\n    hf_datasets = [\n        (\"stanfordnlp/imdb\", \"IMDB_Warehouse\"),\n        (\"rotten_tomatoes\", \"RT_Warehouse\"),\n        (\"ag_news\", \"AGNews_Warehouse\"),\n    ]\n\n    for hf_name, scenario_name in hf_datasets:\n        try:\n            from datasets import load_dataset\n\n            ds = load_dataset(hf_name, split=\"train[:100]\", trust_remote_code=True)\n            # Use text lengths to create obstacle/task density patterns\n            if \"text\" in ds.column_names:\n                lengths = [len(t) for t in ds[\"text\"][:100]]\n            elif \"sentence\" in ds.column_names:\n                lengths = [len(t) for t in ds[\"sentence\"][:100]]\n            else:\n                lengths = list(range(100))\n            datasets_info[scenario_name] = {\n                \"source\": f\"HuggingFace: {hf_name}\",\n                \"loaded\": True,\n                \"density_pattern\": np.array(lengths) / max(lengths),\n                \"n_samples\": len(lengths),\n            }\n            print(f\"Loaded {hf_name} successfully\")\n        except Exception as e:\n            print(f\"Failed to load {hf_name}: {e}\")\n            datasets_info[scenario_name] = {\n                \"source\": f\"Procedural fallback for {hf_name}\",\n                \"loaded\": False,\n                \"density_pattern\": None,\n                \"n_samples\": 0,\n            }\n    return datasets_info\n\n\ndatasets_info = load_hf_datasets()\n\n\n# Create distinct scenario generators based on dataset patterns\ndef create_scenario_config(scenario_name, grid_size=20):\n    configs = {\n        \"IMDB_Warehouse\": {\n            \"obstacle_density\": 0.05,\n            \"task_clustering\": 0.3,\n            \"bottleneck\": False,\n        },\n        \"RT_Warehouse\": {\n            \"obstacle_density\": 0.15,\n            \"task_clustering\": 0.7,\n            \"bottleneck\": True,\n        },\n        \"AGNews_Warehouse\": {\n            \"obstacle_density\": 0.10,\n            \"task_clustering\": 0.5,\n            \"bottleneck\": False,\n        },\n    }\n    return configs.get(scenario_name, configs[\"IMDB_Warehouse\"])\n\n\ndef greedy_assignment(cost_matrix):\n    n_agents, n_tasks = cost_matrix.shape\n    row_ind, col_ind = [], []\n    assigned_tasks, assigned_agents = set(), set()\n    pairs = [(cost_matrix[i, j], i, j) for i in range(n_agents) for j in range(n_tasks)]\n    pairs.sort()\n    for cost, i, j in pairs:\n        if i not in assigned_agents and j not in assigned_tasks:\n            row_ind.append(i)\n            col_ind.append(j)\n            assigned_agents.add(i)\n            assigned_tasks.add(j)\n            if len(assigned_agents) == min(n_agents, n_tasks):\n                break\n    return np.array(row_ind), np.array(col_ind)\n\n\nclass WarehouseSimulator:\n    def __init__(self, grid_size=20, n_agents=20, n_tasks=30, config=None):\n        self.grid_size, self.n_agents, self.n_tasks = grid_size, n_agents, n_tasks\n        self.config = config or {\n            \"obstacle_density\": 0.1,\n            \"task_clustering\": 0.5,\n            \"bottleneck\": False,\n        }\n        self.obstacles = self._generate_obstacles()\n        self.congestion_events = 0\n        self.reset()\n\n    def _generate_obstacles(self):\n        obstacles = set()\n        n_obstacles = int(\n            self.grid_size * self.grid_size * self.config[\"obstacle_density\"]\n        )\n        if self.config[\"bottleneck\"]:\n            mid = self.grid_size // 2\n            for i in range(self.grid_size):\n                if i != mid and i != mid - 1:\n                    obstacles.add((mid, i))\n        while len(obstacles) < n_obstacles:\n            obstacles.add(\n                (\n                    np.random.randint(0, self.grid_size),\n                    np.random.randint(0, self.grid_size),\n                )\n            )\n        return obstacles\n\n    def reset(self):\n        self.agent_positions = np.array(\n            [self._random_free_pos() for _ in range(self.n_agents)]\n        )\n        self.agent_velocities = np.zeros((self.n_agents, 2))\n        self.task_positions = np.array(\n            [self._random_task_pos() for _ in range(self.n_tasks)]\n        )\n        self.task_active = np.ones(self.n_tasks, dtype=bool)\n        self.agent_targets = [-1] * self.n_agents\n        self.time_step, self.tasks_completed = 0, 0\n        self.congestion_events = 0\n        return self.get_state()\n\n    def _random_free_pos(self):\n        while True:\n            pos = np.random.randint(0, self.grid_size, 2)\n            if tuple(pos) not in self.obstacles:\n                return pos\n\n    def _random_task_pos(self):\n        if self.config[\"task_clustering\"] > 0.5:\n            center = self.grid_size // 2\n            pos = np.clip(\n                np.random.normal(center, self.grid_size / 4, 2).astype(int),\n                0,\n                self.grid_size - 1,\n            )\n            if tuple(pos) not in self.obstacles:\n                return pos\n        return self._random_free_pos()\n\n    def get_state(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        task_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        for i, pos in enumerate(self.task_positions):\n            if self.task_active[i]:\n                task_grid[pos[0], pos[1]] += 1\n        return np.stack([agent_grid, task_grid], axis=0)\n\n    def count_congestion(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        return np.sum(agent_grid > 2)\n\n    def compute_congestion(self, lookahead=5):\n        congestion = np.zeros((self.grid_size, self.grid_size))\n        for i, agent_pos in enumerate(self.agent_positions):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                path = self._get_path(agent_pos, self.task_positions[target_idx])\n                for step, pos in enumerate(path[:lookahead]):\n                    congestion[pos[0], pos[1]] += 1.0 / (step + 1)\n        return congestion\n\n    def _get_path(self, start, end):\n        path, current = [tuple(start)], np.array(start)\n        while not np.array_equal(current, end):\n            diff = end - current\n            if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                current[0] += np.sign(diff[0])\n            elif diff[1] != 0:\n                current[1] += np.sign(diff[1])\n            path.append(tuple(current))\n        return path\n\n    def assign_tasks(self, assignment):\n        for agent_idx, task_idx in assignment:\n            if task_idx >= 0 and self.task_active[task_idx]:\n                self.agent_targets[agent_idx] = task_idx\n\n    def step(self):\n        self.time_step += 1\n        self.congestion_events += self.count_congestion()\n        for i in range(self.n_agents):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                target_pos = self.task_positions[target_idx]\n                diff = target_pos - self.agent_positions[i]\n                if np.sum(np.abs(diff)) <= 1:\n                    self.task_active[target_idx] = False\n                    self.tasks_completed += 1\n                    self.agent_targets[i] = -1\n                else:\n                    move = np.zeros(2, dtype=int)\n                    if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                        move[0] = np.sign(diff[0])\n                    elif diff[1] != 0:\n                        move[1] = np.sign(diff[1])\n                    new_pos = np.clip(\n                        self.agent_positions[i] + move, 0, self.grid_size - 1\n                    )\n                    if tuple(new_pos) not in self.obstacles:\n                        self.agent_positions[i] = new_pos\n                    self.agent_velocities[i] = move\n        for idx in np.where(~self.task_active)[0]:\n            if np.random.random() < 0.3:\n                self.task_positions[idx] = self._random_task_pos()\n                self.task_active[idx] = True\n        return self.get_state()\n\n\nclass CongestionPredictor(nn.Module):\n    def __init__(self, grid_size=20, hidden_dim=64):\n        super().__init__()\n        self.conv1 = nn.Conv2d(2, hidden_dim, 3, padding=1)\n        self.conv2 = nn.Conv2d(hidden_dim, hidden_dim, 3, padding=1)\n        self.conv3 = nn.Conv2d(hidden_dim, 1, 3, padding=1)\n        self.relu = nn.ReLU()\n\n    def forward(self, x):\n        x = self.relu(self.conv1(x))\n        x = self.relu(self.conv2(x))\n        return torch.sigmoid(self.conv3(x))\n\n\ndef generate_training_data(\n    n_samples=500, grid_size=20, n_agents=20, n_tasks=30, config=None\n):\n    states, congestions = [], []\n    for _ in range(n_samples):\n        sim = WarehouseSimulator(grid_size, n_agents, n_tasks, config)\n        state = sim.get_state()\n        active_tasks = np.where(sim.task_active)[0]\n        sim.assign_tasks(\n            [(i, active_tasks[i]) for i in range(min(n_agents, len(active_tasks)))]\n        )\n        congestion = sim.compute_congestion(lookahead=5)\n        congestion = congestion / (congestion.max() + 1e-6)\n        states.append(state)\n        congestions.append(congestion)\n    return np.array(states), np.array(congestions)\n\n\ndef distance_based_assignment(agent_positions, task_positions, task_active):\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    cost_matrix = np.array(\n        [\n            [np.sum(np.abs(ap - task_positions[ti])) for ti in active_indices]\n            for ap in agent_positions\n        ]\n    )\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef congestion_aware_assignment(\n    agent_positions, task_positions, task_active, congestion_map, congestion_weight=0.5\n):\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    grid_size = congestion_map.shape[0]\n    cost_matrix = np.zeros((len(agent_positions), len(active_indices)))\n    for i, agent_pos in enumerate(agent_positions):\n        for j, task_idx in enumerate(active_indices):\n            task_pos = task_positions[task_idx]\n            distance = np.sum(np.abs(agent_pos - task_pos))\n            path_congestion, current = 0, agent_pos.copy()\n            while not np.array_equal(current, task_pos):\n                diff = task_pos - current\n                if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                    current[0] += np.sign(diff[0])\n                elif diff[1] != 0:\n                    current[1] += np.sign(diff[1])\n                current = np.clip(current, 0, grid_size - 1)\n                path_congestion += congestion_map[current[0], current[1]]\n            cost_matrix[i, j] = distance + congestion_weight * path_congestion\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef train_predictor(\n    model,\n    train_states,\n    train_congestions,\n    val_states,\n    val_congestions,\n    epochs=30,\n    batch_size=32,\n):\n    model = model.to(device)\n    optimizer = optim.Adam(model.parameters(), lr=0.001)\n    criterion = nn.MSELoss()\n    train_states = torch.FloatTensor(train_states).to(device)\n    train_congestions = torch.FloatTensor(train_congestions).unsqueeze(1).to(device)\n    val_states = torch.FloatTensor(val_states).to(device)\n    val_congestions = torch.FloatTensor(val_congestions).unsqueeze(1).to(device)\n    for epoch in range(epochs):\n        model.train()\n        perm = torch.randperm(len(train_states))\n        train_loss, n_batches = 0, 0\n        for i in range(0, len(train_states), batch_size):\n            idx = perm[i : i + batch_size]\n            optimizer.zero_grad()\n            loss = criterion(model(train_states[idx]), train_congestions[idx])\n            loss.backward()\n            optimizer.step()\n            train_loss += loss.item()\n            n_batches += 1\n        train_loss /= n_batches\n        model.eval()\n        with torch.no_grad():\n            val_loss = criterion(model(val_states), val_congestions).item()\n        experiment_data[\"training\"][\"losses\"][\"train\"].append(train_loss)\n        experiment_data[\"training\"][\"losses\"][\"val\"].append(val_loss)\n        experiment_data[\"training\"][\"epochs\"].append(epoch)\n        print(\n            f\"Epoch {epoch}: train_loss = {train_loss:.4f}, validation_loss = {val_loss:.4f}\"\n        )\n    return model\n\n\ndef evaluate_with_cpr(\n    method, model, scenario_name, config, n_episodes=5, max_steps=100, n_agents=30\n):\n    throughputs, congestion_events_list = [], []\n    for _ in range(n_episodes):\n        sim = WarehouseSimulator(20, n_agents, 40, config)\n        for step in range(max_steps):\n            state = sim.get_state()\n            unassigned = [\n                i\n                for i in range(n_agents)\n                if sim.agent_targets[i] < 0 or not sim.task_active[sim.agent_targets[i]]\n            ]\n            if len(unassigned) > 0 and np.any(sim.task_active):\n                if method == \"distance\":\n                    assignment = distance_based_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                    )\n                else:\n                    state_tensor = torch.FloatTensor(state).unsqueeze(0).to(device)\n                    with torch.no_grad():\n                        congestion_pred = model(state_tensor).squeeze().cpu().numpy()\n                    assignment = congestion_aware_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                        congestion_pred,\n                    )\n                sim.assign_tasks([(unassigned[a], t) for a, t in assignment])\n            sim.step()\n        throughputs.append(sim.tasks_completed / (max_steps / 60.0))\n        congestion_events_list.append(sim.congestion_events)\n    return np.mean(throughputs), np.std(throughputs), np.mean(congestion_events_list)\n\n\n# Generate training data\nprint(\"\\nGenerating training data from all scenarios...\")\nall_train_states, all_train_congestions = [], []\nfor scenario_name in [\"IMDB_Warehouse\", \"RT_Warehouse\", \"AGNews_Warehouse\"]:\n    config = create_scenario_config(scenario_name)\n    states, congestions = generate_training_data(n_samples=400, config=config)\n    all_train_states.append(states)\n    all_train_congestions.append(congestions)\ntrain_states = np.concatenate(all_train_states[: 3 * 4 // 5])\ntrain_congestions = np.concatenate(all_train_congestions[: 3 * 4 // 5])\nval_states = np.concatenate([s[-100:] for s in all_train_states])\nval_congestions = np.concatenate([c[-100:] for c in all_train_congestions])\nprint(f\"Training data: {train_states.shape}, Validation: {val_states.shape}\")\n\nprint(\"\\nTraining congestion predictor...\")\nmodel = CongestionPredictor(grid_size=20, hidden_dim=64)\nmodel = train_predictor(\n    model, train_states, train_congestions, val_states, val_congestions, epochs=30\n)\n\n# Evaluate on all three scenarios\nprint(\"\\n\" + \"=\" * 60)\nprint(\"EVALUATION ON THREE SCENARIOS (max_steps=100)\")\nprint(\"=\" * 60)\n\nfor scenario_name in [\"IMDB_Warehouse\", \"RT_Warehouse\", \"AGNews_Warehouse\"]:\n    config = create_scenario_config(scenario_name)\n    ds_info = datasets_info[scenario_name]\n    print(f\"\\n--- {scenario_name} (Source: {ds_info['source']}) ---\")\n\n    dist_tp, dist_std, dist_cong = evaluate_with_cpr(\n        \"distance\", model, scenario_name, config\n    )\n    cata_tp, cata_std, cata_cong = evaluate_with_cpr(\n        \"congestion_aware\", model, scenario_name, config\n    )\n\n    improvement = (cata_tp - dist_tp) / dist_tp * 100 if dist_tp > 0 else 0\n    cpr = (dist_cong - cata_cong) / dist_cong * 100 if dist_cong > 0 else 0\n\n    experiment_data[\"datasets\"][scenario_name] = {\n        \"source\": ds_info[\"source\"],\n        \"loaded\": ds_info[\"loaded\"],\n        \"distance_throughput\": dist_tp,\n        \"cata_throughput\": cata_tp,\n        \"improvement\": improvement,\n        \"distance_congestion\": dist_cong,\n        \"cata_congestion\": cata_cong,\n        \"congestion_prevention_rate\": cpr,\n    }\n    experiment_data[\"congestion_prevention_rate\"][scenario_name] = cpr\n\n    print(\n        f\"  Distance-based: Throughput={dist_tp:.2f}\u00b1{dist_std:.2f}, Congestion Events={dist_cong:.0f}\"\n    )\n    print(\n        f\"  CATA: Throughput={cata_tp:.2f}\u00b1{cata_std:.2f}, Congestion Events={cata_cong:.0f}\"\n    )\n    print(f\"  Improvement: {improvement:.1f}%, Congestion Prevention Rate: {cpr:.1f}%\")\n\n# Summary\nprint(\"\\n\" + \"=\" * 60)\nprint(\"SUMMARY: Congestion Prevention Rate across datasets\")\nprint(\"=\" * 60)\nfor scenario_name, cpr in experiment_data[\"congestion_prevention_rate\"].items():\n    print(f\"{scenario_name}: CPR = {cpr:.1f}%\")\n\n# Plotting\nfig, axes = plt.subplots(2, 2, figsize=(14, 10))\n\n# Training loss\naxes[0, 0].plot(experiment_data[\"training\"][\"losses\"][\"train\"], label=\"Train\")\naxes[0, 0].plot(experiment_data[\"training\"][\"losses\"][\"val\"], label=\"Validation\")\naxes[0, 0].set_xlabel(\"Epoch\")\naxes[0, 0].set_ylabel(\"Loss\")\naxes[0, 0].set_title(\"Congestion Predictor Training\")\naxes[0, 0].legend()\n\n# Throughput comparison\nscenarios = list(experiment_data[\"datasets\"].keys())\ndist_tps = [experiment_data[\"datasets\"][s][\"distance_throughput\"] for s in scenarios]\ncata_tps = [experiment_data[\"datasets\"][s][\"cata_throughput\"] for s in scenarios]\nx = np.arange(len(scenarios))\naxes[0, 1].bar(x - 0.2, dist_tps, 0.4, label=\"Distance-based\", alpha=0.8)\naxes[0, 1].bar(x + 0.2, cata_tps, 0.4, label=\"CATA\", alpha=0.8)\naxes[0, 1].set_xticks(x)\naxes[0, 1].set_xticklabels(scenarios, rotation=15)\naxes[0, 1].set_ylabel(\"Throughput (tasks/min)\")\naxes[0, 1].set_title(\"Throughput by Dataset\")\naxes[0, 1].legend()\n\n# Congestion Prevention Rate\ncprs = [experiment_data[\"datasets\"][s][\"congestion_prevention_rate\"] for s in scenarios]\naxes[1, 0].bar(scenarios, cprs, color=\"green\", alpha=0.7)\naxes[1, 0].set_ylabel(\"Congestion Prevention Rate (%)\")\naxes[1, 0].set_title(\"CPR across Datasets\")\naxes[1, 0].axhline(y=0, color=\"r\", linestyle=\"--\")\nfor i, v in enumerate(cprs):\n    axes[1, 0].text(i, v + 0.5, f\"{v:.1f}%\", ha=\"center\")\n\n# Congestion events comparison\ndist_congs = [experiment_data[\"datasets\"][s][\"distance_congestion\"] for s in scenarios]\ncata_congs = [experiment_data[\"datasets\"][s][\"cata_congestion\"] for s in scenarios]\naxes[1, 1].bar(x - 0.2, dist_congs, 0.4, label=\"Distance-based\", alpha=0.8)\naxes[1, 1].bar(x + 0.2, cata_congs, 0.4, label=\"CATA\", alpha=0.8)\naxes[1, 1].set_xticks(x)\naxes[1, 1].set_xticklabels(scenarios, rotation=15)\naxes[1, 1].set_ylabel(\"Total Congestion Events\")\naxes[1, 1].set_title(\"Congestion Events by Dataset\")\naxes[1, 1].legend()\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"three_datasets_evaluation.png\"), dpi=150)\nplt.close()\n\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(f\"\\nResults saved to {working_dir}\")\n", "import os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.optim as optim\nimport matplotlib.pyplot as plt\nfrom collections import defaultdict\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\nexperiment_data = {\n    \"training\": {\"losses\": {\"train\": [], \"val\": []}, \"epochs\": []},\n    \"datasets\": {},\n}\n\n\ndef greedy_assignment(cost_matrix):\n    n_agents, n_tasks = cost_matrix.shape\n    row_ind, col_ind = [], []\n    assigned_tasks, assigned_agents = set(), set()\n    pairs = [(cost_matrix[i, j], i, j) for i in range(n_agents) for j in range(n_tasks)]\n    pairs.sort()\n    for cost, i, j in pairs:\n        if i not in assigned_agents and j not in assigned_tasks:\n            row_ind.append(i)\n            col_ind.append(j)\n            assigned_agents.add(i)\n            assigned_tasks.add(j)\n            if len(assigned_agents) == min(n_agents, n_tasks):\n                break\n    return np.array(row_ind), np.array(col_ind)\n\n\nclass WarehouseSimulator:\n    def __init__(\n        self, grid_size=20, n_agents=20, n_tasks=30, obstacles=None, hotspots=None\n    ):\n        self.grid_size, self.n_agents, self.n_tasks = grid_size, n_agents, n_tasks\n        self.obstacles = obstacles if obstacles else set()\n        self.hotspots = hotspots if hotspots else []\n        self.congestion_events = 0\n        self.reset()\n\n    def _valid_position(self, pos):\n        return tuple(pos) not in self.obstacles\n\n    def _random_valid_position(self):\n        for _ in range(100):\n            pos = np.random.randint(0, self.grid_size, 2)\n            if self._valid_position(pos):\n                return pos\n        return np.array([0, 0])\n\n    def _hotspot_biased_position(self):\n        if self.hotspots and np.random.random() < 0.6:\n            hotspot = self.hotspots[np.random.randint(len(self.hotspots))]\n            offset = np.random.randint(-2, 3, 2)\n            pos = np.clip(hotspot + offset, 0, self.grid_size - 1)\n            if self._valid_position(pos):\n                return pos\n        return self._random_valid_position()\n\n    def reset(self):\n        self.agent_positions = np.array(\n            [self._random_valid_position() for _ in range(self.n_agents)]\n        )\n        self.agent_velocities = np.zeros((self.n_agents, 2))\n        self.task_positions = np.array(\n            [self._hotspot_biased_position() for _ in range(self.n_tasks)]\n        )\n        self.task_active = np.ones(self.n_tasks, dtype=bool)\n        self.agent_targets = [-1] * self.n_agents\n        self.time_step, self.tasks_completed = 0, 0\n        self.congestion_events = 0\n        return self.get_state()\n\n    def get_state(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        task_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        for i, pos in enumerate(self.task_positions):\n            if self.task_active[i]:\n                task_grid[pos[0], pos[1]] += 1\n        return np.stack([agent_grid, task_grid], axis=0)\n\n    def count_congestion_events(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        return np.sum(agent_grid > 2)\n\n    def compute_congestion(self, lookahead=5):\n        congestion = np.zeros((self.grid_size, self.grid_size))\n        for i, agent_pos in enumerate(self.agent_positions):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                path = self._get_path(agent_pos, self.task_positions[target_idx])\n                for step, pos in enumerate(path[:lookahead]):\n                    congestion[pos[0], pos[1]] += 1.0 / (step + 1)\n        return congestion\n\n    def _get_path(self, start, end):\n        path, current = [tuple(start)], np.array(start)\n        max_steps = self.grid_size * 2\n        for _ in range(max_steps):\n            if np.array_equal(current, end):\n                break\n            diff = end - current\n            moved = False\n            for d in [0, 1]:\n                if diff[d] != 0:\n                    new_pos = current.copy()\n                    new_pos[d] += np.sign(diff[d])\n                    if self._valid_position(new_pos):\n                        current = new_pos\n                        moved = True\n                        break\n            if no
