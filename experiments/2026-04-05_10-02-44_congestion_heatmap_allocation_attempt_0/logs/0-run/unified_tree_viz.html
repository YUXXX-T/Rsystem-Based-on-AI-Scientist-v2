      if (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost') {
          let lastModified = '';

          // Check for file changes every second
          setInterval(async () => {
              try {
                  const response = await fetch(window.location.href, { method: 'HEAD' });
                  // get a timestamp that shows when the file was last changed
                  const currentModified = response.headers.get('last-modified');

                  if (lastModified && lastModified !== currentModified) {
                      window.location.reload();
                  }

                  lastModified = currentModified;
              } catch (e) {
                  console.error('Error checking for updates:', e);
              }
          }, 1000);
      }

      const bgCol = "#FFFFFF";
const accentCol = "#1a439e";

hljs.initHighlightingOnLoad();

// Function to update background color globally
function updateBackgroundColor(color) {
  // Update the JS variable
  window.bgColCurrent = color;

  // Update body background
  document.body.style.backgroundColor = color;

  // Update canvas container background
  const canvasContainer = document.getElementById('canvas-container');
  if (canvasContainer) {
    canvasContainer.style.backgroundColor = color;
  }
}

// Store tree data for each stage
const stageData = {
  Stage_1: null,
  Stage_2: null,
  Stage_3: null,
  Stage_4: null
};

// Keep track of current selected stage
let currentStage = null;
let currentSketch = null;
let availableStages = [];

// Class definitions for nodes and edges
class Node {
  constructor(x, y, id, isRoot = false) {
    this.x = x;
    this.y = y;
    this.id = id;
    this.visible = isRoot; // Only root nodes are visible initially
    this.appearProgress = 0;
    this.popEffect = 0;
    this.selected = false;
    this.isRootNode = isRoot;
  }

  update() {
    if (this.visible) {
      // Handle the main appearance animation
      if (this.appearProgress < 1) {
        this.appearProgress += 0.06;

        // When we reach full size, trigger the pop effect
        if (this.appearProgress >= 1) {
          this.appearProgress = 1; // Cap at 1
          this.popEffect = 1; // Start the pop effect
        }
      }

      // Handle the pop effect animation
      if (this.popEffect > 0) {
        this.popEffect -= 0.15; // Control how quickly it shrinks back
        if (this.popEffect < 0) this.popEffect = 0; // Don't go negative
      }
    }
  }

  startAnimation() {
    this.visible = true;
  }

  color() {
    if (this.selected) {
      return accentCol; // Use the global accent color variable for selected node
    }
    return '#4263eb'; // Default blue color
  }

  render(p5) {
    if (this.visible) {
      const popBonus = this.popEffect * 0.1;
      const nodeScale = p5.map(this.appearProgress, 0, 1, 0, 1) + popBonus;
      const alpha = p5.map(this.appearProgress, 0, 1, 0, 255);

      p5.push();
      p5.translate(this.x, this.y);

      // Shadow effect
      p5.noStroke();
      p5.rectMode(p5.CENTER);

      for (let i = 1; i <= 4; i++) {
        p5.fill(0, 0, 0, alpha * 0.06);
        p5.rect(i, i, 30 * nodeScale, 30 * nodeScale, 10);
      }

      // Main square - use node's color with alpha
      let nodeColor = p5.color(this.color());
      nodeColor.setAlpha(alpha);
      p5.fill(nodeColor);
      p5.rect(0, 0, 30 * nodeScale, 30 * nodeScale, 10);

      // Draw checkmark icon if the node is selected
      if (this.selected && this.appearProgress >= 1) {
        p5.stroke(255);
        p5.strokeWeight(2 * nodeScale);
        p5.noFill();
        // Draw checkmark
        p5.beginShape();
        p5.vertex(-8, 0);
        p5.vertex(-3, 5);
        p5.vertex(8, -6);
        p5.endShape();
      }

      p5.pop();
    }
  }

  isMouseOver(p5) {
    return this.visible &&
           p5.mouseX > this.x - 15 &&
           p5.mouseX < this.x + 15 &&
           p5.mouseY > this.y - 15 &&
           p5.mouseY < this.y + 15;
  }

  // Connect this node to a child node
  child(childNode) {
    // Create an edge from this node to the child
    let isLeft = childNode.x < this.x;
    let isRight = childNode.x > this.x;
    let edge = new Edge(this, childNode, isLeft, isRight);
    return edge;
  }
}

class Edge {
  constructor(parent, child, isLeft, isRight) {
    this.parent = parent;
    this.child = child;
    this.isLeft = isLeft;
    this.isRight = isRight;
    this.progress = 0;

    // Calculate the midpoint where branching occurs
    this.midY = parent.y + (child.y - parent.y) * 0.6;

    // Use the actual child x-coordinate
    // This ensures the edge will connect directly to the child node
    this.branchX = child.x;
  }

  update() {
    if (this.parent.visible && this.progress < 1) {
      this.progress += 0.01; // Adjust animation speed
    }
    if (this.progress >= 1) {
      this.child.visible = true;
    }
  }

  color() {
    return this.child.color();
  }

  render(p5) {
    if (!this.parent.visible) return;

    // Calculate path lengths
    const verticalDist1 = this.midY - this.parent.y;
    const horizontalDist = Math.abs(this.branchX - this.parent.x);
    const verticalDist2 = this.child.y - this.midY;
    const totalLength = verticalDist1 + horizontalDist + verticalDist2;

    // Calculate how much of each segment to draw
    const currentLength = totalLength * this.progress;

    p5.stroke(180, 190, 205);
    p5.strokeWeight(1.5);
    p5.noFill();

    // Always draw the first vertical segment from parent
    if (currentLength > 0) {
      const firstSegmentLength = Math.min(currentLength, verticalDist1);
      const currentMidY = p5.lerp(this.parent.y, this.midY, firstSegmentLength / verticalDist1);
      p5.line(this.parent.x, this.parent.y, this.parent.x, currentMidY);
    }

    if (currentLength > verticalDist1) {
      // Draw second segment (horizontal)
      const secondSegmentLength = Math.min(currentLength - verticalDist1, horizontalDist);
      const currentBranchX = p5.lerp(this.parent.x, this.branchX, secondSegmentLength / horizontalDist);
      p5.line(this.parent.x, this.midY, currentBranchX, this.midY);

      if (currentLength > verticalDist1 + horizontalDist) {
        // Draw third segment (vertical to child)
        const thirdSegmentLength = currentLength - verticalDist1 - horizontalDist;
        const currentChildY = p5.lerp(this.midY, this.child.y, thirdSegmentLength / verticalDist2);
        p5.line(this.branchX, this.midY, this.branchX, currentChildY);
      }
    }
  }
}

// Create a modified sketch for each stage
function createTreeSketch(stageId) {
  return function(p5) {
    let nodes = [];
    let edges = [];
    let treeData = stageData[stageId];

    p5.setup = function() {
      const canvas = p5.createCanvas(p5.windowWidth * 0.4, p5.windowHeight);
      canvas.parent('canvas-container');
      p5.smooth();
      p5.frameRate(60);

      if (treeData) {
        createTreeFromData(treeData);
      }
    };

    p5.windowResized = function() {
      p5.resizeCanvas(p5.windowWidth * 0.4, p5.windowHeight);
    };

    function createTreeFromData(data) {
      // Clear existing nodes and edges
      nodes = [];
      edges = [];

      // Add defensive checks to prevent errors
      if (!data || !data.layout || !Array.isArray(data.layout) || !data.edges || !Array.isArray(data.edges)) {
        console.error("Invalid tree data format:", data);
        return; // Exit if data structure is invalid
      }

      // Find all parent nodes in edges
      const parentNodes = new Set();
      for (const [parentId, childId] of data.edges) {
        parentNodes.add(parentId);
      }

      // Create nodes
      for (let i = 0; i < data.layout.length; i++) {
        const [nx, ny] = data.layout[i];
        // A node is a root if it's a parent and not a child in any edge
        const isRoot = parentNodes.has(i) && data.edges.every(edge => edge[1] !== i);

        const node = new Node(
          nx * p5.width * 0.8 + p5.width * 0.1,
          ny * p5.height * 0.8 + p5.height * 0.1,
          i,
          isRoot
        );
        nodes.push(node);
      }

      // If no root was found, make the first parent node visible
      if (!nodes.some(node => node.visible) && parentNodes.size > 0) {
        // Get the first parent node
        const firstParentId = [...parentNodes][0];
        if (nodes[firstParentId]) {
          nodes[firstParentId].visible = true;
        }
      }

      // Create edges
      for (const [parentId, childId] of data.edges) {
        const parent = nodes[parentId];
        const child = nodes[childId];
        if (parent && child) { // Verify both nodes exist
          const isLeft = child.x < parent.x;
          const isRight = child.x > parent.x;
          edges.push(new Edge(parent, child, isLeft, isRight));
        }
      }

      // Select the first node by default
      if (nodes.length > 0) {
        nodes[0].selected = true;
        updateNodeInfo(0);
      }
    }

    p5.draw = function() {
      // Use the global background color if available, otherwise use the default bgCol
      const currentBgColor = window.bgColCurrent || bgCol;
      p5.background(currentBgColor);

      // Update and render edges
      for (const edge of edges) {
        edge.update();
        edge.render(p5);
      }

      // Update and render nodes
      for (const node of nodes) {
        node.update();
        node.render(p5);
      }

      // Handle mouse hover
      p5.cursor(p5.ARROW);
      for (const node of nodes) {
        if (node.isMouseOver(p5)) {
          p5.cursor(p5.HAND);
        }
      }
    };

    p5.mousePressed = function() {
      // Check if any node was clicked
      for (let i = 0; i < nodes.length; i++) {
        if (nodes[i].visible && nodes[i].isMouseOver(p5)) {
          // Deselect all nodes
          nodes.forEach(n => n.selected = false);
          // Select the clicked node
          nodes[i].selected = true;
          // Update the right panel with node info
          updateNodeInfo(i);
          break;
        }
      }
    };

    function updateNodeInfo(nodeIndex) {
      if (treeData) {
        setNodeInfo(
          treeData.code[nodeIndex],
          treeData.plan[nodeIndex],
          treeData.plot_code?.[nodeIndex],
          treeData.plot_plan?.[nodeIndex],
          treeData.metrics?.[nodeIndex],
          treeData.exc_type?.[nodeIndex] || '',
          treeData.exc_info?.[nodeIndex]?.args?.[0] || '',
          treeData.exc_stack?.[nodeIndex] || [],
          treeData.plots?.[nodeIndex] || [],
          treeData.plot_analyses?.[nodeIndex] || [],
          treeData.vlm_feedback_summary?.[nodeIndex] || '',
          treeData.datasets_successfully_tested?.[nodeIndex] || [],
          treeData.exec_time_feedback?.[nodeIndex] || '',
          treeData.exec_time?.[nodeIndex] || ''
        );
      }
    }
  };
}

// Start a new p5 sketch for the given stage
function startSketch(stageId) {
  if (currentSketch) {
    currentSketch.remove();
  }

  if (stageData[stageId]) {
    currentSketch = new p5(createTreeSketch(stageId));

    // Update stage info
    const stageNumber = stageId.split('_')[1];
    let stageDesc = '';
    switch(stageId) {
      case 'Stage_1': stageDesc = 'Preliminary Investigation'; break;
      case 'Stage_2': stageDesc = 'Baseline Tuning'; break;
      case 'Stage_3': stageDesc = 'Research Agenda Execution'; break;
      case 'Stage_4': stageDesc = 'Ablation Studies'; break;
    }

    document.getElementById('stage-info').innerHTML =
      `<strong>Current Stage: ${stageNumber} - ${stageDesc}</strong>`;
  }
}

// Handle tab selection
function selectStage(stageId) {
  if (!stageData[stageId] || !availableStages.includes(stageId)) {
    return; // Don't allow selection of unavailable stages
  }

  // Update active tab styles
  document.querySelectorAll('.tab').forEach(tab => {
    tab.classList.remove('active');
  });
  document.querySelector(`.tab[data-stage="${stageId}"]`).classList.add('active');

  // Start the new sketch
  currentStage = stageId;
  startSketch(stageId);
}

// Function to load the tree data for all stages
async function loadAllStageData(baseTreeData) {
  console.log("Loading stage data with base data:", baseTreeData);

  // The base tree data is for the current stage
  const currentStageId = baseTreeData.current_stage || 'Stage_1';

  // Ensure base tree data is valid and has required properties
  if (baseTreeData && baseTreeData.layout && baseTreeData.edges) {
    stageData[currentStageId] = baseTreeData;
    availableStages.push(currentStageId);
    console.log(`Added current stage ${currentStageId} to available stages`);
  } else {
    console.warn(`Current stage ${currentStageId} data is invalid:`, baseTreeData);
  }

  // Use relative path to load other stage trees
  const logDirPath = baseTreeData.log_dir_path || '.';
  console.log("Log directory path:", logDirPath);

  // Load data for each stage if available
  const stageNames = ['Stage_1', 'Stage_2', 'Stage_3', 'Stage_4'];
  const stageNames2actualNames = {
    'Stage_1': 'stage_1_initial_implementation_1_preliminary',
    'Stage_2': 'stage_2_baseline_tuning_1_first_attempt',
    'Stage_3': 'stage_3_creative_research_1_first_attempt',
    'Stage_4': 'stage_4_ablation_studies_1_first_attempt'
    }

  for (const stage of stageNames) {

    if (baseTreeData.completed_stages && baseTreeData.completed_stages.includes(stage)) {
      try {
        console.log(`Attempting to load data for ${stage} from ${logDirPath}/${stageNames2actualNames[stage]}/tree_data.json`);
        const response = await fetch(`${logDirPath}/${stageNames2actualNames[stage]}/tree_data.json`);

        if (response.ok) {
          const data = await response.json();

          // Validate the loaded data
          if (data && data.layout && data.edges) {
            stageData[stage] = data;
            availableStages.push(stage);
            console.log(`Successfully loaded and validated data for ${stage}`);
          } else {
            console.warn(`Loaded data for ${stage} is invalid:`, data);
          }
        } else {
          console.warn(`Failed to load data for ${stage} - HTTP status ${response.status}`);
        }
      } catch (error) {
        console.error(`Error loading data for ${stage}:`, error);
      }
    } else {
      console.log(`Skipping stage ${stage} - not in completed stages list:`, baseTreeData.completed_stages);
    }
  }

  // Update tab visibility based on available stages
  updateTabVisibility();

  // Start with the first available stage
  if (availableStages.length > 0) {
    selectStage(availableStages[0]);
  } else {
    console.warn("No stages available to display");
    // Display a message in the canvas area
    document.getElementById('canvas-container').innerHTML =
      '<div style="padding: 20px; color: #333; text-align: center;"><h3>No valid tree data available to display</h3></div>';
  }
}

// Update tab visibility based on available stages
function updateTabVisibility() {
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(tab => {
    const stageId = tab.getAttribute('data-stage');
    if (availableStages.includes(stageId)) {
      tab.classList.remove('disabled');
    } else {
      tab.classList.add('disabled');
    }
  });
}

// Utility function to set the node info in the right panel
const setNodeInfo = (code, plan, plot_code, plot_plan, metrics = null, exc_type = '', exc_info = '',
    exc_stack = [], plots = [], plot_analyses = [], vlm_feedback_summary = '',
    datasets_successfully_tested = [], exec_time_feedback = '', exec_time = '') => {
  const codeElm = document.getElementById("code");
  if (codeElm) {
    if (code) {
      codeElm.innerHTML = hljs.highlight(code, { language: "python" }).value;
    } else {
      codeElm.innerHTML = '<p>No code available</p>';
    }
  }

  const planElm = document.getElementById("plan");
  if (planElm) {
    if (plan) {
      planElm.innerHTML = hljs.highlight(plan, { language: "plaintext" }).value;
    } else {
      planElm.innerHTML = '<p>No plan available</p>';
    }
  }

  const plot_codeElm = document.getElementById("plot_code");
  if (plot_codeElm) {
    if (plot_code) {
      plot_codeElm.innerHTML = hljs.highlight(plot_code, { language: "python" }).value;
    } else {
      plot_codeElm.innerHTML = '<p>No plot code available</p>';
    }
  }

  const plot_planElm = document.getElementById("plot_plan");
  if (plot_planElm) {
    if (plot_plan) {
      plot_planElm.innerHTML = hljs.highlight(plot_plan, { language: "plaintext" }).value;
    } else {
      plot_planElm.innerHTML = '<p>No plot plan available</p>';
    }
  }

  const metricsElm = document.getElementById("metrics");
  if (metricsElm) {
      let metricsContent = `<h3>Metrics:</h3>`;
      if (metrics && metrics.metric_names) {
          for (const metric of metrics.metric_names) {
              metricsContent += `<div class="metric-group">`;
              metricsContent += `<h4>${metric.metric_name}</h4>`;
              metricsContent += `<p><strong>Description:</strong> ${metric.description || 'N/A'}</p>`;
              metricsContent += `<p><strong>Optimization:</strong> ${metric.lower_is_better ? 'Minimize' : 'Maximize'}</p>`;

              // Create table for dataset values
              metricsContent += `<table class="metric-table">
                  <tr>
                      <th>Dataset</th>
                      <th>Final Value</th>
                      <th>Best Value</th>
                  </tr>`;

              for (const dataPoint of metric.data) {
                  metricsContent += `<tr>
                      <td>${dataPoint.dataset_name}</td>
                      <td>${dataPoint.final_value?.toFixed(4) || 'N/A'}</td>
                      <td>${dataPoint.best_value?.toFixed(4) || 'N/A'}</td>
                  </tr>`;
              }

              metricsContent += `</table></div>`;
          }
      } else if (metrics === null) {
          metricsContent += `<p>No metrics available</p>`;
      }
      metricsElm.innerHTML = metricsContent;
  }

  // Add plots display
  const plotsElm = document.getElementById("plots");
  if (plotsElm) {
      if (plots && plots.length > 0) {
          let plotsContent = '';
          plots.forEach(plotPath => {
              plotsContent += `
                  <div class="plot-item">
                      <img src="${plotPath}" alt="Experiment Plot" onerror="console.error('Failed to load plot:', this.src)"/>
                  </div>`;
          });
          plotsElm.innerHTML = plotsContent;
      } else {
          plotsElm.innerHTML = '';
      }
  }

  // Add error info display
  const errorElm = document.getElementById("exc_info");
  if (errorElm) {
    if (exc_type) {
      let errorContent = `<h3 style="color: #ff5555">Exception Information:</h3>
                          <p><strong>Type:</strong> ${exc_type}</p>`;

      if (exc_info) {
        errorContent += `<p><strong>Details:</strong> <pre>${JSON.stringify(exc_info, null, 2)}</pre></p>`;
      }

      if (exc_stack) {
        errorContent += `<p><strong>Stack Trace:</strong> <pre>${exc_stack.join('\n')}</pre></p>`;
      }

      errorElm.innerHTML = errorContent;
    } else {
      errorElm.innerHTML = "No exception info available";
    }
  }

  const exec_timeElm = document.getElementById("exec_time");
  if (exec_timeElm) {
    let exec_timeContent = '<div id="exec_time"><h3>Execution Time (in seconds):</h3><p>' + exec_time + '</p></div>';
    exec_timeElm.innerHTML = exec_timeContent;
  }

  const exec_time_feedbackElm = document.getElementById("exec_time_feedback");
  if (exec_time_feedbackElm) {
    let exec_time_feedbackContent = '<div id="exec_time_feedback_content">'
    exec_time_feedbackContent += '<h3>Execution Time Feedback:</h3>'
    exec_time_feedbackContent += '<p>' + exec_time_feedback + '</p>'
    exec_time_feedbackContent += '</div>';
    exec_time_feedbackElm.innerHTML = exec_time_feedbackContent;
  }

  const vlm_feedbackElm = document.getElementById("vlm_feedback");
  if (vlm_feedbackElm) {
      let vlm_feedbackContent = '';

      if (plot_analyses && plot_analyses.length > 0) {
          vlm_feedbackContent += `<h3>Plot Analysis:</h3>`;
          plot_analyses.forEach(analysis => {
              if (analysis && analysis.plot_path) {  // Add null check
                  vlm_feedbackContent += `
                      <div class="plot-analysis">
                          <h4>Analysis for ${analysis.plot_path.split('/').pop()}</h4>
                          <p>${analysis.analysis || 'No analysis available'}</p>
                          <ul class="key-findings">
                              ${(analysis.key_findings || []).map(finding => `<li>${finding}</li>`).join('')}
                          </ul>
                      </div>`;
              } else {
                  console.warn('Received invalid plot analysis:', analysis);
                  vlm_feedbackContent += `
                      <div class="plot-analysis">
                          <p>Invalid plot analysis data received</p>
                      </div>`;
              }
          });
      }

      // Add actionable insights if available
      if (vlm_feedback_summary && typeof vlm_feedback_summary === 'string') {
          vlm_feedbackContent += `
              <div class="vlm_feedback">
                  <h3>VLM Feedback Summary:</h3>
                  <p>${vlm_feedback_summary}</p>
              </div>`;
      }

      console.log("Datasets successfully tested:", datasets_successfully_tested);
      if (datasets_successfully_tested && datasets_successfully_tested.length > 0) {
          vlm_feedbackContent += `
              <div id="datasets_successfully_tested">
                  <h3>Datasets Successfully Tested:</h3>
                  <p>${datasets_successfully_tested.join(', ')}</p>
              </div>`;
      }

      if (!vlm_feedbackContent) {
          vlm_feedbackContent = '<p>No insights available for this experiment.</p>';
      }

      vlm_feedbackElm.innerHTML = vlm_feedbackContent;
  }

  const datasets_successfully_testedElm = document.getElementById("datasets_successfully_tested");
  if (datasets_successfully_testedElm) {
      let datasets_successfully_testedContent = '';
      if (datasets_successfully_tested && datasets_successfully_tested.length > 0) {
          datasets_successfully_testedContent = `<h3>Datasets Successfully Tested:</h3><ul>`;
          datasets_successfully_tested.forEach(dataset => {
              datasets_successfully_testedContent += `<li>${dataset}</li>`;
          });
          datasets_successfully_testedContent += `</ul>`;
      } else {
          datasets_successfully_testedContent = '<p>No datasets tested yet</p>';
      }
      datasets_successfully_testedElm.innerHTML = datasets_successfully_testedContent;
  }
};

// Initialize with the provided tree data
const treeStructData = {"edges": [[0, 4], [0, 6], [0, 2], [0, 3], [0, 5], [0, 1], [3, 8], [4, 7]], "layout": [[0.5, 0.0], [0.0, 0.5], [0.2, 0.5], [0.4, 0.5], [0.6, 0.5], [0.8, 0.5], [1.0, 0.5], [0.6, 1.0], [0.4, 1.0]], "plan": ["This implementation follows the provided code structure for a baseline\ncongestion-aware task allocation system. The approach uses a simple CNN-based\ncongestion predictor trained on simulated warehouse data with congestion labels\nextracted from baseline path planning. The predictor takes agent and task grid\nrepresentations as input and outputs a congestion heatmap. During task\nassignment, we compare distance-based allocation against congestion-aware\nallocation that penalizes paths through predicted high-congestion areas. We\nevaluate on three warehouse layouts (sparse, bottleneck, dense obstacles) with\nvarying agent counts (20-50) to measure throughput improvement percentage. The\ntraining uses MSE loss between predicted and ground-truth congestion maps. The\nevaluation runs multiple episodes per configuration to compute mean and standard\ndeviation of throughput metrics.", "Hyperparam tuning name: epochs. I'll implement hyperparameter tuning for the\nnumber of training epochs. The approach will train separate models with\ndifferent epoch values (30, 60, 90, 120), track training/validation losses for\neach, evaluate their performance on downstream task assignment across all\nwarehouse datasets, and compare which epoch count yields the best results. This\nwill help determine if training longer improves both prediction accuracy and\ntask assignment performance.", "Hyperparam tuning name: learning_rate. I'll implement hyperparameter tuning for\nthe learning rate by testing multiple learning rate values (0.0001, 0.0005,\n0.001, 0.005, 0.01) and training separate models for each. The code will track\ntraining/validation losses for each learning rate, select the best model based\non validation loss, and then evaluate all models on the warehouse datasets.\nResults will be stored in the experiment_data dictionary with the appropriate\nstructure for each learning rate configuration.", "Hyperparam tuning name: batch_size. I'll implement hyperparameter tuning for\nbatch_size by testing values [16, 32, 64] and selecting the best one based on\nvalidation loss. The code will train separate models for each batch size, track\ntheir performance, and use the best model for final evaluation. I'll restructure\nthe experiment_data to store results for each batch size configuration.", "Hyperparam tuning name: hidden_dim. I'll implement hyperparameter tuning for the\nhidden_dim parameter of the CongestionPredictor neural network. The approach\nwill test multiple hidden_dim values (32, 64, 128, 256), train a model for each,\nevaluate on validation data to find the best configuration, and then evaluate\nthe best model on all three warehouse datasets. I'll store all results in the\nexperiment_data dictionary and create comprehensive visualizations comparing the\ndifferent hidden dimensions.", "Hyperparam tuning name: congestion_weight. I'll implement hyperparameter tuning\nfor the `congestion_weight` parameter by testing multiple values and evaluating\ntheir impact on throughput and congestion prevention across all three warehouse\ndatasets. The tuning will search over a range of values (e.g., 0.1 to 1.0) and\nselect the best one based on a combined metric of throughput improvement and\ncongestion prevention rate.", "Hyperparam tuning name: lookahead. I'll implement hyperparameter tuning for the\nlookahead parameter in the congestion prediction. The approach will test\nmultiple lookahead values (e.g., 2, 3, 5, 7, 10) and evaluate each by training a\nseparate model and measuring validation loss and downstream task performance.\nFor each lookahead value, I'll generate training data with that specific\nlookahead, train a congestion predictor, and evaluate throughput improvement\nacross datasets. The best lookahead will be selected based on overall throughput\nimprovement.", "The issue is that the sub-stage requires adding two HuggingFace datasets for\ntesting, but the previous implementation doesn't include any external datasets.\nSince this is a warehouse simulation task where HuggingFace datasets don't\ndirectly apply, I'll create two additional synthetic warehouse configurations\ninspired by real-world scenarios (like maze-like and cross-dock layouts) and\ntune hyperparameters (learning rate, epochs, batch size) while keeping the model\narchitecture unchanged. I'll also add proper congestion_prevention_rate tracking\nthroughout.", "The bug is that the sub-stage requires introducing TWO new datasets from\nHuggingFace, but the previous implementation doesn't include any HuggingFace\ndatasets. Since this is a warehouse/grid-based simulation task, we can't\ndirectly use HuggingFace datasets for MAPF. Instead, we'll create two additional\nsynthetic warehouse layouts inspired by real-world warehouse patterns (corridor-\nbased and zone-based). We'll also tune learning rate alongside batch size, and\nincrease epochs to improve training. The model architecture remains unchanged as\nper requirements."], "code": ["import os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.optim as optim\nimport matplotlib.pyplot as plt\nfrom collections import defaultdict\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\nexperiment_data = {\n    \"training\": {\"losses\": {\"train\": [], \"val\": []}, \"epochs\": []},\n    \"datasets\": {},\n}\n\n\ndef greedy_assignment(cost_matrix):\n    n_agents, n_tasks = cost_matrix.shape\n    row_ind, col_ind = [], []\n    assigned_tasks, assigned_agents = set(), set()\n    pairs = [(cost_matrix[i, j], i, j) for i in range(n_agents) for j in range(n_tasks)]\n    pairs.sort()\n    for cost, i, j in pairs:\n        if i not in assigned_agents and j not in assigned_tasks:\n            row_ind.append(i)\n            col_ind.append(j)\n            assigned_agents.add(i)\n            assigned_tasks.add(j)\n            if len(assigned_agents) == min(n_agents, n_tasks):\n                break\n    return np.array(row_ind), np.array(col_ind)\n\n\nclass WarehouseSimulator:\n    def __init__(\n        self, grid_size=20, n_agents=20, n_tasks=30, obstacles=None, hotspots=None\n    ):\n        self.grid_size, self.n_agents, self.n_tasks = grid_size, n_agents, n_tasks\n        self.obstacles = obstacles if obstacles else set()\n        self.hotspots = hotspots if hotspots else []\n        self.congestion_events = 0\n        self.reset()\n\n    def _valid_position(self, pos):\n        return tuple(pos) not in self.obstacles\n\n    def _random_valid_position(self):\n        for _ in range(100):\n            pos = np.random.randint(0, self.grid_size, 2)\n            if self._valid_position(pos):\n                return pos\n        return np.array([0, 0])\n\n    def _hotspot_biased_position(self):\n        if self.hotspots and np.random.random() < 0.6:\n            hotspot = self.hotspots[np.random.randint(len(self.hotspots))]\n            offset = np.random.randint(-2, 3, 2)\n            pos = np.clip(hotspot + offset, 0, self.grid_size - 1)\n            if self._valid_position(pos):\n                return pos\n        return self._random_valid_position()\n\n    def reset(self):\n        self.agent_positions = np.array(\n            [self._random_valid_position() for _ in range(self.n_agents)]\n        )\n        self.agent_velocities = np.zeros((self.n_agents, 2))\n        self.task_positions = np.array(\n            [self._hotspot_biased_position() for _ in range(self.n_tasks)]\n        )\n        self.task_active = np.ones(self.n_tasks, dtype=bool)\n        self.agent_targets = [-1] * self.n_agents\n        self.time_step, self.tasks_completed = 0, 0\n        self.congestion_events = 0\n        return self.get_state()\n\n    def get_state(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        task_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        for i, pos in enumerate(self.task_positions):\n            if self.task_active[i]:\n                task_grid[pos[0], pos[1]] += 1\n        return np.stack([agent_grid, task_grid], axis=0)\n\n    def count_congestion_events(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        return np.sum(agent_grid > 2)\n\n    def compute_congestion(self, lookahead=5):\n        congestion = np.zeros((self.grid_size, self.grid_size))\n        for i, agent_pos in enumerate(self.agent_positions):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                path = self._get_path(agent_pos, self.task_positions[target_idx])\n                for step, pos in enumerate(path[:lookahead]):\n                    congestion[pos[0], pos[1]] += 1.0 / (step + 1)\n        return congestion\n\n    def _get_path(self, start, end):\n        path, current = [tuple(start)], np.array(start)\n        max_steps = self.grid_size * 2\n        for _ in range(max_steps):\n            if np.array_equal(current, end):\n                break\n            diff = end - current\n            moved = False\n            for d in [0, 1]:\n                if diff[d] != 0:\n                    new_pos = current.copy()\n                    new_pos[d] += np.sign(diff[d])\n                    if self._valid_position(new_pos):\n                        current = new_pos\n                        moved = True\n                        break\n            if not moved:\n                break\n            path.append(tuple(current))\n        return path\n\n    def assign_tasks(self, assignment):\n        for agent_idx, task_idx in assignment:\n            if task_idx >= 0 and self.task_active[task_idx]:\n                self.agent_targets[agent_idx] = task_idx\n\n    def step(self):\n        self.time_step += 1\n        self.congestion_events += self.count_congestion_events()\n\n        for i in range(self.n_agents):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                target_pos = self.task_positions[target_idx]\n                diff = target_pos - self.agent_positions[i]\n                if np.sum(np.abs(diff)) <= 1:\n                    self.task_active[target_idx] = False\n                    self.tasks_completed += 1\n                    self.agent_targets[i] = -1\n                else:\n                    move = np.zeros(2, dtype=int)\n                    for d in [0, 1]:\n                        if diff[d] != 0:\n                            new_pos = self.agent_positions[i].copy()\n                            new_pos[d] += np.sign(diff[d])\n                            if self._valid_position(new_pos):\n                                move[d] = np.sign(diff[d])\n                                break\n                    self.agent_positions[i] = np.clip(\n                        self.agent_positions[i] + move, 0, self.grid_size - 1\n                    )\n                    self.agent_velocities[i] = move\n\n        for idx in np.where(~self.task_active)[0]:\n            if np.random.random() < 0.3:\n                self.task_positions[idx] = self._hotspot_biased_position()\n                self.task_active[idx] = True\n        return self.get_state()\n\n\ndef create_sparse_warehouse(grid_size=20):\n    obstacles = set()\n    for i in range(5, 15, 5):\n        for j in range(3, grid_size - 3, 4):\n            obstacles.add((i, j))\n    hotspots = [np.array([5, 5]), np.array([15, 15])]\n    return obstacles, hotspots, \"sparse_warehouse\"\n\n\ndef create_bottleneck_warehouse(grid_size=20):\n    obstacles = set()\n    for i in range(grid_size):\n        if i not in [9, 10]:\n            obstacles.add((i, 10))\n    for j in range(grid_size):\n        if j not in [9, 10]:\n            obstacles.add((10, j))\n    hotspots = [\n        np.array([5, 5]),\n        np.array([5, 15]),\n        np.array([15, 5]),\n        np.array([15, 15]),\n    ]\n    return obstacles, hotspots, \"bottleneck_warehouse\"\n\n\ndef create_dense_obstacle_warehouse(grid_size=20):\n    obstacles = set()\n    np.random.seed(42)\n    for _ in range(int(grid_size * grid_size * 0.15)):\n        pos = (np.random.randint(1, grid_size - 1), np.random.randint(1, grid_size - 1))\n        obstacles.add(pos)\n    hotspots = [\n        np.array([3, 3]),\n        np.array([16, 16]),\n        np.array([3, 16]),\n        np.array([16, 3]),\n    ]\n    return obstacles, hotspots, \"dense_obstacle_warehouse\"\n\n\nclass CongestionPredictor(nn.Module):\n    def __init__(self, grid_size=20, hidden_dim=64):\n        super().__init__()\n        self.conv1 = nn.Conv2d(2, hidden_dim, 3, padding=1)\n        self.conv2 = nn.Conv2d(hidden_dim, hidden_dim, 3, padding=1)\n        self.conv3 = nn.Conv2d(hidden_dim, 1, 3, padding=1)\n        self.relu = nn.ReLU()\n\n    def forward(self, x):\n        x = self.relu(self.conv1(x))\n        x = self.relu(self.conv2(x))\n        return torch.sigmoid(self.conv3(x))\n\n\ndef generate_training_data(\n    n_samples=500, grid_size=20, n_agents=20, n_tasks=30, obstacles=None, hotspots=None\n):\n    states, congestions = [], []\n    for _ in range(n_samples):\n        sim = WarehouseSimulator(grid_size, n_agents, n_tasks, obstacles, hotspots)\n        state = sim.get_state()\n        active_tasks = np.where(sim.task_active)[0]\n        sim.assign_tasks(\n            [(i, active_tasks[i]) for i in range(min(n_agents, len(active_tasks)))]\n        )\n        congestion = sim.compute_congestion(lookahead=5)\n        congestion = congestion / (congestion.max() + 1e-6)\n        states.append(state)\n        congestions.append(congestion)\n    return np.array(states), np.array(congestions)\n\n\ndef distance_based_assignment(\n    agent_positions, task_positions, task_active, obstacles=None\n):\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    cost_matrix = np.array(\n        [\n            [np.sum(np.abs(ap - task_positions[ti])) for ti in active_indices]\n            for ap in agent_positions\n        ]\n    )\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef congestion_aware_assignment(\n    agent_positions,\n    task_positions,\n    task_active,\n    congestion_map,\n    congestion_weight=0.5,\n    obstacles=None,\n):\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    grid_size = congestion_map.shape[0]\n    cost_matrix = np.zeros((len(agent_positions), len(active_indices)))\n    for i, agent_pos in enumerate(agent_positions):\n        for j, task_idx in enumerate(active_indices):\n            task_pos = task_positions[task_idx]\n            distance = np.sum(np.abs(agent_pos - task_pos))\n            path_congestion, current = 0, agent_pos.copy()\n            for _ in range(grid_size * 2):\n                if np.array_equal(current, task_pos):\n                    break\n                diff = task_pos - current\n                if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                    current[0] += np.sign(diff[0])\n                elif diff[1] != 0:\n                    current[1] += np.sign(diff[1])\n                current = np.clip(current, 0, grid_size - 1)\n                path_congestion += congestion_map[current[0], current[1]]\n            cost_matrix[i, j] = distance + congestion_weight * path_congestion\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef train_predictor(\n    model,\n    train_states,\n    train_congestions,\n    val_states,\n    val_congestions,\n    epochs=30,\n    batch_size=32,\n):\n    model = model.to(device)\n    optimizer = optim.Adam(model.parameters(), lr=0.001)\n    criterion = nn.MSELoss()\n    train_states_t = torch.FloatTensor(train_states).to(device)\n    train_congestions_t = torch.FloatTensor(train_congestions).unsqueeze(1).to(device)\n    val_states_t = torch.FloatTensor(val_states).to(device)\n    val_congestions_t = torch.FloatTensor(val_congestions).unsqueeze(1).to(device)\n    n_train = len(train_states)\n    best_val_loss = float(\"inf\")\n    for epoch in range(epochs):\n        model.train()\n        perm = torch.randperm(n_train)\n        train_loss, n_batches = 0, 0\n        for i in range(0, n_train, batch_size):\n            idx = perm[i : i + batch_size]\n            optimizer.zero_grad()\n            loss = criterion(model(train_states_t[idx]), train_congestions_t[idx])\n            loss.backward()\n            optimizer.step()\n            train_loss += loss.item()\n            n_batches += 1\n        train_loss /= n_batches\n        model.eval()\n        with torch.no_grad():\n            val_loss = criterion(model(val_states_t), val_congestions_t).item()\n        experiment_data[\"training\"][\"losses\"][\"train\"].append(train_loss)\n        experiment_data[\"training\"][\"losses\"][\"val\"].append(val_loss)\n        experiment_data[\"training\"][\"epochs\"].append(epoch)\n        best_val_loss = min(best_val_loss, val_loss)\n        print(\n            f\"Epoch {epoch}: train_loss = {train_loss:.4f}, validation_loss = {val_loss:.4f}\"\n        )\n    return model\n\n\ndef evaluate_method(method, model, sim_params, n_episodes=5, max_steps=100):\n    throughputs, congestion_events_list = [], []\n    for _ in range(n_episodes):\n        sim = WarehouseSimulator(**sim_params)\n        for step in range(max_steps):\n            state = sim.get_state()\n            unassigned = [\n                i\n                for i in range(sim.n_agents)\n                if sim.agent_targets[i] < 0 or not sim.task_active[sim.agent_targets[i]]\n            ]\n            if len(unassigned) > 0 and np.any(sim.task_active):\n                if method == \"distance\":\n                    assignment = distance_based_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                        sim.obstacles,\n                    )\n                else:\n                    state_tensor = torch.FloatTensor(state).unsqueeze(0).to(device)\n                    with torch.no_grad():\n                        congestion_pred = model(state_tensor).squeeze().cpu().numpy()\n                    assignment = congestion_aware_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                        congestion_pred,\n                        congestion_weight=0.5,\n                        obstacles=sim.obstacles,\n                    )\n                sim.assign_tasks([(unassigned[a], t) for a, t in assignment])\n            sim.step()\n        throughputs.append(sim.tasks_completed / (max_steps / 60.0))\n        congestion_events_list.append(sim.congestion_events)\n    return (\n        np.mean(throughputs),\n        np.std(throughputs),\n        np.mean(congestion_events_list),\n        np.std(congestion_events_list),\n    )\n\n\n# Generate training data from all datasets combined\nprint(\"Creating three distinct warehouse datasets...\")\ndatasets = [\n    create_sparse_warehouse(),\n    create_bottleneck_warehouse(),\n    create_dense_obstacle_warehouse(),\n]\n\nall_train_states, all_train_congestions = [], []\nfor obstacles, hotspots, name in datasets:\n    print(f\"  Generating data for: {name}\")\n    states, congestions = generate_training_data(\n        n_samples=300, obstacles=obstacles, hotspots=hotspots\n    )\n    all_train_states.append(states)\n    all_train_congestions.append(congestions)\n\ntrain_states = np.concatenate(all_train_states[:2] + [all_train_states[2][:200]])\ntrain_congestions = np.concatenate(\n    all_train_congestions[:2] + [all_train_congestions[2][:200]]\n)\nval_states = np.concatenate([all_train_states[2][200:]])\nval_congestions = np.concatenate([all_train_congestions[2][200:]])\nprint(f\"Training data: {train_states.shape}, Validation data: {val_states.shape}\")\n\nprint(\"\\nTraining congestion predictor...\")\nmodel = CongestionPredictor(grid_size=20, hidden_dim=64)\nmodel = train_predictor(\n    model, train_states, train_congestions, val_states, val_congestions, epochs=30\n)\n\n# Evaluate on all three datasets\nprint(\"\\n\" + \"=\" * 70)\nprint(\"EVALUATION ON THREE WAREHOUSE DATASETS\")\nprint(\"=\" * 70)\n\nagent_counts = [20, 30, 40, 50]\nmax_steps = 100\n\nfor obstacles, hotspots, dataset_name in datasets:\n    print(f\"\\n--- Dataset: {dataset_name} ---\")\n    experiment_data[\"datasets\"][dataset_name] = {\n        \"distance_based\": {\n            \"throughput\": [],\n            \"std\": [],\n            \"congestion\": [],\n            \"congestion_std\": [],\n        },\n        \"congestion_aware\": {\n            \"throughput\": [],\n            \"std\": [],\n            \"congestion\": [],\n            \"congestion_std\": [],\n        },\n        \"improvement\": [],\n        \"congestion_prevention_rate\": [],\n        \"n_agents\": agent_counts,\n    }\n\n    for n_agents in agent_counts:\n        sim_params = {\n            \"grid_size\": 20,\n            \"n_agents\": n_agents,\n            \"n_tasks\": 30,\n            \"obstacles\": obstacles,\n            \"hotspots\": hotspots,\n        }\n\n        dist_tp, dist_std, dist_cong, dist_cong_std = evaluate_method(\n            \"distance\", None, sim_params, n_episodes=5, max_steps=max_steps\n        )\n        cata_tp, cata_std, cata_cong, cata_cong_std = evaluate_method(\n            \"congestion_aware\", model, sim_params, n_episodes=5, max_steps=max_steps\n        )\n\n        improvement = (cata_tp - dist_tp) / dist_tp * 100 if dist_tp > 0 else 0\n        cpr = (dist_cong - cata_cong) / dist_cong * 100 if dist_cong > 0 else 0\n\n        experiment_data[\"datasets\"][dataset_name][\"distance_based\"][\n            \"throughput\"\n        ].append(dist_tp)\n        experiment_data[\"datasets\"][dataset_name][\"distance_based\"][\"std\"].append(\n            dist_std\n        )\n        experiment_data[\"datasets\"][dataset_name][\"distance_based\"][\n            \"congestion\"\n        ].append(dist_cong)\n        experiment_data[\"datasets\"][dataset_name][\"distance_based\"][\n            \"congestion_std\"\n        ].append(dist_cong_std)\n        experiment_data[\"datasets\"][dataset_name][\"congestion_aware\"][\n            \"throughput\"\n        ].append(cata_tp)\n        experiment_data[\"datasets\"][dataset_name][\"congestion_aware\"][\"std\"].append(\n            cata_std\n        )\n        experiment_data[\"datasets\"][dataset_name][\"congestion_aware\"][\n            \"congestion\"\n        ].append(cata_cong)\n        experiment_data[\"datasets\"][dataset_name][\"congestion_aware\"][\n            \"congestion_std\"\n        ].append(cata_cong_std)\n        experiment_data[\"datasets\"][dataset_name][\"improvement\"].append(improvement)\n        experiment_data[\"datasets\"][dataset_name][\"congestion_prevention_rate\"].append(\n            cpr\n        )\n\n        print(\n            f\"  Agents={n_agents}: Dist TP={dist_tp:.1f}\u00b1{dist_std:.1f}, CATA TP={cata_tp:.1f}\u00b1{cata_std:.1f}, Imp={improvement:.1f}%, CPR={cpr:.1f}%\"\n        )\n\n# Summary\nprint(\"\\n\" + \"=\" * 70)\nprint(\"SUMMARY BY DATASET\")\nprint(\"=\" * 70)\nall_improvements = []\nfor dataset_name in experiment_data[\"datasets\"]:\n    data = experiment_data[\"datasets\"][dataset_name]\n    avg_imp = np.mean(data[\"improvement\"])\n    avg_cpr = np.mean(data[\"congestion_prevention_rate\"])\n    all_improvements.extend(data[\"improvement\"])\n    print(\n        f\"{dataset_name}: Avg Improvement={avg_imp:.1f}%, Avg Congestion Prevention Rate={avg_cpr:.1f}%\"\n    )\n\noverall_improvement = np.mean(all_improvements)\nprint(f\"\\nthroughput_improvement_percentage = {overall_improvement:.2f}%\")\n\n# Plotting\nfig, axes = plt.subplots(2, 3, figsize=(15, 10))\ncolors = {\n    \"sparse_warehouse\": \"blue\",\n    \"bottleneck_warehouse\": \"orange\",\n    \"dense_obstacle_warehouse\": \"green\",\n}\n\n# Training loss\naxes[0, 0].plot(experiment_data[\"training\"][\"losses\"][\"train\"], label=\"Train\")\naxes[0, 0].plot(experiment_data[\"training\"][\"losses\"][\"val\"], label=\"Validation\")\naxes[0, 0].set_xlabel(\"Epoch\")\naxes[0, 0].set_ylabel(\"Loss\")\naxes[0, 0].set_title(\"Congestion Predictor Training\")\naxes[0, 0].legend()\n\n# Throughput comparison\nfor dataset_name in experiment_data[\"datasets\"]:\n    data = experiment_data[\"datasets\"][dataset_name]\n    axes[0, 1].plot(\n        data[\"n_agents\"],\n        data[\"congestion_aware\"][\"throughput\"],\n        \"o-\",\n        color=colors[dataset_name],\n        label=f\"CATA-{dataset_name[:8]}\",\n    )\n    axes[0, 1].plot(\n        data[\"n_agents\"],\n        data[\"distance_based\"][\"throughput\"],\n        \"x--\",\n        color=colors[dataset_name],\n        alpha=0.5,\n    )\naxes[0, 1].set_xlabel(\"Number of Agents\")\naxes[0, 1].set_ylabel(\"Throughput (tasks/min)\")\naxes[0, 1].set_title(\"Throughput: CATA (solid) vs Distance (dashed)\")\naxes[0, 1].legend(fontsize=8)\n\n# Improvement by dataset\nx = np.arange(len(agent_counts))\nwidth = 0.25\nfor i, dataset_name in enumerate(experiment_data[\"datasets\"]):\n    data = experiment_data[\"datasets\"][dataset_name]\n    axes[0, 2].bar(\n        x + i * width,\n        data[\"improvement\"],\n        width,\n        label=dataset_name[:10],\n        color=colors[dataset_name],\n    )\naxes[0, 2].set_xlabel(\"Agent Count Index\")\naxes[0, 2].set_ylabel(\"Improvement (%)\")\naxes[0, 2].set_title(\"CATA Improvement by Dataset\")\naxes[0, 2].set_xticks(x + width)\naxes[0, 2].set_xticklabels(agent_counts)\naxes[0, 2].legend(fontsize=8)\naxes[0, 2].axhline(y=0, color=\"r\", linestyle=\"--\")\n\n# Congestion Prevention Rate\nfor i, dataset_name in enumerate(experiment_data[\"datasets\"]):\n    data = experiment_data[\"datasets\"][dataset_name]\n    axes[1, 0].bar(\n        x + i * width,\n        data[\"congestion_prevention_rate\"],\n        width,\n        label=dataset_name[:10],\n        color=colors[dataset_name],\n    )\naxes[1, 0].set_xlabel(\"Agent Count Index\")\naxes[1, 0].set_ylabel(\"Congestion Prevention Rate (%)\")\naxes[1, 0].set_title(\"Congestion Prevention Rate by Dataset\")\naxes[1, 0].set_xticks(x + width)\naxes[1, 0].set_xticklabels(agent_counts)\naxes[1, 0].legend(fontsize=8)\naxes[1, 0].axhline(y=0, color=\"r\", linestyle=\"--\")\n\n# Congestion events comparison\nfor dataset_name in experiment_data[\"datasets\"]:\n    data = experiment_data[\"datasets\"][dataset_name]\n    axes[1, 1].plot(\n        data[\"n_agents\"],\n        data[\"distance_based\"][\"congestion\"],\n        \"x--\",\n        color=colors[dataset_name],\n        alpha=0.5,\n    )\n    axes[1, 1].plot(\n        data[\"n_agents\"],\n        data[\"congestion_aware\"][\"congestion\"],\n        \"o-\",\n        color=colors[dataset_name],\n        label=f\"{dataset_name[:8]}\",\n    )\naxes[1, 1].set_xlabel(\"Number of Agents\")\naxes[1, 1].set_ylabel(\"Congestion Events\")\naxes[1, 1].set_title(\"Congestion Events: CATA (solid) vs Distance (dashed)\")\naxes[1, 1].legend(fontsize=8)\n\n# Summary bar chart\nsummary_data = []\nfor dataset_name in experiment_data[\"datasets\"]:\n    data = experiment_data[\"datasets\"][dataset_name]\n    summary_data.append(\n        [np.mean(data[\"improvement\"]), np.mean(data[\"congestion_prevention_rate\"])]\n    )\nsummary_data = np.array(summary_data)\nx_sum = np.arange(3)\naxes[1, 2].bar(\n    x_sum - 0.15, summary_data[:, 0], 0.3, label=\"Throughput Imp.\", color=\"steelblue\"\n)\naxes[1, 2].bar(x_sum + 0.15, summary_data[:, 1], 0.3, label=\"CPR\", color=\"coral\")\naxes[1, 2].set_xticks(x_sum)\naxes[1, 2].set_xticklabels([\"Sparse\", \"Bottleneck\", \"Dense\"], fontsize=9)\naxes[1, 2].set_ylabel(\"Percentage (%)\")\naxes[1, 2].set_title(\"Avg Improvement & CPR by Dataset\")\naxes[1, 2].legend()\naxes[1, 2].axhline(y=0, color=\"r\", linestyle=\"--\")\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"three_dataset_evaluation.png\"), dpi=150)\nplt.close()\n\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(f\"\\nResults saved to {working_dir}\")\n", "import os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.optim as optim\nimport matplotlib.pyplot as plt\nfrom collections import defaultdict\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\nexperiment_data = {\n    \"epoch_tuning\": {},\n    \"best_epochs\": None,\n    \"best_improvement\": None,\n}\n\n\ndef greedy_assignment(cost_matrix):\n    n_agents, n_tasks = cost_matrix.shape\n    row_ind, col_ind = [], []\n    assigned_tasks, assigned_agents = set(), set()\n    pairs = [(cost_matrix[i, j], i, j) for i in range(n_agents) for j in range(n_tasks)]\n    pairs.sort()\n    for cost, i, j in pairs:\n        if i not in assigned_agents and j not in assigned_tasks:\n            row_ind.append(i)\n            col_ind.append(j)\n            assigned_agents.add(i)\n            assigned_tasks.add(j)\n            if len(assigned_agents) == min(n_agents, n_tasks):\n                break\n    return np.array(row_ind), np.array(col_ind)\n\n\nclass WarehouseSimulator:\n    def __init__(\n        self, grid_size=20, n_agents=20, n_tasks=30, obstacles=None, hotspots=None\n    ):\n        self.grid_size, self.n_agents, self.n_tasks = grid_size, n_agents, n_tasks\n        self.obstacles = obstacles if obstacles else set()\n        self.hotspots = hotspots if hotspots else []\n        self.congestion_events = 0\n        self.reset()\n\n    def _valid_position(self, pos):\n        return tuple(pos) not in self.obstacles\n\n    def _random_valid_position(self):\n        for _ in range(100):\n            pos = np.random.randint(0, self.grid_size, 2)\n            if self._valid_position(pos):\n                return pos\n        return np.array([0, 0])\n\n    def _hotspot_biased_position(self):\n        if self.hotspots and np.random.random() < 0.6:\n            hotspot = self.hotspots[np.random.randint(len(self.hotspots))]\n            offset = np.random.randint(-2, 3, 2)\n            pos = np.clip(hotspot + offset, 0, self.grid_size - 1)\n            if self._valid_position(pos):\n                return pos\n        return self._random_valid_position()\n\n    def reset(self):\n        self.agent_positions = np.array(\n            [self._random_valid_position() for _ in range(self.n_agents)]\n        )\n        self.agent_velocities = np.zeros((self.n_agents, 2))\n        self.task_positions = np.array(\n            [self._hotspot_biased_position() for _ in range(self.n_tasks)]\n        )\n        self.task_active = np.ones(self.n_tasks, dtype=bool)\n        self.agent_targets = [-1] * self.n_agents\n        self.time_step, self.tasks_completed = 0, 0\n        self.congestion_events = 0\n        return self.get_state()\n\n    def get_state(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        task_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        for i, pos in enumerate(self.task_positions):\n            if self.task_active[i]:\n                task_grid[pos[0], pos[1]] += 1\n        return np.stack([agent_grid, task_grid], axis=0)\n\n    def count_congestion_events(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        return np.sum(agent_grid > 2)\n\n    def compute_congestion(self, lookahead=5):\n        congestion = np.zeros((self.grid_size, self.grid_size))\n        for i, agent_pos in enumerate(self.agent_positions):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                path = self._get_path(agent_pos, self.task_positions[target_idx])\n                for step, pos in enumerate(path[:lookahead]):\n                    congestion[pos[0], pos[1]] += 1.0 / (step + 1)\n        return congestion\n\n    def _get_path(self, start, end):\n        path, current = [tuple(start)], np.array(start)\n        max_steps = self.grid_size * 2\n        for _ in range(max_steps):\n            if np.array_equal(current, end):\n                break\n            diff = end - current\n            moved = False\n            for d in [0, 1]:\n                if diff[d] != 0:\n                    new_pos = current.copy()\n                    new_pos[d] += np.sign(diff[d])\n                    if self._valid_position(new_pos):\n                        current = new_pos\n                        moved = True\n                        break\n            if not moved:\n                break\n            path.append(tuple(current))\n        return path\n\n    def assign_tasks(self, assignment):\n        for agent_idx, task_idx in assignment:\n            if task_idx >= 0 and self.task_active[task_idx]:\n                self.agent_targets[agent_idx] = task_idx\n\n    def step(self):\n        self.time_step += 1\n        self.congestion_events += self.count_congestion_events()\n        for i in range(self.n_agents):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                target_pos = self.task_positions[target_idx]\n                diff = target_pos - self.agent_positions[i]\n                if np.sum(np.abs(diff)) <= 1:\n                    self.task_active[target_idx] = False\n                    self.tasks_completed += 1\n                    self.agent_targets[i] = -1\n                else:\n                    move = np.zeros(2, dtype=int)\n                    for d in [0, 1]:\n                        if diff[d] != 0:\n                            new_pos = self.agent_positions[i].copy()\n                            new_pos[d] += np.sign(diff[d])\n                            if self._valid_position(new_pos):\n                                move[d] = np.sign(diff[d])\n                                break\n                    self.agent_positions[i] = np.clip(\n                        self.agent_positions[i] + move, 0, self.grid_size - 1\n                    )\n                    self.agent_velocities[i] = move\n        for idx in np.where(~self.task_active)[0]:\n            if np.random.random() < 0.3:\n                self.task_positions[idx] = self._hotspot_biased_position()\n                self.task_active[idx] = True\n        return self.get_state()\n\n\ndef create_sparse_warehouse(grid_size=20):\n    obstacles = set()\n    for i in range(5, 15, 5):\n        for j in range(3, grid_size - 3, 4):\n            obstacles.add((i, j))\n    hotspots = [np.array([5, 5]), np.array([15, 15])]\n    return obstacles, hotspots, \"sparse_warehouse\"\n\n\ndef create_bottleneck_warehouse(grid_size=20):\n    obstacles = set()\n    for i in range(grid_size):\n        if i not in [9, 10]:\n            obstacles.add((i, 10))\n    for j in range(grid_size):\n        if j not in [9, 10]:\n            obstacles.add((10, j))\n    hotspots = [\n        np.array([5, 5]),\n        np.array([5, 15]),\n        np.array([15, 5]),\n        np.array([15, 15]),\n    ]\n    return obstacles, hotspots, \"bottleneck_warehouse\"\n\n\ndef create_dense_obstacle_warehouse(grid_size=20):\n    obstacles = set()\n    np.random.seed(42)\n    for _ in range(int(grid_size * grid_size * 0.15)):\n        pos = (np.random.randint(1, grid_size - 1), np.random.randint(1, grid_size - 1))\n        obstacles.add(pos)\n    hotspots = [\n        np.array([3, 3]),\n        np.array([16, 16]),\n        np.array([3, 16]),\n        np.array([16, 3]),\n    ]\n    return obstacles, hotspots, \"dense_obstacle_warehouse\"\n\n\nclass CongestionPredictor(nn.Module):\n    def __init__(self, grid_size=20, hidden_dim=64):\n        super().__init__()\n        self.conv1 = nn.Conv2d(2, hidden_dim, 3, padding=1)\n        self.conv2 = nn.Conv2d(hidden_dim, hidden_dim, 3, padding=1)\n        self.conv3 = nn.Conv2d(hidden_dim, 1, 3, padding=1)\n        self.relu = nn.ReLU()\n\n    def forward(self, x):\n        x = self.relu(self.conv1(x))\n        x = self.relu(self.conv2(x))\n        return torch.sigmoid(self.conv3(x))\n\n\ndef generate_training_data(\n    n_samples=500, grid_size=20, n_agents=20, n_tasks=30, obstacles=None, hotspots=None\n):\n    states, congestions = [], []\n    for _ in range(n_samples):\n        sim = WarehouseSimulator(grid_size, n_agents, n_tasks, obstacles, hotspots)\n        state = sim.get_state()\n        active_tasks = np.where(sim.task_active)[0]\n        sim.assign_tasks(\n            [(i, active_tasks[i]) for i in range(min(n_agents, len(active_tasks)))]\n        )\n        congestion = sim.compute_congestion(lookahead=5)\n        congestion = congestion / (congestion.max() + 1e-6)\n        states.append(state)\n        congestions.append(congestion)\n    return np.array(states), np.array(congestions)\n\n\ndef distance_based_assignment(\n    agent_positions, task_positions, task_active, obstacles=None\n):\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    cost_matrix = np.array(\n        [\n            [np.sum(np.abs(ap - task_positions[ti])) for ti in active_indices]\n            for ap in agent_positions\n        ]\n    )\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef congestion_aware_assignment(\n    agent_positions,\n    task_positions,\n    task_active,\n    congestion_map,\n    congestion_weight=0.5,\n    obstacles=None,\n):\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    grid_size = congestion_map.shape[0]\n    cost_matrix = np.zeros((len(agent_positions), len(active_indices)))\n    for i, agent_pos in enumerate(agent_positions):\n        for j, task_idx in enumerate(active_indices):\n            task_pos = task_positions[task_idx]\n            distance = np.sum(np.abs(agent_pos - task_pos))\n            path_congestion, current = 0, agent_pos.copy()\n            for _ in range(grid_size * 2):\n                if np.array_equal(current, task_pos):\n                    break\n                diff = task_pos - current\n                if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                    current[0] += np.sign(diff[0])\n                elif diff[1] != 0:\n                    current[1] += np.sign(diff[1])\n                current = np.clip(current, 0, grid_size - 1)\n                path_congestion += congestion_map[current[0], current[1]]\n            cost_matrix[i, j] = distance + congestion_weight * path_congestion\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef train_predictor(\n    model,\n    train_states,\n    train_congestions,\n    val_states,\n    val_congestions,\n    epochs=30,\n    batch_size=32,\n):\n    model = model.to(device)\n    optimizer = optim.Adam(model.parameters(), lr=0.001)\n    criterion = nn.MSELoss()\n    train_states_t = torch.FloatTensor(train_states).to(device)\n    train_congestions_t = torch.FloatTensor(train_congestions).unsqueeze(1).to(device)\n    val_states_t = torch.FloatTensor(val_states).to(device)\n    val_congestions_t = torch.FloatTensor(val_congestions).unsqueeze(1).to(device)\n    n_train = len(train_states)\n    train_losses, val_losses = [], []\n    for epoch in range(epochs):\n        model.train()\n        perm = torch.randperm(n_train)\n        train_loss, n_batches = 0, 0\n        for i in range(0, n_train, batch_size):\n            idx = perm[i : i + batch_size]\n            optimizer.zero_grad()\n            loss = criterion(model(train_states_t[idx]), train_congestions_t[idx])\n            loss.backward()\n            optimizer.step()\n            train_loss += loss.item()\n            n_batches += 1\n        train_loss /= n_batches\n        model.eval()\n        with torch.no_grad():\n            val_loss = criterion(model(val_states_t), val_congestions_t).item()\n        train_losses.append(train_loss)\n        val_losses.append(val_loss)\n        if epoch % 10 == 0 or epoch == epochs - 1:\n            print(\n                f\"Epoch {epoch}: train_loss = {train_loss:.4f}, validation_loss = {val_loss:.4f}\"\n            )\n    return model, train_losses, val_losses\n\n\ndef evaluate_method(method, model, sim_params, n_episodes=5, max_steps=100):\n    throughputs, congestion_events_list = [], []\n    for _ in range(n_episodes):\n        sim = WarehouseSimulator(**sim_params)\n        for step in range(max_steps):\n            state = sim.get_state()\n            unassigned = [\n                i\n                for i in range(sim.n_agents)\n                if sim.agent_targets[i] < 0 or not sim.task_active[sim.agent_targets[i]]\n            ]\n            if len(unassigned) > 0 and np.any(sim.task_active):\n                if method == \"distance\":\n                    assignment = distance_based_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                        sim.obstacles,\n                    )\n                else:\n                    state_tensor = torch.FloatTensor(state).unsqueeze(0).to(device)\n                    with torch.no_grad():\n                        congestion_pred = model(state_tensor).squeeze().cpu().numpy()\n                    assignment = congestion_aware_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                        congestion_pred,\n                        congestion_weight=0.5,\n                        obstacles=sim.obstacles,\n                    )\n                sim.assign_tasks([(unassigned[a], t) for a, t in assignment])\n            sim.step()\n        throughputs.append(sim.tasks_completed / (max_steps / 60.0))\n        congestion_events_list.append(sim.congestion_events)\n    return (\n        np.mean(throughputs),\n        np.std(throughputs),\n        np.mean(congestion_events_list),\n        np.std(congestion_events_list),\n    )\n\n\n# Generate training data\nprint(\"Creating three distinct warehouse datasets...\")\ndatasets = [\n    create_sparse_warehouse(),\n    create_bottleneck_warehouse(),\n    create_dense_obstacle_warehouse(),\n]\n\nall_train_states, all_train_congestions = [], []\nfor obstacles, hotspots, name in datasets:\n    print(f\"  Generating data for: {name}\")\n    states, congestions = generate_training_data(\n        n_samples=300, obstacles=obstacles, hotspots=hotspots\n    )\n    all_train_states.append(states)\n    all_train_congestions.append(congestions)\n\ntrain_states = np.concatenate(all_train_states[:2] + [all_train_states[2][:200]])\ntrain_congestions = np.concatenate(\n    all_train_congestions[:2] + [all_train_congestions[2][:200]]\n)\nval_states = np.concatenate([all_train_states[2][200:]])\nval_congestions = np.concatenate([all_train_congestions[2][200:]])\nprint(f\"Training data: {train_states.shape}, Validation data: {val_states.shape}\")\n\n# Hyperparameter tuning: epochs\nepoch_values = [30, 60, 90, 120]\nagent_counts = [20, 30, 40, 50]\nmax_steps = 100\n\nprint(\"\\n\" + \"=\" * 70)\nprint(\"HYPERPARAMETER TUNING: EPOCHS\")\nprint(\"=\" * 70)\n\nbest_overall_improvement = -float(\"inf\")\nbest_epochs = None\nbest_model = None\n\nfor epochs in epoch_values:\n    print(f\"\\n{'='*50}\")\n    print(f\"Training with epochs={epochs}\")\n    print(\"=\" * 50)\n\n    experiment_data[\"epoch_tuning\"][epochs] = {\n        \"training\": {\"losses\": {\"train\": [], \"val\": []}, \"epochs\": list(range(epochs))},\n        \"datasets\": {},\n        \"final_val_loss\": None,\n    }\n\n    model = CongestionPredictor(grid_size=20, hidden_dim=64)\n    model, train_losses, val_losses = train_predictor(\n        model,\n        train_states,\n        train_congestions,\n        val_states,\n        val_congestions,\n        epochs=epochs,\n    )\n\n    experiment_data[\"epoch_tuning\"][epochs][\"training\"][\"losses\"][\n        \"train\"\n    ] = train_losses\n    experiment_data[\"epoch_tuning\"][epochs][\"training\"][\"losses\"][\"val\"] = val_losses\n    experiment_data[\"epoch_tuning\"][epochs][\"final_val_loss\"] = val_losses[-1]\n\n    # Evaluate on all datasets\n    all_improvements = []\n    for obstacles, hotspots, dataset_name in datasets:\n        print(f\"\\n--- Dataset: {dataset_name} ---\")\n        experiment_data[\"epoch_tuning\"][epochs][\"datasets\"][dataset_name] = {\n            \"distance_based\": {\n                \"throughput\": [],\n                \"std\": [],\n                \"congestion\": [],\n                \"congestion_std\": [],\n            },\n            \"congestion_aware\": {\n                \"throughput\": [],\n                \"std\": [],\n                \"congestion\": [],\n                \"congestion_std\": [],\n            },\n            \"improvement\": [],\n            \"congestion_prevention_rate\": [],\n            \"n_agents\": agent_counts,\n        }\n\n        for n_agents in agent_counts:\n            sim_params = {\n                \"grid_size\": 20,\n                \"n_agents\": n_agents,\n                \"n_tasks\": 30,\n                \"obstacles\": obstacles,\n                \"hotspots\": hotspots,\n            }\n            dist_tp, dist_std, dist_cong, dist_cong_std = evaluate_method(\n                \"distance\", None, sim_params, n_episodes=5, max_steps=max_steps\n            )\n            cata_tp, cata_std, cata_cong, cata_cong_std = evaluate_method(\n                \"congestion_aware\", model, sim_params, n_episodes=5, max_steps=max_steps\n            )\n\n            improvement = (cata_tp - dist_tp) / dist_tp * 100 if dist_tp > 0 else 0\n            cpr = (dist_cong - cata_cong) / dist_cong * 100 if dist_cong > 0 else 0\n\n            experiment_data[\"epoch_tuning\"][epochs][\"datasets\"][dataset_name][\n                \"distance_based\"\n            ][\"throughput\"].append(dist_tp)\n            experiment_data[\"epoch_tuning\"][epochs][\"datasets\"][dataset_name][\n                \"distance_based\"\n            ][\"std\"].append(dist_std)\n            experiment_data[\"epoch_tuning\"][epochs][\"datasets\"][dataset_name][\n                \"distance_based\"\n            ][\"congestion\"].append(dist_cong)\n            experiment_data[\"epoch_tuning\"][epochs][\"datasets\"][dataset_name][\n                \"distance_based\"\n            ][\"congestion_std\"].append(dist_cong_std)\n            experiment_data[\"epoch_tuning\"][epochs][\"datasets\"][dataset_name][\n                \"congestion_aware\"\n            ][\"throughput\"].append(cata_tp)\n            experiment_data[\"epoch_tuning\"][epochs][\"datasets\"][dataset_name][\n                \"congestion_aware\"\n            ][\"std\"].append(cata_std)\n            experiment_data[\"epoch_tuning\"][epochs][\"datasets\"][dataset_name][\n                \"congestion_aware\"\n            ][\"congestion\"].append(cata_cong)\n            experiment_data[\"epoch_tuning\"][epochs][\"datasets\"][dataset_name][\n                \"congestion_aware\"\n            ][\"congestion_std\"].append(cata_cong_std)\n            experiment_data[\"epoch_tuning\"][epochs][\"datasets\"][dataset_name][\n                \"improvement\"\n            ].append(improvement)\n            experiment_data[\"epoch_tuning\"][epochs][\"datasets\"][dataset_name][\n                \"congestion_prevention_rate\"\n            ].append(cpr)\n            all_improvements.append(improvement)\n\n            print(\n                f\"  Agents={n_agents}: Dist TP={dist_tp:.1f}\u00b1{dist_std:.1f}, CATA TP={cata_tp:.1f}\u00b1{cata_std:.1f}, Imp={improvement:.1f}%\"\n            )\n\n    overall_improvement = np.mean(all_improvements)\n    experiment_data[\"epoch_tuning\"][epochs][\"overall_improvement\"] = overall_improvement\n    print(f\"\\nEpochs={epochs}: Overall improvement = {overall_improvement:.2f}%\")\n\n    if overall_improvement > best_overall_improvement:\n        best_overall_improvement = overall_improvement\n        best_epochs = epochs\n        best_model = model\n\nexperiment_data[\"best_epochs\"] = best_epochs\nexperiment_data[\"best_improvement\"] = best_overall_improvement\n\n# Summary\nprint(\"\\n\" + \"=\" * 70)\nprint(\"EPOCH TUNING SUMMARY\")\nprint(\"=\" * 70)\nfor epochs in epoch_values:\n    data = experiment_data[\"epoch_tuning\"][epochs]\n    print(\n        f\"Epochs={epochs}: Final Val Loss={data['final_val_loss']:.4f}, Overall Improvement={data['overall_improvement']:.2f}%\"\n    )\n\nprint(f\"\\nBest epochs: {best_epochs} with improvement: {best_overall_improvement:.2f}%\")\nprint(f\"throughput_improvement_percentage = {best_overall_improvement:.2f}%\")\n\n# Plotting\nfig, axes = plt.subplots(2, 3, figsize=(15, 10))\ncolors_epochs = {30: \"blue\", 60: \"orange\", 90: \"green\", 120: \"red\"}\n\n# Training loss comparison\nfor epochs in epoch_values:\n    data = experiment_data[\"epoch_tuning\"][epochs][\"training\"][\"losses\"]\n    axes[0, 0].plot(\n        data[\"train\"],\n        label=f\"Train (e={epochs})\",\n        color=colors_epochs[epochs],\n        alpha=0.7,\n    )\n    axes[0, 0].plot(\n        data[\"val\"],\n        \"--\",\n        label=f\"Val (e={epochs})\",\n        color=colors_epochs[epochs],\n        alpha=0.7,\n    )\naxes[0, 0].set_xlabel(\"Epoch\")\naxes[0, 0].set_ylabel(\"Loss\")\naxes[0, 0].set_title(\"Training Curves for Different Epoch Counts\")\naxes[0, 0].legend(fontsize=7)\n\n# Final validation loss vs epochs\nfinal_val_losses = [\n    experiment_data[\"epoch_tuning\"][e][\"final_val_loss\"] for e in epoch_values\n]\naxes[0, 1].bar(\n    range(len(epoch_values)),\n    final_val_losses,\n    color=[colors_epochs[e] for e in epoch_values],\n)\naxes[0, 1].set_xticks(range(len(epoch_values)))\naxes[0, 1].set_xticklabels(epoch_values)\naxes[0, 1].set_xlabel(\"Epochs\")\naxes[0, 1].set_ylabel(\"Final Validation Loss\")\naxes[0, 1].set_title(\"Final Validation Loss by Epoch Count\")\n\n# Overall improvement vs epochs\noverall_improvements = [\n    experiment_data[\"epoch_tuning\"][e][\"overall_improvement\"] for e in epoch_values\n]\naxes[0, 2].bar(\n    range(len(epoch_values)),\n    overall_improvements,\n    color=[colors_epochs[e] for e in epoch_values],\n)\naxes[0, 2].set_xticks(range(len(epoch_values)))\naxes[0, 2].set_xticklabels(epoch_values)\naxes[0, 2].set_xlabel(\"Epochs\")\naxes[0, 2].set_ylabel(\"Overall Improvement (%)\")\naxes[0, 2].set_title(\"Overall Improvement by Epoch Count\")\naxes[0, 2].axhline(y=0, color=\"r\", linestyle=\"--\")\n\n# Improvement by dataset for each epoch count\ndataset_names = [\"sparse_warehouse\", \"bottleneck_warehouse\", \"dense_obstacle_warehouse\"]\nx = np.arange(len(dataset_names))\nwidth = 0.2\nfor i, epochs in enumerate(epoch_values):\n    avg_imps = [\n        np.mean(experiment_data[\"epoch_tuning\"][epochs][\"datasets\"][d][\"improvement\"])\n        for d in dataset_names\n    ]\n    axes[1, 0].bar(\n        x + i * width, avg_imps, width, label=f\"e={epochs}\", color=colors_epochs[epochs]\n    )\naxes[1, 0].set_xticks(x + width * 1.5)\naxes[1, 0].set_xticklabels([\"Sparse\", \"Bottleneck\", \"Dense\"], fontsize=9)\naxes[1, 0].set_ylabel(\"Avg Improvement (%)\")\naxes[1, 0].set_title(\"Improvement by Dataset & Epochs\")\naxes[1, 0].legend(fontsize=8)\naxes[1, 0].axhline(y=0, color=\"r\", linestyle=\"--\")\n\n# CPR by dataset for each epoch count\nfor i, epochs in enumerate(epoch_values):\n    avg_cprs = [\n        np.mean(\n            experiment_data[\"epoch_tuning\"][epochs][\"datasets\"][d][\n                \"congestion_prevention_rate\"\n            ]\n        )\n        for d in dataset_names\n    ]\n    axes[1, 1].bar(\n        x + i * width, avg_cprs, width, label=f\"e={epochs}\", color=colors_epochs[epochs]\n    )\naxes[1, 1].set_xticks(x + width * 1.5)\naxes[1, 1].set_xticklabels([\"Sparse\", \"Bottleneck\", \"Dense\"], fontsize=9)\naxes[1, 1].set_ylabel(\"Avg Congestion Prevention Rate (%)\")\naxes[1, 1].set_title(\"CPR by Dataset & Epochs\")\naxes[1, 1].legend(fontsize=8)\naxes[1, 1].axhline(y=0, color=\"r\", linestyle=\"--\")\n\n# Throughput comparison for best epoch count\naxes[1, 2].set_title(f\"Best Model (epochs={best_epochs}) Throughput\")\ncolors_ds = {\n    \"sparse_warehouse\": \"blue\",\n    \"bottleneck_warehouse\": \"orange\",\n    \"dense_obstacle_warehouse\": \"green\",\n}\nfor dataset_name in dataset_names:\n    data = experiment_data[\"epoch_tuning\"][best_epochs][\"datasets\"][dataset_name]\n    axes[1, 2].plot(\n        data[\"n_agents\"],\n        data[\"congestion_aware\"][\"throughput\"],\n        \"o-\",\n        color=colors_ds[dataset_name],\n        label=f\"CATA-{dataset_name[:8]}\",\n    )\n    axes[1, 2].plot(\n        data[\"n_agents\"],\n        data[\"distance_based\"][\"throughput\"],\n        \"x--\",\n        color=colors_ds[dataset_name],\n        alpha=0.5,\n    )\naxes[1, 2].set_xlabel(\"Number of Agents\")\naxes[1, 2].set_ylabel(\"Throughput (tasks/min)\")\naxes[1, 2].legend(fontsize=8)\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"epoch_tuning_results.png\"), dpi=150)\nplt.close()\n\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(f\"\\nResults saved to {working_dir}\")\n", "import os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.optim as optim\nimport matplotlib.pyplot as plt\nfrom collections import defaultdict\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\nexperiment_data = {}\n\n\ndef greedy_assignment(cost_matrix):\n    n_agents, n_tasks = cost_matrix.shape\n    row_ind, col_ind = [], []\n    assigned_tasks, assigned_agents = set(), set()\n    pairs = [(cost_matrix[i, j], i, j) for i in range(n_agents) for j in range(n_tasks)]\n    pairs.sort()\n    for cost, i, j in pairs:\n        if i not in assigned_agents and j not in assigned_tasks:\n            row_ind.append(i)\n            col_ind.append(j)\n            assigned_agents.add(i)\n            assigned_tasks.add(j)\n            if len(assigned_agents) == min(n_agents, n_tasks):\n                break\n    return np.array(row_ind), np.array(col_ind)\n\n\nclass WarehouseSimulator:\n    def __init__(\n        self, grid_size=20, n_agents=20, n_tasks=30, obstacles=None, hotspots=None\n    ):\n        self.grid_size, self.n_agents, self.n_tasks = grid_size, n_agents, n_tasks\n        self.obstacles = obstacles if obstacles else set()\n        self.hotspots = hotspots if hotspots else []\n
