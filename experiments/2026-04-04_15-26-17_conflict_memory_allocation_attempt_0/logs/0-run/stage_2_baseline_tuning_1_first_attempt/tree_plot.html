      if (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost') {
          let lastModified = '';

          // Check for file changes every second
          setInterval(async () => {
              try {
                  const response = await fetch(window.location.href, { method: 'HEAD' });
                  // get a timestamp that shows when the file was last changed
                  const currentModified = response.headers.get('last-modified');

                  if (lastModified && lastModified !== currentModified) {
                      window.location.reload();
                  }

                  lastModified = currentModified;
              } catch (e) {
                  console.error('Error checking for updates:', e);
              }
          }, 1000);
      }

      const bgCol = "#FFFFFF";
const accentCol = "#1a439e";

hljs.initHighlightingOnLoad();

// Function to update background color globally
function updateBackgroundColor(color) {
  // Update the JS variable
  window.bgColCurrent = color;

  // Update body background
  document.body.style.backgroundColor = color;

  // Update canvas container background
  const canvasContainer = document.getElementById('canvas-container');
  if (canvasContainer) {
    canvasContainer.style.backgroundColor = color;
  }
}

// Store tree data for each stage
const stageData = {
  Stage_1: null,
  Stage_2: null,
  Stage_3: null,
  Stage_4: null
};

// Keep track of current selected stage
let currentStage = null;
let currentSketch = null;
let availableStages = [];

// Class definitions for nodes and edges
class Node {
  constructor(x, y, id, isRoot = false) {
    this.x = x;
    this.y = y;
    this.id = id;
    this.visible = isRoot; // Only root nodes are visible initially
    this.appearProgress = 0;
    this.popEffect = 0;
    this.selected = false;
    this.isRootNode = isRoot;
  }

  update() {
    if (this.visible) {
      // Handle the main appearance animation
      if (this.appearProgress < 1) {
        this.appearProgress += 0.06;

        // When we reach full size, trigger the pop effect
        if (this.appearProgress >= 1) {
          this.appearProgress = 1; // Cap at 1
          this.popEffect = 1; // Start the pop effect
        }
      }

      // Handle the pop effect animation
      if (this.popEffect > 0) {
        this.popEffect -= 0.15; // Control how quickly it shrinks back
        if (this.popEffect < 0) this.popEffect = 0; // Don't go negative
      }
    }
  }

  startAnimation() {
    this.visible = true;
  }

  color() {
    if (this.selected) {
      return accentCol; // Use the global accent color variable for selected node
    }
    return '#4263eb'; // Default blue color
  }

  render(p5) {
    if (this.visible) {
      const popBonus = this.popEffect * 0.1;
      const nodeScale = p5.map(this.appearProgress, 0, 1, 0, 1) + popBonus;
      const alpha = p5.map(this.appearProgress, 0, 1, 0, 255);

      p5.push();
      p5.translate(this.x, this.y);

      // Shadow effect
      p5.noStroke();
      p5.rectMode(p5.CENTER);

      for (let i = 1; i <= 4; i++) {
        p5.fill(0, 0, 0, alpha * 0.06);
        p5.rect(i, i, 30 * nodeScale, 30 * nodeScale, 10);
      }

      // Main square - use node's color with alpha
      let nodeColor = p5.color(this.color());
      nodeColor.setAlpha(alpha);
      p5.fill(nodeColor);
      p5.rect(0, 0, 30 * nodeScale, 30 * nodeScale, 10);

      // Draw checkmark icon if the node is selected
      if (this.selected && this.appearProgress >= 1) {
        p5.stroke(255);
        p5.strokeWeight(2 * nodeScale);
        p5.noFill();
        // Draw checkmark
        p5.beginShape();
        p5.vertex(-8, 0);
        p5.vertex(-3, 5);
        p5.vertex(8, -6);
        p5.endShape();
      }

      p5.pop();
    }
  }

  isMouseOver(p5) {
    return this.visible &&
           p5.mouseX > this.x - 15 &&
           p5.mouseX < this.x + 15 &&
           p5.mouseY > this.y - 15 &&
           p5.mouseY < this.y + 15;
  }

  // Connect this node to a child node
  child(childNode) {
    // Create an edge from this node to the child
    let isLeft = childNode.x < this.x;
    let isRight = childNode.x > this.x;
    let edge = new Edge(this, childNode, isLeft, isRight);
    return edge;
  }
}

class Edge {
  constructor(parent, child, isLeft, isRight) {
    this.parent = parent;
    this.child = child;
    this.isLeft = isLeft;
    this.isRight = isRight;
    this.progress = 0;

    // Calculate the midpoint where branching occurs
    this.midY = parent.y + (child.y - parent.y) * 0.6;

    // Use the actual child x-coordinate
    // This ensures the edge will connect directly to the child node
    this.branchX = child.x;
  }

  update() {
    if (this.parent.visible && this.progress < 1) {
      this.progress += 0.01; // Adjust animation speed
    }
    if (this.progress >= 1) {
      this.child.visible = true;
    }
  }

  color() {
    return this.child.color();
  }

  render(p5) {
    if (!this.parent.visible) return;

    // Calculate path lengths
    const verticalDist1 = this.midY - this.parent.y;
    const horizontalDist = Math.abs(this.branchX - this.parent.x);
    const verticalDist2 = this.child.y - this.midY;
    const totalLength = verticalDist1 + horizontalDist + verticalDist2;

    // Calculate how much of each segment to draw
    const currentLength = totalLength * this.progress;

    p5.stroke(180, 190, 205);
    p5.strokeWeight(1.5);
    p5.noFill();

    // Always draw the first vertical segment from parent
    if (currentLength > 0) {
      const firstSegmentLength = Math.min(currentLength, verticalDist1);
      const currentMidY = p5.lerp(this.parent.y, this.midY, firstSegmentLength / verticalDist1);
      p5.line(this.parent.x, this.parent.y, this.parent.x, currentMidY);
    }

    if (currentLength > verticalDist1) {
      // Draw second segment (horizontal)
      const secondSegmentLength = Math.min(currentLength - verticalDist1, horizontalDist);
      const currentBranchX = p5.lerp(this.parent.x, this.branchX, secondSegmentLength / horizontalDist);
      p5.line(this.parent.x, this.midY, currentBranchX, this.midY);

      if (currentLength > verticalDist1 + horizontalDist) {
        // Draw third segment (vertical to child)
        const thirdSegmentLength = currentLength - verticalDist1 - horizontalDist;
        const currentChildY = p5.lerp(this.midY, this.child.y, thirdSegmentLength / verticalDist2);
        p5.line(this.branchX, this.midY, this.branchX, currentChildY);
      }
    }
  }
}

// Create a modified sketch for each stage
function createTreeSketch(stageId) {
  return function(p5) {
    let nodes = [];
    let edges = [];
    let treeData = stageData[stageId];

    p5.setup = function() {
      const canvas = p5.createCanvas(p5.windowWidth * 0.4, p5.windowHeight);
      canvas.parent('canvas-container');
      p5.smooth();
      p5.frameRate(60);

      if (treeData) {
        createTreeFromData(treeData);
      }
    };

    p5.windowResized = function() {
      p5.resizeCanvas(p5.windowWidth * 0.4, p5.windowHeight);
    };

    function createTreeFromData(data) {
      // Clear existing nodes and edges
      nodes = [];
      edges = [];

      // Add defensive checks to prevent errors
      if (!data || !data.layout || !Array.isArray(data.layout) || !data.edges || !Array.isArray(data.edges)) {
        console.error("Invalid tree data format:", data);
        return; // Exit if data structure is invalid
      }

      // Find all parent nodes in edges
      const parentNodes = new Set();
      for (const [parentId, childId] of data.edges) {
        parentNodes.add(parentId);
      }

      // Create nodes
      for (let i = 0; i < data.layout.length; i++) {
        const [nx, ny] = data.layout[i];
        // A node is a root if it's a parent and not a child in any edge
        const isRoot = parentNodes.has(i) && data.edges.every(edge => edge[1] !== i);

        const node = new Node(
          nx * p5.width * 0.8 + p5.width * 0.1,
          ny * p5.height * 0.8 + p5.height * 0.1,
          i,
          isRoot
        );
        nodes.push(node);
      }

      // If no root was found, make the first parent node visible
      if (!nodes.some(node => node.visible) && parentNodes.size > 0) {
        // Get the first parent node
        const firstParentId = [...parentNodes][0];
        if (nodes[firstParentId]) {
          nodes[firstParentId].visible = true;
        }
      }

      // Create edges
      for (const [parentId, childId] of data.edges) {
        const parent = nodes[parentId];
        const child = nodes[childId];
        if (parent && child) { // Verify both nodes exist
          const isLeft = child.x < parent.x;
          const isRight = child.x > parent.x;
          edges.push(new Edge(parent, child, isLeft, isRight));
        }
      }

      // Select the first node by default
      if (nodes.length > 0) {
        nodes[0].selected = true;
        updateNodeInfo(0);
      }
    }

    p5.draw = function() {
      // Use the global background color if available, otherwise use the default bgCol
      const currentBgColor = window.bgColCurrent || bgCol;
      p5.background(currentBgColor);

      // Update and render edges
      for (const edge of edges) {
        edge.update();
        edge.render(p5);
      }

      // Update and render nodes
      for (const node of nodes) {
        node.update();
        node.render(p5);
      }

      // Handle mouse hover
      p5.cursor(p5.ARROW);
      for (const node of nodes) {
        if (node.isMouseOver(p5)) {
          p5.cursor(p5.HAND);
        }
      }
    };

    p5.mousePressed = function() {
      // Check if any node was clicked
      for (let i = 0; i < nodes.length; i++) {
        if (nodes[i].visible && nodes[i].isMouseOver(p5)) {
          // Deselect all nodes
          nodes.forEach(n => n.selected = false);
          // Select the clicked node
          nodes[i].selected = true;
          // Update the right panel with node info
          updateNodeInfo(i);
          break;
        }
      }
    };

    function updateNodeInfo(nodeIndex) {
      if (treeData) {
        setNodeInfo(
          treeData.code[nodeIndex],
          treeData.plan[nodeIndex],
          treeData.plot_code?.[nodeIndex],
          treeData.plot_plan?.[nodeIndex],
          treeData.metrics?.[nodeIndex],
          treeData.exc_type?.[nodeIndex] || '',
          treeData.exc_info?.[nodeIndex]?.args?.[0] || '',
          treeData.exc_stack?.[nodeIndex] || [],
          treeData.plots?.[nodeIndex] || [],
          treeData.plot_analyses?.[nodeIndex] || [],
          treeData.vlm_feedback_summary?.[nodeIndex] || '',
          treeData.datasets_successfully_tested?.[nodeIndex] || [],
          treeData.exec_time_feedback?.[nodeIndex] || '',
          treeData.exec_time?.[nodeIndex] || ''
        );
      }
    }
  };
}

// Start a new p5 sketch for the given stage
function startSketch(stageId) {
  if (currentSketch) {
    currentSketch.remove();
  }

  if (stageData[stageId]) {
    currentSketch = new p5(createTreeSketch(stageId));

    // Update stage info
    const stageNumber = stageId.split('_')[1];
    let stageDesc = '';
    switch(stageId) {
      case 'Stage_1': stageDesc = 'Preliminary Investigation'; break;
      case 'Stage_2': stageDesc = 'Baseline Tuning'; break;
      case 'Stage_3': stageDesc = 'Research Agenda Execution'; break;
      case 'Stage_4': stageDesc = 'Ablation Studies'; break;
    }

    document.getElementById('stage-info').innerHTML =
      `<strong>Current Stage: ${stageNumber} - ${stageDesc}</strong>`;
  }
}

// Handle tab selection
function selectStage(stageId) {
  if (!stageData[stageId] || !availableStages.includes(stageId)) {
    return; // Don't allow selection of unavailable stages
  }

  // Update active tab styles
  document.querySelectorAll('.tab').forEach(tab => {
    tab.classList.remove('active');
  });
  document.querySelector(`.tab[data-stage="${stageId}"]`).classList.add('active');

  // Start the new sketch
  currentStage = stageId;
  startSketch(stageId);
}

// Function to load the tree data for all stages
async function loadAllStageData(baseTreeData) {
  console.log("Loading stage data with base data:", baseTreeData);

  // The base tree data is for the current stage
  const currentStageId = baseTreeData.current_stage || 'Stage_1';

  // Ensure base tree data is valid and has required properties
  if (baseTreeData && baseTreeData.layout && baseTreeData.edges) {
    stageData[currentStageId] = baseTreeData;
    availableStages.push(currentStageId);
    console.log(`Added current stage ${currentStageId} to available stages`);
  } else {
    console.warn(`Current stage ${currentStageId} data is invalid:`, baseTreeData);
  }

  // Use relative path to load other stage trees
  const logDirPath = baseTreeData.log_dir_path || '.';
  console.log("Log directory path:", logDirPath);

  // Load data for each stage if available
  const stageNames = ['Stage_1', 'Stage_2', 'Stage_3', 'Stage_4'];
  const stageNames2actualNames = {
    'Stage_1': 'stage_1_initial_implementation_1_preliminary',
    'Stage_2': 'stage_2_baseline_tuning_1_first_attempt',
    'Stage_3': 'stage_3_creative_research_1_first_attempt',
    'Stage_4': 'stage_4_ablation_studies_1_first_attempt'
    }

  for (const stage of stageNames) {

    if (baseTreeData.completed_stages && baseTreeData.completed_stages.includes(stage)) {
      try {
        console.log(`Attempting to load data for ${stage} from ${logDirPath}/${stageNames2actualNames[stage]}/tree_data.json`);
        const response = await fetch(`${logDirPath}/${stageNames2actualNames[stage]}/tree_data.json`);

        if (response.ok) {
          const data = await response.json();

          // Validate the loaded data
          if (data && data.layout && data.edges) {
            stageData[stage] = data;
            availableStages.push(stage);
            console.log(`Successfully loaded and validated data for ${stage}`);
          } else {
            console.warn(`Loaded data for ${stage} is invalid:`, data);
          }
        } else {
          console.warn(`Failed to load data for ${stage} - HTTP status ${response.status}`);
        }
      } catch (error) {
        console.error(`Error loading data for ${stage}:`, error);
      }
    } else {
      console.log(`Skipping stage ${stage} - not in completed stages list:`, baseTreeData.completed_stages);
    }
  }

  // Update tab visibility based on available stages
  updateTabVisibility();

  // Start with the first available stage
  if (availableStages.length > 0) {
    selectStage(availableStages[0]);
  } else {
    console.warn("No stages available to display");
    // Display a message in the canvas area
    document.getElementById('canvas-container').innerHTML =
      '<div style="padding: 20px; color: #333; text-align: center;"><h3>No valid tree data available to display</h3></div>';
  }
}

// Update tab visibility based on available stages
function updateTabVisibility() {
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(tab => {
    const stageId = tab.getAttribute('data-stage');
    if (availableStages.includes(stageId)) {
      tab.classList.remove('disabled');
    } else {
      tab.classList.add('disabled');
    }
  });
}

// Utility function to set the node info in the right panel
const setNodeInfo = (code, plan, plot_code, plot_plan, metrics = null, exc_type = '', exc_info = '',
    exc_stack = [], plots = [], plot_analyses = [], vlm_feedback_summary = '',
    datasets_successfully_tested = [], exec_time_feedback = '', exec_time = '') => {
  const codeElm = document.getElementById("code");
  if (codeElm) {
    if (code) {
      codeElm.innerHTML = hljs.highlight(code, { language: "python" }).value;
    } else {
      codeElm.innerHTML = '<p>No code available</p>';
    }
  }

  const planElm = document.getElementById("plan");
  if (planElm) {
    if (plan) {
      planElm.innerHTML = hljs.highlight(plan, { language: "plaintext" }).value;
    } else {
      planElm.innerHTML = '<p>No plan available</p>';
    }
  }

  const plot_codeElm = document.getElementById("plot_code");
  if (plot_codeElm) {
    if (plot_code) {
      plot_codeElm.innerHTML = hljs.highlight(plot_code, { language: "python" }).value;
    } else {
      plot_codeElm.innerHTML = '<p>No plot code available</p>';
    }
  }

  const plot_planElm = document.getElementById("plot_plan");
  if (plot_planElm) {
    if (plot_plan) {
      plot_planElm.innerHTML = hljs.highlight(plot_plan, { language: "plaintext" }).value;
    } else {
      plot_planElm.innerHTML = '<p>No plot plan available</p>';
    }
  }

  const metricsElm = document.getElementById("metrics");
  if (metricsElm) {
      let metricsContent = `<h3>Metrics:</h3>`;
      if (metrics && metrics.metric_names) {
          for (const metric of metrics.metric_names) {
              metricsContent += `<div class="metric-group">`;
              metricsContent += `<h4>${metric.metric_name}</h4>`;
              metricsContent += `<p><strong>Description:</strong> ${metric.description || 'N/A'}</p>`;
              metricsContent += `<p><strong>Optimization:</strong> ${metric.lower_is_better ? 'Minimize' : 'Maximize'}</p>`;

              // Create table for dataset values
              metricsContent += `<table class="metric-table">
                  <tr>
                      <th>Dataset</th>
                      <th>Final Value</th>
                      <th>Best Value</th>
                  </tr>`;

              for (const dataPoint of metric.data) {
                  metricsContent += `<tr>
                      <td>${dataPoint.dataset_name}</td>
                      <td>${dataPoint.final_value?.toFixed(4) || 'N/A'}</td>
                      <td>${dataPoint.best_value?.toFixed(4) || 'N/A'}</td>
                  </tr>`;
              }

              metricsContent += `</table></div>`;
          }
      } else if (metrics === null) {
          metricsContent += `<p>No metrics available</p>`;
      }
      metricsElm.innerHTML = metricsContent;
  }

  // Add plots display
  const plotsElm = document.getElementById("plots");
  if (plotsElm) {
      if (plots && plots.length > 0) {
          let plotsContent = '';
          plots.forEach(plotPath => {
              plotsContent += `
                  <div class="plot-item">
                      <img src="${plotPath}" alt="Experiment Plot" onerror="console.error('Failed to load plot:', this.src)"/>
                  </div>`;
          });
          plotsElm.innerHTML = plotsContent;
      } else {
          plotsElm.innerHTML = '';
      }
  }

  // Add error info display
  const errorElm = document.getElementById("exc_info");
  if (errorElm) {
    if (exc_type) {
      let errorContent = `<h3 style="color: #ff5555">Exception Information:</h3>
                          <p><strong>Type:</strong> ${exc_type}</p>`;

      if (exc_info) {
        errorContent += `<p><strong>Details:</strong> <pre>${JSON.stringify(exc_info, null, 2)}</pre></p>`;
      }

      if (exc_stack) {
        errorContent += `<p><strong>Stack Trace:</strong> <pre>${exc_stack.join('\n')}</pre></p>`;
      }

      errorElm.innerHTML = errorContent;
    } else {
      errorElm.innerHTML = "No exception info available";
    }
  }

  const exec_timeElm = document.getElementById("exec_time");
  if (exec_timeElm) {
    let exec_timeContent = '<div id="exec_time"><h3>Execution Time (in seconds):</h3><p>' + exec_time + '</p></div>';
    exec_timeElm.innerHTML = exec_timeContent;
  }

  const exec_time_feedbackElm = document.getElementById("exec_time_feedback");
  if (exec_time_feedbackElm) {
    let exec_time_feedbackContent = '<div id="exec_time_feedback_content">'
    exec_time_feedbackContent += '<h3>Execution Time Feedback:</h3>'
    exec_time_feedbackContent += '<p>' + exec_time_feedback + '</p>'
    exec_time_feedbackContent += '</div>';
    exec_time_feedbackElm.innerHTML = exec_time_feedbackContent;
  }

  const vlm_feedbackElm = document.getElementById("vlm_feedback");
  if (vlm_feedbackElm) {
      let vlm_feedbackContent = '';

      if (plot_analyses && plot_analyses.length > 0) {
          vlm_feedbackContent += `<h3>Plot Analysis:</h3>`;
          plot_analyses.forEach(analysis => {
              if (analysis && analysis.plot_path) {  // Add null check
                  vlm_feedbackContent += `
                      <div class="plot-analysis">
                          <h4>Analysis for ${analysis.plot_path.split('/').pop()}</h4>
                          <p>${analysis.analysis || 'No analysis available'}</p>
                          <ul class="key-findings">
                              ${(analysis.key_findings || []).map(finding => `<li>${finding}</li>`).join('')}
                          </ul>
                      </div>`;
              } else {
                  console.warn('Received invalid plot analysis:', analysis);
                  vlm_feedbackContent += `
                      <div class="plot-analysis">
                          <p>Invalid plot analysis data received</p>
                      </div>`;
              }
          });
      }

      // Add actionable insights if available
      if (vlm_feedback_summary && typeof vlm_feedback_summary === 'string') {
          vlm_feedbackContent += `
              <div class="vlm_feedback">
                  <h3>VLM Feedback Summary:</h3>
                  <p>${vlm_feedback_summary}</p>
              </div>`;
      }

      console.log("Datasets successfully tested:", datasets_successfully_tested);
      if (datasets_successfully_tested && datasets_successfully_tested.length > 0) {
          vlm_feedbackContent += `
              <div id="datasets_successfully_tested">
                  <h3>Datasets Successfully Tested:</h3>
                  <p>${datasets_successfully_tested.join(', ')}</p>
              </div>`;
      }

      if (!vlm_feedbackContent) {
          vlm_feedbackContent = '<p>No insights available for this experiment.</p>';
      }

      vlm_feedbackElm.innerHTML = vlm_feedbackContent;
  }

  const datasets_successfully_testedElm = document.getElementById("datasets_successfully_tested");
  if (datasets_successfully_testedElm) {
      let datasets_successfully_testedContent = '';
      if (datasets_successfully_tested && datasets_successfully_tested.length > 0) {
          datasets_successfully_testedContent = `<h3>Datasets Successfully Tested:</h3><ul>`;
          datasets_successfully_tested.forEach(dataset => {
              datasets_successfully_testedContent += `<li>${dataset}</li>`;
          });
          datasets_successfully_testedContent += `</ul>`;
      } else {
          datasets_successfully_testedContent = '<p>No datasets tested yet</p>';
      }
      datasets_successfully_testedElm.innerHTML = datasets_successfully_testedContent;
  }
};

const treeStructData = {"edges": [[0, 8], [0, 11], [0, 12], [0, 4], [0, 1], [0, 2], [0, 3], [0, 9], [0, 6], [3, 7], [3, 5], [7, 10], [11, 15], [11, 14], [11, 16], [11, 13]], "layout": [[0.47058823529411764, 0.0], [0.0, 0.33333333333333337], [0.11764705882352941, 0.33333333333333337], [0.23529411764705882, 0.33333333333333337], [0.35294117647058826, 0.33333333333333337], [0.17647058823529413, 0.6666666666666667], [0.47058823529411764, 0.33333333333333337], [0.29411764705882354, 0.6666666666666667], [0.5882352941176471, 0.33333333333333337], [0.7058823529411765, 0.33333333333333337], [0.29411764705882354, 1.0], [0.8235294117647058, 0.33333333333333337], [0.9411764705882353, 0.33333333333333337], [0.6470588235294118, 0.6666666666666667], [0.7647058823529411, 0.6666666666666667], [0.8823529411764706, 0.6666666666666667], [1.0, 0.6666666666666667]], "plan": ["Based on the memory summary, I'll implement a clean CMA baseline that addresses\nthe key failure points: (1) using proper dependency checking with fallback\nassignment, (2) collecting richer conflict signals including edge conflicts and\nreservation pressure, (3) using stronger penalties tied to actual paths, and (4)\ntesting on a congested warehouse with chokepoints. The implementation will use a\ngrid warehouse with narrow corridors, A* pathfinding with reservation tables,\nprioritized planning that records all conflict attempts (not just final\ncollisions), and a conflict memory histogram updated from these signals. I'll\ncompare baseline greedy assignment against CMA-modified assignment on identical\nscenarios, with frozen memory after warmup. The penalty will be path-based:\nsumming conflict memory values along the expected shortest path between agent\nand task. I'll run multiple episodes to gather statistics and compute the\nmakespan improvement ratio.", "Hyperparam tuning name: n_warmup (training epochs). I'll implement\nhyperparameter tuning for the n_warmup parameter, testing values [50, 75, 100,\n150] to see if more warmup episodes (more conflict memory accumulation) leads to\nbetter makespan improvement ratios. The experiment will run each n_warmup value\nmultiple times for statistical reliability, track the results in a structured\nformat, and visualize the comparison between different warmup settings.", "Hyperparam tuning name: penalty_weight. I'll extend the penalty_weight\nhyperparameter sweep to include finer granularity around promising values,\nincluding the default 2.5, and explore a wider range including higher values.\nThe sweep will test values like [0.25, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 4.0, 5.0,\n7.0, 10.0] to find the optimal configuration. I'll track all sweep results in\nthe experiment_data dictionary and identify the best penalty weight that\nmaximizes makespan improvement.", "Hyperparam tuning name: decay. I'll implement hyperparameter tuning for the\ndecay parameter in the ConflictMemory class. The approach will sweep over\ndifferent decay values (ranging from 0.85 to 0.99) to find the optimal setting\nthat balances retaining conflict information versus adapting to new patterns.\nI'll keep the already-tuned penalty_weight and n_warmup parameters fixed while\ntesting different decay rates, tracking makespan improvement for each\nconfiguration.", "Hyperparam tuning name: n_agents. I'll implement hyperparameter tuning for the\nnumber of agents (n_agents) to find the optimal agent density where CMA provides\nthe most improvement over baseline. The approach will sweep through different\nagent counts (from 3 to 12 agents) on the 20x20 grid, running both baseline and\nCMA experiments for each configuration. I'll track the improvement ratios,\nmakespans, and conflict counts to identify the sweet spot where CMA benefits are\nmaximized. The results will be visualized and saved according to the specified\nformat.", "The main issue is that the current implementation shows inconsistent and often\nnegative improvement because the hyperparameters (warmup episodes, penalty\nweight, number of agents) are not well-tuned. Additionally, the sub-stage\nrequires testing on two more HuggingFace datasets. Since this is a path planning\ntask (not a typical ML dataset task), I'll simulate different \"environments\"\ninspired by real-world datasets - using warehouse configurations that mimic\ndifferent complexity levels. I'll tune the learning rate equivalent (decay),\npenalty weight, warmup episodes (batch size equivalent), and test on warehouse\nconfigurations of varying sizes and densities to demonstrate generalization.", "Hyperparam tuning name: n_eval. I'll implement hyperparameter tuning for n_eval\n(number of evaluation episodes) to assess how evaluation sample size affects the\nstability and reliability of improvement measurements. The approach will test\nmultiple n_eval values (30, 50, 80, 120, 200) and for each, run multiple trials\nto measure the variance in the reported makespan_improvement_ratio. This will\nhelp determine if larger evaluation sets reduce variance and provide more\nreliable estimates of CMA's performance.", "The issue is that the current implementation only tests on a synthetic warehouse\nmap and doesn't incorporate two HuggingFace datasets as required by the sub-\nstage goals. Additionally, the hyperparameters need tuning - the current\npenalty_weight and warmup episodes may not be optimal. I'll add two relevant\nHuggingFace datasets (using maze/grid-like datasets that can be adapted for path\nplanning), tune hyperparameters like penalty_weight, n_warmup, and n_agents, and\nensure proper evaluation across all datasets.", "Hyperparam tuning name: epsilon. I'll implement hyperparameter tuning for the\nepsilon parameter in the Hungarian/auction assignment algorithm. The approach\nwill test different epsilon values (ranging from very small to larger values)\nand evaluate their impact on makespan improvement ratio. I'll create a\nsystematic sweep over epsilon values, run experiments for each, and track the\nresults to find the optimal epsilon that balances convergence speed and\nassignment quality.", "Hyperparam tuning name: max_time. I'll implement hyperparameter tuning for the\n`max_time` parameter in the `astar_with_reservations` function. The approach\nwill test values [50, 100, 150, 200] across multiple evaluation episodes to find\nthe optimal balance between path quality and computational efficiency. I'll\nmodify the `astar_with_reservations` and `prioritized_planning` functions to\naccept `max_time` as a parameter, then run experiments for each value and\ncompare makespan improvements.", "The primary issue is that CMA is performing worse than the baseline due to\ninsufficient warmup episodes and suboptimal hyperparameters. The conflict memory\nneeds more training data to learn meaningful congestion patterns. The fix\ninvolves: (1) significantly increasing warmup episodes from 50-80 to 150-200,\n(2) using lower decay values (0.7-0.8) to retain more historical conflict\ninformation, (3) reducing penalty weights to avoid over-penalizing paths, and\n(4) adding two new datasets from the concept of different grid environments to\ntest generalization.", "Hyperparam tuning name: penalty_weight_scaling_factor. I'll implement\nhyperparameter tuning for the penalty_weight_scaling_factor, which normalizes\nthe conflict memory penalty relative to the average base path cost. The scaling\nfactor will be applied to adjust how the penalty weight interacts with the base\ncost, ensuring the conflict memory influence is proportionate. I'll test\nmultiple scaling factors (0.5, 1.0, 2.0, 3.0, 5.0) combined with different\npenalty weights to find the optimal configuration. The implementation will\nmodify the cost matrix computation to include the scaling factor and run a grid\nsearch over both parameters.", "Hyperparam tuning name: grid_size. I'll implement hyperparameter tuning for\ngrid_size by testing different warehouse dimensions (15x15, 20x20, 25x25, 30x30)\nto understand how CMA effectiveness scales with environment size. The\nimplementation will modify the `create_warehouse_map` function to accept\nvariable dimensions, run experiments across all grid sizes, and track metrics\nseparately for each configuration. I'll also adjust obstacle placement\nproportionally to maintain similar corridor density across different grid sizes.", "Seed node", "Seed node", "Seed node", "Aggregate results from multiple seeds"], "code": ["import os\nimport numpy as np\nimport heapq\nfrom collections import defaultdict\nimport torch\nimport matplotlib.pyplot as plt\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n# Experiment data tracking\nexperiment_data = {\n    \"cma_experiment\": {\n        \"baseline_makespans\": [],\n        \"cma_makespans\": [],\n        \"improvements\": [],\n        \"conflict_counts_baseline\": [],\n        \"conflict_counts_cma\": [],\n        \"assignment_changes\": [],\n    }\n}\n\n\ndef create_warehouse_map(width=20, height=20):\n    \"\"\"Create warehouse with corridors and chokepoints.\"\"\"\n    grid = np.zeros((height, width), dtype=int)\n    # Add shelf obstacles creating narrow corridors\n    for row in [3, 7, 11, 15]:\n        for col in range(2, width - 2):\n            if col not in [5, 10, 15]:  # Leave gaps for corridors\n                grid[row, col] = 1\n    return grid\n\n\ndef get_neighbors(pos, grid):\n    \"\"\"Get valid neighboring positions.\"\"\"\n    h, w = grid.shape\n    neighbors = []\n    for dy, dx in [(0, 1), (0, -1), (1, 0), (-1, 0)]:\n        ny, nx = pos[0] + dy, pos[1] + dx\n        if 0 <= ny < h and 0 <= nx < w and grid[ny, nx] == 0:\n            neighbors.append((ny, nx))\n    return neighbors\n\n\ndef heuristic(a, b):\n    return abs(a[0] - b[0]) + abs(a[1] - b[1])\n\n\ndef astar_with_reservations(start, goal, grid, reservations, max_time=100):\n    \"\"\"A* with space-time reservations. Returns path, conflicts encountered.\"\"\"\n    conflicts_encountered = []\n\n    if start == goal:\n        return [start], conflicts_encountered\n\n    open_set = [(heuristic(start, goal), 0, start, [start])]\n    closed = set()\n\n    while open_set:\n        f, t, pos, path = heapq.heappop(open_set)\n\n        if t > max_time:\n            continue\n\n        if (pos, t) in closed:\n            continue\n        closed.add((pos, t))\n\n        if pos == goal:\n            return path, conflicts_encountered\n\n        for npos in get_neighbors(pos, grid) + [pos]:  # Include wait action\n            nt = t + 1\n\n            # Check vertex conflict\n            if (npos, nt) in reservations:\n                conflicts_encountered.append((\"vertex\", npos, nt))\n                continue\n\n            # Check edge conflict (swap)\n            if npos != pos:\n                if (pos, nt) in reservations:\n                    # Check if agent at npos is moving to pos\n                    edge_key = (npos, pos, nt)\n                    if edge_key in reservations.get(\"edges\", set()):\n                        conflicts_encountered.append((\"edge\", pos, npos, nt))\n                        continue\n\n            if (npos, nt) not in closed:\n                new_path = path + [npos]\n                heapq.heappush(\n                    open_set, (nt + heuristic(npos, goal), nt, npos, new_path)\n                )\n\n    # Return partial path if no full path found\n    return [start], conflicts_encountered\n\n\ndef prioritized_planning(agents_starts, agents_goals, grid, conflict_memory=None):\n    \"\"\"Plan paths for all agents with priority ordering. Returns paths and conflict info.\"\"\"\n    n_agents = len(agents_starts)\n    reservations = {}\n    reservations[\"edges\"] = set()\n    all_paths = []\n    total_conflicts = []\n    reservation_pressure = np.zeros_like(grid, dtype=float)\n\n    for i in range(n_agents):\n        path, conflicts = astar_with_reservations(\n            agents_starts[i], agents_goals[i], grid, reservations\n        )\n        all_paths.append(path)\n        total_conflicts.extend(conflicts)\n\n        # Add reservations for this agent's path\n        for t, pos in enumerate(path):\n            reservations[(pos, t)] = i\n            reservation_pressure[pos[0], pos[1]] += 1\n\n            # Add edge reservation\n            if t > 0:\n                prev_pos = path[t - 1]\n                if prev_pos != pos:\n                    reservations[\"edges\"].add((prev_pos, pos, t))\n\n        # Extend final position reservation\n        final_pos = path[-1]\n        for t in range(len(path), len(path) + 10):\n            reservations[(final_pos, t)] = i\n\n    return all_paths, total_conflicts, reservation_pressure\n\n\ndef compute_makespan(paths):\n    \"\"\"Compute makespan (time for all agents to reach goals).\"\"\"\n    return max(len(p) for p in paths) if paths else 0\n\n\ndef get_shortest_path_cells(start, goal, grid):\n    \"\"\"Get cells along shortest path for cost estimation.\"\"\"\n    path, _ = astar_with_reservations(start, goal, grid, {}, max_time=200)\n    return path\n\n\ndef greedy_assignment(agents, tasks, cost_matrix):\n    \"\"\"Greedy assignment: each agent picks cheapest unassigned task.\"\"\"\n    n = len(agents)\n    m = len(tasks)\n    assignment = [-1] * n\n    assigned_tasks = set()\n\n    # Sort agents by their minimum cost\n    agent_order = list(range(n))\n\n    for agent in agent_order:\n        best_task = -1\n        best_cost = float(\"inf\")\n        for task in range(m):\n            if task not in assigned_tasks:\n                if cost_matrix[agent, task] < best_cost:\n                    best_cost = cost_matrix[agent, task]\n                    best_task = task\n        if best_task >= 0:\n            assignment[agent] = best_task\n            assigned_tasks.add(best_task)\n\n    return assignment\n\n\ndef hungarian_assignment(cost_matrix):\n    \"\"\"Simple Hungarian-like assignment using auction algorithm.\"\"\"\n    n, m = cost_matrix.shape\n    if n == 0 or m == 0:\n        return []\n\n    assignment = [-1] * n\n    prices = np.zeros(m)\n    epsilon = 1.0 / (n + 1)\n\n    for _ in range(n * 10):  # Iterate until convergence\n        unassigned = [i for i in range(n) if assignment[i] == -1]\n        if not unassigned:\n            break\n\n        for agent in unassigned:\n            # Find best and second-best tasks\n            values = cost_matrix[agent] + prices\n            sorted_idx = np.argsort(values)\n            best_task = sorted_idx[0]\n            best_value = values[best_task]\n\n            if len(sorted_idx) > 1:\n                second_value = values[sorted_idx[1]]\n            else:\n                second_value = best_value + epsilon\n\n            # Check if task is taken\n            current_owner = -1\n            for i in range(n):\n                if assignment[i] == best_task:\n                    current_owner = i\n                    break\n\n            if current_owner >= 0:\n                assignment[current_owner] = -1\n\n            assignment[agent] = best_task\n            prices[best_task] += second_value - best_value + epsilon\n\n    # Fill any remaining unassigned\n    assigned_tasks = set(a for a in assignment if a >= 0)\n    for i in range(n):\n        if assignment[i] == -1:\n            for t in range(m):\n                if t not in assigned_tasks:\n                    assignment[i] = t\n                    assigned_tasks.add(t)\n                    break\n\n    return assignment\n\n\nclass ConflictMemory:\n    \"\"\"Spatial conflict memory map.\"\"\"\n\n    def __init__(self, grid_shape, decay=0.9):\n        self.memory = np.zeros(grid_shape, dtype=float)\n        self.edge_memory = defaultdict(float)\n        self.decay = decay\n        self.update_count = 0\n\n    def update(self, conflicts, reservation_pressure):\n        \"\"\"Update memory from conflicts and reservation pressure.\"\"\"\n        self.memory *= self.decay\n\n        # Add vertex conflicts\n        for conflict in conflicts:\n            if conflict[0] == \"vertex\":\n                pos = conflict[1]\n                self.memory[pos[0], pos[1]] += 1.0\n            elif conflict[0] == \"edge\":\n                pos1, pos2 = conflict[1], conflict[2]\n                self.edge_memory[(pos1, pos2)] += 1.0\n                self.memory[pos1[0], pos1[1]] += 0.5\n                self.memory[pos2[0], pos2[1]] += 0.5\n\n        # Add reservation pressure (normalized)\n        if reservation_pressure.max() > 0:\n            normalized_pressure = reservation_pressure / reservation_pressure.max()\n            self.memory += normalized_pressure * 0.3\n\n        self.update_count += 1\n\n    def get_path_penalty(self, path_cells, penalty_weight=1.0):\n        \"\"\"Compute penalty for a path based on conflict memory.\"\"\"\n        if not path_cells:\n            return 0.0\n        penalty = 0.0\n        for cell in path_cells:\n            penalty += self.memory[cell[0], cell[1]]\n        return penalty * penalty_weight\n\n    def freeze(self):\n        \"\"\"Return a frozen copy for evaluation.\"\"\"\n        frozen = ConflictMemory(self.memory.shape, self.decay)\n        frozen.memory = self.memory.copy()\n        frozen.edge_memory = self.edge_memory.copy()\n        frozen.update_count = self.update_count\n        return frozen\n\n\ndef compute_cost_matrix(agents, tasks, grid, conflict_memory=None, penalty_weight=2.0):\n    \"\"\"Compute assignment cost matrix with optional CMA penalties.\"\"\"\n    n_agents = len(agents)\n    n_tasks = len(tasks)\n    cost_matrix = np.zeros((n_agents, n_tasks))\n\n    for i, agent_pos in enumerate(agents):\n        for j, task_pos in enumerate(tasks):\n            # Base cost: path length\n            path_cells = get_shortest_path_cells(agent_pos, task_pos, grid)\n            base_cost = len(path_cells)\n\n            # Add conflict memory penalty\n            if conflict_memory is not None:\n                penalty = conflict_memory.get_path_penalty(path_cells, penalty_weight)\n                cost_matrix[i, j] = base_cost + penalty\n            else:\n                cost_matrix[i, j] = base_cost\n\n    return cost_matrix\n\n\ndef run_episode(\n    grid, n_agents, conflict_memory=None, use_cma=False, penalty_weight=2.0\n):\n    \"\"\"Run a single episode with task allocation and path planning.\"\"\"\n    h, w = grid.shape\n\n    # Generate random start positions (on free cells)\n    free_cells = [(i, j) for i in range(h) for j in range(w) if grid[i, j] == 0]\n\n    if len(free_cells) < n_agents * 2:\n        raise ValueError(\"Not enough free cells for agents and tasks\")\n\n    np.random.shuffle(free_cells)\n    agent_starts = free_cells[:n_agents]\n    task_positions = free_cells[n_agents : n_agents * 2]\n\n    # Compute cost matrix\n    if use_cma and conflict_memory is not None:\n        cost_matrix = compute_cost_matrix(\n            agent_starts, task_positions, grid, conflict_memory, penalty_weight\n        )\n    else:\n        cost_matrix = compute_cost_matrix(agent_starts, task_positions, grid)\n\n    # Assignment\n    assignment = hungarian_assignment(cost_matrix)\n\n    # Get agent goals based on assignment\n    agent_goals = []\n    for i, task_idx in enumerate(assignment):\n        if task_idx >= 0 and task_idx < len(task_positions):\n            agent_goals.append(task_positions[task_idx])\n        else:\n            agent_goals.append(agent_starts[i])  # Stay in place if no task\n\n    # Path planning\n    paths, conflicts, reservation_pressure = prioritized_planning(\n        agent_starts, agent_goals, grid\n    )\n\n    makespan = compute_makespan(paths)\n\n    return {\n        \"makespan\": makespan,\n        \"conflicts\": conflicts,\n        \"reservation_pressure\": reservation_pressure,\n        \"paths\": paths,\n        \"assignment\": assignment,\n        \"agent_starts\": agent_starts,\n        \"task_positions\": task_positions,\n    }\n\n\ndef run_experiment(n_warmup=30, n_eval=50, n_agents=6, penalty_weight=2.5):\n    \"\"\"Run full CMA experiment.\"\"\"\n    print(f\"\\n{'='*60}\")\n    print(f\"Running CMA Experiment\")\n    print(f\"Warmup episodes: {n_warmup}, Eval episodes: {n_eval}\")\n    print(f\"Agents: {n_agents}, Penalty weight: {penalty_weight}\")\n    print(f\"{'='*60}\\n\")\n\n    # Create warehouse map\n    grid = create_warehouse_map(20, 20)\n    print(f\"Grid size: {grid.shape}, Free cells: {np.sum(grid == 0)}\")\n\n    # Initialize conflict memory\n    conflict_memory = ConflictMemory(grid.shape, decay=0.95)\n\n    # Warmup phase: build conflict memory\n    print(\"\\n--- Warmup Phase ---\")\n    warmup_conflicts_total = 0\n    for ep in range(n_warmup):\n        np.random.seed(ep)\n        result = run_episode(grid, n_agents, conflict_memory=None, use_cma=False)\n\n        # Update conflict memory\n        conflict_memory.update(result[\"conflicts\"], result[\"reservation_pressure\"])\n        warmup_conflicts_total += len(result[\"conflicts\"])\n\n        if (ep + 1) % 10 == 0:\n            print(\n                f\"Warmup episode {ep+1}: makespan={result['makespan']}, \"\n                f\"conflicts={len(result['conflicts'])}, \"\n                f\"memory_max={conflict_memory.memory.max():.2f}\"\n            )\n\n    print(f\"\\nWarmup complete. Total conflicts recorded: {warmup_conflicts_total}\")\n    print(\n        f\"Memory statistics: max={conflict_memory.memory.max():.3f}, \"\n        f\"mean={conflict_memory.memory.mean():.3f}, \"\n        f\"nonzero cells={np.sum(conflict_memory.memory > 0.01)}\"\n    )\n\n    # Freeze memory for evaluation\n    frozen_memory = conflict_memory.freeze()\n\n    # Evaluation phase\n    print(\"\\n--- Evaluation Phase ---\")\n    baseline_makespans = []\n    cma_makespans = []\n    baseline_conflicts = []\n    cma_conflicts = []\n    assignment_changes = []\n\n    for ep in range(n_eval):\n        seed = n_warmup + ep\n\n        # Baseline run\n        np.random.seed(seed)\n        baseline_result = run_episode(\n            grid, n_agents, conflict_memory=None, use_cma=False\n        )\n\n        # CMA run (same seed for identical initial conditions)\n        np.random.seed(seed)\n        cma_result = run_episode(\n            grid,\n            n_agents,\n            conflict_memory=frozen_memory,\n            use_cma=True,\n            penalty_weight=penalty_weight,\n        )\n\n        baseline_makespans.append(baseline_result[\"makespan\"])\n        cma_makespans.append(cma_result[\"makespan\"])\n        baseline_conflicts.append(len(baseline_result[\"conflicts\"]))\n        cma_conflicts.append(len(cma_result[\"conflicts\"]))\n\n        # Check if assignments differ\n        assignments_differ = baseline_result[\"assignment\"] != cma_result[\"assignment\"]\n        if isinstance(assignments_differ, np.ndarray):\n            assignments_differ = assignments_differ.any()\n        assignment_changes.append(int(assignments_differ))\n\n        if (ep + 1) % 10 == 0:\n            print(\n                f\"Eval episode {ep+1}: baseline_makespan={baseline_result['makespan']}, \"\n                f\"cma_makespan={cma_result['makespan']}, \"\n                f\"assignment_changed={assignments_differ}\"\n            )\n\n    # Store results\n    experiment_data[\"cma_experiment\"][\"baseline_makespans\"] = baseline_makespans\n    experiment_data[\"cma_experiment\"][\"cma_makespans\"] = cma_makespans\n    experiment_data[\"cma_experiment\"][\"conflict_counts_baseline\"] = baseline_conflicts\n    experiment_data[\"cma_experiment\"][\"conflict_counts_cma\"] = cma_conflicts\n    experiment_data[\"cma_experiment\"][\"assignment_changes\"] = assignment_changes\n\n    # Compute metrics\n    baseline_mean = np.mean(baseline_makespans)\n    cma_mean = np.mean(cma_makespans)\n\n    improvements = [\n        (b - c) / b if b > 0 else 0 for b, c in zip(baseline_makespans, cma_makespans)\n    ]\n    experiment_data[\"cma_experiment\"][\"improvements\"] = improvements\n\n    makespan_improvement_ratio = (\n        (baseline_mean - cma_mean) / baseline_mean if baseline_mean > 0 else 0\n    )\n\n    # Print results\n    print(f\"\\n{'='*60}\")\n    print(\"RESULTS SUMMARY\")\n    print(f\"{'='*60}\")\n    print(\n        f\"Baseline average makespan: {baseline_mean:.2f} (std: {np.std(baseline_makespans):.2f})\"\n    )\n    print(\n        f\"CMA average makespan:      {cma_mean:.2f} (std: {np.std(cma_makespans):.2f})\"\n    )\n    print(\n        f\"Makespan improvement ratio: {makespan_improvement_ratio:.4f} ({makespan_improvement_ratio*100:.2f}%)\"\n    )\n    print(f\"Assignment change rate: {np.mean(assignment_changes)*100:.1f}%\")\n    print(f\"Baseline avg conflicts: {np.mean(baseline_conflicts):.2f}\")\n    print(f\"CMA avg conflicts: {np.mean(cma_conflicts):.2f}\")\n\n    return makespan_improvement_ratio, frozen_memory, grid\n\n\ndef visualize_results(conflict_memory, grid):\n    \"\"\"Visualize conflict memory and results.\"\"\"\n    fig, axes = plt.subplots(1, 3, figsize=(15, 5))\n\n    # Plot 1: Grid layout\n    ax1 = axes[0]\n    ax1.imshow(grid, cmap=\"binary\", origin=\"upper\")\n    ax1.set_title(\"Warehouse Layout (black=obstacle)\")\n    ax1.set_xlabel(\"X\")\n    ax1.set_ylabel(\"Y\")\n\n    # Plot 2: Conflict memory heatmap\n    ax2 = axes[1]\n    im = ax2.imshow(conflict_memory.memory, cmap=\"hot\", origin=\"upper\")\n    ax2.set_title(\"Conflict Memory Map\")\n    ax2.set_xlabel(\"X\")\n    ax2.set_ylabel(\"Y\")\n    plt.colorbar(im, ax=ax2)\n\n    # Plot 3: Makespan comparison\n    ax3 = axes[2]\n    baseline_makespans = experiment_data[\"cma_experiment\"][\"baseline_makespans\"]\n    cma_makespans = experiment_data[\"cma_experiment\"][\"cma_makespans\"]\n\n    x = np.arange(len(baseline_makespans))\n    ax3.plot(x, baseline_makespans, \"b-\", alpha=0.7, label=\"Baseline\")\n    ax3.plot(x, cma_makespans, \"r-\", alpha=0.7, label=\"CMA\")\n    ax3.axhline(\n        np.mean(baseline_makespans),\n        color=\"b\",\n        linestyle=\"--\",\n        label=f\"Baseline mean: {np.mean(baseline_makespans):.1f}\",\n    )\n    ax3.axhline(\n        np.mean(cma_makespans),\n        color=\"r\",\n        linestyle=\"--\",\n        label=f\"CMA mean: {np.mean(cma_makespans):.1f}\",\n    )\n    ax3.set_xlabel(\"Episode\")\n    ax3.set_ylabel(\"Makespan\")\n    ax3.set_title(\"Makespan Comparison\")\n    ax3.legend()\n\n    plt.tight_layout()\n    plt.savefig(os.path.join(working_dir, \"cma_results.png\"), dpi=150)\n    plt.close()\n    print(f\"\\nVisualization saved to {os.path.join(working_dir, 'cma_results.png')}\")\n\n\ndef run_parameter_sweep():\n    \"\"\"Sweep penalty weights to find best configuration.\"\"\"\n    print(\"\\n\" + \"=\" * 60)\n    print(\"PARAMETER SWEEP\")\n    print(\"=\" * 60)\n\n    penalty_weights = [0.5, 1.0, 2.0, 3.0, 5.0]\n    results = []\n\n    for pw in penalty_weights:\n        print(f\"\\nTesting penalty_weight = {pw}\")\n        improvement, _, _ = run_experiment(\n            n_warmup=20, n_eval=30, n_agents=6, penalty_weight=pw\n        )\n        results.append((pw, improvement))\n        print(f\"  -> Improvement ratio: {improvement:.4f}\")\n\n    best_pw, best_improvement = max(results, key=lambda x: x[1])\n    print(f\"\\nBest penalty weight: {best_pw} with improvement: {best_improvement:.4f}\")\n\n    return best_pw, results\n\n\n# Main execution\nprint(\"=\" * 60)\nprint(\"Conflict Memory Allocation (CMA) Experiment\")\nprint(\"=\" * 60)\n\n# Run main experiment with default parameters\nmain_improvement, conflict_memory, grid = run_experiment(\n    n_warmup=40, n_eval=60, n_agents=6, penalty_weight=2.5\n)\n\n# Visualize results\nvisualize_results(conflict_memory, grid)\n\n# Run parameter sweep to find best configuration\nbest_pw, sweep_results = run_parameter_sweep()\n\n# Final run with best parameters\nprint(\"\\n\" + \"=\" * 60)\nprint(\"FINAL RUN WITH BEST PARAMETERS\")\nprint(\"=\" * 60)\nfinal_improvement, final_memory, final_grid = run_experiment(\n    n_warmup=50, n_eval=80, n_agents=7, penalty_weight=best_pw\n)\n\n# Save experiment data\nexperiment_data[\"sweep_results\"] = sweep_results\nexperiment_data[\"best_penalty_weight\"] = best_pw\nexperiment_data[\"final_improvement\"] = final_improvement\n\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(f\"\\nExperiment data saved to {os.path.join(working_dir, 'experiment_data.npy')}\")\n\n# Final summary\nprint(\"\\n\" + \"=\" * 60)\nprint(\"FINAL SUMMARY\")\nprint(\"=\" * 60)\nprint(f\"Main experiment makespan_improvement_ratio: {main_improvement:.4f}\")\nprint(f\"Final experiment makespan_improvement_ratio: {final_improvement:.4f}\")\nprint(f\"Best penalty weight from sweep: {best_pw}\")\nprint(f\"Target improvement range: 0.15-0.25 (15-25%)\")\n\nif final_improvement > 0:\n    print(f\"\\nCMA shows POSITIVE improvement of {final_improvement*100:.2f}%\")\nelse:\n    print(\n        f\"\\nCMA shows no improvement or negative result: {final_improvement*100:.2f}%\"\n    )\n", "import os\nimport numpy as np\nimport heapq\nfrom collections import defaultdict\nimport matplotlib.pyplot as plt\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\n# Experiment data tracking\nexperiment_data = {\n    \"n_warmup_tuning\": {\n        \"warmup_values\": [],\n        \"improvement_ratios\": [],\n        \"baseline_makespans\": {},\n        \"cma_makespans\": {},\n        \"std_improvements\": [],\n        \"best_warmup\": None,\n        \"best_improvement\": None,\n    }\n}\n\n\ndef create_warehouse_map(width=20, height=20):\n    grid = np.zeros((height, width), dtype=int)\n    for row in [3, 7, 11, 15]:\n        for col in range(2, width - 2):\n            if col not in [5, 10, 15]:\n                grid[row, col] = 1\n    return grid\n\n\ndef get_neighbors(pos, grid):\n    h, w = grid.shape\n    neighbors = []\n    for dy, dx in [(0, 1), (0, -1), (1, 0), (-1, 0)]:\n        ny, nx = pos[0] + dy, pos[1] + dx\n        if 0 <= ny < h and 0 <= nx < w and grid[ny, nx] == 0:\n            neighbors.append((ny, nx))\n    return neighbors\n\n\ndef heuristic(a, b):\n    return abs(a[0] - b[0]) + abs(a[1] - b[1])\n\n\ndef astar_with_reservations(start, goal, grid, reservations, max_time=100):\n    conflicts_encountered = []\n    if start == goal:\n        return [start], conflicts_encountered\n    open_set = [(heuristic(start, goal), 0, start, [start])]\n    closed = set()\n    while open_set:\n        f, t, pos, path = heapq.heappop(open_set)\n        if t > max_time:\n            continue\n        if (pos, t) in closed:\n            continue\n        closed.add((pos, t))\n        if pos == goal:\n            return path, conflicts_encountered\n        for npos in get_neighbors(pos, grid) + [pos]:\n            nt = t + 1\n            if (npos, nt) in reservations:\n                conflicts_encountered.append((\"vertex\", npos, nt))\n                continue\n            if npos != pos:\n                if (pos, nt) in reservations:\n                    edge_key = (npos, pos, nt)\n                    if edge_key in reservations.get(\"edges\", set()):\n                        conflicts_encountered.append((\"edge\", pos, npos, nt))\n                        continue\n            if (npos, nt) not in closed:\n                new_path = path + [npos]\n                heapq.heappush(\n                    open_set, (nt + heuristic(npos, goal), nt, npos, new_path)\n                )\n    return [start], conflicts_encountered\n\n\ndef prioritized_planning(agents_starts, agents_goals, grid, conflict_memory=None):\n    n_agents = len(agents_starts)\n    reservations = {\"edges\": set()}\n    all_paths = []\n    total_conflicts = []\n    reservation_pressure = np.zeros_like(grid, dtype=float)\n    for i in range(n_agents):\n        path, conflicts = astar_with_reservations(\n            agents_starts[i], agents_goals[i], grid, reservations\n        )\n        all_paths.append(path)\n        total_conflicts.extend(conflicts)\n        for t, pos in enumerate(path):\n            reservations[(pos, t)] = i\n            reservation_pressure[pos[0], pos[1]] += 1\n            if t > 0:\n                prev_pos = path[t - 1]\n                if prev_pos != pos:\n                    reservations[\"edges\"].add((prev_pos, pos, t))\n        final_pos = path[-1]\n        for t in range(len(path), len(path) + 10):\n            reservations[(final_pos, t)] = i\n    return all_paths, total_conflicts, reservation_pressure\n\n\ndef compute_makespan(paths):\n    return max(len(p) for p in paths) if paths else 0\n\n\ndef get_shortest_path_cells(start, goal, grid):\n    path, _ = astar_with_reservations(start, goal, grid, {}, max_time=200)\n    return path\n\n\ndef hungarian_assignment(cost_matrix):\n    n, m = cost_matrix.shape\n    if n == 0 or m == 0:\n        return []\n    assignment = [-1] * n\n    prices = np.zeros(m)\n    epsilon = 1.0 / (n + 1)\n    for _ in range(n * 10):\n        unassigned = [i for i in range(n) if assignment[i] == -1]\n        if not unassigned:\n            break\n        for agent in unassigned:\n            values = cost_matrix[agent] + prices\n            sorted_idx = np.argsort(values)\n            best_task = sorted_idx[0]\n            best_value = values[best_task]\n            second_value = (\n                values[sorted_idx[1]] if len(sorted_idx) > 1 else best_value + epsilon\n            )\n            current_owner = -1\n            for i in range(n):\n                if assignment[i] == best_task:\n                    current_owner = i\n                    break\n            if current_owner >= 0:\n                assignment[current_owner] = -1\n            assignment[agent] = best_task\n            prices[best_task] += second_value - best_value + epsilon\n    assigned_tasks = set(a for a in assignment if a >= 0)\n    for i in range(n):\n        if assignment[i] == -1:\n            for t in range(m):\n                if t not in assigned_tasks:\n                    assignment[i] = t\n                    assigned_tasks.add(t)\n                    break\n    return assignment\n\n\nclass ConflictMemory:\n    def __init__(self, grid_shape, decay=0.9):\n        self.memory = np.zeros(grid_shape, dtype=float)\n        self.edge_memory = defaultdict(float)\n        self.decay = decay\n        self.update_count = 0\n\n    def update(self, conflicts, reservation_pressure):\n        self.memory *= self.decay\n        for conflict in conflicts:\n            if conflict[0] == \"vertex\":\n                pos = conflict[1]\n                self.memory[pos[0], pos[1]] += 1.0\n            elif conflict[0] == \"edge\":\n                pos1, pos2 = conflict[1], conflict[2]\n                self.edge_memory[(pos1, pos2)] += 1.0\n                self.memory[pos1[0], pos1[1]] += 0.5\n                self.memory[pos2[0], pos2[1]] += 0.5\n        if reservation_pressure.max() > 0:\n            normalized_pressure = reservation_pressure / reservation_pressure.max()\n            self.memory += normalized_pressure * 0.3\n        self.update_count += 1\n\n    def get_path_penalty(self, path_cells, penalty_weight=1.0):\n        if not path_cells:\n            return 0.0\n        penalty = sum(self.memory[cell[0], cell[1]] for cell in path_cells)\n        return penalty * penalty_weight\n\n    def freeze(self):\n        frozen = ConflictMemory(self.memory.shape, self.decay)\n        frozen.memory = self.memory.copy()\n        frozen.edge_memory = self.edge_memory.copy()\n        frozen.update_count = self.update_count\n        return frozen\n\n\ndef compute_cost_matrix(agents, tasks, grid, conflict_memory=None, penalty_weight=2.0):\n    n_agents, n_tasks = len(agents), len(tasks)\n    cost_matrix = np.zeros((n_agents, n_tasks))\n    for i, agent_pos in enumerate(agents):\n        for j, task_pos in enumerate(tasks):\n            path_cells = get_shortest_path_cells(agent_pos, task_pos, grid)\n            base_cost = len(path_cells)\n            if conflict_memory is not None:\n                penalty = conflict_memory.get_path_penalty(path_cells, penalty_weight)\n                cost_matrix[i, j] = base_cost + penalty\n            else:\n                cost_matrix[i, j] = base_cost\n    return cost_matrix\n\n\ndef run_episode(\n    grid, n_agents, conflict_memory=None, use_cma=False, penalty_weight=2.0\n):\n    h, w = grid.shape\n    free_cells = [(i, j) for i in range(h) for j in range(w) if grid[i, j] == 0]\n    if len(free_cells) < n_agents * 2:\n        raise ValueError(\"Not enough free cells\")\n    np.random.shuffle(free_cells)\n    agent_starts = free_cells[:n_agents]\n    task_positions = free_cells[n_agents : n_agents * 2]\n    if use_cma and conflict_memory is not None:\n        cost_matrix = compute_cost_matrix(\n            agent_starts, task_positions, grid, conflict_memory, penalty_weight\n        )\n    else:\n        cost_matrix = compute_cost_matrix(agent_starts, task_positions, grid)\n    assignment = hungarian_assignment(cost_matrix)\n    agent_goals = [\n        (\n            task_positions[task_idx]\n            if 0 <= task_idx < len(task_positions)\n            else agent_starts[i]\n        )\n        for i, task_idx in enumerate(assignment)\n    ]\n    paths, conflicts, reservation_pressure = prioritized_planning(\n        agent_starts, agent_goals, grid\n    )\n    makespan = compute_makespan(paths)\n    return {\n        \"makespan\": makespan,\n        \"conflicts\": conflicts,\n        \"reservation_pressure\": reservation_pressure,\n        \"paths\": paths,\n        \"assignment\": assignment,\n    }\n\n\ndef run_experiment_with_warmup(n_warmup, n_eval=50, n_agents=6, penalty_weight=2.5):\n    grid = create_warehouse_map(20, 20)\n    conflict_memory = ConflictMemory(grid.shape, decay=0.95)\n\n    # Warmup phase\n    for ep in range(n_warmup):\n        np.random.seed(ep)\n        result = run_episode(grid, n_agents, conflict_memory=None, use_cma=False)\n        conflict_memory.update(result[\"conflicts\"], result[\"reservation_pressure\"])\n\n    frozen_memory = conflict_memory.freeze()\n\n    # Evaluation phase\n    baseline_makespans, cma_makespans = [], []\n    for ep in range(n_eval):\n        seed = n_warmup + ep\n        np.random.seed(seed)\n        baseline_result = run_episode(\n            grid, n_agents, conflict_memory=None, use_cma=False\n        )\n        np.random.seed(seed)\n        cma_result = run_episode(\n            grid,\n            n_agents,\n            conflict_memory=frozen_memory,\n            use_cma=True,\n            penalty_weight=penalty_weight,\n        )\n        baseline_makespans.append(baseline_result[\"makespan\"])\n        cma_makespans.append(cma_result[\"makespan\"])\n\n    baseline_mean = np.mean(baseline_makespans)\n    cma_mean = np.mean(cma_makespans)\n    improvement_ratio = (\n        (baseline_mean - cma_mean) / baseline_mean if baseline_mean > 0 else 0\n    )\n\n    return improvement_ratio, baseline_makespans, cma_makespans\n\n\ndef tune_n_warmup():\n    print(\"=\" * 60)\n    print(\"HYPERPARAMETER TUNING: n_warmup (training epochs)\")\n    print(\"=\" * 60)\n\n    warmup_values = [50, 75, 100, 150]\n    n_eval = 60\n    n_agents = 6\n    penalty_weight = 2.5\n    n_trials = 3  # Multiple trials for reliability\n\n    results = {wv: [] for wv in warmup_values}\n    all_baseline = {wv: [] for wv in warmup_values}\n    all_cma = {wv: [] for wv in warmup_values}\n\n    for wv in warmup_values:\n        print(f\"\\nTesting n_warmup = {wv}\")\n        for trial in range(n_trials):\n            print(f\"  Trial {trial + 1}/{n_trials}...\", end=\" \")\n            improvement, baseline_ms, cma_ms = run_experiment_with_warmup(\n                n_warmup=wv,\n                n_eval=n_eval,\n                n_agents=n_agents,\n                penalty_weight=penalty_weight,\n            )\n            results[wv].append(improvement)\n            all_baseline[wv].extend(baseline_ms)\n            all_cma[wv].extend(cma_ms)\n            print(f\"improvement = {improvement:.4f}\")\n\n    # Compute statistics\n    mean_improvements = {wv: np.mean(results[wv]) for wv in warmup_values}\n    std_improvements = {wv: np.std(results[wv]) for wv in warmup_values}\n\n    print(\"\\n\" + \"=\" * 60)\n    print(\"TUNING RESULTS SUMMARY\")\n    print(\"=\" * 60)\n    for wv in warmup_values:\n        print(\n            f\"n_warmup={wv}: improvement = {mean_improvements[wv]:.4f} \u00b1 {std_improvements[wv]:.4f}\"\n        )\n\n    best_warmup = max(mean_improvements, key=mean_improvements.get)\n    best_improvement = mean_improvements[best_warmup]\n    print(\n        f\"\\nBest n_warmup: {best_warmup} with improvement: {best_improvement:.4f} ({best_improvement*100:.2f}%)\"\n    )\n\n    # Store results\n    experiment_data[\"n_warmup_tuning\"][\"warmup_values\"] = warmup_values\n    experiment_data[\"n_warmup_tuning\"][\"improvement_ratios\"] = [\n        mean_improvements[wv] for wv in warmup_values\n    ]\n    experiment_data[\"n_warmup_tuning\"][\"std_improvements\"] = [\n        std_improvements[wv] for wv in warmup_values\n    ]\n    experiment_data[\"n_warmup_tuning\"][\"baseline_makespans\"] = {\n        str(wv): all_baseline[wv] for wv in warmup_values\n    }\n    experiment_data[\"n_warmup_tuning\"][\"cma_makespans\"] = {\n        str(wv): all_cma[wv] for wv in warmup_values\n    }\n    experiment_data[\"n_warmup_tuning\"][\"best_warmup\"] = best_warmup\n    experiment_data[\"n_warmup_tuning\"][\"best_improvement\"] = best_improvement\n    experiment_data[\"n_warmup_tuning\"][\"trial_results\"] = {\n        str(wv): results[wv] for wv in warmup_values\n    }\n\n    return best_warmup, mean_improvements, std_improvements\n\n\ndef visualize_tuning_results():\n    data = experiment_data[\"n_warmup_tuning\"]\n    warmup_values = data[\"warmup_values\"]\n    improvements = data[\"improvement_ratios\"]\n    stds = data[\"std_improvements\"]\n\n    fig, axes = plt.subplots(1, 3, figsize=(15, 5))\n\n    # Plot 1: Improvement ratio vs n_warmup\n    ax1 = axes[0]\n    ax1.errorbar(\n        warmup_values,\n        improvements,\n        yerr=stds,\n        fmt=\"o-\",\n        capsize=5,\n        capthick=2,\n        linewidth=2,\n        markersize=8,\n    )\n    ax1.axhline(y=0, color=\"gray\", linestyle=\"--\", alpha=0.5)\n    ax1.set_xlabel(\"n_warmup (Training Episodes)\")\n    ax1.set_ylabel(\"Makespan Improvement Ratio\")\n    ax1.set_title(\"Effect of Warmup Episodes on Performance\")\n    ax1.grid(True, alpha=0.3)\n\n    # Plot 2: Makespan comparison for each n_warmup\n    ax2 = axes[1]\n    x_pos = np.arange(len(warmup_values))\n    width = 0.35\n    baseline_means = [\n        np.mean(data[\"baseline_makespans\"][str(wv)]) for wv in warmup_values\n    ]\n    cma_means = [np.mean(data[\"cma_makespans\"][str(wv)]) for wv in warmup_values]\n    ax2.bar(x_pos - width / 2, baseline_means, width, label=\"Baseline\", alpha=0.7)\n    ax2.bar(x_pos + width / 2, cma_means, width, label=\"CMA\", alpha=0.7)\n    ax2.set_xlabel(\"n_warmup\")\n    ax2.set_ylabel(\"Average Makespan\")\n    ax2.set_title(\"Baseline vs CMA Makespan\")\n    ax2.set_xticks(x_pos)\n    ax2.set_xticklabels(warmup_values)\n    ax2.legend()\n    ax2.grid(True, alpha=0.3, axis=\"y\")\n\n    # Plot 3: Box plot of improvements across trials\n    ax3 = axes[2]\n    trial_data = [data[\"trial_results\"][str(wv)] for wv in warmup_values]\n    bp = ax3.boxplot(trial_data, labels=warmup_values, patch_artist=True)\n    for patch in bp[\"boxes\"]:\n        patch.set_facecolor(\"lightblue\")\n    ax3.axhline(y=0, color=\"gray\", linestyle=\"--\", alpha=0.5)\n    ax3.set_xlabel(\"n_warmup\")\n    ax3.set_ylabel(\"Improvement Ratio\")\n    ax3.set_title(\"Distribution of Improvements Across Trials\")\n    ax3.grid(True, alpha=0.3, axis=\"y\")\n\n    plt.tight_layout()\n    plt.savefig(os.path.join(working_dir, \"n_warmup_tuning_results.png\"), dpi=150)\n    plt.close()\n    print(\n        f\"\\nVisualization saved to {os.path.join(working_dir, 'n_warmup_tuning_results.png')}\"\n    )\n\n\n# Main execution\nprint(\"=\" * 60)\nprint(\"Conflict Memory Allocation - n_warmup Hyperparameter Tuning\")\nprint(\"=\" * 60)\n\n# Run hyperparameter tuning\nbest_warmup, mean_improvements, std_improvements = tune_n_warmup()\n\n# Visualize results\nvisualize_tuning_results()\n\n# Final validation run with best n_warmup\nprint(\"\\n\" + \"=\" * 60)\nprint(f\"FINAL VALIDATION WITH BEST n_warmup = {best_warmup}\")\nprint(\"=\" * 60)\n\nfinal_improvement, final_baseline, final_cma = run_experiment_with_warmup(\n    n_warmup=best_warmup, n_eval=80, n_agents=6, penalty_weight=2.5\n)\n\nexperiment_data[\"n_warmup_tuning\"][\"final_validation\"] = {\n    \"n_warmup\": best_warmup,\n    \"improvement\": final_improvement,\n    \"baseline_makespans\": final_baseline,\n    \"cma_makespans\": final_cma,\n}\n\nprint(\n    f\"Final validation improvement: {final_improvement:.4f} ({final_improvement*100:.2f}%)\"\n)\nprint(f\"Baseline mean makespan: {np.mean(final_baseline):.2f}\")\nprint(f\"CMA mean makespan: {np.mean(final_cma):.2f}\")\n\n# Save all experiment data\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(f\"\\nExperiment data saved to {os.path.join(working_dir, 'experiment_data.npy')}\")\n\n# Final summary\nprint(\"\\n\" + \"=\" * 60)\nprint(\"FINAL SUMMARY\")\nprint(\"=\" * 60)\nprint(f\"Tuned parameter: n_warmup (training epochs)\")\nprint(f\"Values tested: {experiment_data['n_warmup_tuning']['warmup_values']}\")\nprint(f\"Best n_warmup: {best_warmup}\")\nprint(\n    f\"Best improvement ratio: {mean_improvements[best_warmup]:.4f} \u00b1 {std_improvements[best_warmup]:.4f}\"\n)\nprint(f\"Target improvement range: 0.15-0.25 (15-25%)\")\n\nif final_improvement > 0:\n    print(\n        f\"\\nConclusion: n_warmup={best_warmup} yields POSITIVE improvement of {final_improvement*100:.2f}%\"\n    )\nelse:\n    print(f\"\\nConclusion: No positive improvement achieved with tested n_warmup values\")\n", "import os\nimport numpy as np\nimport heapq\nfrom collections import defaultdict\nimport torch\nimport matplotlib.pyplot as plt\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n# Experiment data tracking\nexperiment_data = {\n    \"cma_experiment\": {\n        \"baseline_makespans\": [],\n        \"cma_makespans\": [],\n        \"improvements\": [],\n        \"conflict_counts_baseline\": [],\n        \"conflict_counts_cma\": [],\n        \"assignment_changes\": [],\n    },\n    \"penalty_weight_tuning\": {\n        \"penalty_weights\": [],\n        \"improvements\": [],\n        \"baseline_means\": [],\n        \"cma_means\": [],\n    },\n}\n\n\ndef create_warehouse_map(width=20, height=20):\n    grid = np.zeros((height, width), dtype=int)\n    for row in [3, 7, 11, 15]:\n        for col in range(2, width - 2):\n            if col not in [5, 10, 15]:\n                grid[row, col] = 1\n    return grid\n\n\ndef get_neighbors(pos, grid):\n    h, w = grid.shape\n    neighbors = []\n    for dy, dx in [(0, 1), (0, -1), (1, 0), (-1, 0)]:\n        ny, nx = pos[0] + dy, pos[1] + dx\n        if 0 <= ny < h and 0 <= nx < w and grid[ny, nx] == 0:\n            neighbors.append((ny, nx))\n    return neighbors\n\n\ndef heuristic(a, b):\n    return abs(a[0] - b[0]) + abs(a[1] - b[1])\n\n\ndef astar_with_reservations(start, goal, grid, reservations, max_time=100):\n    conflicts_encountered = []\n    if start == goal:\n        return [start], conflicts_encountered\n\n    open_set = [(heuristic(start, goal), 0, start, [start])]\n    closed = set()\n\n    while open_set:\n        f, t, pos, path = heapq.heappop(open_set)\n        if t > max_time:\n            continue\n        if (pos, t) in closed:\n            continue\n        closed.add((pos, t))\n        if pos == goal:\n            return path, conflicts_encountered\n\n        for npos in get_neighbors(pos, grid) + [pos]:\n            nt = t + 1\n            if (npos, nt) in reservations:\n                conflicts_encountered.append((\"vertex\", npos, nt))\n                continue\n            if npos != pos:\n                if (pos, nt) in reservations:\n                    edge_key = (npos, pos, nt)\n                    if edge_key in reservations.get(\"edges\", set()):\n                        conflicts_encountered.append((\"edge\", pos, npos, nt))\n                        continue\n            if (npos, nt) not in closed:\n                new_path = path + [npos]\n                heapq.heappush(\n                    open_set, (nt + heuristic(npos, goal), nt, npos, new_path)\n                )\n\n    return [start], conflicts_encountered\n\n\ndef prioritized_planning(agents_starts, agents_goals, grid, conflict_memory=None):\n    n_agents = len(agents_starts)\n    reservations = {}\n    reservations[\"edges\"] = set()\n    all_paths = []\n    total_conflicts = []\n    reservation_pressure = np.zeros_like(grid, dtype=float)\n\n    for i in range(n_agents):\n        path, conflicts = astar_with_reservations(\n            agents_starts[i], agents_goals[i], grid, reservations\n        )\n        all_paths.append(path)\n        total_conflicts.extend(conflicts)\n\n        for t, pos in enumerate(path):\n            reservations[(pos, t)] = i\n            reservation_pressure[pos[0], pos[1]] += 1\n            if t > 0:\n                prev_pos = path[t - 1]\n                if prev_pos != pos:\n                    reservations[\"edges\"].add((prev_pos, pos, t))\n\n        final_pos = path[-1]\n        for t in range(len(path), len(path) + 10):\n            reservations[(final_pos, t)] = i\n\n    return all_paths, total_conflicts, reservation_pressure\n\n\ndef compute_makespan(paths):\n    return max(len(p) for p in paths) if paths else 0\n\n\ndef get_shortest_path_cells(start, goal, grid):\n    path, _ = astar_with_reservations(start, goal, grid, {}, max_time=200)\n    return path\n\n\ndef hungarian_assignment(cost_matrix):\n    n, m = cost_matrix.shape\n    if n == 0 or m == 0:\n        return []\n\n    assignment = [-1] * n\n    prices = np.zeros(m)\n    epsilon = 1.0 / (n + 1)\n\n    for _ in range(n * 10):\n        unassigned = [i for i in range(n) if assignment[i] == -1]\n        if not unassigned:\n            break\n\n        for agent in unassigned:\n            values = cost_matrix[agent] + prices\n            sorted_idx = np.argsort(values)\n            best_task = sorted_idx[0]\n            best_value = values[best_task]\n            second_value = (\n                values[sorted_idx[1]] if len(sorted_idx) > 1 else best_value + epsilon\n            )\n\n            current_owner = -1\n            for i in range(n):\n                if assignment[i] == best_task:\n                    current_owner = i\n                    break\n\n            if current_owner >= 0:\n                assignment[current_owner] = -1\n\n            assignment[agent] = best_task\n            prices[best_task] += second_value - best_value + epsilon\n\n    assigned_tasks = set(a for a in assignment if a >= 0)\n    for i in range(n):\n        if assignment[i] == -1:\n            for t in range(m):\n                if t not in assigned_tasks:\n                    assignment[i] = t\n                    assigned_tasks.add(t)\n                    break\n\n    return assignment\n\n\nclass ConflictMemory:\n    def __init__(self, grid_shape, decay=0.9):\n        self.memory = np.zeros(grid_shape, dtype=float)\n        self.edge_memory = defaultdict(float)\n        self.decay = decay\n        self.update_count = 0\n\n    def update(self, conflicts, reservation_pressure):\n        self.memory *= self.decay\n        for conflict in conflicts:\n            if conflict[0] == \"vertex\":\n                pos = conflict[1]\n                self.memory[pos[0], pos[1]] += 1.0\n            elif conflict[0] == \"edge\":\n                pos1, pos2 = conflict[1], conflict[2]\n                self.edge_memory[(pos1, pos2)] += 1.0\n                self.memory[pos1[0], pos1[1]] += 0.5\n                self.memory[pos2[0], pos2[1]] += 0.5\n\n        if reservation_pressure.max() > 0:\n            normalized_pressure = reservation_pressure / reservation_pressure.max()\n            self.memory += normalized_pressure * 0.3\n        self.update_count += 1\n\n    def get_path_penalty(self, path_cells, penalty_weight=1.0):\n        if not path_cells:\n            return 0.0\n        penalty = sum(self.memory[cell[0], cell[1]] for cell in path_cells)\n        return penalty * penalty_weight\n\n    def freeze(self):\n        frozen = ConflictMemory(self.memory.shape, self.decay)\n        frozen.memory = self.memory.copy()\n        frozen.edge_memory = self.edge_memory.copy()\n        frozen.update_count = self.update_count\n        return frozen\n\n\ndef compute_cost_matrix(agents, tasks, grid, conflict_memory=None, penalty_weight=2.0):\n    n_agents, n_tasks = len(agents), len(tasks)\n    cost_matrix = np.zeros((n_agents, n_tasks))\n\n    for i, agent_pos in enumerate(agents):\n        for j, task_pos in enumerate(tasks):\n            path_cells = get_shortest_path_cells(agent_pos, task_pos, grid)\n            base_cost = len(path_cells)\n            if conflict_memory is not None:\n                penalty = conflict_memory.get_path_penalty(path_cells, penalty_weight)\n                cost_matrix[i, j] = base_cost + penalty\n            else:\n                cost_matrix[i, j] = base_cost\n    return cost_matrix\n\n\ndef run_episode(\n    grid, n_agents, conflict_memory=None, use_cma=False, penalty_weight=2.0\n):\n    h, w = grid.shape\n    free_cells = [(i, j) for i in range(h) for j in range(w) if grid[i, j] == 0]\n\n    if len(free_cells) < n_agents * 2:\n        raise ValueError(\"Not enough free cells\")\n\n    np.random.shuffle(free_cells)\n    agent_starts = free_cells[:n_agents]\n    task_positions = free_cells[n_agents : n_agents * 2]\n\n    if use_cma and conflict_memory is not None:\n        cost_matrix = compute_cost_matrix(\n            agent_starts, task_positions, grid, conflict_memory, penalty_weight\n        )\n    else:\n        cost_matrix = compute_cost_matrix(agent_starts, task_positions, grid)\n\n    assignment = hungarian_assignment(cost_matrix)\n\n    agent_goals = []\n    for i, task_idx in enumerate(assignment):\n        if task_idx >= 0 and task_idx < len(task_positions):\n            agent_goals.append(task_positions[task_idx])\n        else:\n            agent_goals.append(agent_starts[i])\n\n    paths, conflicts, reservation_pressure = prioritized_planning(\n        agent_starts, agent_goals, grid\n    )\n    makespan = compute_makespan(paths)\n\n    return {\n        \"makespan\": makespan,\n        \"conflicts\": conflicts,\n        \"reservation_pressure\": reservation_pressure,\n        \"paths\": paths,\n        \"assignment\": assignment,\n        \"agent_starts\": agent_starts,\n        \"task_positions\": task_positions,\n    }\n\n\ndef run_experiment(\n    n_warmup=30, n_eval=50, n_agents=6, penalty_weight=2.5, verbose=True\n):\n    grid = create_warehouse_map(20, 20)\n    conflict_memory = ConflictMemory(grid.shape, decay=0.95)\n\n    # Warmup phase\n    for ep in range(n_warmup):\n        np.random.seed(ep)\n        result = run_episode(grid, n_agents, conflict_memory=None, use_cma=False)\n        conflict_memory.update(result[\"conflicts\"], result[\"reservation_pressure\"])\n\n    frozen_memory = conflict_memory.freeze()\n\n    # Evaluation phase\n    baseline_makespans, cma_makespans = [
