      if (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost') {
          let lastModified = '';

          // Check for file changes every second
          setInterval(async () => {
              try {
                  const response = await fetch(window.location.href, { method: 'HEAD' });
                  // get a timestamp that shows when the file was last changed
                  const currentModified = response.headers.get('last-modified');

                  if (lastModified && lastModified !== currentModified) {
                      window.location.reload();
                  }

                  lastModified = currentModified;
              } catch (e) {
                  console.error('Error checking for updates:', e);
              }
          }, 1000);
      }

      const bgCol = "#FFFFFF";
const accentCol = "#1a439e";

hljs.initHighlightingOnLoad();

// Function to update background color globally
function updateBackgroundColor(color) {
  // Update the JS variable
  window.bgColCurrent = color;

  // Update body background
  document.body.style.backgroundColor = color;

  // Update canvas container background
  const canvasContainer = document.getElementById('canvas-container');
  if (canvasContainer) {
    canvasContainer.style.backgroundColor = color;
  }
}

// Store tree data for each stage
const stageData = {
  Stage_1: null,
  Stage_2: null,
  Stage_3: null,
  Stage_4: null
};

// Keep track of current selected stage
let currentStage = null;
let currentSketch = null;
let availableStages = [];

// Class definitions for nodes and edges
class Node {
  constructor(x, y, id, isRoot = false) {
    this.x = x;
    this.y = y;
    this.id = id;
    this.visible = isRoot; // Only root nodes are visible initially
    this.appearProgress = 0;
    this.popEffect = 0;
    this.selected = false;
    this.isRootNode = isRoot;
  }

  update() {
    if (this.visible) {
      // Handle the main appearance animation
      if (this.appearProgress < 1) {
        this.appearProgress += 0.06;

        // When we reach full size, trigger the pop effect
        if (this.appearProgress >= 1) {
          this.appearProgress = 1; // Cap at 1
          this.popEffect = 1; // Start the pop effect
        }
      }

      // Handle the pop effect animation
      if (this.popEffect > 0) {
        this.popEffect -= 0.15; // Control how quickly it shrinks back
        if (this.popEffect < 0) this.popEffect = 0; // Don't go negative
      }
    }
  }

  startAnimation() {
    this.visible = true;
  }

  color() {
    if (this.selected) {
      return accentCol; // Use the global accent color variable for selected node
    }
    return '#4263eb'; // Default blue color
  }

  render(p5) {
    if (this.visible) {
      const popBonus = this.popEffect * 0.1;
      const nodeScale = p5.map(this.appearProgress, 0, 1, 0, 1) + popBonus;
      const alpha = p5.map(this.appearProgress, 0, 1, 0, 255);

      p5.push();
      p5.translate(this.x, this.y);

      // Shadow effect
      p5.noStroke();
      p5.rectMode(p5.CENTER);

      for (let i = 1; i <= 4; i++) {
        p5.fill(0, 0, 0, alpha * 0.06);
        p5.rect(i, i, 30 * nodeScale, 30 * nodeScale, 10);
      }

      // Main square - use node's color with alpha
      let nodeColor = p5.color(this.color());
      nodeColor.setAlpha(alpha);
      p5.fill(nodeColor);
      p5.rect(0, 0, 30 * nodeScale, 30 * nodeScale, 10);

      // Draw checkmark icon if the node is selected
      if (this.selected && this.appearProgress >= 1) {
        p5.stroke(255);
        p5.strokeWeight(2 * nodeScale);
        p5.noFill();
        // Draw checkmark
        p5.beginShape();
        p5.vertex(-8, 0);
        p5.vertex(-3, 5);
        p5.vertex(8, -6);
        p5.endShape();
      }

      p5.pop();
    }
  }

  isMouseOver(p5) {
    return this.visible &&
           p5.mouseX > this.x - 15 &&
           p5.mouseX < this.x + 15 &&
           p5.mouseY > this.y - 15 &&
           p5.mouseY < this.y + 15;
  }

  // Connect this node to a child node
  child(childNode) {
    // Create an edge from this node to the child
    let isLeft = childNode.x < this.x;
    let isRight = childNode.x > this.x;
    let edge = new Edge(this, childNode, isLeft, isRight);
    return edge;
  }
}

class Edge {
  constructor(parent, child, isLeft, isRight) {
    this.parent = parent;
    this.child = child;
    this.isLeft = isLeft;
    this.isRight = isRight;
    this.progress = 0;

    // Calculate the midpoint where branching occurs
    this.midY = parent.y + (child.y - parent.y) * 0.6;

    // Use the actual child x-coordinate
    // This ensures the edge will connect directly to the child node
    this.branchX = child.x;
  }

  update() {
    if (this.parent.visible && this.progress < 1) {
      this.progress += 0.01; // Adjust animation speed
    }
    if (this.progress >= 1) {
      this.child.visible = true;
    }
  }

  color() {
    return this.child.color();
  }

  render(p5) {
    if (!this.parent.visible) return;

    // Calculate path lengths
    const verticalDist1 = this.midY - this.parent.y;
    const horizontalDist = Math.abs(this.branchX - this.parent.x);
    const verticalDist2 = this.child.y - this.midY;
    const totalLength = verticalDist1 + horizontalDist + verticalDist2;

    // Calculate how much of each segment to draw
    const currentLength = totalLength * this.progress;

    p5.stroke(180, 190, 205);
    p5.strokeWeight(1.5);
    p5.noFill();

    // Always draw the first vertical segment from parent
    if (currentLength > 0) {
      const firstSegmentLength = Math.min(currentLength, verticalDist1);
      const currentMidY = p5.lerp(this.parent.y, this.midY, firstSegmentLength / verticalDist1);
      p5.line(this.parent.x, this.parent.y, this.parent.x, currentMidY);
    }

    if (currentLength > verticalDist1) {
      // Draw second segment (horizontal)
      const secondSegmentLength = Math.min(currentLength - verticalDist1, horizontalDist);
      const currentBranchX = p5.lerp(this.parent.x, this.branchX, secondSegmentLength / horizontalDist);
      p5.line(this.parent.x, this.midY, currentBranchX, this.midY);

      if (currentLength > verticalDist1 + horizontalDist) {
        // Draw third segment (vertical to child)
        const thirdSegmentLength = currentLength - verticalDist1 - horizontalDist;
        const currentChildY = p5.lerp(this.midY, this.child.y, thirdSegmentLength / verticalDist2);
        p5.line(this.branchX, this.midY, this.branchX, currentChildY);
      }
    }
  }
}

// Create a modified sketch for each stage
function createTreeSketch(stageId) {
  return function(p5) {
    let nodes = [];
    let edges = [];
    let treeData = stageData[stageId];

    p5.setup = function() {
      const canvas = p5.createCanvas(p5.windowWidth * 0.4, p5.windowHeight);
      canvas.parent('canvas-container');
      p5.smooth();
      p5.frameRate(60);

      if (treeData) {
        createTreeFromData(treeData);
      }
    };

    p5.windowResized = function() {
      p5.resizeCanvas(p5.windowWidth * 0.4, p5.windowHeight);
    };

    function createTreeFromData(data) {
      // Clear existing nodes and edges
      nodes = [];
      edges = [];

      // Add defensive checks to prevent errors
      if (!data || !data.layout || !Array.isArray(data.layout) || !data.edges || !Array.isArray(data.edges)) {
        console.error("Invalid tree data format:", data);
        return; // Exit if data structure is invalid
      }

      // Find all parent nodes in edges
      const parentNodes = new Set();
      for (const [parentId, childId] of data.edges) {
        parentNodes.add(parentId);
      }

      // Create nodes
      for (let i = 0; i < data.layout.length; i++) {
        const [nx, ny] = data.layout[i];
        // A node is a root if it's a parent and not a child in any edge
        const isRoot = parentNodes.has(i) && data.edges.every(edge => edge[1] !== i);

        const node = new Node(
          nx * p5.width * 0.8 + p5.width * 0.1,
          ny * p5.height * 0.8 + p5.height * 0.1,
          i,
          isRoot
        );
        nodes.push(node);
      }

      // If no root was found, make the first parent node visible
      if (!nodes.some(node => node.visible) && parentNodes.size > 0) {
        // Get the first parent node
        const firstParentId = [...parentNodes][0];
        if (nodes[firstParentId]) {
          nodes[firstParentId].visible = true;
        }
      }

      // Create edges
      for (const [parentId, childId] of data.edges) {
        const parent = nodes[parentId];
        const child = nodes[childId];
        if (parent && child) { // Verify both nodes exist
          const isLeft = child.x < parent.x;
          const isRight = child.x > parent.x;
          edges.push(new Edge(parent, child, isLeft, isRight));
        }
      }

      // Select the first node by default
      if (nodes.length > 0) {
        nodes[0].selected = true;
        updateNodeInfo(0);
      }
    }

    p5.draw = function() {
      // Use the global background color if available, otherwise use the default bgCol
      const currentBgColor = window.bgColCurrent || bgCol;
      p5.background(currentBgColor);

      // Update and render edges
      for (const edge of edges) {
        edge.update();
        edge.render(p5);
      }

      // Update and render nodes
      for (const node of nodes) {
        node.update();
        node.render(p5);
      }

      // Handle mouse hover
      p5.cursor(p5.ARROW);
      for (const node of nodes) {
        if (node.isMouseOver(p5)) {
          p5.cursor(p5.HAND);
        }
      }
    };

    p5.mousePressed = function() {
      // Check if any node was clicked
      for (let i = 0; i < nodes.length; i++) {
        if (nodes[i].visible && nodes[i].isMouseOver(p5)) {
          // Deselect all nodes
          nodes.forEach(n => n.selected = false);
          // Select the clicked node
          nodes[i].selected = true;
          // Update the right panel with node info
          updateNodeInfo(i);
          break;
        }
      }
    };

    function updateNodeInfo(nodeIndex) {
      if (treeData) {
        setNodeInfo(
          treeData.code[nodeIndex],
          treeData.plan[nodeIndex],
          treeData.plot_code?.[nodeIndex],
          treeData.plot_plan?.[nodeIndex],
          treeData.metrics?.[nodeIndex],
          treeData.exc_type?.[nodeIndex] || '',
          treeData.exc_info?.[nodeIndex]?.args?.[0] || '',
          treeData.exc_stack?.[nodeIndex] || [],
          treeData.plots?.[nodeIndex] || [],
          treeData.plot_analyses?.[nodeIndex] || [],
          treeData.vlm_feedback_summary?.[nodeIndex] || '',
          treeData.datasets_successfully_tested?.[nodeIndex] || [],
          treeData.exec_time_feedback?.[nodeIndex] || '',
          treeData.exec_time?.[nodeIndex] || ''
        );
      }
    }
  };
}

// Start a new p5 sketch for the given stage
function startSketch(stageId) {
  if (currentSketch) {
    currentSketch.remove();
  }

  if (stageData[stageId]) {
    currentSketch = new p5(createTreeSketch(stageId));

    // Update stage info
    const stageNumber = stageId.split('_')[1];
    let stageDesc = '';
    switch(stageId) {
      case 'Stage_1': stageDesc = 'Preliminary Investigation'; break;
      case 'Stage_2': stageDesc = 'Baseline Tuning'; break;
      case 'Stage_3': stageDesc = 'Research Agenda Execution'; break;
      case 'Stage_4': stageDesc = 'Ablation Studies'; break;
    }

    document.getElementById('stage-info').innerHTML =
      `<strong>Current Stage: ${stageNumber} - ${stageDesc}</strong>`;
  }
}

// Handle tab selection
function selectStage(stageId) {
  if (!stageData[stageId] || !availableStages.includes(stageId)) {
    return; // Don't allow selection of unavailable stages
  }

  // Update active tab styles
  document.querySelectorAll('.tab').forEach(tab => {
    tab.classList.remove('active');
  });
  document.querySelector(`.tab[data-stage="${stageId}"]`).classList.add('active');

  // Start the new sketch
  currentStage = stageId;
  startSketch(stageId);
}

// Function to load the tree data for all stages
async function loadAllStageData(baseTreeData) {
  console.log("Loading stage data with base data:", baseTreeData);

  // The base tree data is for the current stage
  const currentStageId = baseTreeData.current_stage || 'Stage_1';

  // Ensure base tree data is valid and has required properties
  if (baseTreeData && baseTreeData.layout && baseTreeData.edges) {
    stageData[currentStageId] = baseTreeData;
    availableStages.push(currentStageId);
    console.log(`Added current stage ${currentStageId} to available stages`);
  } else {
    console.warn(`Current stage ${currentStageId} data is invalid:`, baseTreeData);
  }

  // Use relative path to load other stage trees
  const logDirPath = baseTreeData.log_dir_path || '.';
  console.log("Log directory path:", logDirPath);

  // Load data for each stage if available
  const stageNames = ['Stage_1', 'Stage_2', 'Stage_3', 'Stage_4'];
  const stageNames2actualNames = {
    'Stage_1': 'stage_1_initial_implementation_1_preliminary',
    'Stage_2': 'stage_2_baseline_tuning_1_first_attempt',
    'Stage_3': 'stage_3_creative_research_1_first_attempt',
    'Stage_4': 'stage_4_ablation_studies_1_first_attempt'
    }

  for (const stage of stageNames) {

    if (baseTreeData.completed_stages && baseTreeData.completed_stages.includes(stage)) {
      try {
        console.log(`Attempting to load data for ${stage} from ${logDirPath}/${stageNames2actualNames[stage]}/tree_data.json`);
        const response = await fetch(`${logDirPath}/${stageNames2actualNames[stage]}/tree_data.json`);

        if (response.ok) {
          const data = await response.json();

          // Validate the loaded data
          if (data && data.layout && data.edges) {
            stageData[stage] = data;
            availableStages.push(stage);
            console.log(`Successfully loaded and validated data for ${stage}`);
          } else {
            console.warn(`Loaded data for ${stage} is invalid:`, data);
          }
        } else {
          console.warn(`Failed to load data for ${stage} - HTTP status ${response.status}`);
        }
      } catch (error) {
        console.error(`Error loading data for ${stage}:`, error);
      }
    } else {
      console.log(`Skipping stage ${stage} - not in completed stages list:`, baseTreeData.completed_stages);
    }
  }

  // Update tab visibility based on available stages
  updateTabVisibility();

  // Start with the first available stage
  if (availableStages.length > 0) {
    selectStage(availableStages[0]);
  } else {
    console.warn("No stages available to display");
    // Display a message in the canvas area
    document.getElementById('canvas-container').innerHTML =
      '<div style="padding: 20px; color: #333; text-align: center;"><h3>No valid tree data available to display</h3></div>';
  }
}

// Update tab visibility based on available stages
function updateTabVisibility() {
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(tab => {
    const stageId = tab.getAttribute('data-stage');
    if (availableStages.includes(stageId)) {
      tab.classList.remove('disabled');
    } else {
      tab.classList.add('disabled');
    }
  });
}

// Utility function to set the node info in the right panel
const setNodeInfo = (code, plan, plot_code, plot_plan, metrics = null, exc_type = '', exc_info = '',
    exc_stack = [], plots = [], plot_analyses = [], vlm_feedback_summary = '',
    datasets_successfully_tested = [], exec_time_feedback = '', exec_time = '') => {
  const codeElm = document.getElementById("code");
  if (codeElm) {
    if (code) {
      codeElm.innerHTML = hljs.highlight(code, { language: "python" }).value;
    } else {
      codeElm.innerHTML = '<p>No code available</p>';
    }
  }

  const planElm = document.getElementById("plan");
  if (planElm) {
    if (plan) {
      planElm.innerHTML = hljs.highlight(plan, { language: "plaintext" }).value;
    } else {
      planElm.innerHTML = '<p>No plan available</p>';
    }
  }

  const plot_codeElm = document.getElementById("plot_code");
  if (plot_codeElm) {
    if (plot_code) {
      plot_codeElm.innerHTML = hljs.highlight(plot_code, { language: "python" }).value;
    } else {
      plot_codeElm.innerHTML = '<p>No plot code available</p>';
    }
  }

  const plot_planElm = document.getElementById("plot_plan");
  if (plot_planElm) {
    if (plot_plan) {
      plot_planElm.innerHTML = hljs.highlight(plot_plan, { language: "plaintext" }).value;
    } else {
      plot_planElm.innerHTML = '<p>No plot plan available</p>';
    }
  }

  const metricsElm = document.getElementById("metrics");
  if (metricsElm) {
      let metricsContent = `<h3>Metrics:</h3>`;
      if (metrics && metrics.metric_names) {
          for (const metric of metrics.metric_names) {
              metricsContent += `<div class="metric-group">`;
              metricsContent += `<h4>${metric.metric_name}</h4>`;
              metricsContent += `<p><strong>Description:</strong> ${metric.description || 'N/A'}</p>`;
              metricsContent += `<p><strong>Optimization:</strong> ${metric.lower_is_better ? 'Minimize' : 'Maximize'}</p>`;

              // Create table for dataset values
              metricsContent += `<table class="metric-table">
                  <tr>
                      <th>Dataset</th>
                      <th>Final Value</th>
                      <th>Best Value</th>
                  </tr>`;

              for (const dataPoint of metric.data) {
                  metricsContent += `<tr>
                      <td>${dataPoint.dataset_name}</td>
                      <td>${dataPoint.final_value?.toFixed(4) || 'N/A'}</td>
                      <td>${dataPoint.best_value?.toFixed(4) || 'N/A'}</td>
                  </tr>`;
              }

              metricsContent += `</table></div>`;
          }
      } else if (metrics === null) {
          metricsContent += `<p>No metrics available</p>`;
      }
      metricsElm.innerHTML = metricsContent;
  }

  // Add plots display
  const plotsElm = document.getElementById("plots");
  if (plotsElm) {
      if (plots && plots.length > 0) {
          let plotsContent = '';
          plots.forEach(plotPath => {
              plotsContent += `
                  <div class="plot-item">
                      <img src="${plotPath}" alt="Experiment Plot" onerror="console.error('Failed to load plot:', this.src)"/>
                  </div>`;
          });
          plotsElm.innerHTML = plotsContent;
      } else {
          plotsElm.innerHTML = '';
      }
  }

  // Add error info display
  const errorElm = document.getElementById("exc_info");
  if (errorElm) {
    if (exc_type) {
      let errorContent = `<h3 style="color: #ff5555">Exception Information:</h3>
                          <p><strong>Type:</strong> ${exc_type}</p>`;

      if (exc_info) {
        errorContent += `<p><strong>Details:</strong> <pre>${JSON.stringify(exc_info, null, 2)}</pre></p>`;
      }

      if (exc_stack) {
        errorContent += `<p><strong>Stack Trace:</strong> <pre>${exc_stack.join('\n')}</pre></p>`;
      }

      errorElm.innerHTML = errorContent;
    } else {
      errorElm.innerHTML = "No exception info available";
    }
  }

  const exec_timeElm = document.getElementById("exec_time");
  if (exec_timeElm) {
    let exec_timeContent = '<div id="exec_time"><h3>Execution Time (in seconds):</h3><p>' + exec_time + '</p></div>';
    exec_timeElm.innerHTML = exec_timeContent;
  }

  const exec_time_feedbackElm = document.getElementById("exec_time_feedback");
  if (exec_time_feedbackElm) {
    let exec_time_feedbackContent = '<div id="exec_time_feedback_content">'
    exec_time_feedbackContent += '<h3>Execution Time Feedback:</h3>'
    exec_time_feedbackContent += '<p>' + exec_time_feedback + '</p>'
    exec_time_feedbackContent += '</div>';
    exec_time_feedbackElm.innerHTML = exec_time_feedbackContent;
  }

  const vlm_feedbackElm = document.getElementById("vlm_feedback");
  if (vlm_feedbackElm) {
      let vlm_feedbackContent = '';

      if (plot_analyses && plot_analyses.length > 0) {
          vlm_feedbackContent += `<h3>Plot Analysis:</h3>`;
          plot_analyses.forEach(analysis => {
              if (analysis && analysis.plot_path) {  // Add null check
                  vlm_feedbackContent += `
                      <div class="plot-analysis">
                          <h4>Analysis for ${analysis.plot_path.split('/').pop()}</h4>
                          <p>${analysis.analysis || 'No analysis available'}</p>
                          <ul class="key-findings">
                              ${(analysis.key_findings || []).map(finding => `<li>${finding}</li>`).join('')}
                          </ul>
                      </div>`;
              } else {
                  console.warn('Received invalid plot analysis:', analysis);
                  vlm_feedbackContent += `
                      <div class="plot-analysis">
                          <p>Invalid plot analysis data received</p>
                      </div>`;
              }
          });
      }

      // Add actionable insights if available
      if (vlm_feedback_summary && typeof vlm_feedback_summary === 'string') {
          vlm_feedbackContent += `
              <div class="vlm_feedback">
                  <h3>VLM Feedback Summary:</h3>
                  <p>${vlm_feedback_summary}</p>
              </div>`;
      }

      console.log("Datasets successfully tested:", datasets_successfully_tested);
      if (datasets_successfully_tested && datasets_successfully_tested.length > 0) {
          vlm_feedbackContent += `
              <div id="datasets_successfully_tested">
                  <h3>Datasets Successfully Tested:</h3>
                  <p>${datasets_successfully_tested.join(', ')}</p>
              </div>`;
      }

      if (!vlm_feedbackContent) {
          vlm_feedbackContent = '<p>No insights available for this experiment.</p>';
      }

      vlm_feedbackElm.innerHTML = vlm_feedbackContent;
  }

  const datasets_successfully_testedElm = document.getElementById("datasets_successfully_tested");
  if (datasets_successfully_testedElm) {
      let datasets_successfully_testedContent = '';
      if (datasets_successfully_tested && datasets_successfully_tested.length > 0) {
          datasets_successfully_testedContent = `<h3>Datasets Successfully Tested:</h3><ul>`;
          datasets_successfully_tested.forEach(dataset => {
              datasets_successfully_testedContent += `<li>${dataset}</li>`;
          });
          datasets_successfully_testedContent += `</ul>`;
      } else {
          datasets_successfully_testedContent = '<p>No datasets tested yet</p>';
      }
      datasets_successfully_testedElm.innerHTML = datasets_successfully_testedContent;
  }
};

const treeStructData = {"edges": [[0, 11], [3, 6], [4, 8], [8, 14], [8, 13], [8, 12], [8, 15]], "layout": [[0.0, 0.0], [0.125, 0.0], [0.25, 0.0], [0.375, 0.0], [0.5, 0.0], [0.625, 0.0], [0.375, 0.5], [0.75, 0.0], [0.5, 0.5], [0.875, 0.0], [1.0, 0.0], [0.0, 0.5], [0.3125, 1.0], [0.4375, 1.0], [0.5625, 1.0], [0.6875, 1.0]], "plan": ["I'll implement a baseline CATA system with these components: (1) a simple\nwarehouse simulator that generates agent movements and congestion patterns, (2)\na Graph Neural Network to predict congestion heatmaps, (3) a path cost estimator\nusing predicted congestion, and (4) comparison between distance-based and\ncongestion-aware task allocation using Hungarian algorithm. The simulator will\ncreate a grid-based warehouse with agents moving to assigned tasks. I'll\ngenerate training data by running the simulator with random task assignments and\nrecording congestion patterns. The GNN will use agent positions and task\nlocations as node features to predict future congestion on grid cells. For\nevaluation, I'll compare throughput (tasks completed per minute) between\nbaseline distance-only allocation and our congestion-aware approach across\ndifferent agent densities.", "I'll implement a basic CATA framework with three components: (1) a GNN for\npredicting congestion heatmaps, (2) a path cost estimator using predicted\ncongestion, and (3) a modified assignment algorithm. First, I'll create a\nsynthetic warehouse environment with agents and tasks, generate training data by\nrunning baseline simulations, train the GNN on congestion labels, then compare\nCATA against a distance-based baseline. The warehouse will be a grid where\nagents move to complete tasks, and congestion occurs when multiple agents\nconverge on the same cells. I'll use a simple Graph Attention Network\narchitecture to process agent positions and task locations. For evaluation, I'll\nrun simulations measuring throughput (tasks completed per minute). The Hungarian\nalgorithm will be used for optimal assignment with congestion-penalized costs.\nThis preliminary implementation focuses on correctness with a small-scale setup\n(20-30 agents on a 20x20 grid).", "I'll implement a baseline for the Congestion-Aware Task Allocation (CATA)\nsystem. The approach will: (1) Create a simple warehouse grid simulation with\nagents and tasks, (2) Implement a basic GNN to predict congestion heatmaps from\nagent/task states, (3) Generate training data by running a distance-based\nbaseline and extracting congestion labels, (4) Train the GNN on this data, (5)\nImplement both distance-based and congestion-aware allocation using the\npredicted heatmaps with a modified Hungarian algorithm, and (6) Compare\nthroughput between methods. For this preliminary implementation, I'll use a\n20x20 grid with 20 agents, synthetic task generation, and a simple 2-layer Graph\nAttention Network for congestion prediction.", "I'll implement a baseline for the Congestion-Aware Task Allocation (CATA)\nframework. The approach will: (1) Create a synthetic warehouse environment with\nagents and tasks, (2) Build a simple GNN to predict congestion heatmaps from\nagent/task states, (3) Generate training data by running a baseline distance-\nbased allocation and extracting congestion labels, (4) Train the GNN on this\ndata, (5) Implement both distance-based and congestion-aware allocation using\npredicted heatmaps, (6) Compare throughput between methods. For this initial\nimplementation, I'll use a small warehouse grid (20x20), 20-30 agents, and\nsimulate task completion over multiple timesteps. The GNN will use a simple\narchitecture with graph convolutions over agent-task relationships.", "Based on the memory section, I'll implement a simple working baseline that\navoids the PyTorch Geometric dependency issues. The approach will be: (1) create\na simple warehouse simulator with agents and tasks on a grid, (2) implement\ndistance-based Hungarian assignment as baseline, (3) implement a congestion-\naware assignment using a simple CNN-based congestion predictor instead of GNN,\n(4) train the predictor on simulated data, and (5) compare throughput between\nmethods. I'll use plain PyTorch for the congestion prediction model, which takes\na grid representation of agent positions/velocities and task locations, and\noutputs a congestion heatmap. The Hungarian algorithm will incorporate predicted\ncongestion costs for the CATA approach. This staged implementation ensures we\ncan validate each component independently.", "Based on the memory summary, I'll create a simple working baseline that avoids\nthe PyTorch Geometric dependency issue. The plan is: (1) Build a simple\nwarehouse grid simulator with agents and tasks, (2) Implement distance-based\nHungarian assignment as baseline, (3) Create a heuristic congestion estimator\n(counting nearby agents), (4) Implement congestion-aware assignment that\npenalizes high-congestion paths, (5) Use a simple MLP to predict congestion from\nagent/task positions (pure PyTorch, no PyG), (6) Compare throughput between\ndistance-only and congestion-aware approaches. This staged approach ensures we\ncan validate the core hypothesis without dependency issues.", "The bug is that `torch_geometric` is not installed in the environment. To fix\nthis, I'll implement the GNN using standard PyTorch modules instead of PyG's\n`GCNConv` and `global_mean_pool`. I'll create a simple graph convolution layer\nmanually using adjacency matrix multiplication, and replace the DataLoader with\ncustom batching. This approach maintains the same functionality while only\nrequiring PyTorch.", "Based on the memory and recommendations, I'll implement a simple baseline that\navoids the PyTorch Geometric dependency issue. The approach is: (1) Build a\nsimple warehouse simulator with agents and tasks, (2) Implement distance-based\nHungarian assignment as baseline, (3) Create a CNN-based congestion predictor\nusing plain PyTorch on grid representations, (4) Implement congestion-aware\nassignment using predicted heatmaps, (5) Compare throughput between methods\nacross different agent densities. The congestion predictor takes a grid encoding\nof agent positions and pending tasks, and predicts future occupancy. Training\ndata comes from simulation rollouts. This staged approach allows testing the\ncore hypothesis without complex graph dependencies.", "The bug is caused by the `scipy` library not being installed in the environment.\nTo fix this, I'll replace the `scipy.optimize.linear_sum_assignment` function\nwith a pure NumPy/Python greedy assignment implementation. This greedy approach\nassigns each agent to its closest available task, which is a reasonable\napproximation for the Hungarian algorithm in this preliminary implementation\nstage.", "I'll implement a minimal, dependency-safe baseline for Congestion-Aware Task\nAllocation (CATA) in multi-agent warehouse systems. The design includes: (1) a\nsimple grid-based warehouse simulator with agents and tasks, (2) a heuristic\ncongestion estimator that counts agent density in grid regions, (3) two\nassignment strategies - distance-based and congestion-aware, (4) a greedy\nassignment solver to avoid scipy dependency issues. The simulator runs episodes\nwhere agents move toward assigned tasks, and we measure throughput (tasks\ncompleted per minute). I'll also train a simple CNN to predict congestion\nheatmaps from agent/task positions, then integrate these predictions into task\nallocation. The evaluation compares distance-based, heuristic congestion-aware,\nand learned congestion-aware allocation across different agent densities.", "I'll implement a minimal, dependency-safe baseline for the Congestion-Aware Task\nAllocation (CATA) system. The design includes: (1) a simple grid-based warehouse\nsimulator with agents and tasks, (2) a heuristic congestion estimator based on\nagent density, (3) both distance-based and congestion-aware assignment policies\nusing a greedy matching fallback, and (4) evaluation via throughput measurement.\nThe congestion heuristic computes local agent density around each grid cell and\nadds penalties to path costs. For learning, I'll train a simple CNN to predict\ncongestion heatmaps from agent/task positions, then use these predictions in\nallocation. The simulator runs episodes comparing distance-only vs congestion-\naware allocation across different agent densities (20, 50, 80 agents). I'll\nmeasure throughput (tasks per minute) as the primary metric and visualize\ncongestion heatmaps and throughput comparisons.", "The bug is a missing `torch_geometric` module. To fix this, I'll replace the GNN\nimplementation with a standard PyTorch neural network that doesn't require\n`torch_geometric`. Instead of graph convolutions, I'll use a simple MLP that\ntakes flattened agent state features and predicts congestion heatmaps. This\nmaintains the core research idea while avoiding the dependency issue.", "Seed node", "Seed node", "Seed node", "Aggregate results from multiple seeds"], "code": ["import os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch_geometric.nn import GCNConv, global_mean_pool\nfrom torch_geometric.data import Data, DataLoader\nfrom scipy.optimize import linear_sum_assignment\nimport matplotlib.pyplot as plt\nfrom collections import defaultdict\nimport time\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n# Experiment data storage\nexperiment_data = {\n    \"training\": {\"losses\": {\"train\": [], \"val\": []}, \"epochs\": []},\n    \"evaluation\": {\n        \"distance_based\": {\"throughput\": [], \"completion_times\": []},\n        \"congestion_aware\": {\"throughput\": [], \"completion_times\": []},\n    },\n}\n\n\n# Simple Warehouse Simulator\nclass WarehouseSimulator:\n    def __init__(self, grid_size=20, num_agents=20, seed=None):\n        if seed is not None:\n            np.random.seed(seed)\n        self.grid_size = grid_size\n        self.num_agents = num_agents\n        self.agent_positions = np.random.randint(0, grid_size, (num_agents, 2))\n        self.agent_targets = np.zeros((num_agents, 2), dtype=int) - 1\n        self.tasks_completed = 0\n        self.timestep = 0\n        self.congestion_history = []\n\n    def generate_tasks(self, num_tasks):\n        return np.random.randint(0, self.grid_size, (num_tasks, 2))\n\n    def compute_congestion_heatmap(self):\n        heatmap = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            x, y = pos\n            for dx in range(-2, 3):\n                for dy in range(-2, 3):\n                    nx, ny = x + dx, y + dy\n                    if 0 <= nx < self.grid_size and 0 <= ny < self.grid_size:\n                        heatmap[nx, ny] += 1.0 / (1 + abs(dx) + abs(dy))\n        return heatmap / (heatmap.max() + 1e-6)\n\n    def step(self):\n        self.timestep += 1\n        completed = 0\n        for i in range(self.num_agents):\n            if self.agent_targets[i, 0] >= 0:\n                # Move towards target (simple greedy)\n                diff = self.agent_targets[i] - self.agent_positions[i]\n                move = np.sign(diff)\n                if np.any(move != 0):\n                    # Check for collision (simple)\n                    new_pos = self.agent_positions[i] + move\n                    collision = False\n                    for j in range(self.num_agents):\n                        if i != j and np.array_equal(new_pos, self.agent_positions[j]):\n                            collision = True\n                            break\n                    if not collision:\n                        self.agent_positions[i] = new_pos\n\n                # Check if reached target\n                if np.array_equal(self.agent_positions[i], self.agent_targets[i]):\n                    self.tasks_completed += 1\n                    completed += 1\n                    self.agent_targets[i] = [-1, -1]\n\n        self.congestion_history.append(self.compute_congestion_heatmap())\n        return completed\n\n    def assign_tasks_distance(self, tasks):\n        \"\"\"Distance-based assignment using Hungarian algorithm\"\"\"\n        if len(tasks) == 0:\n            return\n        available = [i for i in range(self.num_agents) if self.agent_targets[i, 0] < 0]\n        if len(available) == 0:\n            return\n\n        n_assign = min(len(available), len(tasks))\n        cost_matrix = np.zeros((n_assign, n_assign))\n        for i, agent_idx in enumerate(available[:n_assign]):\n            for j in range(n_assign):\n                cost_matrix[i, j] = np.abs(\n                    self.agent_positions[agent_idx] - tasks[j]\n                ).sum()\n\n        row_ind, col_ind = linear_sum_assignment(cost_matrix)\n        for r, c in zip(row_ind, col_ind):\n            self.agent_targets[available[r]] = tasks[c]\n\n        return tasks[n_assign:]  # Remaining tasks\n\n    def assign_tasks_congestion_aware(\n        self, tasks, congestion_predictor=None, congestion_weight=0.5\n    ):\n        \"\"\"Congestion-aware assignment\"\"\"\n        if len(tasks) == 0:\n            return\n        available = [i for i in range(self.num_agents) if self.agent_targets[i, 0] < 0]\n        if len(available) == 0:\n            return\n\n        n_assign = min(len(available), len(tasks))\n        cost_matrix = np.zeros((n_assign, n_assign))\n\n        # Get predicted congestion\n        if congestion_predictor is not None:\n            with torch.no_grad():\n                pred_congestion = congestion_predictor.predict(\n                    self.agent_positions, self.agent_targets, tasks, self.grid_size\n                )\n        else:\n            pred_congestion = self.compute_congestion_heatmap()\n\n        for i, agent_idx in enumerate(available[:n_assign]):\n            for j in range(n_assign):\n                # Distance cost\n                dist = np.abs(self.agent_positions[agent_idx] - tasks[j]).sum()\n\n                # Congestion cost along path\n                path_congestion = self._estimate_path_congestion(\n                    self.agent_positions[agent_idx], tasks[j], pred_congestion\n                )\n\n                cost_matrix[i, j] = (\n                    dist + congestion_weight * path_congestion * self.grid_size\n                )\n\n        row_ind, col_ind = linear_sum_assignment(cost_matrix)\n        for r, c in zip(row_ind, col_ind):\n            self.agent_targets[available[r]] = tasks[c]\n\n        return tasks[n_assign:]\n\n    def _estimate_path_congestion(self, start, end, congestion_map):\n        \"\"\"Estimate congestion along straight-line path\"\"\"\n        steps = max(abs(end[0] - start[0]), abs(end[1] - start[1])) + 1\n        if steps <= 1:\n            return 0\n        congestion_sum = 0\n        for t in np.linspace(0, 1, steps):\n            x = int(start[0] + t * (end[0] - start[0]))\n            y = int(start[1] + t * (end[1] - start[1]))\n            x = np.clip(x, 0, self.grid_size - 1)\n            y = np.clip(y, 0, self.grid_size - 1)\n            congestion_sum += congestion_map[x, y]\n        return congestion_sum / steps\n\n\n# GNN for Congestion Prediction\nclass CongestionGNN(nn.Module):\n    def __init__(self, input_dim=4, hidden_dim=64, grid_size=20):\n        super().__init__()\n        self.grid_size = grid_size\n        self.conv1 = GCNConv(input_dim, hidden_dim)\n        self.conv2 = GCNConv(hidden_dim, hidden_dim)\n        self.fc1 = nn.Linear(hidden_dim, hidden_dim)\n        self.fc2 = nn.Linear(hidden_dim, grid_size * grid_size)\n\n    def forward(self, data):\n        x, edge_index, batch = data.x, data.edge_index, data.batch\n        x = F.relu(self.conv1(x, edge_index))\n        x = F.relu(self.conv2(x, edge_index))\n        x = global_mean_pool(x, batch)\n        x = F.relu(self.fc1(x))\n        x = torch.sigmoid(self.fc2(x))\n        return x.view(-1, self.grid_size, self.grid_size)\n\n    def predict(self, agent_positions, agent_targets, tasks, grid_size):\n        \"\"\"Create graph and predict congestion\"\"\"\n        # Create nodes for agents and tasks\n        nodes = []\n        for i, pos in enumerate(agent_positions):\n            target = agent_targets[i] if agent_targets[i, 0] >= 0 else pos\n            nodes.append(\n                [\n                    pos[0] / grid_size,\n                    pos[1] / grid_size,\n                    target[0] / grid_size,\n                    target[1] / grid_size,\n                ]\n            )\n\n        if len(nodes) == 0:\n            return np.zeros((grid_size, grid_size))\n\n        x = torch.tensor(nodes, dtype=torch.float32).to(device)\n\n        # Create fully connected edges\n        n = len(nodes)\n        if n > 1:\n            edge_index = (\n                torch.tensor(\n                    [[i, j] for i in range(n) for j in range(n) if i != j],\n                    dtype=torch.long,\n                )\n                .t()\n                .contiguous()\n                .to(device)\n            )\n        else:\n            edge_index = torch.tensor([[], []], dtype=torch.long).to(device)\n\n        data = Data(\n            x=x,\n            edge_index=edge_index,\n            batch=torch.zeros(n, dtype=torch.long).to(device),\n        )\n\n        with torch.no_grad():\n            pred = self(data)\n        return pred[0].cpu().numpy()\n\n\n# Generate training data\ndef generate_training_data(num_samples=500, grid_size=20, num_agents=20, steps=10):\n    data_list = []\n\n    for _ in range(num_samples):\n        sim = WarehouseSimulator(grid_size, num_agents)\n        tasks = sim.generate_tasks(num_agents)\n        sim.assign_tasks_distance(tasks)\n\n        # Collect initial state\n        nodes = []\n        for i, pos in enumerate(sim.agent_positions):\n            target = sim.agent_targets[i] if sim.agent_targets[i, 0] >= 0 else pos\n            nodes.append(\n                [\n                    pos[0] / grid_size,\n                    pos[1] / grid_size,\n                    target[0] / grid_size,\n                    target[1] / grid_size,\n                ]\n            )\n\n        # Run simulation and get future congestion\n        for _ in range(steps):\n            sim.step()\n\n        # Average congestion over prediction horizon\n        if len(sim.congestion_history) > 0:\n            future_congestion = np.mean(\n                sim.congestion_history[-min(5, len(sim.congestion_history)) :], axis=0\n            )\n        else:\n            future_congestion = np.zeros((grid_size, grid_size))\n\n        x = torch.tensor(nodes, dtype=torch.float32)\n        n = len(nodes)\n        if n > 1:\n            edge_index = (\n                torch.tensor(\n                    [[i, j] for i in range(n) for j in range(n) if i != j],\n                    dtype=torch.long,\n                )\n                .t()\n                .contiguous()\n            )\n        else:\n            edge_index = torch.tensor([[], []], dtype=torch.long)\n\n        y = torch.tensor(future_congestion, dtype=torch.float32)\n        data_list.append(Data(x=x, edge_index=edge_index, y=y))\n\n    return data_list\n\n\n# Train GNN\ndef train_gnn(model, train_loader, val_loader, epochs=50, lr=1e-3):\n    optimizer = torch.optim.Adam(model.parameters(), lr=lr)\n    criterion = nn.MSELoss()\n\n    for epoch in range(epochs):\n        model.train()\n        train_loss = 0\n        for batch in train_loader:\n            batch = batch.to(device)\n            optimizer.zero_grad()\n            pred = model(batch)\n            loss = criterion(pred, batch.y.view(-1, model.grid_size, model.grid_size))\n            loss.backward()\n            optimizer.step()\n            train_loss += loss.item()\n        train_loss /= len(train_loader)\n\n        model.eval()\n        val_loss = 0\n        with torch.no_grad():\n            for batch in val_loader:\n                batch = batch.to(device)\n                pred = model(batch)\n                loss = criterion(\n                    pred, batch.y.view(-1, model.grid_size, model.grid_size)\n                )\n                val_loss += loss.item()\n        val_loss /= len(val_loader)\n\n        experiment_data[\"training\"][\"losses\"][\"train\"].append(train_loss)\n        experiment_data[\"training\"][\"losses\"][\"val\"].append(val_loss)\n        experiment_data[\"training\"][\"epochs\"].append(epoch)\n\n        if epoch % 10 == 0:\n            print(\n                f\"Epoch {epoch}: train_loss = {train_loss:.4f}, validation_loss = {val_loss:.4f}\"\n            )\n\n    return model\n\n\n# Evaluation function\ndef evaluate_method(\n    method=\"distance\",\n    num_agents=20,\n    grid_size=20,\n    simulation_time=200,\n    congestion_predictor=None,\n):\n    sim = WarehouseSimulator(grid_size, num_agents, seed=42)\n    tasks_queue = []\n    total_tasks_completed = 0\n    completion_times = []\n    task_start_times = {}\n\n    for t in range(simulation_time):\n        # Generate new tasks periodically\n        if t % 5 == 0:\n            new_tasks = sim.generate_tasks(max(1, num_agents // 4))\n            for task in new_tasks:\n                tasks_queue.append((task, t))\n\n        # Assign tasks\n        if len(tasks_queue) > 0:\n            tasks_to_assign = [tq[0] for tq in tasks_queue[:num_agents]]\n            start_times = [tq[1] for tq in tasks_queue[:num_agents]]\n\n            if method == \"distance\":\n                remaining = sim.assign_tasks_distance(np.array(tasks_to_assign))\n            else:\n                remaining = sim.assign_tasks_congestion_aware(\n                    np.array(tasks_to_assign),\n                    congestion_predictor,\n                    congestion_weight=1.0,\n                )\n\n            n_assigned = len(tasks_to_assign) - (\n                len(remaining) if remaining is not None else 0\n            )\n            for i in range(n_assigned):\n                task_key = tuple(tasks_to_assign[i])\n                task_start_times[task_key] = start_times[i]\n            tasks_queue = tasks_queue[n_assigned:]\n\n        # Simulate one step\n        completed_before = sim.tasks_completed\n        sim.step()\n        completed_now = sim.tasks_completed - completed_before\n        total_tasks_completed += completed_now\n\n    # Throughput: tasks per minute (assuming 1 timestep = 1 second, 60 steps = 1 minute)\n    throughput = total_tasks_completed / (simulation_time / 60.0)\n    return throughput, sim.tasks_completed\n\n\n# Main execution\nprint(\"Generating training data...\")\ndata_list = generate_training_data(num_samples=300, grid_size=20, num_agents=20)\ntrain_data = data_list[:240]\nval_data = data_list[240:]\n\ntrain_loader = DataLoader(train_data, batch_size=16, shuffle=True)\nval_loader = DataLoader(val_data, batch_size=16)\n\nprint(\"Training GNN...\")\nmodel = CongestionGNN(input_dim=4, hidden_dim=64, grid_size=20).to(device)\nmodel = train_gnn(model, train_loader, val_loader, epochs=50, lr=1e-3)\n\n# Evaluation\nprint(\"\\nEvaluating methods...\")\nagent_counts = [20, 40, 60, 80]\nresults = {\"distance\": [], \"congestion_aware\": []}\n\nfor num_agents in agent_counts:\n    print(f\"\\nTesting with {num_agents} agents...\")\n\n    # Distance-based\n    throughput_dist, _ = evaluate_method(\n        \"distance\",\n        num_agents=num_agents,\n        simulation_time=200,\n        congestion_predictor=None,\n    )\n    results[\"distance\"].append(throughput_dist)\n    experiment_data[\"evaluation\"][\"distance_based\"][\"throughput\"].append(\n        throughput_dist\n    )\n    print(f\"  Distance-based throughput: {throughput_dist:.2f} tasks/min\")\n\n    # Congestion-aware\n    throughput_cata, _ = evaluate_method(\n        \"congestion_aware\",\n        num_agents=num_agents,\n        simulation_time=200,\n        congestion_predictor=model,\n    )\n    results[\"congestion_aware\"].append(throughput_cata)\n    experiment_data[\"evaluation\"][\"congestion_aware\"][\"throughput\"].append(\n        throughput_cata\n    )\n    print(f\"  Congestion-aware throughput: {throughput_cata:.2f} tasks/min\")\n\n    improvement = (throughput_cata - throughput_dist) / throughput_dist * 100\n    print(f\"  Improvement: {improvement:.1f}%\")\n\n# Summary\nprint(\"\\n\" + \"=\" * 50)\nprint(\"SUMMARY - Throughput (tasks/minute)\")\nprint(\"=\" * 50)\nprint(f\"{'Agents':<10} {'Distance':<15} {'CATA':<15} {'Improvement':<15}\")\nfor i, num_agents in enumerate(agent_counts):\n    dist = results[\"distance\"][i]\n    cata = results[\"congestion_aware\"][i]\n    imp = (cata - dist) / dist * 100\n    print(f\"{num_agents:<10} {dist:<15.2f} {cata:<15.2f} {imp:<15.1f}%\")\n\n# Final metric\navg_throughput_cata = np.mean(results[\"congestion_aware\"])\nprint(\n    f\"\\nPrimary Metric - Average CATA throughput_tasks_per_minute: {avg_throughput_cata:.2f}\"\n)\n\n# Visualization\nfig, axes = plt.subplots(1, 2, figsize=(12, 5))\n\n# Training loss\naxes[0].plot(experiment_data[\"training\"][\"losses\"][\"train\"], label=\"Train Loss\")\naxes[0].plot(experiment_data[\"training\"][\"losses\"][\"val\"], label=\"Val Loss\")\naxes[0].set_xlabel(\"Epoch\")\naxes[0].set_ylabel(\"Loss\")\naxes[0].set_title(\"GNN Training Loss\")\naxes[0].legend()\n\n# Throughput comparison\nx = np.arange(len(agent_counts))\nwidth = 0.35\naxes[1].bar(x - width / 2, results[\"distance\"], width, label=\"Distance-based\")\naxes[1].bar(x + width / 2, results[\"congestion_aware\"], width, label=\"CATA\")\naxes[1].set_xlabel(\"Number of Agents\")\naxes[1].set_ylabel(\"Throughput (tasks/min)\")\naxes[1].set_title(\"Throughput Comparison\")\naxes[1].set_xticks(x)\naxes[1].set_xticklabels(agent_counts)\naxes[1].legend()\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"cata_results.png\"), dpi=150)\nplt.close()\n\n# Save experiment data\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(f\"\\nResults saved to {working_dir}\")\n", "import os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch_geometric.nn import GATConv, global_mean_pool\nfrom torch_geometric.data import Data, Batch\nfrom scipy.optimize import linear_sum_assignment\nimport matplotlib.pyplot as plt\nfrom collections import defaultdict\nimport time\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n# Experiment data storage\nexperiment_data = {\n    \"training\": {\"losses\": {\"train\": [], \"val\": []}, \"epochs\": []},\n    \"evaluation\": {\n        \"cata_throughput\": [],\n        \"baseline_throughput\": [],\n        \"cata_completion_times\": [],\n        \"baseline_completion_times\": [],\n    },\n}\n\n\n# Warehouse environment\nclass WarehouseEnv:\n    def __init__(self, grid_size=20, n_agents=25, n_tasks=50):\n        self.grid_size = grid_size\n        self.n_agents = n_agents\n        self.n_tasks = n_tasks\n        self.reset()\n\n    def reset(self):\n        # Initialize agent positions randomly\n        positions = set()\n        self.agent_positions = []\n        while len(self.agent_positions) < self.n_agents:\n            pos = (np.random.randint(self.grid_size), np.random.randint(self.grid_size))\n            if pos not in positions:\n                positions.add(pos)\n                self.agent_positions.append(list(pos))\n        self.agent_positions = np.array(self.agent_positions, dtype=np.float32)\n        self.agent_targets = [None] * self.n_agents\n        self.agent_velocities = np.zeros((self.n_agents, 2), dtype=np.float32)\n\n        # Generate tasks\n        self.tasks = []\n        for _ in range(self.n_tasks):\n            self.tasks.append(\n                [np.random.randint(self.grid_size), np.random.randint(self.grid_size)]\n            )\n        self.pending_tasks = list(range(len(self.tasks)))\n        self.completed_tasks = 0\n        self.time_step = 0\n        return self.get_state()\n\n    def get_state(self):\n        return {\n            \"agent_positions\": self.agent_positions.copy(),\n            \"agent_velocities\": self.agent_velocities.copy(),\n            \"pending_tasks\": [self.tasks[i] for i in self.pending_tasks],\n            \"task_indices\": self.pending_tasks.copy(),\n        }\n\n    def compute_congestion_heatmap(self, T=5):\n        \"\"\"Compute ground truth congestion heatmap for next T steps\"\"\"\n        heatmap = np.zeros((self.grid_size, self.grid_size), dtype=np.float32)\n        for i, pos in enumerate(self.agent_positions):\n            target = self.agent_targets[i]\n            if target is not None:\n                # Simulate path and mark cells\n                curr = pos.copy()\n                task_pos = np.array(self.tasks[target])\n                for t in range(T):\n                    diff = task_pos - curr\n                    if np.abs(diff).sum() < 0.5:\n                        break\n                    move = np.sign(diff)\n                    if np.random.random() < 0.5:\n                        move[1] = 0\n                    else:\n                        move[0] = 0\n                    curr = curr + move\n                    curr = np.clip(curr, 0, self.grid_size - 1)\n                    x, y = int(curr[0]), int(curr[1])\n                    heatmap[x, y] += 1.0\n            else:\n                x, y = int(pos[0]), int(pos[1])\n                heatmap[x, y] += 1.0\n        return heatmap / max(1, heatmap.max())\n\n    def assign_tasks(self, assignments):\n        \"\"\"Assign tasks to agents\"\"\"\n        for agent_id, task_idx in assignments:\n            if task_idx in self.pending_tasks:\n                self.agent_targets[agent_id] = task_idx\n                self.pending_tasks.remove(task_idx)\n\n    def step(self):\n        \"\"\"Move agents toward their targets\"\"\"\n        self.time_step += 1\n        for i in range(self.n_agents):\n            if self.agent_targets[i] is not None:\n                target_pos = np.array(self.tasks[self.agent_targets[i]])\n                diff = target_pos - self.agent_positions[i]\n\n                if np.abs(diff).sum() < 0.5:\n                    # Task completed\n                    self.completed_tasks += 1\n                    self.agent_targets[i] = None\n                    self.agent_velocities[i] = np.zeros(2)\n                else:\n                    # Move toward target (simple movement with collision avoidance)\n                    move = np.zeros(2)\n                    if abs(diff[0]) > abs(diff[1]):\n                        move[0] = np.sign(diff[0])\n                    else:\n                        move[1] = np.sign(diff[1])\n\n                    new_pos = self.agent_positions[i] + move\n                    new_pos = np.clip(new_pos, 0, self.grid_size - 1)\n\n                    # Check for collisions (simple)\n                    collision = False\n                    for j in range(self.n_agents):\n                        if i != j:\n                            if np.abs(new_pos - self.agent_positions[j]).sum() < 0.5:\n                                collision = True\n                                break\n\n                    if not collision:\n                        self.agent_velocities[i] = move\n                        self.agent_positions[i] = new_pos\n                    else:\n                        self.agent_velocities[i] = np.zeros(2)\n\n        return self.get_state()\n\n\n# GNN for congestion prediction\nclass CongestionGNN(nn.Module):\n    def __init__(self, grid_size=20, hidden_dim=64):\n        super().__init__()\n        self.grid_size = grid_size\n        self.hidden_dim = hidden_dim\n\n        # Node encoder\n        self.node_encoder = nn.Sequential(\n            nn.Linear(4, hidden_dim),  # pos(2) + vel(2)\n            nn.ReLU(),\n            nn.Linear(hidden_dim, hidden_dim),\n        )\n\n        # Task encoder\n        self.task_encoder = nn.Sequential(\n            nn.Linear(2, hidden_dim), nn.ReLU(), nn.Linear(hidden_dim, hidden_dim)\n        )\n\n        # Graph attention layers\n        self.gat1 = GATConv(hidden_dim, hidden_dim, heads=2, concat=False)\n        self.gat2 = GATConv(hidden_dim, hidden_dim, heads=2, concat=False)\n\n        # Heatmap decoder\n        self.decoder = nn.Sequential(\n            nn.Linear(hidden_dim * 2, hidden_dim * 2),\n            nn.ReLU(),\n            nn.Linear(hidden_dim * 2, grid_size * grid_size),\n        )\n\n    def forward(self, agent_features, task_features, edge_index, batch=None):\n        # Encode agents\n        agent_h = self.node_encoder(agent_features)\n\n        # Graph attention\n        agent_h = F.relu(self.gat1(agent_h, edge_index))\n        agent_h = F.relu(self.gat2(agent_h, edge_index))\n\n        # Pool agent features\n        if batch is not None:\n            agent_pooled = global_mean_pool(agent_h, batch)\n        else:\n            agent_pooled = agent_h.mean(dim=0, keepdim=True)\n\n        # Encode and pool tasks\n        task_h = self.task_encoder(task_features)\n        task_pooled = task_h.mean(dim=0, keepdim=True)\n\n        # Decode to heatmap\n        combined = torch.cat([agent_pooled, task_pooled], dim=1)\n        heatmap = self.decoder(combined)\n        heatmap = torch.sigmoid(heatmap).view(-1, self.grid_size, self.grid_size)\n\n        return heatmap\n\n\ndef create_graph_data(state, grid_size):\n    \"\"\"Convert state to graph data for GNN\"\"\"\n    agent_pos = state[\"agent_positions\"]\n    agent_vel = state[\"agent_velocities\"]\n    n_agents = len(agent_pos)\n\n    # Normalize positions\n    agent_features = np.concatenate([agent_pos / grid_size, agent_vel], axis=1)\n\n    # Create fully connected edges\n    edges = []\n    for i in range(n_agents):\n        for j in range(n_agents):\n            if i != j:\n                edges.append([i, j])\n    edge_index = np.array(edges).T if edges else np.array([[0], [0]])\n\n    # Task features\n    pending_tasks = (\n        np.array(state[\"pending_tasks\"])\n        if state[\"pending_tasks\"]\n        else np.array([[grid_size / 2, grid_size / 2]])\n    )\n    task_features = pending_tasks / grid_size\n\n    return {\n        \"agent_features\": torch.tensor(agent_features, dtype=torch.float32),\n        \"task_features\": torch.tensor(task_features, dtype=torch.float32),\n        \"edge_index\": torch.tensor(edge_index, dtype=torch.long),\n    }\n\n\ndef generate_training_data(\n    n_episodes=100, steps_per_episode=50, grid_size=20, n_agents=25\n):\n    \"\"\"Generate training data by running baseline simulations\"\"\"\n    data = []\n\n    for ep in range(n_episodes):\n        env = WarehouseEnv(grid_size=grid_size, n_agents=n_agents, n_tasks=100)\n\n        for step in range(steps_per_episode):\n            state = env.get_state()\n\n            # Random task assignment for baseline\n            free_agents = [i for i in range(n_agents) if env.agent_targets[i] is None]\n            pending = state[\"task_indices\"][: len(free_agents)]\n\n            assignments = list(zip(free_agents[: len(pending)], pending))\n            env.assign_tasks(assignments)\n\n            # Get congestion heatmap (ground truth)\n            heatmap = env.compute_congestion_heatmap(T=5)\n\n            # Store data\n            graph_data = create_graph_data(state, grid_size)\n            data.append(\n                {\n                    \"graph_data\": graph_data,\n                    \"heatmap\": torch.tensor(heatmap, dtype=torch.float32),\n                }\n            )\n\n            env.step()\n\n    return data\n\n\ndef train_congestion_model(model, train_data, val_data, epochs=30, lr=0.001):\n    \"\"\"Train the congestion prediction GNN\"\"\"\n    model.to(device)\n    optimizer = torch.optim.Adam(model.parameters(), lr=lr)\n    criterion = nn.MSELoss()\n\n    for epoch in range(epochs):\n        model.train()\n        train_losses = []\n\n        np.random.shuffle(train_data)\n        for sample in train_data:\n            graph = sample[\"graph_data\"]\n            target = sample[\"heatmap\"].unsqueeze(0).to(device)\n\n            agent_feat = graph[\"agent_features\"].to(device)\n            task_feat = graph[\"task_features\"].to(device)\n            edge_idx = graph[\"edge_index\"].to(device)\n\n            optimizer.zero_grad()\n            pred = model(agent_feat, task_feat, edge_idx)\n            loss = criterion(pred, target)\n            loss.backward()\n            optimizer.step()\n\n            train_losses.append(loss.item())\n\n        # Validation\n        model.eval()\n        val_losses = []\n        with torch.no_grad():\n            for sample in val_data:\n                graph = sample[\"graph_data\"]\n                target = sample[\"heatmap\"].unsqueeze(0).to(device)\n\n                agent_feat = graph[\"agent_features\"].to(device)\n                task_feat = graph[\"task_features\"].to(device)\n                edge_idx = graph[\"edge_index\"].to(device)\n\n                pred = model(agent_feat, task_feat, edge_idx)\n                loss = criterion(pred, target)\n                val_losses.append(loss.item())\n\n        train_loss = np.mean(train_losses)\n        val_loss = np.mean(val_losses)\n\n        experiment_data[\"training\"][\"losses\"][\"train\"].append(train_loss)\n        experiment_data[\"training\"][\"losses\"][\"val\"].append(val_loss)\n        experiment_data[\"training\"][\"epochs\"].append(epoch)\n\n        print(\n            f\"Epoch {epoch}: validation_loss = {val_loss:.4f}, train_loss = {train_loss:.4f}\"\n        )\n\n    return model\n\n\ndef compute_cost_matrix(\n    agent_positions, task_positions, congestion_heatmap=None, grid_size=20, alpha=2.0\n):\n    \"\"\"Compute cost matrix for task assignment\"\"\"\n    n_agents = len(agent_positions)\n    n_tasks = len(task_positions)\n\n    cost_matrix = np.zeros((n_agents, n_tasks))\n\n    for i in range(n_agents):\n        for j in range(n_tasks):\n            # Distance cost\n            dist = np.abs(agent_positions[i] - task_positions[j]).sum()\n\n            # Congestion penalty\n            if congestion_heatmap is not None:\n                # Sample congestion along path\n                path_congestion = 0\n                curr = agent_positions[i].copy()\n                target = task_positions[j]\n                steps = int(dist) + 1\n                for s in range(steps):\n                    t = s / max(1, steps - 1)\n                    pos = curr * (1 - t) + target * t\n                    x, y = int(np.clip(pos[0], 0, grid_size - 1)), int(\n                        np.clip(pos[1], 0, grid_size - 1)\n                    )\n                    path_congestion += congestion_heatmap[x, y]\n                cost_matrix[i, j] = dist + alpha * path_congestion\n            else:\n                cost_matrix[i, j] = dist\n\n    return cost_matrix\n\n\ndef run_simulation(env, model=None, use_cata=False, max_steps=200, grid_size=20):\n    \"\"\"Run simulation with either CATA or baseline allocation\"\"\"\n    env.reset()\n\n    for step in range(max_steps):\n        state = env.get_state()\n\n        # Find free agents\n        free_agents = [i for i in range(env.n_agents) if env.agent_targets[i] is None]\n\n        if free_agents and state[\"pending_tasks\"]:\n            task_positions = np.array(state[\"pending_tasks\"])\n            agent_positions = env.agent_positions[free_agents]\n\n            # Get congestion heatmap if using CATA\n            congestion_heatmap = None\n            if use_cata and model is not None:\n                model.eval()\n                with torch.no_grad():\n                    graph_data = create_graph_data(state, grid_size)\n                    agent_feat = graph_data[\"agent_features\"].to(device)\n                    task_feat = graph_data[\"task_features\"].to(device)\n                    edge_idx = graph_data[\"edge_index\"].to(device)\n\n                    pred_heatmap = model(agent_feat, task_feat, edge_idx)\n                    congestion_heatmap = pred_heatmap[0].cpu().numpy()\n\n            # Compute cost matrix\n            cost_matrix = compute_cost_matrix(\n                agent_positions, task_positions, congestion_heatmap, grid_size\n            )\n\n            # Hungarian algorithm\n            n_assign = min(len(free_agents), len(state[\"pending_tasks\"]))\n            row_ind, col_ind = linear_sum_assignment(cost_matrix[:n_assign, :n_assign])\n\n            # Assign tasks\n            assignments = []\n            for r, c in zip(row_ind, col_ind):\n                if c < len(state[\"task_indices\"]):\n                    assignments.append((free_agents[r], state[\"task_indices\"][c]))\n\n            env.assign_tasks(assignments)\n\n        env.step()\n\n    return env.completed_tasks, env.time_step\n\n\ndef evaluate_methods(model, grid_size=20, n_agents=30, n_trials=10):\n    \"\"\"Evaluate CATA vs baseline\"\"\"\n    cata_throughputs = []\n    baseline_throughputs = []\n\n    simulation_minutes = 3.33  # 200 steps ~ 3.33 minutes at 1 step/sec\n\n    for trial in range(n_trials):\n        print(f\"Trial {trial + 1}/{n_trials}\")\n\n        # CATA evaluation\n        env_cata = WarehouseEnv(grid_size=grid_size, n_agents=n_agents, n_tasks=100)\n        cata_tasks, cata_steps = run_simulation(\n            env_cata, model, use_cata=True, grid_size=grid_size\n        )\n        cata_throughput = cata_tasks / simulation_minutes\n        cata_throughputs.append(cata_throughput)\n\n        # Baseline evaluation (same initial conditions)\n        env_baseline = WarehouseEnv(grid_size=grid_size, n_agents=n_agents, n_tasks=100)\n        np.random.seed(trial)  # Reset seed for fair comparison\n        baseline_tasks, baseline_steps = run_simulation(\n            env_baseline, None, use_cata=False, grid_size=grid_size\n        )\n        baseline_throughput = baseline_tasks / simulation_minutes\n        baseline_throughputs.append(baseline_throughput)\n\n        experiment_data[\"evaluation\"][\"cata_throughput\"].append(cata_throughput)\n        experiment_data[\"evaluation\"][\"baseline_throughput\"].append(baseline_throughput)\n\n    return cata_throughputs, baseline_throughputs\n\n\n# Main execution\nprint(\"Generating training data...\")\nall_data = generate_training_data(\n    n_episodes=80, steps_per_episode=30, grid_size=20, n_agents=25\n)\nnp.random.shuffle(all_data)\nsplit_idx = int(0.8 * len(all_data))\ntrain_data = all_data[:split_idx]\nval_data = all_data[split_idx:]\nprint(f\"Training samples: {len(train_data)}, Validation samples: {len(val_data)}\")\n\nprint(\"\\nTraining congestion prediction model...\")\nmodel = CongestionGNN(grid_size=20, hidden_dim=64)\nmodel = train_congestion_model(model, train_data, val_data, epochs=30, lr=0.001)\n\nprint(\"\\nEvaluating methods...\")\ncata_throughputs, baseline_throughputs = evaluate_methods(\n    model, grid_size=20, n_agents=30, n_trials=10\n)\n\n# Print results\nprint(\"\\n\" + \"=\" * 50)\nprint(\"RESULTS: Throughput (tasks per minute)\")\nprint(\"=\" * 50)\nprint(\n    f\"CATA:     Mean = {np.mean(cata_throughputs):.2f}, Std = {np.std(cata_throughputs):.2f}\"\n)\nprint(\n    f\"Baseline: Mean = {np.mean(baseline_throughputs):.2f}, Std = {np.std(baseline_throughputs):.2f}\"\n)\nimprovement = (\n    (np.mean(cata_throughputs) - np.mean(baseline_throughputs))\n    / np.mean(baseline_throughputs)\n    * 100\n)\nprint(f\"Improvement: {improvement:.1f}%\")\nprint(f\"\\nFinal throughput_tasks_per_minute (CATA): {np.mean(cata_throughputs):.2f}\")\n\n# Save experiment data\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\n\n# Visualizations\nfig, axes = plt.subplots(1, 3, figsize=(15, 4))\n\n# Training loss\naxes[0].plot(\n    experiment_data[\"training\"][\"epochs\"],\n    experiment_data[\"training\"][\"losses\"][\"train\"],\n    label=\"Train\",\n)\naxes[0].plot(\n    experiment_data[\"training\"][\"epochs\"],\n    experiment_data[\"training\"][\"losses\"][\"val\"],\n    label=\"Validation\",\n)\naxes[0].set_xlabel(\"Epoch\")\naxes[0].set_ylabel(\"Loss\")\naxes[0].set_title(\"Training Loss\")\naxes[0].legend()\n\n# Throughput comparison\nmethods = [\"CATA\", \"Baseline\"]\nmeans = [np.mean(cata_throughputs), np.mean(baseline_throughputs)]\nstds = [np.std(cata_throughputs), np.std(baseline_throughputs)]\naxes[1].bar(methods, means, yerr=stds, capsize=5)\naxes[1].set_ylabel(\"Tasks per Minute\")\naxes[1].set_title(\"Throughput Comparison\")\n\n# Throughput distribution\naxes[2].boxplot([cata_throughputs, baseline_throughputs], labels=[\"CATA\", \"Baseline\"])\naxes[2].set_ylabel(\"Tasks per Minute\")\naxes[2].set_title(\"Throughput Distribution\")\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"cata_results.png\"), dpi=150)\nplt.close()\n\n# Visualize sample heatmap\nmodel.eval()\nenv_vis = WarehouseEnv(grid_size=20, n_agents=25, n_tasks=50)\nstate = env_vis.get_state()\ngraph_data = create_graph_data(state, 20)\n\nwith torch.no_grad():\n    agent_feat = graph_data[\"agent_features\"].to(device)\n    task_feat = graph_data[\"task_features\"].to(device)\n    edge_idx = graph_data[\"edge_index\"].to(device)\n    pred_heatmap = model(agent_feat, task_feat, edge_idx)[0].cpu().numpy()\n\nfig, axes = plt.subplots(1, 2, figsize=(10, 4))\naxes[0].imshow(pred_heatmap, cmap=\"hot\", origin=\"lower\")\naxes[0].scatter(\n    state[\"agent_positions\"][:, 1],\n    state[\"agent_positions\"][:, 0],\n    c=\"blue\",\n    marker=\"o\",\n    s=50,\n    label=\"Agents\",\n)\npending = np.array(state[\"pending_tasks\"])\nif len(pending) > 0:\n    axes[0].scatter(\n        pending[:, 1], pending[:, 0], c=\"green\", marker=\"x\", s=30, label=\"Tasks\"\n    )\naxes[0].set_title(\"Predicted Congestion Heatmap\")\naxes[0].legend()\n\ngt_heatmap = env_vis.compute_congestion_heatmap(T=5)\naxes[1].imshow(gt_heatmap, cmap=\"hot\", origin=\"lower\")\naxes[1].scatter(\n    state[\"agent_positions\"][:, 1],\n    state[\"agent_positions\"][:, 0],\n    c=\"blue\",\n    marker=\"o\",\n    s=50,\n    label=\"Agents\",\n)\nif len(pending) > 0:\n    axes[1].scatter(\n        pending[:, 1], pending[:, 0], c=\"green\", marker=\"x\", s=30, label=\"Tasks\"\n    )\naxes[1].set_title(\"Ground Truth Congestion\")\naxes[1].legend()\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"congestion_heatmaps.png\"), dpi=150)\nplt.close()\n\nprint(f\"\\nResults saved to {working_dir}\")\n", "import os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch_geometric.nn import GATConv\nfrom torch_geometric.data import Data, Batch\nfrom scipy.optimize import linear_sum_assignment\nimport matplotlib.pyplot as plt\nfrom collections import deque\nimport time\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n# Experiment data storage\nexperiment_data = {\n    \"training\": {\"losses\": {\"train\": [], \"val\": []}, \"epochs\": []},\n    \"evaluation\": {\n        \"distance_based\": {\"throughput\": [], \"completion_times\": []},\n        \"congestion_aware\": {\"throughput\": [], \"completion_times\": []},\n    },\n}\n\n\n# Warehouse Environment\nclass WarehouseEnv:\n    def __init__(self, grid_size=20, n_agents=20, n_tasks=30):\n        self.grid_size = grid_size\n        self.n_agents = n_agents\n        self.n_tasks = n_tasks\n        self.reset()\n\n    def reset(self):\n        # Initialize agent positions randomly\n        positions = np.random.choice(\n            self.grid_size * self.grid_size, self.n_agents, replace=False\n        )\n        self.agent_positions = np.array(\n            [[p // self.grid_size, p % self.grid_size] for p in positions]\n        )\n        self.agent_velocities = np.zeros((self.n_agents, 2))\n        self.agent_targets = [None] * self.n_agents\n        self.pending_tasks = self._generate_tasks(self.n_tasks)\n        self.completed_tasks = 0\n        self.time_step = 0\n        return self._get_state()\n\n    def _generate_tasks(self, n):\n        tasks = []\n        for _ in range(n):\n            pos = [\n                np.random.randint(0, self.grid_size),\n                np.random.randint(0, self.grid_size),\n            ]\n            tasks.append(pos)\n        return tasks\n\n    def _get_state(self):\n        return {\n            \"agent_positions\": self.agent_positions.copy(),\n            \"agent_velocities\": self.agent_velocities.copy(),\n            \"pending_tasks\": [t.copy() for t in self.pending_tasks],\n            \"agent_targets\": self.agent_targets.copy(),\n        }\n\n    def get_congestion_heatmap(self, lookahead=5):\n        \"\"\"Compute actual congestion based on agent positions over time\"\"\"\n        heatmap = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            x, y = int(pos[0]), int(pos[1])\n            heatmap[\n                max(0, x - 1) : min(self.grid_size, x + 2),\n                max(0, y - 1) : min(self.grid_size, y + 2),\n            ] += 1\n        # Also add predicted positions based on targets\n        for i, target in enumerate(self.agent_targets):\n            if target is not None:\n                x, y = int(target[0]), int(target[1])\n                heatmap[\n                    max(0, x - 1) : min(self.grid_size, x + 2),\n                    max(0, y - 1) : min(self.grid_size, y + 2),\n                ] += 0.5\n        return heatmap / (heatmap.max() + 1e-6)\n\n    def step(self):\n        \"\"\"Move agents toward their targets\"\"\"\n        self.time_step += 1\n        completed = 0\n\n        for i in range(self.n_agents):\n            if self.agent_targets[i] is not None:\n                target = np.array(self.agent_targets[i])\n                direction = target - self.agent_positions[i]\n                dist = np.linalg.norm(direction)\n\n                if dist < 1.0:\n                    # Task completed\n                    completed += 1\n                    self.agent_targets[i] = None\n                    self.agent_velocities[i] = np.zeros(2)\n                else:\n                    # Move toward target (with simple collision avoidance)\n                    velocity = direction / dist\n                    # Check for nearby agents\n                    for j in range(self.n_agents):\n                        if i != j:\n                            diff = self.agent_positions[i] - self.agent_positions[j]\n                            d = np.linalg.norm(diff)\n                            if d < 2.0 and d > 0:\n                                velocity += 0.5 * diff / d  # Repulsion\n\n                    velocity = velocity / (np.linalg.norm(velocity) + 1e-6)\n                    self.agent_velocities[i] = velocity\n                    self.agent_positions[i] += velocity * 0.5\n                    # Clamp to grid\n                    self.agent_positions[i] = np.clip(\n                        self.agent_positions[i], 0, self.grid_size - 1\n                    )\n\n        self.completed_tasks += completed\n\n        # Spawn new tasks\n        if len(self.pending_tasks) < self.n_tasks // 2:\n            self.pending_tasks.extend(self._generate_tasks(5))\n\n        return completed\n\n\n# GNN for Congestion Prediction\nclass CongestionGNN(nn.Module):\n    def __init__(self, grid_size=20, hidden_dim=64):\n        super().__init__()\n        self.grid_size = grid_size\n        self.hidden_dim = hidden_dim\n\n        # Node feature encoder\n        self.node_encoder = nn.Sequential(\n            nn.Linear(4, hidden_dim), nn.ReLU(), nn.Linear(hidden_dim, hidden_dim)\n        )\n\n        # GAT layers\n        self.gat1 = GATConv(hidden_dim, hidden_dim, heads=2, concat=False)\n        self.gat2 = GATConv(hidden_dim, hidden_dim, heads=2, concat=False)\n\n        # Output: predict congestion for each grid cell\n        self.decoder = nn.Sequential(\n            nn.Linear(hidden_dim, hidden_dim),\n            nn.ReLU(),\n            nn.Linear(hidden_dim, grid_size * grid_size),\n            nn.Sigmoid(),\n        )\n\n    def forward(self, data):\n        x, edge_index = data.x, data.edge_index\n\n        # Encode node features\n        x = self.node_encoder(x)\n\n        # GAT message passing\n        x = F.relu(self.gat1(x, edge_index))\n        x = F.relu(self.gat2(x, edge_index))\n\n        # Global pooling\n        if hasattr(data, \"batch\"):\n            from torch_geometric.nn import global_mean_pool\n\n            x = global_mean_pool(x, data.batch)\n        else:\n            x = x.mean(dim=0, keepdim=True)\n\n        # Decode to heatmap\n        heatmap = self.decoder(x)\n        return heatmap.view(-1, self.grid_size, self.grid_size)\n\n\ndef state_to_graph(state, grid_size=20):\n    \"\"\"Convert warehouse state to graph for GNN\"\"\"\n    agent_positions = state[\"agent_positions\"]\n    agent_velocities = state[\"agent_velocities\"]\n    pending_tasks = state[\"pending_tasks\"]\n\n    # Normalize positions\n    agent_pos_norm = agent_positions / grid_size\n    agent_vel_norm = agent_velocities / 2.0  # Max velocity ~2\n\n    # Create node features: [x, y, vx, vy] for agents, [x, y, 0, 0] for tasks\n    n_agents = len(agent_positions)\n    n_tasks = len(pending_tasks)\n\n    node_features = []\n    for i in range(n_agents):\n        node_features.append(\n            [\n                agent_pos_norm[i, 0],\n                agent_pos_norm[i, 1],\n                agent_vel_norm[i, 0],\n                agent_vel_norm[i, 1],\n            ]\n        )\n\n    for task in pending_tasks[: min(n_tasks, 20)]:  # Limit tasks for efficiency\n        node_features.append([task[0] / grid_size, task[1] / grid_size, 0, 0])\n\n    x = torch.tensor(node_features, dtype=torch.float32)\n\n    # Create edges: fully connected among agents, agents to nearby tasks\n    edges = []\n    n_nodes = len(node_features)\n\n    # Agent-agent edges\n    for i in range(n_agents):\n        for j in range(n_agents):\n            if i != j:\n                edges.append([i, j])\n\n    # Agent-task edges\n    for i in range(n_agents):\n        for j in range(n_agents, n_nodes):\n            edges.append([i, j])\n            edges.append([j, i])\n\n    if len(edges) == 0:\n        edges = [[0, 0]]  # Self-loop if no edges\n\n    edge_index = torch.tensor(edges, dtype=torch.long).t().contiguous()\n\n    return Data(x=x, edge_index=edge_index)\n\n\ndef generate_training_data(\n    n_episodes=50, steps_per_episode=100, grid_size=20, n_agents=20\n):\n    \"\"\"Generate training data by running simulations\"\"\"\n    print(\"Generating training data...\")\n    data_list = []\n    labels = []\n\n    for ep in range(n_episodes):\n        env = WarehouseEnv(grid_size=grid_size, n_agents=n_agents)\n\n        for step in range(steps_per_episode):\n            state = env._get_state()\n\n            # Distance-based task allocation\n            if step % 10 == 0:  # Reallocate periodically\n                free_agents = [\n                    i for i in range(n_agents) if env.agent_targets[i] is None\n                ]\n                if free_agents and env.pending_tasks:\n                    for agent_idx in free_agents[: len(env.pending_tasks)]:\n                        # Assign closest task\n                        distances = [\n                            np.l
