ictor,\n            input_mean=input_mean,\n            input_std=input_std,\n        )\n        cata_throughputs.append(tp_cata)\n\n    avg_dist = np.mean(dist_throughputs)\n    avg_cata = np.mean(cata_throughputs)\n\n    experiment_data[\"simulation_results\"][\"distance_based\"][\"throughput\"].append(\n        avg_dist\n    )\n    experiment_data[\"simulation_results\"][\"distance_based\"][\"agent_counts\"].append(\n        num_agents\n    )\n    experiment_data[\"simulation_results\"][\"congestion_aware\"][\"throughput\"].append(\n        avg_cata\n    )\n    experiment_data[\"simulation_results\"][\"congestion_aware\"][\"agent_counts\"].append(\n        num_agents\n    )\n\n    improvement = (avg_cata - avg_dist) / avg_dist * 100 if avg_dist > 0 else 0\n    print(\n        f\"Agents: {num_agents}, Distance-based throughput: {avg_dist:.2f}, \"\n        f\"Congestion-aware throughput: {avg_cata:.2f}, Improvement: {improvement:.1f}%\"\n    )\n\n# Final metrics\nprint(\"\\n\" + \"=\" * 50)\nprint(\"FINAL RESULTS\")\nprint(\"=\" * 50)\nfinal_dist_throughput = np.mean(\n    experiment_data[\"simulation_results\"][\"distance_based\"][\"throughput\"]\n)\nfinal_cata_throughput = np.mean(\n    experiment_data[\"simulation_results\"][\"congestion_aware\"][\"throughput\"]\n)\nprint(\n    f\"Average throughput_tasks_per_minute (Distance-based): {final_dist_throughput:.2f}\"\n)\nprint(\n    f\"Average throughput_tasks_per_minute (Congestion-aware): {final_cata_throughput:.2f}\"\n)\nprint(\n    f\"Overall improvement: {(final_cata_throughput - final_dist_throughput) / final_dist_throughput * 100:.1f}%\"\n)\n\n# Plot results\nfig, axes = plt.subplots(1, 2, figsize=(12, 5))\n\n# Training loss\nax1 = axes[0]\nax1.plot(\n    experiment_data[\"congestion_predictor\"][\"epochs\"],\n    experiment_data[\"congestion_predictor\"][\"losses\"][\"train\"],\n    label=\"Train\",\n)\nax1.plot(\n    experiment_data[\"congestion_predictor\"][\"epochs\"],\n    experiment_data[\"congestion_predictor\"][\"losses\"][\"val\"],\n    label=\"Validation\",\n)\nax1.set_xlabel(\"Epoch\")\nax1.set_ylabel(\"Loss\")\nax1.set_title(\"Congestion Predictor Training\")\nax1.legend()\nax1.grid(True)\n\n# Throughput comparison\nax2 = axes[1]\nax2.plot(\n    agent_counts,\n    experiment_data[\"simulation_results\"][\"distance_based\"][\"throughput\"],\n    \"o-\",\n    label=\"Distance-based\",\n)\nax2.plot(\n    agent_counts,\n    experiment_data[\"simulation_results\"][\"congestion_aware\"][\"throughput\"],\n    \"s-\",\n    label=\"Congestion-aware (CATA)\",\n)\nax2.set_xlabel(\"Number of Agents\")\nax2.set_ylabel(\"Throughput (tasks/minute)\")\nax2.set_title(\"Throughput vs Agent Density\")\nax2.legend()\nax2.grid(True)\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"cata_baseline_results.png\"), dpi=150)\nplt.close()\n\n# Save experiment data\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(f\"\\nResults saved to {working_dir}\")\n", "import os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.optim as optim\nimport matplotlib.pyplot as plt\nfrom collections import defaultdict\nimport time\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n# Experiment data storage\nexperiment_data = {\n    \"training\": {\"losses\": {\"train\": [], \"val\": []}, \"epochs\": []},\n    \"evaluation\": {\n        \"distance_based\": {\"throughput\": []},\n        \"congestion_aware\": {\"throughput\": []},\n    },\n}\n\n\ndef greedy_assignment(cost_matrix):\n    \"\"\"Greedy assignment as a replacement for Hungarian algorithm.\"\"\"\n    n_agents, n_tasks = cost_matrix.shape\n    row_ind = []\n    col_ind = []\n    assigned_tasks = set()\n\n    # Sort all agent-task pairs by cost\n    pairs = []\n    for i in range(n_agents):\n        for j in range(n_tasks):\n            pairs.append((cost_matrix[i, j], i, j))\n    pairs.sort()\n\n    assigned_agents = set()\n    for cost, i, j in pairs:\n        if i not in assigned_agents and j not in assigned_tasks:\n            row_ind.append(i)\n            col_ind.append(j)\n            assigned_agents.add(i)\n            assigned_tasks.add(j)\n            if len(assigned_agents) == min(n_agents, n_tasks):\n                break\n\n    return np.array(row_ind), np.array(col_ind)\n\n\nclass WarehouseSimulator:\n    def __init__(self, grid_size=20, n_agents=20, n_tasks=30):\n        self.grid_size = grid_size\n        self.n_agents = n_agents\n        self.n_tasks = n_tasks\n        self.reset()\n\n    def reset(self):\n        self.agent_positions = np.random.randint(0, self.grid_size, (self.n_agents, 2))\n        self.agent_velocities = np.zeros((self.n_agents, 2))\n        self.task_positions = np.random.randint(0, self.grid_size, (self.n_tasks, 2))\n        self.task_active = np.ones(self.n_tasks, dtype=bool)\n        self.agent_targets = [-1] * self.n_agents\n        self.time_step = 0\n        self.tasks_completed = 0\n        return self.get_state()\n\n    def get_state(self):\n        agent_grid = np.zeros((self.grid_size, self.grid_size))\n        task_grid = np.zeros((self.grid_size, self.grid_size))\n        for pos in self.agent_positions:\n            agent_grid[pos[0], pos[1]] += 1\n        for i, pos in enumerate(self.task_positions):\n            if self.task_active[i]:\n                task_grid[pos[0], pos[1]] += 1\n        return np.stack([agent_grid, task_grid], axis=0)\n\n    def compute_congestion(self, lookahead=5):\n        congestion = np.zeros((self.grid_size, self.grid_size))\n        for i, agent_pos in enumerate(self.agent_positions):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                target_pos = self.task_positions[target_idx]\n                path = self._get_path(agent_pos, target_pos)\n                for step, pos in enumerate(path[:lookahead]):\n                    congestion[pos[0], pos[1]] += 1.0 / (step + 1)\n        return congestion\n\n    def _get_path(self, start, end):\n        path = [tuple(start)]\n        current = np.array(start)\n        while not np.array_equal(current, end):\n            diff = end - current\n            if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                current[0] += np.sign(diff[0])\n            elif diff[1] != 0:\n                current[1] += np.sign(diff[1])\n            path.append(tuple(current))\n        return path\n\n    def assign_tasks(self, assignment):\n        for agent_idx, task_idx in assignment:\n            if task_idx >= 0 and self.task_active[task_idx]:\n                self.agent_targets[agent_idx] = task_idx\n\n    def step(self):\n        self.time_step += 1\n        for i in range(self.n_agents):\n            target_idx = self.agent_targets[i]\n            if target_idx >= 0 and self.task_active[target_idx]:\n                target_pos = self.task_positions[target_idx]\n                diff = target_pos - self.agent_positions[i]\n                if np.sum(np.abs(diff)) <= 1:\n                    self.task_active[target_idx] = False\n                    self.tasks_completed += 1\n                    self.agent_targets[i] = -1\n                else:\n                    move = np.zeros(2, dtype=int)\n                    if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                        move[0] = np.sign(diff[0])\n                    elif diff[1] != 0:\n                        move[1] = np.sign(diff[1])\n                    self.agent_positions[i] = np.clip(\n                        self.agent_positions[i] + move, 0, self.grid_size - 1\n                    )\n                    self.agent_velocities[i] = move\n\n        inactive_tasks = np.where(~self.task_active)[0]\n        for idx in inactive_tasks:\n            if np.random.random() < 0.3:\n                self.task_positions[idx] = np.random.randint(0, self.grid_size, 2)\n                self.task_active[idx] = True\n        return self.get_state()\n\n\nclass CongestionPredictor(nn.Module):\n    def __init__(self, grid_size=20, hidden_dim=64):\n        super().__init__()\n        self.conv1 = nn.Conv2d(2, hidden_dim, 3, padding=1)\n        self.conv2 = nn.Conv2d(hidden_dim, hidden_dim, 3, padding=1)\n        self.conv3 = nn.Conv2d(hidden_dim, 1, 3, padding=1)\n        self.relu = nn.ReLU()\n\n    def forward(self, x):\n        x = self.relu(self.conv1(x))\n        x = self.relu(self.conv2(x))\n        x = torch.sigmoid(self.conv3(x))\n        return x\n\n\ndef generate_training_data(n_samples=1000, grid_size=20, n_agents=20, n_tasks=30):\n    states, congestions = [], []\n    for _ in range(n_samples):\n        sim = WarehouseSimulator(grid_size, n_agents, n_tasks)\n        state = sim.get_state()\n        active_tasks = np.where(sim.task_active)[0]\n        assignment = [\n            (i, active_tasks[i]) for i in range(min(n_agents, len(active_tasks)))\n        ]\n        sim.assign_tasks(assignment)\n        congestion = sim.compute_congestion(lookahead=5)\n        congestion = congestion / (congestion.max() + 1e-6)\n        states.append(state)\n        congestions.append(congestion)\n    return np.array(states), np.array(congestions)\n\n\ndef distance_based_assignment(agent_positions, task_positions, task_active):\n    n_agents = len(agent_positions)\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    cost_matrix = np.zeros((n_agents, len(active_indices)))\n    for i, agent_pos in enumerate(agent_positions):\n        for j, task_idx in enumerate(active_indices):\n            cost_matrix[i, j] = np.sum(np.abs(agent_pos - task_positions[task_idx]))\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef congestion_aware_assignment(\n    agent_positions, task_positions, task_active, congestion_map, congestion_weight=2.0\n):\n    n_agents = len(agent_positions)\n    active_indices = np.where(task_active)[0]\n    if len(active_indices) == 0:\n        return []\n    cost_matrix = np.zeros((n_agents, len(active_indices)))\n    grid_size = congestion_map.shape[0]\n    for i, agent_pos in enumerate(agent_positions):\n        for j, task_idx in enumerate(active_indices):\n            task_pos = task_positions[task_idx]\n            distance = np.sum(np.abs(agent_pos - task_pos))\n            path_congestion = 0\n            current = agent_pos.copy()\n            while not np.array_equal(current, task_pos):\n                diff = task_pos - current\n                if abs(diff[0]) >= abs(diff[1]) and diff[0] != 0:\n                    current[0] += np.sign(diff[0])\n                elif diff[1] != 0:\n                    current[1] += np.sign(diff[1])\n                current = np.clip(current, 0, grid_size - 1)\n                path_congestion += congestion_map[current[0], current[1]]\n            cost_matrix[i, j] = distance + congestion_weight * path_congestion\n    row_ind, col_ind = greedy_assignment(cost_matrix)\n    return [(row_ind[i], active_indices[col_ind[i]]) for i in range(len(row_ind))]\n\n\ndef train_predictor(\n    model,\n    train_states,\n    train_congestions,\n    val_states,\n    val_congestions,\n    epochs=50,\n    batch_size=32,\n):\n    model = model.to(device)\n    optimizer = optim.Adam(model.parameters(), lr=0.001)\n    criterion = nn.MSELoss()\n    train_states = torch.FloatTensor(train_states).to(device)\n    train_congestions = torch.FloatTensor(train_congestions).unsqueeze(1).to(device)\n    val_states = torch.FloatTensor(val_states).to(device)\n    val_congestions = torch.FloatTensor(val_congestions).unsqueeze(1).to(device)\n    n_train = len(train_states)\n\n    for epoch in range(epochs):\n        model.train()\n        perm = torch.randperm(n_train)\n        train_loss, n_batches = 0, 0\n        for i in range(0, n_train, batch_size):\n            idx = perm[i : i + batch_size]\n            batch_states, batch_targets = train_states[idx], train_congestions[idx]\n            optimizer.zero_grad()\n            predictions = model(batch_states)\n            loss = criterion(predictions, batch_targets)\n            loss.backward()\n            optimizer.step()\n            train_loss += loss.item()\n            n_batches += 1\n        train_loss /= n_batches\n        model.eval()\n        with torch.no_grad():\n            val_loss = criterion(model(val_states), val_congestions).item()\n        experiment_data[\"training\"][\"losses\"][\"train\"].append(train_loss)\n        experiment_data[\"training\"][\"losses\"][\"val\"].append(val_loss)\n        experiment_data[\"training\"][\"epochs\"].append(epoch)\n        if epoch % 10 == 0:\n            print(\n                f\"Epoch {epoch}: train_loss = {train_loss:.4f}, validation_loss = {val_loss:.4f}\"\n            )\n    return model\n\n\ndef evaluate_throughput(\n    method,\n    model=None,\n    n_episodes=10,\n    max_steps=200,\n    grid_size=20,\n    n_agents=20,\n    n_tasks=30,\n):\n    throughputs = []\n    for _ in range(n_episodes):\n        sim = WarehouseSimulator(grid_size, n_agents, n_tasks)\n        for step in range(max_steps):\n            state = sim.get_state()\n            unassigned = [\n                i\n                for i in range(n_agents)\n                if sim.agent_targets[i] < 0 or not sim.task_active[sim.agent_targets[i]]\n            ]\n            if len(unassigned) > 0 and np.any(sim.task_active):\n                if method == \"distance\":\n                    assignment = distance_based_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                    )\n                else:\n                    state_tensor = torch.FloatTensor(state).unsqueeze(0).to(device)\n                    with torch.no_grad():\n                        congestion_pred = model(state_tensor).squeeze().cpu().numpy()\n                    assignment = congestion_aware_assignment(\n                        sim.agent_positions[unassigned],\n                        sim.task_positions,\n                        sim.task_active,\n                        congestion_pred,\n                    )\n                assignment = [(unassigned[a], t) for a, t in assignment]\n                sim.assign_tasks(assignment)\n            sim.step()\n        throughputs.append(sim.tasks_completed / (max_steps / 60.0))\n    return np.mean(throughputs), np.std(throughputs)\n\n\nprint(\"Generating training data...\")\ntrain_states, train_congestions = generate_training_data(n_samples=800)\nval_states, val_congestions = generate_training_data(n_samples=200)\nprint(\n    f\"Training data shape: {train_states.shape}, Validation data shape: {val_states.shape}\"\n)\n\nprint(\"\\nTraining congestion predictor...\")\nmodel = CongestionPredictor(grid_size=20, hidden_dim=64)\nmodel = train_predictor(\n    model, train_states, train_congestions, val_states, val_congestions, epochs=50\n)\n\nprint(\"\\nEvaluating methods...\")\nagent_counts = [20, 30, 40, 50]\nresults = {\"distance\": [], \"congestion_aware\": []}\n\nfor n_agents in agent_counts:\n    print(f\"\\nTesting with {n_agents} agents...\")\n    dist_throughput, dist_std = evaluate_throughput(\n        \"distance\", n_episodes=5, n_agents=n_agents\n    )\n    results[\"distance\"].append((n_agents, dist_throughput, dist_std))\n    experiment_data[\"evaluation\"][\"distance_based\"][\"throughput\"].append(\n        {\"n_agents\": n_agents, \"mean\": dist_throughput, \"std\": dist_std}\n    )\n    print(\n        f\"  Distance-based: throughput_tasks_per_minute = {dist_throughput:.2f} \u00b1 {dist_std:.2f}\"\n    )\n\n    cata_throughput, cata_std = evaluate_throughput(\n        \"congestion_aware\", model=model, n_episodes=5, n_agents=n_agents\n    )\n    results[\"congestion_aware\"].append((n_agents, cata_throughput, cata_std))\n    experiment_data[\"evaluation\"][\"congestion_aware\"][\"throughput\"].append(\n        {\"n_agents\": n_agents, \"mean\": cata_throughput, \"std\": cata_std}\n    )\n    print(\n        f\"  Congestion-aware: throughput_tasks_per_minute = {cata_throughput:.2f} \u00b1 {cata_std:.2f}\"\n    )\n\nprint(\"\\n\" + \"=\" * 50)\nprint(\"SUMMARY: Throughput (tasks per minute)\")\nprint(\"=\" * 50)\nfor i, n_agents in enumerate(agent_counts):\n    dist_t, cata_t = results[\"distance\"][i][1], results[\"congestion_aware\"][i][1]\n    improvement = (cata_t - dist_t) / dist_t * 100\n    print(\n        f\"Agents={n_agents}: Distance={dist_t:.2f}, CATA={cata_t:.2f}, Improvement={improvement:.1f}%\"\n    )\n\nfinal_dist = np.mean([r[1] for r in results[\"distance\"]])\nfinal_cata = np.mean([r[1] for r in results[\"congestion_aware\"]])\nprint(f\"\\nOverall Average:\")\nprint(f\"  Distance-based throughput_tasks_per_minute: {final_dist:.2f}\")\nprint(f\"  Congestion-aware throughput_tasks_per_minute: {final_cata:.2f}\")\n\nfig, axes = plt.subplots(1, 3, figsize=(15, 4))\naxes[0].plot(experiment_data[\"training\"][\"losses\"][\"train\"], label=\"Train\")\naxes[0].plot(experiment_data[\"training\"][\"losses\"][\"val\"], label=\"Validation\")\naxes[0].set_xlabel(\"Epoch\")\naxes[0].set_ylabel(\"Loss\")\naxes[0].set_title(\"Congestion Predictor Training\")\naxes[0].legend()\n\nx = np.arange(len(agent_counts))\nwidth = 0.35\naxes[1].bar(\n    x - width / 2,\n    [r[1] for r in results[\"distance\"]],\n    width,\n    yerr=[r[2] for r in results[\"distance\"]],\n    label=\"Distance-based\",\n    alpha=0.8,\n)\naxes[1].bar(\n    x + width / 2,\n    [r[1] for r in results[\"congestion_aware\"]],\n    width,\n    yerr=[r[2] for r in results[\"congestion_aware\"]],\n    label=\"CATA\",\n    alpha=0.8,\n)\naxes[1].set_xlabel(\"Number of Agents\")\naxes[1].set_ylabel(\"Throughput (tasks/min)\")\naxes[1].set_title(\"Throughput Comparison\")\naxes[1].set_xticks(x)\naxes[1].set_xticklabels(agent_counts)\naxes[1].legend()\n\nmodel.eval()\nsample_state = torch.FloatTensor(val_states[0:1]).to(device)\nwith torch.no_grad():\n    pred_congestion = model(sample_state).squeeze().cpu().numpy()\nim = axes[2].imshow(pred_congestion, cmap=\"hot\")\naxes[2].set_title(\"Sample Predicted Congestion Heatmap\")\nplt.colorbar(im, ax=axes[2])\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"cata_baseline_results.png\"), dpi=150)\nplt.close()\n\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(f\"\\nResults saved to {working_dir}\")\n", "import os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.optim as optim\nimport matplotlib.pyplot as plt\nfrom collections import defaultdict\nimport time\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n# Experiment data storage\nexperiment_data = {\n    \"distance_based\": {\"throughput\": [], \"completion_times\": []},\n    \"heuristic_congestion\": {\"throughput\": [], \"completion_times\": []},\n    \"learned_congestion\": {\"throughput\": [], \"completion_times\": []},\n    \"training\": {\"losses\": {\"train\": [], \"val\": []}, \"epochs\": []},\n    \"agent_counts\": [],\n}\n\n\n# --- Warehouse Simulator ---\nclass WarehouseSimulator:\n    def __init__(self, grid_size=20, num_agents=30, num_tasks=50):\n        self.grid_size = grid_size\n        self.num_agents = num_agents\n        self.num_tasks = num_tasks\n        self.reset()\n\n    def reset(self):\n        # Random agent positions\n        self.agent_positions = np.random.randint(\n            0, self.grid_size, size=(self.num_agents, 2)\n        )\n        self.agent_targets = np.full((self.num_agents, 2), -1)\n        self.agent_assigned = np.zeros(self.num_agents, dtype=bool)\n\n        # Random task positions (clustered to create congestion scenarios)\n        self.tasks = []\n        # Create some clustered tasks\n        num_clusters = 3\n        for _ in range(num_clusters):\n            center = np.random.randint(2, self.grid_size - 2, size=2)\n            cluster_size = self.num_tasks // num_clusters\n            for _ in range(cluster_size):\n                offset = np.random.randint(-3, 4, size=2)\n                task_pos = np.clip(center + offset, 0, self.grid_size - 1)\n                self.tasks.append(task_pos.tolist())\n        # Add remaining tasks randomly\n        while len(self.tasks) < self.num_tasks:\n            self.tasks.append(np.random.randint(0, self.grid_size, size=2).tolist())\n\n        self.tasks = [list(t) for t in self.tasks]\n        self.task_assigned = np.zeros(len(self.tasks), dtype=bool)\n        self.completed_tasks = 0\n        self.timestep = 0\n        self.total_completion_time = 0\n\n    def get_congestion_heatmap(self, grid_resolution=5):\n        \"\"\"Compute actual congestion heatmap based on agent positions\"\"\"\n        cell_size = self.grid_size // grid_resolution\n        heatmap = np.zeros((grid_resolution, grid_resolution))\n        for pos in self.agent_positions:\n            cx = min(int(pos[0] // cell_size), grid_resolution - 1)\n            cy = min(int(pos[1] // cell_size), grid_resolution - 1)\n            heatmap[cx, cy] += 1\n        # Normalize\n        heatmap = heatmap / (self.num_agents + 1e-6)\n        return heatmap\n\n    def get_state_tensor(self, grid_resolution=5):\n        \"\"\"Get state as tensor for neural network input\"\"\"\n        cell_size = self.grid_size // grid_resolution\n\n        # Agent density channel\n        agent_map = np.zeros((grid_resolution, grid_resolution))\n        for pos in self.agent_positions:\n            cx = min(int(pos[0] // cell_size), grid_resolution - 1)\n            cy = min(int(pos[1] // cell_size), grid_resolution - 1)\n            agent_map[cx, cy] += 1\n\n        # Task density channel\n        task_map = np.zeros((grid_resolution, grid_resolution))\n        for i, task in enumerate(self.tasks):\n            if not self.task_assigned[i]:\n                cx = min(int(task[0] // cell_size), grid_resolution - 1)\n                cy = min(int(task[1] // cell_size), grid_resolution - 1)\n                task_map[cx, cy] += 1\n\n        # Normalize\n        agent_map = agent_map / (self.num_agents + 1e-6)\n        task_map = task_map / (len(self.tasks) + 1e-6)\n\n        state = np.stack([agent_map, task_map], axis=0)\n        return state\n\n    def step(self):\n        \"\"\"Move agents toward their targets\"\"\"\n        self.timestep += 1\n\n        for i in range(self.num_agents):\n            if self.agent_assigned[i]:\n                target = self.agent_targets[i]\n                pos = self.agent_positions[i]\n\n                # Move one step toward target (simple pathfinding)\n                dx = np.sign(target[0] - pos[0])\n                dy = np.sign(target[1] - pos[1])\n\n                # Randomly choose x or y movement to avoid perfect synchronization\n                if np.random.random() < 0.5 and dx != 0:\n                    self.agent_positions[i][0] += dx\n                elif dy != 0:\n                    self.agent_positions[i][1] += dy\n                elif dx != 0:\n                    self.agent_positions[i][0] += dx\n\n                # Check if reached target\n                if np.array_equal(self.agent_positions[i], target):\n                    self.completed_tasks += 1\n                    self.agent_assigned[i] = False\n                    # Mark task as done\n                    for j, task in enumerate(self.tasks):\n                        if np.array_equal(task, target) and self.task_assigned[j]:\n                            self.task_assigned[j] = True  # Keep marked\n                            break\n\n    def get_unassigned_agents(self):\n        return np.where(~self.agent_assigned)[0]\n\n    def get_unassigned_tasks(self):\n        return [i for i, assigned in enumerate(self.task_assigned) if not assigned]\n\n\n# --- Assignment Strategies ---\ndef manhattan_distance(pos1, pos2):\n    return abs(pos1[0] - pos2[0]) + abs(pos1[1] - pos2[1])\n\n\ndef greedy_assignment(cost_matrix):\n    \"\"\"Simple greedy assignment to avoid scipy dependency\"\"\"\n    n_agents, n_tasks = cost_matrix.shape\n    agent_assignment = {}\n    assigned_tasks = set()\n\n    # Flatten and sort by cost\n    costs = []\n    for i in range(n_agents):\n        for j in range(n_tasks):\n            costs.append((cost_matrix[i, j], i, j))\n    costs.sort()\n\n    for cost, agent, task in costs:\n        if agent not in agent_assignment and task not in assigned_tasks:\n            agent_assignment[agent] = task\n            assigned_tasks.add(task)\n        if len(agent_assignment) == min(n_agents, n_tasks):\n            break\n\n    return agent_assignment\n\n\ndef distance_based_allocation(sim):\n    \"\"\"Pure distance-based task allocation\"\"\"\n    unassigned_agents = sim.get_unassigned_agents()\n    unassigned_tasks = sim.get_unassigned_tasks()\n\n    if len(unassigned_agents) == 0 or len(unassigned_tasks) == 0:\n        return\n\n    # Build cost matrix\n    n_agents = len(unassigned_agents)\n    n_tasks = len(unassigned_tasks)\n    cost_matrix = np.zeros((n_agents, n_tasks))\n\n    for i, agent_idx in enumerate(unassigned_agents):\n        for j, task_idx in enumerate(unassigned_tasks):\n            cost_matrix[i, j] = manhattan_distance(\n                sim.agent_positions[agent_idx], sim.tasks[task_idx]\n            )\n\n    # Greedy assignment\n    assignment = greedy_assignment(cost_matrix)\n\n    for agent_local, task_local in assignment.items():\n        agent_idx = unassigned_agents[agent_local]\n        task_idx = unassigned_tasks[task_local]\n        sim.agent_targets[agent_idx] = np.array(sim.tasks[task_idx])\n        sim.agent_assigned[agent_idx] = True\n        sim.task_assigned[task_idx] = True\n\n\ndef heuristic_congestion_allocation(sim, congestion_weight=2.0):\n    \"\"\"Congestion-aware allocation using heuristic congestion estimation\"\"\"\n    unassigned_agents = sim.get_unassigned_agents()\n    unassigned_tasks = sim.get_unassigned_tasks()\n\n    if len(unassigned_agents) == 0 or len(unassigned_tasks) == 0:\n        return\n\n    # Get congestion heatmap\n    heatmap = sim.get_congestion_heatmap(grid_resolution=5)\n    cell_size = sim.grid_size // 5\n\n    # Build cost matrix with congestion penalty\n    n_agents = len(unassigned_agents)\n    n_tasks = len(unassigned_tasks)\n    cost_matrix = np.zeros((n_agents, n_tasks))\n\n    for i, agent_idx in enumerate(unassigned_agents):\n        for j, task_idx in enumerate(unassigned_tasks):\n            # Base distance cost\n            dist = manhattan_distance(\n                sim.agent_positions[agent_idx], sim.tasks[task_idx]\n            )\n\n            # Congestion penalty along path (simplified: just at target)\n            task_pos = sim.tasks[task_idx]\n            cx = min(int(task_pos[0] // cell_size), 4)\n            cy = min(int(task_pos[1] // cell_size), 4)\n            congestion_penalty = heatmap[cx, cy] * congestion_weight * sim.grid_size\n\n            cost_matrix[i, j] = dist + congestion_penalty\n\n    # Greedy assignment\n    assignment = greedy_assignment(cost_matrix)\n\n    for agent_local, task_local in assignment.items():\n        agent_idx = unassigned_agents[agent_local]\n        task_idx = unassigned_tasks[task_local]\n        sim.agent_targets[agent_idx] = np.array(sim.tasks[task_idx])\n        sim.agent_assigned[agent_idx] = True\n        sim.task_assigned[task_idx] = True\n\n\n# --- Congestion Prediction CNN ---\nclass CongestionPredictor(nn.Module):\n    def __init__(self, grid_resolution=5):\n        super().__init__()\n        self.conv1 = nn.Conv2d(2, 16, kernel_size=3, padding=1)\n        self.conv2 = nn.Conv2d(16, 32, kernel_size=3, padding=1)\n        self.conv3 = nn.Conv2d(32, 1, kernel_size=3, padding=1)\n        self.relu = nn.ReLU()\n        self.sigmoid = nn.Sigmoid()\n\n    def forward(self, x):\n        x = self.relu(self.conv1(x))\n        x = self.relu(self.conv2(x))\n        x = self.sigmoid(self.conv3(x))\n        return x.squeeze(1)\n\n\ndef learned_congestion_allocation(sim, model, congestion_weight=2.0):\n    \"\"\"Congestion-aware allocation using learned congestion prediction\"\"\"\n    unassigned_agents = sim.get_unassigned_agents()\n    unassigned_tasks = sim.get_unassigned_tasks()\n\n    if len(unassigned_agents) == 0 or len(unassigned_tasks) == 0:\n        return\n\n    # Get predicted congestion heatmap\n    state = sim.get_state_tensor(grid_resolution=5)\n    state_tensor = torch.FloatTensor(state).unsqueeze(0).to(device)\n\n    with torch.no_grad():\n        predicted_heatmap = model(state_tensor).cpu().numpy()[0]\n\n    cell_size = sim.grid_size // 5\n\n    # Build cost matrix with predicted congestion penalty\n    n_agents = len(unassigned_agents)\n    n_tasks = len(unassigned_tasks)\n    cost_matrix = np.zeros((n_agents, n_tasks))\n\n    for i, agent_idx in enumerate(unassigned_agents):\n        for j, task_idx in enumerate(unassigned_tasks):\n            dist = manhattan_distance(\n                sim.agent_positions[agent_idx], sim.tasks[task_idx]\n            )\n\n            task_pos = sim.tasks[task_idx]\n            cx = min(int(task_pos[0] // cell_size), 4)\n            cy = min(int(task_pos[1] // cell_size), 4)\n            congestion_penalty = (\n                predicted_heatmap[cx, cy] * congestion_weight * sim.grid_size\n            )\n\n            cost_matrix[i, j] = dist + congestion_penalty\n\n    assignment = greedy_assignment(cost_matrix)\n\n    for agent_local, task_local in assignment.items():\n        agent_idx = unassigned_agents[agent_local]\n        task_idx = unassigned_tasks[task_local]\n        sim.agent_targets[agent_idx] = np.array(sim.tasks[task_idx])\n        sim.agent_assigned[agent_idx] = True\n        sim.task_assigned[task_idx] = True\n\n\n# --- Data Collection for Training ---\ndef collect_training_data(num_episodes=100, steps_per_episode=50):\n    \"\"\"Collect state-congestion pairs for supervised learning\"\"\"\n    print(\"Collecting training data...\")\n    states = []\n    congestion_labels = []\n\n    for ep in range(num_episodes):\n        sim = WarehouseSimulator(grid_size=20, num_agents=30, num_tasks=50)\n\n        for step in range(steps_per_episode):\n            # Record state before allocation\n            state = sim.get_state_tensor(grid_resolution=5)\n\n            # Allocate using distance-based (baseline)\n            distance_based_allocation(sim)\n\n            # Move agents\n            sim.step()\n\n            # Record congestion after movement (T+1 label)\n            congestion = sim.get_congestion_heatmap(grid_resolution=5)\n\n            states.append(state)\n            congestion_labels.append(congestion)\n\n    return np.array(states), np.array(congestion_labels)\n\n\n# --- Training ---\ndef train_congestion_predictor(states, labels, epochs=50, batch_size=32):\n    \"\"\"Train the congestion prediction model\"\"\"\n    print(\"Training congestion predictor...\")\n\n    # Split data\n    n_samples = len(states)\n    indices = np.random.permutation(n_samples)\n    train_size = int(0.8 * n_samples)\n\n    train_idx = indices[:train_size]\n    val_idx = indices[train_size:]\n\n    train_states = torch.FloatTensor(states[train_idx]).to(device)\n    train_labels = torch.FloatTensor(labels[train_idx]).to(device)\n    val_states = torch.FloatTensor(states[val_idx]).to(device)\n    val_labels = torch.FloatTensor(labels[val_idx]).to(device)\n\n    model = CongestionPredictor(grid_resolution=5).to(device)\n    optimizer = optim.Adam(model.parameters(), lr=0.001)\n    criterion = nn.MSELoss()\n\n    for epoch in range(epochs):\n        model.train()\n        # Mini-batch training\n        perm = torch.randperm(len(train_states))\n        train_loss = 0\n        n_batches = 0\n\n        for i in range(0, len(train_states), batch_size):\n            batch_idx = perm[i : i + batch_size]\n            batch_states = train_states[batch_idx]\n            batch_labels = train_labels[batch_idx]\n\n            optimizer.zero_grad()\n            predictions = model(batch_states)\n            loss = criterion(predictions, batch_labels)\n            loss.backward()\n            optimizer.step()\n\n            train_loss += loss.item()\n            n_batches += 1\n\n        train_loss /= n_batches\n\n        # Validation\n        model.eval()\n        with torch.no_grad():\n            val_predictions = model(val_states)\n            val_loss = criterion(val_predictions, val_labels).item()\n\n        experiment_data[\"training\"][\"losses\"][\"train\"].append(train_loss)\n        experiment_data[\"training\"][\"losses\"][\"val\"].append(val_loss)\n        experiment_data[\"training\"][\"epochs\"].append(epoch)\n\n        if epoch % 10 == 0:\n            print(\n                f\"Epoch {epoch}: train_loss = {train_loss:.4f}, validation_loss = {val_loss:.4f}\"\n            )\n\n    return model\n\n\n# --- Evaluation ---\ndef run_evaluation(allocation_fn, sim, max_steps=200, model=None):\n    \"\"\"Run simulation and measure throughput\"\"\"\n    sim.reset()\n\n    for step in range(max_steps):\n        if model is not None:\n            allocation_fn(sim, model)\n        else:\n            allocation_fn(sim)\n        sim.step()\n\n        # Check if all tasks done\n        if sim.completed_tasks >= len(sim.tasks):\n            break\n\n    # Calculate throughput (tasks per minute, assuming 1 step = 1 second)\n    time_minutes = sim.timestep / 60.0\n    throughput = sim.completed_tasks / max(time_minutes, 1e-6)\n\n    return throughput, sim.completed_tasks, sim.timestep\n\n\ndef evaluate_all_methods(model, agent_counts=[20, 30, 50, 70, 100]):\n    \"\"\"Compare all allocation methods across different agent densities\"\"\"\n    results = defaultdict(lambda: defaultdict(list))\n\n    for num_agents in agent_counts:\n        print(f\"\\nEvaluating with {num_agents} agents...\")\n        experiment_data[\"agent_counts\"].append(num_agents)\n\n        num_tasks = int(num_agents * 1.5)\n\n        # Multiple trials for each configuration\n        for trial in range(5):\n            # Distance-based\n            sim = WarehouseSimulator(\n                grid_size=20, num_agents=num_agents, num_tasks=num_tasks\n            )\n            throughput, completed, steps = run_evaluation(\n                distance_based_allocation, sim\n            )\n            results[\"distance_based\"][num_agents].append(throughput)\n\n            # Heuristic congestion-aware\n            sim = WarehouseSimulator(\n                grid_size=20, num_agents=num_agents, num_tasks=num_tasks\n            )\n            throughput, completed, steps = run_evaluation(\n                heuristic_congestion_allocation, sim\n            )\n            results[\"heuristic_congestion\"][num_agents].append(throughput)\n\n            # Learned congestion-aware\n            sim = WarehouseSimulator(\n                grid_size=20, num_agents=num_agents, num_tasks=num_tasks\n            )\n            throughput, completed, steps = run_evaluation(\n                learned_congestion_allocation, sim, model=model\n            )\n            results[\"learned_congestion\"][num_agents].append(throughput)\n\n    return results\n\n\n# --- Main Execution ---\nprint(\"=\" * 60)\nprint(\"CATA: Congestion-Aware Task Allocation Experiment\")\nprint(\"=\" * 60)\n\n# Collect training data\nstates, labels = collect_training_data(num_episodes=100, steps_per_episode=50)\nprint(f\"Collected {len(states)} training samples\")\n\n# Train model\nmodel = train_congestion_predictor(states, labels, epochs=50, batch_size=32)\n\n# Evaluate all methods\nprint(\"\\n\" + \"=\" * 60)\nprint(\"Running evaluation across different agent densities...\")\nprint(\"=\" * 60)\n\nagent_counts = [20, 30, 50, 70, 100]\nresults = evaluate_all_methods(model, agent_counts)\n\n# Print results\nprint(\"\\n\" + \"=\" * 60)\nprint(\"RESULTS: Throughput (tasks per minute)\")\nprint(\"=\" * 60)\n\nprint(f\"\\n{'Agents':<10} {'Distance':<15} {'Heuristic':<15} {'Learned':<15}\")\nprint(\"-\" * 55)\n\nfor num_agents in agent_counts:\n    dist_mean = np.mean(results[\"distance_based\"][num_agents])\n    heur_mean = np.mean(results[\"heuristic_congestion\"][num_agents])\n    learn_mean = np.mean(results[\"learned_congestion\"][num_agents])\n\n    experiment_data[\"distance_based\"][\"throughput\"].append(dist_mean)\n    experiment_data[\"heuristic_congestion\"][\"throughput\"].append(heur_mean)\n    experiment_data[\"learned_congestion\"][\"throughput\"].append(learn_mean)\n\n    print(f\"{num_agents:<10} {dist_mean:<15.2f} {heur_mean:<15.2f} {learn_mean:<15.2f}\")\n\n# Calculate improvements\nprint(\"\\n\" + \"=\" * 60)\nprint(\"Improvement over Distance-Based Baseline\")\nprint(\"=\" * 60)\n\nfor i, num_agents in enumerate(agent_counts):\n    dist_mean = np.mean(results[\"distance_based\"][num_agents])\n    heur_mean = np.mean(results[\"heuristic_congestion\"][num_agents])\n    learn_mean = np.mean(results[\"learned_congestion\"][num_agents])\n\n    heur_improvement = (heur_mean - dist_mean) / dist_mean * 100\n    learn_improvement = (learn_mean - dist_mean) / dist_mean * 100\n\n    print(\n        f\"{num_agents} agents: Heuristic {heur_improvement:+.1f}%, Learned {learn_improvement:+.1f}%\"\n    )\n\n# Final throughput metric\nfinal_throughput = np.mean(experiment_data[\"learned_congestion\"][\"throughput\"])\nprint(f\"\\n{'=' * 60}\")\nprint(f\"PRIMARY METRIC - throughput_tasks_per_minute: {final_throughput:.2f}\")\nprint(f\"{'=' * 60}\")\n\n# Save experiment data\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\n\n# --- Visualization ---\n# Training loss curves\nplt.figure(figsize=(10, 4))\nplt.subplot(1, 2, 1)\nplt.plot(\n    experiment_data[\"training\"][\"epochs\"],\n    experiment_data[\"training\"][\"losses\"][\"train\"],\n    label=\"Train\",\n)\nplt.plot(\n    experiment_data[\"training\"][\"epochs\"],\n    experiment_data[\"training\"][\"losses\"][\"val\"],\n    label=\"Validation\",\n)\nplt.xlabel(\"Epoch\")\nplt.ylabel(\"MSE Loss\")\nplt.title(\"Congestion Predictor Training\")\nplt.legend()\nplt.grid(True)\n\n# Throughput comparison\nplt.subplot(1, 2, 2)\nx = np.arange(len(agent_counts))\nwidth = 0.25\nplt.bar(\n    x - width,\n    experiment_data[\"distance_based\"][\"throughput\"],\n    width,\n    label=\"Distance-based\",\n)\nplt.bar(\n    x,\n    experiment_data[\"heuristic_congestion\"][\"throughput\"],\n    width,\n    label=\"Heuristic CATA\",\n)\nplt.bar(\n    x + width,\n    experiment_data[\"learned_congestion\"][\"throughput\"],\n    width,\n    label=\"Learned CATA\",\n)\nplt.xlabel(\"Number of Agents\")\nplt.ylabel(\"Throughput (tasks/min)\")\nplt.title(\"Throughput vs Agent Density\")\nplt.xticks(x, agent_counts)\nplt.legend()\nplt.grid(True, axis=\"y\")\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"cata_results.png\"), dpi=150)\nplt.close()\n\n# Congestion heatmap visualization\nsim = WarehouseSimulator(grid_size=20, num_agents=50, num_tasks=75)\nstate = sim.get_state_tensor(grid_resolution=5)\nstate_tensor = torch.FloatTensor(state).unsqueeze(0).to(device)\n\nmodel.eval()\nwith torch.no_grad():\n    predicted = model(state_tensor).cpu().numpy()[0]\nactual = sim.get_congestion_heatmap(grid_resolution=5)\n\nplt.figure(figsize=(12, 4))\nplt.subplot(1, 3, 1)\nplt.imshow(state[0], cmap=\"Blues\")\nplt.title(\"Agent Density\")\nplt.colorbar()\n\nplt.subplot(1, 3, 2)\nplt.imshow(actual, cmap=\"Reds\")\nplt.title(\"Actual Congestion\")\nplt.colorbar()\n\nplt.subplot(1, 3, 3)\nplt.imshow(predicted, cmap=\"Reds\")\nplt.title(\"Predicted Congestion\")\nplt.colorbar()\n\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"congestion_heatmaps.png\"), dpi=150)\nplt.close()\n\nprint(f\"\\nResults saved to {working_dir}\")\nprint(\"Experiment completed successfully!\")\n", "import os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.optim as optim\nimport matplotlib.pyplot as plt\nfrom collections import defaultdict\nimport time\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n# Experiment data storage\nexperiment_data = {\n    \"distance_based\": {\"throughput\": [], \"completion_times\": [], \"agent_counts\": []},\n    \"congestion_aware_heuristic\": {\n        \"throughput\": [],\n        \"completion_times\": [],\n        \"agent_counts\": [],\n    },\n    \"congestion_aware_learned\": {\n        \"throughput\": [],\n        \"completion_times\": [],\n        \"agent_counts\": [],\n    },\n    \"predictor_training\": {\"losses\": {\"train\": [], \"val\": []}, \"epochs\": []},\n}\n\n\n# Simple Warehouse Simulator\nclass WarehouseSimulator:\n    def __init__(self, grid_size=20, num_agents=50, num_tasks=100):\n        self.grid_size = grid_size\n        self.num_agents = num_agents\n        self.num_tasks = num_tasks\n        self.reset()\n\n    def reset(self):\n        # Random agent positions\n        self.agent_positions = np.random.randint(\n            0, self.grid_size, (self.num_agents, 2)\n        )\n        self.agent_targets = np.full((self.num_agents, 2), -1)  # -1 means no task\n        self.agent_busy = np.zeros(self.num_agents, dtype=bool)\n\n        # Generate tasks at random locations\n        self.tasks = np.random.randint(0, self.grid_size, (self.num_tasks, 2))\n        self.task_available = np.ones(self.num_tasks, dtype=bool)\n\n        self.time_step = 0\n        self.completed_tasks = 0\n        self.task_completion_times = []\n        self.task_start_times = {}\n\n    def get_congestion_heatmap(self):\n        \"\"\"Compute actual congestion based on agent density\"\"\"\n        heatmap = np.zeros((self.grid_size, self.grid_size), dtype=np.float32)\n        for pos in self.agent_positions:\n            x, y = pos\n            # Add density in 3x3 neighborhood\n            for dx in range(-2, 3):\n                for dy in range(-2, 3):\n                    nx, ny = x + dx, y + dy\n                    if 0 <= nx < self.grid_size and 0 <= ny < self.grid_size:\n                        dist = abs(dx) + abs(dy)\n                        heatmap[nx, ny] += 1.0 / (1 + dist)\n        return heatmap / (heatmap.max() + 1e-6)\n\n    def get_state_tensor(self):\n        \"\"\"Create state tensor for learned predictor: agent positions + task positions\"\"\"\n        state = np.zeros((2, self.grid_size, self.grid_size), dtype=np.float32)\n        # Channel 0: agent positions\n        for pos in self.agent_positions:\n            state[0, pos[0], pos[1]] += 1.0\n        # Channel 1: available task positions\n        for i, pos in enumerate(self.tasks):\n            if self.task_available[i]:\n                state[1, pos[0], pos[1]] += 1.0\n        # Normalize\n        state[0] = state[0] / (state[0].max() + 1e-6)\n        state[1] = state[1] / (state[1].max() + 1e-6)\n        return state\n\n    def compute_distance_matrix(self):\n        \"\"\"Compute Manhattan distance from each agent to each task\"\"\"\n        dist_matrix = np.full((self.num_agents, self.num_tasks), np.inf)\n        for i, agent_pos in enumerate(self.agent_positions):\n            if not self.agent_busy[i]:\n                for j, task_pos in enumerate(self.tasks):\n                    if self.task_available[j]:\n                        dist_matrix[i, j] = abs(agent_pos[0] - task_pos[0]) + abs(\n                            agent_pos[1] - task_pos[1]\n                        )\n        return dist_matrix\n\n    def compute_congestion_cost(self, agent_pos, task_pos, congestion_heatmap):\n        \"\"\"Estimate congestion cost along path\"\"\"\n        x0, y0 = agent_pos\n        x1, y1 = task_pos\n\n        # Sample points along Manhattan path\n        cost = 0.0\n        steps = abs(x1 - x0) + abs(y1 - y0) + 1\n        if steps <= 1:\n            return cost\n\n        # Simple path: first move in x, then in y\n        path = []\n        cx, cy = x0, y0\n        while cx != x1:\n            cx += 1 if x1 > cx else -1\n            path.append((cx, cy))\n        while cy != y1:\n            cy += 1 if y1 > cy else -1\n            path.append((cx, cy))\n\n        for px, py in path:\n            cost += congestion_heatmap[px, py]\n\n        return cost / len(path) if path else 0.0\n\n    def greedy_assignment(self, cost_matrix):\n        \"\"\"Greedy assignment when scipy not available\"\"\"\n        assignments = []\n        used_agents = set()\n        used_tasks = set()\n\n        # Flatten and sort by cost\n        costs = []\n        for i in range(cost_matrix.shape[0]):\n            for j in range(cost_matrix.shape[1]):\n                if cost_matrix[i, j] < np.inf:\n                    costs.append((cost_matrix[i, j], i, j))\n        costs.sort()\n\n        for cost, agent_idx, task_idx in costs:\n            if agent_idx not in used_agents and task_idx not in used_tasks:\n                assignments.append((agent_idx, task_idx))\n                used_agents.add(agent_idx)\n                used_tasks.add(task_idx)\n\n        return assignments\n\n    def allocate_tasks(\n        self, method=\"distance\", congestion_heatmap=None, congestion_weight=2.0\n    ):\n        \"\"\"Allocate available tasks to free agents\"\"\"\n        dist_matrix = self.compute_distance_matrix()\n\n        if method == \"distance\":\n            cost_matrix = dist_matrix.copy()\n        elif method in [\"congestion_heuristic\", \"congestion_learned\"]:\n            if congestion_heatmap is None:\n                congestion_heatmap = self.get_congestion_heatmap()\n            cost_matrix = dist_matrix.copy()\n            for i in range(self.num_agents):\n                if not self.agent_busy[i]:\n                    for j in range(self.num_tasks):\n                        if self.task_available[j]:\n                            cong_cost = self.compute_congestion_cost(\n                                self.agent_positions[i],\n                                self.tasks[j],\n                                congestion_heatmap,\n                            )\n                            cost_matrix[i, j] += (\n                                congestion_weight * cong_cost * dist_matrix[i, j]\n                            )\n        else:\n            cost_matrix = dist_matrix.copy()\n\n        assignments = self.greedy_assignment(cost_matrix)\n\n        for agent_idx, task_idx in assignments:\n            self.agent_targets[agent_idx] = self.tasks[task_idx]\n            self.agent_busy[agent_idx] = True\n            self.task_available[task_idx] = False\n            self.task_start_times[task_idx] = self.time_step\n\n    def step(self):\n        \"\"\"Simulate one time step\"\"\"\n        self.time_step += 1\n\n        # Move agents toward their targets\n        for i in range(self.num_agents):\n            if self.agent_busy[i]:\n                target = self.agent_targets[i]\n                pos = self.agent_positions[i]\n\n                # Simple movement: one step toward target\n                if pos[0] < target[0]:\n                    self.agent_positions[i, 0] += 1\n                elif pos[0] > target[0]:\n                    self.agent_positions[i, 0] -= 1\n                elif pos[1] < target[1]:\n                    self.agent_positions[i, 1] += 1\n                elif pos[1] > target[1]:\n                    self.agent_positions[i, 1] -= 1\n\n                # Check if reached target\n                if np.array_equal(self.agent_positions[i], target):\n                    self.completed_tasks += 1\n                    task_idx = np.where((self.tasks == target).all(axis=1))[0]\n                    if len(task_idx) > 0:\n                        completion_time = self.time_step - self.task_start_times.get(\n                            task_idx[0], self.time_step\n                        )\n                        self.task_completion_times.append(completion_time)\n                    self.agent_busy[i] = False\n                    self.agent_targets[i] = [-1, -1]\n\n    def run_episode(self, max_steps=500, method=\"distance\", congestion_predictor=None):\n        \"\"\"Run a full episode\"\"\"\n        self.reset()\n\n        while self.time_step < max_steps and self.completed_tasks < self.num_tasks:\n            # Get congestion heatmap\n            if method == \"congestion_learned\" and congestion_predictor is not None:\n                state = (\n                    torch.FloatTensor(self.get_state_tensor()).unsqueeze(0).to(device)\n                )\n                with torch.no_grad():\n                    congestion_heatmap = (\n                        congestion_predictor(state).squeeze().cpu().numpy()\n                    )\n            elif method == \"congestion_heuristic\":\n                congestion_heatmap = self.get_congestion_heatmap()\n            else:\n                congestion_heatmap = None\n\n            # Allocate tasks every few steps\n            if self.time_step % 5 == 0:\n                self.allocate_tasks(\n                    method=method, congestion_heatmap=congestion_heatmap\n                )\n\n            self.step()\n\n        # Compute throughput (tasks per minute, assuming 1 step = 1 second)\n        simulation_minutes = self.time_step / 60.0\n        throughput = self.completed_tasks / max(simulation_minutes, 0.1)\n        avg_completion_time = (\n            np.mean(self.task_completion_times) if self.task_completion_times else 0\n        )\n\n        return {\n            \"throughput\": throughput,\n            \"completed_tasks\": self.completed_tasks,\n            \"avg_completion_time\": avg_completion_time,\n            \"total_steps\": self.time_step,\n        }\n\n\n# Simple CNN for congestion prediction\nclass CongestionPredictor(nn.Module):\n    def __init__(self, grid_size=20):\n        super().__init__()\n        self.conv1 = nn.Conv2d(2, 16, kernel_size=3, padding=1)\n        self.conv2 = nn.Conv2d(16, 32, kernel_size=3, padding=1)\n        self.conv3 = nn.Conv2d(32, 16, kernel_size=3, padding=1)\n        self.conv4 = nn.Conv2d(16, 1, kernel_size=3, padding=1)\n        self.relu = nn.ReLU()\n        self.sigmoid = nn.Sigmoid()\n\n    def forward(self, x):\n        x = self.relu(self.conv1(x))\n        x = self.relu(self.conv2(x))\n        x = self.relu(self.conv3(x))\n        x = self.sigmoid(self.conv4(x))\n        return x\n\n\n# Generate training data for congestion predictor\ndef generate_training_data(num_samples=500, grid_size=20, num_agents_range=(20, 80)):\n    states = []\n    heatmaps = []\n\n    for _ in range(num_samples):\n        num_agents = np.random.randint(*num_agents_range)\n        sim = WarehouseSimulator(\n            grid_size=grid_size, num_agents=num_agents, num_tasks=100\n        )\n\n        # Run a few steps to get interesting states\n        for _ in range(np.random.randint(10, 50)):\n            sim.allocate_tasks(method=\"distance\")\n            sim.step()\n\n        states.append(sim.get_state_tensor())\n        heatmaps.append(sim.get_congestion_heatmap())\n\n    return np.array(states), np.array(heatmaps)\n\n\n# Train congestion predictor\ndef train_predictor(\n    model, train_states, train_heatmaps, val_states, val_heatmaps, epochs=50\n):\n    optimizer = optim.Adam(model.parameters(), lr=0.001)\n    criterion = nn.MSELoss()\n\n    train_states = torch.FloatTensor(train_states).to(device)\n    train_heatmaps = torch.FloatTensor(train_heatmaps).unsqueeze(1).to(device)\n    val_states = torch.FloatTensor(val_states).to(device)\n    val_heatmaps = torch.FloatTensor(val_heatmaps).unsqueeze(1).to(device)\n\n    for epoch in range(epochs):\n        model.train()\n        optimizer.zero_grad()\n\n        # Mini-batch training\n        batch_size = 32\n        indices = np.random.permutation(len(train_states))[:batch_size]\n        batch_x = train_states[indices]\n        batch_y = train_heatmaps[indices]\n\n        pred = model(batch_x)\n        loss = criterion(pred, batch_y)\n        loss.backward()\n        optimizer.step()\n\n        # Validation\n        model.eval()\n        with torch.no_grad():\n            val_pred = model(val_states)\n            val_loss = criterion(val_pred, val_heatmaps).item()\n\n        experiment_data[\"predictor_training\"][\"losses\"][\"train\"].append(loss.item())\n        experiment_data[\"predictor_training\"][\"losses\"][\"val\"].append(val_loss)\n        experiment_data[\"predictor_training\"][\"epochs\"].append(epoch)\n\n        if epoch % 10 == 0:\n            print(\n                f\"Epoch {epoch}: train_loss = {loss.item():.4f}, validation_loss = {val_loss:.4f}\"\n            )\n\n    return model\n\n\n# Main experiment\nprint(\"=\" * 60)\nprint(\"CATA Baseline Experiment: Congestion-Aware Task Allocation\")\nprint(\"=\" * 60)\n\n# Generate training data\nprint(\"\\nGenerating training data for congestion predictor...\")\ntrain_states, train_heatmaps = generate_training_data(num_samples=400, grid_size=20)\nval_states, val_heatmaps = generate_training_data(num_samples=100, grid_size=20)\nprint(f\"Training samples: {len(train_states)}, Validation samples: {len(val_states)}\")\n\n# Train predictor\nprint(\"\\nTraining congestion predictor...\")\npredictor = CongestionPredictor(grid_size=20).to(device)\npredictor = train_predictor(\n    predictor, train_states, train_heatmaps, val_states, val_heatmaps, epochs=50\n)\n\n# Run evaluation experiments\nprint(\"\\n\" + \"=\" * 60)\nprint(\"Running Evaluation Experiments\")\nprint(\"=\" * 60)\n\nagent_counts = [20, 40, 60, 80]\nnum_trials = 5\nmethods = [\"distance\", \"congestion_heuristic\", \"congestion_learned\"]\n\nresults = {method: {\"throughputs\": [], \"completion_times\": []} for method in methods}\n\nfor num_agents in agent_counts:\n    print(f\"\\n--- Testing with {num_agents} agents ---\")\n\n    for method in methods:\n        throughputs = []\n        completion_times = []\n\n        for trial in range(num_trials):\n            sim = WarehouseSimulator(grid_size=20, num_agents=num_agents, num_tasks=100)\n\n            if method == \"congestion_learned\":\n                result = sim.run_episode(\n                    max_steps=500, method=method, congestion_predictor=predictor\n                )\n            else:\n                result = sim.run_episode(max_steps=500, method=method)\n\n            throughputs.append(result[\"throughput\"])\n            completion_times.append(result[\"avg_completion_time\"])\n\n        avg_throughput = np.mean(throughputs)\n        avg_completion = np.mean(completion_times)\n\n        results[method][\"throughputs\"].append(avg_throughput)\n        results[method][\"completion_times\"].append(avg_completion)\n\n        # Store in experiment data\n        method_key = (\n            f'congestion_aware_{method.split(\"_\")[-1]}'\n            if \"congestion\" in method\n            else \"distance_based\"\n        )\n        if method == \"distance\":\n            method_key = \"distance_based\"\n        elif method == \"congestion_heuristic\":\n            method_key = \"congestion_aware_heuristic\"\n        else:\n            method_key = \"congestion_aware_learned\"\n\n        experiment_data[method_key][\"throughput\"].append(avg_throughput)\n        experiment_data[method_key][\"completion_times\"].append(avg_completion)\n        experiment_data[method_key][\"agent_counts\"].append(num_agents)\n\n        print(\n            f\"  {method:25s}: throughput = {avg_throughput:.2f} tasks/min, avg_completion = {avg_completion:.2f} steps\"\n        )\n\n# Print final summary\nprint(\"\\n\" + \"=\" * 60)\nprint(\"FINAL RESULTS SUMMARY\")\nprint(\"=\" * 60)\n\nprint(\"\\nThroughput (tasks per minute) by agent count:\")\nprint(\n    f\"{'Agents':<10} {'Distance':<15} {'Heuristic':<15} {'Learned':<15} {'Improvement':<15}\"\n)\nprint(\"-\" * 70)\n\nfor i, num_agents in enumerate(agent_counts):\n    dist_tp = results[\"distance\"][\"throughputs\"][i]\n    heur_tp = results[\"congestion_heuristic\"][\"throughputs\"][i]\n    learn_tp = results[\"congestion_learned\"][\"throughputs\"][i]\n    best_improvement = max(heur_tp, learn_tp) / dist_tp - 1 if dist_tp > 0 else 0\n    print(\n        f\"{num_agents:<10} {dist_tp:<15.2f} {heur_tp:<15.2f} {learn_tp:<15.2f} {best_improvement*100:<15.1f}%\"\n    )\n\n# Primary metric: average throughput improvement\navg_dist_throughput = np.mean(results[\"distance\"][\"throughputs\"])\navg_heur_throughput = np.mean(results[\"congestion_heuristic\"][\"throughputs\"])\navg_learn_throughput = np.mean(results[\"congestion_learned\"][\"throughputs\"])\n\nprint(f\"\\nAverage throughput across all agent counts:\")\nprint(f\"  Distance-based:         {avg_dist_throughput:.2f} tasks/min\")\nprint(f\"  Congestion (heuristic): {avg_heur_throughput:.2f} tasks/min\")\nprint(f\"  Congestion (learned):   {avg_learn_throughput:.2f} tasks/min\")\n\nbest_cata_throughput = max(avg_heur_throughput, avg_learn_throughput)\nimprovement = (\n    (best_cata_throughput / avg_dist_throughput - 1) * 100\n    if avg_dist_throughput > 0\n    else 0\n)\n\nprint(\n    f\"\\n*** PRIMARY METRIC: throughput_tasks_per_minute = {best_cata_throughput:.2f} ***\"\n)\nprint(f\"*** Improvement over baseline: {improvement:.1f}% ***\")\n\n# Visualization\nfig, axes = plt.subplots(1, 3, figsize=(15, 5))\n\n# Plot 1: Throug
