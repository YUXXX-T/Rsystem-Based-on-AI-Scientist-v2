xperiment_f6cf09083b294923bda801222277ed5a_proc_11658/scaling_factor_tuning_results.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_f6cf09083b294923bda801222277ed5a_proc_11658/mapf_scaling_tuning_heatmap.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_f6cf09083b294923bda801222277ed5a_proc_11658/decay_tuning_results.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_f6cf09083b294923bda801222277ed5a_proc_11658/mapf_tuning_summary.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_f6cf09083b294923bda801222277ed5a_proc_11658/mapf_makespan_comparison.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_f6cf09083b294923bda801222277ed5a_proc_11658/mapf_improvement_by_scaling_factor.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_f6cf09083b294923bda801222277ed5a_proc_11658/mapf_conflict_counts.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_f6cf09083b294923bda801222277ed5a_proc_11658/multi_dataset_results.png"], ["experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_4e7cfc76656942fb88cb2f36228f29e1_proc_11659/scaling_factor_tuning_results.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_4e7cfc76656942fb88cb2f36228f29e1_proc_11659/mapf_scaling_tuning_heatmap.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_4e7cfc76656942fb88cb2f36228f29e1_proc_11659/mapf_tuning_summary.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_4e7cfc76656942fb88cb2f36228f29e1_proc_11659/mapf_makespan_comparison.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_4e7cfc76656942fb88cb2f36228f29e1_proc_11659/final_results.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_4e7cfc76656942fb88cb2f36228f29e1_proc_11659/n_agents_tuning_results.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_4e7cfc76656942fb88cb2f36228f29e1_proc_11659/mapf_improvement_by_scaling_factor.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_4e7cfc76656942fb88cb2f36228f29e1_proc_11659/mapf_conflict_counts.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_4e7cfc76656942fb88cb2f36228f29e1_proc_11659/epsilon_tuning_results.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_4e7cfc76656942fb88cb2f36228f29e1_proc_11659/multi_dataset_results.png"], ["experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_8a2a450de7d04cbca4b1f78a3bc468fd_proc_11657/penalty_weight_tuning.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_8a2a450de7d04cbca4b1f78a3bc468fd_proc_11657/cma_results.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_8a2a450de7d04cbca4b1f78a3bc468fd_proc_11657/scaling_factor_tuning_results.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_8a2a450de7d04cbca4b1f78a3bc468fd_proc_11657/mapf_scaling_tuning_heatmap.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_8a2a450de7d04cbca4b1f78a3bc468fd_proc_11657/mapf_tuning_summary.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_8a2a450de7d04cbca4b1f78a3bc468fd_proc_11657/mapf_makespan_comparison.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_8a2a450de7d04cbca4b1f78a3bc468fd_proc_11657/mapf_improvement_by_scaling_factor.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_8a2a450de7d04cbca4b1f78a3bc468fd_proc_11657/mapf_conflict_counts.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_8a2a450de7d04cbca4b1f78a3bc468fd_proc_11657/n_eval_tuning_results.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_8a2a450de7d04cbca4b1f78a3bc468fd_proc_11657/grid_size_tuning_results.png"], ["experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/seed_aggregation_ea1aa36f810c4af8a96484eb3a3b8871/mapf_aggregated_tuning_summary.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/seed_aggregation_ea1aa36f810c4af8a96484eb3a3b8871/mapf_aggregated_makespan_comparison.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/seed_aggregation_ea1aa36f810c4af8a96484eb3a3b8871/mapf_aggregated_scaling_tuning_heatmap.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/seed_aggregation_ea1aa36f810c4af8a96484eb3a3b8871/mapf_aggregated_conflict_counts.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/seed_aggregation_ea1aa36f810c4af8a96484eb3a3b8871/mapf_aggregated_improvement_by_scaling_factor.png"]], "plot_analyses": [[{"analysis": "The composite figure provides useful sanity checks for the implementation. The warehouse layout shows structured aisles and repeated shelf blocks, so learning congestion should be plausible because traffic is naturally funneled through corridor intersections. The conflict memory heatmap is not uniform: it concentrates on a few corridor crossings and chokepoints, which supports the core hypothesis that conflicts are spatially structured rather than random. However, the makespan comparison on the right does not show a benefit yet. The plotted means are approximately 16.0 for Baseline and 16.5 for CMA, indicating a slight degradation in average performance despite the learned map appearing meaningful. This suggests the memory is detecting bottlenecks, but the current penalty integration into assignment is not yet converting that information into better schedules. For an initial implementation, this is still encouraging because the representation appears nontrivial; the main issue is decision usefulness, not signal absence.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_a71d4c608ff14cccad9a72720b1abe09_proc_11518/cma_results.png"}, {"analysis": "This makespan-over-episodes plot shows Baseline and CMA tracking each other very closely across roughly 80 episodes. The mean lines indicate a tiny advantage for CMA, about 16.05 versus 16.25, which is only around a 0.2 makespan reduction or roughly 1.2% relative improvement. That is directionally consistent with the method but far below the 15\u201325% target claimed in the research vision. The episode-level curves also cross frequently, implying high variance relative to the effect size. There is no visible monotonic learning trend where CMA becomes progressively better over time, so either the conflict memory saturates quickly, is too weak to affect assignments strongly, or the task distribution is too noisy for this small-scale setup. The main takeaway is that the implementation may be working but the gain is currently marginal and likely not statistically convincing.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_a71d4c608ff14cccad9a72720b1abe09_proc_11518/cma_makespan_comparison.png"}, {"analysis": "The assignment-change analysis shows that CMA chooses a different assignment from Baseline in 50.0% of episodes. This is an important diagnostic result: the method is not failing simply because it leaves assignments unchanged almost all the time. It is intervening often enough to matter behaviorally. Combined with the weak makespan improvement elsewhere, this implies the current learned penalties are influential but not reliably beneficial. In other words, CMA is changing decisions, but those changes are only as good as random or slightly better at this stage. That points to calibration and credit-assignment issues rather than a no-op implementation. It would be useful to break down performance conditioned on whether assignments changed, since the current figure strongly suggests many changes are unnecessary or harmful.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_a71d4c608ff14cccad9a72720b1abe09_proc_11518/cma_assignment_changes.png"}, {"analysis": "The parameter sweep is highly informative despite being simple. A penalty weight of 0.5 is labeled best and is the only clearly positive setting, at around +1.4% improvement. A weight of 1.0 is effectively neutral, while larger weights become harmful, with 2.0 causing the largest drop at roughly -4.2% and 3.0 to 5.0 remaining negative. This strongly indicates the conflict signal is delicate: mild regularization can help, but stronger penalties over-bias assignment away from nominally efficient routes and likely create longer travel distances that outweigh conflict reduction. This is actually a valuable early result for a paper because it shows CMA should be treated as a soft cost shaping mechanism, not a hard avoidance rule. It also suggests the current memory values are not normalized or calibrated robustly enough for broad hyperparameter stability.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_a71d4c608ff14cccad9a72720b1abe09_proc_11518/cma_parameter_sweep.png"}, {"analysis": "The histogram of per-episode makespan improvements shows a distribution sharply concentrated near zero, with mean improvement around -0.18%. This indicates that in most episodes CMA behaves almost identically to Baseline, with only a minority of episodes producing substantial positive or negative effects. The distribution appears asymmetric in having both noticeable wins and losses, but the average is slightly negative, so the bad cases are currently offsetting the good ones. This pattern fits an early-stage method that occasionally identifies true congestion structure but lacks reliability. For the hypothesis, the plot is mixed: there is evidence that conflict memory can matter because some episodes show sizable positive improvement, yet the central mass near zero means the allocation mechanism is not consistently exploiting that information. Reporting median improvement, win rate, and tail-risk metrics would help clarify whether CMA is valuable as a risk-reduction method even if mean improvement is near zero.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_a71d4c608ff14cccad9a72720b1abe09_proc_11518/cma_improvement_distribution.png"}, {"analysis": "The rolling-average improvement plot is inconsistent with the rest of the reported results. The green curve is exactly flat at 0 over all shown episodes, while other plots show nonzero positive and negative improvements and nonidentical means between Baseline and CMA. That flat line suggests either a plotting bug, a data pipeline issue, or a placeholder value rather than a genuine rolling average. Because this figure directly contradicts the other results, it should not be used as evidence until verified. Scientifically, the main takeaway is procedural: the evaluation code likely needs auditing before drawing strong conclusions. For an initial implementation stage, catching this inconsistency is important and arguably more valuable than squeezing out small gains.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_a71d4c608ff14cccad9a72720b1abe09_proc_11518/cma_rolling_improvement.png"}, {"analysis": "This four-panel summary appears to be a controlled toy run where Baseline and CMA are exactly identical in makespan across all 20 episodes. The improvement-ratio panel confirms this with a mean of 0.00% and a flat zero line. The conflict-count comparison also shows no difference, and the normalized conflict memory map contains only a few isolated hotspots. As a sanity check, this is useful because it demonstrates the current setup can produce a valid memory visualization without automatically changing outcomes. However, as experimental evidence for CMA, it indicates the intervention is effectively inactive in this configuration. Either the allocation tie-breaking leaves decisions unchanged, the penalty never alters costs enough to switch assignments, or the environment/task set is too trivial to expose benefits. This is acceptable for preliminary debugging but not yet evidence of the research claim.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_a71d4c608ff14cccad9a72720b1abe09_proc_11518/cma_experiment_results.png"}, {"analysis": "The conflict-count comparison over episodes shows highly variable and sparse conflict events for both methods. There are some episodes where CMA reduces conflicts substantially, such as the large Baseline spike near the low 70s that is not matched by CMA, which is encouraging and consistent with the congestion-memory idea. But there are also episodes where CMA has more conflicts than Baseline, including notable spikes in the mid-60s. The overall picture is therefore mixed rather than dominant improvement. This suggests CMA may be redistributing congestion rather than consistently eliminating it. Since the main objective is makespan, this also helps explain why average makespan gains remain small: fewer conflicts do not always translate into shorter schedules if avoidance induces detours. For the next stage, a stronger analysis would correlate per-episode conflict reduction with makespan change and inspect whether memory helps specifically in high-congestion regimes rather than on average across all episodes.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_a71d4c608ff14cccad9a72720b1abe09_proc_11518/cma_conflict_counts.png"}], [], [], [], [], [], [], [], [], [], [], [{"analysis": "The tuning sweep over penalty weight and scaling factor shows a real but moderate gain region rather than a sharp optimum. The best cell is around scaling factor 0.5 with penalty weight 3 or 5, reaching about 8.7% improvement, while low penalty with low scaling is clearly weaker at about 5.9%. This indicates CMA is sensitive to under-regularization but becomes fairly stable once the congestion penalty is strong enough. The line plot confirms that small scaling factors benefit most from increasing penalty weight, whereas larger scaling factors flatten around ~8.0\u20138.1%, suggesting saturation. The conflict memory map itself is highly structured, with several bright hotspots concentrated around a few rows/columns and intersections rather than diffuse noise; that supports the hypothesis that conflicts are topology-driven and learnable. In the final makespan trace, CMA lowers the mean from about 16.2 to 15.3, so the aggregate gain is consistent with the tuning heatmap, but the per-episode series shows some episodes with negligible gain or slight regressions. Overall, the method appears beneficial on average, but the payoff is concentrated in congestion-heavy cases rather than uniformly across all trials.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/scaling_factor_tuning_results.png"}, {"analysis": "The warmup study is negative across all tested settings: the makespan improvement ratio remains below zero for 50, 75, 100, and 150 warmup episodes, with the least harmful setting at 150. The grouped bars show CMA slightly worse than baseline at every warmup value, and the distribution panel indicates the degradation shrinks as warmup grows longer, from roughly -2.1% at 50/75 to around -0.3% at 150. This suggests the warmup procedure, as currently implemented, is likely populating conflict memory with low-quality or poorly calibrated signals early on, causing allocation costs to become biased before the memory is reliable. A practical takeaway is that warmup should not be a priority hyperparameter for this baseline_tuning stage unless paired with normalization, decay, or confidence weighting. If any warmup is kept, longer warmup is less damaging, but the evidence here argues that online updating or delayed activation may be preferable to explicit warmup.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/n_warmup_tuning_results.png"}, {"analysis": "This annotated heatmap makes the parameter landscape especially clear. Improvements are consistently positive across the full grid, roughly 5.9% to 8.7%, which is encouraging because it means CMA is not extremely brittle. The strongest region lies at penalty weight 3\u20135 with scaling factor 0.5, and there is another strong point at penalty weight 1 with scaling factor 3.0. Most of the grid collapses to a narrow 8.0\u20138.1% band, implying that many settings are near-equivalent and that the exact optimum may not be statistically distinguishable without multiple random seeds. For baseline tuning, this means a good default should prioritize robustness over the single best cell. Penalty weight 3 looks attractive because it matches the top result while avoiding unnecessarily large penalties, and the surrounding cells are also strong.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/mapf_scaling_tuning_heatmap.png"}, {"analysis": "The summary statistics report best penalty weight 3.0, best scaling factor 0.5, final improvement 5.54%, and assignment change rate 61.25%. The chosen best hyperparameters are consistent with the tuning heatmaps and line plots. The assignment change rate is substantial: CMA is materially altering more than half of assignments, so the improvement is not coming from a tiny correction on a few outliers but from a broad policy shift. At the same time, the final improvement of 5.54% is lower than the ~8.7% best heatmap cell, suggesting either distribution shift between the tuning set and final run, or that the summary metric is computed differently than the sweep metric. That gap is important for the paper: it indicates gains are real but may be optimistic when measured only on a single tuning grid. You should report both tuned peak and held-out/final performance explicitly.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/mapf_tuning_summary.png"}, {"analysis": "The per-episode makespan comparison again shows a mean reduction from 16.25 to 15.35, or about 5.5%, consistent with the summary figure. CMA tracks baseline closely on easy episodes but tends to clip some of the higher peaks, which is exactly what a congestion-aware allocation mechanism should do. The gain therefore seems to come more from reducing severe congestion events than from uniformly improving all instances. There are still episodes where CMA is worse, and a few late-run segments remain highly variable, so the method is not yet fully stable. For a strong paper narrative, this plot supports the claim that conflict memory mainly mitigates pathological bottlenecks rather than changing nominal cases.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/mapf_makespan_comparison.png"}, {"analysis": "The improvement-vs-penalty curves reinforce that the main hyperparameter interaction is between penalty strength and scaling factor. Scaling factor 0.5 responds the most dramatically, rising from about 5.9% to 8.7% as penalty increases, then plateauing. Scaling factor 1.0 shows a similar but slightly weaker pattern. Larger scaling factors, especially 5.0, are comparatively insensitive to penalty weight and hover near 8.0\u20138.1%, which may indicate over-smoothing or excessive diffusion of conflict costs so that the assignment matrix no longer reacts strongly to tuning. This plot argues for moderate conflict propagation with sufficiently strong penalties, rather than aggressive spreading. In baseline tuning, learning rate or update-rate adjustments should aim to preserve this sharp but stable sensitivity rather than flatten it further.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/mapf_improvement_by_scaling_factor.png"}, {"analysis": "The conflict-count histogram by episode suggests CMA changes the temporal distribution of conflicts rather than uniformly lowering them. Baseline has several large isolated spikes, including a very large spike around the low 70s, while CMA exhibits more medium-sized spikes in the later episodes. This pattern is consistent with CMA suppressing catastrophic congestion events but not necessarily minimizing raw conflict count episode-by-episode. Since the objective is makespan, that can still be acceptable: a few severe chokepoint conflicts may be more damaging than many smaller ones. However, it also implies conflict count alone is not an adequate proxy metric for success. For the paper, you should analyze conflict severity, conflict clustering, or delay induced per conflict, not just counts.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/mapf_conflict_counts.png"}, {"analysis": "The cross-layout generalization result is weak and currently challenges the stronger claims in the abstract. On warehouse, CMA underperforms baseline by about 3.83%; on dense_grid, it is also slightly worse at about -0.45%; only random_obstacles is marginally positive at about 0.29%, which is effectively neutral without uncertainty bars. The trajectory plots show close overlap between methods in all three environments, with no clear systematic advantage. This suggests the current histogram-style conflict memory may be overfitting to the tuning environment or failing to capture transferable topology-dependent structure. For publication-quality evidence, you need either environment-specific tuning, stronger normalization across layouts, or a representation that reasons over topology more explicitly. This is also where adding external datasets could help: evaluate on at least two additional grid/route-planning benchmarks from HuggingFace or other public sources with distinct bottleneck structures to test whether the learned congestion priors transfer or whether CMA must be retrained per map.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_02f077e9ea5243fe9e974911ae240cfd_proc_11656/multi_dataset_results.png"}], [], [{"analysis": "The conflict memory visualization shows clearly non-uniform spatial structure rather than diffuse noise. High-intensity cells cluster around a few vertical and horizontal corridors, with the strongest hotspot near the central crossing and additional bright regions near lower-middle and upper-right traversable lanes. This supports the paper\u2019s core premise that conflicts are concentrated at bottlenecks induced by map topology. However, the paired makespan comparison for max_time=50 does not yet show benefit from using this memory: the CMA trajectory largely tracks the baseline and the dashed means indicate CMA is slightly worse on average (16.8 vs 16.2). The memory appears to be learning meaningful congestion structure, but the way it is fed back into assignment is not yet tuned well enough to convert that structure into performance gains. This suggests the failure is more likely in hyperparameterization of the penalty/weighting or update dynamics than in the existence of usable conflict signal.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_f6cf09083b294923bda801222277ed5a_proc_11658/cma_results.png"}, {"analysis": "Across max_time values 50, 100, 150, and 200, the improvement ratio bars are all slightly negative at about -0.006, and the paired average-makespan bars show CMA consistently but only marginally above baseline. Computation time is essentially flat around 1.10\u20131.11 s for all max_time settings, so increasing max_time is not materially changing runtime in this regime. The efficiency metric is correspondingly negative and stable. The key takeaway is that max_time is not the source of the poor first-attempt result: performance is uniformly slightly worse regardless of budget, implying the bottleneck is not search truncation but the quality of the feedback signal or its calibration. This is a useful negative result because it narrows the tuning space toward penalty weight, scaling factor, decay, or warm-up strategy rather than planner time budget.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_f6cf09083b294923bda801222277ed5a_proc_11658/max_time_tuning_results.png"}, {"analysis": "The hyperparameter sweep over penalty weight and scaling factor is the first plot set that demonstrates real promise. The heatmap shows robust positive improvement in the 7\u20139% range over most settings, with the best region concentrated around scaling factor 0.5 and penalty weights 3 or 5 (about 8.7%), and another strong point at scaling factor 3 with weight 1 (about 8.6%). The line plot confirms a non-monotonic interaction: smaller scaling factor benefits from stronger penalty, whereas larger scaling factors plateau or slightly decline. The final conflict memory map still highlights the same structured chokepoints seen earlier, suggesting the learned memory is stable across tuning. Most importantly, the final-run makespan comparison now shows CMA mean 15.3 vs baseline 16.2, a clear reversal from the initial negative result. This indicates the method is highly sensitive to feedback strength, and once calibrated, converts learned conflict structure into consistent makespan reduction.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_f6cf09083b294923bda801222277ed5a_proc_11658/scaling_factor_tuning_results.png"}, {"analysis": "This annotated heatmap makes the scaling-factor/penalty-weight interaction more explicit. Improvement is weakest at scaling factor 0.5 with penalty weight 1 (5.9%), then rises sharply as penalty weight increases, peaking at 8.7% for weights 3 and 5. Scaling factor 1 is fairly robust but still benefits from moving to weight 3. Scaling factors 2, 3, and 5 occupy a flatter plateau around 8.0\u20138.6%, which suggests diminishing sensitivity once the congestion signal is amplified enough. The best operating point highlighted by the sweep is not simply \u201cmore penalty is better\u201d; rather, there is a compensatory relationship between scaling factor and weight. This is a strong ablation for a paper because it shows the gains are not cherry-picked from a single parameter but come from a broad favorable region, while still identifying a best configuration.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_f6cf09083b294923bda801222277ed5a_proc_11658/mapf_scaling_tuning_heatmap.png"}, {"analysis": "The decay-parameter study shows that temporal persistence of conflict memory matters and that too much persistence hurts. Improvement is positive only for decay values 0.85, 0.90, and slightly 0.97, with the best result at 0.85 (~0.9%). From 0.93 onward the metric becomes negative except for the small rebound at 0.97, and at 0.99 performance drops most strongly (~-1.5%). The bar chart of mean makespan matches this trend: CMA is slightly below baseline at 0.85 and 0.90, near parity or worse at 0.93/0.95/0.99, and roughly tied at 0.97. The corresponding memory map for decay=0.85 is sparser and lower-magnitude than earlier maps, which is consistent with fresher conflict information and less accumulation of stale congestion. Combined with the warehouse layout, the map\u2019s bright cells line up with aisle intersections and entrance points, reinforcing that the learned memory is topologically meaningful. The practical implication is that memory should be moderately forgetful; otherwise outdated conflicts over-penalize routes and degrade allocation.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_f6cf09083b294923bda801222277ed5a_proc_11658/decay_tuning_results.png"}, {"analysis": "The summary-statistics panel consolidates the tuning outcome: best penalty weight 3.0, best scaling factor 0.5, assignment change rate 61.25%, and final improvement 5.54%. The assignment change rate is particularly important scientifically because it shows CMA is not producing only tiny perturbations to the baseline assignments; it materially alters more than half of assignment decisions while still improving makespan. That strengthens the causal story that the conflict memory is genuinely influencing allocation policy rather than yielding incidental planner noise. The reported final improvement is smaller than the peak seen in some sweep plots, which is normal if this panel reflects a held-out or aggregated estimate. This gap suggests variance across episodes or environments and makes it important to report confidence intervals or multiple seeds in the paper.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_f6cf09083b294923bda801222277ed5a_proc_11658/mapf_tuning_summary.png"}, {"analysis": "This standalone final makespan comparison provides the clearest evidence that the tuned CMA setting is beneficial on the tested setup. The dashed means show baseline 16.25 versus CMA 15.35, which is a reduction of roughly 5.5%, matching the summary panel. Episode-wise, the red CMA curve closely follows the blue baseline but suppresses several high-makespan spikes, especially in the later episodes where baseline shows multiple excursions above 20 and near 30. The improvement therefore appears to come less from uniformly lowering all cases and more from reducing severe congestion events. That is exactly the behavior expected from a conflict-memory mechanism targeting bottlenecks. This plot is strong evidence for the claim that lightweight feedback can reduce tail-risk in decoupled scheduling.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_f6cf09083b294923bda801222277ed5a_proc_11658/mapf_makespan_comparison.png"}, {"analysis": "The improvement-versus-penalty-weight curves by scaling factor reinforce that the method has a structured and interpretable tuning landscape. Scaling factor 0.5 starts weak at low weight but becomes the strongest setting at weights 3 and 5. Scaling factor 1.0 follows a similar but slightly lower pattern. Scaling factors 2.0, 3.0, and 5.0 are relatively flat, indicating a saturation regime where increasing penalty weight no longer changes behavior much. This plot suggests the effective control knob is the product or interaction of scaling factor and penalty weight rather than either parameter alone. For baseline tuning, this means future sweeps can likely be narrowed around low scaling factor with moderate-to-high weight, which is more sample-efficient than broad Cartesian search.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_f6cf09083b294923bda801222277ed5a_proc_11658/mapf_improvement_by_scaling_factor.png"}, {"analysis": "The conflict-count bar plot provides a mechanistic view of why makespan improves. Baseline shows several large conflict spikes, including a very large outlier around episode 72, whereas CMA generally has lower counts on those same episodes. CMA does show some spikes of its own, notably around the mid-to-late episodes, so the reduction is not uniform. Still, the extreme baseline outlier is strongly attenuated under CMA, which aligns with the earlier observation that most of the makespan gain comes from preventing worst-case congestion rather than shifting every episode equally. This plot is valuable because it links the allocation change to the intended intermediate variable\u2014conflict reduction\u2014supporting the causal chain: conflict memory alters assignments, assignments reduce path conflicts, and reduced conflicts lower makespan.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_f6cf09083b294923bda801222277ed5a_proc_11658/mapf_conflict_counts.png"}, {"analysis": "The cross-layout comparison is the most cautionary result in the set. On warehouse_standard, warehouse_dense, and warehouse_sparse, the reported improvements are all negative: -5.82%, -0.60%, and -0.10%, meaning CMA underperforms baseline on each environment, with the standard layout showing a substantial drop. The conflict memory maps are still clearly structured and differ by environment\u2014dense and sparse layouts produce distinct hotspot patterns\u2014so the system continues to detect meaningful congestion structure. The issue is therefore not failure to learn a map, but failure to transfer the chosen feedback policy robustly across map regimes. This indicates overfitting of the tuned parameters to one setup or seed distribution. For a top-conference paper, this result means the next step should emphasize cross-environment validation, environment-conditioned tuning, or normalization of penalties by map density/chokepoint statistics. It also implies that claims about generalization are not yet supported by the current evidence.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_f6cf09083b294923bda801222277ed5a_proc_11658/multi_dataset_results.png"}], [{"analysis": "The tuning sweep over penalty weight and scaling factor shows a fairly stable but modest gain regime for CMA. Improvement values lie roughly in the 5.9%\u20138.7% range, with the best region at scaling factor 0.5 and penalty weights 3 or 5, and near-best performance at scaling factor 1.0 with penalty weight 3. This indicates the method is not hypersensitive, which is good for deployment, but it also suggests diminishing returns from stronger penalties once the congestion prior becomes too dominant. The conflict memory map is clearly structured rather than noisy: the brightest cells align with corridor intersections and bottleneck-like regions, supporting the paper\u2019s core claim that conflicts concentrate in predictable spatial locations. The final makespan comparison shows CMA reducing the mean from about 16.2 to 15.3, a gain near 5.5%, but with substantial episode-level overlap and occasional reversals. Scientifically, this is useful evidence that the memory signal helps on average, yet the effect size in this run is smaller than the abstract\u2019s stated 15\u201325%, so the current baseline_tuning result is promising but not yet strong enough for a top-tier paper without either stronger settings, harder congestion regimes, or broader benchmark gains.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_4e7cfc76656942fb88cb2f36228f29e1_proc_11659/scaling_factor_tuning_results.png"}, {"analysis": "The annotated heatmap makes the hyperparameter landscape very interpretable. There is a clear sweet spot around penalty weight 3 with low scaling factor 0.5, reaching 8.7% improvement, while several neighboring settings remain above 8%. That plateau suggests the method is robust once the penalty has enough influence, but not too much. Very low penalty with low scaling factor underperforms at 5.9%, implying weak conflict feedback is insufficient. Higher scaling factors around 3\u20135 flatten performance near 8.0%\u20138.1%, which may mean over-smoothing or over-penalizing erases useful distinctions between candidate assignments. For the next tuning step, the search should concentrate around penalty weights 2.5\u20134 and scaling factors 0.5\u20131.5, with finer granularity rather than expanding the range.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_4e7cfc76656942fb88cb2f36228f29e1_proc_11659/mapf_scaling_tuning_heatmap.png"}, {"analysis": "The summary bar chart identifies the selected configuration as penalty weight 3.0 and scaling factor 0.5, consistent with the best cell in the sweep. The assignment change rate is very high at 61.25%, meaning CMA is actively altering the allocator\u2019s choices rather than acting as a weak tie-breaker. That is important because it shows the learned memory is operationally influential. However, the final improvement is only 5.54%, so a large fraction of assignment changes are not converting into proportional makespan benefit. This gap suggests either noisy assignment perturbations or a mismatch between the penalty proxy and the true downstream planner cost. A stronger paper would benefit from reporting assignment quality diagnostics: fraction of changed assignments that reduce conflicts, correlation between conflict memory score and realized MAPF delay, and ablations on memory update frequency or temporal smoothing.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_4e7cfc76656942fb88cb2f36228f29e1_proc_11659/mapf_tuning_summary.png"}, {"analysis": "The episode-wise makespan plot confirms a consistent but moderate average advantage for CMA: the dashed means are about 16.25 for baseline versus 15.35 for CMA. CMA appears to reduce several high-makespan spikes, especially in some heavy-tail episodes, which is more valuable than merely improving easy cases. At the same time, many trajectories nearly overlap, and there are episodes where CMA is worse. This pattern suggests the method is primarily acting as a risk reducer under congestion rather than a uniformly better planner. For publication quality, this should be quantified with variance, tail metrics, and paired statistical tests rather than mean alone. Reporting p-values or bootstrap confidence intervals for paired episode differences would make the claim more defensible.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_4e7cfc76656942fb88cb2f36228f29e1_proc_11659/mapf_makespan_comparison.png"}, {"analysis": "This figure is particularly informative because it exposes a failure mode. The warehouse layout and conflict memory map again show concentrated hotspots at intersections and narrow passage regions, validating the learned spatial structure. But the final results at epsilon=2.0 show CMA underperforming baseline on average: baseline mean about 16.4 versus CMA mean about 17.1. This tells us the exploration or penalty regime associated with epsilon=2.0 is too aggressive, likely causing overreaction to historical conflicts and pushing assignments into longer but less conflicted routes that do not actually reduce makespan. This is scientifically valuable because it demonstrates the method needs calibration and is not monotonic in control strength. It also motivates the later epsilon sweep and supports a narrative about balancing exploitation of learned congestion priors against adaptability.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_4e7cfc76656942fb88cb2f36228f29e1_proc_11659/final_results.png"}, {"analysis": "The scaling with number of agents is concerning in its current form. The improvement-vs-agents bar chart is negative for most agent counts, with only a small positive region around 5\u20136 agents and the worst degradation near 12 agents. The makespan bars mirror this, showing CMA often slightly worse than baseline as agent count grows. The conflict bars are even more problematic: CMA generally produces more conflicts than baseline, especially in denser settings. Meanwhile, assignment change rate rises sharply with agent count, reaching very high values above 80\u201390%, implying the policy becomes increasingly interventionist while becoming less effective. The conflict memory map for 6 agents still looks structured, so the issue is not absence of signal but likely a scaling mismatch: a memory heuristic that works in moderate load may destabilize allocation under heavy load. This is a critical result for the paper because it suggests the current formulation does not yet scale gracefully. The next tuning should test normalization by agent count, softer penalties at high occupancy, or capped influence rather than globally stronger feedback.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_4e7cfc76656942fb88cb2f36228f29e1_proc_11659/n_agents_tuning_results.png"}, {"analysis": "The line plot of improvement versus penalty weight by scaling factor reinforces that low scaling factor is best once paired with sufficiently strong penalty. Scaling factor 0.5 improves sharply from 5.9% at weight 1 to 8.7% at weights 3 and 5. Scaling factor 1.0 follows a similar but slightly weaker pattern. Larger scaling factors are flatter and top out lower, with factor 5 nearly constant around 8.1 and slightly dropping at weight 5. This implies the method benefits from preserving spatial contrast in the memory signal; too much scaling likely smooths away the localized chokepoint structure that matters. For baseline tuning, this is good evidence that architecture changes are unnecessary right now; the gains seem governed by calibration of feedback strength rather than representational capacity.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_4e7cfc76656942fb88cb2f36228f29e1_proc_11659/mapf_improvement_by_scaling_factor.png"}, {"analysis": "The conflict-counts-per-episode comparison reveals a nuanced picture. CMA suppresses some baseline spikes, including one very large baseline outlier around the 70s episodes, but it also introduces new spikes of its own, especially in the mid-to-late episodes. This agrees with the makespan plots showing average gains without universal dominance. The key interpretation is that conflict memory is not simply minimizing raw conflict count; it is reshaping where congestion appears. Some CMA episodes with more conflicts may still have lower makespan if conflicts occur in less harmful regions or later times. For a stronger analysis, the paper should separate vertex versus edge conflicts, early versus late conflicts, and conflict centrality near bottlenecks. Raw counts alone may understate the value of learned conflict redistribution.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_4e7cfc76656942fb88cb2f36228f29e1_proc_11659/mapf_conflict_counts.png"}, {"analysis": "The epsilon sweep is one of the most useful tuning studies here. Improvement is highly non-monotonic: small epsilon values around 0.01\u20130.1 give modest gains, a narrow region near 0.143\u20130.15 causes degradation, and the best result occurs at epsilon 2.0 with about 3.8% improvement in this sweep. Convergence speed improves steadily with larger epsilon, dropping from roughly 19 iterations to under 8, and efficiency rises strongly at the high end. This indicates a real trade-off between optimization speed and solution quality, with large epsilon surprisingly helping both here. However, this best epsilon still yields smaller gains than the scaling-factor sweep\u2019s best settings, so either these are different experimental conditions or epsilon interacts strongly with the penalty/scaling configuration. The non-monotonic dip around 0.143\u20130.15 deserves attention because it may indicate resonance with the update rule or instability in assignment switching. A denser search around 0.12\u20130.2 and above 1.0 would be worthwhile.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_4e7cfc76656942fb88cb2f36228f29e1_proc_11659/epsilon_tuning_results.png"}, {"analysis": "The cross-environment generalization panel currently weakens the paper\u2019s broadest claims. CMA is negative on warehouse, dense_grid, corridor_grid, and sparse_random, and only positive on random_obstacles, with gains/losses mostly modest but consistently not favorable. This suggests the current conflict-memory heuristic is environment-dependent and may transfer best to irregular maps where bottlenecks are less obvious to the baseline allocator. In highly structured grids and corridor layouts, the added penalty may over-constrain routing choices or duplicate what the planner already handles. This does not invalidate the idea, but it changes the story: CMA may be especially useful in environments with latent, nontrivial congestion patterns rather than all MAPF domains. For stronger experimental coverage in the next round, two HuggingFace datasets that would be useful as additional testbeds are benjamin-paine/mapf for MAPF-style benchmark instances if available in your environment, and gta-lab/sokoban for grid-based path-interaction stress tests; if those are inaccessible, a practical alternative is to source grid maps from HuggingFace-hosted reinforcement-learning environments or navigation datasets and convert them into obstacle maps with start-goal pairs. More importantly, the next tuning should stratify results by topology class and use topology-aware normalization so that conflict penalties are not applied uniformly across maps with very different bottleneck structure.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_4e7cfc76656942fb88cb2f36228f29e1_proc_11659/multi_dataset_results.png"}], [{"analysis": "The penalty-weight sweep shows a clear non-monotonic response. CMA improves over baseline for small-to-moderate penalty weights, peaking around 4.0\u20135.0 with roughly 2.5\u20132.6% makespan improvement, while the baseline remains flat near 16.6. The abrupt transition after 5.0 is important: CMA becomes substantially worse than baseline, dropping to about -4% improvement by 6.0 and staying negative through 10.0. This indicates the soft conflict penalty is helpful only in a calibrated regime; once overweighted, it over-penalizes useful assignments and likely pushes agents into longer detours or poorly balanced allocations. The chosen value of 4.0 is reasonable, though 5.0 appears similarly strong and deserves tie-breaking with more seeds because the peak is relatively flat.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_8a2a450de7d04cbca4b1f78a3bc468fd_proc_11657/penalty_weight_tuning.png"}, {"analysis": "The warehouse visualization and conflict memory map provide qualitative support for the central hypothesis that conflicts are structured rather than random. The brightest memory cells align with corridor intersections and chokepoints created by the shelf layout, especially around central vertical passages and horizontal transit lanes. However, the accompanying episode-wise makespan comparison in this run does not support CMA: the red trajectory has larger spikes than baseline and the mean is worse (about 16.6 vs 16.0). This suggests that simply learning hotspots is not sufficient unless the penalty scaling is tuned correctly. In other words, the map appears meaningful, but the policy using it is miscalibrated in this run. This is a useful negative result because it separates representation quality from downstream decision quality.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_8a2a450de7d04cbca4b1f78a3bc468fd_proc_11657/cma_results.png"}, {"analysis": "This collection of plots is much more encouraging and points to a better-tuned regime. The improvement heatmap shows gains across all tested penalty-weight/scaling-factor combinations, with the best region near penalty weight 3.0 and scaling factor 0.5, reaching about 8.7% makespan reduction. The line plot confirms that small scaling factors benefit most from stronger penalties, while large scaling factors flatten performance around 8.0\u20138.1%, suggesting saturation. The final conflict memory map again concentrates mass on repeated bottlenecks rather than diffuse noise, and the final run comparison shows CMA mean makespan around 15.3 versus baseline around 16.2, a meaningful reduction with many episode-level wins. The important message is that CMA seems effective when the memory penalty is strong enough to alter allocations but normalized enough not to dominate the underlying assignment cost.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_8a2a450de7d04cbca4b1f78a3bc468fd_proc_11657/scaling_factor_tuning_results.png"}, {"analysis": "The annotated heatmap makes the tuning landscape easier to interpret. Performance is consistently positive across the grid, ranging roughly from 5.9% to 8.7%. The strongest region is broad rather than isolated: penalty weights 3.0\u20135.0 paired with scaling factors 0.5\u20131.0 give the top values, while very low penalty with very low scaling underperforms. This broad plateau is scientifically valuable because it suggests CMA is not brittle once parameters enter the right regime. The best cell at scaling factor 0.5 and penalty weight 3.0 matches the previous figure, supporting that choice as the current tuned baseline. A practical implication is that future tuning should search more finely around this plateau rather than over a wide range.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_8a2a450de7d04cbca4b1f78a3bc468fd_proc_11657/mapf_scaling_tuning_heatmap.png"}, {"analysis": "The summary-statistics bar chart is partly consistent with the broader tuning results but also raises a discrepancy. It reports best penalty weight 3.0 and best scaling factor 0.5, matching the heatmap, but the final improvement is listed as 5.54%, which is noticeably lower than the roughly 8.7% peak shown elsewhere. This gap likely means the summary is reporting a different aggregate\u2014perhaps held-out episodes, a final selected run, or another metric such as median rather than the sweep maximum. The assignment change rate of 61.25% is notable: CMA is not making trivial perturbations, but meaningfully reshaping the allocation. That supports the causal story that the gains come from changed assignments rather than from randomness. Still, the metric mismatch should be clarified in the paper to avoid confusion.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_8a2a450de7d04cbca4b1f78a3bc468fd_proc_11657/mapf_tuning_summary.png"}, {"analysis": "This longer final comparison gives one of the cleanest demonstrations of benefit. CMA lowers the mean makespan from about 16.25 to 15.35, around a 5.5% reduction, and the red curve appears to damp several high baseline spikes, especially in the latter half where baseline has repeated excursions above 20. The gain is not universal\u2014some episodes are unchanged or slightly worse\u2014but the average shift is clearly favorable. This pattern is consistent with congestion-aware allocation helping mainly on hard instances with latent bottlenecks, rather than uniformly improving all episodes. For publication, this is a strong plot because it shows both central tendency and per-instance variability.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_8a2a450de7d04cbca4b1f78a3bc468fd_proc_11657/mapf_makespan_comparison.png"}, {"analysis": "The improvement-versus-penalty plot by scaling factor confirms a structured interaction between the two hyperparameters. At scaling factor 0.5, performance rises sharply from about 5.9% at penalty 1.0 to about 8.7% at 3.0 and then plateaus, indicating under-penalization at low weights. At scaling factor 1.0, the trend is similar but slightly less strong. Larger scaling factors, especially 3.0 and 5.0, flatten the curve around 8.0\u20138.1%, implying that once the memory term is already amplified by scaling, changing penalty weight has limited effect. This suggests the two hyperparameters are partially redundant, and future searches could reduce dimensionality by tuning an effective combined penalty strength rather than both separately.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_8a2a450de7d04cbca4b1f78a3bc468fd_proc_11657/mapf_improvement_by_scaling_factor.png"}, {"analysis": "The conflict-count histogram provides mixed evidence about mechanism. There are several episodes where CMA clearly reduces conflicts relative to baseline, including one large baseline spike around the low 70s that is not matched by CMA. However, there are also episodes where CMA has more conflicts, including noticeable spikes in the mid-to-late episodes. This implies the makespan gains are not explained solely by fewer raw conflicts. CMA may instead be redistributing congestion into forms that are easier for the planner to resolve, or reducing the downstream cost of unavoidable conflicts. For the paper, it would be stronger to report conflict severity, delay induced by conflicts, or solver backtracking effort, not only conflict counts.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_8a2a450de7d04cbca4b1f78a3bc468fd_proc_11657/mapf_conflict_counts.png"}, {"analysis": "The n_eval sensitivity plots show a concerning but informative result: the estimated improvement is consistently negative across all sample sizes, roughly -3.8% to -4.5%, meaning CMA is worse than baseline in this setting. More importantly, increasing n_eval does not yield the expected cleaner uncertainty behavior. The standard deviation dips at 50 evaluations but rises again, and the confidence interval width is actually smallest at 50 and larger for 80\u2013200. The boxplots also show broad overlap and persistent negative medians. This suggests the issue is not merely insufficient evaluation budget; rather, this configuration may be genuinely underperforming or highly instance-sensitive. If this is a different environment or split, it could indicate weak generalization and should be investigated instead of averaged away.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_8a2a450de7d04cbca4b1f78a3bc468fd_proc_11657/n_eval_tuning_results.png"}, {"analysis": "The grid-size generalization results are highly mixed and expose an important limitation. CMA hurts performance on 15x15 (-7.4%), 20x20 (-0.9%), and 25x25 (-1.6%), but helps on 30x30 (+3.9%). The accompanying makespan bars and boxplots support this: on smaller grids, CMA often increases average makespan, while on the largest grid it lowers it modestly. The density scatter suggests that benefit may increase as the regime becomes larger and sparser, though the 15x15 point shows that high density can be actively harmful for the current method. This indicates the learned conflict memory and its penalty may be scale-dependent. A strong paper angle is that CMA is most useful in larger environments where bottlenecks are repeatable and memory can exploit spatial structure; for smaller or denser layouts, the current calibration may overreact to transient conflicts.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_8a2a450de7d04cbca4b1f78a3bc468fd_proc_11657/grid_size_tuning_results.png"}], []], "vlm_feedback_summary": ["The plots are valid and collectively indicate that the CMA implementation is\npartially functional but not yet delivering the paper-level gains in this\npreliminary stage. The conflict memory maps are structured and align with\ncorridor chokepoints, supporting the core hypothesis that conflicts contain\nlearnable spatial information. However, makespan improvements are tiny,\ninconsistent, or even slightly negative depending on the figure, with high\nepisode-to-episode variance. CMA changes assignments frequently enough to\nmatter, so the issue is not lack of intervention but unreliable usefulness of\nthe learned penalties. The parameter sweep suggests only small penalty weights\nhelp, while stronger penalties hurt, implying the memory should act as a weak\nsoft regularizer. One plot shows a flat zero rolling average despite other\nnonzero results, indicating a likely evaluation or plotting bug that should be\nfixed before strong conclusions are drawn.", "[]", "[]", "[]", "[]", "[]", "[]", "[]", "[]", "[]", "[]", "The plots show that CMA provides modest, credible gains on the main tuning\nsetup, with the strongest region around penalty weight 3 and scaling factor 0.5,\ngiving about 8.7% improvement in the sweep and about 5.5% mean reduction in the\nfinal run. Conflict memory maps display structured hotspots, supporting the\nhypothesis that conflicts are learnable and topology-driven. However, warmup\nhurts performance across all tested values, and cross-layout generalization is\ncurrently poor to negative, which weakens broad claims of transfer. The gains\nappear to come mainly from suppressing severe congestion spikes rather than\nuniformly reducing all conflicts or all episodes. Recommended next steps are:\nkeep the architecture fixed, center tuning on robust hyperparameters near\npenalty=3 and scaling=0.5, remove or redesign warmup, report held-out results\nseparately from tuning peaks, and add broader benchmark evaluation. For two new\ndatasets to test transfer while staying close to the planning/congestion theme,\nstrong candidates are benjamin-paine/maze-dataset and AIRI-\nInstitute/aij_multiagent_rl_scenarios (or another public multi-agent gridworld\nbenchmark on HuggingFace if that exact subset is unavailable), because they\nprovide diverse maze/grid topologies and multi-agent interaction structures\nrelevant to congestion generalization.", "[]", "The plots are valid and show a coherent experimental story. Early results\nindicate that raw CMA learns structured conflict hotspots but initially worsens\nmakespan slightly, and max_time tuning does not fix this. Hyperparameter sweeps\nover penalty weight, scaling factor, and decay reveal that CMA is highly\nsensitive to calibration: with tuned settings, it achieves meaningful makespan\ngains (best sweep around 8.7%, final run about 5.5%) while preserving low\ncomputation cost. The gains appear to come mainly from reducing severe\ncongestion spikes and conflict outliers rather than uniformly improving all\nepisodes. Conflict maps consistently align with warehouse bottlenecks,\nsupporting the hypothesis that conflicts contain learnable spatial information.\nHowever, cross-layout results are negative on standard, dense, and sparse\nenvironments, so generalization is not yet established and is the main weakness\nof the current evidence.", "The plots provide meaningful evidence that CMA learns structured conflict\nhotspots and can improve makespan over a decoupled baseline, but the gains are\ncurrently modest and inconsistent across settings. Hyperparameter tuning shows\nthe strongest region around penalty weight 3 and scaling factor 0.5, with an\napproximately 8.7% best reduction in the heatmap and about 5.5% average gain in\nthe paired makespan run. The conflict memory maps visibly concentrate on\nbottlenecks, which supports the main hypothesis. However, several plots expose\nfragility: some epsilon settings hurt performance, performance often worsens as\nagent count increases, and cross-environment generalization is mostly negative\nexcept on random-obstacle maps. The current scientific takeaway is that conflict\nmemory contains real signal, but the feedback mechanism is not yet calibrated\nrobustly enough for a strong conference claim. Recommended next steps within\nbaseline tuning are to focus the search near penalty 2.5\u20134 and scaling 0.5\u20131.5,\ntest normalization by agent count and topology, add paired significance tests\nand tail metrics, and evaluate on two extra HuggingFace datasets suited to grid\nnavigation or MAPF-style obstacle maps.", "The plots show a coherent but nuanced story. CMA can improve makespan\nsubstantially when penalty-related hyperparameters are tuned properly, with the\nstrongest reported region around penalty weight 3.0\u20135.0 and scaling factor\n0.5\u20131.0, yielding roughly 5.5% to 8.7% average makespan reduction depending on\nthe evaluation. Conflict memory maps visually align with warehouse chokepoints,\nsupporting the hypothesis that conflicts contain learnable structure. However,\nseveral plots also show failure modes: over-large penalty weights sharply hurt\nperformance, one run with meaningful-looking memory maps still worsens mean\nmakespan, n_eval sensitivity remains negative in one setting, and cross-grid\ngeneralization is poor on smaller maps while improving only on 30x30. Overall,\nthe main insight is that the idea is promising but calibration-sensitive and not\nyet robust across regimes.", "[]"], "exec_time": [9.039722204208374, 30.365612030029297, 23.414950370788574, 10.722235918045044, 21.59467363357544, 4.639673471450806, 58.296356439590454, 37.793785095214844, 13.915040016174316, 8.415174722671509, 51.20925545692444, 25.04641103744507, 11.431925535202026, 25.69787907600403, 25.90314269065857, 25.617523193359375, null], "exec_time_feedback": ["", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", ""], "datasets_successfully_tested": [["cma_experiment", "sweep_results"], [], [], [], [], [], [], [], [], [], [], ["[warehouse", "dense_grid", "random_obstacles]"], [], ["\"\""], ["warehouse", "dense_grid", "corridor_grid", "sparse_random", "random_obstacles"], ["scaling_factor_tuning"], []], "plot_code": ["import matplotlib.pyplot as plt\nimport numpy as np\nimport os\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\n\ntry:\n    experiment_data = np.load(\n        os.path.join(working_dir, \"experiment_data.npy\"), allow_pickle=True\n    ).item()\nexcept Exception as e:\n    print(f\"Error loading experiment data: {e}\")\n    experiment_data = None\n\nif experiment_data is not None:\n    # Plot 1: Makespan Comparison Over Episodes\n    try:\n        plt.figure(figsize=(10, 6))\n        cma_data = experiment_data[\"cma_experiment\"]\n        baseline_makespans = cma_data[\"baseline_makespans\"]\n        cma_makespans = cma_data[\"cma_makespans\"]\n        episodes = np.arange(len(baseline_makespans))\n\n        plt.plot(episodes, baseline_makespans, \"b-\", alpha=0.7, label=\"Baseline\")\n        plt.plot(episodes, cma_makespans, \"r-\", alpha=0.7, label=\"CMA\")\n        plt.axhline(\n            np.mean(baseline_makespans),\n            color=\"b\",\n            linestyle=\"--\",\n            label=f\"Baseline Mean: {np.mean(baseline_makespans):.2f}\",\n        )\n        plt.axhline(\n            np.mean(cma_makespans),\n            color=\"r\",\n            linestyle=\"--\",\n            label=f\"CMA Mean: {np.mean(cma_makespans):.2f}\",\n        )\n        plt.xlabel(\"Episode\")\n        plt.ylabel(\"Makespan\")\n        plt.title(\n            \"CMA Experiment: Makespan Comparison Over Episodes\\nBaseline vs Conflict Memory Allocation\"\n        )\n        plt.legend()\n        plt.grid(True, alpha=0.3)\n        plt.savefig(os.path.join(working_dir, \"cma_makespan_comparison.png\"), dpi=150)\n        plt.close()\n        print(\"Saved: cma_makespan_comparison.png\")\n    except Exception as e:\n        print(f\"Error creating makespan comparison plot: {e}\")\n        plt.close()\n\n    # Plot 2: Improvement Distribution\n    try:\n        plt.figure(figsize=(10, 6))\n        improvements = cma_data[\"improvements\"]\n        plt.hist(improvements, bins=20, edgecolor=\"black\", alpha=0.7, color=\"green\")\n        plt.axvline(\n            np.mean(improvements),\n            color=\"red\",\n            linestyle=\"--\",\n            linewidth=2,\n            label=f\"Mean: {np.mean(improvements)*100:.2f}%\",\n        )\n        plt.xlabel(\"Improvement Ratio\")\n        plt.ylabel(\"Frequency\")\n        plt.title(\n            \"CMA Experiment: Distribution of Makespan Improvements\\n(Positive = CMA better than Baseline)\"\n        )\n        plt.legend()\n        plt.grid(True, alpha=0.3)\n        plt.savefig(\n            os.path.join(working_dir, \"cma_improvement_distribution.png\"), dpi=150\n        )\n        plt.close()\n        print(\"Saved: cma_improvement_distribution.png\")\n    except Exception as e:\n        print(f\"Error creating improvement distribution plot: {e}\")\n        plt.close()\n\n    # Plot 3: Conflict Counts Comparison\n    try:\n        plt.figure(figsize=(10, 6))\n        baseline_conflicts = cma_data[\"conflict_counts_baseline\"]\n        cma_conflicts = cma_data[\"conflict_counts_cma\"]\n        episodes = np.arange(len(baseline_conflicts))\n\n        plt.bar(\n            episodes - 0.2,\n            baseline_conflicts,\n            width=0.4,\n            label=\"Baseline\",\n            alpha=0.7,\n            color=\"blue\",\n        )\n        plt.bar(\n            episodes + 0.2,\n            cma_conflicts,\n            width=0.4,\n            label=\"CMA\",\n            alpha=0.7,\n            color=\"red\",\n        )\n        plt.xlabel(\"Episode\")\n        plt.ylabel(\"Conflict Count\")\n        plt.title(\n            \"CMA Experiment: Conflict Counts Comparison\\nBaseline vs CMA per Episode\"\n        )\n        plt.legend()\n        plt.grid(True, alpha=0.3, axis=\"y\")\n        plt.savefig(os.path.join(working_dir, \"cma_conflict_counts.png\"), dpi=150)\n        plt.close()\n        print(\"Saved: cma_conflict_counts.png\")\n    except Exception as e:\n        print(f\"Error creating conflict counts plot: {e}\")\n        plt.close()\n\n    # Plot 4: Parameter Sweep Results\n    try:\n        plt.figure(figsize=(10, 6))\n        sweep_results = experiment_data.get(\"sweep_results\", [])\n        if sweep_results:\n            penalty_weights = [r[0] for r in sweep_results]\n            improvements_sweep = [r[1] * 100 for r in sweep_results]\n            best_pw = experiment_data.get(\"best_penalty_weight\", None)\n\n            plt.bar(\n                range(len(penalty_weights)),\n                improvements_sweep,\n                color=\"steelblue\",\n                edgecolor=\"black\",\n            )\n            plt.xticks(range(len(penalty_weights)), [str(pw) for pw in penalty_weights])\n            plt.xlabel(\"Penalty Weight\")\n            plt.ylabel(\"Improvement (%)\")\n            plt.title(\n                f\"CMA Parameter Sweep: Effect of Penalty Weight on Improvement\\nBest Penalty Weight: {best_pw}\"\n            )\n            plt.grid(True, alpha=0.3, axis=\"y\")\n            plt.savefig(os.path.join(working_dir, \"cma_parameter_sweep.png\"), dpi=150)\n            plt.close()\n            print(\"Saved: cma_parameter_sweep.png\")\n    except Exception as e:\n        print(f\"Error creating parameter sweep plot: {e}\")\n        plt.close()\n\n    # Plot 5: Assignment Changes Analysis\n    try:\n        plt.figure(figsize=(10, 6))\n        assignment_changes = cma_data[\"assignment_changes\"]\n        change_rate = np.mean(assignment_changes) * 100\n\n        fig, (ax1, ax2) = plt.subplots(1, 2, figsize=(12, 5))\n\n        # Left: Assignment changes over episodes\n        ax1.bar(\n            range(len(assignment_changes)),\n            assignment_changes,\n            color=\"purple\",\n            alpha=0.7,\n        )\n        ax1.set_xlabel(\"Episode\")\n        ax1.set_ylabel(\"Assignment Changed (0/1)\")\n        ax1.set_title(\"Assignment Changes per Episode\")\n\n        # Right: Pie chart of change rate\n        ax2.pie(\n            [change_rate, 100 - change_rate],\n            labels=[\"Changed\", \"Same\"],\n            autopct=\"%1.1f%%\",\n            colors=[\"purple\", \"lightgray\"],\n        )\n        ax2.set_title(f\"Overall Assignment Change Rate: {change_rate:.1f}%\")\n\n        plt.suptitle(\n            \"CMA Experiment: Assignment Change Analysis\\nHow often CMA chooses different task assignments than Baseline\"\n        )\n        plt.tight_layout()\n        plt.savefig(os.path.join(working_dir, \"cma_assignment_changes.png\"), dpi=150)\n        plt.close()\n        print(\"Saved: cma_assignment_changes.png\")\n    except Exception as e:\n        print(f\"Error creating assignment changes plot: {e}\")\n        plt.close()\n\n    # Print summary metrics\n    print(\"\\n=== Experiment Summary ===\")\n    print(f\"Baseline Mean Makespan: {np.mean(cma_data['baseline_makespans']):.2f}\")\n    print(f\"CMA Mean Makespan: {np.mean(cma_data['cma_makespans']):.2f}\")\n    print(f\"Mean Improvement: {np.mean(cma_data['improvements'])*100:.2f}%\")\n    print(f\"Final Improvement: {experiment_data.get('final_improvement', 'N/A')}\")\n", null, null, null, null, null, null, null, null, null, null, "import matplotlib.pyplot as plt\nimport numpy as np\nimport os\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\n\ntry:\n    experiment_data = np.load(\n        os.path.join(working_dir, \"experiment_data.npy\"), allow_pickle=True\n    ).item()\nexcept Exception as e:\n    print(f\"Error loading experiment data: {e}\")\n    experiment_data = None\n\nif experiment_data is not None:\n    data = experiment_data.get(\"scaling_factor_tuning\", {})\n\n    # Plot 1: Heatmap of improvements a
