gin=\"upper\")\n    ax2.set_title(\"Conflict Memory Map\")\n    ax2.set_xlabel(\"X\")\n    ax2.set_ylabel(\"Y\")\n    plt.colorbar(im, ax=ax2)\n\n    # Plot 3: Makespan comparison\n    ax3 = axes[2]\n    baseline_makespans = experiment_data[\"cma_experiment\"][\"baseline_makespans\"]\n    cma_makespans = experiment_data[\"cma_experiment\"][\"cma_makespans\"]\n\n    x = np.arange(len(baseline_makespans))\n    ax3.plot(x, baseline_makespans, \"b-\", alpha=0.7, label=\"Baseline\")\n    ax3.plot(x, cma_makespans, \"r-\", alpha=0.7, label=\"CMA\")\n    ax3.axhline(\n        np.mean(baseline_makespans),\n        color=\"b\",\n        linestyle=\"--\",\n        label=f\"Baseline mean: {np.mean(baseline_makespans):.1f}\",\n    )\n    ax3.axhline(\n        np.mean(cma_makespans),\n        color=\"r\",\n        linestyle=\"--\",\n        label=f\"CMA mean: {np.mean(cma_makespans):.1f}\",\n    )\n    ax3.set_xlabel(\"Episode\")\n    ax3.set_ylabel(\"Makespan\")\n    ax3.set_title(\"Makespan Comparison\")\n    ax3.legend()\n\n    plt.tight_layout()\n    plt.savefig(os.path.join(working_dir, \"cma_results.png\"), dpi=150)\n    plt.close()\n    print(f\"\\nVisualization saved to {os.path.join(working_dir, 'cma_results.png')}\")\n\n\ndef run_parameter_sweep():\n    \"\"\"Sweep penalty weights to find best configuration.\"\"\"\n    print(\"\\n\" + \"=\" * 60)\n    print(\"PARAMETER SWEEP\")\n    print(\"=\" * 60)\n\n    penalty_weights = [0.5, 1.0, 2.0, 3.0, 5.0]\n    results = []\n\n    for pw in penalty_weights:\n        print(f\"\\nTesting penalty_weight = {pw}\")\n        improvement, _, _ = run_experiment(\n            n_warmup=20, n_eval=30, n_agents=6, penalty_weight=pw\n        )\n        results.append((pw, improvement))\n        print(f\"  -> Improvement ratio: {improvement:.4f}\")\n\n    best_pw, best_improvement = max(results, key=lambda x: x[1])\n    print(f\"\\nBest penalty weight: {best_pw} with improvement: {best_improvement:.4f}\")\n\n    return best_pw, results\n\n\n# Main execution\nprint(\"=\" * 60)\nprint(\"Conflict Memory Allocation (CMA) Experiment\")\nprint(\"=\" * 60)\n\n# Run main experiment with default parameters\nmain_improvement, conflict_memory, grid = run_experiment(\n    n_warmup=40, n_eval=60, n_agents=6, penalty_weight=2.5\n)\n\n# Visualize results\nvisualize_results(conflict_memory, grid)\n\n# Run parameter sweep to find best configuration\nbest_pw, sweep_results = run_parameter_sweep()\n\n# Final run with best parameters\nprint(\"\\n\" + \"=\" * 60)\nprint(\"FINAL RUN WITH BEST PARAMETERS\")\nprint(\"=\" * 60)\nfinal_improvement, final_memory, final_grid = run_experiment(\n    n_warmup=50, n_eval=80, n_agents=7, penalty_weight=best_pw\n)\n\n# Save experiment data\nexperiment_data[\"sweep_results\"] = sweep_results\nexperiment_data[\"best_penalty_weight\"] = best_pw\nexperiment_data[\"final_improvement\"] = final_improvement\n\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(f\"\\nExperiment data saved to {os.path.join(working_dir, 'experiment_data.npy')}\")\n\n# Final summary\nprint(\"\\n\" + \"=\" * 60)\nprint(\"FINAL SUMMARY\")\nprint(\"=\" * 60)\nprint(f\"Main experiment makespan_improvement_ratio: {main_improvement:.4f}\")\nprint(f\"Final experiment makespan_improvement_ratio: {final_improvement:.4f}\")\nprint(f\"Best penalty weight from sweep: {best_pw}\")\nprint(f\"Target improvement range: 0.15-0.25 (15-25%)\")\n\nif final_improvement > 0:\n    print(f\"\\nCMA shows POSITIVE improvement of {final_improvement*100:.2f}%\")\nelse:\n    print(\n        f\"\\nCMA shows no improvement or negative result: {final_improvement*100:.2f}%\"\n    )\n", "# Set random seed\nimport random\nimport numpy as np\nimport torch\n\nseed = 2\nrandom.seed(seed)\nnp.random.seed(seed)\ntorch.manual_seed(seed)\nif torch.cuda.is_available():\n    torch.cuda.manual_seed(seed)\n\nimport os\nimport numpy as np\nimport heapq\nfrom collections import defaultdict\nimport torch\nimport matplotlib.pyplot as plt\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n# Experiment data tracking\nexperiment_data = {\n    \"cma_experiment\": {\n        \"baseline_makespans\": [],\n        \"cma_makespans\": [],\n        \"improvements\": [],\n        \"conflict_counts_baseline\": [],\n        \"conflict_counts_cma\": [],\n        \"assignment_changes\": [],\n    }\n}\n\n\ndef create_warehouse_map(width=20, height=20):\n    \"\"\"Create warehouse with corridors and chokepoints.\"\"\"\n    grid = np.zeros((height, width), dtype=int)\n    # Add shelf obstacles creating narrow corridors\n    for row in [3, 7, 11, 15]:\n        for col in range(2, width - 2):\n            if col not in [5, 10, 15]:  # Leave gaps for corridors\n                grid[row, col] = 1\n    return grid\n\n\ndef get_neighbors(pos, grid):\n    \"\"\"Get valid neighboring positions.\"\"\"\n    h, w = grid.shape\n    neighbors = []\n    for dy, dx in [(0, 1), (0, -1), (1, 0), (-1, 0)]:\n        ny, nx = pos[0] + dy, pos[1] + dx\n        if 0 <= ny < h and 0 <= nx < w and grid[ny, nx] == 0:\n            neighbors.append((ny, nx))\n    return neighbors\n\n\ndef heuristic(a, b):\n    return abs(a[0] - b[0]) + abs(a[1] - b[1])\n\n\ndef astar_with_reservations(start, goal, grid, reservations, max_time=100):\n    \"\"\"A* with space-time reservations. Returns path, conflicts encountered.\"\"\"\n    conflicts_encountered = []\n\n    if start == goal:\n        return [start], conflicts_encountered\n\n    open_set = [(heuristic(start, goal), 0, start, [start])]\n    closed = set()\n\n    while open_set:\n        f, t, pos, path = heapq.heappop(open_set)\n\n        if t > max_time:\n            continue\n\n        if (pos, t) in closed:\n            continue\n        closed.add((pos, t))\n\n        if pos == goal:\n            return path, conflicts_encountered\n\n        for npos in get_neighbors(pos, grid) + [pos]:  # Include wait action\n            nt = t + 1\n\n            # Check vertex conflict\n            if (npos, nt) in reservations:\n                conflicts_encountered.append((\"vertex\", npos, nt))\n                continue\n\n            # Check edge conflict (swap)\n            if npos != pos:\n                if (pos, nt) in reservations:\n                    # Check if agent at npos is moving to pos\n                    edge_key = (npos, pos, nt)\n                    if edge_key in reservations.get(\"edges\", set()):\n                        conflicts_encountered.append((\"edge\", pos, npos, nt))\n                        continue\n\n            if (npos, nt) not in closed:\n                new_path = path + [npos]\n                heapq.heappush(\n                    open_set, (nt + heuristic(npos, goal), nt, npos, new_path)\n                )\n\n    # Return partial path if no full path found\n    return [start], conflicts_encountered\n\n\ndef prioritized_planning(agents_starts, agents_goals, grid, conflict_memory=None):\n    \"\"\"Plan paths for all agents with priority ordering. Returns paths and conflict info.\"\"\"\n    n_agents = len(agents_starts)\n    reservations = {}\n    reservations[\"edges\"] = set()\n    all_paths = []\n    total_conflicts = []\n    reservation_pressure = np.zeros_like(grid, dtype=float)\n\n    for i in range(n_agents):\n        path, conflicts = astar_with_reservations(\n            agents_starts[i], agents_goals[i], grid, reservations\n        )\n        all_paths.append(path)\n        total_conflicts.extend(conflicts)\n\n        # Add reservations for this agent's path\n        for t, pos in enumerate(path):\n            reservations[(pos, t)] = i\n            reservation_pressure[pos[0], pos[1]] += 1\n\n            # Add edge reservation\n            if t > 0:\n                prev_pos = path[t - 1]\n                if prev_pos != pos:\n                    reservations[\"edges\"].add((prev_pos, pos, t))\n\n        # Extend final position reservation\n        final_pos = path[-1]\n        for t in range(len(path), len(path) + 10):\n            reservations[(final_pos, t)] = i\n\n    return all_paths, total_conflicts, reservation_pressure\n\n\ndef compute_makespan(paths):\n    \"\"\"Compute makespan (time for all agents to reach goals).\"\"\"\n    return max(len(p) for p in paths) if paths else 0\n\n\ndef get_shortest_path_cells(start, goal, grid):\n    \"\"\"Get cells along shortest path for cost estimation.\"\"\"\n    path, _ = astar_with_reservations(start, goal, grid, {}, max_time=200)\n    return path\n\n\ndef greedy_assignment(agents, tasks, cost_matrix):\n    \"\"\"Greedy assignment: each agent picks cheapest unassigned task.\"\"\"\n    n = len(agents)\n    m = len(tasks)\n    assignment = [-1] * n\n    assigned_tasks = set()\n\n    # Sort agents by their minimum cost\n    agent_order = list(range(n))\n\n    for agent in agent_order:\n        best_task = -1\n        best_cost = float(\"inf\")\n        for task in range(m):\n            if task not in assigned_tasks:\n                if cost_matrix[agent, task] < best_cost:\n                    best_cost = cost_matrix[agent, task]\n                    best_task = task\n        if best_task >= 0:\n            assignment[agent] = best_task\n            assigned_tasks.add(best_task)\n\n    return assignment\n\n\ndef hungarian_assignment(cost_matrix):\n    \"\"\"Simple Hungarian-like assignment using auction algorithm.\"\"\"\n    n, m = cost_matrix.shape\n    if n == 0 or m == 0:\n        return []\n\n    assignment = [-1] * n\n    prices = np.zeros(m)\n    epsilon = 1.0 / (n + 1)\n\n    for _ in range(n * 10):  # Iterate until convergence\n        unassigned = [i for i in range(n) if assignment[i] == -1]\n        if not unassigned:\n            break\n\n        for agent in unassigned:\n            # Find best and second-best tasks\n            values = cost_matrix[agent] + prices\n            sorted_idx = np.argsort(values)\n            best_task = sorted_idx[0]\n            best_value = values[best_task]\n\n            if len(sorted_idx) > 1:\n                second_value = values[sorted_idx[1]]\n            else:\n                second_value = best_value + epsilon\n\n            # Check if task is taken\n            current_owner = -1\n            for i in range(n):\n                if assignment[i] == best_task:\n                    current_owner = i\n                    break\n\n            if current_owner >= 0:\n                assignment[current_owner] = -1\n\n            assignment[agent] = best_task\n            prices[best_task] += second_value - best_value + epsilon\n\n    # Fill any remaining unassigned\n    assigned_tasks = set(a for a in assignment if a >= 0)\n    for i in range(n):\n        if assignment[i] == -1:\n            for t in range(m):\n                if t not in assigned_tasks:\n                    assignment[i] = t\n                    assigned_tasks.add(t)\n                    break\n\n    return assignment\n\n\nclass ConflictMemory:\n    \"\"\"Spatial conflict memory map.\"\"\"\n\n    def __init__(self, grid_shape, decay=0.9):\n        self.memory = np.zeros(grid_shape, dtype=float)\n        self.edge_memory = defaultdict(float)\n        self.decay = decay\n        self.update_count = 0\n\n    def update(self, conflicts, reservation_pressure):\n        \"\"\"Update memory from conflicts and reservation pressure.\"\"\"\n        self.memory *= self.decay\n\n        # Add vertex conflicts\n        for conflict in conflicts:\n            if conflict[0] == \"vertex\":\n                pos = conflict[1]\n                self.memory[pos[0], pos[1]] += 1.0\n            elif conflict[0] == \"edge\":\n                pos1, pos2 = conflict[1], conflict[2]\n                self.edge_memory[(pos1, pos2)] += 1.0\n                self.memory[pos1[0], pos1[1]] += 0.5\n                self.memory[pos2[0], pos2[1]] += 0.5\n\n        # Add reservation pressure (normalized)\n        if reservation_pressure.max() > 0:\n            normalized_pressure = reservation_pressure / reservation_pressure.max()\n            self.memory += normalized_pressure * 0.3\n\n        self.update_count += 1\n\n    def get_path_penalty(self, path_cells, penalty_weight=1.0):\n        \"\"\"Compute penalty for a path based on conflict memory.\"\"\"\n        if not path_cells:\n            return 0.0\n        penalty = 0.0\n        for cell in path_cells:\n            penalty += self.memory[cell[0], cell[1]]\n        return penalty * penalty_weight\n\n    def freeze(self):\n        \"\"\"Return a frozen copy for evaluation.\"\"\"\n        frozen = ConflictMemory(self.memory.shape, self.decay)\n        frozen.memory = self.memory.copy()\n        frozen.edge_memory = self.edge_memory.copy()\n        frozen.update_count = self.update_count\n        return frozen\n\n\ndef compute_cost_matrix(agents, tasks, grid, conflict_memory=None, penalty_weight=2.0):\n    \"\"\"Compute assignment cost matrix with optional CMA penalties.\"\"\"\n    n_agents = len(agents)\n    n_tasks = len(tasks)\n    cost_matrix = np.zeros((n_agents, n_tasks))\n\n    for i, agent_pos in enumerate(agents):\n        for j, task_pos in enumerate(tasks):\n            # Base cost: path length\n            path_cells = get_shortest_path_cells(agent_pos, task_pos, grid)\n            base_cost = len(path_cells)\n\n            # Add conflict memory penalty\n            if conflict_memory is not None:\n                penalty = conflict_memory.get_path_penalty(path_cells, penalty_weight)\n                cost_matrix[i, j] = base_cost + penalty\n            else:\n                cost_matrix[i, j] = base_cost\n\n    return cost_matrix\n\n\ndef run_episode(\n    grid, n_agents, conflict_memory=None, use_cma=False, penalty_weight=2.0\n):\n    \"\"\"Run a single episode with task allocation and path planning.\"\"\"\n    h, w = grid.shape\n\n    # Generate random start positions (on free cells)\n    free_cells = [(i, j) for i in range(h) for j in range(w) if grid[i, j] == 0]\n\n    if len(free_cells) < n_agents * 2:\n        raise ValueError(\"Not enough free cells for agents and tasks\")\n\n    np.random.shuffle(free_cells)\n    agent_starts = free_cells[:n_agents]\n    task_positions = free_cells[n_agents : n_agents * 2]\n\n    # Compute cost matrix\n    if use_cma and conflict_memory is not None:\n        cost_matrix = compute_cost_matrix(\n            agent_starts, task_positions, grid, conflict_memory, penalty_weight\n        )\n    else:\n        cost_matrix = compute_cost_matrix(agent_starts, task_positions, grid)\n\n    # Assignment\n    assignment = hungarian_assignment(cost_matrix)\n\n    # Get agent goals based on assignment\n    agent_goals = []\n    for i, task_idx in enumerate(assignment):\n        if task_idx >= 0 and task_idx < len(task_positions):\n            agent_goals.append(task_positions[task_idx])\n        else:\n            agent_goals.append(agent_starts[i])  # Stay in place if no task\n\n    # Path planning\n    paths, conflicts, reservation_pressure = prioritized_planning(\n        agent_starts, agent_goals, grid\n    )\n\n    makespan = compute_makespan(paths)\n\n    return {\n        \"makespan\": makespan,\n        \"conflicts\": conflicts,\n        \"reservation_pressure\": reservation_pressure,\n        \"paths\": paths,\n        \"assignment\": assignment,\n        \"agent_starts\": agent_starts,\n        \"task_positions\": task_positions,\n    }\n\n\ndef run_experiment(n_warmup=30, n_eval=50, n_agents=6, penalty_weight=2.5):\n    \"\"\"Run full CMA experiment.\"\"\"\n    print(f\"\\n{'='*60}\")\n    print(f\"Running CMA Experiment\")\n    print(f\"Warmup episodes: {n_warmup}, Eval episodes: {n_eval}\")\n    print(f\"Agents: {n_agents}, Penalty weight: {penalty_weight}\")\n    print(f\"{'='*60}\\n\")\n\n    # Create warehouse map\n    grid = create_warehouse_map(20, 20)\n    print(f\"Grid size: {grid.shape}, Free cells: {np.sum(grid == 0)}\")\n\n    # Initialize conflict memory\n    conflict_memory = ConflictMemory(grid.shape, decay=0.95)\n\n    # Warmup phase: build conflict memory\n    print(\"\\n--- Warmup Phase ---\")\n    warmup_conflicts_total = 0\n    for ep in range(n_warmup):\n        np.random.seed(ep)\n        result = run_episode(grid, n_agents, conflict_memory=None, use_cma=False)\n\n        # Update conflict memory\n        conflict_memory.update(result[\"conflicts\"], result[\"reservation_pressure\"])\n        warmup_conflicts_total += len(result[\"conflicts\"])\n\n        if (ep + 1) % 10 == 0:\n            print(\n                f\"Warmup episode {ep+1}: makespan={result['makespan']}, \"\n                f\"conflicts={len(result['conflicts'])}, \"\n                f\"memory_max={conflict_memory.memory.max():.2f}\"\n            )\n\n    print(f\"\\nWarmup complete. Total conflicts recorded: {warmup_conflicts_total}\")\n    print(\n        f\"Memory statistics: max={conflict_memory.memory.max():.3f}, \"\n        f\"mean={conflict_memory.memory.mean():.3f}, \"\n        f\"nonzero cells={np.sum(conflict_memory.memory > 0.01)}\"\n    )\n\n    # Freeze memory for evaluation\n    frozen_memory = conflict_memory.freeze()\n\n    # Evaluation phase\n    print(\"\\n--- Evaluation Phase ---\")\n    baseline_makespans = []\n    cma_makespans = []\n    baseline_conflicts = []\n    cma_conflicts = []\n    assignment_changes = []\n\n    for ep in range(n_eval):\n        seed = n_warmup + ep\n\n        # Baseline run\n        np.random.seed(seed)\n        baseline_result = run_episode(\n            grid, n_agents, conflict_memory=None, use_cma=False\n        )\n\n        # CMA run (same seed for identical initial conditions)\n        np.random.seed(seed)\n        cma_result = run_episode(\n            grid,\n            n_agents,\n            conflict_memory=frozen_memory,\n            use_cma=True,\n            penalty_weight=penalty_weight,\n        )\n\n        baseline_makespans.append(baseline_result[\"makespan\"])\n        cma_makespans.append(cma_result[\"makespan\"])\n        baseline_conflicts.append(len(baseline_result[\"conflicts\"]))\n        cma_conflicts.append(len(cma_result[\"conflicts\"]))\n\n        # Check if assignments differ\n        assignments_differ = baseline_result[\"assignment\"] != cma_result[\"assignment\"]\n        if isinstance(assignments_differ, np.ndarray):\n            assignments_differ = assignments_differ.any()\n        assignment_changes.append(int(assignments_differ))\n\n        if (ep + 1) % 10 == 0:\n            print(\n                f\"Eval episode {ep+1}: baseline_makespan={baseline_result['makespan']}, \"\n                f\"cma_makespan={cma_result['makespan']}, \"\n                f\"assignment_changed={assignments_differ}\"\n            )\n\n    # Store results\n    experiment_data[\"cma_experiment\"][\"baseline_makespans\"] = baseline_makespans\n    experiment_data[\"cma_experiment\"][\"cma_makespans\"] = cma_makespans\n    experiment_data[\"cma_experiment\"][\"conflict_counts_baseline\"] = baseline_conflicts\n    experiment_data[\"cma_experiment\"][\"conflict_counts_cma\"] = cma_conflicts\n    experiment_data[\"cma_experiment\"][\"assignment_changes\"] = assignment_changes\n\n    # Compute metrics\n    baseline_mean = np.mean(baseline_makespans)\n    cma_mean = np.mean(cma_makespans)\n\n    improvements = [\n        (b - c) / b if b > 0 else 0 for b, c in zip(baseline_makespans, cma_makespans)\n    ]\n    experiment_data[\"cma_experiment\"][\"improvements\"] = improvements\n\n    makespan_improvement_ratio = (\n        (baseline_mean - cma_mean) / baseline_mean if baseline_mean > 0 else 0\n    )\n\n    # Print results\n    print(f\"\\n{'='*60}\")\n    print(\"RESULTS SUMMARY\")\n    print(f\"{'='*60}\")\n    print(\n        f\"Baseline average makespan: {baseline_mean:.2f} (std: {np.std(baseline_makespans):.2f})\"\n    )\n    print(\n        f\"CMA average makespan:      {cma_mean:.2f} (std: {np.std(cma_makespans):.2f})\"\n    )\n    print(\n        f\"Makespan improvement ratio: {makespan_improvement_ratio:.4f} ({makespan_improvement_ratio*100:.2f}%)\"\n    )\n    print(f\"Assignment change rate: {np.mean(assignment_changes)*100:.1f}%\")\n    print(f\"Baseline avg conflicts: {np.mean(baseline_conflicts):.2f}\")\n    print(f\"CMA avg conflicts: {np.mean(cma_conflicts):.2f}\")\n\n    return makespan_improvement_ratio, frozen_memory, grid\n\n\ndef visualize_results(conflict_memory, grid):\n    \"\"\"Visualize conflict memory and results.\"\"\"\n    fig, axes = plt.subplots(1, 3, figsize=(15, 5))\n\n    # Plot 1: Grid layout\n    ax1 = axes[0]\n    ax1.imshow(grid, cmap=\"binary\", origin=\"upper\")\n    ax1.set_title(\"Warehouse Layout (black=obstacle)\")\n    ax1.set_xlabel(\"X\")\n    ax1.set_ylabel(\"Y\")\n\n    # Plot 2: Conflict memory heatmap\n    ax2 = axes[1]\n    im = ax2.imshow(conflict_memory.memory, cmap=\"hot\", origin=\"upper\")\n    ax2.set_title(\"Conflict Memory Map\")\n    ax2.set_xlabel(\"X\")\n    ax2.set_ylabel(\"Y\")\n    plt.colorbar(im, ax=ax2)\n\n    # Plot 3: Makespan comparison\n    ax3 = axes[2]\n    baseline_makespans = experiment_data[\"cma_experiment\"][\"baseline_makespans\"]\n    cma_makespans = experiment_data[\"cma_experiment\"][\"cma_makespans\"]\n\n    x = np.arange(len(baseline_makespans))\n    ax3.plot(x, baseline_makespans, \"b-\", alpha=0.7, label=\"Baseline\")\n    ax3.plot(x, cma_makespans, \"r-\", alpha=0.7, label=\"CMA\")\n    ax3.axhline(\n        np.mean(baseline_makespans),\n        color=\"b\",\n        linestyle=\"--\",\n        label=f\"Baseline mean: {np.mean(baseline_makespans):.1f}\",\n    )\n    ax3.axhline(\n        np.mean(cma_makespans),\n        color=\"r\",\n        linestyle=\"--\",\n        label=f\"CMA mean: {np.mean(cma_makespans):.1f}\",\n    )\n    ax3.set_xlabel(\"Episode\")\n    ax3.set_ylabel(\"Makespan\")\n    ax3.set_title(\"Makespan Comparison\")\n    ax3.legend()\n\n    plt.tight_layout()\n    plt.savefig(os.path.join(working_dir, \"cma_results.png\"), dpi=150)\n    plt.close()\n    print(f\"\\nVisualization saved to {os.path.join(working_dir, 'cma_results.png')}\")\n\n\ndef run_parameter_sweep():\n    \"\"\"Sweep penalty weights to find best configuration.\"\"\"\n    print(\"\\n\" + \"=\" * 60)\n    print(\"PARAMETER SWEEP\")\n    print(\"=\" * 60)\n\n    penalty_weights = [0.5, 1.0, 2.0, 3.0, 5.0]\n    results = []\n\n    for pw in penalty_weights:\n        print(f\"\\nTesting penalty_weight = {pw}\")\n        improvement, _, _ = run_experiment(\n            n_warmup=20, n_eval=30, n_agents=6, penalty_weight=pw\n        )\n        results.append((pw, improvement))\n        print(f\"  -> Improvement ratio: {improvement:.4f}\")\n\n    best_pw, best_improvement = max(results, key=lambda x: x[1])\n    print(f\"\\nBest penalty weight: {best_pw} with improvement: {best_improvement:.4f}\")\n\n    return best_pw, results\n\n\n# Main execution\nprint(\"=\" * 60)\nprint(\"Conflict Memory Allocation (CMA) Experiment\")\nprint(\"=\" * 60)\n\n# Run main experiment with default parameters\nmain_improvement, conflict_memory, grid = run_experiment(\n    n_warmup=40, n_eval=60, n_agents=6, penalty_weight=2.5\n)\n\n# Visualize results\nvisualize_results(conflict_memory, grid)\n\n# Run parameter sweep to find best configuration\nbest_pw, sweep_results = run_parameter_sweep()\n\n# Final run with best parameters\nprint(\"\\n\" + \"=\" * 60)\nprint(\"FINAL RUN WITH BEST PARAMETERS\")\nprint(\"=\" * 60)\nfinal_improvement, final_memory, final_grid = run_experiment(\n    n_warmup=50, n_eval=80, n_agents=7, penalty_weight=best_pw\n)\n\n# Save experiment data\nexperiment_data[\"sweep_results\"] = sweep_results\nexperiment_data[\"best_penalty_weight\"] = best_pw\nexperiment_data[\"final_improvement\"] = final_improvement\n\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(f\"\\nExperiment data saved to {os.path.join(working_dir, 'experiment_data.npy')}\")\n\n# Final summary\nprint(\"\\n\" + \"=\" * 60)\nprint(\"FINAL SUMMARY\")\nprint(\"=\" * 60)\nprint(f\"Main experiment makespan_improvement_ratio: {main_improvement:.4f}\")\nprint(f\"Final experiment makespan_improvement_ratio: {final_improvement:.4f}\")\nprint(f\"Best penalty weight from sweep: {best_pw}\")\nprint(f\"Target improvement range: 0.15-0.25 (15-25%)\")\n\nif final_improvement > 0:\n    print(f\"\\nCMA shows POSITIVE improvement of {final_improvement*100:.2f}%\")\nelse:\n    print(\n        f\"\\nCMA shows no improvement or negative result: {final_improvement*100:.2f}%\"\n    )\n", "# Set random seed\nimport random\nimport numpy as np\nimport torch\n\nseed = 2\nrandom.seed(seed)\nnp.random.seed(seed)\ntorch.manual_seed(seed)\nif torch.cuda.is_available():\n    torch.cuda.manual_seed(seed)\n\nimport os\nimport numpy as np\nimport heapq\nfrom collections import defaultdict\nimport torch\nimport matplotlib.pyplot as plt\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n# Experiment data tracking\nexperiment_data = {\n    \"cma_experiment\": {\n        \"baseline_makespans\": [],\n        \"cma_makespans\": [],\n        \"improvements\": [],\n        \"conflict_counts_baseline\": [],\n        \"conflict_counts_cma\": [],\n        \"assignment_changes\": [],\n    }\n}\n\n\ndef create_warehouse_map(width=20, height=20):\n    \"\"\"Create warehouse with corridors and chokepoints.\"\"\"\n    grid = np.zeros((height, width), dtype=int)\n    # Add shelf obstacles creating narrow corridors\n    for row in [3, 7, 11, 15]:\n        for col in range(2, width - 2):\n            if col not in [5, 10, 15]:  # Leave gaps for corridors\n                grid[row, col] = 1\n    return grid\n\n\ndef get_neighbors(pos, grid):\n    \"\"\"Get valid neighboring positions.\"\"\"\n    h, w = grid.shape\n    neighbors = []\n    for dy, dx in [(0, 1), (0, -1), (1, 0), (-1, 0)]:\n        ny, nx = pos[0] + dy, pos[1] + dx\n        if 0 <= ny < h and 0 <= nx < w and grid[ny, nx] == 0:\n            neighbors.append((ny, nx))\n    return neighbors\n\n\ndef heuristic(a, b):\n    return abs(a[0] - b[0]) + abs(a[1] - b[1])\n\n\ndef astar_with_reservations(start, goal, grid, reservations, max_time=100):\n    \"\"\"A* with space-time reservations. Returns path, conflicts encountered.\"\"\"\n    conflicts_encountered = []\n\n    if start == goal:\n        return [start], conflicts_encountered\n\n    open_set = [(heuristic(start, goal), 0, start, [start])]\n    closed = set()\n\n    while open_set:\n        f, t, pos, path = heapq.heappop(open_set)\n\n        if t > max_time:\n            continue\n\n        if (pos, t) in closed:\n            continue\n        closed.add((pos, t))\n\n        if pos == goal:\n            return path, conflicts_encountered\n\n        for npos in get_neighbors(pos, grid) + [pos]:  # Include wait action\n            nt = t + 1\n\n            # Check vertex conflict\n            if (npos, nt) in reservations:\n                conflicts_encountered.append((\"vertex\", npos, nt))\n                continue\n\n            # Check edge conflict (swap)\n            if npos != pos:\n                if (pos, nt) in reservations:\n                    # Check if agent at npos is moving to pos\n                    edge_key = (npos, pos, nt)\n                    if edge_key in reservations.get(\"edges\", set()):\n                        conflicts_encountered.append((\"edge\", pos, npos, nt))\n                        continue\n\n            if (npos, nt) not in closed:\n                new_path = path + [npos]\n                heapq.heappush(\n                    open_set, (nt + heuristic(npos, goal), nt, npos, new_path)\n                )\n\n    # Return partial path if no full path found\n    return [start], conflicts_encountered\n\n\ndef prioritized_planning(agents_starts, agents_goals, grid, conflict_memory=None):\n    \"\"\"Plan paths for all agents with priority ordering. Returns paths and conflict info.\"\"\"\n    n_agents = len(agents_starts)\n    reservations = {}\n    reservations[\"edges\"] = set()\n    all_paths = []\n    total_conflicts = []\n    reservation_pressure = np.zeros_like(grid, dtype=float)\n\n    for i in range(n_agents):\n        path, conflicts = astar_with_reservations(\n            agents_starts[i], agents_goals[i], grid, reservations\n        )\n        all_paths.append(path)\n        total_conflicts.extend(conflicts)\n\n        # Add reservations for this agent's path\n        for t, pos in enumerate(path):\n            reservations[(pos, t)] = i\n            reservation_pressure[pos[0], pos[1]] += 1\n\n            # Add edge reservation\n            if t > 0:\n                prev_pos = path[t - 1]\n                if prev_pos != pos:\n                    reservations[\"edges\"].add((prev_pos, pos, t))\n\n        # Extend final position reservation\n        final_pos = path[-1]\n        for t in range(len(path), len(path) + 10):\n            reservations[(final_pos, t)] = i\n\n    return all_paths, total_conflicts, reservation_pressure\n\n\ndef compute_makespan(paths):\n    \"\"\"Compute makespan (time for all agents to reach goals).\"\"\"\n    return max(len(p) for p in paths) if paths else 0\n\n\ndef get_shortest_path_cells(start, goal, grid):\n    \"\"\"Get cells along shortest path for cost estimation.\"\"\"\n    path, _ = astar_with_reservations(start, goal, grid, {}, max_time=200)\n    return path\n\n\ndef greedy_assignment(agents, tasks, cost_matrix):\n    \"\"\"Greedy assignment: each agent picks cheapest unassigned task.\"\"\"\n    n = len(agents)\n    m = len(tasks)\n    assignment = [-1] * n\n    assigned_tasks = set()\n\n    # Sort agents by their minimum cost\n    agent_order = list(range(n))\n\n    for agent in agent_order:\n        best_task = -1\n        best_cost = float(\"inf\")\n        for task in range(m):\n            if task not in assigned_tasks:\n                if cost_matrix[agent, task] < best_cost:\n                    best_cost = cost_matrix[agent, task]\n                    best_task = task\n        if best_task >= 0:\n            assignment[agent] = best_task\n            assigned_tasks.add(best_task)\n\n    return assignment\n\n\ndef hungarian_assignment(cost_matrix):\n    \"\"\"Simple Hungarian-like assignment using auction algorithm.\"\"\"\n    n, m = cost_matrix.shape\n    if n == 0 or m == 0:\n        return []\n\n    assignment = [-1] * n\n    prices = np.zeros(m)\n    epsilon = 1.0 / (n + 1)\n\n    for _ in range(n * 10):  # Iterate until convergence\n        unassigned = [i for i in range(n) if assignment[i] == -1]\n        if not unassigned:\n            break\n\n        for agent in unassigned:\n            # Find best and second-best tasks\n            values = cost_matrix[agent] + prices\n            sorted_idx = np.argsort(values)\n            best_task = sorted_idx[0]\n            best_value = values[best_task]\n\n            if len(sorted_idx) > 1:\n                second_value = values[sorted_idx[1]]\n            else:\n                second_value = best_value + epsilon\n\n            # Check if task is taken\n            current_owner = -1\n            for i in range(n):\n                if assignment[i] == best_task:\n                    current_owner = i\n                    break\n\n            if current_owner >= 0:\n                assignment[current_owner] = -1\n\n            assignment[agent] = best_task\n            prices[best_task] += second_value - best_value + epsilon\n\n    # Fill any remaining unassigned\n    assigned_tasks = set(a for a in assignment if a >= 0)\n    for i in range(n):\n        if assignment[i] == -1:\n            for t in range(m):\n                if t not in assigned_tasks:\n                    assignment[i] = t\n                    assigned_tasks.add(t)\n                    break\n\n    return assignment\n\n\nclass ConflictMemory:\n    \"\"\"Spatial conflict memory map.\"\"\"\n\n    def __init__(self, grid_shape, decay=0.9):\n        self.memory = np.zeros(grid_shape, dtype=float)\n        self.edge_memory = defaultdict(float)\n        self.decay = decay\n        self.update_count = 0\n\n    def update(self, conflicts, reservation_pressure):\n        \"\"\"Update memory from conflicts and reservation pressure.\"\"\"\n        self.memory *= self.decay\n\n        # Add vertex conflicts\n        for conflict in conflicts:\n            if conflict[0] == \"vertex\":\n                pos = conflict[1]\n                self.memory[pos[0], pos[1]] += 1.0\n            elif conflict[0] == \"edge\":\n                pos1, pos2 = conflict[1], conflict[2]\n                self.edge_memory[(pos1, pos2)] += 1.0\n                self.memory[pos1[0], pos1[1]] += 0.5\n                self.memory[pos2[0], pos2[1]] += 0.5\n\n        # Add reservation pressure (normalized)\n        if reservation_pressure.max() > 0:\n            normalized_pressure = reservation_pressure / reservation_pressure.max()\n            self.memory += normalized_pressure * 0.3\n\n        self.update_count += 1\n\n    def get_path_penalty(self, path_cells, penalty_weight=1.0):\n        \"\"\"Compute penalty for a path based on conflict memory.\"\"\"\n        if not path_cells:\n            return 0.0\n        penalty = 0.0\n        for cell in path_cells:\n            penalty += self.memory[cell[0], cell[1]]\n        return penalty * penalty_weight\n\n    def freeze(self):\n        \"\"\"Return a frozen copy for evaluation.\"\"\"\n        frozen = ConflictMemory(self.memory.shape, self.decay)\n        frozen.memory = self.memory.copy()\n        frozen.edge_memory = self.edge_memory.copy()\n        frozen.update_count = self.update_count\n        return frozen\n\n\ndef compute_cost_matrix(agents, tasks, grid, conflict_memory=None, penalty_weight=2.0):\n    \"\"\"Compute assignment cost matrix with optional CMA penalties.\"\"\"\n    n_agents = len(agents)\n    n_tasks = len(tasks)\n    cost_matrix = np.zeros((n_agents, n_tasks))\n\n    for i, agent_pos in enumerate(agents):\n        for j, task_pos in enumerate(tasks):\n            # Base cost: path length\n            path_cells = get_shortest_path_cells(agent_pos, task_pos, grid)\n            base_cost = len(path_cells)\n\n            # Add conflict memory penalty\n            if conflict_memory is not None:\n                penalty = conflict_memory.get_path_penalty(path_cells, penalty_weight)\n                cost_matrix[i, j] = base_cost + penalty\n            else:\n                cost_matrix[i, j] = base_cost\n\n    return cost_matrix\n\n\ndef run_episode(\n    grid, n_agents, conflict_memory=None, use_cma=False, penalty_weight=2.0\n):\n    \"\"\"Run a single episode with task allocation and path planning.\"\"\"\n    h, w = grid.shape\n\n    # Generate random start positions (on free cells)\n    free_cells = [(i, j) for i in range(h) for j in range(w) if grid[i, j] == 0]\n\n    if len(free_cells) < n_agents * 2:\n        raise ValueError(\"Not enough free cells for agents and tasks\")\n\n    np.random.shuffle(free_cells)\n    agent_starts = free_cells[:n_agents]\n    task_positions = free_cells[n_agents : n_agents * 2]\n\n    # Compute cost matrix\n    if use_cma and conflict_memory is not None:\n        cost_matrix = compute_cost_matrix(\n            agent_starts, task_positions, grid, conflict_memory, penalty_weight\n        )\n    else:\n        cost_matrix = compute_cost_matrix(agent_starts, task_positions, grid)\n\n    # Assignment\n    assignment = hungarian_assignment(cost_matrix)\n\n    # Get agent goals based on assignment\n    agent_goals = []\n    for i, task_idx in enumerate(assignment):\n        if task_idx >= 0 and task_idx < len(task_positions):\n            agent_goals.append(task_positions[task_idx])\n        else:\n            agent_goals.append(agent_starts[i])  # Stay in place if no task\n\n    # Path planning\n    paths, conflicts, reservation_pressure = prioritized_planning(\n        agent_starts, agent_goals, grid\n    )\n\n    makespan = compute_makespan(paths)\n\n    return {\n        \"makespan\": makespan,\n        \"conflicts\": conflicts,\n        \"reservation_pressure\": reservation_pressure,\n        \"paths\": paths,\n        \"assignment\": assignment,\n        \"agent_starts\": agent_starts,\n        \"task_positions\": task_positions,\n    }\n\n\ndef run_experiment(n_warmup=30, n_eval=50, n_agents=6, penalty_weight=2.5):\n    \"\"\"Run full CMA experiment.\"\"\"\n    print(f\"\\n{'='*60}\")\n    print(f\"Running CMA Experiment\")\n    print(f\"Warmup episodes: {n_warmup}, Eval episodes: {n_eval}\")\n    print(f\"Agents: {n_agents}, Penalty weight: {penalty_weight}\")\n    print(f\"{'='*60}\\n\")\n\n    # Create warehouse map\n    grid = create_warehouse_map(20, 20)\n    print(f\"Grid size: {grid.shape}, Free cells: {np.sum(grid == 0)}\")\n\n    # Initialize conflict memory\n    conflict_memory = ConflictMemory(grid.shape, decay=0.95)\n\n    # Warmup phase: build conflict memory\n    print(\"\\n--- Warmup Phase ---\")\n    warmup_conflicts_total = 0\n    for ep in range(n_warmup):\n        np.random.seed(ep)\n        result = run_episode(grid, n_agents, conflict_memory=None, use_cma=False)\n\n        # Update conflict memory\n        conflict_memory.update(result[\"conflicts\"], result[\"reservation_pressure\"])\n        warmup_conflicts_total += len(result[\"conflicts\"])\n\n        if (ep + 1) % 10 == 0:\n            print(\n                f\"Warmup episode {ep+1}: makespan={result['makespan']}, \"\n                f\"conflicts={len(result['conflicts'])}, \"\n                f\"memory_max={conflict_memory.memory.max():.2f}\"\n            )\n\n    print(f\"\\nWarmup complete. Total conflicts recorded: {warmup_conflicts_total}\")\n    print(\n        f\"Memory statistics: max={conflict_memory.memory.max():.3f}, \"\n        f\"mean={conflict_memory.memory.mean():.3f}, \"\n        f\"nonzero cells={np.sum(conflict_memory.memory > 0.01)}\"\n    )\n\n    # Freeze memory for evaluation\n    frozen_memory = conflict_memory.freeze()\n\n    # Evaluation phase\n    print(\"\\n--- Evaluation Phase ---\")\n    baseline_makespans = []\n    cma_makespans = []\n    baseline_conflicts = []\n    cma_conflicts = []\n    assignment_changes = []\n\n    for ep in range(n_eval):\n        seed = n_warmup + ep\n\n        # Baseline run\n        np.random.seed(seed)\n        baseline_result = run_episode(\n            grid, n_agents, conflict_memory=None, use_cma=False\n        )\n\n        # CMA run (same seed for identical initial conditions)\n        np.random.seed(seed)\n        cma_result = run_episode(\n            grid,\n            n_agents,\n            conflict_memory=frozen_memory,\n            use_cma=True,\n            penalty_weight=penalty_weight,\n        )\n\n        baseline_makespans.append(baseline_result[\"makespan\"])\n        cma_makespans.append(cma_result[\"makespan\"])\n        baseline_conflicts.append(len(baseline_result[\"conflicts\"]))\n        cma_conflicts.append(len(cma_result[\"conflicts\"]))\n\n        # Check if assignments differ\n        assignments_differ = baseline_result[\"assignment\"] != cma_result[\"assignment\"]\n        if isinstance(assignments_differ, np.ndarray):\n            assignments_differ = assignments_differ.any()\n        assignment_changes.append(int(assignments_differ))\n\n        if (ep + 1) % 10 == 0:\n            print(\n                f\"Eval episode {ep+1}: baseline_makespan={baseline_result['makespan']}, \"\n                f\"cma_makespan={cma_result['makespan']}, \"\n                f\"assignment_changed={assignments_differ}\"\n            )\n\n    # Store results\n    experiment_data[\"cma_experiment\"][\"baseline_makespans\"] = baseline_makespans\n    experiment_data[\"cma_experiment\"][\"cma_makespans\"] = cma_makespans\n    experiment_data[\"cma_experiment\"][\"conflict_counts_baseline\"] = baseline_conflicts\n    experiment_data[\"cma_experiment\"][\"conflict_counts_cma\"] = cma_conflicts\n    experiment_data[\"cma_experiment\"][\"assignment_changes\"] = assignment_changes\n\n    # Compute metrics\n    baseline_mean = np.mean(baseline_makespans)\n    cma_mean = np.mean(cma_makespans)\n\n    improvements = [\n        (b - c) / b if b > 0 else 0 for b, c in zip(baseline_makespans, cma_makespans)\n    ]\n    experiment_data[\"cma_experiment\"][\"improvements\"] = improvements\n\n    makespan_improvement_ratio = (\n        (baseline_mean - cma_mean) / baseline_mean if baseline_mean > 0 else 0\n    )\n\n    # Print results\n    print(f\"\\n{'='*60}\")\n    print(\"RESULTS SUMMARY\")\n    print(f\"{'='*60}\")\n    print(\n        f\"Baseline average makespan: {baseline_mean:.2f} (std: {np.std(baseline_makespans):.2f})\"\n    )\n    print(\n        f\"CMA average makespan:      {cma_mean:.2f} (std: {np.std(cma_makespans):.2f})\"\n    )\n    print(\n        f\"Makespan improvement ratio: {makespan_improvement_ratio:.4f} ({makespan_improvement_ratio*100:.2f}%)\"\n    )\n    print(f\"Assignment change rate: {np.mean(assignment_changes)*100:.1f}%\")\n    print(f\"Baseline avg conflicts: {np.mean(baseline_conflicts):.2f}\")\n    print(f\"CMA avg conflicts: {np.mean(cma_conflicts):.2f}\")\n\n    return makespan_improvement_ratio, frozen_memory, grid\n\n\ndef visualize_results(conflict_memory, grid):\n    \"\"\"Visualize conflict memory and results.\"\"\"\n    fig, axes = plt.subplots(1, 3, figsize=(15, 5))\n\n    # Plot 1: Grid layout\n    ax1 = axes[0]\n    ax1.imshow(grid, cmap=\"binary\", origin=\"upper\")\n    ax1.set_title(\"Warehouse Layout (black=obstacle)\")\n    ax1.set_xlabel(\"X\")\n    ax1.set_ylabel(\"Y\")\n\n    # Plot 2: Conflict memory heatmap\n    ax2 = axes[1]\n    im = ax2.imshow(conflict_memory.memory, cmap=\"hot\", origin=\" missing dependency: `ModuleNotFoundError:\nNo module named 'scipy'` at `from scipy.optimize import linear_sum_assignment`.\nFix by installing SciPy in the runtime (`pip install scipy`) or removing the\nSciPy dependency by replacing Hungarian assignment with a pure-Python/PyTorch\nimplementation (e.g. `lapjv`, `munkres`, or a custom greedy fallback for\npreliminary experiments). No experiment results were produced.", "Execution failed immediately due to a missing dependency: `ModuleNotFoundError:\nNo module named 'scipy'` at `from scipy.optimize import linear_sum_assignment`.\nFix by installing SciPy in the runtime (`pip install scipy`) or removing the\ndependency and replacing Hungarian assignment with a pure-Python / NumPy\nfallback (e.g. `munkres` package or a custom implementation). No experiment\nresults were produced, so the implementation was not actually validated.", "The run completed, but the output indicates a functional bug/design flaw: CMA\nhad essentially no effect and slightly worsened makespan (mean improvement\n-0.0058, identical conflict counts). This is likely because the learned conflict\nmemory is almost never influencing allocation. Key issues visible from the\ncode/output: (1) conflict memory is extremely sparse/weak after warmup (max only\n0.81, with ~0.6 conflicts/episode), so penalties are too small relative to base\nManhattan costs; (2) task allocation uses a greedy matcher, so even when costs\nchange slightly, assignments may remain unchanged; (3) the provided\n'hungarian_assignment' is not actually Hungarian and just calls the greedy\nsolver; (4) the planner reserves only vertex occupancy and ignores edge-swap\nreservations during planning, so conflict feedback and execution model are\ninconsistent; (5) conflict memory is reused/updated online during evaluation,\nwhich can bias comparison and drift unpredictably. Fixes: increase congestion\nsignal strength (more agents/denser maps/larger penalty weight or normalized\npenalties), use a rea ts/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_bb31b64538b94c5aa7c50c59a71c2c4f_proc_11519/cma_makespan_comparison.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_bb31b64538b94c5aa7c50c59a71c2c4f_proc_11519/cma_assignment_changes.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_bb31b64538b94c5aa7c50c59a71c2c4f_proc_11519/cma_parameter_sweep.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_bb31b64538b94c5aa7c50c59a71c2c4f_proc_11519/cma_improvement_distribution.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_bb31b64538b94c5aa7c50c59a71c2c4f_proc_11519/cma_experiment_results.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_bb31b64538b94c5aa7c50c59a71c2c4f_proc_11519/cma_conflict_counts.png"], [], ["experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_b9e95e4f2a4c493ebbbd615774c97c40_proc_11520/cma_results.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_b9e95e4f2a4c493ebbbd615774c97c40_proc_11520/warehouse_environment.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_b9e95e4f2a4c493ebbbd615774c97c40_proc_11520/cma_makespan_comparison.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_b9e95e4f2a4c493ebbbd615774c97c40_proc_11520/cma_assignment_changes.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_b9e95e4f2a4c493ebbbd615774c97c40_proc_11520/cma_parameter_sweep.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_b9e95e4f2a4c493ebbbd615774c97c40_proc_11520/cma_improvement_distribution.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_b9e95e4f2a4c493ebbbd615774c97c40_proc_11520/cma_experiment_results.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_b9e95e4f2a4c493ebbbd615774c97c40_proc_11520/cma_conflict_counts.png"], ["experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/seed_aggregation_9ac23e2a654a4b4095f343d5b855b1ec/aggregated_cma_improvement.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/seed_aggregation_9ac23e2a654a4b4095f343d5b855b1ec/aggregated_cma_conflict_counts.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/seed_aggregation_9ac23e2a654a4b4095f343d5b855b1ec/aggregated_cma_makespan_comparison.png", "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/seed_aggregation_9ac23e2a654a4b4095f343d5b855b1ec/aggregated_cma_summary_dashboard.png"]], "plot_analyses": [[], [], [], [], [], [], [], [], [], [{"analysis": "The composite figure provides useful sanity checks for the implementation. The warehouse layout shows structured aisles and repeated shelf blocks, so learning congestion should be plausible because traffic is naturally funneled through corridor intersections. The conflict memory heatmap is not uniform: it concentrates on a few corridor crossings and chokepoints, which supports the core hypothesis that conflicts are spatially structured rather than random. However, the makespan comparison on the right does not show a benefit yet. The plotted means are approximately 16.0 for Baseline and 16.5 for CMA, indicating a slight degradation in average performance despite the learned map appearing meaningful. This suggests the memory is detecting bottlenecks, but the current penalty integration into assignment is not yet converting that information into better schedules. For an initial implementation, this is still encouraging because the representation appears nontrivial; the main issue is decision usefulness, not signal absence.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_a71d4c608ff14cccad9a72720b1abe09_proc_11518/cma_results.png"}, {"analysis": "This makespan-over-episodes plot shows Baseline and CMA tracking each other very closely across roughly 80 episodes. The mean lines indicate a tiny advantage for CMA, about 16.05 versus 16.25, which is only around a 0.2 makespan reduction or roughly 1.2% relative improvement. That is directionally consistent with the method but far below the 15\u201325% target claimed in the research vision. The episode-level curves also cross frequently, implying high variance relative to the effect size. There is no visible monotonic learning trend where CMA becomes progressively better over time, so either the conflict memory saturates quickly, is too weak to affect assignments strongly, or the task distribution is too noisy for this small-scale setup. The main takeaway is that the implementation may be working but the gain is currently marginal and likely not statistically convincing.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_a71d4c608ff14cccad9a72720b1abe09_proc_11518/cma_makespan_comparison.png"}, {"analysis": "The assignment-change analysis shows that CMA chooses a different assignment from Baseline in 50.0% of episodes. This is an important diagnostic result: the method is not failing simply because it leaves assignments unchanged almost all the time. It is intervening often enough to matter behaviorally. Combined with the weak makespan improvement elsewhere, this implies the current learned penalties are influential but not reliably beneficial. In other words, CMA is changing decisions, but those changes are only as good as random or slightly better at this stage. That points to calibration and credit-assignment issues rather than a no-op implementation. It would be useful to break down performance conditioned on whether assignments changed, since the current figure strongly suggests many changes are unnecessary or harmful.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_a71d4c608ff14cccad9a72720b1abe09_proc_11518/cma_assignment_changes.png"}, {"analysis": "The parameter sweep is highly informative despite being simple. A penalty weight of 0.5 is labeled best and is the only clearly positive setting, at around +1.4% improvement. A weight of 1.0 is effectively neutral, while larger weights become harmful, with 2.0 causing the largest drop at roughly -4.2% and 3.0 to 5.0 remaining negative. This strongly indicates the conflict signal is delicate: mild regularization can help, but stronger penalties over-bias assignment away from nominally efficient routes and likely create longer travel distances that outweigh conflict reduction. This is actually a valuable early result for a paper because it shows CMA should be treated as a soft cost shaping mechanism, not a hard avoidance rule. It also suggests the current memory values are not normalized or calibrated robustly enough for broad hyperparameter stability.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_a71d4c608ff14cccad9a72720b1abe09_proc_11518/cma_parameter_sweep.png"}, {"analysis": "The histogram of per-episode makespan improvements shows a distribution sharply concentrated near zero, with mean improvement around -0.18%. This indicates that in most episodes CMA behaves almost identically to Baseline, with only a minority of episodes producing substantial positive or negative effects. The distribution appears asymmetric in having both noticeable wins and losses, but the average is slightly negative, so the bad cases are currently offsetting the good ones. This pattern fits an early-stage method that occasionally identifies true congestion structure but lacks reliability. For the hypothesis, the plot is mixed: there is evidence that conflict memory can matter because some episodes show sizable positive improvement, yet the central mass near zero means the allocation mechanism is not consistently exploiting that information. Reporting median improvement, win rate, and tail-risk metrics would help clarify whether CMA is valuable as a risk-reduction method even if mean improvement is near zero.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_a71d4c608ff14cccad9a72720b1abe09_proc_11518/cma_improvement_distribution.png"}, {"analysis": "The rolling-average improvement plot is inconsistent with the rest of the reported results. The green curve is exactly flat at 0 over all shown episodes, while other plots show nonzero positive and negative improvements and nonidentical means between Baseline and CMA. That flat line suggests either a plotting bug, a data pipeline issue, or a placeholder value rather than a genuine rolling average. Because this figure directly contradicts the other results, it should not be used as evidence until verified. Scientifically, the main takeaway is procedural: the evaluation code likely needs auditing before drawing strong conclusions. For an initial implementation stage, catching this inconsistency is important and arguably more valuable than squeezing out small gains.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_a71d4c608ff14cccad9a72720b1abe09_proc_11518/cma_rolling_improvement.png"}, {"analysis": "This four-panel summary appears to be a controlled toy run where Baseline and CMA are exactly identical in makespan across all 20 episodes. The improvement-ratio panel confirms this with a mean of 0.00% and a flat zero line. The conflict-count comparison also shows no difference, and the normalized conflict memory map contains only a few isolated hotspots. As a sanity check, this is useful because it demonstrates the current setup can produce a valid memory visualization without automatically changing outcomes. However, as experimental evidence for CMA, it indicates the intervention is effectively inactive in this configuration. Either the allocation tie-breaking leaves decisions unchanged, the penalty never alters costs enough to switch assignments, or the environment/task set is too trivial to expose benefits. This is acceptable for preliminary debugging but not yet evidence of the research claim.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_a71d4c608ff14cccad9a72720b1abe09_proc_11518/cma_experiment_results.png"}, {"analysis": "The conflict-count comparison over episodes shows highly variable and sparse conflict events for both methods. There are some episodes where CMA reduces conflicts substantially, such as the large Baseline spike near the low 70s that is not matched by CMA, which is encouraging and consistent with the congestion-memory idea. But there are also episodes where CMA has more conflicts than Baseline, including notable spikes in the mid-60s. The overall picture is therefore mixed rather than dominant improvement. This suggests CMA may be redistributing congestion rather than consistently eliminating it. Since the main objective is makespan, this also helps explain why average makespan gains remain small: fewer conflicts do not always translate into shorter schedules if avoidance induces detours. For the next stage, a stronger analysis would correlate per-episode conflict reduction with makespan change and inspect whether memory helps specifically in high-congestion regimes rather than on average across all episodes.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_a71d4c608ff14cccad9a72720b1abe09_proc_11518/cma_conflict_counts.png"}], [], [], [{"analysis": "The composite figure provides a useful sanity check for the initial implementation. The warehouse layout shows a structured shelf-like environment with repeated horizontal obstacle bands and open corridors, which is appropriate for testing whether conflict memory can discover bottlenecks. The conflict memory heatmap is clearly non-uniform: higher intensities concentrate at a small number of cells and corridor intersections rather than being spread uniformly, which supports the core hypothesis that conflicts are structured and location-dependent. However, the makespan comparison on the right does not yet show a performance gain from CMA. The plotted means are approximately Baseline 16.0 and CMA 16.5, so CMA is slightly worse on average in this run. Episode-wise, the two curves are close and often overlap, suggesting the penalty is influencing outcomes only weakly or inconsistently. Taken together, this figure says the system is learning some congestion structure, but the current feedback-to-allocation mechanism is not yet converting that structure into measurable makespan improvement.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_bb31b64538b94c5aa7c50c59a71c2c4f_proc_11519/cma_results.png"}, {"analysis": "This makespan-over-episodes plot shows a very small average advantage for CMA: the mean makespan is about 16.05 versus 16.25 for the baseline. That is only around a 0.2 absolute reduction, roughly a 1.2% relative improvement, so the effect is real in the plot but modest. The episode traces are highly interleaved, indicating high variance and no dominant per-episode advantage. CMA does outperform baseline in several spikes, but it also underperforms in others, so the mean improvement is being driven by small aggregate differences rather than a robust shift of the full curve. For an initial implementation, this is mildly encouraging because the sign of the result is correct, but it is far from the 15\u201325% gains claimed in the motivating idea. The main takeaway is that the mechanism may be working weakly, but the experiment is underpowered or the current memory formulation is too simple to create a strong allocation benefit.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_bb31b64538b94c5aa7c50c59a71c2c4f_proc_11519/cma_makespan_comparison.png"}, {"analysis": "This assignment change analysis is valuable because it verifies that CMA is not degenerate. The left panel shows many episodes where CMA selects a different assignment than baseline, and the pie chart quantifies this at exactly 50.0% of episodes. That means the conflict-memory term is large enough to alter decisions frequently, so the weak makespan gains are not because CMA is never changing the allocation. Instead, the more likely interpretation is that many of those changed assignments are neutral or only occasionally beneficial. This is an important diagnostic result: the intervention has behavioral effect, but not yet high-quality effect. For the paper direction, this suggests focusing on assignment quality conditional on change, such as comparing performance only on changed episodes, or measuring whether changes reduce predicted congestion but fail due to noisy conflict estimates or insufficient temporal modeling.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_bb31b64538b94c5aa7c50c59a71c2c4f_proc_11519/cma_assignment_changes.png"}, {"analysis": "The parameter sweep is one of the strongest diagnostic plots here. It suggests a narrow operating regime for the congestion penalty. A penalty weight of 0.5 gives the best result, around +1.4% improvement, while 1.0 is essentially neutral and larger weights are harmful, with 2.0 especially damaging at about -4.2%. This pattern is consistent with over-penalization: once the memory term dominates the distance/task cost, the allocator likely pushes agents toward assignments that avoid remembered hot spots but incur longer or worse routes overall. That is scientifically useful because it confirms the conflict memory signal is sensitive and should be treated as a soft regularizer, not a strong constraint. For the next stage, this argues for either adaptive normalization of the penalty, a learned confidence term, or decaying/temperature-scaled penalties rather than fixed raw counts. It also indicates that reporting only one penalty setting could be misleading; sensitivity analysis will be essential.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_bb31b64538b94c5aa7c50c59a71c2c4f_proc_11519/cma_parameter_sweep.png"}, {"analysis": "The histogram of makespan improvement ratios shows a distribution sharply concentrated near zero, with a mean of about -0.18%. This means CMA is usually producing outcomes very close to baseline, with only occasional larger wins and losses. The long tails on both sides indicate that the method can help substantially in some episodes and hurt substantially in others, but these effects nearly cancel. This is exactly the signature of a method that is conditionally useful but not yet reliably calibrated. The strong mass near zero also aligns with the small mean differences in earlier plots: most episodes are effectively unchanged in outcome even when assignments differ. A good next analysis would segment episodes by conflict level or congestion severity, because the current distribution suggests CMA may only matter in hard, congestion-heavy instances and adds little on easy ones. If that is true, averaging across all episodes is masking where the method is actually valuable.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_bb31b64538b94c5aa7c50c59a71c2c4f_proc_11519/cma_improvement_distribution.png"}, {"analysis": "This figure appears to evaluate a warmup-based variant, but the result shown is effectively no improvement. In the makespan panel, the baseline and CMA curves overlap almost perfectly for nearly all episodes; the improvement-ratio panel is essentially zero everywhere except a single negative dip of roughly -0.20 after the warmup boundary. That suggests one of two possibilities: either CMA was not actually changing assignments for most episodes in this run, or the implementation uses a memory signal so weak or sparse that it almost never affects final makespan. The conflict memory map itself is extremely sparse, with only a handful of activated cells, unlike the denser structured map in the earlier warehouse example. That sparsity may explain the negligible impact: if only a few isolated positions receive nonzero penalties, the allocator may not be meaningfully discouraged from congested regions. The random obstacle environment in the lower-right panel may also reduce repeatability of conflict patterns compared with the regular warehouse layout, making simple histogram memory less informative. Overall, this plot suggests that environment structure and memory density are critical; the current simple CMA formulation may work better in repeated-corridor settings than in more irregular maps.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_bb31b64538b94c5aa7c50c59a71c2c4f_proc_11519/cma_experiment_results.png"}, {"analysis": "The conflict-count comparison is mixed and somewhat cautionary. CMA does reduce conflicts in some episodes, especially where the baseline has moderate counts, but it also creates large conflict spikes in others. The most striking asymmetry is a large baseline spike near episode 72 that CMA avoids, which is promising, but there are also CMA-specific spikes around episodes in the low-to-mid 60s where CMA is much worse. This episodic tradeoff matches the weak average makespan improvements seen elsewhere: CMA can prevent some severe congestion events, but not consistently. Another notable pattern is sparsity\u2014many episodes have very low conflict counts for both methods\u2014so the benchmark may contain too many easy cases where conflict-aware allocation has little room to help. For the research hypothesis, this plot supports the idea that conflict information is actionable, but only intermittently under the current implementation. The next step should be to correlate conflict-count reduction with makespan change and with whether assignment changed, to determine whether the memory is identifying genuinely important bottlenecks or merely shifting conflicts around.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_bb31b64538b94c5aa7c50c59a71c2c4f_proc_11519/cma_conflict_counts.png"}], [], [{"analysis": "The warehouse layout shows a structured shelf environment with repeated horizontal obstacle bands and narrow passages, and the conflict memory heatmap aligns with that topology rather than appearing random. High-intensity regions concentrate at corridor intersections and along shared passageways, which is consistent with the core CMA hypothesis that conflicts reveal reusable bottlenecks. However, the makespan comparison in the same figure does not yet show a clear benefit: the plotted means are Baseline 16.0 and CMA 16.5, so CMA is slightly worse on average in this run. Episode-level trajectories overlap heavily, with CMA occasionally better but also producing a large spike around the low-20s episode range, suggesting that the current penalty mechanism can sometimes redirect agents into worse global schedules. For an initial implementation, the promising result is that the memory map is learning plausible congestion structure; the weak result is that this learned signal has not yet translated into consistent makespan gains.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_b9e95e4f2a4c493ebbbd615774c97c40_proc_11520/cma_results.png"}, {"analysis": "This environment plot highlights a more intersection-heavy warehouse with two major vertical barriers and several horizontal aisles. It suggests a topology where conflicts should be strongly concentrated at crossing points near the vertical columns and aisle junctions. As a standalone figure it does not report performance, but it is useful context: if CMA is working, later conflict maps and allocation changes should focus on these chokepoints rather than diffuse free space. The map appears suitable for preliminary experiments because it contains clear, repeated bottlenecks that can expose whether conflict memory is capturing environment structure.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_b9e95e4f2a4c493ebbbd615774c97c40_proc_11520/warehouse_environment.png"}, {"analysis": "The makespan comparison over 80 episodes shows very small average separation between methods, with Baseline mean 16.25 and CMA mean 16.05. That is only a marginal improvement for CMA, so the method is not yet delivering the 15\u201325% gains claimed in the research vision. The two curves track each other closely for most episodes, implying that CMA is not drastically changing the scheduling regime. There are episodes where CMA reduces high-makespan outliers, but there are also episodes where CMA is worse, so the current effect size is weak relative to the noise. For an early-stage prototype, this is still encouraging in one sense: CMA can alter decisions without destabilizing performance, but the current learned penalty is too weak or too noisy to produce a convincing aggregate gain.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_b9e95e4f2a4c493ebbbd615774c97c40_proc_11520/cma_makespan_comparison.png"}, {"analysis": "The assignment change analysis shows that CMA selects different assignments from the baseline in 50% of episodes. This is important because it rules out the trivial failure mode where the conflict memory has no behavioral effect. At the same time, a 50% change rate paired with only negligible makespan improvement suggests that many altered assignments are not meaningfully better than the baseline. In other words, CMA is active but not yet selective. The next scientific question is not whether memory influences allocation, but whether the memory signal correlates with truly harmful congestion. This plot supports the interpretation that the current bottleneck is quality of guidance, not lack of intervention.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_b9e95e4f2a4c493ebbbd615774c97c40_proc_11520/cma_assignment_changes.png"}, {"analysis": "The parameter sweep is one of the most informative ablations here. A small penalty weight of 0.5 gives the best result at roughly +1.4% improvement, weight 1.0 is neutral, and larger weights make performance worse, with weight 2.0 especially harmful at about -4.2%. This pattern strongly suggests that conflict memory is a potentially useful but delicate signal: mild regularization helps, while aggressive penalization overcorrects and pushes the allocator away from efficient paths. That is exactly the kind of sensitivity expected in an initial implementation where the memory is coarse and possibly biased by limited data. The plot argues for careful calibration, annealing, normalization, or uncertainty-aware weighting rather than stronger penalties.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_b9e95e4f2a4c493ebbbd615774c97c40_proc_11520/cma_parameter_sweep.png"}, {"analysis": "The histogram of makespan improvements indicates a distribution centered almost exactly at zero, with reported mean -0.18%. Most mass is clustered near no change, while there are tails on both sides showing occasional substantial wins and losses. This implies CMA is not consistently improving typical cases; instead it sometimes helps in specific congestion scenarios and sometimes hurts. Scientifically, that is still useful because it suggests heterogeneity in episode difficulty or topology-task interaction. The immediate follow-up should be to condition results on conflict density, task clustering, or chokepoint usage to identify when conflict memory is beneficial. Right now, averaging over all episodes washes out the effect.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_b9e95e4f2a4c493ebbbd615774c97c40_proc_11520/cma_improvement_distribution.png"}, {"analysis": "This 2x2 summary provides the clearest picture of the current prototype. The makespan comparison over 20 evaluation episodes shows slight overall improvement, with a mean improvement ratio around 0.015, but gains are episodic rather than uniform. The per-episode improvement bars reveal several notable successes and several pronounced failures, confirming high variance. The spatial conflict memory map is encouraging: hotspots trace corridors and intersections rather than arbitrary cells, which supports the hypothesis that conflicts contain structured spatial information. The assignment-change bars show CMA frequently alters multiple task assignments per episode, often by 2\u20136 assignments, so the mechanism is behaviorally substantial. Taken together, this figure says the memory representation is learning something real and is changing allocations, but the control policy that converts memory into improved makespan is not yet robust.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_b9e95e4f2a4c493ebbbd615774c97c40_proc_11520/cma_experiment_results.png"}, {"analysis": "The conflict count comparison is mixed and does not show a consistent reduction from CMA. Some episodes have lower conflicts under CMA than baseline, but other episodes show substantial increases, including large spikes in the mid-to-late episode range. This matters because the intended mechanism is to use historical conflicts to avoid future congestion; if conflict counts do not reliably decrease, then the allocation penalties are not yet aligned with actual collision-generating situations. It is also possible that makespan and raw conflict counts are not perfectly coupled, but given the weak makespan gains elsewhere, this plot more likely indicates limited effectiveness of the current memory update or cost integration rule. For the next iteration, it would be valuable to compare not just total conflicts, but conflict location overlap with memory hotspots, conflict severity, and whether CMA reduces repeated chokepoint conflicts specifically.", "plot_path": "experiments/2026-04-04_15-26-17_conflict_memory_allocation_attempt_0/logs/0-run/experiment_results/experiment_b9e95e4f2a4c493ebbbd615774c97c40_proc_11520/cma_conflict_counts.png"}], []], "vlm_feedback_summary": ["[]", "[]", "[]", "[]", "[]", "[]", "[]", "[]", "[]", "The plots are valid and collectively indicate that the CMA implementation is\npartially functional but not yet delivering the paper-level gains in this\npreliminary stage. The conflict memory maps are structured and align with\ncorridor chokepoints, supporting the core hypothesis that conflicts contain\nlearnable spatial information. However, makespan improvements are tiny,\ninconsistent, or even slightly negative depending on the figure, with high\nepisode-to-episode variance. CMA changes assignments frequently enough to\nmatter, so the issue is not lack of intervention but unreliable usefulness of\nthe learned penalties. The parameter sweep suggests only small penalty weights\nhelp, while stronger penalties hurt, implying the memory should act as a weak\nsoft regularizer. One plot shows a flat zero rolling average despite other\nnonzero results, indicating a likely evaluation or plotting bug that should be\nfixed before strong conclusions are drawn.", "[]", "[]", "The plots are valid and collectively show that the initial CMA implementation is\nfunctionally meaningful but not yet strong. Conflict memory maps are non-uniform\nand reveal structured bottlenecks, which supports the core hypothesis that MAPF\nconflicts contain learnable congestion information. CMA changes assignments\nfrequently, so the mechanism is behaviorally active. However, performance gains\nare small, inconsistent, and sometimes negative: mean makespan is near baseline\nacross runs, the improvement distribution is centered close to zero or slightly\nnegative, and conflict counts show episode-dependent wins and losses. The\nparameter sweep is especially informative, indicating that only a small penalty\nweight helps while larger weights hurt, consistent with over-penalizing\ncongested regions. Results also suggest the method may work better in structured\nwarehouse layouts than in sparse/random environments. Overall: promising proof\nof concept for learning congestion structure, but current conflict-memory\nintegration and calibration are not yet sufficient for strong top-paper-level\ngains.", "[]", "The plots are valid and collectively show an early-stage CMA prototype that\nlearns plausible structured congestion maps aligned with warehouse bottlenecks\nand does change assignments frequently, but has not yet demonstrated consistent\nperformance gains. Across makespan plots, average improvements are tiny, mixed,\nor slightly negative depending on the run. The assignment-change plots show CMA\nis behaviorally active, so the main issue is not lack of intervention but weak\nselectivity of the learned penalties. The parameter sweep suggests small penalty\nweights help while larger weights hurt, indicating the conflict-memory signal is\nfragile and easy to overapply. Conflict-count results are also inconsistent.\nOverall, the evidence supports the core hypothesis that conflicts contain\nlearnable spatial structure, but not yet the stronger claim that this simple\ninitial implementation reliably improves decoupled scheduling.", "[]"], "exec_time": [0.003000974655151367, 0.003148317337036133, 0.0031118392944335938, 0.0035533905029296875, 1.7877874374389648, 1.652216911315918, 1.4239108562469482, 1.3318250179290771, 4.3026368618011475, 9.039722204208374, 2.156425714492798, 0.2529928684234619, 9.702515363693237, 9.768894672393799, 9.811657667160034, null], "exec_time_feedback": ["", "", "", "", "", "", "", "", "", "", "", "", "", "", "", ""], "datasets_successfully_tested": [[], [], [], [], [], [], [], [], [], ["cma_experiment", "sweep_results"], [], [], ["[warehouse", "random_obstacle]"], [], ["cma_experiment", "sweep_results"], []], "plot_code": [null, null, null, null, null, null, null, null, null, "import matplotlib.pyplot as plt\nimport numpy as np\nimport os\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\n\ntry:\n    experiment_data = np.load(\n        os.path.join(working_dir, \"experiment_data.npy\"), allow_pickle=True\n    ).item()\nexcept Exception as e:\n    print(f\"Error loading experiment data: {e}\")\n    experiment_data = None\n\nif experiment_data is not None:\n    # Plot 1: Makespan Comparison Over Episodes\n    try:\n        plt.figure(figsize=(10, 6))
